services:
  postgres:
    image: postgres:16-alpine
    container_name: bk-postgres
    environment:
      POSTGRES_DB: bk_dev
      POSTGRES_USER: bk_app
      POSTGRES_PASSWORD: bk_dev_password
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - bk_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bk_app -d bk_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  bk_pgdata:
