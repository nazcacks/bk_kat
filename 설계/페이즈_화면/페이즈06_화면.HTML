overview":"<h3 class=\"doc-h doc-h3\">1. 페이즈 개요</h3>\n<ul class=\"doc-list\">\n<li><strong>목표</strong>: 매입매출전표(P03)의 과세유형(매출 11~25·매입 51~64) 자동 집계 위에 ① 부가가치세신고서 생성·마감 상태머신, ② 세무리스크 자동검증(MRI) 사전검증, ③ 4대 합계표·명세서(세금계산서·신용카드 수령/발행·계산서), ④ 전자신고 파이프라인(제작→검증→제출)·납부서, ⑤ 업종별 부속서류 6종(부동산임대~현금매출)을 구현한다(§25.11~25.12).</li>\n<li><strong>범위 요약</strong>: 1차 14메뉴(SA-VAT-01~14) + 2차 1메뉴(SA-VAT-15). 메뉴 채널은 TN-09 부가세·신고서류(§26.1-(4): SA-VAT 50화면 배치 중 본 페이즈 15화면).</li>\n<li><strong>선행조건</strong>:</li>\n<li>P03 매입매출전표입력(SA-JNL-02)의 2계층 구조(세무헤더+분개라인)와 <code>tax_type_master</code>(과세유형 단일 진실원) 가동(§0.4 P1·P2, §25.4.2.2).</li>\n<li>P03 SA-ATX-02~05 전자세금계산서/계산서/카드/현금영수증 수집·자동전표(전자/전자외 판정 원천, §25.5).</li>\n<li>P01 회사등록(법인/개인·과세유형·본지점설정·국세환급금계좌, §25.1.1)·환경설정(과세유형 추가 25.매세/63.복지, 봉사료, 공급가액 소수점 끝수처리, 중고차량/차대번호 — §25.1.3 회계탭 ③④⑤⑥)·거래처등록(사업자번호·단위신고거래처, §25.1.6).</li>\n<li>P05 마감 워크플로우: 신고 완료 기간 <code>LOCKED</code> 전환·마감해제 불가(§11.9-(1)(3)).</li>\n<li><strong>MVP 연관</strong>: MVP 최우선은 P03 전표·P01 계정과목(§22 N13)이며, 본 페이즈는 그 산출 데이터(과세유형·증빙)의 첫 번째 법정 신고 소비처다. 신고서 생성·전자신고 전송은 <strong>주기장 측 수행</strong>이 원칙(§11.4, §21.4).</li>\n</ul>","flow":"<h3 class=\"doc-h doc-h3\">3. 업무 흐름 (End-to-End)</h3>\n<pre class=\"doc-code\"><code>[P03] 매입매출전표(과세유형 11~64) + SA-ATX 수집자료 + 증빙\n   │  과세유형 → 신고서식 라우팅(§25.4.2.2: 유형 자체/계정 기반/적요 기반 분기 3종)\n   ▼\n① 부속서류·합계표 작성 (SA-VAT-03~06, 09~14) — 불러오기(전표 자동집계) → 보정 → 마감(매출·매입 동시)\n   ▼\n② 부가가치세신고서 생성 (SA-VAT-01) — 신고구분(예정/확정/영세율조기환급/기한후)·사업장 과세단위 선택 → 자동집계 → 직접입력 항목 보정\n   ▼\n③ 신고서 마감 상태머신 (§25.11.1) — 마감 → 첨부서식 조회·전자신고여부(0/x) 지정 → MRI 60여 항목 검사(SA-VAT-02)\n   │  오류리스트 &lt;유의사항&gt;은 강제마감 가능\n   ▼\n④ (주기장=OPERATOR) 이용회사 확인(Ack)·신고 승인 (§21.4) — filingApprovalRequired=Y(기본): 신고서 요약(과세표준·세액) 송부 → Step-up 승인\n   ▼\n⑤ 전자신고 (SA-VAT-07) — 제출자등록 → 전산매체 제작(.101/.102, 비밀번호 8~15자리) → 검증 → 홈택스 제출(약 15단계 자동화)\n   │  신고상태: 제작오류/제작완료/검증오류/검증완료/제출오류/제출확인\n   ▼\n⑥ 납부서 출력 (SA-VAT-08, 2D 바코드) + 신고 완료 기간 LOCKED 전환(§11.9) + 수정신고/경정청구 분기(추가 차가감납부세액 ≥0 / &lt;0, §25.11.1 → P07 SA-VAT-27/28)</code></pre>\n<ul class=\"doc-list\">\n<li>신고유형은 예정/확정/수정/기한후 전체 + 가산세를 지원하고, 사업장 차원과 연계한 사업장별 신고/사업자단위과세 합산을 수행한다(§11.4).</li>\n<li>확정신고 시 예정신고누락분(1기 4~6월/2기 10~12월 반영)·예정신고미환급세액·예정고지세액을 처리한다(§25.11.1).</li>\n<li>매입원장 세무구분(<code>taxCategory</code>)·국세청 전송상태(<code>ntsStatus</code>)가 신고 집계의 원천이며 홈택스 수신 결과와 주기적 대사한다(§11.4-(1)).</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">3.1 과세유형 → 본 페이즈 서식 라우팅 (공통 참조, §25.4.2.2)</h4>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>유형군</th><th>대상 코드</th><th>반영 서식</th></tr></thead><tbody><tr><td>세금계산서 과세/영세</td><td>매출 11·12·25 / 매입 51·52·54·55·64</td><td>SA-VAT-01 과세·영세, SA-VAT-03</td></tr>\n<tr><td>계산서 면세</td><td>13 / 53</td><td>SA-VAT-01 면세수입금액, SA-VAT-06</td></tr>\n<tr><td>신용카드·현금영수증 매출</td><td>17·18·19·21·22·23·24</td><td>SA-VAT-01 카과/전자/현과, SA-VAT-05</td></tr>\n<tr><td>신용카드·현금영수증 매입</td><td>57·58·59·61·62·63</td><td>SA-VAT-04(4개 탭)</td></tr>\n<tr><td>건별·종합·면건</td><td>14·15·20 / 60</td><td>SA-VAT-01 기타(과세/면세)</td></tr>\n<tr><td>고정자산 분기(계정 기반)</td><td>51·57·61 + 고정자산 계정</td><td>SA-VAT-01 고정자산매입란(→P07 SA-VAT-23)</td></tr>\n<tr><td>의제매입(적요 기반)</td><td>53·58·60·62 + 원재료 계정(146/153/162) + 적요06</td><td>SA-VAT-11 (§0.4 P4, §25.12.3)</td></tr>\n<tr><td>재활용폐자원·구리스크랩(적요 기반)</td><td>53·58·60·62·51 + 적요07 / 적요 성격 '5.구리스크랩(부가)'</td><td>SA-VAT-12·13 (§25.12.4~5)</td></tr>\n<tr><td>불공제</td><td>54 + 불공제사유</td><td>SA-VAT-01 공제받지못할매입세액(→P07 SA-VAT-22)</td></tr></tbody></table></div>","dataModel":"<h3 class=\"doc-h doc-h3\">5. 데이터 모델</h3>\n<blockquote>엔티티 명칭 중 § 근거 표기가 있는 필드·상태는 설계서 명시값이며, 신고서 헤더 등 구조 명칭은 §25.11의 화면 기능(작성조회·차수·마감)을 본 페이즈에서 구체화한 것이다.</blockquote>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>엔티티</th><th>핵심 필드</th><th>PK/유니크·상태</th><th>근거</th></tr></thead><tbody><tr><td><code>VatReturn</code>(부가세신고서)</td><td>tenantId, fiscalYear, taxPeriodFrom/To, filingType(1.예정/2.확정/3.영세율조기환급/4.기한후), taxUnit(사업장별/총괄/사업자단위), businessPlaceId, amendmentSeq(수정차수), status(작성중→마감), eFilingFlag(전자신고여부 0/x), forcedCloseFlag(&lt;유의사항&gt; 강제마감), refundAccountRef</td><td>UQ(tenantId, 과세기간, filingType, taxUnit, amendmentSeq). 정기신고 마감 선행 후 수정신고</td><td>§25.11.1</td></tr>\n<tr><td><code>VatReturnLine</code></td><td>returnId, lineCode(신고서식 란번호 11~48·50~58 등), taxBase(과표), taxAmount(세액), sourceType(자동집계/직접입력), 수정전/수정후 구분</td><td>수정전=정기신고분 자동·수정불가</td><td>§25.11.1</td></tr>\n<tr><td><code>VatAttachmentForm</code>(부속서류 공통 헤더)</td><td>tenantId, returnId, formType(SA-VAT-03~15…), status(작성/마감), closedAt, 매출·매입 동시 마감 플래그</td><td>마감 시 거래처 사업자번호 정합 검증</td><td>§25.11.3, §25.11.6</td></tr>\n<tr><td><code>ElectronicFilingJob</code>(전자신고)</td><td>returnId, jobType(정기/기한후/수정), fileFormat(.101/.102), fileName(제작일), filePassword(8~15자리), status(제작오류/제작완료/검증오류/검증완료/제출오류/제출확인), excludeFlag(제작제외 — 마감해지 후 유지), hometaxAutoFlag</td><td>재마감 시 상태 공란화. 멱등 작업큐</td><td>§25.11.7</td></tr>\n<tr><td><code>FilingSubmitterProfile</code>(제출자등록)</td><td>tenantId, submitterType(1.세무대리인/2.일반업체), hometaxUserId(공통/개별), 제출자구분·관리번호·조정반번호</td><td>일반업체=회사등록 불러오기</td><td>§25.11.7</td></tr>\n<tr><td><code>tax_type_master</code></td><td>과세유형 코드(매출 11~25/매입 51~64), 세율, 부가세계정, 신고서식 매핑, 전자발행 가능, 증빙요건</td><td>단일 진실원</td><td>§0.4 P2, §25.4.2.2</td></tr>\n<tr><td><code>PurchaseLedgerLine</code>(매입원장)</td><td>postingDate, journalEntryId/LineId, vendorId, businessRegistrationNo, taxCategory(세무구분), reasonCode, supplyAmount, vatAmount, grossAmount, deductibleType, businessPlaceId, evidenceId, taxInvoiceId, ntsStatus, evidenceStatus, sourceSystem</td><td>ntsStatus 8종: NOT_TARGET/PENDING/ISSUED/SENT/ACCEPTED/REJECTED/CANCELLED/MANUAL_EVIDENCE</td><td>§11.4-(1)(2)</td></tr>\n<tr><td><code>TaxInvoiceTransmission</code></td><td>taxInvoiceId, ntsStatus, sentAt, acceptedAt, rejectedReason, sourceRef</td><td>전자/전자외 판정 원천</td><td>§11.4-(2)</td></tr>\n<tr><td><code>PurchaseTaxStatusHistory</code></td><td>lineId, beforeStatus, afterStatus, changedBy, reason</td><td>append-only</td><td>§11.4-(2)</td></tr>\n<tr><td><code>DeemedInputEntry</code>(의제매입 명세)</td><td>공급자, 사업자/주민번호, 취득일자, 구분(계산서/신용카드등/농어민), 물품명, 수량, 매입가액, 공제율, 의제매입세액</td><td>정산: 한도율·당기매입액·기공제세액</td><td>§25.12.3</td></tr>\n<tr><td><code>RecycledWasteEntry</code>(재활용/구리스크랩)</td><td>구분(계산서/영수증), 종류(중고차/기타), 공제율(3/103·10/110·직접), 차량·차대번호, 매입자납부특례 표시</td><td>구리스크랩 합산 플래그</td><td>§25.12.4~5</td></tr>\n<tr><td><code>RealEstateRentalUnit</code>(임대물건)</td><td>상호, 층·호수·동, 사업자/주민번호, 임대면적, 용도, 임대기간, 보증금·월세·관리비, 적용이자율, 보증금이자(자동), 갱신일·퇴거일</td><td>현장/프로젝트 차원 연계</td><td>§25.12.1</td></tr>\n<tr><td><code>TenantAcknowledgement</code>(신고 승인/확인)</td><td>대상(마감/신고), status(PENDING→CONFIRMED/OBJECTED), 사유</td><td>ackPolicy=REQUIRED 시 후속 차단</td><td>§21.4-(4), §12.2</td></tr>\n<tr><td><code>FiscalPeriod</code>(기간 상태)</td><td>상태: FUTURE→OPEN→TEMP_CLOSED→CLOSED→<strong>LOCKED(신고 완료·아카이브, 마감해제 불가)</strong></td><td>수정신고 절차로만 대응</td><td>§11.9-(1)(3)</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>신고파일 상태 5종 등 기타 상태값은 부록 B 13.4·부록 C 14.5 준용(§12.2).</li>\n<li>테이블 공통 제약(tenant_id NOT NULL+RLS, 감사 필드, 물리 삭제 금지)은 00_개요 §3.</li>\n</ul>","api":"<h3 class=\"doc-h doc-h3\">6. API 설계</h3>\n<blockquote><code>POST /api/tenant/filings/{id}/approve</code>는 §13.2 명시 엔드포인트, 나머지는 §25.11의 기능(부가세 집계 API·마감·제작·검증·제출)을 REST로 구체화한 대표 설계다. <code>VatService</code>·<code>TaxInvoiceService</code>는 §13.1(부록 B 14.1·부록 C 15장 준용 + 주기장 권한 검증 공통 인터셉터).</blockquote>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>메서드</th><th>엔드포인트</th><th>설명</th><th>멱등성·오류</th></tr></thead><tbody><tr><td>GET</td><td><code>/api/tenant/vat/returns?fiscalYear&amp;period&amp;filingType&amp;taxUnit&amp;amendmentSeq</code></td><td>신고서 조회(작성조회: 마감여부·과세구분)</td><td>—</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/returns</code></td><td>신고서 생성(과세유형 11~64 자동집계 — 부가세 집계 API, §25.11.1)</td><td>Idempotency-Key</td></tr>\n<tr><td>PUT</td><td><code>/api/tenant/vat/returns/{id}</code></td><td>직접입력 항목 보정(가산세·예정고지 등)</td><td>version 낙관적 락</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/returns/{id}/close</code></td><td>마감(32.합계 일치·환급계좌 검증 → 첨부서식·전자신고여부 지정)</td><td><code>VALIDATION_FAILED</code>, 강제마감 파라미터(&lt;유의사항&gt;만)</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/returns/{id}/mri-check</code></td><td>MRI 60여 항목 검사 실행(SA-VAT-02)</td><td>결과 리포트·리스크 스코어</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/returns/{id}/amend</code></td><td>수정신고 차수 생성(첨부서식 마감해제 선행, ≥0/&lt;0 분기)</td><td>정기신고 마감 선행 검증</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/attachments/{formType}/load</code></td><td>부속서류 불러오기(기존 삭제 후 재집계 — SA-VAT-04/05 등)</td><td>Idempotency-Key</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/attachments/{formType}/close</code></td><td>부속서류 마감(매출·매입 동시)</td><td>사업자번호 누락 시 실패</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/filings/{id}/approve</code></td><td><strong>신고 전송 전 이용회사 승인(Step-up)</strong></td><td>§13.2 명시. <code>FORBIDDEN_SCOPE</code></td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/filings/{id}/build</code></td><td>전산매체 제작(.101/.102, 비밀번호)</td><td>신고상태 갱신, 멱등 재처리</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/filings/{id}/validate</code></td><td>파일 검증</td><td>검증오류/검증완료</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/filings/{id}/submit</code></td><td>홈택스 제출(자동 전자신고)</td><td>Idempotency-Key, <code>EXTERNAL_INTEGRATION_FAILED</code></td></tr>\n<tr><td>GET</td><td><code>/api/tenant/vat/payment-slip/{returnId}</code></td><td>납부서 생성(2D 바코드)</td><td>바코드 필수항목 검증</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>오류코드</strong>(§13.3): <code>VALIDATION_FAILED</code>, <code>CLOSING_LOCKED</code>, <code>PERIOD_LOCKED</code>(신고 완료 기간 마감해제 불가), <code>NOT_PRIMARY_BOOKKEEPER</code>(비주기장 신고 시도), <code>BOOKKEEPING_NOT_CONTRACTED</code>, <code>IDEMPOTENCY_CONFLICT</code>(409), <code>EXTERNAL_INTEGRATION_FAILED</code>, <code>RATE_LIMITED</code>.</li>\n<li><strong>Scope</strong>(§13.3): <code>tenant:filing:approve</code>(이용회사 승인), 신고 전송·마감해제·평문 조회 등 위험 scope는 Step-up 인증 필수.</li>\n</ul>","validation":"<h3 class=\"doc-h doc-h3\">8. 검증·오류 처리</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>검증 항목</th><th>차단/경고</th><th>근거</th></tr></thead><tbody><tr><td>1</td><td>매출 합계 ↔ 과세표준명세 32.합계 불일치</td><td>차단(마감·전자신고 오류)</td><td>§25.11.1</td></tr>\n<tr><td>2</td><td>환급액 5천만원 초과 시 환급계좌 입력</td><td>차단(입력 시 오류)</td><td>§25.11.1</td></tr>\n<tr><td>3</td><td>MRI 오류리스트 &lt;유의사항&gt;</td><td>경고(강제마감 가능), 그 외 오류는 차단</td><td>§25.11.1</td></tr>\n<tr><td>4</td><td>수정신고 작성 시 정기신고 미마감</td><td>차단(정기신고 저장·마감 선행)</td><td>§25.11.1</td></tr>\n<tr><td>5</td><td>합계표 마감 시 거래처 사업자등록번호 누락·전표 불일치</td><td>차단(마감화일 작성 실패)</td><td>§25.11.3, §25.11.6</td></tr>\n<tr><td>6</td><td>세금계산서 수취 건의 카드 매입세액 공제(이중공제)</td><td>차단</td><td>§15 R16, §11.1.1-(16)</td></tr>\n<tr><td>7</td><td>동일 카드승인건 다중 전표 연결</td><td>차단(증빙 중복 사용 방지)</td><td>§15 R16</td></tr>\n<tr><td>8</td><td>매출 세금계산서(11) 발급 후 카드매출(17) 추가 입력</td><td>차단(중복 신고 방지 — 결제수단만 분개)</td><td>§25.4.2.2</td></tr>\n<tr><td>9</td><td>매입원장 세무구분·증빙유형 불일치</td><td><code>REVIEW_REQUIRED</code> + 신고 집계 경고/차단(회사 정책), 미결항목 생성 가능</td><td>§15, §11.4</td></tr>\n<tr><td>10</td><td>국세청 전송상태 <code>REJECTED</code>/미수신</td><td>마감 체크리스트 표시, 전자세금계산서 필수 거래는 마감 차단 가능</td><td>§15, §11.4</td></tr>\n<tr><td>11</td><td>부가세 계정-부가세코드 불일치</td><td>경고(세무헤더 대조)</td><td>§15</td></tr>\n<tr><td>12</td><td>2D 바코드 필수항목(세무서코드·납부기한·사업장등록번호/주민번호) 미입력</td><td>바코드 미반영</td><td>§25.11.8</td></tr>\n<tr><td>13</td><td>임대기간 누락 자료 불러오기</td><td>차단(불러오기 불가)</td><td>§25.12.1</td></tr>\n<tr><td>14</td><td>의제매입 물품명 미입력</td><td>전자신고 필수 — 제작 오류</td><td>§25.12.3</td></tr>\n<tr><td>15</td><td>예정누락 입력월 오류(확정기간 외 월)</td><td>차단(1~3·7~9월만 허용)</td><td>§25.4.2.2</td></tr>\n<tr><td>16</td><td>비주기장 측 신고 시도</td><td>차단 <code>NOT_PRIMARY_BOOKKEEPER</code></td><td>§15, §21.1</td></tr>\n<tr><td>17</td><td>Ack 미완료/이의 미해소 상태 신고 생성</td><td><code>ackPolicy=REQUIRED</code> 시 차단</td><td>§15, §21.4</td></tr>\n<tr><td>18</td><td>신고 승인 누락·미수임 전송</td><td><code>filingApprovalRequired=Y</code> 시 승인 전 전송 차단, 주기장=OPERATOR 미수임 시 전송 차단</td><td>§15, §21.4-(5)</td></tr>\n<tr><td>19</td><td><code>LOCKED</code> 기간 마감해제 시도</td><td>차단(수정신고 절차 안내), 시도 감사로그</td><td>§15, §11.9</td></tr>\n<tr><td>20</td><td>멱등키 충돌(제작·제출 재호출)</td><td>409 <code>IDEMPOTENCY_CONFLICT</code></td><td>§15, §13.3</td></tr>\n<tr><td>21</td><td>적격증빙 미충족 거래</td><td>가산세 대상 플래그, 세무조정 검토 목록</td><td>§15</td></tr>\n<tr><td>22</td><td>농어업기자재 등 마감 후 수정</td><td>마감 후 수정불가 패턴(부속서류 공통)</td><td>§25.12.10</td></tr></tbody></table></div>","done":"<h3 class=\"doc-h doc-h3\">11. 완료 기준(DoD)·테스트 관점</h3>\n<p><strong>DoD</strong></p>\n<p>1. 1차 14메뉴(SA-VAT-01~14)가 과세유형 11~64 전표에서 자동 집계·마감·전자신고 파일(.101/.102) 제작·홈택스 제출까지 E2E 동작(§25.11.1·7).</p>\n<p>2. 신고유형 4종(예정/확정/영세율조기환급/기한후)+수정신고 차수·경정 분기(≥0/&lt;0)와 사업장별/총괄/사업자단위 과세단위가 동작(§11.4, §25.11.1).</p>\n<p>3. MRI 60여 항목 검사·&lt;유의사항&gt; 강제마감·역추적 대사가 동작(§25.11.1~2).</p>\n<p>4. <code>filingApprovalRequired</code>·Ack·주기장 인터셉터·<code>LOCKED</code> 전환의 통제 시나리오 통과(§21.4, §11.9).</p>\n<p>5. 검증 표(8절) 22항목이 서버/클라 이중 검증으로 구현(00_개요 §3 UI 공통).</p>\n<p><strong>테스트 관점</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>구분</th><th>시나리오</th></tr></thead><tbody><tr><td>집계 정확성</td><td>과세유형별 전표 → 신고서 란 매핑 전수(11~25/51~64), 고정자산·의제(적요06)·재활용(적요07) 분기 3종(§0.4 P2~P4)</td></tr>\n<tr><td>마감 상태머신</td><td>마감→첨부서식→MRI→강제마감→재마감 시 전자신고 상태 공란화(§25.11.7)</td></tr>\n<tr><td>수정신고</td><td>정기 마감 후 차수 생성, 수정전 자동·수정불가, ≥0/&lt;0 분기</td></tr>\n<tr><td>합계표 정합</td><td>전자/전자외 판정(다음달 11일 기준), 사업자번호 누락 마감 실패, 매출·매입 동시 마감</td></tr>\n<tr><td>발행공제</td><td>개인 13/1000·법인 제외, 세금계산서 발급+카드결제 중복 차감(SA-VAT-05)</td></tr>\n<tr><td>간주임대료</td><td>보증금×이자율×임대일수÷365(윤년 366), 임대기간 경계일</td></tr>\n<tr><td>의제매입 한도</td><td>공제율 차등(2/102·6/106·4/104)·한도 정산·예정누락</td></tr>\n<tr><td>통제</td><td>비주기장 시도, 미수임 전송, Ack 미완료, Step-up 미수행, RLS 교차 테넌트</td></tr>\n<tr><td>외부연계</td><td>홈택스 제출 실패 재처리(멱등), 휴폐업 API 장애 시 우회</td></tr>\n<tr><td>성능</td><td>신고 성수기(1월·부가세 신고월) 대량 집계 — 무중단·자동 스케일(§15 하단)</td></tr></tbody></table></div>","full":"<h2 class=\"doc-h doc-h2\">BK 개발 상세설계서 — 페이즈 06. 부가세 주요신고 (SA-VAT-01~15)</h2>\n<ul class=\"doc-list\">\n<li>기준 문서: <code>bk_설계서_v1.1.md</code> (§25.11 부가가치세 주요신고서류, §25.12 업종별 첨부서류, §11.4 매입매출/부가세, §21.4 신고 책임, §22.2 개발 차수 계획)</li>\n<li>작성일: 2026-07-03</li>\n<li>개발 차수: <strong>1차(2609~2611) = SA-VAT-01~14</strong> / <strong>2차 = SA-VAT-15</strong> (§22.2 페이즈 06 행, 00_개요 §1)</li>\n<li>선행 페이즈: <strong>P03 전표·자동전표(매입매출전표 SA-JNL-02 과세유형 11~64·증빙, SA-ATX 수집자료)</strong> — 부가세 신고는 P03 매입매출·증빙 데이터를 전제(00_개요 §2). P01 회사등록(과세유형·본지점·환급계좌)·거래처등록(사업자번호) 선행.</li>\n<li>공통 설계 표준(멀티테넌시·감사필드·오류코드·권한·멱등성·UI·기술스택)은 <code>00_개요_페이즈일정.md</code> §3을 따르며 본 문서에서 반복하지 않는다.</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">1. 페이즈 개요</h3>\n<ul class=\"doc-list\">\n<li><strong>목표</strong>: 매입매출전표(P03)의 과세유형(매출 11~25·매입 51~64) 자동 집계 위에 ① 부가가치세신고서 생성·마감 상태머신, ② 세무리스크 자동검증(MRI) 사전검증, ③ 4대 합계표·명세서(세금계산서·신용카드 수령/발행·계산서), ④ 전자신고 파이프라인(제작→검증→제출)·납부서, ⑤ 업종별 부속서류 6종(부동산임대~현금매출)을 구현한다(§25.11~25.12).</li>\n<li><strong>범위 요약</strong>: 1차 14메뉴(SA-VAT-01~14) + 2차 1메뉴(SA-VAT-15). 메뉴 채널은 TN-09 부가세·신고서류(§26.1-(4): SA-VAT 50화면 배치 중 본 페이즈 15화면).</li>\n<li><strong>선행조건</strong>:</li>\n<li>P03 매입매출전표입력(SA-JNL-02)의 2계층 구조(세무헤더+분개라인)와 <code>tax_type_master</code>(과세유형 단일 진실원) 가동(§0.4 P1·P2, §25.4.2.2).</li>\n<li>P03 SA-ATX-02~05 전자세금계산서/계산서/카드/현금영수증 수집·자동전표(전자/전자외 판정 원천, §25.5).</li>\n<li>P01 회사등록(법인/개인·과세유형·본지점설정·국세환급금계좌, §25.1.1)·환경설정(과세유형 추가 25.매세/63.복지, 봉사료, 공급가액 소수점 끝수처리, 중고차량/차대번호 — §25.1.3 회계탭 ③④⑤⑥)·거래처등록(사업자번호·단위신고거래처, §25.1.6).</li>\n<li>P05 마감 워크플로우: 신고 완료 기간 <code>LOCKED</code> 전환·마감해제 불가(§11.9-(1)(3)).</li>\n<li><strong>MVP 연관</strong>: MVP 최우선은 P03 전표·P01 계정과목(§22 N13)이며, 본 페이즈는 그 산출 데이터(과세유형·증빙)의 첫 번째 법정 신고 소비처다. 신고서 생성·전자신고 전송은 <strong>주기장 측 수행</strong>이 원칙(§11.4, §21.4).</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">2. 개발 범위</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>화면 ID</th><th>명칭</th><th>차수</th><th>설계서 근거</th></tr></thead><tbody><tr><td>SA-VAT-01</td><td>부가가치세신고서</td><td>1차</td><td>§25.11.1</td></tr>\n<tr><td>SA-VAT-02</td><td>세무리스크 자동검증(부가가치세 MRI)</td><td>1차</td><td>§25.11.2</td></tr>\n<tr><td>SA-VAT-03</td><td>세금계산서합계표</td><td>1차</td><td>§25.11.3</td></tr>\n<tr><td>SA-VAT-04</td><td>신용카드매출전표등 수령명세서</td><td>1차</td><td>§25.11.4</td></tr>\n<tr><td>SA-VAT-05</td><td>신용카드매출전표 발행집계표</td><td>1차</td><td>§25.11.5</td></tr>\n<tr><td>SA-VAT-06</td><td>계산서합계표</td><td>1차</td><td>§25.11.6</td></tr>\n<tr><td>SA-VAT-07</td><td>부가가치세 전자신고</td><td>1차</td><td>§25.11.7</td></tr>\n<tr><td>SA-VAT-08</td><td>부가가치세 납부서</td><td>1차</td><td>§25.11.8</td></tr>\n<tr><td>SA-VAT-09</td><td>부동산임대공급가액명세서</td><td>1차</td><td>§25.12.1</td></tr>\n<tr><td>SA-VAT-10</td><td>건물관리명세서</td><td>1차</td><td>§25.12.2</td></tr>\n<tr><td>SA-VAT-11</td><td>의제매입세액공제신고서</td><td>1차</td><td>§25.12.3</td></tr>\n<tr><td>SA-VAT-12</td><td>재활용폐자원세액공제신고서</td><td>1차</td><td>§25.12.4</td></tr>\n<tr><td>SA-VAT-13</td><td>구리스크랩등 매입세액공제신고서</td><td>1차</td><td>§25.12.5</td></tr>\n<tr><td>SA-VAT-14</td><td>현금매출명세서</td><td>1차</td><td>§25.12.6</td></tr>\n<tr><td>SA-VAT-15</td><td>동물진료용역매출명세서</td><td>2차</td><td>§25.12.7, §22.2</td></tr></tbody></table></div>\n<blockquote>경계: SA-VAT-16~21(업종별 2차 잔여)·22~28·33~35는 페이즈 07, SA-VAT-29~32(수출실적 등 영세율)·36~50은 페이즈 08 담당(00_개요 §1·§5).</blockquote>\n<h3 class=\"doc-h doc-h3\">3. 업무 흐름 (End-to-End)</h3>\n<pre class=\"doc-code\"><code>[P03] 매입매출전표(과세유형 11~64) + SA-ATX 수집자료 + 증빙\n   │  과세유형 → 신고서식 라우팅(§25.4.2.2: 유형 자체/계정 기반/적요 기반 분기 3종)\n   ▼\n① 부속서류·합계표 작성 (SA-VAT-03~06, 09~14) — 불러오기(전표 자동집계) → 보정 → 마감(매출·매입 동시)\n   ▼\n② 부가가치세신고서 생성 (SA-VAT-01) — 신고구분(예정/확정/영세율조기환급/기한후)·사업장 과세단위 선택 → 자동집계 → 직접입력 항목 보정\n   ▼\n③ 신고서 마감 상태머신 (§25.11.1) — 마감 → 첨부서식 조회·전자신고여부(0/x) 지정 → MRI 60여 항목 검사(SA-VAT-02)\n   │  오류리스트 &lt;유의사항&gt;은 강제마감 가능\n   ▼\n④ (주기장=OPERATOR) 이용회사 확인(Ack)·신고 승인 (§21.4) — filingApprovalRequired=Y(기본): 신고서 요약(과세표준·세액) 송부 → Step-up 승인\n   ▼\n⑤ 전자신고 (SA-VAT-07) — 제출자등록 → 전산매체 제작(.101/.102, 비밀번호 8~15자리) → 검증 → 홈택스 제출(약 15단계 자동화)\n   │  신고상태: 제작오류/제작완료/검증오류/검증완료/제출오류/제출확인\n   ▼\n⑥ 납부서 출력 (SA-VAT-08, 2D 바코드) + 신고 완료 기간 LOCKED 전환(§11.9) + 수정신고/경정청구 분기(추가 차가감납부세액 ≥0 / &lt;0, §25.11.1 → P07 SA-VAT-27/28)</code></pre>\n<ul class=\"doc-list\">\n<li>신고유형은 예정/확정/수정/기한후 전체 + 가산세를 지원하고, 사업장 차원과 연계한 사업장별 신고/사업자단위과세 합산을 수행한다(§11.4).</li>\n<li>확정신고 시 예정신고누락분(1기 4~6월/2기 10~12월 반영)·예정신고미환급세액·예정고지세액을 처리한다(§25.11.1).</li>\n<li>매입원장 세무구분(<code>taxCategory</code>)·국세청 전송상태(<code>ntsStatus</code>)가 신고 집계의 원천이며 홈택스 수신 결과와 주기적 대사한다(§11.4-(1)).</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">3.1 과세유형 → 본 페이즈 서식 라우팅 (공통 참조, §25.4.2.2)</h4>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>유형군</th><th>대상 코드</th><th>반영 서식</th></tr></thead><tbody><tr><td>세금계산서 과세/영세</td><td>매출 11·12·25 / 매입 51·52·54·55·64</td><td>SA-VAT-01 과세·영세, SA-VAT-03</td></tr>\n<tr><td>계산서 면세</td><td>13 / 53</td><td>SA-VAT-01 면세수입금액, SA-VAT-06</td></tr>\n<tr><td>신용카드·현금영수증 매출</td><td>17·18·19·21·22·23·24</td><td>SA-VAT-01 카과/전자/현과, SA-VAT-05</td></tr>\n<tr><td>신용카드·현금영수증 매입</td><td>57·58·59·61·62·63</td><td>SA-VAT-04(4개 탭)</td></tr>\n<tr><td>건별·종합·면건</td><td>14·15·20 / 60</td><td>SA-VAT-01 기타(과세/면세)</td></tr>\n<tr><td>고정자산 분기(계정 기반)</td><td>51·57·61 + 고정자산 계정</td><td>SA-VAT-01 고정자산매입란(→P07 SA-VAT-23)</td></tr>\n<tr><td>의제매입(적요 기반)</td><td>53·58·60·62 + 원재료 계정(146/153/162) + 적요06</td><td>SA-VAT-11 (§0.4 P4, §25.12.3)</td></tr>\n<tr><td>재활용폐자원·구리스크랩(적요 기반)</td><td>53·58·60·62·51 + 적요07 / 적요 성격 '5.구리스크랩(부가)'</td><td>SA-VAT-12·13 (§25.12.4~5)</td></tr>\n<tr><td>불공제</td><td>54 + 불공제사유</td><td>SA-VAT-01 공제받지못할매입세액(→P07 SA-VAT-22)</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">4. 화면별 상세설계</h3>\n<h4 class=\"doc-h doc-h4\">4.1 부가가치세신고서 <code>SA-VAT-01</code> (1차, §25.11.1)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 일반·간이과세 사업자의 6개월 과세기간(중간 예정신고기간 포함) 부가세 신고서를 신고서 엔진으로 자동 생성. 정기/수정신고 차수 관리(정기신고 저장·마감 후 동일기간 수정신고 가능). 음식·숙박·기타서비스업은 사업장현황명세서 첨부.</li>\n<li><strong>진입경로</strong>: TN-09 부가세·신고서류 &gt; 주요 신고(§26.1).</li>\n</ul>\n<p><strong>조회조건</strong> (§25.11.1)</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>필수</th><th>설명</th></tr></thead><tbody><tr><td>기수→회계기간</td><td>코드도움</td><td>필수</td><td>기수 선택 시 과세기간 자동</td></tr>\n<tr><td>신고구분</td><td>선택(1~4)</td><td>필수</td><td>1.예정 / 2.확정 / 3.영세율조기환급 / 4.기한후</td></tr>\n<tr><td>사업장 차원</td><td>선택</td><td>필수</td><td>사업장별 / 총괄 / 사업자단위 — 과세단위 분기 키(6차원 중 사업장)</td></tr>\n<tr><td>수정신고 차수</td><td>숫자</td><td>조건부</td><td>수정신고 작성 시. 정기신고 마감 선행 필수</td></tr></tbody></table></div>\n<p><strong>입력 필드 — 신고서 본문</strong> (전 항목 §25.11.1, 세액은 과세금액×10/100 자동계산)</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>구분</th><th>항목</th><th>원천/입력 방식</th></tr></thead><tbody><tr><td>과세표준·매출세액</td><td>세금계산서발급분(과세)</td><td>11.과세 자동집계</td></tr>\n<tr><td>〃</td><td>매입자발행세금계산서</td><td>25.매세 자동집계</td></tr>\n<tr><td>〃</td><td>신용카드·현금영수증</td><td>17.카과 / 21.전자 / 22.현과 자동집계</td></tr>\n<tr><td>〃</td><td>기타과세</td><td>14.건별 / 15.종합(공급대가 반영, 일반과세자는 공급가액·세액 분리 직접입력)</td></tr>\n<tr><td>〃</td><td>영세 세금계산서발급분</td><td>12.영세 자동집계</td></tr>\n<tr><td>〃</td><td>기타영세</td><td>16.수출 / 19.카영 / 24.현영 자동집계</td></tr>\n<tr><td>예정신고누락분</td><td>매출·매입 예정누락</td><td>예정기간 유형 전표에 예정누락 대상월 입력분 → 확정신고기간(1기 4~6월/2기 10~12월) 반영</td></tr>\n<tr><td>대손세액가감</td><td>대손발생/회수</td><td>SA-VAT-24(P07) 확정신고 대손발생분 음수 자동, 회수분 양수 직접입력</td></tr>\n<tr><td>매입세액</td><td>세금계산서 수취분</td><td>51.과세/52.영세/54.불공/55.수입 — 고정자산코드 분개분은 고정자산란 별도 집계</td></tr>\n<tr><td>〃</td><td>수출기업수입납부유예</td><td>55.수입 + 수입납부유예 &quot;여&quot;</td></tr>\n<tr><td>〃</td><td>매입자발행</td><td>64.매세</td></tr>\n<tr><td>〃</td><td>그밖의공제세액(41~48)</td><td>41/42.신용매출전표수취 일반·고정(57.카과/61.현과), 43.의제매입(평창 포함), 44.재활용폐자원, 45.과세사업전환, 46.재고매입, 47.변제대손세액, 48.외국인관광객환급</td></tr>\n<tr><td>〃</td><td>공제받지못할매입세액</td><td>50.불공 직접 반영, 51.공통매입세액 면세사업, 52.대손처분받은세액</td></tr>\n<tr><td>경감·공제세액</td><td>54.전자신고세액공제</td><td>10,000원 — 확정·직접신고 시</td></tr>\n<tr><td>〃</td><td>55.전자세금발급</td><td>건당 200원, 연 100만원 한도</td></tr>\n<tr><td>〃</td><td>56.택시운송 / 57.대리납부 / 58.현금영수증사업자</td><td>항목별 입력</td></tr>\n<tr><td>〃</td><td>신용카드매출전표등 발행공제</td><td>개인 13/1000, 연 1,000만원, 직전 공급가액 10억 초과 시 불가·법인은 금액만</td></tr>\n<tr><td>그 외</td><td>예정신고미환급세액·예정고지세액·사업양수자 대리납부·매입자납부특례(금·구리·철스크랩)·신용카드업자 대리납부·가산세액계(직접입력)·총괄납부사업자 납부할세액</td><td>항목별 자동/직접입력</td></tr>\n<tr><td>과표/사업장명세</td><td>업태·종목·업종코드</td><td>회사등록 반영(P01)</td></tr>\n<tr><td>〃</td><td>과세표준명세·수입금액제외</td><td>고정자산매각 20100~25099·영업외수익 90100~93099 분개분</td></tr>\n<tr><td>〃</td><td>면세수입금액</td><td>13.면세/18.카면/20.면건/23.현면</td></tr>\n<tr><td>〃</td><td>계산서 발급/수취 명세</td><td>발급 13.면세 / 수취 53.면세</td></tr>\n<tr><td>〃</td><td>영세율상호주의 여부</td><td>선택</td></tr></tbody></table></div>\n<p><strong>기능·동작</strong> (§25.11.1)</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>기능</th><th>동작</th></tr></thead><tbody><tr><td>자동 집계</td><td>과세유형 코드(11~64)별 자동 집계를 RLS 격리된 테넌트별 부가세 집계 뷰로 수행</td></tr>\n<tr><td>과표 일치 검증</td><td>매출 합계와 과세표준명세 32.합계 일치 검증 — 불일치 시 마감·전자신고 오류</td></tr>\n<tr><td>환급계좌</td><td>환급액 5천만원 초과 시 환급계좌 미반영(입력 시 오류)</td></tr>\n<tr><td>마감 상태머신</td><td>마감 → 첨부서식 조회·전자신고여부 0/x 지정 → MRI 60여 항목 검사 실행. &lt;유의사항&gt; 오류는 강제마감 가능</td></tr>\n<tr><td>역추적</td><td>신고서 라인 → 전표내역·전표상세·작성서식내역(건수·금액·세액) 대사</td></tr>\n<tr><td>부가율</td><td>국세청 부가율 적용여부에 따라 계산식 분기(공제받지못할매입세액 차감 여부)</td></tr>\n<tr><td>수정신고</td><td>첨부서식 마감해제 후 작성. 수정전(정기신고분 자동·수정불가)/수정후 관리. 추가 차가감납부세액 ≥0 수정신고·&lt;0 경정청구 분기</td></tr>\n<tr><td>매출액보기</td><td>법인 예정신고 대상 직전기 1.5억 판정</td></tr>\n<tr><td>작성조회</td><td>마감여부·과세구분·삭제 관리</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>산출물</strong>: 전자신고 파일, 부가세 납부서(2D바코드, 법정신고일 자동), 첨부서식 일괄 인쇄/PDF, 작성조회, 매출액보기(§25.11.1).</li>\n<li><strong>연계</strong>: 매입매출전표(11~64)·세무구분 코드 카탈로그, SA-VAT-03/24/02/07/08/22, 부가세 집계 API(§25.11.1). 사업장 차원=과세단위 분기 키.</li>\n<li><strong>권한</strong>: 주기장 측 신고 생성(§11.4), 마감/전송 Step-up(§13.3), <code>filingApprovalRequired</code> 승인 게이트(§21.4).</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.2 세무리스크 자동검증(부가가치세 MRI) <code>SA-VAT-02</code> (1차, §25.11.2)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 입력 전표·부가세 신고서·부속서류를 MRI 분석엔진과 자체 DB로 심층 분석해 누락·오류·부당공제를 사전 점검하는 업무참고용 서비스(법적책임 없음). 60여 항목 검사를 전자신고 파이프라인의 사전검증(pre-validation) 단계로 수행.</li>\n<li><strong>진입경로</strong>: TN-09 &gt; 주요 신고, 또는 SA-VAT-01 마감 절차 내 &quot;MRI검사 실행하기&quot;(§25.11.2 연계).</li>\n</ul>\n<p><strong>조회조건·입력 필드</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>필수</th><th>설명</th></tr></thead><tbody><tr><td>구분(검증기간)</td><td>선택</td><td>필수</td><td>선택 후 검증시작 → 검토항목별 세부내역 조회</td></tr>\n<tr><td>기수·회계기간</td><td>코드도움</td><td>필수</td><td>BK 관점 필터</td></tr>\n<tr><td>사업장/거래처 차원</td><td>선택</td><td>선택</td><td>BK 관점 필터</td></tr>\n<tr><td>(부속) 매매기준율 조회</td><td>조회</td><td>—</td><td>서울외국환중개 기준, 토·일·공휴일 제외, 당일 20시 이후</td></tr>\n<tr><td>(부속) 사업자등록상태조회</td><td>조회</td><td>—</td><td>일반/간이/면세/폐업, 전체·매출·매입처별</td></tr>\n<tr><td>(부속) 사업자정보 진위여부확인</td><td>조회</td><td>—</td><td>거래처등록 사업자등록번호·대표자명·개업년월일 필요</td></tr></tbody></table></div>\n<p><strong>기능·동작 — 룰엔진 기반 검증 항목 카탈로그</strong> (§25.11.2)</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>검증 항목군</th><th>내용</th></tr></thead><tbody><tr><td>합계표 적정성</td><td>세금계산서합계표 적정성, 고정거래처 증빙 누락</td></tr>\n<tr><td>가산세</td><td>세금계산서 전송·예정누락 가산세</td></tr>\n<tr><td>불공제·공제 한도</td><td>접대비 불공제, 신용카드 세액공제 한도, 공통매입세액 안분, 대리운전 매입세액공제</td></tr>\n<tr><td>부속서류 누락</td><td>현금매출명세서 제출누락(SA-VAT-14), 재활용폐자원 업종·매입처·한도(SA-VAT-12)</td></tr>\n<tr><td>대손·중복</td><td>대손세액공제, 이중·중복 매입세액공제</td></tr>\n<tr><td>신고서 정합</td><td>예정미환급세액 반영, 수출실적 원화환가 적정성</td></tr>\n<tr><td>거래처 상태</td><td>거래처 휴폐업 상태(국세청 사업자상태 API), 환율 외부연계 호출</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>테넌트별 검증 결과 격리(RLS).</li>\n<li><strong>산출물</strong>: 검토 의견(권고) 리포트, 차원(사업장/거래처)별 리스크 스코어링(§25.11.2).</li>\n<li><strong>연계</strong>: SA-VAT-01 마감 절차 호출, SA-VAT-07 사전검증 단계, 국세청 사업자상태·환율 외부 API(§8.4).</li>\n<li><strong>권한</strong>: 조회성 실행 — 주기장 측 담당·검토자. 업무참고용·무책임 성격 유지(§25.11.2 충돌 조정).</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.3 세금계산서합계표 <code>SA-VAT-03</code> (1차, §25.11.3)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 매출처별·매입처별 세금계산서합계표를 예정·확정신고 시 제출. 매출 11.과세/12.영세/25.매세, 매입 51.과세/52.영세/54.불공/55.수입 전표 집계.</li>\n</ul>\n<p><strong>조회조건·입력 필드</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>필수</th><th>설명·검증</th></tr></thead><tbody><tr><td>유형</td><td>전자/전자외</td><td>필수</td><td>과세기간 종료일 다음달 11일까지 국세청 전송분=전자, 이후·종이=전자외. '국세청신고여부' 1.부 지정 가능</td></tr>\n<tr><td>구분</td><td>사업자/주민번호</td><td>필수</td><td>거래처등록 기준</td></tr>\n<tr><td>매출처·매수·공급가액·부가세</td><td>그리드</td><td>자동</td><td>전표 집계. 주류업종은 주류코드 비고 자동 반영</td></tr>\n<tr><td>단위신고</td><td>선택</td><td>조건부</td><td>지점 본점 동일 사업자번호 단위신고거래처</td></tr>\n<tr><td>수정세금계산서</td><td>차수</td><td>조건부</td><td>부가세신고서 수정차수 저장 후 매출/매입 수정전·수정후 관리</td></tr>\n<tr><td>세무구분·사업장/거래처 차원·기수 기간</td><td>필터</td><td>—</td><td>BK 관점</td></tr></tbody></table></div>\n<p><strong>기능·동작</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>기능</th><th>동작</th></tr></thead><tbody><tr><td>전송상태 판정</td><td>전자(세금)계산서 국세청 전송상태(전자/전자외) 판정 — SA-VAT-06과 공통 파이프라인</td></tr>\n<tr><td>마감</td><td>매출·매입 동시 마감. 거래처 사업자등록번호 누락·전표 불일치 시 마감화일 작성 실패</td></tr>\n<tr><td>휴폐업조회</td><td>매주 월요일 갱신</td></tr>\n<tr><td>합산</td><td>동일 사업자번호 합산</td></tr>\n<tr><td>전표추가</td><td>직접입력·엑셀업로드 → 전자외 집계, 전표전송으로 매입매출전표 생성</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>산출물</strong>: 전자신고·전산매체 제출 파일, 제출용자료조회(마감 무관 특정기간 조회·인쇄), 엑셀변환.</li>\n<li><strong>연계</strong>: 매입매출전표(11/12/25/51/52/54/55), SA-VAT-01, SA-VAT-06 공통 전송상태 판정, 휴폐업 외부 API. 신고일자=종료월 다음달 25일.</li>\n<li><strong>권한</strong>: RLS 테넌트 격리, 주기장 측 마감 권한.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.4 신용카드매출전표등 수령명세서 <code>SA-VAT-04</code> (1차, §25.11.4)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 일반과세자로부터 부가세 별도구분 신용카드매출전표 등 수취 시 매입세액공제 부속서류(57.카과/61.현과/63.복지). 세금계산서 발급불가 업종(목욕·이발·미용·여객운송·입장권) 제외.</li>\n</ul>\n<p><strong>탭별 입력 필드</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>탭</th><th>대상 유형·조건</th><th>비고</th></tr></thead><tbody><tr><td>현금영수증</td><td>61.현과, 62.현면 중 의제매입 재고자산코드 14600~17599·적요06</td><td></td></tr>\n<tr><td>화물운전자 복지카드</td><td>64.복지, 57.카과+복지카드 계정 차량유지비 매핑</td><td>복지카드 계정과목 설정 기능</td></tr>\n<tr><td>사업용신용카드</td><td>57.카과/58.카영/59.카면</td><td>법인/개인·매입카드 구분</td></tr>\n<tr><td>기타신용카드</td><td>가맹점·회원인적사항 필수</td><td>제로페이는 카드번호=주민등록번호</td></tr>\n<tr><td>합계</td><td>4개 유형 집계</td><td></td></tr></tbody></table></div>\n<p><strong>기능·동작</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>기능</th><th>동작</th></tr></thead><tbody><tr><td>증빙 유형 분류</td><td>카드 증빙(현금영수증·복지·사업용·기타) 유형 분류·의제매입 적요 연동을 증빙 메타데이터로 관리</td></tr>\n<tr><td>공제대상 룰</td><td>매입세액 공제대상 룰 테넌트별 적용(카드 VAT 공제 자동 추천 N11, §11.1.1-(16) 연계)</td></tr>\n<tr><td>불러오기</td><td>기존 삭제 후 재집계</td></tr>\n<tr><td>마감</td><td>매출·매입 동시 마감</td></tr>\n<tr><td>기타</td><td>휴폐업조회, 예정누락, 데이터 정렬</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>산출물</strong>: 신용카드수령명세서(갑)·관리용 인쇄. 카드 마스터(법인/개인·사업용 구분)·증빙 메타·기수 기간 관리.</li>\n<li><strong>연계</strong>: SA-VAT-01 41/42.신용매출전표수취(일반/고정)란, 매입매출전표(57/58/59/61/62/63/64), 휴폐업 외부 API.</li>\n<li><strong>검증</strong>: 세금계산서 수취 건 카드 공제=이중공제 차단(§15 R16, §11.1.1-(16) ④).</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.5 신용카드매출전표 발행집계표 <code>SA-VAT-05</code> (1차, §25.11.5)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 법인 제외 사업자의 신용카드·현금영수증·전자결제 발행금액 13/1000(연 500만원, 가산세 제외 납부세액 한도) 공제 부속서류 — 발행세액공제 산정 모듈.</li>\n</ul>\n<p><strong>입력 필드</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>대상·형식</th><th>설명</th></tr></thead><tbody><tr><td>과세매출분</td><td>신용/직불/선불카드 17.카과·19.카영 공급대가, 현금영수증 22.현과·24.현영</td><td>직불·기명식선불전자지급수단은 거래처 설정 &quot;여&quot;</td></tr>\n<tr><td>면세매출분</td><td>18.카면, 23.현면</td><td></td></tr>\n<tr><td>봉사료</td><td>팝업 입력</td><td>환경설정 봉사료 사용 시(§25.1.3 회계탭 ③)</td></tr>\n<tr><td>(5)합계 중 세금계산서·계산서 발급금액</td><td>동일일자 분개유형 4.카드, 다른일자 일반전표 미수금+신용카드관리 구분</td><td>구분 1.세금계산서교부분/2.영세율/3.계산서교부분</td></tr></tbody></table></div>\n<p><strong>기능·동작</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>기능</th><th>동작</th></tr></thead><tbody><tr><td>결제수단별 집계</td><td>결제수단별 공급대가 집계와 세금계산서 중복분(발급+카드결제) 차감 로직 — 결제·증빙 연계 테이블</td></tr>\n<tr><td>법인/개인 판정</td><td>법인/개인 차원 판정 적용(법인은 발행공제 불가 — SA-VAT-01 발행공제 규칙)</td></tr>\n<tr><td>불러오기</td><td>기존 삭제 후 일반전표·매입매출전표 재집계</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>산출물</strong>: 발행집계표, 발행세액공제 산정액.</li>\n<li><strong>연계</strong>: SA-VAT-01 신용카드매출전표등 발행공제 계, 매입매출전표(17/18/19/22/23/24), 일반전표(미수금).</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.6 계산서합계표 <code>SA-VAT-06</code> (1차, §25.11.6)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 면세 전자·전자외 계산서 발행·수취분(매출 13.면세, 매입 53.면세)을 사업자·주민번호 구분으로 표시. <strong>정기신고만 가능(수정신고 미지원)</strong>.</li>\n</ul>\n<p><strong>조회조건·입력 필드</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>필수</th><th>설명</th></tr></thead><tbody><tr><td>유형</td><td>전자/전자외</td><td>필수</td><td>종료일 다음달 11일 기준, 국세청신고여부 1.부</td></tr>\n<tr><td>구분</td><td>사업자/주민번호</td><td>필수</td><td></td></tr>\n<tr><td>매출·매입처별 매수·공급가액·부가세</td><td>그리드</td><td>자동</td><td></td></tr>\n<tr><td>전표추가</td><td>직접입력·엑셀업로드</td><td>—</td><td>전자외 집계</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: 전자계산서 전송상태 판정·거래처 정합성 검증을 SA-VAT-03과 공통 파이프라인으로 재사용. 휴폐업조회, 불러오기, 마감(매출·매입 동시, 사업자번호 불일치 시 실패), 합산, 제출용자료조회.</li>\n<li><strong>산출물</strong>: 전자신고·전산매체 제출 파일, 엑셀변환. 신고일자=종료월 다음달 25일.</li>\n<li><strong>연계</strong>: 매입매출전표(13/53), SA-VAT-01 면세 명세, SA-VAT-03 공통 전송상태 판정.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.7 부가가치세 전자신고 <code>SA-VAT-07</code> (1차, §25.11.7)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 부가세신고서 마감 후 홈택스 신고 전 전자파일 제작 — BK 전자신고 파이프라인의 핵심.</li>\n</ul>\n<p><strong>입력 필드</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>영역</th><th>항목</th><th>설명·검증</th></tr></thead><tbody><tr><td>제출자등록</td><td>신고구분(1.세무대리인/2.일반업체)</td><td>일반업체여야 확정신고 전자신고세액공제 1만원</td></tr>\n<tr><td>〃</td><td>전자신고 사용자ID(홈택스ID), 공통/개별ID</td><td></td></tr>\n<tr><td>〃</td><td>제출자구분·관리번호·조정반번호</td><td>일반업체는 회사등록 정보 불러오기</td></tr>\n<tr><td>데이터(전산매체)제작</td><td>기간·구분(1.정기/2.기한후/3.수정)·과세유형·신고상태·회사명·과세기간</td><td>마감기간 조회 시 마감회사 목록 표시</td></tr>\n<tr><td>〃</td><td>제작제외</td><td>마감해지 후에도 유지</td></tr>\n<tr><td>〃</td><td>홈택스자동신고·신고상태값·사용자ID</td><td></td></tr></tbody></table></div>\n<p><strong>기능·동작</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>기능</th><th>동작</th></tr></thead><tbody><tr><td>상태머신</td><td>마감→제작→검증→제출(국세청 연계). 신고상태: 제작오류/제작완료/검증오류/검증완료/제출오류/제출확인. 재마감 시 상태 공란화</td></tr>\n<tr><td>권한</td><td>총괄납부 본·지점은 지점회사 권한 필요</td></tr>\n<tr><td>파일 생성</td><td>파일 암호화·포맷(.101 일반/.102 간이) 생성, 파일명=제작일, 비밀번호 8~15자리</td></tr>\n<tr><td>홈택스 연동</td><td>홈택스 자동제출을 테넌트별 작업큐로 구현(약 15단계 자동화)</td></tr>\n<tr><td>제출자 메타</td><td>세무대리인/일반업체 메타 관리</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>산출물</strong>: 변환파일, 홈택스 자동 전자신고, 데이터조회, 첨부서류제출(세무서코드·신고유형), 자료삭제요청서, 홈택스 바로가기.</li>\n<li><strong>연계</strong>: SA-VAT-01 마감, SA-VAT-02 사전검증, 모든 첨부서식(SA-VAT-03~50), SA-VAT-20(P07 전자신고세액공제신청서), 국세청 홈택스 API.</li>\n<li><strong>권한</strong>: 신고 전송=위험 scope → Step-up(§13.3), 주기장=OPERATOR는 세무대리 수임 검증(<code>contractRef</code>)+이용회사 승인 후 전송(§21.4-(5)).</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.8 부가가치세 납부서 <code>SA-VAT-08</code> (1차, §25.11.8)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 부가세신고서 '납부서 인쇄' — 부가세 납부서 산출물 모듈.</li>\n</ul>\n<p><strong>입력 필드·검증</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>설명·검증</th></tr></thead><tbody><tr><td>납부일자</td><td>일자</td><td>법정신고일 자동·수정가능</td></tr>\n<tr><td>납부금액</td><td>금액</td><td>차가감 납부할세액 자동. 총괄납부 금액 있으면 우선 반영</td></tr>\n<tr><td>2D 바코드 필수항목</td><td>—</td><td>관할 세무서코드, 납부기한, 사업장등록번호 또는 대표자 주민번호 — 미입력 시 바코드 미반영 검증</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: 신고서 차가감세액 연동 납부서 생성·바코드 인코딩을 테넌트·사업장 차원별 제공.</li>\n<li><strong>산출물</strong>: 2D 바코드 납부서(국민·신한·우리·하나은행 자동화기기 납부).</li>\n<li><strong>연계</strong>: SA-VAT-01 차가감 납부할세액, SA-VAT-25(P07) 총괄납부 금액.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.9 부동산임대공급가액명세서 <code>SA-VAT-09</code> (1차, §25.12.1)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 부동산임대사업자의 월세·관리비·보증금 간주임대료를 계산해 과세표준으로 신고 — 간주임대료 계산기.</li>\n</ul>\n<p><strong>입력 필드</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>필수</th><th>설명·검증</th></tr></thead><tbody><tr><td>적용이자율</td><td>%</td><td>필수</td><td>국세청 고시 정기예금 이자율 자동, 변경 가능</td></tr>\n<tr><td>상호(성명)</td><td>텍스트</td><td>필수</td><td>임차인</td></tr>\n<tr><td>층</td><td>B1/1/2…</td><td>필수</td><td></td></tr>\n<tr><td>호수·동</td><td>텍스트</td><td>선택</td><td></td></tr>\n<tr><td>사업자/주민등록번호</td><td>번호</td><td>필수</td><td></td></tr>\n<tr><td>임대면적</td><td>숫자(소수점2)</td><td>선택</td><td></td></tr>\n<tr><td>용도</td><td>텍스트</td><td>선택</td><td></td></tr>\n<tr><td>임대기간</td><td>기간</td><td>필수</td><td>계약기간 — 간주임대료 계산 핵심. 누락 자료는 불러오기 불가</td></tr>\n<tr><td>보증금·월세·관리비</td><td>금액</td><td>선택</td><td></td></tr>\n<tr><td>보증금이자</td><td>금액</td><td>자동</td><td>=보증금×이자율×임대일수÷365(윤년 366)</td></tr>\n<tr><td>계(과세표준)</td><td>금액</td><td>자동</td><td></td></tr>\n<tr><td>갱신일</td><td>일자</td><td>조건부</td><td>연장·변동 시</td></tr>\n<tr><td>퇴거일</td><td>일자</td><td>자동</td><td></td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: 간주임대료 자동계산. 종료된 임대기간 포함여부 설정, 재계산. 사업자단위과세는 주(종)사업장별 작성 후 합산 조회. 전표 불러오기 시 11.과세 중 부동산임대수입금액 계정 반영. 임대물건(층/호/동)을 현장/프로젝트 차원과 연계, 이자율 마스터·일수 계산, 사업장 차원 사업자단위과세 합산.</li>\n<li><strong>산출물</strong>: 부동산임대공급가액명세서, 간주임대료 과세표준.</li>\n<li><strong>연계</strong>: 매입매출전표(11.과세 부동산임대수입), SA-VAT-01 — <strong>간주임대료는 자동반영되지 않아 14.건별 입력 후 불러오기 또는 기타 직접입력</strong>, SA-VAT-10.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.10 건물관리명세서 <code>SA-VAT-10</code> (1차, §25.12.2)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 부동산관리업(주거용 제외)의 상가·사무실 건물별 상세정보 부속서류.</li>\n</ul>\n<p><strong>입력 필드</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>설명</th></tr></thead><tbody><tr><td>건물명</td><td>텍스트</td><td>건물 마스터 — 현장 차원 연계</td></tr>\n<tr><td>도로명(법정동) 주소</td><td>주소검색</td><td>주소구분(지번/도로명)</td></tr>\n<tr><td>임대기간</td><td>기간</td><td>과세기간 중 변경분만</td></tr>\n<tr><td>데이터정렬·주민번호 별표</td><td>기능</td><td>주민번호 별표 마스킹</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: 건물 마스터를 현장 차원과 연계 관리, 자료이월(차기·다음분기 이월)을 기간 롤포워드 로직으로 구현.</li>\n<li><strong>산출물</strong>: 건물관리명세서. <strong>연계</strong>: SA-VAT-09, SA-VAT-01, 현장 차원 마스터.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.11 의제매입세액공제신고서 <code>SA-VAT-11</code> (1차, §25.12.3)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 면세 농·축·수·임산물 원재료 제조·창출 재화·용역 공급 시 의제매입세액 공제 — 의제매입세액 산정 모듈.</li>\n</ul>\n<p><strong>입력 필드 — 관리용 매입처명세 탭</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>필수</th><th>설명</th></tr></thead><tbody><tr><td>집계 대상</td><td>자동</td><td>—</td><td>53.면세/58.카면/60.면건/62.현면 + 계정 146/153/162 + 적요06(의제매입세액 원재료차감), 일반전표 거래처코드분</td></tr>\n<tr><td>공급자·주민/사업자번호·취득일자</td><td>텍스트/번호/일자</td><td>필수</td><td></td></tr>\n<tr><td>구분</td><td>선택</td><td>필수</td><td>사업자(계산서)/사업자(신용카드등)/농어민</td></tr>\n<tr><td>물품명</td><td>텍스트</td><td>필수</td><td>전자신고 필수 항목</td></tr>\n<tr><td>수량·매입가액</td><td>숫자/금액</td><td>필수</td><td></td></tr>\n<tr><td>공제율</td><td>선택</td><td>필수</td><td>2/102·6/106·4/104·기타 — 업종·법인/개인·과세유흥(552201~552206)별 차등</td></tr>\n<tr><td>의제매입세액</td><td>금액</td><td>자동</td><td>매입가액×공제율</td></tr></tbody></table></div>\n<p><strong>입력 필드 — 매입세액정산(의제) 탭</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>설명</th></tr></thead><tbody><tr><td>과세표준 불러오기</td><td>월별조기 포함</td></tr>\n<tr><td>한도율·당기매입액</td><td>한도 정산 계산</td></tr>\n<tr><td>공제대상금액·공제대상세액</td><td>자동</td></tr>\n<tr><td>이미 공제받은 세액·공제(납부)할 세액</td><td>정산</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: 면세 원재료 적요(06)·계정 연동 자동 집계, 업종·법인구분별 공제율 테이블 적용, 한도 정산 계산. 확정·폐업신고 시 매입세액정산 작성, 매입시기 집중제조업(12월 종료), 단수차이 편집, 일괄삭제, 공제율 일괄변경, 예정누락.</li>\n<li><strong>산출물</strong>: 의제매입세액공제신고서, 매입세액정산 명세.</li>\n<li><strong>연계</strong>: 매입매출전표(53/58/60/62 — 적요 기반 분기 §0.4 P4), SA-VAT-01 14.그밖의공제매입세액&gt;의제매입세액 세액란.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.12 재활용폐자원세액공제신고서 <code>SA-VAT-12</code> (1차, §25.12.4)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 재활용폐자원·중고품을 과세사업자 아닌 자로부터 취득해 제조·가공·공급 시 매입세액공제 부속서류.</li>\n</ul>\n<p><strong>입력 필드</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>설명</th></tr></thead><tbody><tr><td>관리용 매입처명세</td><td>자동집계</td><td>53.면세→2.계산서, 58.카면/60.면건/62.현면·일반전표→1.영수증, 적요07(재활용폐자원매입세액)</td></tr>\n<tr><td>종류</td><td>선택</td><td>중고자동차(501202/519111/501103)·기타재활용폐자원</td></tr>\n<tr><td>공제율</td><td>선택/직접</td><td>기타 3/103, 중고차 10/110, 기타 직접입력</td></tr>\n<tr><td>차량·차대번호</td><td>텍스트</td><td>중고차 10/110 시(환경설정 중고차량/차대번호 관리 §25.1.3 ⑥)</td></tr>\n<tr><td>매입세액정산</td><td>자동/직접</td><td>매출액·당기매입액 (14)세금계산서=51.과세+적요07·(15)영수증, 중고차 제외</td></tr>\n<tr><td>분개내역</td><td>그리드</td><td>전표전송</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: 중고차/기타 종류별 공제율 적용, 차대번호 관리, 매입세액정산. 신고용 단수차이 편집, 구리스크랩 불러오기 합산, 전기작성 3개년 반영, 매입처명세 복사, 엑셀 업로드, 전표전송 파이프라인(전표 역전송).</li>\n<li><strong>산출물</strong>: 재활용폐자원세액공제신고서, 분개내역.</li>\n<li><strong>연계</strong>: 매입매출전표(53/58/60/62/51+적요07), SA-VAT-13(합산), SA-VAT-01 44.재활용폐자원등매입세액. MRI 재활용폐자원 업종·매입처·한도 검토(§25.11.2).</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.13 구리스크랩등 매입세액공제신고서 <code>SA-VAT-13</code> (1차, §25.12.5)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 사업자(간이 포함) 간 구리스크랩 등 거래의 매입세액공제(매입자 납부특례 조특법 106조의9, 지정 금융기관 전용계좌 입금→국고 납입) — 재활용폐자원과 공통 처리.</li>\n</ul>\n<p><strong>입력 필드</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>설명</th></tr></thead><tbody><tr><td>구분</td><td>선택</td><td>계산서(53.면세)/영수증(58.카면·60.면건·62.현면·일반전표)</td></tr>\n<tr><td>전표 출처</td><td>선택</td><td>매입/일반/입력</td></tr>\n<tr><td>불러오기 기준</td><td>설정</td><td>계정과목 / 적요 비고(성격) '5.구리스크랩(부가)' 재고자산 146~175</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: 적요 성격(5.구리스크랩) 기반 집계, 매입자 납부특례를 증빙 메타로 관리. 예정누락, 공제율 일괄변경, 주민번호 별표.</li>\n<li><strong>산출물</strong>: 구리스크랩등 매입세액공제신고서, 매입처명세(합산용).</li>\n<li><strong>연계</strong>: SA-VAT-12 '구리스크랩 불러오기'로 합산 → SA-VAT-01 44.재활용폐자원등매입세액.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.14 현금매출명세서 <code>SA-VAT-14</code> (1차, §25.12.6)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 예식장·부동산중개·보건(병·의원)·변호사·세무사·회계사 등 전문서비스업의 현금매출 부속서류.</li>\n</ul>\n<p><strong>입력 필드</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>필수</th><th>설명</th></tr></thead><tbody><tr><td>구분</td><td>선택</td><td>필수</td><td>현금매출사업자</td></tr>\n<tr><td>주민/사업자등록번호</td><td>번호</td><td>필수</td><td></td></tr>\n<tr><td>성명(상호)</td><td>텍스트</td><td>필수</td><td></td></tr>\n<tr><td>거래일자</td><td>일자</td><td>필수</td><td></td></tr>\n<tr><td>거래금액</td><td>금액</td><td>필수</td><td>공급가액 입력 시 부가세·공급대가 자동</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>주민번호 기재 세금계산서 발급분(부가세법 32조1항2호)은 현금매출란에 포함.</li>\n<li><strong>기능</strong>: 제출대상 업종코드 마스터와 현금매출 계정 매핑을 테넌트별 관리. 편집(건수·합계), 일괄삭제, 불러오기(계정 202~230/401~420/901~930 또는 과세유형별), 예정누락, 제출업종안내, 엑셀.</li>\n<li><strong>산출물</strong>: 현금매출명세서. <strong>연계</strong>: SA-VAT-01 첨부, SA-VAT-02 현금매출명세서 제출누락 검토.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.15 동물진료용역매출명세서 <code>SA-VAT-15</code> (2차, §25.12.7)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 동물진료용역 제공 사업자 부속서류. 가축·수산동물·장애인보조견·기초수급자 동물진료·질병예방목적 진료는 부가세 적용배제 대상.</li>\n</ul>\n<p><strong>입력 필드</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>설명</th></tr></thead><tbody><tr><td>구분</td><td>선택(5구분)</td><td>가축/수산동물/장애인보조견/기초수급자/질병예방</td></tr>\n<tr><td>계정과목 설정</td><td>코드도움</td><td>구분별 계정과목 설정 후 불러오기</td></tr>\n<tr><td>불러오기 대상</td><td>자동</td><td>매출유형 13.면세/18.카면/20.면건/23.현면</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: 진료유형별 계정 매핑과 면세 전표 집계를 테넌트별 구현, 구분별 자동 분류.</li>\n<li><strong>산출물</strong>: 동물진료용역매출명세서. <strong>연계</strong>: 매입매출전표(13/18/20/23), SA-VAT-01.</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">5. 데이터 모델</h3>\n<blockquote>엔티티 명칭 중 § 근거 표기가 있는 필드·상태는 설계서 명시값이며, 신고서 헤더 등 구조 명칭은 §25.11의 화면 기능(작성조회·차수·마감)을 본 페이즈에서 구체화한 것이다.</blockquote>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>엔티티</th><th>핵심 필드</th><th>PK/유니크·상태</th><th>근거</th></tr></thead><tbody><tr><td><code>VatReturn</code>(부가세신고서)</td><td>tenantId, fiscalYear, taxPeriodFrom/To, filingType(1.예정/2.확정/3.영세율조기환급/4.기한후), taxUnit(사업장별/총괄/사업자단위), businessPlaceId, amendmentSeq(수정차수), status(작성중→마감), eFilingFlag(전자신고여부 0/x), forcedCloseFlag(&lt;유의사항&gt; 강제마감), refundAccountRef</td><td>UQ(tenantId, 과세기간, filingType, taxUnit, amendmentSeq). 정기신고 마감 선행 후 수정신고</td><td>§25.11.1</td></tr>\n<tr><td><code>VatReturnLine</code></td><td>returnId, lineCode(신고서식 란번호 11~48·50~58 등), taxBase(과표), taxAmount(세액), sourceType(자동집계/직접입력), 수정전/수정후 구분</td><td>수정전=정기신고분 자동·수정불가</td><td>§25.11.1</td></tr>\n<tr><td><code>VatAttachmentForm</code>(부속서류 공통 헤더)</td><td>tenantId, returnId, formType(SA-VAT-03~15…), status(작성/마감), closedAt, 매출·매입 동시 마감 플래그</td><td>마감 시 거래처 사업자번호 정합 검증</td><td>§25.11.3, §25.11.6</td></tr>\n<tr><td><code>ElectronicFilingJob</code>(전자신고)</td><td>returnId, jobType(정기/기한후/수정), fileFormat(.101/.102), fileName(제작일), filePassword(8~15자리), status(제작오류/제작완료/검증오류/검증완료/제출오류/제출확인), excludeFlag(제작제외 — 마감해지 후 유지), hometaxAutoFlag</td><td>재마감 시 상태 공란화. 멱등 작업큐</td><td>§25.11.7</td></tr>\n<tr><td><code>FilingSubmitterProfile</code>(제출자등록)</td><td>tenantId, submitterType(1.세무대리인/2.일반업체), hometaxUserId(공통/개별), 제출자구분·관리번호·조정반번호</td><td>일반업체=회사등록 불러오기</td><td>§25.11.7</td></tr>\n<tr><td><code>tax_type_master</code></td><td>과세유형 코드(매출 11~25/매입 51~64), 세율, 부가세계정, 신고서식 매핑, 전자발행 가능, 증빙요건</td><td>단일 진실원</td><td>§0.4 P2, §25.4.2.2</td></tr>\n<tr><td><code>PurchaseLedgerLine</code>(매입원장)</td><td>postingDate, journalEntryId/LineId, vendorId, businessRegistrationNo, taxCategory(세무구분), reasonCode, supplyAmount, vatAmount, grossAmount, deductibleType, businessPlaceId, evidenceId, taxInvoiceId, ntsStatus, evidenceStatus, sourceSystem</td><td>ntsStatus 8종: NOT_TARGET/PENDING/ISSUED/SENT/ACCEPTED/REJECTED/CANCELLED/MANUAL_EVIDENCE</td><td>§11.4-(1)(2)</td></tr>\n<tr><td><code>TaxInvoiceTransmission</code></td><td>taxInvoiceId, ntsStatus, sentAt, acceptedAt, rejectedReason, sourceRef</td><td>전자/전자외 판정 원천</td><td>§11.4-(2)</td></tr>\n<tr><td><code>PurchaseTaxStatusHistory</code></td><td>lineId, beforeStatus, afterStatus, changedBy, reason</td><td>append-only</td><td>§11.4-(2)</td></tr>\n<tr><td><code>DeemedInputEntry</code>(의제매입 명세)</td><td>공급자, 사업자/주민번호, 취득일자, 구분(계산서/신용카드등/농어민), 물품명, 수량, 매입가액, 공제율, 의제매입세액</td><td>정산: 한도율·당기매입액·기공제세액</td><td>§25.12.3</td></tr>\n<tr><td><code>RecycledWasteEntry</code>(재활용/구리스크랩)</td><td>구분(계산서/영수증), 종류(중고차/기타), 공제율(3/103·10/110·직접), 차량·차대번호, 매입자납부특례 표시</td><td>구리스크랩 합산 플래그</td><td>§25.12.4~5</td></tr>\n<tr><td><code>RealEstateRentalUnit</code>(임대물건)</td><td>상호, 층·호수·동, 사업자/주민번호, 임대면적, 용도, 임대기간, 보증금·월세·관리비, 적용이자율, 보증금이자(자동), 갱신일·퇴거일</td><td>현장/프로젝트 차원 연계</td><td>§25.12.1</td></tr>\n<tr><td><code>TenantAcknowledgement</code>(신고 승인/확인)</td><td>대상(마감/신고), status(PENDING→CONFIRMED/OBJECTED), 사유</td><td>ackPolicy=REQUIRED 시 후속 차단</td><td>§21.4-(4), §12.2</td></tr>\n<tr><td><code>FiscalPeriod</code>(기간 상태)</td><td>상태: FUTURE→OPEN→TEMP_CLOSED→CLOSED→<strong>LOCKED(신고 완료·아카이브, 마감해제 불가)</strong></td><td>수정신고 절차로만 대응</td><td>§11.9-(1)(3)</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>신고파일 상태 5종 등 기타 상태값은 부록 B 13.4·부록 C 14.5 준용(§12.2).</li>\n<li>테이블 공통 제약(tenant_id NOT NULL+RLS, 감사 필드, 물리 삭제 금지)은 00_개요 §3.</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">6. API 설계</h3>\n<blockquote><code>POST /api/tenant/filings/{id}/approve</code>는 §13.2 명시 엔드포인트, 나머지는 §25.11의 기능(부가세 집계 API·마감·제작·검증·제출)을 REST로 구체화한 대표 설계다. <code>VatService</code>·<code>TaxInvoiceService</code>는 §13.1(부록 B 14.1·부록 C 15장 준용 + 주기장 권한 검증 공통 인터셉터).</blockquote>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>메서드</th><th>엔드포인트</th><th>설명</th><th>멱등성·오류</th></tr></thead><tbody><tr><td>GET</td><td><code>/api/tenant/vat/returns?fiscalYear&amp;period&amp;filingType&amp;taxUnit&amp;amendmentSeq</code></td><td>신고서 조회(작성조회: 마감여부·과세구분)</td><td>—</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/returns</code></td><td>신고서 생성(과세유형 11~64 자동집계 — 부가세 집계 API, §25.11.1)</td><td>Idempotency-Key</td></tr>\n<tr><td>PUT</td><td><code>/api/tenant/vat/returns/{id}</code></td><td>직접입력 항목 보정(가산세·예정고지 등)</td><td>version 낙관적 락</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/returns/{id}/close</code></td><td>마감(32.합계 일치·환급계좌 검증 → 첨부서식·전자신고여부 지정)</td><td><code>VALIDATION_FAILED</code>, 강제마감 파라미터(&lt;유의사항&gt;만)</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/returns/{id}/mri-check</code></td><td>MRI 60여 항목 검사 실행(SA-VAT-02)</td><td>결과 리포트·리스크 스코어</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/returns/{id}/amend</code></td><td>수정신고 차수 생성(첨부서식 마감해제 선행, ≥0/&lt;0 분기)</td><td>정기신고 마감 선행 검증</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/attachments/{formType}/load</code></td><td>부속서류 불러오기(기존 삭제 후 재집계 — SA-VAT-04/05 등)</td><td>Idempotency-Key</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/attachments/{formType}/close</code></td><td>부속서류 마감(매출·매입 동시)</td><td>사업자번호 누락 시 실패</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/filings/{id}/approve</code></td><td><strong>신고 전송 전 이용회사 승인(Step-up)</strong></td><td>§13.2 명시. <code>FORBIDDEN_SCOPE</code></td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/filings/{id}/build</code></td><td>전산매체 제작(.101/.102, 비밀번호)</td><td>신고상태 갱신, 멱등 재처리</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/filings/{id}/validate</code></td><td>파일 검증</td><td>검증오류/검증완료</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/filings/{id}/submit</code></td><td>홈택스 제출(자동 전자신고)</td><td>Idempotency-Key, <code>EXTERNAL_INTEGRATION_FAILED</code></td></tr>\n<tr><td>GET</td><td><code>/api/tenant/vat/payment-slip/{returnId}</code></td><td>납부서 생성(2D 바코드)</td><td>바코드 필수항목 검증</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>오류코드</strong>(§13.3): <code>VALIDATION_FAILED</code>, <code>CLOSING_LOCKED</code>, <code>PERIOD_LOCKED</code>(신고 완료 기간 마감해제 불가), <code>NOT_PRIMARY_BOOKKEEPER</code>(비주기장 신고 시도), <code>BOOKKEEPING_NOT_CONTRACTED</code>, <code>IDEMPOTENCY_CONFLICT</code>(409), <code>EXTERNAL_INTEGRATION_FAILED</code>, <code>RATE_LIMITED</code>.</li>\n<li><strong>Scope</strong>(§13.3): <code>tenant:filing:approve</code>(이용회사 승인), 신고 전송·마감해제·평문 조회 등 위험 scope는 Step-up 인증 필수.</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">7. 배치 / 스케줄</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>배치</th><th>주기·트리거</th><th>내용</th><th>실패 처리</th><th>근거</th></tr></thead><tbody><tr><td>신고 집계 잡</td><td>신고기 월 정기/수동</td><td>과세유형별 부가세 집계 뷰 갱신</td><td>멱등·재처리·실패 알림</td><td>§14 회사 배치</td></tr>\n<tr><td>매입원장 세무상태/NTS 대사 잡</td><td>주기적</td><td><code>ntsStatus</code> ↔ 홈택스/국세청 수신 결과 대사(8.4)</td><td>REJECTED/PENDING 마감 체크리스트 표시</td><td>§14, §11.4-(1)</td></tr>\n<tr><td>전자세금계산서 수신 잡</td><td>정기</td><td>국세청 수신분 반영 → 전자/전자외 판정 원천</td><td>멱등</td><td>§14</td></tr>\n<tr><td>신고기한 알림(D-N) 잡</td><td>D-N 규칙</td><td>부가세 신고 기한 D-N 자동 발송(<code>NotificationSchedule</code>), 세무 일정은 세법 룰 마스터(6장) 버전 연동. SMS/알림톡=신고 D-day 긴급 채널</td><td>DLQ+운영 콘솔</td><td>§14, §18.1</td></tr>\n<tr><td>휴폐업 상태 갱신</td><td>매주 월요일</td><td>거래처 휴폐업조회 갱신(SA-VAT-03/04/06)</td><td>재시도</td><td>§25.11.3</td></tr>\n<tr><td>확인(Ack) 리마인드 잡</td><td>D+3/D+7</td><td><code>PENDING</code> 신고 승인·확인 리마인드, 장기 미확인 에스컬레이션</td><td>에스컬레이션</td><td>§14 기장 운영 배치</td></tr>\n<tr><td>환율(매매기준율) 동기화</td><td>일별(20시 이후)</td><td>서울외국환중개 기준, 토·일·공휴일 제외 — MRI 부속 조회 원천</td><td>재시도</td><td>§25.11.2, §14</td></tr>\n<tr><td>홈택스 자동제출 작업큐</td><td>이벤트</td><td>테넌트별 작업큐로 제출(약 15단계 자동화)</td><td>제출오류 상태·재처리</td><td>§25.11.7</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">8. 검증·오류 처리</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>검증 항목</th><th>차단/경고</th><th>근거</th></tr></thead><tbody><tr><td>1</td><td>매출 합계 ↔ 과세표준명세 32.합계 불일치</td><td>차단(마감·전자신고 오류)</td><td>§25.11.1</td></tr>\n<tr><td>2</td><td>환급액 5천만원 초과 시 환급계좌 입력</td><td>차단(입력 시 오류)</td><td>§25.11.1</td></tr>\n<tr><td>3</td><td>MRI 오류리스트 &lt;유의사항&gt;</td><td>경고(강제마감 가능), 그 외 오류는 차단</td><td>§25.11.1</td></tr>\n<tr><td>4</td><td>수정신고 작성 시 정기신고 미마감</td><td>차단(정기신고 저장·마감 선행)</td><td>§25.11.1</td></tr>\n<tr><td>5</td><td>합계표 마감 시 거래처 사업자등록번호 누락·전표 불일치</td><td>차단(마감화일 작성 실패)</td><td>§25.11.3, §25.11.6</td></tr>\n<tr><td>6</td><td>세금계산서 수취 건의 카드 매입세액 공제(이중공제)</td><td>차단</td><td>§15 R16, §11.1.1-(16)</td></tr>\n<tr><td>7</td><td>동일 카드승인건 다중 전표 연결</td><td>차단(증빙 중복 사용 방지)</td><td>§15 R16</td></tr>\n<tr><td>8</td><td>매출 세금계산서(11) 발급 후 카드매출(17) 추가 입력</td><td>차단(중복 신고 방지 — 결제수단만 분개)</td><td>§25.4.2.2</td></tr>\n<tr><td>9</td><td>매입원장 세무구분·증빙유형 불일치</td><td><code>REVIEW_REQUIRED</code> + 신고 집계 경고/차단(회사 정책), 미결항목 생성 가능</td><td>§15, §11.4</td></tr>\n<tr><td>10</td><td>국세청 전송상태 <code>REJECTED</code>/미수신</td><td>마감 체크리스트 표시, 전자세금계산서 필수 거래는 마감 차단 가능</td><td>§15, §11.4</td></tr>\n<tr><td>11</td><td>부가세 계정-부가세코드 불일치</td><td>경고(세무헤더 대조)</td><td>§15</td></tr>\n<tr><td>12</td><td>2D 바코드 필수항목(세무서코드·납부기한·사업장등록번호/주민번호) 미입력</td><td>바코드 미반영</td><td>§25.11.8</td></tr>\n<tr><td>13</td><td>임대기간 누락 자료 불러오기</td><td>차단(불러오기 불가)</td><td>§25.12.1</td></tr>\n<tr><td>14</td><td>의제매입 물품명 미입력</td><td>전자신고 필수 — 제작 오류</td><td>§25.12.3</td></tr>\n<tr><td>15</td><td>예정누락 입력월 오류(확정기간 외 월)</td><td>차단(1~3·7~9월만 허용)</td><td>§25.4.2.2</td></tr>\n<tr><td>16</td><td>비주기장 측 신고 시도</td><td>차단 <code>NOT_PRIMARY_BOOKKEEPER</code></td><td>§15, §21.1</td></tr>\n<tr><td>17</td><td>Ack 미완료/이의 미해소 상태 신고 생성</td><td><code>ackPolicy=REQUIRED</code> 시 차단</td><td>§15, §21.4</td></tr>\n<tr><td>18</td><td>신고 승인 누락·미수임 전송</td><td><code>filingApprovalRequired=Y</code> 시 승인 전 전송 차단, 주기장=OPERATOR 미수임 시 전송 차단</td><td>§15, §21.4-(5)</td></tr>\n<tr><td>19</td><td><code>LOCKED</code> 기간 마감해제 시도</td><td>차단(수정신고 절차 안내), 시도 감사로그</td><td>§15, §11.9</td></tr>\n<tr><td>20</td><td>멱등키 충돌(제작·제출 재호출)</td><td>409 <code>IDEMPOTENCY_CONFLICT</code></td><td>§15, §13.3</td></tr>\n<tr><td>21</td><td>적격증빙 미충족 거래</td><td>가산세 대상 플래그, 세무조정 검토 목록</td><td>§15</td></tr>\n<tr><td>22</td><td>농어업기자재 등 마감 후 수정</td><td>마감 후 수정불가 패턴(부속서류 공통)</td><td>§25.12.10</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">9. 권한·SOD·감사</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>화면/행위</th><th>역할·scope</th><th>통제</th><th>근거</th></tr></thead><tbody><tr><td>신고서 생성·마감(SA-VAT-01)</td><td>주기장 측 담당(BK_PREPARER/이용회사 세무담당)</td><td>마감·결산·신고 서비스에 주기장 권한 검증 공통 인터셉터</td><td>§11.4, §13.1</td></tr>\n<tr><td>신고 승인</td><td>이용회사 승인자 <code>tenant:filing:approve</code></td><td><code>filingApprovalRequired=Y</code>(기본): 요약(과세표준·세액) 송부 → <strong>Step-up 승인</strong> → 전송. 승인 이력은 신고 감사로그+<code>bookkeepingMode</code> 표식</td><td>§21.4-(5), §13.3</td></tr>\n<tr><td>전자신고 전송(SA-VAT-07)</td><td>주기장 측. 주기장=OPERATOR는 세무대리 수임(<code>contractRef</code>) 검증</td><td>위험 scope Step-up, 미수임 전송 차단</td><td>§21.4-(5), §13.3</td></tr>\n<tr><td>총괄납부 본·지점 제작</td><td>지점회사 권한 필요</td><td>사업장 차원 RLS로 지점 데이터 접근 제어</td><td>§25.11.7, §25.13.4</td></tr>\n<tr><td>SOD</td><td>작성≠승인(신고서 작성자와 승인자 분리)</td><td>기장 Role-거버넌스 승인자 겸직 차단</td><td>00_개요 §3, §4.5</td></tr>\n<tr><td>감사</td><td>신고서 CUD·마감·강제마감·전송·승인 <code>DataChangeLog</code> append-only, 전후값·IP·행위자</td><td>신고 전송 화면은 주기장=OPERATOR면 요약+전송 승인 버튼 중심 재구성</td><td>§17, §21.8</td></tr>\n<tr><td>마스킹</td><td>주민번호 별표(SA-VAT-1 div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>구분</th><th>시나리오</th></tr></thead><tbody><tr><td>집계 정확성</td><td>과세유형별 전표 → 신고서 란 매핑 전수(11~25/51~64), 고정자산·의제(적요06)·재활용(적요07) 분기 3종(§0.4 P2~P4)</td></tr>\n<tr><td>마감 상태머신</td><td>마감→첨부서식→MRI→강제마감→재마감 시 전자신고 상태 공란화(§25.11.7)</td></tr>\n<tr><td>수정신고</td><td>정기 마감 후 차수 생성, 수정전 자동·수정불가, ≥0/&lt;0 분기</td></tr>\n<tr><td>합계표 정합</td><td>전자/전자외 판정(다음달 11일 기준), 사업자번호 누락 마감 실패, 매출·매입 동시 마감</td></tr>\n<tr><td>발행공제</td><td>개인 13/1000·법인 제외, 세금계산서 발급+카드결제 중복 차감(SA-VAT-05)</td></tr>\n<tr><td>간주임대료</td><td>보증금×이자율×임대일수÷365(윤년 366), 임대기간 경계일</td></tr>\n<tr><td>의제매입 한도</td><td>공제율 차등(2/102·6/106·4/104)·한도 정산·예정누락</td></tr>\n<tr><td>통제</td><td>비주기장 시도, 미수임 전송, Ack 미완료, Step-up 미수행, RLS 교차 테넌트</td></tr>\n<tr><td>외부연계</td><td>홈택스 제출 실패 재처리(멱등), 휴폐업 API 장애 시 우회</td></tr>\n<tr><td>성능</td><td>신고 성수기(1월·부가세 신고월) 대량 집계 — 무중단·자동 스케일(§15 하단)</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">12. 잔여 확인사항 (§23 연계)</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>§23 번호</th><th>항목</th><th>본 페이즈 영향</th></tr></thead><tbody><tr><td>19</td><td>마감 정책: <code>LOCKED</code> 전환 조건(신고 완료 기준)</td><td>신고 완료 시점(제출확인 vs 승인) 정의 필요</td></tr>\n<tr><td>24</td><td>기장 수임 법적 검토: 세무대리인 자격·수임 범위(기장 대리 vs 신고 대리)</td><td>SA-VAT-07 전송 허용 조건</td></tr>\n<tr><td>25</td><td>신고 승인 정책: <code>filingApprovalRequired</code> 기본값(Y) 유지, 이용회사 무응답 시 처리(기한 임박 에스컬레이션 vs 전송 보류)</td><td>승인 게이트 UX·배치</td></tr>\n<tr><td>28</td><td>성수기(1월·부가세 신고월) 담당자 배정 가중치</td><td>워크벤치·처리량 계획</td></tr>\n<tr><td>43</td><td>매입원장 세무상태: NTS 코드↔홈택스 응답코드 매핑, REJECTED/미수신 마감 차단 여부</td><td>SA-VAT-03/06 전송상태 판정·마감 정책</td></tr>\n<tr><td>52</td><td>일자 데이터 모델: VAT 신고 기준일 적용 규칙(증빙일자 vs 세무귀속일)</td><td>집계 귀속 판정</td></tr>\n<tr><td>55</td><td>카드 VAT 공제 Rule 설계(N11)</td><td>SA-VAT-04 공제대상 룰 파라미터</td></tr></tbody></table></div>"},"hasJournalImpl":false,"journalImplRel":"../화면설계/구현_화면_전표_v1.1.html"};
function el(tag, cls, text){ const n=document.createElement(tag); if(cls)n.className=cls; if(text!==undefined)n.textContent=text; return n; }
function setHtml(node, html){ node.innerHTML = html || ''; return node; }
function phaseBadge(phase){ return phase==='1차'?'badge b-new':phase==='2차'?'badge b-gray':phase==='3차'?'badge b-warn':'badge b-ref'; }
function kindClass(kind){ return kind==='error'?'errormsg':kind==='warn'?'warnmsg':'okmsg'; }
function money(i){ return (i*1375000 + 12000000).toLocaleString('ko-KR'); }
function stripHtml(html){ const d=document.createElement('div'); d.innerHTML=html||''; return d.textContent.replace(/\s+/g,' ').trim(); }
function makeTable(cols, rows){
  const table=el('table','grid'); const head=document.createElement('tr'); cols.forEach(c=>head.appendChild(el('th','',c))); table.appendChild(head);
  rows.forEach((row,i)=>{ const tr=document.createElement('tr'); if(i===0)tr.className='sel'; row.forEach((cell,idx)=>{ const td=el('td','',cell); if(idx>1 && /[0-9,]/.test(String(cell)))td.className='num'; if(/차단|경고|불일치|오류|불가|미통과/.test(String(cell)))td.className=(td.className+' red').trim(); if(/정상|완료|확정|일치/.test(String(cell)))td.className=(td.className+' ok').trim(); tr.appendChild(td); }); table.appendChild(tr); });
  return table;
}
function tabsFor(screen){
  const raw = (screen.tabs || '').replace(/<br>/g,'/').split(/[\/·,]/).map(s=>s.trim()).filter(Boolean);
  if(raw.length >= 2) return raw.slice(0,5);

  const mock=el('div','mock'); mock.appendChild(el('div','mock-cap','페이즈 전체 원문 · 데이터 모델 · API · 검증 · 완료 기준 포함'));
  const tabs=el('div','ref-tabs'); ['개요/흐름','데이터/API','검증/완료','전체 원문'].forEach((t,i)=>tabs.appendChild(el('span','ref-tab'+(i===0?' on':''),t))); mock.appendChild(tabs);
  [model.docs.overview+model.docs.flow, model.docs.dataModel+model.docs.api, model.docs.validation+model.docs.done, model.docs.full].forEach((html,i)=>{ const p=el('div','ref-panel'+(i===0?' on':'')); const pane=el('div','doc-pane'); setHtml(pane,html); p.appendChild(pane); mock.appendChild(p); });
  sec.appendChild(mock); return sec;
}
function renderJournalImpl(){
  if(!model.hasJournalImpl) return null;
  const sec=el('section','section'); sec.id='journal-impl-v11';
  const title=el('div','page-title'); title.appendChild(el('h1','','전표 구현설계 v1.1 전체')); title.appendChild(el('span','chip-id','WJV-01~09')); title.appendChild(el('span','badge b-new','원본 포함')); sec.appendChild(title);
  sec.appendChild(el('div','crumb','설계/화면설계/구현_화면_전표_v1.1.html 전체 화면을 페이즈03 안에서 표시'));
  const iframe=document.createElement('iframe'); iframe.className='impl-frame'; iframe.src=model.journalImplRel; sec.appendChild(iframe);
  const d=el('div','screen-details'); d.appendChild(el('div','sd-title','적용 설명')); const pane=el('div','doc-pane'); pane.innerHTML='<p>이 영역은 전표 v1.1 화면설계 원본 전체를 그대로 참조합니다. SA-JNL-01 일반전표입력 화면의 WJV-01 구조와 WJV-02~09 보조 화면, 전표조회/반복/자동전표/승인/역분개/설정 화면을 함께 확인할 수 있습니다.</p>'; d.appendChild(pane); sec.appendChild(d);
  return sec;
}
function buildMenu(){
  const nav=document.getElementById('menu');
  if(model.hasJournalImpl){ const a=el('a','mitem','전표 구현설계 v1.1'); a.setAttribute('data-sec','journal-impl-v11'); a.setAttribute('style','padding-left:16px;font-weight:700'); a.appendChild(el('span','mid','HTML')); nav.appendChild(a); }
  const groups=model.screens.reduce((a,s)=>{(a[s.group]=a[s.group]||[]).push(s);return a;},{});
  Object.entries(groups).forEach(([g,arr],idx)=>{ const mg=el('div','mgroup'+(idx%2?' plain':'')); const gt=el('div','gtitle'); gt.appendChild(el('span','bar')); gt.appendChild(document.createTextNode(g)); mg.appendChild(gt); arr.forEach(s=>{ const a=el('a','mitem',s.title); a.setAttribute('data-sec',s.sid); a.appendChild(el('span','mid',s.id.replace('SA-',''))); mg.appendChild(a); }); nav.appendChild(mg); });
}
function wire(){
  document.querySelectorAll('.mitem').forEach(mi=>mi.addEventListener('click',()=>{ document.querySelectorAll('.mitem').forEach(x=>x.classList.remove('active')); mi.classList.add('active'); const id=mi.getAttribute('data-sec'); document.querySelectorAll('.section').forEach(s=>s.classList.remove('visible')); const t=document.getElementById(id); if(t){t.classList.add('visible'); window.scrollTo({top:0});} }));
  document.querySelectorAll('.ref-tabs').forEach(bar=>{ const tabs=[...bar.querySelectorAll('.ref-tab')]; const panels=[]; let n=bar.nextElementSibling; while(n&&n.classList.contains('ref-panel')){panels.push(n); n=n.nextElementSibling;} tabs.forEach((tab,i)=>tab.addEventListener('click',()=>{tabs.forEach(t=>t.classList.remove('on')); panels.forEach(p=>p.classList.remove('on')); tab.classList.add('on'); if(panels[i])panels[i].classList.add('on');})); });
}
const content=document.getElementById('content'); buildMenu(); content.appendChild(renderHome()); content.appendChild(renderPhaseDoc()); const j=renderJournalImpl(); if(j)content.appendChild(j); model.screens.forEach(s=>content.appendChild(renderScreen(s))); wire();
</script>
