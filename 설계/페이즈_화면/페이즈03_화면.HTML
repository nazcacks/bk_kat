행정보, 복수거래 99개·0원 세금계산서, 더보기 22항목, 홈택스 엑셀 업로드(중복 방지 포함), 채번 50001~ 분리.</p>\n<p>3. SA-ATX: 자격증명 볼트(암호화) 등록→매일 수집(비동기 큐·멱등)→증빙별 스테이징·추천(신뢰도 음영)→오류검증→전표상태 6종 라이프사이클→라우팅 전송→ATX-07/08 현황→ATX-09 3원 대조 '○/X'.</p>\n<p>4. R1~R17 전 항목이 화면·API·검증에 반영(Phase 표기 항목은 §0.6 기준 — R2 자동분개 추천 AI 연계·R5·R10·R16 자동판정 등 Phase 2 요소는 토글/스텁 포함 후 차기 고도화).</p>\n<h4 class=\"doc-h doc-h4\">11.2 테스트 관점</h4>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>관점</th><th>시나리오 예</th></tr></thead><tbody><tr><td>채번 동시성</td><td>동일 일자 동시 입력 N건 → 결번 없는 연속 채번, <code>NUMBERING_CONFLICT</code> 재시도. 전표이동 시 재채번·마감 일자 차단</td></tr>\n<tr><td>차대·간편입력</td><td>현금 위치 자동 입/출금 판별, 간편입력 부적격 계정(<code>QUICK_ENTRY_INVALID_ACCOUNT</code>), 외화 통화별 균형</td></tr>\n<tr><td>상태머신</td><td>DRAFT→…→CLOSED 전 전이 + REJECTED/REVERSED/CANCELLED, POSTED 직접 수정 차단, 낙관적 락 충돌</td></tr>\n<tr><td>승인 옵션</td><td>REQUIRED/OPTIONAL/NONE 별 채번·기표 시점, NONE에서도 감사로그·중복검증 유지</td></tr>\n<tr><td>과세유형</td><td>유형별 자동라인·라우팅(고정자산 분기, 의제 3조건, 불공 54 원가 포함), 상·하단 차액 신고서 반영, 매출 이중신고 방지(11 후 17 금지)</td></tr>\n<tr><td>자동전표</td><td>원천키 멱등(재수집 중복 0건), 중복전표 원천별 기준, 체크카드 확정제외, 통장 1건=1전표 입금/출금, 송금수수료 차감 우선순위</td></tr>\n<tr><td>3원 대조</td><td>전표·수집·홈택스 일치/차액, 종이(전자 공란) 제외</td></tr>\n<tr><td>기장 모드</td><td>OPERATOR_LED 입력 차단/REQUEST_ONLY, CLIENT_SUBMITTED→REVIEWING 검토 보정 이력, HYBRID owner 위반·<code>DUP_CROSS_PARTY</code></td></tr>\n<tr><td>성능</td><td>대량 그리드 가상 스크롤·키보드 주도(§16.2), 수집 워커 분리로 API 무영향(§8.4), 파티셔닝 조회</td></tr>\n<tr><td>감사</td><td>전 CUD <code>DataChangeLog</code> 전후값, 행위자 표식, 결번 리포트</td></tr></tbody></table></div>\n<p>---</p>\n<h3 class=\"doc-h doc-h3\">12. 잔여 확인사항 (§23 연계)</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>§23 번호</th><th>항목</th><th>본 페이즈 영향</th></tr></thead><tbody><tr><td>45 (R13)</td><td>다중 장부 아키텍처 — 논리 분리(병행원장+조정 구분코드) vs ledger 물리 분리</td><td>entryCode 확장 5종의 조회·집계 구조</td></tr>\n<tr><td>46 (R8)</td><td>필수 보조부/관리항목 범위 — 계정별 기본 필수 세트와 강화 옵션 경계</td><td><code>coa_control</code>·DimensionConfig 기본값</td></tr>\n<tr><td>47 (R4)</td><td>첨부 정책 — 파일당 용량(기본 10MB)·확장자·전표당 상한·보존연한 통합</td><td>JournalEvidenceLink·증빙 보관</td></tr>\n<tr><td>50 (N3)</td><td><code>journalApprovalMode</code> 기장 모드별 기본값, 결재 생략 시 최소 통제(검토 큐·로그) 범위</td><td>승인 워크플로우 기본 세팅</td></tr>\n<tr><td>51 (N6)</td><td>거래처 필수 계정 정의(자산/부채 필수 원칙 예외), 휴폐업 차단 로직, 사업자번호 중복 기준</td><td>R8 검증 정책</td></tr>\n<tr><td>52 (N7)</td><td>4종 일자 필수/선택 구분, VAT 신고 기준일(증빙일자 vs 세무귀속일), 불일치 허용 임계</td><td>일자 모델·검증 레벨</td></tr>\n<tr><td>53 (N9)</td><td>STAT/TAX Entry Code 사용 규칙·권한, Stat/Tax Conversion 자동화 범위</td><td>entryCode 확장 활성 조건</td></tr>\n<tr><td>55 (N11)</td><td>카드 VAT 공제 Rule — 신호 가중치·검토 임계·고객사별 커스터마이징·증빙 보완 SLA</td><td>R16/ATX-04 자동 추천 룰</td></tr>\n<tr><td>57 (N4)</td><td>AR/AP Invoice 매칭 — 자동 확정 임계·부분/초과 입금·외화 반제 환율</td><td>R5 선수/선급 검토·반제 연계</td></tr>\n<tr><td>49</td><td>1차 범위 스프린트 배분과 페이즈 03 선행 조건 릴리스 매핑</td><td>개발 일정 확정</td></tr>\n<tr><td>16</td><td>이상거래 탐지 도입 범위·임계치</td><td>전표 저장 시 실시간 스코어링 연동 시점</td></tr>\n<tr><td>23</td><td>증빙 정책(수신함·확장자·보존)</td><td>첨부·OCR 연계 범위</td></tr></tbody></table></div>"},"hasJournalImpl":true,"journalImplRel":"../화면설계/구현_화면_전표_v1.1.html"};
function el(tag, cls, text){ const n=document.createElement(tag); if(cls)n.className=cls; if(text!==undefined)n.textContent=text; return n; }
function setHtml(node, html){ node.innerHTML = html || ''; return node; }
function phaseBadge(phase){ return phase==='1차'?'badge b-new':phase==='2차'?'badge b-gray':phase==='3차'?'badge b-warn':'badge b-ref'; }
function kindClass(kind){ return kind==='error'?'errormsg':kind==='warn'?'warnmsg':'okmsg'; }
function money(i){ return (i*1375000 + 12000000).toLocaleString('ko-KR'); }
function stripHtml(html){ const d=document.createElement('div'); d.innerHTML=html||''; return d.textContent.replace(/\s+/g,' ').trim(); }
function makeTable(cols, rows){
  const table=el('table','grid'); const head=document.createElement('tr'); cols.forEach(c=>head.appendChild(el('th','',c))); table.appendChild(head);
  rows.forEach((row,i)=>{ const tr=document.createElement('tr'); if(i===0)tr.className='sel'; row.forEach((cell,idx)=>{ const td=el('td','',cell); if(idx>1 && /[0-9,]/.test(String(cell)))td.className='num'; if(/차단|경고|불일치|오류|불가|미통과/.test(String(cell)))td.className=(td.className+' red').trim(); if(/정상|완료|확정|일치/.test(String(cell)))td.className=(td.className+' ok').trim(); tr.appendChild(td); }); table.appendChild(tr); });
  return table;
}
function tabsFor(screen){
  const raw = (screen.tabs || '').replace(/<br>/g,'/').split(/[\/·,]/).map(s=>s.trim()).filter(Boolean);
  if(raw.length >= 2) return raw.slice(0,5);
  const g=screen.group, t=screen.title, id=screen.id;
  if(/전표 입력/.test(g) && /매입매출|WPV/.test(t+id)) return ['세무헤더','분개라인','부가세 자동라인','전자발행','검증'];
  if(/전표 입력/.test(g)) return ['전표목록','분개입력','관리항목','승인/검증'];
  if(/자동전표/.test(g)) return ['수집자료','추천분개','오류검증','전표전송'];
  if(/장부|원장/.test(g)) return ['원장조회','월계/누계','전표드릴다운','출력'];
  if(/보조부/.test(g)) return ['명세','반제/상태','전표연계','집계'];
  if(/결산/.test(g) || /재무제표/.test(g)) return ['자료입력','조정/집계','검증','출력'];
  if(/부가세/.test(g)) return ['신고서','매입/매출','불러오기','전자신고'];
  if(/고정자산/.test(g)) return ['자산등록','상각','처분/양도','명세'];
  if(/자금|예산/.test(g)) return ['계획','실적','예산','현황'];
  if(/예적금/.test(g)) return ['계좌현황','스케줄','이자/상환','전표연계'];
  if(/어음/.test(g)) return ['수불관리','집계','조회','담보/폐기'];
  if(/데이터관리/.test(g)) return ['대상선택','검증','실행','이력'];
  return ['목록','상세입력','검증','출력'];
}
function controlType(name, desc){
  const txt=(name+' '+(desc||''));
  if(/탭|구분|유형|상태|옵션|선택|여부/.test(txt)) return 'select';
  if(/일자|기간|월|기수|회계기간|만기/.test(txt)) return 'date';
  if(/금액|세액|잔액|합계|공급가액|차변|대변|수량|단가|율/.test(txt)) return 'number';
  if(/코드|거래처|계정|사업자|은행|부서|프로젝트|사원/.test(txt)) return 'code';
  if(/파일|첨부|전송|업로드|백업|복구/.test(txt)) return 'action';
  return 'text';
}
function sampleValue(field, screen, i){
  const name=field.name||field;
  const desc=field.desc||'';
  const txt=name+' '+desc;
  if(/회계기간|기수/.test(txt)) return '2026 / 제7기';
  if(/사업장/.test(txt)) return '0.전체';
  if(/일자|기간|월/.test(txt)) return i%2?'2026-06-30':'2026-06';
  if(/거래처/.test(txt)) return '000123 ㈜대한상사';
  if(/계정|과목/.test(txt)) return '401 매출 / 101 현금';
  if(/사업자/.test(txt)) return '123-45-67890';
  if(/금액|세액|잔액|합계|공급가액|차변|대변/.test(txt)) return money(i+1);
  if(/상태/.test(txt)) return screen.statusKind==='warn'?'검토필요':'정상';
  if(/구분|유형|탭|옵션/.test(txt)) return (desc.match(/[0-9]\.[^/·,\s)]+/)||['전체'])[0];
  if(/파일|업로드|백업|복구/.test(txt)) return '대상 선택';
  if(/수량/.test(txt)) return String((i+1)*2);
  if(/율|비율/.test(txt)) return '10.00%';
  return desc ? desc.slice(0,38) : screen.title;
}
function recordRows(screen){
  const seed=screen.fields.length?screen.fields:([{name:screen.title,desc:screen.purpose}]);
  return seed.slice(0,8).map((f,i)=>({title:f.name, sub:(f.desc||screen.group||screen.title).slice(0,46), amount:money(i+2), status:i%3===0?'검토':(i%2?'정상':'완료')}));
}
function domainColumns(screen){
  const text=screen.group+' '+screen.title+' '+screen.id;
  if(/전표|JNL|WPV/.test(text)) return ['일자','전표번호','구분','계정과목','거래처','차변','대변','적요','상태'];
  if(/자동전표|ATX/.test(text)) return ['수집일자','증빙유형','거래처','공급가액','부가세','추천계정','전표상태','검증'];
  if(/장부|원장|LED|AUX/.test(text)) return ['일자','전표번호','계정/보조부','거래처','차변','대변','잔액','드릴다운'];
  if(/결산|재무|CLS|FIN/.test(text)) return ['계정코드','계정과목','전기잔액','당기증감','조정분개','기말잔액','검증'];
  if(/부가세|VAT/.test(text)) return ['구분','거래처/서식','공급가액','세액','공제/불공제','신고서 반영','검증'];
  if(/고정자산|FA/.test(text)) return ['자산코드','자산명','취득일','취득가액','상각누계','장부가액','상태'];
  if(/자금|예산|FND/.test(text)) return ['일자','자금항목','거래처','입금계획','지급계획','실적','차이'];
  if(/예적금|차입|DEP/.test(text)) return ['계좌/차입번호','금융기관','개시일','만기일','원금','이자율','잔액'];
  if(/어음|수표|BIL/.test(text)) return ['어음번호','거래처','발행일','만기일','금액','상태','전표'];
  if(/데이터|DAT/.test(text)) return ['작업','대상기간','데이터범위','검증결과','진행상태','작업자','이력'];

function domainRows(screen){
  const cols=domainColumns(screen);
  const fields=screen.fields.length?screen.fields:[{name:screen.title,desc:screen.purpose}];
  return fields.slice(0,10).map((f,i)=>cols.map((c,ci)=>{
    const txt=c+' '+f.name+' '+(f.desc||'');
    if(/No/.test(c)) return String(i+1).padStart(2,'0');
    if(/일자|발행일|만기|대상기간/.test(txt)) return i%2?'2026-06-30':'2026-06-18';
    if(/전표번호/.test(txt)) return '2026-06-18-'+String(i+1).padStart(3,'0');
    if(/계정|과목|보조부/.test(txt)) return f.name.includes('계정')?f.name:'401 매출';
    if(/거래처|금융기관/.test(txt)) return i%2?'국민은행':'㈜대한상사';
    if(/금액|차변|대변|세액|잔액|원금|실적|계획|차이|가액/.test(txt)) return money(i+ci+1);
    if(/상태|검증|결과|진행/.test(txt)) return i%4===0?'경고':'정상';
    if(/구분|유형|증빙|서식/.test(txt)) return f.name;
    if(/작업|항목|데이터범위/.test(txt)) return f.name;
    if(/근거|드릴다운|전표/.test(txt)) return screen.basis||screen.impl||screen.id;
    return sampleValue(f,screen,i+ci);
  }));
}
