래처·계정)\n                → 승인(journalApprovalMode) → 기표(POSTED) → 마감(CLOSED)\n                                 │\n        ⑥ SA-ATX-08 전표전송현황 / SA-ATX-09 국세청자료검증(3원 대조) → 누락분 추가입력\n                                 │\n                                 ▼\n              [P04 장부·보조부] [P05 결산] [P06~08 부가세 신고]</code></pre>\n<ul class=\"doc-list\">\n<li>기장 모드별 입력 주체·검토 흐름은 §21·부록 통합본 11.1 참조: TENANT_LED(자가 입력→내부 승인), OPERATOR_LED(고객 제출 <code>CLIENT_SUBMITTED</code>→운영자 검토 <code>REVIEWING</code>→승인·기표, <code>tenantInputPolicy=NONE</code>이면 이용회사 입력 차단), HYBRID(분담 규칙 owner 검증, §21.6).</li>\n<li>2차: 정기청구(SA-JNL-03) 스케줄러 → JNL-01/02 자동생성, 물류전표(SA-JNL-04) 승인 큐 → JNL-01/02 전송(§25.4.3·§25.4.4).</li>\n</ul>\n<p>---</p>","dataModel":"<h3 class=\"doc-h doc-h3\">5. 데이터 모델</h3>\n<h4 class=\"doc-h doc-h4\">5.1 핵심 엔티티 (§12.1, 부록 C 6.3, §25.4.2.10, §25.5)</h4>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>엔티티</th><th>핵심 필드</th><th>키/제약</th><th>근거</th></tr></thead><tbody><tr><td><code>JournalHeader</code></td><td>managedCompanyId, fiscalYear, journalDate, journalNo, journalType{대체/입금/출금/매입/매출 + RECEIPT/PAYMENT/TRANSFER/PURCHASE/SALES/CLOSING/REVERSAL}, status, currency/fxRate(R3), evidenceDate/taxAttributionDate/postedDate(R7), headerNarration, sourceModule/sourceDocNo, autoRuleId, approvalLineId, createdBy/reviewedBy/approvedBy/postedBy, createdByGroup(MGMT/CLIENT), inputSource(MGMT_DIRECT/CLIENT_SELF/AUTO/UPLOAD), bookkeepingMode, assignmentId/breakGlassSessionId, version</td><td><strong>PK=(tenant_id, 전표일자, 전표번호)</strong> — 업무 복합키(§12.3 예외 규정). 파티셔닝 tenant_id+전표일자</td><td>§12.1, 부록 C 6.3, §11.1-(2)</td></tr>\n<tr><td><code>JournalLine</code></td><td>accountId, drCr, entryCode{DR/CR/RECEIPT/PAYMENT/CLOSING_DR/CLOSING_CR + ACCRUAL/ADJUSTMENT/RECLASS/TAX_ADJ/STAT_ADJ}, amount, foreignAmount, customerVendorId, 6차원(businessPlaceId·costCenterId·departmentId·projectId·siteId·employeeId), vatCode, noteId/bankAccountId, quantity/unitPrice, lineNarration, evidenceType/evidenceNo</td><td>FK=(tenant_id, 전표일자, 전표번호)+line_no. 라인당 차/대 한쪽만, 금액&gt;0</td><td>부록 C 6.3, §12.1</td></tr>\n<tr><td><code>JournalSequence</code></td><td>tenantId, businessPlaceId, 전표일자, lastSeq</td><td>일자별 멱등 채번(행 락). source 구분(일반 1~50000/매입매출 50001~99999)</td><td>§12.1, §25.4.2</td></tr>\n<tr><td><code>journal_line_aux</code></td><td>보조부 유형 VENDOR/NOTE/BANK/CARD/ADVANCE/VAT/QTY</td><td>전표 라인:보조부 1:N. 독립 보조원장은 POSTED 전표 기준 집계</td><td>§12.1</td></tr>\n<tr><td><code>journal_tax_line</code>(세무헤더)</td><td>taxType(11~25/51~64), 품명, 수량, 단가, 공급가액, 세액, 전자, 불공제사유, 예정누락, 수입납부유예</td><td>매입매출 2계층 상단</td><td>§25.4.2</td></tr>\n<tr><td><code>tax_type_master</code></td><td>코드·명칭·증빙·세율·부가세계정·신고서식 매핑</td><td>단일 진실원</td><td>§25.4.2.10</td></tr>\n<tr><td><code>vat_account_rule</code></td><td>과세유형→부가세대급금/예수금 자동라인 룰</td><td></td><td>§25.4.2.10</td></tr>\n<tr><td><code>etax_status</code> / <code>etax_issue</code></td><td>발행/전송/신고상태, remark(비고 — 신고·분개 비반영)</td><td>상태머신</td><td>§25.4.2.6</td></tr>\n<tr><td><code>MultiItemVoucherDetail</code></td><td>품명·규격·수량·단가·공급가액·부가세·비고(최대 99)</td><td>합계=상단 일치</td><td>§25.4.2.7</td></tr>\n<tr><td><code>JournalTemplate</code> / <code>RecurringJournal</code></td><td>템플릿·반복(예약) 전표</td><td>JV-06·정기청구 연계</td><td>§12.1, 부록 C 6.4</td></tr>\n<tr><td><code>JournalEvidenceLink</code></td><td>전표↔증빙(Evidence) 연결, sameEvidenceKey(세금계산서 승인번호·카드 승인번호)</td><td>동일 카드승인건 다중 연결 차단</td><td>§11.1.1-(4)(14)(16)</td></tr>\n<tr><td><code>note</code>(메모)</td><td>type{전표/검토/승인/감사/세무/STAT}</td><td>유형별 노출 권한</td><td>§11.1.1-(12)</td></tr>\n<tr><td><code>TenantAccountingConfig</code></td><td>소수점 자릿수·반올림(M4), <strong>journalApprovalMode</strong>(REQUIRED/OPTIONAL/NONE — N3), accountCodeLength(N8)</td><td>회사별 환경설정</td><td>§11.1-(6)(7), §12.1</td></tr>\n<tr><td>자동전표 스테이징</td><td>상단 수집헤더(원천키·수집값·과세유형·추천 신뢰도·전표상태) + 하단 추천분개. 증빙별(전자세금계산서/계산서/카드 매출·매입/현금영수증/통장)</td><td>(tenant_id, 원천키) unique — 멱등(§12.3)</td><td>§25.5.2~6, §8.4</td></tr>\n<tr><td><code>ScrapingTask</code>/<code>IntegrationStaging</code>/<code>IntegrationAdapter</code></td><td>connectorType·params·status·retryCount / rawPayload·source·status / 기관별 파서</td><td>큐 기반 비동기, 원천키 중복 방지</td><td>§8.4</td></tr>\n<tr><td>자격증명 볼트</td><td><code>TenantConnector</code>/<code>ConnectorCredential</code>/<code>Certificate</code>(인증서·홈택스·은행·카드·여신)</td><td>KMS 암호화, RLS</td><td>§8, §25.5.1</td></tr>\n<tr><td><code>ArApInvoice</code>/<code>ClearingEntry</code></td><td>invoiceNo·partner·currency·openAmount / invoiceRef·journalRef·clearedAmount·fxGainLoss·fee</td><td>선수/선급 검토(R5)·환차손익(R3) 연계</td><td>§12.1(N4), §11.11</td></tr>\n<tr><td><code>JournalHistory</code>+<code>DataChangeLog</code></td><td>모든 변경 이력(전후값·IP·행위자)</td><td>append-only</td><td>§11.1, §17</td></tr></tbody></table></div>\n<h4 class=\"doc-h doc-h4\">5.2 상태값 (§12.2, 부록 C 6.6)</h4>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>상태 그룹</th><th>값</th></tr></thead><tbody><tr><td>전표 생명주기</td><td><code>DRAFT</code>→<code>CLIENT_SUBMITTED</code>→<code>REVIEWING</code>→<code>PENDING_APPROVAL</code>→<code>APPROVED</code>→<code>POSTED</code>→<code>CLOSED</code> (+<code>REJECTED</code>/<code>ADJUSTED</code>/<code>REVERSED</code>/<code>CANCELLED</code>)</td></tr>\n<tr><td>전표 분개구분</td><td>DR/CR/RECEIPT/PAYMENT/CLOSING_DR/CLOSING_CR — 결차/결대만 원가 흐름 인식(M2). 확장: ACCRUAL/ADJUSTMENT/RECLASS/TAX_ADJ/STAT_ADJ(R13)</td></tr>\n<tr><td>전표 유형(구분 표시)</td><td>대체·입금·출금·매입·매출 — 입금/출금은 현금 위치 자동 판별·동일 일자 시리즈 공유</td></tr>\n<tr><td>전표번호 채번</td><td><code>예정</code>(임시저장)→<code>확정</code>(001~). 충돌 <code>NUMBERING_CONFLICT</code> 재시도, 취소 번호 재사용 금지(결번 보존)</td></tr>\n<tr><td>자동전표(스테이징) 전표상태</td><td>확정가능·전표확정·확정제외·중복전표·미추천·삭제(전표) — 변경 룰: 확정가능↔확정제외, 삭제/중복→확정가능·확정제외, 미추천→확정제외(§25.5.2)</td></tr>\n<tr><td>수집 태스크</td><td>QUEUED·RUNNING·SUCCESS·RETRY·FAILED·DEAD_LETTER(§8.4)</td></tr>\n<tr><td>전자세금계산서</td><td>전자입력·전자발행·국세청성공·전송실패·역발행 / 확인요청·확인·발행대상·발행요청 / 미전송·전송성공(§25.4.2.6). 국세청 전송상태: NOT_TARGET~MANUAL_EVIDENCE 8종(§11.4-(1))</td></tr>\n<tr><td>거래처(R8)</td><td>TEMP_VENDOR/TEMP_CUSTOMER·PENDING_APPROVAL·ACTIVE·INACTIVE·CLOSED_BIZ</td></tr>\n<tr><td>회계기간</td><td>FUTURE·OPEN·TEMP_CLOSED·CLOSED·LOCKED(+REOPEN_REQUESTED/REOPENED)</td></tr></tbody></table></div>\n<h4 class=\"doc-h doc-h4\">5.3 상태별 통제 (부록 C 6.6 통제표 전수)</h4>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>상태</th><th>수정</th><th>삭제</th><th>장부반영</th><th>통제</th></tr></thead><tbody><tr><td>DRAFT</td><td>가능</td><td>가능</td><td>불가</td><td>필수값/차대변 검증, 미채번/가번</td></tr>\n<tr><td>CLIENT_SUBMITTED</td><td>작성자(고객) 제한</td><td>제한</td><td>불가</td><td>관리회사 검토 대기, 채번</td></tr>\n<tr><td>REVIEWING</td><td>검토자 보정 가능</td><td>불가</td><td>불가</td><td>검토자 지정, 원입력값 이력 보존</td></tr>\n<tr><td>PENDING_APPROVAL</td><td>제한</td><td>제한</td><td>불가</td><td>결재선/권한 검증</td></tr>\n<tr><td>REJECTED</td><td>가능</td><td>가능</td><td>불가</td><td>반려사유 필수, 작성자 그룹 반환</td></tr>\n<tr><td>APPROVED</td><td>제한</td><td>제한</td><td>가능</td><td>승인자/시각·SOD, 수정 시 재승인</td></tr>\n<tr><td>POSTED</td><td>조정전표로만</td><td>불가</td><td>가능</td><td><code>POSTED_IMMUTABLE</code>, 원장 이력 보존</td></tr>\n<tr><td>ADJUSTED/REVERSED</td><td>제한/불가</td><td>불가</td><td>가능/반대반영</td><td>조정사유·원전표 연결/원전표 참조 보존</td></tr>\n<tr><td>CLOSED</td><td>불가</td><td>불가</td><td>—</td><td>마감해제 권한(Step-up)</td></tr>\n<tr><td>CANCELLED</td><td>불가</td><td>불가</td><td>불가</td><td>결번 보존</td></tr></tbody></table></div>\n<p>---</p>","api":"<h3 class=\"doc-h doc-h3\">6. API 설계</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>Method</th><th>URI</th><th>설명 · 규칙</th><th>근거</th></tr></thead><tbody><tr><td>GET</td><td><code>/api/journals?fiscalYear&amp;journalDate</code> / <code>?dateFrom&amp;dateTo</code> / <code>?source=PURCHASE_SALE&amp;taxType</code></td><td>전표 목록(월별/기간/매입매출 필터). cursor 페이징, 다조건 검색(R17) 파라미터</td><td>부록 통합본 WJV-01, §25.4.2, §13.3</td></tr>\n<tr><td>POST</td><td><code>/api/journals</code></td><td>생성(journalType=GENERAL/PURCHASE_SALE). <code>Idempotency-Key</code> 필수</td><td>§13.3</td></tr>\n<tr><td>PUT</td><td><code>/api/journals/{id}</code></td><td>수정 — 상태별 통제(5.3), 낙관적 락 version</td><td>부록 C 6.8</td></tr>\n<tr><td>POST</td><td><code>/api/journals/{id}/submit</code></td><td>결재요청·정식 채번(<code>journalApprovalMode</code> 분기)</td><td>부록 통합본 WJV-01, §11.1-(7)</td></tr>\n<tr><td>POST</td><td><code>/api/journals/{id}/auto-line</code></td><td>부가세 자동라인 생성(과세유형 기반)</td><td>§25.4.2</td></tr>\n<tr><td>POST</td><td><code>/api/approvals/requests</code>·<code>/{id}/approve</code>·<code>/{id}/reject</code>·<code>/batch-approve</code></td><td>전자결재(targetType=JOURNAL) — REQUIRED/OPTIONAL 모드</td><td>부록 C 7.10</td></tr>\n<tr><td>POST</td><td>전표이동/복사/묶기/일괄적용 커맨드</td><td>이동=재채번(마감 일자 차단), 자금·증빙·자동전표 보호 플래그</td><td>§25.4.1</td></tr>\n<tr><td>POST</td><td>홈택스 엑셀 업로드(<code>HometaxExcelImportCommand</code>) → 미리보기 → <code>BulkVoucherGenerateCommand</code></td><td>업로드·매핑·검증·일괄 생성. 멱등키+<code>DuplicateVoucherGuard</code></td><td>§25.4.2.9</td></tr>\n<tr><td>POST</td><td>전자발행/발행취소/전송결과</td><td><code>etax_status</code> 상태머신, 발행취소는 당일 '확인요청'만</td><td>§25.4.2.6</td></tr>\n<tr><td>POST·GET</td><td><code>/api/tenant/connectors</code></td><td>수집 자격증명 등록/검증(볼트)</td><td>§13.2, §25.5.1</td></tr>\n<tr><td>POST</td><td>수집 트리거(증빙별 수동수집)</td><td>202 Accepted + <code>ScrapingTask</code> 큐 발행. 6개월 제한·미래일 불가</td><td>§8.4, §25.5.10</td></tr>\n<tr><td>POST</td><td>스테이징 전표전송(증빙별)</td><td>분개포함/분개없음, 라우팅(3.일반→JNL-01 / taxType→JNL-02), 중복전표=승인번호만. 원천키 멱등</td><td>§25.5.2~6</td></tr>\n<tr><td>GET</td><td>자료수집현황/전표전송현황/3원 대조·홈택스 불러오기</td><td>조회 전용(ATX-07/08/09)</td><td>§25.5.7~9</td></tr>\n<tr><td>POST·GET</td><td><code>/api/tenant/evidences</code></td><td>증빙 업로드(검사 큐)/조회·매칭 — <code>JournalEvidenceLink</code></td><td>§13.2, §11.12</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>공통 계약: 인증 토큰 <code>userGroup·tenantId·role·scope</code> 검증, scope <code>tenant:journal:write/approve/post</code>, 멱등 <code>Idempotency-Key</code>(동일 키+다른 해시 <code>409 IDEMPOTENCY_CONFLICT</code>), 오류코드는 §13.3 표준 + 전표 도메인 5종(<code>AUX_REQUIRED</code>/<code>DIMENSION_REQUIRED</code>/<code>POSTED_IMMUTABLE</code>/<code>QUICK_ENTRY_INVALID_ACCOUNT</code>/<code>NUMBERING_CONFLICT</code>). 서비스: <code>JournalService</code>/<code>PostingService</code>(부록 C 15.1 준용), <code>ScrapingPipelineService</code>(§13.1).</li>\n</ul>\n<p>---</p>","validation":"<h3 class=\"doc-h doc-h3\">8. 검증 · 오류 처리 (차단/경고 통합표)</h3>\n<p>WJV-01 검증(4.1.6)·WPV-01 검증(4.2.6)·자동전표 오류검증(4.4~4.8) 외 §15 전표 관련 행 전수:</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>처리</th><th>근거</th></tr></thead><tbody><tr><td>금액 0/음수 라인, 라인 차/대 동시 입력</td><td>차단</td><td>§15</td></tr>\n<tr><td>부가세 계정-부가세코드 불일치</td><td>경고(매입/매출 세무헤더 대조)</td><td>§15</td></tr>\n<tr><td>전표일자-회계기간 불일치(OPEN 외)</td><td>차단</td><td>§15</td></tr>\n<tr><td>환율 미적용 외화전표</td><td>저장 차단</td><td>§15</td></tr>\n<tr><td>증빙일자&gt;전표일자 / 세무귀속월≠회계월 / 미래 전표일자</td><td>경고 / 경고+세무검토 / 권한별 차단·경고</td><td>§15(R7)</td></tr>\n<tr><td>채권계정×공급업체 / 채무계정×고객 / 휴폐업·사용중지 거래처 / 허용계정 위반</td><td>차단 / 차단 / 차단 / 경고·차단(정책)</td><td>§15(R8)</td></tr>\n<tr><td>계정 사용가능기간 외 / 계정-거래처유형·부서·프로젝트 조합 위반</td><td>차단 / 경고·차단</td><td>§15(R9)</td></tr>\n<tr><td>중복 전표(유사도·증빙 키)</td><td>경고(증빙 키 일치 시 강한 경고), 정상 반복거래 예외 메모</td><td>§15(R14)</td></tr>\n<tr><td>동일 카드승인건 다중 전표 연결 / 세금계산서 수취 건 카드 공제</td><td>차단(이중공제 차단)</td><td>§15(R16)</td></tr>\n<tr><td>자동전표 스테이징 오류검증</td><td>유형검증오류·사업자번호·상하단 합계·공급가액+세액≠합계·유형별 부가세 — 보완 후 전송</td><td>§25.5.2~3</td></tr>\n<tr><td>중복전표(스테이징)</td><td>전송 불가(승인번호만 전송 옵션), 원천별 판정 기준 상이(4.6·4.7·4.8)</td><td>§25.5.2~6</td></tr>\n<tr><td>체크카드 통장 수집분</td><td>기본 '확정제외'(카드 수집분과 중복 방지)</td><td>§25.5.6</td></tr>\n<tr><td>멱등키 충돌</td><td><code>409 IDEMPOTENCY_CONFLICT</code> 반영 차단</td><td>§15</td></tr>\n<tr><td>OPERATOR_LED 이용회사 전표 입력</td><td><code>tenantInputPolicy=NONE</code> 시 메뉴 비활성+API 이중 차단</td><td>§15, §21</td></tr>\n<tr><td>HYBRID 분담 위반 / 양측 중복 입력</td><td>owner 불일치 차단(EITHER만 양측) / 경고+<code>DUP_CROSS_PARTY</code> 이상탐지</td><td>§15, §21.6</td></tr>\n<tr><td>증빙 바이러스 검사 실패</td><td><code>QUARANTINED</code> 격리, 전표 매칭 차단</td><td>§15, §11.12</td></tr>\n<tr><td>적격증빙 미충족</td><td>가산세 대상 플래그·세무조정 검토 목록</td><td>§15, §11.12</td></tr>\n<tr><td>이상탐지</td><td>AI는 경고·우선순위만 — 전표 자동 수정/반려/승인 금지</td><td>§15, §11.7</td></tr>\n<tr><td>오류 메시지 원칙</td><td>필드 단위 지목+조치 안내, 서버/클라 이중 검증</td><td>부록 C 18.2, §16.2</td></tr></tbody></table></div>\n<p>---</p>","done":"<h3 class=\"doc-h doc-h3\">11. 완료 기준(DoD) · 테스트 관점</h3>\n<h4 class=\"doc-h doc-h4\">11.1 완료 기준</h4>\n<p>1. WJV-01: 입금/출금/대체/결산 통합 입력, 일자별 001 채번(결번 보존·재채번·번호 수정 불가), 월/기간 조회, 우측 패널(차대·현금잔액·상태·관리항목 도킹·증빙), 4.1.6 검증 전수, <code>journalApprovalMode</code> 3모드 동작.</p>\n<p>2. WPV-01: 과세유형 30종(11~25/51~64) 마스터 주도 입력, 부가세 자동라인(과세만), 분개유형 0~7 자동분개, 분기 3종(유형/계정/적요), 전자발행 상태머신·비고=발행정보, 복수거래 99개·0원 세금계산서, 더보기 22항목, 홈택스 엑셀 업로드(중복 방지 포함), 채번 50001~ 분리.</p>\n<p>3. SA-ATX: 자격증명 볼트(암호화) 등록→매일 수집(비동기 큐·멱등)→증빙별 스테이징·추천(신뢰도 음영)→오류검증→전표상태 6종 라이프사이클→라우팅 전송→ATX-07/08 현황→ATX-09 3원 대조 '○/X'.</p>\n<p>4. R1~R17 전 항목이 화면·API·검증에 반영(Phase 표기 항목은 §0.6 기준 — R2 자동분개 추천 AI 연계·R5·R10·R16 자동판정 등 Phase 2 요소는 토글/스텁 포함 후 차기 고도화).</p>\n<h4 class=\"doc-h doc-h4\">11.2 테스트 관점</h4>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>관점</th><th>시나리오 예</th></tr></thead><tbody><tr><td>채번 동시성</td><td>동일 일자 동시 입력 N건 → 결번 없는 연속 채번, <code>NUMBERING_CONFLICT</code> 재시도. 전표이동 시 재채번·마감 일자 차단</td></tr>\n<tr><td>차대·간편입력</td><td>현금 위치 자동 입/출금 판별, 간편입력 부적격 계정(<code>QUICK_ENTRY_INVALID_ACCOUNT</code>), 외화 통화별 균형</td></tr>\n<tr><td>상태머신</td><td>DRAFT→…→CLOSED 전 전이 + REJECTED/REVERSED/CANCELLED, POSTED 직접 수정 차단, 낙관적 락 충돌</td></tr>\n<tr><td>승인 옵션</td><td>REQUIRED/OPTIONAL/NONE 별 채번·기표 시점, NONE에서도 감사로그·중복검증 유지</td></tr>\n<tr><td>과세유형</td><td>유형별 자동라인·라우팅(고정자산 분기, 의제 3조건, 불공 54 원가 포함), 상·하단 차액 신고서 반영, 매출 이중신고 방지(11 후 17 금지)</td></tr>\n<tr><td>자동전표</td><td>원천키 멱등(재수집 중복 0건), 중복전표 원천별 기준, 체크카드 확정제외, 통장 1건=1전표 입금/출금, 송금수수료 차감 우선순위</td></tr>\n<tr><td>3원 대조</td><td>전표·수집·홈택스 일치/차액, 종이(전자 공란) 제외</td></tr>\n<tr><td>기장 모드</td><td>OPERATOR_LED 입력 차단/REQUEST_ONLY, CLIENT_SUBMITTED→REVIEWING 검토 보정 이력, HYBRID owner 위반·<code>DUP_CROSS_PARTY</code></td></tr>\n<tr><td>성능</td><td>대량 그리드 가상 스크롤·키보드 주도(§16.2), 수집 워커 분리로 API 무영향(§8.4), 파티셔닝 조회</td></tr>\n<tr><td>감사</td><td>전 CUD <code>DataChangeLog</code> 전후값, 행위자 표식, 결번 리포트</td></tr></tbody></table></div>\n<p>---</p>","full":"<h2 class=\"doc-h doc-h2\">BK 개발 상세설계서 — 페이즈 03. 전표 · 자동전표 (MVP 핵심)</h2>\n<ul class=\"doc-list\">\n<li>기준 문서: <code>bk_설계서_v1.1.md</code> (2026-07-02)</li>\n<li>작성일: 2026-07-03</li>\n<li>개발 차수: <strong>1차(2607~2610)</strong> = SA-JNL-01·02, SA-ATX-01~09 / <strong>2차</strong> = SA-JNL-03·04 / <strong>3차</strong> = SA-ATX-10 (§22.2)</li>\n<li>선행 페이즈: <strong>P01 기초정보</strong>(계정과목 WJV-08/09·거래처·6 관리차원·환경설정·적요 마스터), <strong>P02 전기이월</strong>(개시잔액 검증 게이트 — P02와 병행 개발 가능) (00_개요 2절)</li>\n<li>구현 화면 기준 파일: <code>설계/화면설계/구현_화면_전표_v1.1.html</code>(WJV-01~09 — EY 레이아웃·타이틀바·조회조건·우측 패널 구성), <code>설계/화면설계/구현_매입매출_전표_v1.0.html</code>(WPV-01). 본 문서의 화면 기술은 설계서 본문(§25.4·§25.5·부록 C 6장·부록 통합본 3~11장)을 기준으로 한다.</li>\n<li>공통 설계 표준(멀티테넌시·감사필드·변경이력·오류코드·권한·기장모드·멱등성·UI·소수점·기술스택)은 <code>00_개요_페이즈일정.md</code> 3절을 따른다(본 문서 반복 기술 생략).</li>\n</ul>\n<p>---</p>\n<h3 class=\"doc-h doc-h3\">1. 페이즈 개요</h3>\n<h4 class=\"doc-h doc-h4\">1.1 목표</h4>\n<ul class=\"doc-list\">\n<li>회계 원장의 원천이 되는 <strong>수기 전표 입력 2종</strong>(일반전표 SA-JNL-01, 매입매출전표 SA-JNL-02)과, 국세청 홈택스·여신금융협회·카드사·은행에서 증빙을 <strong>자동수집→분개 추천→검증→전표전송</strong>하는 <strong>자동전표 파이프라인 9종</strong>(SA-ATX-01~09)을 구축한다(§25.4, §25.5).</li>\n<li>주간정기회의(2026-07-02) 결정에 따라 <strong>일반전표입력(WJV-01)이 MVP 최우선 화면</strong>이며, 계정과목 관리(P01의 WJV-08/09)와 함께 최우선 개발한다(§0.7, §22, 00_개요 1절).</li>\n<li>전표 도메인 표준: 더존식 일자별 채번(§11.1-(2)), entryCode 6종+확장 5종(§11.1-(5), §11.1.1-(13)), 4종 일자 구조(§11.1.1-(7)), 승인 워크플로우 옵션화(§11.1-(7)), 과세유형 단일진실원(§25.4.2), 자동전표 스테이징·상태머신(§25.5, §8.4).</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">1.2 범위 요약</h4>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>구분</th><th>내용</th><th>근거</th></tr></thead><tbody><tr><td>수기 전표</td><td>일반전표입력(입금/출금/대체/결산 통합), 매입매출전표입력(세무헤더+분개 2계층)</td><td>§25.4.1, §25.4.2</td></tr>\n<tr><td>입력 보강</td><td>R1~R17 전체(입력순서·스마트입력·외화·첨부·선수/선급 검토·차대 패널·4종 일자·거래처/계정 검증·차대 자동화·적요·메모·entryCode 확장·중복판정·관리항목 도킹 패널·카드 VAT·조회 확장)</td><td>§11.1.1, §0.6</td></tr>\n<tr><td>자동전표</td><td>수집정보등록(자격증명 볼트)→수집(ETL)→스테이징(추천분개)→오류검증→전표전송→3원 대조</td><td>§25.5, §8.4</td></tr>\n<tr><td>반복·연계 전표(2차)</td><td>정기청구입력(스케줄 자동전표), 물류전표처리(중간전표 승인 큐)</td><td>§25.4.3, §25.4.4</td></tr>\n<tr><td>수집 콘솔(3차)</td><td>ScrappingBoard(수집 대시보드·수동수집)</td><td>§25.5.10</td></tr></tbody></table></div>\n<h4 class=\"doc-h doc-h4\">1.3 선행조건</h4>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>선행</th><th>필요 산출물</th><th>근거</th></tr></thead><tbody><tr><td>P01 기초정보</td><td>계정과목·<code>coa_control</code>(계정 주도 통제)·거래처·적요 마스터·6 관리차원·<code>DimensionConfig</code>·환경설정(<code>TenantAccountingConfig</code>)·권한(Role/MenuActionGrant)</td><td>§11.6.2, §9, 00_개요 2절</td></tr>\n<tr><td>P02 전기이월</td><td>개시잔액(현금잔액·거래처 이월 등) — 개시이월 미확정 시 당기 전표 전기 제한. P02와 병행 개발 가능(검증 게이트만 선행)</td><td>부록 통합본 11.9, 00_개요 2절</td></tr>\n<tr><td>공통</td><td>회계기간(FiscalPeriod OPEN), 자격증명 볼트(§8), 증빙 보관소(§11.12), 전자결재 엔진(부록 C 7장 — <code>journalApprovalMode</code> REQUIRED/OPTIONAL에서 사용)</td><td>§11.9, §11.1-(7)</td></tr></tbody></table></div>\n<h4 class=\"doc-h doc-h4\">1.4 MVP 연관</h4>\n<ul class=\"doc-list\">\n<li>WJV-01 + WJV-08/09(P01)이 MVP 최우선(§0.7 회의 결정 1·2·10). 본 페이즈 산출 전표는 P04 장부·P05 결산·P06~08 부가세의 유일한 원천이며, 매입매출전표(taxType)가 부가세 신고 파이프라인의 단일진실원이다(§25.4.2).</li>\n</ul>\n<p>---</p>\n<h3 class=\"doc-h doc-h3\">2. 개발 범위 — 차수별 메뉴/화면 목록</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>화면 ID</th><th>화면명</th><th>구현 화면 ID</th><th>차수</th><th>설계서 근거</th></tr></thead><tbody><tr><td>SA-JNL-01</td><td>일반전표입력</td><td>WJV-01 (+WJV-02 관리항목 패널)</td><td>1차</td><td>§25.4.1, §11.1, §11.1.1, 부록 C 6장, 부록 통합본 3·4·7~9·11장</td></tr>\n<tr><td>SA-JNL-02</td><td>매입매출전표입력</td><td>WPV-01</td><td>1차</td><td>§25.4.2 (25.4.2.0~25.4.2.10), §11.4</td></tr>\n<tr><td>SA-ATX-01</td><td>수집정보등록</td><td>—</td><td>1차</td><td>§25.5.1, §8 볼트</td></tr>\n<tr><td>SA-ATX-02</td><td>전자세금계산서</td><td>—</td><td>1차</td><td>§25.5.2</td></tr>\n<tr><td>SA-ATX-03</td><td>전자계산서</td><td>—</td><td>1차</td><td>§25.5.3</td></tr>\n<tr><td>SA-ATX-04</td><td>신용카드</td><td>—</td><td>1차</td><td>§25.5.4</td></tr>\n<tr><td>SA-ATX-05</td><td>현금영수증</td><td>—</td><td>1차</td><td>§25.5.5</td></tr>\n<tr><td>SA-ATX-06</td><td>통장</td><td>—</td><td>1차</td><td>§25.5.6</td></tr>\n<tr><td>SA-ATX-07</td><td>자료수집현황</td><td>—</td><td>1차</td><td>§25.5.7</td></tr>\n<tr><td>SA-ATX-08</td><td>전표전송현황</td><td>—</td><td>1차</td><td>§25.5.8</td></tr>\n<tr><td>SA-ATX-09</td><td>국세청자료검증 및 사이트비교</td><td>—</td><td>1차</td><td>§25.5.9</td></tr>\n<tr><td>SA-JNL-03</td><td>정기청구입력</td><td>—</td><td>2차</td><td>§25.4.3</td></tr>\n<tr><td>SA-JNL-04</td><td>물류전표처리</td><td>—</td><td>2차</td><td>§25.4.4</td></tr>\n<tr><td>SA-ATX-10</td><td>ScrappingBoard</td><td>—</td><td>3차</td><td>§25.5.10</td></tr></tbody></table></div>\n<blockquote>1차 범위는 <code>개발순차_1차.xlsx</code> 페이즈 03행과 정합(§22.2). ScrappingBoard만 3차이며, 그 전까지 수동수집 트리거는 각 증빙 메뉴의 「수집하러가기」 대체 경로(수집 잡 스케줄러 직접 호출)로 제공한다(§25.5.1 BK 구체화).</blockquote>\n<p>---</p>\n<h3 class=\"doc-h doc-h3\">3. 업무 흐름 (End-to-End)</h3>\n<pre class=\"doc-code\"><code>[P01 기초정보]──[P02 개시이월]\n      │\n      ▼\n① 수집정보등록(SA-ATX-01, 자격증명 볼트) ─▶ ② 자동수집(매일 배치/수동, §8.4 큐+워커+스테이징)\n      │                                          │\n      │                          ┌───────────────┴───────────────────┐\n      │                          ▼                                   ▼\n      │        ③ 증빙별 스테이징·분개추천                  scrapping 실패 → SA-ATX-07/10\n      │        (ATX-02 전자세금계산서 / 03 전자계산서 /\n      │         04 신용카드 / 05 현금영수증 / 06 통장)\n      │                          │ 오류검증·중복판정·전표상태(확정가능/전표확정/확정제외/중복/미추천/삭제)\n      │                          ▼\n      ▼                 ④ 전표전송(라우팅)\n  수기 입력 ─────────┬──▶ SA-JNL-01 일반전표(유형 3.일반, 통장 1건=1전표)\n                     └──▶ SA-JNL-02 매입매출전표(taxType 11~25/51~64)\n                                 │\n              ⑤ 전표 코어: 채번(일자별 001~/50001~) → 검증(차대·마감·필수차원·거래처·계정)\n                → 승인(journalApprovalMode) → 기표(POSTED) → 마감(CLOSED)\n                                 │\n        ⑥ SA-ATX-08 전표전송현황 / SA-ATX-09 국세청자료검증(3원 대조) → 누락분 추가입력\n                                 │\n                                 ▼\n              [P04 장부·보조부] [P05 결산] [P06~08 부가세 신고]</code></pre>\n<ul class=\"doc-list\">\n<li>기장 모드별 입력 주체·검토 흐름은 §21·부록 통합본 11.1 참조: TENANT_LED(자가 입력→내부 승인), OPERATOR_LED(고객 제출 <code>CLIENT_SUBMITTED</code>→운영자 검토 <code>REVIEWING</code>→승인·기표, <code>tenantInputPolicy=NONE</code>이면 이용회사 입력 차단), HYBRID(분담 규칙 owner 검증, §21.6).</li>\n<li>2차: 정기청구(SA-JNL-03) 스케줄러 → JNL-01/02 자동생성, 물류전표(SA-JNL-04) 승인 큐 → JNL-01/02 전송(§25.4.3·§25.4.4).</li>\n</ul>\n<p>---</p>\n<h3 class=\"doc-h doc-h3\">4. 화면별 상세설계</h3>\n<h4 class=\"doc-h doc-h4\">4.1 SA-JNL-01 일반전표입력 (WJV-01) — 1차</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 부가세 신고 관련 매입매출 거래 <strong>이외의 모든 거래</strong>를 입력하는 단일 진입 화면. 입금/출금 전표 메뉴를 별도로 두지 않고 통합 — 현금(101) 라인 위치로 입출금 자동 판별, 「구분」 컬럼에 대체/입금/출금 표시(§25.4.1, §11.1-(1)).</li>\n<li><strong>진입경로</strong>: 전표/장부 › 일반전표입력. 진입 시 전기일(오늘)의 당일 전표 목록 자동 조회(일자별 마스터-디테일, §11.1-(1) S9). 「＋ 전표 추가」 또는 행 선택 후 하단 분개 입력, 「저장 후 계속 입력」 연속 기표 지원.</li>\n<li><strong>권한</strong>: <code>tenant:journal:write</code>(자가) · <code>operator:journal:review</code>(대행 검토) (§13.3, 부록 통합본 WJV-01 메타).</li>\n<li><strong>API</strong>: <code>GET /api/journals?fiscalYear&amp;journalDate</code>(월별) / <code>?dateFrom&amp;dateTo</code>(기간) · <code>POST /api/journals</code>(journalType=GENERAL) · <code>PUT /api/journals/{id}</code> · <code>POST /api/journals/{id}/submit</code>(결재요청·채번) (부록 통합본 WJV-01·3.1.1).</li>\n<li><strong>산출물</strong>: 분개장·총계정원장·현금출납장·거래처원장·재무제표(시산표/BS/IS)·보조부(자금·어음·카드)·인쇄 전표(§25.4.1).</li>\n</ul>\n<h5 class=\"doc-h doc-h5\">4.1.1 화면 영역 구성 (구현 화면 <code>구현_화면_전표_v1.1.html</code> 기준 골격)</h5>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>영역</th><th>구성</th><th>근거</th></tr></thead><tbody><tr><td>① 타이틀바</td><td>진입경로 바(전표/장부 › 일반전표입력) + 전표 식별 배지(<code>2026-06-18-003</code>) + 상태 배지(DRAFT 작성중 등) + 입력경로 배지(MGMT_DIRECT/CLIENT_SELF/AUTO) + 기장모드 배지(자가 TENANT_LED/위탁/병행) + 사용자 표시</td><td>부록 통합본 3장, §21.8</td></tr>\n<tr><td>② 조회조건</td><td>월/기간 세그먼트 토글, 회계월 드롭다운(◀전월/익월▶) 또는 시작~종료일, 사업장 필터, 조회(F1)</td><td>§25.4.1, 부록 통합본 3.1.1</td></tr>\n<tr><td>③ 액션바(툴바)</td><td>화면구성(Ctrl+A)·전표번호 보임/숨김·차액전표보기(Shift+F10)·전표묶기(F7)·새 전표(F8)·인쇄(F9)·삭제(F5)·더보기▾</td><td>§25.4.1 기능, 부록 통합본 3.4</td></tr>\n<tr><td>④ 명세 그리드</td><td>일·전표번호·N/U·거래처코드·거래처·구분·계정과목·차변·대변·Code/적요·관리 (JournalLine 단위, 가상 스크롤)</td><td>§25.4.1 입력 필드</td></tr>\n<tr><td>⑤ 우측 패널</td><td>(a)선택전표 소계·차대일치 배지 (b)현금잔액 드릴다운→현금출납장 (c)전표 상태·결재(결재요청/검토이력) (d)이 라인 관리항목(WJV-02 도킹) (e)연결 증빙 뷰어 (f)작성자/메모</td><td>§11.1.1-(6)(15)(4), 부록 통합본 3장</td></tr>\n<tr><td>⑥ 상태바(foot)</td><td>차변합계·대변합계·차대일치 표시 + 임시저장 + 결재요청(채번) 버튼</td><td>부록 통합본 3장</td></tr></tbody></table></div>\n<h5 class=\"doc-h doc-h5\">4.1.2 조회조건 영역 — 입력 칸·동작</h5>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>입력 칸</th><th>형식</th><th>동작 · 검증</th><th>근거</th></tr></thead><tbody><tr><td>월/기간 토글</td><td>세그먼트(기본 월별)</td><td>월별=회계월 단위 조회(「월」열 숨김), 기간=from~to 조회(「월」열을 일 앞에 표시, 월 경계 초과 조회·인쇄·집계용). API <code>?fiscalYear&amp;period</code> / <code>?dateFrom&amp;dateTo</code></td><td>§25.4.1, 부록 통합본 3.1.1</td></tr>\n<tr><td>회계월</td><td>YYYY-MM 드롭다운</td><td>◀전월/익월▶ 이동. 회계기간(FiscalPeriod) 범위 내</td><td>부록 통합본 3.1.1</td></tr>\n<tr><td>기간 from~to</td><td>날짜 2칸</td><td>시작≤종료 검증, 일자 오름차순 표시</td><td>부록 통합본 3.1.1</td></tr>\n<tr><td>사업장</td><td>드롭다운(전체/개별)</td><td>사업장 차원 필터(채번 범위와 동일 단위)</td><td>§11.1-(2), §9</td></tr>\n<tr><td>현금잔액</td><td>표시 전용 + [현금잔액] 버튼</td><td>조회일/종료일 현재 현금(101) 보조부 실시간 합계. 클릭 시 현금출납장 드릴다운</td><td>§25.4.1, 부록 통합본 11.4</td></tr>\n<tr><td>조건검색(다조건, R17)</td><td>버튼→검색 폼</td><td>금액(범위)·거래처·계정과목·적요/메모·부서/사원/프로젝트/현장·자금항목·전표번호·분개구분·체크펜·복사/이동전표·대차차액거래·카드계좌·업무용승용차 + 동일전표번호(상대전표) 보기. 조회 후 버튼 붉은색 표시</td><td>§11.1.1-(17), §25.4.1 상세조회</td></tr></tbody></table></div>\n<h5 class=\"doc-h doc-h5\">4.1.3 명세 그리드 — 입력 필드 전수</h5>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>컬럼</th><th>필수</th><th>입력·표시 규칙</th><th>검증</th><th>저장 필드</th><th>근거</th></tr></thead><tbody><tr><td>일(전표일자)</td><td>Y</td><td>월별 조회 시 일(day)만, 기간 조회 시 범위 내 일자. 요일 색상(평일 검정/토 파랑/일·공휴일 빨강 — 공휴일 마스터). 당일 신규 <code>N</code>/수정 <code>U</code> 표식</td><td>마감기간(일마감/월마감) 포함 시 차단, 미래일자는 권한별 차단/경고(R7)</td><td><code>journalDate</code>(채번 키)</td><td>§25.4.1, §11.1.1-(7)</td></tr>\n<tr><td>전표번호</td><td>자동</td><td>일자별 001부터 자동 채번, <strong>수동수정 불가</strong>. 임시저장은 「미채번(예정)」 표시. 화면구성(Ctrl+A)에서 보임/숨김(기본 보임, 사용자별 저장). 외부표기 <code>YYYY-MM-DD-NNN</code></td><td>채번 충돌 시 <code>NUMBERING_CONFLICT</code> 재시도</td><td><code>journalNo</code></td><td>§11.1-(2), 부록 통합본 3.1.1·11.2</td></tr>\n<tr><td>구분(전표유형)</td><td>Y</td><td>1.출금/2.입금(현금 고정값)·3.차변/4.대변(대체)·5.결차/6.결대(결산). 현금 라인 위치로 입금/출금 자동 부여, 「구분」 컬럼에 대체/입금/출금 표시. 결차/결대는 결산기간(결산전표 유형)에서만 활성화</td><td>간편입력(1·2) 상대계정이 채권/채무·선수선급·부가세 계정이면 차단→대체전표 전환(<code>QUICK_ENTRY_INVALID_ACCOUNT</code>)</td><td><code>entryCode</code>(4.1.4 매핑)</td><td>§11.1-(1)(5), §25.4.1</td></tr>\n<tr><td>Code/계정과목</td><td>Y</td><td>F2/<code>C</code> 코드도움·계정명 입력 후 조회·코드 직접 입력. 코드체계: 세목 미사용 3자리/세목 사용 5자리(환경설정 공통값, <code>accountCodeLength</code> 가변 3/5/8/9 — N8)</td><td>계정 활성·사용가능기간(R9-①), 비활성/마감 계정 차단+추천 계정 리스트, <code>coa_control</code> 통제 발동</td><td><code>accountId</code></td><td>§25.4.1, §11.1.1-(9), §11.6.2-(2)</td></tr>\n<tr><td>Code/거래처</td><td>조건부</td><td>코드 또는 거래처명 입력, 표시여부 환경설정. <strong>빠른거래처 등록</strong>: <code>+</code>(또는 <code>00000000</code>) → 거래처명 입력 → Enter 등록, Ctrl+D 상세수정, Tab 확정</td><td>거래처 통제 6종(4.1.6), 자산/부채 계정 거래처 필수(N6 결정 4), 미등록 시 TEMP 거래처 생성 또는 정식등록 유도</td><td><code>customerVendorId</code></td><td>§25.4.1, §11.1.1-(8)</td></tr>\n<tr><td>차변/대변 금액</td><td>Y</td><td><code>+</code>키로 천원(000) 자동 입력. 입금/출금은 한 변만, 대체는 차/대 분리 입력</td><td>0/음수 차단, 라인 차/대 동시 입력 차단, 소수점 자릿수는 <code>TenantAccountingConfig</code>(M4: 통화별 자릿수·반올림) 검증</td><td><code>amount</code>(차/대 위치)</td><td>§25.4.1, §15, §11.1-(6)</td></tr>\n<tr><td>Code/적요</td><td>권장</td><td>F2/<code>C</code> 적요 코드도움(현금적요/대체적요 마스터) 또는 자유 입력. 표준 적요 템플릿·과거 적요 추천(R11). 특정 적요코드(06·07)는 부가세 부속서류 트리거</td><td>공란 시 경고(가독성·증빙매칭), 불명확 적요(「기타」·「처리」·「정산」) 경고, 세무 키워드(접대비·차량·기부금) 감지→세무 검토 태그</td><td><code>noteId</code>+텍스트</td><td>§25.4.1, §11.1.1-(11)</td></tr>\n<tr><td>관리</td><td>조건부</td><td>계정의 관리항목 설정(<code>coa_control</code>+<code>DimensionConfig</code>)에 따라 노출·필수. 라인 선택 시 우측 도킹 패널에서 입력(4.1.7)</td><td>필수 미입력 시 <code>AUX_REQUIRED</code>/<code>DIMENSION_REQUIRED</code> 차단</td><td>6차원+<code>journal_line_aux</code></td><td>§25.4.1, §11.1.1-(15)</td></tr>\n<tr><td>(헤더) 통화·환율</td><td>외화 시</td><td>통화·환율·외화금액·원화환산·발생/회수 환율(R3). 외화 채권/채무 회수·지급 시 환차손익 자동 계산·자동 라인 제안, 은행수수료 별도 계정 자동 분리 분개</td><td>환율 미적용 외화전표 저장 차단, 통화별 차대 균형 별도 검증</td><td><code>currency</code>/<code>fxRate</code>/<code>foreignAmount</code></td><td>§11.1.1-(3), §15</td></tr>\n<tr><td>(헤더) 4종 일자</td><td>전표일자 Y</td><td>전표일자(회계·채번)/증빙일자(부가세 연동)/세무귀속일/기표일자(시스템). 전표일자=증빙일자 권장, 불일치 허용(경고·검토 요청)</td><td>증빙일자&gt;전표일자 경고, 세무귀속월≠회계월 경고+세무검토 요청</td><td><code>journalDate</code>/<code>evidenceDate</code>/<code>taxAttributionDate</code>/<code>postedDate</code></td><td>§11.1.1-(7), §12.1</td></tr>\n<tr><td>(헤더) 첨부·참조문서</td><td>조건부</td><td>드래그&amp;드롭 첨부(파일당 기본 10MB, 정책 설정)·참조문서 필드(계약·품의·인보이스 번호). OCR·전자증빙 직접 연결, 라인 선택 시 우측 패널 즉시 조회</td><td>계정 증빙 필수 속성(<code>coa_control</code>) 검증, 바이러스 검사 격리(<code>EVIDENCE_QUARANTINED</code>)</td><td><code>JournalEvidenceLink</code></td><td>§11.1.1-(4), §11.12</td></tr>\n<tr><td>(헤더) 메모</td><td>N</td><td>메모 6유형 분리 저장: 전표/검토/승인/감사/세무/STAT 메모. 장부 적요와 분리(<code>note</code> 엔티티), 유형별 노출 권한·보고서 표시 통제</td><td>—</td><td><code>note.type</code></td><td>§11.1.1-(12)</td></tr></tbody></table></div>\n<h5 class=\"doc-h doc-h5\">4.1.4 전표 구분 코드(6종) → entryCode 매핑</h5>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>코드</th><th>구분</th><th>의미</th><th>journalType</th><th>entryCode</th><th>비고</th></tr></thead><tbody><tr><td>1</td><td>출금</td><td>현금 대변 고정, 차변 상대계정만 입력(약식분개)</td><td>PAYMENT</td><td><code>PAYMENT</code></td><td>현금 간편입력은 <strong>현금만</strong> 허용(S1·S4)</td></tr>\n<tr><td>2</td><td>입금</td><td>현금 차변 고정, 대변 상대계정만 입력</td><td>RECEIPT</td><td><code>RECEIPT</code></td><td>입금/출금/대체 동일 일자 시리즈 공유(통합 채번)</td></tr>\n<tr><td>3</td><td>차변</td><td>대체전표 차변 라인</td><td>TRANSFER</td><td><code>DR</code></td><td>미지정 시 차/대 금액 위치로 자동 판정</td></tr>\n<tr><td>4</td><td>대변</td><td>대체전표 대변 라인</td><td>TRANSFER</td><td><code>CR</code></td><td></td></tr>\n<tr><td>5</td><td>결차</td><td>결산차변 — 원가 대체·집계 분개 전용</td><td>CLOSING</td><td><code>CLOSING_DR</code></td><td>결차/결대 라인만 제조원가명세서·손익계산서 원가 흐름으로 인식(M2)</td></tr>\n<tr><td>6</td><td>결대</td><td>결산대변</td><td>CLOSING</td><td><code>CLOSING_CR</code></td><td>결산기간(결산전표 유형)에서만 활성화</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>확장 5종(R13): <code>ACCRUAL</code>(발생주의 조정)·<code>ADJUSTMENT</code>(수정)·<code>RECLASS</code>(재분류)·<code>TAX_ADJ</code>(세무조정)·<code>STAT_ADJ</code>(Group GAAP 조정). IFRS/Local/TAX/STAT 다중 장부 분리 조회는 병행원장(§11.6)·법인세표준계정(§11.6.2) 구조로 지원, 장부 차원 물리 분리는 §23-45 잔여 확인(§11.1.1-(13)).</li>\n<li>매입매출 연동 전표는 <code>PURCHASE</code>/<code>SALES</code>(SA-JNL-02), 역분개는 <code>REVERSAL</code>(부록 C 6.1).</li>\n</ul>\n<h5 class=\"doc-h doc-h5\">4.1.5 채번 — 더존식 일자별 일련번호 (§11.1-(2), 부록 통합본 11.2)</h5>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>규칙</th></tr></thead><tbody><tr><td>채번 단위</td><td>전표일자 단위로 <strong>매일 001부터 리셋</strong>. 유형코드·연월·한글유형은 번호에 미포함(유형은 「구분」 컬럼)</td></tr>\n<tr><td>식별키</td><td><code>journal_header</code> PK = <strong>(tenant_id, 전표일자, 전표번호)</strong> (+fiscal_year — 구현 화면 표기). 라인·증빙·보조부 FK = (tenant_id, 전표일자, 전표번호)(+line_no). 파티셔닝 tenant_id+전표일자(§12.3)</td></tr>\n<tr><td>외부표기</td><td><code>YYYY-MM-DD-NNN</code> (예: 2026-06-18-003) — 인쇄·연계·대사 시 사용</td></tr>\n<tr><td>멱등 채번</td><td>(tenant_id+사업장+전표일자) 범위 다음 일련번호. <code>JournalSequence</code>(lastSeq) 행 락. 충돌 시 <code>NUMBERING_CONFLICT</code> 재시도</td></tr>\n<tr><td>채번 시점</td><td>임시저장 = <code>tempId</code>·「예정」 표시, <strong>결재요청(submit) 시 정식 번호 확정</strong>(<code>journalApprovalMode=NONE</code>이면 저장 즉시 채번·기표)</td></tr>\n<tr><td>결번 관리</td><td>취소·삭제 전표 번호 재사용 금지 — <code>CANCELLED</code> 보존. 일자별 결번 리포트(취소/역분개 사유) 제공</td></tr>\n<tr><td>전표이동</td><td>대상 일자 기준 <strong>재채번</strong>. 마감된 일자로의 이동 차단</td></tr>\n<tr><td>번호 분리</td><td>일반전표 1~50000 / 매입매출전표 50001~99999 (source 구분 시퀀스, §25.4.2)</td></tr>\n<tr><td>화면 표시</td><td>분개 영역에 전표일자·전표번호 동시 표시</td></tr></tbody></table></div>\n<h5 class=\"doc-h doc-h5\">4.1.6 검증 규칙 (WJV-01 — 부록 통합본 WJV-01 검증 규칙 + §11.1.1 + §15)</h5>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>레벨</th><th>항목</th><th>조건</th><th>처리</th></tr></thead><tbody><tr><td>차단</td><td>대차 불일치</td><td>전표번호 단위 Σ차변 ≠ Σ대변</td><td>저장·결재요청 불가. 차액전표보기(Shift+F10) 차액 라인 강조. 외화 전표는 통화별 균형 추가 검증(R3·R10-③)</td></tr>\n<tr><td>차단</td><td>마감기간 입력</td><td>전표일자가 일마감·월마감·결산마감 기간 포함</td><td>입력·수정·삭제 불가(<code>CLOSING_LOCKED</code>). 마감해제 또는 조정전표(ADJUSTED)</td></tr>\n<tr><td>차단</td><td>필수 관리항목/차원 미입력</td><td><code>coa_control</code>·DimensionConfig 필수(사업장 등)·자금/어음 관리항목 누락</td><td><code>AUX_REQUIRED</code>/<code>DIMENSION_REQUIRED</code></td></tr>\n<tr><td>차단</td><td>비활성/마감 계정 · 기간 외 계정</td><td>사용중지·결산확정 계정, 사용가능기간 외(R9-①)</td><td>입력 불가 + 추천 계정 리스트 표시</td></tr>\n<tr><td>차단</td><td>간편입력 부적격 계정</td><td>현금 간편입력 상대계정이 채권/채무·선수선급·부가세 계정</td><td><code>QUICK_ENTRY_INVALID_ACCOUNT</code> — 대체전표/매입·매출전표 유도</td></tr>\n<tr><td>차단</td><td>거래처 통제 ①②</td><td>채권계정×공급업체 / 채무계정×고객</td><td>차단(R8)</td></tr>\n<tr><td>차단</td><td>거래처 통제 ③</td><td>휴폐업·사용중지 거래처</td><td>차단(국세청 사업자 상태 연계 §8.4)</td></tr>\n<tr><td>차단</td><td>금액 0/음수·차대 동시 입력</td><td>라인 단위</td><td>저장 차단(§15)</td></tr>\n<tr><td>차단</td><td>환율 미적용 외화전표</td><td>통화 지정+환율 누락</td><td>저장 차단(§15)</td></tr>\n<tr><td>차단</td><td>기표 전표 직접 수정</td><td><code>POSTED</code> 이후</td><td><code>POSTED_IMMUTABLE</code> — 역분개/조정전표 안내</td></tr>\n<tr><td>차단</td><td>동일 카드승인건 다중 연결</td><td><code>sameEvidenceKey</code>(카드 승인번호) 기연결</td><td>차단 — 증빙 중복 사용 방지(R16-②)</td></tr>\n<tr><td>경고</td><td>적요 미입력·불명확 적요</td><td>공란 또는 「기타/처리/정산」류</td><td>저장 허용+경고(R11)</td></tr>\n<tr><td>경고</td><td>미등록 거래처</td><td>코드 없이 상호만 입력 / 채권채무 계정 거래처 공란</td><td>경고 + 빠른등록/TEMP 거래처 유도(R8-④), 사업자번호 중복 경고(R8-⑤)</td></tr>\n<tr><td>경고</td><td>거래처별 허용계정 위반</td><td>정책에 따라 경고/차단(R8-⑥)</td><td></td></tr>\n<tr><td>경고</td><td>계정-거래처유형/부서/프로젝트 조합</td><td>R9-②~④ 위반(예: 외상매출금=고객만, 프로젝트 비용계정은 프로젝트 필수)</td><td>정책별 경고/차단</td></tr>\n<tr><td>경고</td><td>중복 전표 의심</td><td>날짜+금액+거래처+계정+적요 유사도(R14), 증빙 키 일치 시 <strong>강한 경고</strong>(Duplicate Invoice Check)</td><td>사용자 확인, 정상 반복거래는 예외 메모 허용</td></tr>\n<tr><td>경고</td><td>4종 일자 교차</td><td>증빙일자&gt;전표일자 / 세무귀속월≠회계월</td><td>경고 / 경고+세무검토 요청(R7)</td></tr>\n<tr><td>알림</td><td>선수금/선급금 상계 검토</td><td>외상매출금 회수 시 선수금 잔액, 외상매입금 지불 시 선급금 잔액 존재</td><td>「상계 검토」 알림 + 대체 분개 제안(R5)</td></tr>\n<tr><td>정상</td><td>저장·채번 완료</td><td>대차 일치+마감 외+필수 충족</td><td>DRAFT 임시저장 또는 결재요청 시 정식 채번, <code>DataChangeLog</code> 기록</td></tr></tbody></table></div>\n<h5 class=\"doc-h doc-h5\">4.1.7 우측 도킹 패널 — 관리항목 입력 (WJV-02, R15)</h5>\n<ul class=\"doc-list\">\n<li>관리항목 입력은 팝업 대신 <strong>우측 도킹 패널(한 화면)</strong> 기본: 라인 선택 시 해당 계정의 관리항목(6 관리차원·자금·차량·카드·증빙)이 패널에 표시되고 그 자리에서 입력. 복잡 입력(어음 상세 등)만 보조 팝업 유지(§11.1.1-(15)).</li>\n<li>탭 구성(부록 통합본 4장 WJV-02): <strong>관리차원</strong>(사업장*·코스트센터·부서·프로젝트·현장·사원 — <code>DimensionConfig</code>가 노출/필수 결정) / <strong>자금</strong>(받을어음·지급어음·차입금 — AUX 보조부, 상태머신 별도) / <strong>차량</strong>(업무용승용차 — 운행기록·세무 한도 연계) / <strong>카드</strong>(카드계좌 — 카드 보조부·매입원장·공제구분 연계) / <strong>증빙</strong>.</li>\n<li><strong>법인세조정 계정의 관리계정 설정</strong>: 접대비·감가상각·업무용승용차 등 세무조정 대상 계정에 관리항목(차량·사원·증빙유형)을 연결 — 세무조정 계산(§11.5) 기초자료를 입력 시점에 확보(R15).</li>\n<li>세금계산서 교부 후 카드결제 건은 세금계산서 기준으로 한 번만 매입세액 공제, 카드결제는 결제수단만(이중공제 방지, R16-④, 부록 통합본 4.3).</li>\n<li>관리항목 마스터 등록·수정은 통합 관리 화면 WJV-07(P01 SA-BAS-07 영역)에서 수행 — 본 화면은 <strong>선택</strong>만(부록 통합본 4.5).</li>\n</ul>\n<h5 class=\"doc-h doc-h5\">4.1.8 기능 — 툴바·더보기·액션바 (§25.4.1 기능 + 부록 통합본 3.4·7~9장)</h5>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>분류</th><th>기능</th><th>동작 · 제약</th></tr></thead><tbody><tr><td>툴바</td><td>차액전표보기(Shift+F10)</td><td>대차차액 발생 전표 조회·차액 라인 강조</td></tr>\n<tr><td>툴바</td><td>행고정/해제</td><td>그리드 행 고정</td></tr>\n<tr><td>툴바</td><td>자동전표검증</td><td>현재 회계기간 기준 [신용카드]·[현금영수증]·[통장]에서 전송된 전표 중 '전표확정' 아닌 건 검증</td></tr>\n<tr><td>툴바</td><td>데이터 정렬</td><td>입력순/날짜순/거래처코드순/계정코드순/계정과목명순</td></tr>\n<tr><td>더보기</td><td>전표이동(Ctrl+M)</td><td>지정일자로 이동(대상 일자 재채번). <strong>자금(어음)·일마감·계좌관리·증빙·자동전표 데이터 이동 불가</strong></td></tr>\n<tr><td>더보기</td><td>전표복사(F4)</td><td>자금관리 항목 있으면 관리항목만 제외하고 복사</td></tr>\n<tr><td>더보기</td><td>어음등록</td><td>지급어음: 수령일·어음종류(1.어음/2.당좌/3.가계/4.전자)·금융기관·시작어음번호·매수·전자어음 일괄등록·편집</td></tr>\n<tr><td>더보기</td><td>중복전표검색(Shift+F7)</td><td>일자/유형/계정/거래처/금액 중 선택 조합</td></tr>\n<tr><td>더보기</td><td>분개설정</td><td>금액자동분개 0.부/1.여, 차·대변 변환 0.부/1.여, 거래처코드 복사 0.부/1.여</td></tr>\n<tr><td>더보기</td><td>화면구성(Ctrl+A)</td><td>전표번호보기/기본화면구성/자동분개설정. <strong>열 순서 사용자 재배열·저장(R1)</strong> — 프리셋 「거래처 우선」·「구분 우선」 2종</td></tr>\n<tr><td>더보기</td><td>자동분개 일괄검색(Shift+F6)</td><td>회계·인사·물류 모듈 전표처리 데이터 일괄 검색·삭제</td></tr>\n<tr><td>더보기</td><td>일마감</td><td>마감일자 이전 데이터 수정·삭제·입력 불가(전표 상태머신 잠금)</td></tr>\n<tr><td>더보기</td><td>코드변환(Shift+F3)</td><td>거래처·계정과목·사원·부서·현장·프로젝트·적요코드 변환. <strong>자금항목(당좌·받을어음·지급어음·차입금·미불관리) 데이터 변환 제외</strong></td></tr>\n<tr><td>액션바</td><td>일괄적용</td><td>구분/거래처/적요명 일괄 채움</td></tr>\n<tr><td>액션바</td><td>전표라인삽입(Insert)</td><td>같은 전표번호로 윗라인 빈 라인 추가</td></tr>\n<tr><td>액션바</td><td>전표묶기(F7)</td><td>다른 번호 전표를 같은 번호로 묶기/분리·순서 조정, 묶기 후 차대 재확인</td></tr>\n<tr><td>액션바</td><td>인쇄(F9)·삭제(F5)</td><td>마감·승인 전표 삭제 제한. 관리항목·자금·증빙 연결 전표는 보조부 상태 함께 정리</td></tr>\n<tr><td>스마트 입력</td><td>자주 쓰는 계정·연상검색·자동분개 추천·템플릿 반복</td><td>사용 빈도 즐겨찾기·초성/영문/코드 연상검색·과거 거래 이력 기반 상대계정/분개 추천(ON/OFF 토글, 제안만 — 휴먼인더루프)·JV-06 템플릿(R2·N1)</td></tr>\n<tr><td>차대 자동화</td><td>자동 상대계정·자동 균형</td><td>거래처·계정·전표유형 기반 상대계정 제안, 마지막 라인 차액 자동 입력 제안, 차원별 균형 검증(정책 옵션)(R10). 상대계정은 코드 직접 입력(F3) 기본 + 선택 분개 일괄 변경(§11.1-(1) S7)</td></tr>\n<tr><td>대량 입력</td><td>JV-08 대량 업로드</td><td>외부 기장자료 매핑·대량 엑셀 업로드·일괄 상대계정 변경·전체 미리보기(양식 검증·오류행 리포트, §11.1-(4), 부록 C 6.4)</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>단축키는 권한·상태(마감 잠금)에 따라 실행 제한, 동일한 API 권한·마감·감사 검증 경유(부록 통합본 3.4).</li>\n</ul>\n<h5 class=\"doc-h doc-h5\">4.1.9 승인 워크플로우 — 회사별 옵션 (N3, §11.1-(7))</h5>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th><code>journalApprovalMode</code></th><th>흐름</th><th>기본값 가이드</th></tr></thead><tbody><tr><td><code>REQUIRED</code></td><td>작성→결재요청(채번)→승인(SOD)→기표. 결재선·전결/대결/위임·결재함은 부록 C 7장 준용</td><td>자가 기장(TENANT_LED)·GTM 버전 권장</td></tr>\n<tr><td><code>OPTIONAL</code></td><td>작성자가 결재 생략 가능, 특정 유형만 결재</td><td>—</td></tr>\n<tr><td><code>NONE</code></td><td>결재 없이 저장 즉시 기표 가능</td><td>기장대행(OPERATOR_LED — BK_REVIEWER 내부 검토로 품질 통제)</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>결재 생략 모드에서도 유지: ① 채번·상태 전이·<code>DataChangeLog</code> 감사, ② 마감·신고 전송·마감해제의 승인 게이트(전표 결재와 별개, §11.9·§21.4), ③ 이상거래 탐지(§11.7)·중복 검증. <strong>전표 단위 결재=옵션, 기간·신고 단위 통제=필수</strong>. 회사별 기본값 확정은 §23-50.</li>\n<li>OPERATOR_LED 고객 입력 전표: <code>CLIENT_SUBMITTED</code>→<code>REVIEWING</code>(검토자 보정 가능, 원입력값 이력 보존)→<code>PENDING_APPROVAL</code>→승인·기표. 검토 반려는 고객포털에 사유 표시(부록 C 6.7).</li>\n</ul>\n<p>---</p>\n<h4 class=\"doc-h doc-h4\">4.2 SA-JNL-02 매입매출전표입력 (WPV-01) — 1차</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 부가세 신고 관련 매입매출 거래 입력 단일 화면. 한 전표가 <strong>세무 신고자료(상단부)</strong> 와 <strong>재무회계 분개(하단부)</strong> 를 동시 생성하는 <strong>2계층 구조</strong>(§25.4.2, 25.4.2.0).</li>\n<li><strong>식별·상태·API</strong>: 복합키 (tenant_id, fiscal_year, journal_date, journal_no), 번호 <strong>50001~99999</strong>(일반전표 1~50000과 분리), 더존식 일자단위 채번·수동수정 불가. 상태 DRAFT→CLIENT_SUBMITTED→REVIEWING→PENDING_APPROVAL→APPROVED→POSTED→CLOSED. API <code>GET /api/journals?source=PURCHASE_SALE&amp;fiscalYear&amp;period&amp;taxType</code> · <code>POST /api/journals</code>(journalType=PURCHASE_SALE) · <code>PUT /api/journals/{id}</code> · <code>POST /api/journals/{id}/auto-line</code>. 권한 <code>tenant:journal:write</code>·<code>operator:journal:review</code>(§25.4.2 화면 골격·식별).</li>\n<li><strong>업무흐름 5단계</strong>: ① 기간·유형 조회 → ② 상단 세무헤더 입력 → ③ 부가세 자동라인 생성 → ④ 하단 분개라인 생성·보정 → ⑤ 검증·저장. 보조 흐름: 전자발행·더보기(복수거래 등)·홈택스 엑셀 업로드(§25.4.2 업무흐름).</li>\n</ul>\n<h5 class=\"doc-h doc-h5\">4.2.1 2계층 화면 골격 (25.4.2.0)</h5>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>계층</th><th>입력 내용</th><th>반영 산출물</th></tr></thead><tbody><tr><td>상단부(세무헤더)</td><td>일자(N/U)·거래처/사업자등록번호·<strong>유형(과세유형)</strong>·품명·수량·단가·공급가액·부가세·전자</td><td>[부가가치세신고서]·[세금계산서합계표]/[계산서합계표]·[매입매출장]·[신용카드매출전표발행집계표]·[공제받지못할매입세액명세서]</td></tr>\n<tr><td>하단부(분개라인)</td><td>구분(차/대)·계정과목·차변/대변 금액·거래처·적요·관리(6차원+자금)</td><td>[분개장]·[계정별원장]·[총계정원장]·재무제표</td></tr></tbody></table></div>\n<h5 class=\"doc-h doc-h5\">4.2.2 조회 영역 (25.4.2.1)</h5>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>입력 칸</th><th>동작</th></tr></thead><tbody><tr><td>탭① 전체/유형별</td><td>전체=모든 과세유형 한 그리드. 유형별=빠른부가세 입력설정의 <code>quickTaxTypeFilter[]</code> 선택 유형만</td></tr>\n<tr><td>탭② 기간/월별</td><td>월별=회계월 단위(월 컬럼 숨김) / 기간=from~to(월 컬럼 표시). `periodMode: MONTH</td></tr>\n<tr><td>일자(N/U)</td><td>요일 색상 + 당일 신규 N/수정 U 표식(<code>rowFlag</code>)</td></tr>\n<tr><td>조건검색</td><td>기간/월·유형·거래처·계정·금액범위·적요·전자상태 조합(<code>JournalSearchQuery</code>, 25.4.2.7)</td></tr></tbody></table></div>\n<h5 class=\"doc-h doc-h5\">4.2.3 상단부(세무헤더) 입력 필드 (25.4.2.2)</h5>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>필수</th><th>입력·검증 규칙</th></tr></thead><tbody><tr><td>거래처/사업자등록번호</td><td>Y</td><td>합계표 추출 기준(집계 키). <strong>사업자등록번호 누락 시 합계표 마감 오류 — 차단</strong>. 빠른거래처 등록(<code>+</code>: 구분·사업자번호)</td></tr>\n<tr><td>유형(과세유형)</td><td>Y</td><td>매출(빨강) 11~25 / 매입(파랑) 51~64. 세율·증빙·부가세 표시 여부 결정 — <code>taxType</code> 마스터 = <strong>단일 진실원</strong></td></tr>\n<tr><td>품명·수량·단가</td><td>품명 Y</td><td>2개 이상 품목은 더보기 '복수거래'(최대 99개). 수량×단가 → 공급가액·부가세 자동계산. 품명 마스터(F2/C 품명도움)</td></tr>\n<tr><td>공급가액/부가세</td><td>Y</td><td>직접 입력 가능. 영세·면세는 부가세 미표시. 단수 차이 직접 수정 가능. 0원 전자세금계산서: 복수거래 +1원/-1원 합계 0원, 전자 '1.전자입력'·분개 '0.분개없음'</td></tr>\n<tr><td>전자</td><td>조건부</td><td>발행 시 공란→액션바 [전자발행], 수기 수취분 '1.전자입력'(합계표 전자란 반영). <code>etax_status</code> 상태머신(4.2.7)</td></tr></tbody></table></div>\n<p><strong>과세유형 코드 — 매출유형(11~25, 빨강)</strong> (25.4.2.2):</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>코드</th><th>명칭</th><th>거래증빙</th><th>세율</th><th>비고</th></tr></thead><tbody><tr><td>11</td><td>과세</td><td>세금계산서</td><td>10%</td><td>일반 과세 매출(전자/종이)</td></tr>\n<tr><td>12</td><td>영세</td><td>영세율세금계산서</td><td>0%</td><td>내국신용장·구매확인서 등</td></tr>\n<tr><td>13</td><td>면세</td><td>계산서</td><td>면세</td><td>면세 재화·용역</td></tr>\n<tr><td>14</td><td>건별</td><td>영수증·금전등록기</td><td>10%</td><td>증빙없는 과세매출. 공급대가 입력 시 공급가액·부가세 자동 구분</td></tr>\n<tr><td>15</td><td>종합</td><td>영수증</td><td>10%</td><td>부가세 자동구분 안됨 → 직접입력</td></tr>\n<tr><td>16</td><td>수출</td><td>직수출(증빙없음)</td><td>0%</td><td>직수출 영세율</td></tr>\n<tr><td>17</td><td>카과</td><td>신용카드</td><td>10%</td><td>→신용카드매출전표발행집계표</td></tr>\n<tr><td>18</td><td>카면</td><td>신용카드</td><td>면세</td><td></td></tr>\n<tr><td>19</td><td>카영</td><td>신용카드</td><td>0%</td><td></td></tr>\n<tr><td>20</td><td>면건</td><td>면세영수증</td><td>면세</td><td>증빙없는 면세매출</td></tr>\n<tr><td>21</td><td>전자</td><td>전자화폐</td><td>10%</td><td></td></tr>\n<tr><td>22</td><td>현과</td><td>현금영수증</td><td>10%</td><td></td></tr>\n<tr><td>23</td><td>현면</td><td>현금영수증</td><td>면세</td><td></td></tr>\n<tr><td>24</td><td>현영</td><td>현금영수증</td><td>0%</td><td></td></tr>\n<tr><td>25</td><td>매세</td><td>매입자발행세금계산서</td><td>10%</td><td>환경설정 '과세유형추가 사용함' 시 표시</td></tr></tbody></table></div>\n<p><strong>매입유형(51~64, 파랑)</strong>:</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>코드</th><th>명칭</th><th>거래증빙</th><th>세율</th><th>비고</th></tr></thead><tbody><tr><td>51</td><td>과세</td><td>세금계산서</td><td>10%</td><td>하단 계정이 고정자산이면 신고서 일반매입→<strong>고정자산매입</strong> 분류 변경</td></tr>\n<tr><td>52</td><td>영세</td><td>영세율세금계산서</td><td>0%</td><td></td></tr>\n<tr><td>53</td><td>면세</td><td>계산서</td><td>면세</td><td>의제매입 공제 트리거 가능</td></tr>\n<tr><td>54</td><td>불공</td><td>세금계산서</td><td>10%</td><td><strong>불공제사유 선택</strong> → [공제받지못할매입세액명세서] 반영. 분개는 세액을 비용/자산 원가에 포함</td></tr>\n<tr><td>55</td><td>수입</td><td>수입세금계산서</td><td>0%</td><td>공급가액=과세표준. 수입납부유예 입력 가능</td></tr>\n<tr><td>56</td><td>금전</td><td>(폐지)</td><td>10%</td><td>폐지 유형</td></tr>\n<tr><td>57</td><td>카과</td><td>신용카드</td><td>10%</td><td>공제. 고정자산 계정 시 분류 변경</td></tr>\n<tr><td>58</td><td>카면</td><td>신용카드</td><td>면세</td><td></td></tr>\n<tr><td>59</td><td>카영</td><td>신용카드</td><td>0%</td><td></td></tr>\n<tr><td>60</td><td>면건</td><td>면세영수증</td><td>면세</td><td>의제매입 트리거 가능</td></tr>\n<tr><td>61</td><td>현과</td><td>현금영수증</td><td>10%</td><td>승인번호 입력은 환경설정 '사용함' 시. 고정자산 시 분류 변경</td></tr>\n<tr><td>62</td><td>현면</td><td>현금영수증</td><td>면세</td><td>의제매입 트리거 가능</td></tr>\n<tr><td>63</td><td>복지</td><td>복지카드</td><td>10%</td><td>환경설정 '사용함' 시 표시</td></tr>\n<tr><td>64</td><td>매세</td><td>매입자발행세금계산서</td><td>10%</td><td></td></tr></tbody></table></div>\n<p><strong>과세유형→신고서 라우팅·분기 규칙 3종</strong> (25.4.2.2):</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>유형군</th><th>코드</th><th>반영 신고서·부속서류</th></tr></thead><tbody><tr><td>세금계산서 과세/영세</td><td>11·12 / 51·52·55</td><td>부가세신고서 과세·영세 / 세금계산서합계표</td></tr>\n<tr><td>계산서 면세</td><td>13 / 53</td><td>부가세신고서 면세수입금액 / 계산서합계표</td></tr>\n<tr><td>신용카드</td><td>17·18·19 / 57·58·59·63</td><td>발행집계표(매출) / 수령명세서(매입)</td></tr>\n<tr><td>현금영수증</td><td>22·23·24 / 61·62</td><td>부가세신고서 현금영수증 / 발행·수령 집계</td></tr>\n<tr><td>불공제</td><td>54</td><td>공제받지못할매입세액명세서 + 사유 코드</td></tr>\n<tr><td>건별·종합·면건</td><td>14·15·20 / 60</td><td>부가세신고서 기타</td></tr>\n<tr><td>고정자산 분기</td><td>51·57·61 + 고정자산 계정</td><td>일반매입 → <strong>고정자산매입</strong> 자동 분류 변경</td></tr>\n<tr><td>의제·재활용</td><td>53·58·60·62 + 원재료 계정 + 특수 적요</td><td>의제매입세액공제신고서 / 재활용폐자원세액공제신고서</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>분기 규칙: ① 과세유형 자체 = 1차 라우팅 키, ② 계정 기반 분기(고정자산), ③ 적요 기반 분기(의제/재활용 — 면세유형+원재료 계정+특수 적요 3조건). 매출 세금계산서 발급 후 카드결제 건은 과세유형 11 유지·17 추가 입력 금지(<strong>매출 중복신고 방지</strong>, 25.4.2.2 유형 17).</li>\n</ul>\n<h5 class=\"doc-h doc-h5\">4.2.4 부가세 자동라인 생성 (25.4.2.3)</h5>\n<p>상단 <strong>과세유형(부가세 계정) 입력 시에만</strong> 생성(BK 핵심개념 — 일반전표는 자동라인 비대상, §11.1-(3)). <code>vat_account_rule</code>+자동라인 생성기가 처리, 하단에 <code>자동</code> 표식·잠금.</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>구분</th><th>부가세 자동라인</th><th>채권/채무 라인 금액</th></tr></thead><tbody><tr><td>매출 과세(11·14·17·22 등)</td><td>대변 <strong>부가세예수금</strong> = 세액</td><td>외상매출금/현금/카드채권 = 공급대가</td></tr>\n<tr><td>매입 과세(51·57·61 등)</td><td>차변 <strong>부가세대급금</strong> = 세액</td><td>외상매입금/미지급금/카드채무 = 공급대가</td></tr>\n<tr><td>영세·면세(12·13·52·53 등)</td><td>생성 안 함</td><td>채권/채무 = 공급가액</td></tr>\n<tr><td>불공(54)</td><td>생성 안 함(불공제)</td><td>비용·자산에 세액 포함(공급대가)</td></tr></tbody></table></div>\n<h5 class=\"doc-h doc-h5\">4.2.5 하단부(분개라인)·자동분개 엔진 (25.4.2.4)</h5>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>규칙</th></tr></thead><tbody><tr><td>분개유형</td><td>0.분개없음/1.현금/2.외상/3.혼합/4.카드/5~7.외상추가1·2·3 — 자동분개 엔진 룰 입력값</td></tr>\n<tr><td>구분·계정·차/대</td><td>자동분개 라인 자동 생성, 혼합(3)만 수기 보정. 부가세예수금/대급금 라인 <code>자동</code> 잠금. 2.외상은 매출채권/매입채무 계정 수정 불가</td></tr>\n<tr><td>거래처·적요</td><td>상단 거래처 자동 승계. 적요는 의제매입·재활용 부속서류 분기 트리거 겸용</td></tr>\n<tr><td>관리</td><td>6 관리차원(EMPLOYEE/DEPARTMENT/SITE/PROJECT+사업장·코스트센터, <code>DimensionConfig</code>) + 자금(AUX) + 주류 여부(25.4.2.8)</td></tr></tbody></table></div>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>분개유형</th><th>자동분개 동작</th></tr></thead><tbody><tr><td>0 분개없음</td><td>하단 라인 미생성(세무자료만) — 0원 세금계산서 등</td></tr>\n<tr><td>1 현금</td><td>상대계정 현금(매출=현금/매출, 매입=매입/현금)</td></tr>\n<tr><td>2 외상</td><td>외상매출금/외상매입금 자동분개, 해당 계정 수정 불가</td></tr>\n<tr><td>3 혼합</td><td>차/대 수기 보정(현금+외상 혼합)</td></tr>\n<tr><td>4 카드</td><td>카드채권/카드채무 기본계정 자동분개</td></tr>\n<tr><td>5~7 외상추가</td><td>매출/매입 추가 등록계정 사용</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>자동분개 기본계정(더보기 '분개 계정과목 설정'): 일반(매출/매출채권·매입/매입채무), 신용카드(카드채권/카드채무), 추가계정(5~7). 설정 옵션: 과거 거래내역 자동분개 / 상대계정 차액 자동반영 / 카드유형 거래처 복사 / 카드 입력방식(공급대가·공급가액) / 카드매입공제 / 봉사료 사용여부 / 전자세금계산서 거래처코드 변경여부.</li>\n</ul>\n<h5 class=\"doc-h doc-h5\">4.2.6 검증·저장 (25.4.2.5)</h5>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>규칙</th><th>내용</th><th>레벨</th></tr></thead><tbody><tr><td>과세유형 정확성</td><td>신고서·부속서류 반영 기준 — <code>taxType</code> 정확 선택 필수</td><td>차단</td></tr>\n<tr><td>부가세 자동라인</td><td>과세유형 입력 시에만 생성(영세·면세 미생성)</td><td>반영</td></tr>\n<tr><td>상·하단 금액 일치</td><td>불일치 차액은 부가세신고서 '과표/수입금액제외' 자동반영</td><td>검토</td></tr>\n<tr><td>사업자등록번호</td><td>누락 시 합계표 마감 오류</td><td>차단</td></tr>\n<tr><td>자동전표검증</td><td>사업자번호 일치·면세 매출유형 점검, 전송 미확정 전표 검증</td><td>보완</td></tr>\n<tr><td>전자 상태머신</td><td>발행/전송/신고상태 상태머신 통제</td><td>반영</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>오류 예방 6종: 합계표 마감 오류(사업자번호)→저장 시 필수 검증·빠른등록 / 과세유형 오선택(카과↔현과)→색상+유형별 탭 / 매출 중복신고(11 발급 후 17 추가)→결제수단만 분개 / 고정자산 분류 누락→자동 분류 변경 확인 / 영세·면세 자동라인 미생성=정상 / 예정누락 입력월 오류→1~3·7~9월만 허용.</li>\n<li>실무 체크리스트 10항목(25.4.2.5)을 검토 툴팁·저장 전 점검 패널로 제공.</li>\n</ul>\n<h5 class=\"doc-h doc-h5\">4.2.7 전자(세금)계산서 발행·전송 — 비고=발행정보 (25.4.2.6)</h5>\n<ul class=\"doc-list\">\n<li>전자 값: 공란(발행 가능·미발행)/1.전자입력(수취 전자분 수기 입력)/전자발행. 과세기간 종료 다음달 11일 기준 전자/전자외 구분.</li>\n<li><code>etax_status</code> 상태머신: 발행/전송 결과=전자입력·전자발행·국세청성공·전송실패·역발행 / 발행상태=확인요청·확인·발행대상·발행요청 / 신고상태=미전송·전송성공.</li>\n<li>[전자발행] 대상: 매출 11·12·13 / 매입 역발행 51·52·53·54. 기능: 화면구성·휴폐업조회·전자발행·발행취소(<strong>당일 '확인요청' 전표만</strong>)·이메일등록·발행옵션. 수량·단가 소수점 2자리(3자리 이상 반올림). 전송결과=외부 전자세금계산서 서비스·국세청 반영.</li>\n<li><strong>비고=발행 메타정보</strong>: 신고 집계·분개 <strong>미반영</strong>(문서 인쇄 전용) — 상단 그리드가 아니라 <strong>전자발행 모달 &gt; 발행정보 &gt; 비고</strong>에서 입력. 비고·영수/청구·이메일·책(일련)번호·사업자단위과세는 양식 최상단 입력→본문 읽기 전용 연동. 승인번호는 미발급(발행 시 국세청 자동 채번). 복수거래 품목별 비고 열 지원. 수기 전자입력분 내부 메모는 하단 적요 사용. 저장: <code>etax_issue.remark</code>.</li>\n</ul>\n<h5 class=\"doc-h doc-h5\">4.2.8 액션바·툴바·더보기 22항목·복수거래 (25.4.2.7)</h5>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>분류</th><th>기능</th></tr></thead><tbody><tr><td>액션바</td><td>코드변환(변환 전 백업·미리보기) · 일괄적용 · 일괄분개(분개없음 0 전표 일괄 자동분개) · <strong>전자발행</strong> · 전표복사/이동(자금(차량)관리·일마감·외부전송 데이터 이동불가) · 인쇄 · 삭제(마감·전송분 차단·확인 모달) · 체크펜</td></tr>\n<tr><td>툴바</td><td><strong>자동전표검증</strong>(ATX-02/03 전송 미확정 전표 + 사업자번호 일치·면세사업자 매출유형 검증) · 행/열 고정 · 데이터정렬 · <strong>중복전표검색</strong>(일자/유형/계정/거래처/공급가액/부가세/공급대가/국세청승인번호) · 전자세금계산서조회 · 전송결과 · 계산기 · 이용가이드</td></tr></tbody></table></div>\n<p>더보기(기능모음) 22항목 전수: ① 거래처등록(빠른등록) ② 품명등록 ③ 어음등록 ④ <strong>복수거래</strong>(최대 99개, 인쇄 최대 4품목+'~외') ⑤ <strong>예정누락</strong>(확정신고기간 반영, <strong>1~3월·7~9월만 입력 가능</strong>) ⑥ <strong>수정세금계산서</strong>(수정사유 코드→음/양 발행, 원전표 추적 키 유지) ⑦ 전자입력(11·12·13·51~55 일괄 변경) ⑧ 수입납부유예입력(55만 → 신고서 '수출기업 수입납부유예') ⑨ 일마감 ⑩ 전표복사 ⑪ 전표이동 ⑫ 화면구성(거래처기준/품명기준) ⑬ 자동분개설정 ⑭ 차액분개 보기 ⑮ <strong>분개계정과목설정</strong>(기본·추가계정, 거래처코드 변경여부, 카드 입력방식, 카드매입공제, 봉사료) ⑯ 자동분개 일괄검색 ⑰ 주민번호 별표 설정 ⑱ <strong>세금계산서 인쇄</strong>(영수/청구·공급자란·'~외' 일괄·물류규격명·사업자단위과세·책(일련)번호·외상거래표시·전자 구분) ⑲ 국세청 신고여부 ⑳ 자료수집현황 바로가기 ㉑ 부가세 신고 요약 ㉒ <strong>엑셀 자료 반영</strong>(4.2.9).</p>\n<ul class=\"doc-list\">\n<li><strong>복수거래 팝업</strong>: 상단 품명 칸은 대표 품명 1줄 — 품목 2개 이상은 더보기&gt;복수거래 모달 줄 단위 입력(품명·규격·수량·단가·공급가액·부가세·비고, 수량×단가 자동). <strong>품목 합계=상단 공급가액·부가세 합계</strong> 일치 필수(불일치 검토). 적용 후 상단 「대표품명+~외」. 상세는 <code>MultiItemVoucherDetail</code> 보존(복사/이동 시 함께 처리). 0원 세금계산서는 +1/-1원 품목 구성(<code>ZeroAmountInvoiceHandler</code>).</li>\n</ul>\n<h5 class=\"doc-h doc-h5\">4.2.9 홈택스 엑셀 업로드·전표 자동생성 (25.4.2.9)</h5>\n<ul class=\"doc-list\">\n<li>취합 2경로: ① 홈택스 직접 연동(ATX-02~05 전표전송→자동전표검증→확정), ② <strong>홈택스 엑셀 업로드</strong>(더보기 ㉒): 다운로드→자료구분·기간 선택→업로드·미리보기(표준 서식 상이 시 '서식 내려받기')→컬럼 매핑→검증→일괄 전표 생성(50001~ 채번).</li>\n<li>컬럼 매핑: 작성일자→전표일자(채번 기준), 사업자등록번호→거래처(누락 시 오류), 상호→거래처명, 증빙종류+세액→<strong>taxType 자동 추정 후 보정</strong>(세금계산서+세액→11/51, 계산서→13/53, 카드→17/57, 현금영수증→22/61), 공급가액/세액(세율 정합 검증), 전자 발급여부→1.전자입력, 분개유형·계정은 자동분개 설정에 따름. 불공(54)·수입(55)·의제/재활용은 자동 확정 금지(보류 후 수동 확정).</li>\n<li>행 단위 판정 순서 7단계: ①매입/매출 구분(자사 기준) →②증빙 종류 →③세액 유무 →④taxType 확정 →⑤분개유형(세금계산서/계산서=2.외상, 카드=4, 현금영수증=1) →⑥부가세 자동라인 →⑦고정자산 분기.</li>\n<li>검증·중복방지: 사업자번호 누락/형식오류 행 제외(차단), <strong>중복 대조</strong>(일자·사업자번호·공급가액·세액·승인번호 — 직접 연동 수집분·기입력 전표 대조, <code>DuplicateVoucherGuard</code>), 합계 정합, 유형 보정 확인. 구현 단위: <code>HometaxExcelImportCommand</code>·<code>ExcelColumnMappingProfile</code>·<code>TaxTypeInferenceRule</code>·<code>BulkVoucherGenerateCommand</code>.</li>\n</ul>\n<p>---</p>\n<h4 class=\"doc-h doc-h4\">4.3 SA-ATX-01 수집정보등록 — 1차</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 자동전표에 필요한 전자세금계산서(계산서)·통장·현금영수증·신용카드 수집정보(인증서·계정·계좌)를 등록. 등록 정보로 매일 자동수집 + ScrappingBoard 실시간 수집. 인증서 이름·서명정보 암호화 보관(§25.5.1).</li>\n<li><strong>BK 구체화</strong>: tenant 단위 <strong>자격증명 볼트</strong>(인증서/홈택스 계정/은행계좌/카드 계정) KMS 암호화 저장(§8), 등록상태(정상/사용안함/접속불가) 모니터링, 수집 잡 스케줄러(매일 배치+수동 트리거) 연동.</li>\n</ul>\n<p><strong>입력 필드(증빙 유형별 탭, §25.5.1 전수)</strong>:</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>탭</th><th>입력 항목</th><th>규칙</th></tr></thead><tbody><tr><td>전자세금계산서/전자계산서</td><td>①인증서 등록(<code>+</code>, 홈택스 등록 인증서) ②저장매체/인증서 비밀번호 ③부서사용자 아이디·비밀번호(선택 — 홈택스 부서사용자 가입 시) ④<strong>복수거래 수집여부</strong>('여' 시 수집속도 저하) ⑤등록상태(정상/사용안함/접속불가) ⑥등록정보수정 ⑦삭제</td><td>접속불가 시 ScrappingBoard 오류확인·삭제 후 재등록. 삭제해도 기존 스크래핑 데이터 유지, 인증서 복원불가. 부서사용자 동시 다중 로그인 지원</td></tr>\n<tr><td>현금영수증/신용카드(매입)</td><td>①홈택스 아이디/비밀번호 ②등록정보 저장(수정·삭제)</td><td>수집 경로: 현금영수증 매입(세액공제 확인/변경)·매출(매출내역 조회)·사업용신용카드 매입(공제 확인/변경)</td></tr>\n<tr><td>통장(계좌)</td><td>①은행별 필수입력(은행 서비스 선가입) ②신규등록 ③계좌구분(기업=사업자번호/개인=주민번호 — 대표자 명의 사업용계좌는 개인) ④조회구분(빠른/간편조회) ⑤계좌번호/비밀번호 ⑥외화계좌등록 ⑦사이트 ID/PW(해당 은행만) ⑧통화코드 ⑨계좌메모</td><td>최초수집기간 이전 거래는 엑셀 업로드로 반영</td></tr>\n<tr><td>신용카드(매입)</td><td>①신규등록(카드사 선택) ②카드구분(법인/개인) ③카드번호 ④사이트 ID/PW(동일 카드사 다중카드 동일 계정 가능) ⑤카드메모</td><td>—</td></tr>\n<tr><td>여신금융협회(카드 매출)</td><td>①아이디/비밀번호 ②등록정보 저장</td><td>IP 차단 우려로 최초수집 4일 제한</td></tr>\n<tr><td>수집기간 안내</td><td>증빙별 최초수집기간/매일 수집기간 표</td><td>매입카드사 일반 6개월 등</td></tr></tbody></table></div>\n<p>---</p>\n<h4 class=\"doc-h doc-h4\">4.4 SA-ATX-02 전자세금계산서 — 1차</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 홈택스에서 전자세금계산서(매출·매입) 자동수집→분개 추천→확인·수정→<strong>SA-JNL-02 전송</strong>(§25.5.2).</li>\n<li><strong>조회조건</strong>: ①기간 ②구분(1.매출/2.매입) ③자료(1.국세청/2.엑셀) ④거래처(F2/C) ⑤전표상태(전체/확정가능/전표확정/확정제외/중복전표/미추천/삭제) ⑥조건검색(거래처·사업자/주민번호·대표자명·품명·공급가액·세액·업태/종목·차·대변계정·과세유형·전표상태·작업방법·체크확인).</li>\n</ul>\n<p><strong>상단내역(수집헤더) 필드</strong>:</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>규칙</th></tr></thead><tbody><tr><td>일자</td><td>작성·거래일자(발급/전송일자 가이드). 표식: <strong>세액확인</strong>(공급가액 10%와 세액 차이 2원 초과 &amp; 합산 원단위≠0)·<strong>수정</strong>(수정세금계산서)·<strong>지연</strong>(지연전송=발행 익일 초과/지연발급=작성월 익월 10일 초과)·수입납부유예·공급자(면세)·<strong>고정자산 확인</strong>(수선비·차량유지비·소모품비·사무용품비 300만원 이상 — 자산화 후보 알림)</td></tr>\n<tr><td>Code/거래처</td><td>사업자번호로 거래처 매칭, 미등록 시 자동 채번·자동 등록. 동일 사업자 2개 이상 시 첫 코드 주황색(F2/C 변경)</td></tr>\n<tr><td>유형</td><td>전송 시 SA-JNL-02 taxType. 매출(국세청 수집값 수정불가): 11·12. 매입(수정가능): 51·52·54(거래처·품명 분석 인식)·55. 12·52·55 수정불가. 54→51 변경 시 부가세대급금 자동생성, 51→54 변경 시 불공제사유 팝업+135 부가세대급금 제거 후 큰 금액 계정 합산. 일괄변경 지원</td></tr>\n<tr><td>품명</td><td>수집 품명 → 하단 적요 반영(수정 시 동시 수정, 일괄변경)</td></tr>\n<tr><td>공급가액/부가세/합계</td><td>수집값 수정불가</td></tr>\n<tr><td>차변/대변계정</td><td>거래처·품명 분석 추천 — 음영규칙: 흰색+추천=100% / 흰색+미추천=추천없음 / 주황+추천=51%↑ / 주황+미추천=50%↓. Shift+F7 추천계정 확인(전표확정 시 미적용)</td></tr>\n<tr><td>관리</td><td>사원·부서·현장·프로젝트·자금·주류(환경설정·계정과목별 관리항목 설정 필요, 일괄변경)</td></tr>\n<tr><td>전표상태</td><td>확정가능(전송가능)/전표확정(전송완료·변경불가, JNL-02에서 삭제 시 '삭제전표')/확정제외/<strong>중복전표</strong>(동일 일자·사업자번호·금액·과세유형 존재 — 전송 불가)/미추천('분개없음' 전송만)/삭제. 변경 룰: 확정가능↔확정제외, 삭제·중복→확정가능·확정제외, 미추천→확정제외. 커서 '1'=확정가능·'3'=전송제외, 일괄변경</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>하단분개내역</strong>: 구분/계정과목(F2/C)·차/대(상단 금액 반영·수정가능 — 상·하단 차액은 신고서 '과표/수입금액제외' 반영)·거래처·적요(상단 품명 동일)·사원/부서/현장/PJT/자금.</li>\n<li><strong>기능</strong>: 수집하러가기(ATX-10 연동, 작성/전송일자 기준 수동수집) · <strong>오류검증</strong>(유형검증오류[전자세금계산서에 13.면세 등]·사업자번호·상하단 합계 불일치·공급가액+세액≠합계·유형별 부가세 검증) · 더보기: ①<strong>전표전송</strong>(확정가능 '분개포함/분개없음', 중복전표는 승인번호만, 미추천 '분개없음', 대차차액 시 차액분개보기) ②자동분개시 과세유형 설정(차량유지비 '여'→54 불공[비영업소형승용차], 접대비 무조건 불공) ③전표전송설정(분개계정 자동반영: 동일=외상/현금=현금/그외=혼합; 수량·단가 전송 여부) ④주민번호 별표 ⑤<strong>가산세 계산</strong>(미발급·지연발급·지연수취·지연전송·미전송 — 수정세금계산서 제외) ⑥복수거래 ⑦부가세신고요약 ⑧불공제사유변경(54 일괄) ⑨매출/매입 엑셀서식 · 우클릭: 엑셀변환·계산기.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.5 SA-ATX-03 전자계산서 — 1차</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 홈택스 전자계산서(매출·매입, <strong>면세</strong>) 수집→추천→SA-JNL-02 전송(§25.5.3). ATX-02와 <strong>스테이징 구조 공유</strong>, 면세 분기만 상이.</li>\n<li>ATX-02 대비 차이점(전수): ① taxType=13(매출)/53(매입), <strong>부가세 자동라인 미생성</strong>(부가세 항목 없음 — 공급가액만, 수집값 수정불가) ② 매출 상·하단 차액은 부가세신고서 <strong>'면세수입금액 수입금액제외(83)'</strong> 반영 ③ 오류검증의 유형검증오류 예=전자계산서에 11.과세 ④ 의무발급·발급기한(익월 10일)·전송기한(발급 익일) 안내 ⑤ 표식은 고정자산 확인(300만원)·수정만 ⑥ 더보기: 전표전송·전표전송설정·주민번호 별표·복수거래·부가세신고요약·엑셀서식(가산세 계산·불공제사유 없음). 조회·거래처 매칭·추천 음영·전표상태 라이프사이클·일괄변경은 ATX-02와 동일.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.6 SA-ATX-04 신용카드 — 1차</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 매출(여신금융협회)·매입(국세청/카드사/화물복지) 카드자료 수집→추천→<strong>SA-JNL-01(3.일반)/SA-JNL-02(17·18·19/57·58·59·63) 라우팅 전송</strong>(§25.5.4).</li>\n</ul>\n<p><strong>매출 상단내역</strong>: ①기간 ②구분(1.매출) ③자료(1.여신금융협회/2.엑셀) ④승인일자·매입일자(승인=매출발생일/매입=카드사 VAN 매입일 — 전송일자는 '승인일자' 기준) ⑤카드 ⑥전표상태 ⑦조회(카드사명·품명·공급가액·세액·수수료·입금액·차대계정) ⑧Code/카드사([거래처등록] 카드탭 매칭, '카드사를 거래처명으로 일괄변경') ⑨Code/거래처(매출은 공란 기본, '거래처명을 품명으로 일괄변경') ⑩품명 ⑪<strong>유형</strong>(3.일반→JNL-01 / 17.카과·18.카면·19.카영→JNL-02, [발행집계표] 반영) ⑫공급가액/세액(<strong>17.카과=합계÷1.1</strong>, 3·18·19=부가세 포함) ⑬봉사료(매출 직접입력 — 합계−봉사료 후 ÷1.1) ⑭수수료/입금액(여신 제공 — '매출시 수수료 인식' 시 수수료 분개 생성/'입금시 인식' 시 제거) ⑮차대계정(추천 음영, F7) ⑯관리 ⑰전표상태.</p>\n<p><strong>매입 상단내역</strong>: ①기간 ②구분(2.매입) ③자료(1.국세청/2.카드사/3.화물복지/4~6.엑셀) ④카드 ⑤전표상태 ⑥조회 ⑦일자 — 표식: <strong>공급자확인</strong>(불공 사업자: 여객·철도)·공급자(면세)·<strong>고정자산 확인(300만원)</strong>·<strong>전자중복</strong>(이전년도 포함 [전자세금계산서] 동일 사업자 수집 이력 — 이중공제 검토)·외화승인금액확인 ⑧Code/거래처 ⑨구분(법인·일반·면세·간이 — 변경불가) ⑩국내외 ⑪봉사료(변경불가) ⑫<strong>국세청</strong>(1.국세청 시 공제/불공제 표시·수정불가 — 유형란 3.일반/57~59로 공제·불공제 전표처리) ⑬<strong>유형</strong>(3.일반→JNL-01 / 57·58·59·63→JNL-02, 57·63은 [수령명세서] 반영).</p>\n<ul class=\"doc-list\">\n<li><strong>중복전표 기준(원천별 상이)</strong>: 매출=JNL-01/02 동일일자·동일 합계금액 / 매입(일반전표)=일자·거래처(카드사)·금액 3조건 / 매입(매입매출전표)=일자·카드번호·금액·과세유형·사업자번호·카드거래처코드.</li>\n<li><strong>기능</strong>: 신용카드(매출)내역 수집(여신, 매입일자 기준 6개월 초과 불가, IP차단으로 최초·매일 4일) · 수집하러가기 · 오류검증 · 휴폐업조회 · 수집한 국세청 자료집계(분기·반기) · 더보기 15항목: 전표전송 / <strong>매출수수료분개 및 계정설정</strong>(과세/면세/간이 구분, 수수료 인식 시점, 계정 531·631·731·831 지급수수료) / <strong>채권계정카드사 설정</strong>(108 외상매출금·120 미수금·지급수수료 거래처를 카드사로 고정) / <strong>전표전송 설정</strong>(신규거래처 코드 생성, 분개유형 동일=외상·현금=현금·그외=혼합, <strong>일반전표 현금(101) 입금/출금 전송</strong> — WJV-01 통합 정책 정합) / 매출증빙병합(일자별/월별, 월별 31일=말일, 분리 가능) / 수집 카드사 정보 / 부가세신고요약 / 매출·매입 엑셀서식 / 데이터 엑셀변환 / <strong>자동분개시 과세유형 설정</strong>(국세청 공제→카과·불공제→일반, 차량유지비 '여', 접대비 항상 일반) / <strong>매입신용카드 거래처등록</strong>(카드사·카드번호 자동, 구분 1.신용/2.체크/3.직불/4.주류/5.화물, 결제계정 공란 시 253 미지급금 자동) / 세액변경(매입, '일반' 수정불가) / 공제유형별 집계.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.7 SA-ATX-05 현금영수증 — 1차</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 홈택스 현금영수증 매출·매입 수집→추천→JNL-01(3.일반)/JNL-02(22·23·24/61·62) 라우팅 전송(§25.5.5).</li>\n<li><strong>매출</strong>: 자료구분(1.국세청 매출내역조회/2.엑셀), 일자(승인일자), Code/거래처(최초 수집 시 확인불가→공란, F2/C 선택), 품명(추천·직접입력, 하단 적요 동기화), 공급가액/세액/봉사료/합계(수집값 수정불가), <strong>유형</strong>(3.일반→JNL-01 / 22.현과·23.현면·24.현영→JNL-02, [발행집계표] 반영), 차대계정(추천 음영), 관리, 전표상태(6종 동일).</li>\n<li><strong>매입</strong>: 자료구분(1.국세청 세액공제 확인·변경/2.엑셀), 표식(공급자확인·공급자(면세)·<strong>고정자산 확인 300만원</strong>·전자중복), Code/거래처(사업자번호 매칭 — 동일 시 최근 입력 거래처·주황색, 신규는 전표전송 설정에 따라 자동 생성), 구분(법인·일반·면세·간이 변경불가), <strong>국세청</strong>(공제/불공제 수정불가 — 유형 3/61/62로 전표처리), <strong>유형</strong>(3.일반→JNL-01 / 61.현과·62.현면→JNL-02, [수령명세서] 반영).</li>\n<li><strong>중복전표 기준</strong>: 매출=동일일자·동일 합계금액 / 매입(매입매출)=일자·거래처·유형·금액(공급가액).</li>\n<li><strong>기능</strong>: 수집하러가기·오류검증·휴폐업조회 · 더보기: 전표전송(분개포함/분개없음, 차액분개보기)·전표전송 설정(현금(101) 입금/출금 전송 포함)·매출증빙병합/분리·자동분개시 과세유형 설정(차량유지비 '여'→일반, 접대비 항상 일반)·세액변경·공제유형별 집계·매출/매입 엑셀·데이터 엑셀변환 · 우클릭 엑셀변환·계산기.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.8 SA-ATX-06 통장 — 1차</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 금융기관 통장거래내역 수집(또는 엑셀 업로드)→거래처 자동매칭·분개 추천→<strong>SA-JNL-01 전송. 통장 거래내역 1건=1전표</strong>(입금→RECEIPT/출금→PAYMENT, 현금 101 위치 자동판별)(§25.5.6).</li>\n<li><strong>조회</strong>: ①기간 ②구분(1.은행/2.엑셀 — 최초수집기간 이전은 엑셀) ③금융거래처([거래처등록] '금융'탭 계좌 등록 필수) ④전표상태 ⑤조건검색(통장적요·적요·금액·입금/출금·상대계정·거래처코드·체크확인·거래처명).</li>\n<li><strong>영역 구성</strong>: ①통장 이미지 영역(수집 원본, 수정불가 — 계좌 이동 버튼·월/일·적요/내용/입금액/출금액/잔액/취급점/비고. <strong>'체크카' 포함 시 체크카드 인식→음영·기본 '확정제외'</strong>(신용카드 중복 방지), 전송하려면 '1' 입력) ②통장 전표전송(Code/거래처=통장 적요 분석 자동매칭·추천 2개↑ 오렌지색, 전표적요=통장 적요 복사·하단 동기화(하단 수정 시 상단 미반영), 상대계정=추천 음영 F7, 관리(사원·부서·현장·프로젝트·자금), 전표상태 — 중복전표=동일 통장 금융거래처코드·일자·금액) ③하단 분개내역(구분 3.차변/4.대변, 출금→차변란/입금→대변란, 거래처명·적요·차원).</li>\n<li><strong>기능</strong>: 수집하러가기 · 오류검증 · 정렬(9종: 거래일시/적요/입금액/출금액/거래처코드/거래처명/전표적요/상대계정/전표상태순) · <strong>매입매출</strong>(좌측 매입매출장[금액구간·동일금액, 입금=매출/출금=매입]·우측 거래처원장) · <strong>통장대조</strong>(통장내역 vs 거래처원장 — 전체[입출금·잔액 차액]·상세[통장이미지·통장원장·분개내역] reconciliation) · 더보기 12항목: 전표전송설정(현금 101 입금/출금 전송, 경비성 계정·체크카드 카드계좌 '여')·전표전송('확정가능'만)·<strong>송금수수료 분개</strong>(일괄분개 — 차변 1계정=해당 계정 차감, 2계정↑=최대 금액 계정, 동일 시 빠른 순; 입금·차변없음·수수료≥차변은 미처리)·거래처명↔전표적요↔통장내용 일괄반영 3종·일괄변경(전표확정 제외)·적요코드 일괄변경·통장계정 일괄변경·엑셀서식 내려받기/불러오기(엑셀제목·제목번호 매칭·금융기관 선택)·카드매출 입금 예정액 조회(여신 수집분).</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.9 SA-ATX-07 자료수집현황 — 1차</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 수집정보등록 기준 수집 자료를 <strong>수집일자별</strong> 조회 — 수집 실패여부·실패사유 확인(§25.5.7). 조회 전용.</li>\n<li><strong>필드</strong>: ①기간(자료수집기간) ②자료수집현황(최근 수집일시 내림차순·메뉴별 총 수집건수, 일자 선택 시 하단 완료여부·실패사유) ③수집결과내역(증빙별 완료여부·실패사유).</li>\n<li><strong>BK 구체화</strong>: 수집 잡 실행 이력(job run log — 증빙종류·수집기간·건수·성공/실패·사유) 조회, 운영 모니터링 대시보드.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.10 SA-ATX-08 전표전송현황 — 1차</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 각 증빙메뉴에서 JNL-01/02로 전송·미전송 현황 집계 조회(§25.5.8). 조회 전용.</li>\n<li><strong>필드</strong>: ①증빙종류별 전표상태값(미전송/전송완료/확정후 삭제/확정제외) ②전체(상태값 합계) ③최종수집일 ④최종거래일.</li>\n<li><strong>BK 구체화</strong>: 자동전표 스테이징 전송상태 집계 뷰 + 증빙종류별 최종수집일·최종거래일 메타데이터.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.11 SA-ATX-09 국세청자료검증 및 사이트비교 — 1차</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: SA-JNL-02 입력 데이터와 국세청 홈택스 신고 데이터 비교·검증 — 누락 세금계산서 추가 입력, 비전자 데이터의 전자구분 제외. <strong>3원(전표입력·자동전표수집·홈택스) reconciliation</strong>(§25.5.9).</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>검증 탭</th><th>내용</th></tr></thead><tbody><tr><td>①전자세금계산서(상세)</td><td>조회구분(월별/분기)·구분(매출/매입)·차액 데이터만 보기. 3원 = JNL-02(전자 공란=종이로 인식·제외) vs ATX-02 수집 vs 홈택스(합계 및 통계조회 불러오기). <strong>일치여부</strong>: 3가지 모두 동일 '○'/없으면 'X'. 일치 기준: 일자·사업자번호·공급가액·세액·합계</td></tr>\n<tr><td>②전자세금계산서(신고용)</td><td>[세금계산서합계표] 형식 — 분기(1기 예정/확정/예정+확정, 2기), SmartA 집계 vs e세로 합계표</td></tr>\n<tr><td>③④전자계산서(상세/신고용)</td><td>동일 구조(ATX-03·[계산서합계표], 일치 기준 일자·사업자번호·공급가액·합계)</td></tr>\n<tr><td>⑤신용카드</td><td>구분(1.매출[월별]/2.매입 사업용/3.화물복지[분기별]) — 집계 vs 여신 월별 매입내역 vs 국세청 공제금액 조회. 상세내역(월·분기 카드거래처별)</td></tr>\n<tr><td>⑥현금영수증</td><td>월별 매출/매입 집계 vs 국세청 누계조회, 조회년월 선택 시 일별 상세</td></tr>\n<tr><td>⑦불러오기</td><td>홈택스(합계표·카드 공제금액·현금영수증 누계)·여신(카드 매출 월별) 데이터 수집</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>BK 구체화</strong>: 3소스 reconciliation 엔진(일치 플래그·차액 필터·신고용 합계표 뷰), 누락분 추가입력은 SA-JNL-02 전표 생성으로 연결.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.12 SA-JNL-03 정기청구입력 — 2차</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 매월 정기 청구 수입의 조회·등록·자동전표 발행. <strong>기본사항등록·정기청구입력 2탭</strong>. [거래처등록] 선행 필수(§25.4.3).</li>\n<li><strong>기본사항등록 탭 필드</strong>: 거래처명/사업·주민번호/대표자명(거래처 마스터 FK) · <strong>청구기간</strong>(자금계획 전송 시 필수) · <strong>청구일</strong>(청구주기 월, 31일=말일, 전표전송 시 필수) · 수금예정일(청구월 이후·청구일 이전 불가·31일=말일) · 자금항목([자금계획입력] 반영) · 청구품목(적요) · <strong>전표구분</strong>('1.일반전표'→JNL-01/'2.매입매출'→JNL-02; '1.과세'→매출 11/'2.면세'→매출 13 — entryType+taxType 결정 룰) · 분개금액(직접입력 불가 — 하단 청구분개(대변) 공급가액 자동반영) · 청구과목(대변)/수금과목(차변) · 공급가액·부가세(일반전표/면세는 부가세창 비활성) · 금액(VAT포함) · 거래기간(거래처 마스터 자동반영) · 사용여부(삭제 대신 '1.부').</li>\n<li><strong>정기청구입력 탭</strong>: 청구일 선택·조회 후 '전표추가' → JNL-01/02(+자금계획입력) 반영.</li>\n<li><strong>기능·검증</strong>: 더보기(새로불러오기/<strong>전표추가</strong>/주민번호별표). 청구일 31일=말일, 수금예정일≥청구일 검증. BK: 스케줄러 기반 자동전표 생성기(매월 생성), 분개금액=대변 공급가액 자동산출. tenant별 정기청구 템플릿 RLS 격리.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.13 SA-JNL-04 물류전표처리 — 2차</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 물류 모듈 전송 중간전표의 <strong>승인·전송 전용</strong> 화면(직접 편집 불가). [물류환경설정]&gt;중간전표 사용여부 '1.여' 시 실행(§25.4.4).</li>\n<li><strong>필드</strong>: 탭 분리 — [매출회계처리]·[매입마감 및 회계처리]=매입매출전표탭 / [수금등록]·[지급등록]=일반전표탭. ①기간 ②전표상태(1.확정가능/2.전표확정/0.전체) ③과세구분(매출 빨강/매입 파랑) ④전자세금계산서 상태 ⑤전표상태(확정가능=전송가능/전표확정=전송완료) ⑥하단 분개(회계연결계정과목 설정 계정으로 분개생성) ⑦적요(수금/지급등록번호+적요).</li>\n<li><strong>기능</strong>: <strong>전표전송</strong>(체크 전표→JNL-02·JNL-01), <strong>삭제(전송취소)</strong>(JNL 측 전표 삭제 시 원천 물류 전표상태 미결→공란 롤백). BK: 승인 큐(staging) 패턴, 회계연결계정 매핑 룰 자동 분개, 전송/취소 양방향 상태 연계 트랜잭션.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.14 SA-ATX-10 ScrappingBoard — 3차</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 새벽 수집 완료 데이터를 증빙 메뉴별 한눈에 확인하는 <strong>수집 운영 콘솔(대시보드)</strong> — 최종수집일자·미처리 현황·수동수집(§25.5.10).</li>\n<li><strong>필드</strong>: ①수집정보 등록하기(ATX-01 연동) ②시계아이콘(최종수집 진행일자) ③달력(미처리 내역 기간) ④<strong>건수</strong>(로그인 기수 기준 확정가능+미추천+중복전표 미처리 — 엑셀 업로드 포함·삭제전표 제외, 클릭 시 해당 메뉴 이동) ⑤<strong>오류확인</strong>(ATX-01 정보 오류 시 증빙별 버튼→ATX-01 연동) ⑥WEstudio ⑦자료수집현황(ATX-07) ⑧<strong>수집하기</strong>(증빙별 수동수집).</li>\n<li><strong>수집하기 규칙</strong>: 수집 시작/종료일 <strong>6개월 초과·미래일 불가</strong>(1년=1~6월/7~12월 분할), 전자세금/계산서 수집기준(작성일/e세로 전송일), 홈택스 ID·PW는 전자세금/계산서 선택 시 활성, 신용카드매출(여신)은 수동수집 불가→ATX-04 전용 기능, 완료 후 남은 시간 카운트.</li>\n<li><strong>BK 구체화</strong>: 수집 잡 큐·<strong>레이트리밋</strong>(여신 IP차단 대응), 자격증명 오류 알림, 미처리 건수 집계 API, 부서사용자 동시 다중 로그인.</li>\n</ul>\n<p>---</p>\n<h3 class=\"doc-h doc-h3\">5. 데이터 모델</h3>\n<h4 class=\"doc-h doc-h4\">5.1 핵심 엔티티 (§12.1, 부록 C 6.3, §25.4.2.10, §25.5)</h4>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>엔티티</th><th>핵심 필드</th><th>키/제약</th><th>근거</th></tr></thead><tbody><tr><td><code>JournalHeader</code></td><td>managedCompanyId, fiscalYear, journalDate, journalNo, journalType{대체/입금/출금/매입/매출 + RECEIPT/PAYMENT/TRANSFER/PURCHASE/SALES/CLOSING/REVERSAL}, status, currency/fxRate(R3), evidenceDate/taxAttributionDate/postedDate(R7), headerNarration, sourceModule/sourceDocNo, autoRuleId, approvalLineId, createdBy/reviewedBy/approvedBy/postedBy, createdByGroup(MGMT/CLIENT), inputSource(MGMT_DIRECT/CLIENT_SELF/AUTO/UPLOAD), bookkeepingMode, assignmentId/breakGlassSessionId, version</td><td><strong>PK=(tenant_id, 전표일자, 전표번호)</strong> — 업무 복합키(§12.3 예외 규정). 파티셔닝 tenant_id+전표일자</td><td>§12.1, 부록 C 6.3, §11.1-(2)</td></tr>\n<tr><td><code>JournalLine</code></td><td>accountId, drCr, entryCode{DR/CR/RECEIPT/PAYMENT/CLOSING_DR/CLOSING_CR + ACCRUAL/ADJUSTMENT/RECLASS/TAX_ADJ/STAT_ADJ}, amount, foreignAmount, customerVendorId, 6차원(businessPlaceId·costCenterId·departmentId·projectId·siteId·employeeId), vatCode, noteId/bankAccountId, quantity/unitPrice, lineNarration, evidenceType/evidenceNo</td><td>FK=(tenant_id, 전표일자, 전표번호)+line_no. 라인당 차/대 한쪽만, 금액&gt;0</td><td>부록 C 6.3, §12.1</td></tr>\n<tr><td><code>JournalSequence</code></td><td>tenantId, businessPlaceId, 전표일자, lastSeq</td><td>일자별 멱등 채번(행 락). source 구분(일반 1~50000/매입매출 50001~99999)</td><td>§12.1, §25.4.2</td></tr>\n<tr><td><code>journal_line_aux</code></td><td>보조부 유형 VENDOR/NOTE/BANK/CARD/ADVANCE/VAT/QTY</td><td>전표 라인:보조부 1:N. 독립 보조원장은 POSTED 전표 기준 집계</td><td>§12.1</td></tr>\n<tr><td><code>journal_tax_line</code>(세무헤더)</td><td>taxType(11~25/51~64), 품명, 수량, 단가, 공급가액, 세액, 전자, 불공제사유, 예정누락, 수입납부유예</td><td>매입매출 2계층 상단</td><td>§25.4.2</td></tr>\n<tr><td><code>tax_type_master</code></td><td>코드·명칭·증빙·세율·부가세계정·신고서식 매핑</td><td>단일 진실원</td><td>§25.4.2.10</td></tr>\n<tr><td><code>vat_account_rule</code></td><td>과세유형→부가세대급금/예수금 자동라인 룰</td><td></td><td>§25.4.2.10</td></tr>\n<tr><td><code>etax_status</code> / <code>etax_issue</code></td><td>발행/전송/신고상태, remark(비고 — 신고·분개 비반영)</td><td>상태머신</td><td>§25.4.2.6</td></tr>\n<tr><td><code>MultiItemVoucherDetail</code></td><td>품명·규격·수량·단가·공급가액·부가세·비고(최대 99)</td><td>합계=상단 일치</td><td>§25.4.2.7</td></tr>\n<tr><td><code>JournalTemplate</code> / <code>RecurringJournal</code></td><td>템플릿·반복(예약) 전표</td><td>JV-06·정기청구 연계</td><td>§12.1, 부록 C 6.4</td></tr>\n<tr><td><code>JournalEvidenceLink</code></td><td>전표↔증빙(Evidence) 연결, sameEvidenceKey(세금계산서 승인번호·카드 승인번호)</td><td>동일 카드승인건 다중 연결 차단</td><td>§11.1.1-(4)(14)(16)</td></tr>\n<tr><td><code>note</code>(메모)</td><td>type{전표/검토/승인/감사/세무/STAT}</td><td>유형별 노출 권한</td><td>§11.1.1-(12)</td></tr>\n<tr><td><code>TenantAccountingConfig</code></td><td>소수점 자릿수·반올림(M4), <strong>journalApprovalMode</strong>(REQUIRED/OPTIONAL/NONE — N3), accountCodeLength(N8)</td><td>회사별 환경설정</td><td>§11.1-(6)(7), §12.1</td></tr>\n<tr><td>자동전표 스테이징</td><td>상단 수집헤더(원천키·수집값·과세유형·추천 신뢰도·전표상태) + 하단 추천분개. 증빙별(전자세금계산서/계산서/카드 매출·매입/현금영수증/통장)</td><td>(tenant_id, 원천키) unique — 멱등(§12.3)</td><td>§25.5.2~6, §8.4</td></tr>\n<tr><td><code>ScrapingTask</code>/<code>IntegrationStaging</code>/<code>IntegrationAdapter</code></td><td>connectorType·params·status·retryCount / rawPayload·source·status / 기관별 파서</td><td>큐 기반 비동기, 원천키 중복 방지</td><td>§8.4</td></tr>\n<tr><td>자격증명 볼트</td><td><code>TenantConnector</code>/<code>ConnectorCredential</code>/<code>Certificate</code>(인증서·홈택스·은행·카드·여신)</td><td>KMS 암호화, RLS</td><td>§8, §25.5.1</td></tr>\n<tr><td><code>ArApInvoice</code>/<code>ClearingEntry</code></td><td>invoiceNo·partner·currency·openAmount / invoiceRef·journalRef·clearedAmount·fxGainLoss·fee</td><td>선수/선급 검토(R5)·환차손익(R3) 연계</td><td>§12.1(N4), §11.11</td></tr>\n<tr><td><code>JournalHistory</code>+<code>DataChangeLog</code></td><td>모든 변경 이력(전후값·IP·행위자)</td><td>append-only</td><td>§11.1, §17</td></tr></tbody></table></div>\n<h4 class=\"doc-h doc-h4\">5.2 상태값 (§12.2, 부록 C 6.6)</h4>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>상태 그룹</th><th>값</th></tr></thead><tbody><tr><td>전표 생명주기</td><td><code>DRAFT</code>→<code>CLIENT_SUBMITTED</code>→<code>REVIEWING</code>→<code>PENDING_APPROVAL</code>→<code>APPROVED</code>→<code>POSTED</code>→<code>CLOSED</code> (+<code>REJECTED</code>/<code>ADJUSTED</code>/<code>REVERSED</code>/<code>CANCELLED</code>)</td></tr>\n<tr><td>전표 분개구분</td><td>DR/CR/RECEIPT/PAYMENT/CLOSING_DR/CLOSING_CR — 결차/결대만 원가 흐름 인식(M2). 확장: ACCRUAL/ADJUSTMENT/RECLASS/TAX_ADJ/STAT_ADJ(R13)</td></tr>\n<tr><td>전표 유형(구분 표시)</td><td>대체·입금·출금·매입·매출 — 입금/출금은 현금 위치 자동 판별·동일 일자 시리즈 공유</td></tr>\n<tr><td>전표번호 채번</td><td><code>예정</code>(임시저장)→<code>확정</code>(001~). 충돌 <code>NUMBERING_CONFLICT</code> 재시도, 취소 번호 재사용 금지(결번 보존)</td></tr>\n<tr><td>자동전표(스테이징) 전표상태</td><td>확정가능·전표확정·확정제외·중복전표·미추천·삭제(전표) — 변경 룰: 확정가능↔확정제외, 삭제/중복→확정가능·확정제외, 미추천→확정제외(§25.5.2)</td></tr>\n<tr><td>수집 태스크</td><td>QUEUED·RUNNING·SUCCESS·RETRY·FAILED·DEAD_LETTER(§8.4)</td></tr>\n<tr><td>전자세금계산서</td><td>전자입력·전자발행·국세청성공·전송실패·역발행 / 확인요청·확인·발행대상·발행요청 / 미전송·전송성공(§25.4.2.6). 국세청 전송상태: NOT_TARGET~MANUAL_EVIDENCE 8종(§11.4-(1))</td></tr>\n<tr><td>거래처(R8)</td><td>TEMP_VENDOR/TEMP_CUSTOMER·PENDING_APPROVAL·ACTIVE·INACTIVE·CLOSED_BIZ</td></tr>\n<tr><td>회계기간</td><td>FUTURE·OPEN·TEMP_CLOSED·CLOSED·LOCKED(+REOPEN_REQUESTED/REOPENED)</td></tr></tbody></table></div>\n<h4 class=\"doc-h doc-h4\">5.3 상태별 통제 (부록 C 6.6 통제표 전수)</h4>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>상태</th><th>수정</th><th>삭제</th><th>장부반영</th><th>통제</th></tr></thead><tbody><tr><td>DRAFT</td><td>가능</td><td>가능</td><td>불가</td><td>필수값/차대변 검증, 미채번/가번</td></tr>\n<tr><td>CLIENT_SUBMITTED</td><td>작성자(고객) 제한</td><td>제한</td><td>불가</td><td>관리회사 검토 대기, 채번</td></tr>\n<tr><td>REVIEWING</td><td>검토자 보정 가능</td><td>불가</td><td>불가</td><td>검토자 지정, 원입력값 이력 보존</td></tr>\n<tr><td>PENDING_APPROVAL</td><td>제한</td><td>제한</td><td>불가</td><td>결재선/권한 검증</td></tr>\n<tr><td>REJECTED</td><td>가능</td><td>가능</td><td>불가</td><td>반려사유 필수, 작성자 그룹 반환</td></tr>\n<tr><td>APPROVED</td><td>제한</td><td>제한</td><td>가능</td><td>승인자/시각·SOD, 수정 시 재승인</td></tr>\n<tr><td>POSTED</td><td>조정전표로만</td><td>불가</td><td>가능</td><td><code>POSTED_IMMUTABLE</code>, 원장 이력 보존</td></tr>\n<tr><td>ADJUSTED/REVERSED</td><td>제한/불가</td><td>불가</td><td>가능/반대반영</td><td>조정사유·원전표 연결/원전표 참조 보존</td></tr>\n<tr><td>CLOSED</td><td>불가</td><td>불가</td><td>—</td><td>마감해제 권한(Step-up)</td></tr>\n<tr><td>CANCELLED</td><td>불가</td><td>불가</td><td>불가</td><td>결번 보존</td></tr></tbody></table></div>\n<p>---</p>\n<h3 class=\"doc-h doc-h3\">6. API 설계</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>Method</th><th>URI</th><th>설명 · 규칙</th><th>근거</th></tr></thead><tbody><tr><td>GET</td><td><code>/api/journals?fiscalYear&amp;journalDate</code> / <code>?dateFrom&amp;dateTo</code> / <code>?source=PURCHASE_SALE&amp;taxType</code></td><td>전표 목록(월별/기간/매입매출 필터). cursor 페이징, 다조건 검색(R17) 파라미터</td><td>부록 통합본 WJV-01, §25.4.2, §13.3</td></tr>\n<tr><td>POST</td><td><code>/api/journals</code></td><td>생성(journalType=GENERAL/PURCHASE_SALE). <code>Idempotency-Key</code> 필수</td><td>§13.3</td></tr>\n<tr><td>PUT</td><td><code>/api/journals/{id}</code></td><td>수정 — 상태별 통제(5.3), 낙관적 락 version</td><td>부록 C 6.8</td></tr>\n<tr><td>POST</td><td><code>/api/journals/{id}/submit</code></td><td>결재요청·정식 채번(<code>journalApprovalMode</code> 분기)</td><td>부록 통합본 WJV-01, §11.1-(7)</td></tr>\n<tr><td>POST</td><td><code>/api/journals/{id}/auto-line</code></td><td>부가세 자동라인 생성(과세유형 기반)</td><td>§25.4.2</td></tr>\n<tr><td>POST</td><td><code>/api/approvals/requests</code>·<code>/{id}/approve</code>·<code>/{id}/reject</code>·<code>/batch-approve</code></td><td>전자결재(targetType=JOURNAL) — REQUIRED/OPTIONAL 모드</td><td>부록 C 7.10</td></tr>\n<tr><td>POST</td><td>전표이동/복사/묶기/일괄적용 커맨드</td><td>이동=재채번(마감 일자 차단), 자금·증빙·자동전표 보호 플래그</td><td>§25.4.1</td></tr>\n<tr><td>POST</td><td>홈택스 엑셀 업로드(<code>HometaxExcelImportCommand</code>) → 미리보기 → <code>BulkVoucherGenerateCommand</code></td><td>업로드·매핑·검증·일괄 생성. 멱등키+<code>DuplicateVoucherGuard</code></td><td>§25.4.2.9</td></tr>\n<tr><td>POST</td><td>전자발행/발행취소/전송결과</td><td><code>etax_status</code> 상태머신, 발행취소는 당일 '확인요청'만</td><td>§25.4.2.6</td></tr>\n<tr><td>POST·GET</td><td><code>/api/tenant/connectors</code></td><td>수집 자격증명 등록/검증(볼트)</td><td>§13.2, §25.5.1</td></tr>\n<tr><td>POST</td><td>수집 트리거(증빙별 수동수집)</td><td>202 Accepted + <code>ScrapingTask</code> 큐 발행. 6개월 제한·미래일 불가</td><td>§8.4, §25.5.10</td></tr>\n<tr><td>POST</td><td>스테이징 전표전송(증빙별)</td><td>분개포함/분개없음, 라우팅(3.일반→JNL-01 / taxType→JNL-02), 중복전표=승인번호만. 원천키 멱등</td><td>§25.5.2~6</td></tr>\n<tr><td>GET</td><td>자료수집현황/전표전송현황/3원 대조·홈택스 불러오기</td><td>조회 전용(ATX-07/08/09)</td><td>§25.5.7~9</td></tr>\n<tr><td>POST·GET</td><td><code>/api/tenant/evidences</code></td><td>증빙 업로드(검사 큐)/조회·매칭 — <code>JournalEvidenceLink</code></td><td>§13.2, §11.12</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>공통 계약: 인증 토큰 <code>userGroup·tenantId·role·scope</code> 검증, scope <code>tenant:journal:write/approve/post</code>, 멱등 <code>Idempotency-Key</code>(동일 키+다른 해시 <code>409 IDEMPOTENCY_CONFLICT</code>), 오류코드는 §13.3 표준 + 전표 도메인 5종(<code>AUX_REQUIRED</code>/<code>DIMENSION_REQUIRED</code>/<code>POSTED_IMMUTABLE</code>/<code>QUICK_ENTRY_INVALID_ACCOUNT</code>/<code>NUMBERING_CONFLICT</code>). 서비스: <code>JournalService</code>/<code>PostingService</code>(부록 C 15.1 준용), <code>ScrapingPipelineService</code>(§13.1).</li>\n</ul>\n<p>---</p>\n<h3 class=\"doc-h doc-h3\">7. 배치 / 스케줄</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>배치</th><th>주기</th><th>내용 · 실패 처리</th><th>근거</th></tr></thead><tbody><tr><td>자동수집 배치</td><td>매일(새벽)</td><td>ATX-01 등록 정보 기준 증빙별 수집(큐+워커 분리, 외부 지연 격리). 재시도·백오프·DEAD_LETTER·실패 알림, 원천키 멱등</td><td>§8.4, §25.5.1</td></tr>\n<tr><td>수동수집 잡</td><td>이벤트</td><td>ScrappingBoard/수집하러가기 트리거. 여신 레이트리밋(IP차단 대응)</td><td>§25.5.10</td></tr>\n<tr><td>자동분개(추천)</td><td>수집 후</td><td>거래처·품명 분석 추천(신뢰도 100/51↑/50↓/미추천), 중복전표 판정</td><td>§25.5.2</td></tr>\n<tr><td>전자세금계산서 수신·전송결과 반영</td><td>정기</td><td>etax 상태 반영, 국세청 전송상태 대사(§11.4 NTS 대사 잡)</td><td>§14</td></tr>\n<tr><td>정기청구 자동전표 생성(2차)</td><td>매월(청구일)</td><td>JNL-01/02 전표 생성 + 자금계획 등록. 멱등</td><td>§25.4.3</td></tr>\n<tr><td>환율 동기화</td><td>매일</td><td>외화 전표 환율 마스터(R3·§11.16 연계)</td><td>§14</td></tr>\n<tr><td>이상거래 야간 전수 스코어링</td><td>야간</td><td>ML 재평가·알림 생성(전표 자동 수정 금지)</td><td>§14, §11.7</td></tr>\n<tr><td>인증서/토큰 만료 점검</td><td>정기</td><td>ATX-01 등록상태(접속불가) 알림</td><td>§14, §25.5.1</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>모든 배치 멱등·재처리·실패 알림(§14). 스테이징→원장 이관은 어댑터 경유(직접 인서트 금지, §8.4-(2)).</li>\n</ul>\n<p>---</p>\n<h3 class=\"doc-h doc-h3\">8. 검증 · 오류 처리 (차단/경고 통합표)</h3>\n<p>WJV-01 검증(4.1.6)·WPV-01 검증(4.2.6)·자동전표 오류검증(4.4~4.8) 외 §15 전표 관련 행 전수:</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>처리</th><th>근거</th></tr></thead><tbody><tr><td>금액 0/음수 라인, 라인 차/대 동시 입력</td><td>차단</td><td>§15</td></tr>\n<tr><td>부가세 계정-부가세코드 불일치</td><td>경고(매입/매출 세무헤더 대조)</td><td>§15</td></tr>\n<tr><td>전표일자-회계기간 불일치(OPEN 외)</td><td>차단</td><td>§15</td></tr>\n<tr><td>환율 미적용 외화전표</td><td>저장 차단</td><td>§15</td></tr>\n<tr><td>증빙일자&gt;전표일자 / 세무귀속월≠회계월 / 미래 전표일자</td><td>경고 / 경고+세무검토 / 권한별 차단·경고</td><td>§15(R7)</td></tr>\n<tr><td>채권계정×공급업체 / 채무계정×고객 / 휴폐업·사용중지 거래처 / 허용계정 위반</td><td>차단 / 차단 / 차단 / 경고·차단(정책)</td><td>§15(R8)</td></tr>\n<tr><td>계정 사용가능기간 외 / 계정-거래처유형·부서·프로젝트 조합 위반</td><td>차단 / 경고·차단</td><td>§15(R9)</td></tr>\n<tr><td>중복 전표(유사도·증빙 키)</td><td>경고(증빙 키 일치 시 강한 경고), 정상 반복거래 예외 메모</td><td>§15(R14)</td></tr>\n<tr><td>동일 카드승인건 다중 전표 연결 / 세금계산서 수취 건 카드 공제</td><td>차단(이중공제 차단)</td><td>§15(R16)</td></tr>\n<tr><td>자동전표 스테이징 오류검증</td><td>유형검증오류·사업자번호·상하단 합계·공급가액+세액≠합계·유형별 부가세 — 보완 후 전송</td><td>§25.5.2~3</td></tr>\n<tr><td>중복전표(스테이징)</td><td>전송 불가(승인번호만 전송 옵션), 원천별 판정 기준 상이(4.6·4.7·4.8)</td><td>§25.5.2~6</td></tr>\n<tr><td>체크카드 통장 수집분</td><td>기본 '확정제외'(카드 수집분과 중복 방지)</td><td>§25.5.6</td></tr>\n<tr><td>멱등키 충돌</td><td><code>409 IDEMPOTENCY_CONFLICT</code> 반영 차단</td><td>§15</td></tr>\n<tr><td>OPERATOR_LED 이용회사 전표 입력</td><td><code>tenantInputPolicy=NONE</code> 시 메뉴 비활성+API 이중 차단</td><td>§15, §21</td></tr>\n<tr><td>HYBRID 분담 위반 / 양측 중복 입력</td><td>owner 불일치 차단(EITHER만 양측) / 경고+<code>DUP_CROSS_PARTY</code> 이상탐지</td><td>§15, §21.6</td></tr>\n<tr><td>증빙 바이러스 검사 실패</td><td><code>QUARANTINED</code> 격리, 전표 매칭 차단</td><td>§15, §11.12</td></tr>\n<tr><td>적격증빙 미충족</td><td>가산세 대상 플래그·세무조정 검토 목록</td><td>§15, §11.12</td></tr>\n<tr><td>이상탐지</td><td>AI는 경고·우선순위만 — 전표 자동 수정/반려/승인 금지</td><td>§15, §11.7</td></tr>\n<tr><td>오류 메시지 원칙</td><td>필드 단위 지목+조치 안내, 서버/클라 이중 검증</td><td>부록 C 18.2, §16.2</td></tr></tbody></table></div>\n<p>---</p>\n<h3 class=\"doc-h doc-h3\">9. 권한 · SOD · 감사</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>화면</th><th>행위 × scope</th><th>특이 통제</th></tr></thead><tbody><tr><td>SA-JNL-01/02</td><td>조회(메뉴 권한)·작성/수정 <code>tenant:journal:write</code>·승인 <code>tenant:journal:approve</code>·기표 <code>tenant:journal:post</code>·대행 검토 <code>operator:journal:review</code></td><td>작성자=승인자 차단(SOD, 부록 C 7.11). 버튼 단위 <code>MenuActionGrant</code>(미노출 원칙). 단축키도 동일 API 권한·마감 검증</td></tr>\n<tr><td>SA-ATX-01</td><td>자격증명 등록 — 볼트 접근 권한</td><td>인증서·계정 KMS 암호화, 평문 미노출. 삭제 시 복원불가 고지</td></tr>\n<tr><td>SA-ATX-02~06</td><td>스테이징 조회·보정·전표전송 <code>tenant:journal:write</code></td><td>전표확정 후 변경 불가, 국세청 공제/불공제 수정불가</td></tr>\n<tr><td>SA-ATX-09</td><td>조회 + 누락분 전표 생성</td><td>홈택스 불러오기 감사로그</td></tr>\n<tr><td>SA-JNL-04(2차)</td><td>승인·전송 전용(편집 불가)</td><td>전송/취소 원천 상태 롤백 트랜잭션</td></tr>\n<tr><td>공통</td><td>마감해제·신고 전송 Step-up(§13.3). 기장 모드별: OPERATOR_LED 입력 차단/REQUEST_ONLY, 비주기장 마감·신고 <code>NOT_PRIMARY_BOOKKEEPER</code></td><td>행위자 표식 <code>createdByGroup+bookkeepingMode+assignmentId/breakGlassSessionId</code>(§11.1). CUD·승인·전송은 <code>DataChangeLog</code>(전후값·IP) append-only(§17). 주민번호 별표 등 민감정보 마스킹+Step-up 평문 조회</td></tr></tbody></table></div>\n<p>---</p>\n<h3 class=\"doc-h doc-h3\">10. 연계</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>방향</th><th>대상</th><th>내용</th><th>근거</th></tr></thead><tbody><tr><td>선행</td><td>P01</td><td>계정과목(<code>coa_account</code>/<code>coa_control</code> — 계정 주도 통제)·거래처·적요·차원·<code>DimensionConfig</code>·환경설정</td><td>§11.6.2, §9</td></tr>\n<tr><td>선행</td><td>P02</td><td>개시이월(OPN) — 미확정 시 당기 전표 전기 제한</td><td>부록 통합본 11.9</td></tr>\n<tr><td>내부</td><td>JNL-03/04(2차)·ATX-02~06 → JNL-01/02</td><td>전표전송(확정가능→전표확정), 유형값 라우팅(3.일반→JNL-01/taxType→JNL-02), 통장 1건=1전표</td><td>§25.4.1·§25.5</td></tr>\n<tr><td>외부</td><td>홈택스·여신금융협회·카드사·은행</td><td>스크래핑 수집(§8.4 큐·워커·스테이징·어댑터), 전자세금계산서 발행/전송, 휴폐업 조회, 국세청 사업자 상태</td><td>§8.4, §25.4.2.6, §11.1-(4)</td></tr>\n<tr><td>후행</td><td>P04 장부·보조부</td><td>분개장·원장·현금출납장·거래처원장·AUX 보조부(<code>journal_line_aux</code>, POSTED 기준 집계), Invoice 반제(AUX-01·§11.11)</td><td>§25.4.1, §12.1</td></tr>\n<tr><td>후행</td><td>P05 결산</td><td>결차/결대 원가 집계, 마감(FiscalPeriod), 결산자동분개</td><td>§11.1-(5), §11.9</td></tr>\n<tr><td>후행</td><td>P06~08 부가세·고정자산</td><td>taxType 라우팅 신고서·부속서류, 매입원장 세무상태·NTS 대사, 고정자산 분기(51/57/61)</td><td>§25.4.2, §11.4</td></tr>\n<tr><td>후행</td><td>P09 자금(2차)</td><td>자금 관리항목(WJV-04~06 어음·차입금) 데이터</td><td>00_개요 2절</td></tr>\n<tr><td>횡단</td><td>P10 데이터관리</td><td>삭제전표복구(SA-DAT-01)·백업·기수변경</td><td>§25.20</td></tr></tbody></table></div>\n<p>---</p>\n<h3 class=\"doc-h doc-h3\">11. 완료 기준(DoD) · 테스트 관점</h3>\n<h4 class=\"doc-h doc-h4\">11.1 완료 기준</h4>\n<p>1. WJV-01: 입금/출금/대체/결산 통합 입력, 일자별 001 채번(결번 보존·재채번·번호 수정 불가), 월/기간 조회, 우측 패널(차대·현금잔액·상태·관리항목 도킹·증빙), 4.1.6 검증 전수, <code>journalApprovalMode</code> 3모드 동작.</p>\n<p>2. WPV-01: 과세유형 30종(11~25/51~64) 마스터 주도 입력, 부가세 자동라인(과세만), 분개유형 0~7 자동분개, 분기 3종(유형/계정/적요), 전자발행 상태머신·비고=발
