기관(개설점)·이자율","desc":"계좌명·계좌번호·예금종류·계약기간(개설/해지일)·만기일·만기수령액·한도액(당좌한도)·금융기관(개설점)·이자율"}],"tableCount":8,"statusKind":"warn","statusMsg":"검증·차단 조건을 확인해야 하는 화면입니다."}],"docs":{"overview":"<h3 class=\"doc-h doc-h3\">1. 페이즈 개요</h3>\n<h4 class=\"doc-h doc-h4\">1.1 목표</h4>\n<ul class=\"doc-list\">\n<li>전표(P03)의 자금 관리항목(받을어음 WJV-04·지급어음 WJV-05·차입금 WJV-06)과 예금·현금 계정 데이터 위에 <strong>자금 보조부(AUX) — 일일자금·자금계획·자금일월보·입출금내역·자금계획서</strong>를 구축한다(§25.17.1~6, §11.11).</li>\n<li>차원 엔진(§9)의 부서/사원/프로젝트 차원 기반 <strong>다차원 예산 마스터와 예산 대비 실적(BvA) 리포트</strong>(당기/전기/차기/추정)를 구축한다(§25.17.7~14, §11.19, §9.4 차원별 예산).</li>\n<li>금융 거래처 계좌·차입금 스케줄 기반 <strong>예적금·차입금 보조부</strong>(§25.18.1~3)와 어음번호·어음책 채번 기반 <strong>받을/지급어음·당좌수표 보조부</strong>(AUX-02, §25.19.1~4, §11.11 어음 보조원장·추적 타임라인 S11·M5 할인 자동분개)를 구축한다.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">1.2 범위 요약</h4>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>화면군</th><th>메뉴 수</th><th>내용</th><th>근거</th></tr></thead><tbody><tr><td>SA-FND 자금·예산관리</td><td>14</td><td>일일자금명세/경리일보·자금계획·일일자금현황·자금일월보·입출금내역·자금계획서·예산입력·당기/전기 BvA(월/분기·반기)·전기실행액·차기예산·추정예산</td><td>§25.17, §22.3 인벤토리(Ch.17)</td></tr>\n<tr><td>SA-DEP 예적금·차입금</td><td>3</td><td>예적금현황·차입금스케줄관리·차입금현황</td><td>§25.18, §22.3(Ch.18)</td></tr>\n<tr><td>SA-BIL 어음·당좌관리</td><td>4</td><td>받을어음현황·지급어음현황·어음집계표·당좌수표현황</td><td>§25.19, §22.3(Ch.19)</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>메뉴 배치: SA-FND 14화면 → TN-11·TN-12, SA-DEP 3화면·SA-BIL 4화면 → TN-11 (§26.1-(4) SA 182개 화면 배치 합계).</li>\n<li>서비스 특화 공통 기능(§11.11): 은행 잔액 자동 대사(<code>BankReconciliation</code>), 은행거래 분류·증빙매칭(미매칭 건 미결항목 18.3 승격), 주간 자금마감(<code>WeeklyCashReport</code>), 어음 만기 D-7/D-3/당일·여신한도 초과 알림(18장), aging 스냅샷 배치(<code>AgingSnapshot</code>), 자금일보/주간 자금계획 리포트.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">1.3 선행조건</h4>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>선행</th><th>내용</th><th>근거</th></tr></thead><tbody><tr><td>P03 전표 자금 관리항목</td><td><strong>본 페이즈는 P03 전표의 자금 관리항목(WJV-04~06) 데이터 위에 구축된다.</strong> 받을어음(WJV-04): 어음번호·발행인·발행일/만기일·지급은행/지점·어음종류/금액. 지급어음(WJV-05): 어음번호(어음집계표 등록 번호에서 선택)·수취인·발행일/만기일·지급은행·금액. 차입금(WJV-06): 차입금번호·차입처·차입기간·원금·상환구분·이자율·자금용도·담보보증</td><td>00_개요 2절, 부록 6.1~6.4(자금관리 큰 그림·WJV-04/05/06 입력 필드), §25.4 전표 자금란</td></tr>\n<tr><td>P03 계정-보조부 매핑</td><td>자금 항목↔전표 계정 매핑: 받을어음=110, 지급어음=252, 차입금=260 단기/293 장기 등 → 연계 보조부(받을어음현황/지급어음현황·어음집계표/차입금스케줄·현황)</td><td>부록 6.1 자금 항목-계정-보조부 표</td></tr>\n<tr><td>P01 거래처등록 금융탭</td><td>예적금 계좌 마스터(예금종류·만기·이자율·계좌개설점)·정기예금/적금 자금계획 연동 필드</td><td>§25.18.1, §25.17.2 거래처등록 '금융'탭 연동</td></tr>\n<tr><td>P01 계정과목·관리항목</td><td>[계정과목 및 적요등록] 관리항목에 차입금·당좌 설정된 계정만 자금관리 입력 반영</td><td>§25.18.2, §25.19.4</td></tr>\n<tr><td>P01 차원(BF-09)</td><td>부서/사원/프로젝트 차원 마스터·<code>DimensionConfig.budgetEnabled</code></td><td>§9.3, §9.6</td></tr>\n<tr><td>P02 초기이월</td><td>[거래처별초기이월] 잔액이 예적금현황 잔액·어음 보조부 초기 데이터로 반영</td><td>§25.18.1, §25.3(SA-OPN 어음 관리내역 보존)</td></tr>\n<tr><td>P04 현금출납장</td><td>자금일월보 실적 탭이 현금출납장 잔액과 대사</td><td>§25.17.4</td></tr></tbody></table></div>\n<h4 class=\"doc-h doc-h4\">1.4 MVP 연관</h4>\n<ul class=\"doc-list\">\n<li>MVP(일반전표 WJV-01 + 계정과목 WJV-08/09) 비대상. 전 화면 2차(§22.2). 단, 전표 자금 관리항목 입력(WJV-04~06)은 P03(1차)에서 선행 구현되므로, 2차 착수 시점에 1차 축적 데이터의 소급 집계를 지원해야 한다(부록 6.5 관리항목 전표 삭제 규칙과 정합 유지).</li>\n</ul>","flow":"<h3 class=\"doc-h doc-h3\">3. 업무 흐름</h3>\n<pre class=\"doc-code\"><code>[P03 전표: 일반/매입매출]                            [P01 기초정보]\n  라인 자금 관리항목 입력                              거래처등록 금융탭(계좌·정기예적금)\n  ├ WJV-04 받을어음(어음번호·만기·지급은행)            계정과목 관리항목(차입금·당좌)\n  ├ WJV-05 지급어음(어음집계표 채번번호 선택)          차원 마스터(부서·사원·프로젝트)\n  └ WJV-06 차입금(차입금번호·상환구분·이자율)                 │\n        │                                                    │\n        ▼                                                    ▼\n  ┌─ 자금 보조부(AUX) ──────────────────────────────────────────────┐\n  │ SA-BIL-03 어음집계표(어음책 채번·수불) ─선행─▶ SA-BIL-02 지급어음현황 │\n  │ SA-BIL-01 받을어음현황(보관·할인·배서·만기·부도)  SA-BIL-04 당좌수표현황 │\n  │ SA-DEP-02 차입금스케줄(상환표 자동생성) ──▶ SA-DEP-03 차입금현황     │\n  │ SA-DEP-01 예적금현황(잔액·원장)                                     │\n  └──────────────┬──────────────────────────────────────────────────┘\n                 ▼\n  SA-FND-02 자금계획입력(전표 수금예정일·차입금 상환계획·정기예적금 연동)\n                 │\n                 ▼\n  SA-FND-01 일일자금명세/경리일보 · SA-FND-03 일일자금현황(대시보드)\n  SA-FND-04 자금일월보(계획 vs 실적) · SA-FND-05 입출금내역 · SA-FND-06 자금계획서(달력)\n                 │\n                 ▼ (서비스 특화, §11.11)\n  은행 잔액 자동 대사 → 마감 체크리스트(11.9) · 주간 자금마감(WeeklyCashReport)\n  어음 만기 D-7/D-3/당일 알림(18장) · aging 스냅샷(월말)\n\n[예산 축] SA-FND-07 예산입력(당기·전기분, 4탭 × 부서/사원/프로젝트 차원)\n  ├▶ SA-FND-08/09 당기 BvA(월별·분기/반기, 실적=POSTED 전표 집계)\n  ├  SA-FND-10 전기실행액입력 ─▶ SA-FND-11/12 전기 BvA(월별·분기/반기)\n  └  SA-FND-13 차기예산입력(당기실행액×비율) ─▶ SA-FND-14 추정예산(전기-당기-차기 추세·구성비)</code></pre>\n<ul class=\"doc-list\">\n<li>흐름 근거: §25.17.2(자금계획→FND-03/04/06 자동반영), §25.19.2(어음등록 선행 후 지급어음 반영), §25.18.2(상환스케줄→자금계획 '104'/'108'), §25.17.7~14(예산 연계망), §11.11(은행 대사·주간 자금마감·만기 알림·aging).</li>\n</ul>","dataModel":"<h3 class=\"doc-h doc-h3\">5. 데이터 모델</h3>\n<p>공통: 전 테이블 <code>tenant_id NOT NULL</code>+RLS, 감사 필드, 회계 데이터 물리 삭제 금지(00_개요 3절). 엔티티 근거: §11.11 엔티티 목록, §11.19-(5), §9.6, §12(도메인 모델 자금/채권채무 그룹).</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>엔티티</th><th>핵심 필드</th><th>키·제약</th><th>근거</th></tr></thead><tbody><tr><td><code>CashItem</code>(자금항목 코드)</td><td>집계코드(3자리: 지급 1-5/A-M·입금 6-9/N-Z)·자금항목코드(01~ZZ)·계정과목 매핑(과목/세목 5자리)·사용여부</td><td>(tenant_id, 집계코드, 항목코드) unique. 데이터 존재 항목 삭제 불가</td><td>§25.17.2 항목코드등록, §25.17.1/5 계정설정</td></tr>\n<tr><td><code>CashPlan</code>(자금계획)</td><td>계획월/일자, 구분(지급/입금), 자금항목, 거래처, 적요, 금액, 입력방식(직접/일반전표/매입매출/정기자금/차입금/거래처등록), 휴일보정 여부</td><td>(tenant_id, 일자, seq). 직접입력분은 공휴일 보정 제외 플래그</td><td>§25.17.2</td></tr>\n<tr><td><code>CashPlanReport</code>(자금일보/예측)</td><td>기간, 입출금 실적+어음 만기+정기 지급 예측</td><td>비동기 리포트 잡 산출물</td><td>§11.11 자금일보/주간 자금계획</td></tr>\n<tr><td><code>Note</code>(어음 보조원장)</td><td>어음번호, 종류(어음/당좌/가계/전자), 수취/발행 구분, 발행인/수취인 거래처, 발행일·만기일·수취일·거래일, 지급은행/지점, 원금·보유금액·미보유금액, 상태(보관/할인/배서/만기/부도/부분할인/반환/분할배서 — 받을), (미발행/발행/결제/담보/폐기 — 지급 용지), 할인율·할인료·실수령액, <code>audit_trail</code>(추적 체인)</td><td>(tenant_id, 어음번호) 보조원장 키. 상태전이 통제</td><td>§25.19.1~3, §11.11 AUX-02(S11·M5), 부록 6.2/6.3</td></tr>\n<tr><td><code>NotePool</code>(어음책/수표책)</td><td>수령일, 어음종류, 금융기관, 시작어음번호, 매수, 어음으로 대체 여부, 용지별 상태</td><td>연속번호 일괄 채번. 등록 범위 내 발행만 허용</td><td>§25.19.3 어음등록, 부록 6.3</td></tr>\n<tr><td><code>NoteCollateral</code>(담보·폐기)</td><td>구분(담보/회수/폐기), 처리일, 어음(수표)번호, 거래처, 금액, 의뢰부서, 회수예정일</td><td>담보 구분만 회수예정일 입력</td><td>§25.19.3/4 담보·폐기등록</td></tr>\n<tr><td><code>BankAccount</code>(예적금 계좌)</td><td>계좌명·계좌번호·예금종류·계약기간(개설/해지일)·만기일·만기수령액·한도액(당좌한도)·금융기관(개설점)·이자율</td><td>거래처등록 금융탭이 마스터</td><td>§25.18.1, §11.11</td></tr>\n<tr><td><code>BankTransaction</code></td><td>date, amount, direction, category(입출금/이체/송금/공과금/수수료), counterparty, evidenceStatus, journalRef</td><td>미매칭·미증빙 건 미결항목(18.3) 승격</td><td>§11.11 은행거래 분류·증빙매칭</td></tr>\n<tr><td><code>BankReconciliation</code></td><td>대사 결과·불일치 내역</td><td>불일치 → 마감 체크리스트(11.9)</td><td>§11.11</td></tr>\n<tr><td><code>WeeklyCashReport</code></td><td>weekOf, account, deposits, withdrawals, ending, unidentified[]</td><td>주간 단위 산출</td><td>§11.11</td></tr>\n<tr><td><code>Loan</code>(차입금 보조원장)</td><td>차입금번호, 차입처, 차입기간(최초차입일~만기일), 자금용도(운영/시설/기타), 차입처구분, 이체은행·계좌, 차입원금, 상환조건(일시/분할원리금/분할원금), 원금상환주기, 이자지급방식·이자계산·이자지급일, 이자율, 최초상환일(거치기간), 담보보증</td><td>(tenant_id, 차입금번호) 보조원장 키</td><td>§25.18.2, 부록 6.4(WJV-06)</td></tr>\n<tr><td><code>LoanSchedule</code>(상환스케줄/계획)</td><td>회차, 상환일, 원금상환액, 이자액, 구분(자동생성/직접입력)</td><td>상환표 자동생성(조건 기반) + 상환계획 직접입력 병행</td><td>§25.18.2</td></tr>\n<tr><td><code>Budget</code>(예산 마스터)</td><td>fiscalYear(회계연도 시작월 설정 가능), 기수구분(당기/전기), 예산유형(경비/매출/고정자산/물품), dimension(부서/사원/프로젝트), accountCode(탭별 코드범위)/물품구분, monthlyAmounts[12], version(최초/수정), fxRate</td><td>(tenant_id, 기수, 유형, 차원, 계정) unique</td><td>§25.17.7, §11.19-(1)</td></tr>\n<tr><td><code>PriorActual</code>(전기실행액)</td><td>예산유형(4탭), 관리코드(차원), 계정과목/물품, 월별 실행액[12]</td><td>전기 데이터 결여 시 수기 보정 채널</td><td>§25.17.10</td></tr>\n<tr><td><code>NextBudget</code>(차기예산)</td><td>계정, 관리코드, 차기예산비율, 차기예산금액, 당기실행액, 전기실행액, 차액</td><td>비율 입력 시 금액 자동 산출</td><td>§25.17.13</td></tr>\n<tr><td><code>BudgetVsActualLine</code></td><td>period, dimension, account, budget, actual(POSTED 집계), diff, comment</td><td>리포트 집계 산출물</td><td>§11.19-(2)(5)</td></tr>\n<tr><td><code>AgingSnapshot</code></td><td>월말 기준 채권/채무 연령분석</td><td>월말 배치 자동 생성·보존</td><td>§11.11</td></tr>\n<tr><td><code>CreditLimit</code></td><td>거래처 여신한도</td><td>초과 시 경고+알림(차단은 회사 정책)</td><td>§11.11, §15</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>상태값: 어음(받을) 보관→할인/배서/만기/부도/부분할인/반환/분할배서(§25.19.1), 어음 용지 미발행→발행→결제/담보/폐기(§25.19.3, 부록 6.3). 자금 관리항목 등록 전표는 물리 삭제 대신 취소·역분개·재등록 이력으로 처리하여 상태머신 정합 유지(부록 6.5 BK 반영).</li>\n</ul>","api":"<h3 class=\"doc-h doc-h3\">6. API 설계</h3>\n<p>§13.3 API 표준(오류코드·멱등성·scope) 준용. 설계서 명시 엔드포인트 + 화면 소요 기준 보완(패턴은 §13 테넌트 API 규격).</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>메서드</th><th>엔드포인트</th><th>내용</th><th>근거</th></tr></thead><tbody><tr><td><code>GET</code></td><td><code>/api/tenant/treasury/aging</code></td><td>채권/채무 연령분석 조회(AgingSnapshot)</td><td>§13(1966행 API 표), §11.11</td></tr>\n<tr><td><code>GET</code></td><td><code>/api/tenant/treasury/notes</code></td><td>어음 보조원장 조회(상태·만기·거래처·은행 필터 — BIL-01/02)</td><td>§13, §25.19.1/2</td></tr>\n<tr><td><code>GET</code></td><td><code>/api/tenant/treasury/cash-plan</code></td><td>자금계획 조회(FND-02/03/04/06 소스)</td><td>§13, §25.17.2</td></tr>\n<tr><td><code>POST</code></td><td><code>/api/tenant/bank-reconciliations/{accountId}/run</code></td><td>은행 잔액 자동 대사 실행(멱등)</td><td>§13, §11.11</td></tr>\n<tr><td><code>POST·PUT·DELETE</code></td><td><code>/api/tenant/treasury/cash-plans</code></td><td>자금계획 CRUD(입력방식·휴일보정 파라미터, Idempotency-Key)</td><td>§25.17.2 화면 소요, §13.3 규격</td></tr>\n<tr><td><code>GET·POST</code></td><td><code>/api/tenant/treasury/cash-items</code></td><td>자금항목·집계코드 등록/조회(코드 대역 검증)</td><td>§25.17.2 항목코드등록</td></tr>\n<tr><td><code>GET</code></td><td><code>/api/tenant/treasury/daily-status</code></td><td>일일자금현황 4탭 집계(FND-03)·경리일보(FND-01)</td><td>§25.17.1/3</td></tr>\n<tr><td><code>GET</code></td><td><code>/api/tenant/treasury/plan-vs-actual</code></td><td>자금일월보 계획/실적/대비(FND-04)</td><td>§25.17.4</td></tr>\n<tr><td><code>GET·POST</code></td><td><code>/api/tenant/treasury/note-pools</code></td><td>어음책/수표책 채번 등록·수불 조회(BIL-03/04, 연속번호 일괄 생성)</td><td>§25.19.3/4</td></tr>\n<tr><td><code>POST</code></td><td><code>/api/tenant/treasury/notes/{noteNo}/discount</code></td><td>받을어음 할인 처리 — 할인율·할인료·실수령액 산출 + 자동분개 생성(BF/JV)</td><td>§11.11 M5, §25.19.1</td></tr>\n<tr><td><code>POST</code></td><td><code>/api/tenant/treasury/notes/{noteNo}/status</code></td><td>어음 상태전이(배서/만기/부도/반환/담보/폐기 — 상태머신 검증)</td><td>§25.19.1/3</td></tr>\n<tr><td><code>GET·POST</code></td><td><code>/api/tenant/treasury/loans</code> · <code>/loans/{loanNo}/schedules</code></td><td>차입금 보조원장·상환표 자동생성/상환계획 직접입력(DEP-02/03)</td><td>§25.18.2/3</td></tr>\n<tr><td><code>GET·POST·PUT</code></td><td><code>/api/tenant/budgets</code></td><td>예산 마스터 CRUD(기수·유형·차원·버전, FND-07)</td><td>§25.17.7, §11.19-(1)</td></tr>\n<tr><td><code>GET</code></td><td><code>/api/tenant/budgets/vs-actual</code></td><td>BvA 집계(월/분기/반기·당기/전기, FND-08/09/11/12)</td><td>§25.17.8~12, §11.19-(2)</td></tr>\n<tr><td><code>GET·POST</code></td><td><code>/api/tenant/budgets/prior-actuals</code> · <code>/next-budgets</code></td><td>전기실행액·차기예산 입력/재계산(FND-10/13)</td><td>§25.17.10/13</td></tr>\n<tr><td><code>GET</code></td><td><code>/api/tenant/budgets/estimation</code></td><td>추정예산(전기-당기-차기 추세·구성비, FND-14)</td><td>§25.17.14</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>오류코드: <code>VALIDATION_FAILED</code>(코드 대역·상태전이 위반), <code>POSTED_IMMUTABLE</code>(마감기간 원장 드릴다운 전표수정), <code>IDEMPOTENCY_CONFLICT</code>(§15 멱등키 충돌 409) 등 §13.3 표준 준용.</li>\n</ul>","validation":"<h3 class=\"doc-h doc-h3\">8. 검증 · 오류 처리</h3>\n<p>§15 공통 검증 + 본 페이즈 특화. 차단(B)/경고(W) 구분.</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>검증 항목</th><th>수준</th><th>처리</th><th>근거</th></tr></thead><tbody><tr><td>1</td><td>어음책 미등록 지급어음 발행</td><td>B</td><td>등록된 용지 범위 안에서만 지급어음 발행 허용, 어음등록 선행 필수(현황 미반영)</td><td>§25.19.2/3, 부록 6.3</td></tr>\n<tr><td>2</td><td>어음 상태전이 위반</td><td>B</td><td>수령→발행→결제/담보/폐기, 받을어음 보관→할인/배서/만기/부도 외 전이 차단</td><td>§25.19.1/3</td></tr>\n<tr><td>3</td><td>담보·폐기등록 입력 제한</td><td>B</td><td>회수 구분 시 금액·의뢰부서·회수예정일 입력 제한, 담보 구분만 회수예정일 입력</td><td>§25.19.3</td></tr>\n<tr><td>4</td><td>자금항목 집계코드 대역 위반</td><td>B</td><td>지급 1-5/A-M, 입금 6-9/N-Z, 자금항목 01~ZZ 외 차단</td><td>§25.17.2</td></tr>\n<tr><td>5</td><td>데이터 존재 자금항목 삭제</td><td>B</td><td>삭제 불가</td><td>§25.17.2</td></tr>\n<tr><td>6</td><td>일일거래(현금) 항목 계정코드 설정</td><td>B</td><td>코드설정 불가(현금 일별 수입·지출 고정)</td><td>§25.17.1</td></tr>\n<tr><td>7</td><td>예산 계정 코드 범위 위반</td><td>B</td><td>탭별 허용 범위(경비 451~999, 매출 401~930, 고정자산 201~250, 세목 5자리) 외 차단</td><td>§25.17.7</td></tr>\n<tr><td>8</td><td>예산 없이 실적만 존재</td><td>W</td><td>차액 마이너스 표시·실적(실행)비율 미표시</td><td>§25.17.8/11/14</td></tr>\n<tr><td>9</td><td>차입금 자금관리 필수조건 미입력</td><td>W</td><td>상환스케줄 미조회(상환조건 분할 선택 건)</td><td>§25.18.2</td></tr>\n<tr><td>10</td><td>여신한도 초과 거래처</td><td>W</td><td>경고+알림 발송(차단 여부는 회사 정책)</td><td>§15, §11.11</td></tr>\n<tr><td>11</td><td>은행 잔액 대사 불일치</td><td>W</td><td>불일치 내역 리포트+마감 체크리스트 경고(차단 여부 회사 정책, 11.9·11.11)</td><td>§15</td></tr>\n<tr><td>12</td><td>미매칭·미증빙 은행거래</td><td>B(마감 게이트)</td><td>미결항목(18.3) 승격 → 마감 게이트</td><td>§11.11</td></tr>\n<tr><td>13</td><td>자금 관리항목 등록 전표 삭제</td><td>B</td><td>후속 거래(할인·배서·만기결제·상환) 연결 확인 → 후속 전표부터 정리 → 보조부 상태 되돌린 뒤 처리. 물리 삭제 금지, 취소·역분개·재등록 이력</td><td>부록 6.5</td></tr>\n<tr><td>14</td><td>마감·승인 전표의 자금항목 정리</td><td>B</td><td>마감해제·권한·사유 기록 필요</td><td>부록 6.5</td></tr>\n<tr><td>15</td><td>휴일 자금계획</td><td>W(자동보정)</td><td>주말·공휴일 → 다음 영업일 반영(직접입력 제외)</td><td>§25.17.2/4/6</td></tr>\n<tr><td>16</td><td>마감기간 원장 드릴다운 전표수정</td><td>B</td><td>P03 전표 규칙 준용(<code>POSTED_IMMUTABLE</code>·마감기간 차단)</td><td>§25.17.9, §13.3</td></tr>\n<tr><td>17</td><td>당좌 수표번호 미등록 전표 반영</td><td>B</td><td>어음등록(2.당좌)→관리항목 당좌 &quot;O&quot;→F2 선택의 3단계 절차 외 반영 불가</td><td>§25.19.4</td></tr></tbody></table></div>","done":"<h3 class=\"doc-h doc-h3\">11. 완료 기준(DoD) · 테스트 관점</h3>\n<ul class=\"doc-list\">\n<li><strong>DoD</strong></li>\n</ul>\n<p>  1. 21개 화면 전부 §25.17~25.19 명세의 탭·조회조건·더보기 기능 구현, 출력물(경리일보·자금일월보·현황·수불장 등) 산출 가능.</p>\n<p>  2. 전표 자금 관리항목(WJV-04~06) 입력 → 보조부(어음/차입금/예적금) 자동 집계 → 자금계획/일일현황 반영의 E2E 정합(어음번호·차입금번호 보조원장 키 기준).</p>\n<p>  3. 어음 상태머신(보관~부도, 용지 미발행~폐기)·어음책 채번 통제·할인 자동분개(M5)가 추적 체인(S11)과 함께 동작.</p>\n<p>  4. 예산 4탭×당기/전기×3차원 입력과 BvA(월/분기/반기)·추정예산 산식(§25.17.8~14 명시 산식) 검증 통과.</p>\n<p>  5. §8 검증 표 17건 차단/경고 동작, 은행 대사·미결항목 마감 게이트 연동(11.9).</p>\n<p>  6. 배치 7종(§7) 멱등·재처리·실패 알림 확인.</p>\n<ul class=\"doc-list\">\n<li><strong>테스트 관점</strong></li>\n<li>산식 단위: 차액=예산-실적, 실적비율=실적/예산×100, 구성비/비율(FND-14 ③④⑥), 당좌한도잔액, 상환표(일시/원리금/원금 분할·거치기간), 할인료·실수령액.</li>\n<li>경계: 예산 없이 실적만(비율 미표시), 잔액 0 계좌 미조회, 부분할인 후 보유/미보유 분리, 휴일 보정 시 직접입력 제외, 회사기수 1기의 종료월 기준 분기 설정.</li>\n<li>정합: 자금일월보 실적 ↔ 현금출납장 잔액 대사, 미반제·어음 잔액 ↔ 원장(AUX) 대사, 전기실행액 ↔ 추정예산 비교치.</li>\n<li>통제: 어음책 범위 외 발행 차단, 관리항목 등록 전표 삭제 시나리오(후속 전표 존재/부재), 마감기간 전표수정 차단, RLS 테넌트 격리(SHARED 티어).</li>\n</ul>","full":"<h2 class=\"doc-h doc-h2\">BK 개발 상세설계서 — 페이즈 09. 자금 · 예산 · 어음</h2>\n<ul class=\"doc-list\">\n<li>기준 문서: <code>bk_설계서_v1.1.md</code> (§25.17 자금·예산관리, §25.18 예적금·차입금, §25.19 어음·당좌관리, §11.11 자금·채권채무 관리, §11.19 예산 대비 실적, §9 관리차원 엔진, §22.2 개발 차수 계획)</li>\n<li>작성일: 2026-07-03</li>\n<li>개발 차수: <strong>전부 2차</strong> — SA-FND-01~14 / SA-DEP-01~03 / SA-BIL-01~04 (21메뉴, §22.2 페이즈 09 행 &quot;전부 2차&quot;)</li>\n<li>선행 페이즈: <strong>P03 전표·자동전표</strong>(전표의 자금 관리항목 WJV-04~06 데이터 위에 보조부·현황 구축 — 00_개요 2절, 설계서 부록 6장 WJV-04/05/06), <strong>P01 기초정보</strong>(거래처등록 금융탭 SA-BAS-06·계정과목 관리항목 SA-BAS-07·차원 BF-09), <strong>P02 전기이월</strong>(거래처별초기이월 — §25.18.1 잔액 반영 소스), <strong>P04 장부</strong>(현금출납장 AUX-07 — §25.17.4 실적 대사)</li>\n<li>공통 설계 표준: <code>00_개요_페이즈일정.md</code> 3절을 그대로 적용(멀티테넌시 RLS·감사 필드·DataChangeLog·오류코드 §13.3·권한 §4.3/§4.5·기장 모드 §21·멱등성·UI 공통·소수점/통화·기술 스택). 본 문서에서 반복 기술하지 않는다.</li>\n</ul>\n<p>---</p>\n<h3 class=\"doc-h doc-h3\">1. 페이즈 개요</h3>\n<h4 class=\"doc-h doc-h4\">1.1 목표</h4>\n<ul class=\"doc-list\">\n<li>전표(P03)의 자금 관리항목(받을어음 WJV-04·지급어음 WJV-05·차입금 WJV-06)과 예금·현금 계정 데이터 위에 <strong>자금 보조부(AUX) — 일일자금·자금계획·자금일월보·입출금내역·자금계획서</strong>를 구축한다(§25.17.1~6, §11.11).</li>\n<li>차원 엔진(§9)의 부서/사원/프로젝트 차원 기반 <strong>다차원 예산 마스터와 예산 대비 실적(BvA) 리포트</strong>(당기/전기/차기/추정)를 구축한다(§25.17.7~14, §11.19, §9.4 차원별 예산).</li>\n<li>금융 거래처 계좌·차입금 스케줄 기반 <strong>예적금·차입금 보조부</strong>(§25.18.1~3)와 어음번호·어음책 채번 기반 <strong>받을/지급어음·당좌수표 보조부</strong>(AUX-02, §25.19.1~4, §11.11 어음 보조원장·추적 타임라인 S11·M5 할인 자동분개)를 구축한다.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">1.2 범위 요약</h4>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>화면군</th><th>메뉴 수</th><th>내용</th><th>근거</th></tr></thead><tbody><tr><td>SA-FND 자금·예산관리</td><td>14</td><td>일일자금명세/경리일보·자금계획·일일자금현황·자금일월보·입출금내역·자금계획서·예산입력·당기/전기 BvA(월/분기·반기)·전기실행액·차기예산·추정예산</td><td>§25.17, §22.3 인벤토리(Ch.17)</td></tr>\n<tr><td>SA-DEP 예적금·차입금</td><td>3</td><td>예적금현황·차입금스케줄관리·차입금현황</td><td>§25.18, §22.3(Ch.18)</td></tr>\n<tr><td>SA-BIL 어음·당좌관리</td><td>4</td><td>받을어음현황·지급어음현황·어음집계표·당좌수표현황</td><td>§25.19, §22.3(Ch.19)</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>메뉴 배치: SA-FND 14화면 → TN-11·TN-12, SA-DEP 3화면·SA-BIL 4화면 → TN-11 (§26.1-(4) SA 182개 화면 배치 합계).</li>\n<li>서비스 특화 공통 기능(§11.11): 은행 잔액 자동 대사(<code>BankReconciliation</code>), 은행거래 분류·증빙매칭(미매칭 건 미결항목 18.3 승격), 주간 자금마감(<code>WeeklyCashReport</code>), 어음 만기 D-7/D-3/당일·여신한도 초과 알림(18장), aging 스냅샷 배치(<code>AgingSnapshot</code>), 자금일보/주간 자금계획 리포트.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">1.3 선행조건</h4>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>선행</th><th>내용</th><th>근거</th></tr></thead><tbody><tr><td>P03 전표 자금 관리항목</td><td><strong>본 페이즈는 P03 전표의 자금 관리항목(WJV-04~06) 데이터 위에 구축된다.</strong> 받을어음(WJV-04): 어음번호·발행인·발행일/만기일·지급은행/지점·어음종류/금액. 지급어음(WJV-05): 어음번호(어음집계표 등록 번호에서 선택)·수취인·발행일/만기일·지급은행·금액. 차입금(WJV-06): 차입금번호·차입처·차입기간·원금·상환구분·이자율·자금용도·담보보증</td><td>00_개요 2절, 부록 6.1~6.4(자금관리 큰 그림·WJV-04/05/06 입력 필드), §25.4 전표 자금란</td></tr>\n<tr><td>P03 계정-보조부 매핑</td><td>자금 항목↔전표 계정 매핑: 받을어음=110, 지급어음=252, 차입금=260 단기/293 장기 등 → 연계 보조부(받을어음현황/지급어음현황·어음집계표/차입금스케줄·현황)</td><td>부록 6.1 자금 항목-계정-보조부 표</td></tr>\n<tr><td>P01 거래처등록 금융탭</td><td>예적금 계좌 마스터(예금종류·만기·이자율·계좌개설점)·정기예금/적금 자금계획 연동 필드</td><td>§25.18.1, §25.17.2 거래처등록 '금융'탭 연동</td></tr>\n<tr><td>P01 계정과목·관리항목</td><td>[계정과목 및 적요등록] 관리항목에 차입금·당좌 설정된 계정만 자금관리 입력 반영</td><td>§25.18.2, §25.19.4</td></tr>\n<tr><td>P01 차원(BF-09)</td><td>부서/사원/프로젝트 차원 마스터·<code>DimensionConfig.budgetEnabled</code></td><td>§9.3, §9.6</td></tr>\n<tr><td>P02 초기이월</td><td>[거래처별초기이월] 잔액이 예적금현황 잔액·어음 보조부 초기 데이터로 반영</td><td>§25.18.1, §25.3(SA-OPN 어음 관리내역 보존)</td></tr>\n<tr><td>P04 현금출납장</td><td>자금일월보 실적 탭이 현금출납장 잔액과 대사</td><td>§25.17.4</td></tr></tbody></table></div>\n<h4 class=\"doc-h doc-h4\">1.4 MVP 연관</h4>\n<ul class=\"doc-list\">\n<li>MVP(일반전표 WJV-01 + 계정과목 WJV-08/09) 비대상. 전 화면 2차(§22.2). 단, 전표 자금 관리항목 입력(WJV-04~06)은 P03(1차)에서 선행 구현되므로, 2차 착수 시점에 1차 축적 데이터의 소급 집계를 지원해야 한다(부록 6.5 관리항목 전표 삭제 규칙과 정합 유지).</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">2. 개발 범위</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>ID</th><th>화면명</th><th>차수</th><th>탭 구성</th><th>설계서 근거</th></tr></thead><tbody><tr><td>SA-FND-01</td><td>일일자금명세/경리일보</td><td>2차</td><td>일일자금명세 / 경리일보</td><td>§25.17.1</td></tr>\n<tr><td>SA-FND-02</td><td>자금계획입력</td><td>2차</td><td>단일(월/일자별 입력)</td><td>§25.17.2</td></tr>\n<tr><td>SA-FND-03</td><td>일일자금현황</td><td>2차</td><td>일일거래증감현황 / 입출금예정액 / 예금현황 / 자금현황</td><td>§25.17.3</td></tr>\n<tr><td>SA-FND-04</td><td>자금일월보</td><td>2차</td><td>계획 / 실적 / 계획·실적대비</td><td>§25.17.4</td></tr>\n<tr><td>SA-FND-05</td><td>자금입출금내역</td><td>2차</td><td>입금내역 / 지출내역</td><td>§25.17.5</td></tr>\n<tr><td>SA-FND-06</td><td>자금계획서</td><td>2차</td><td>월별 달력(캘린더 뷰)</td><td>§25.17.6</td></tr>\n<tr><td>SA-FND-07</td><td>예산입력</td><td>2차</td><td>경비 / 매출 / 고정자산 / 물품코드예산 (각 당기·전기분)</td><td>§25.17.7</td></tr>\n<tr><td>SA-FND-08</td><td>당기예산 월별 실적현황</td><td>2차</td><td>경비 / 매출 / 고정자산 / 물품코드예산</td><td>§25.17.8</td></tr>\n<tr><td>SA-FND-09</td><td>당기예산 분기/반기 실적현황</td><td>2차</td><td>동일 4탭 + 원장조회</td><td>§25.17.9</td></tr>\n<tr><td>SA-FND-10</td><td>전기실행액입력</td><td>2차</td><td>경비 / 매출 / 고정자산 / 물품코드예산</td><td>§25.17.10</td></tr>\n<tr><td>SA-FND-11</td><td>전기예산 월별 실적현황</td><td>2차</td><td>경비 / 매출 / 고정자산예산</td><td>§25.17.11</td></tr>\n<tr><td>SA-FND-12</td><td>전기예산 분기/반기 실적현황</td><td>2차</td><td>경비 / 매출 / 고정자산 / 물품코드예산</td><td>§25.17.12</td></tr>\n<tr><td>SA-FND-13</td><td>차기예산입력</td><td>2차</td><td>경비 / 매출 / 고정자산 / 품목별예산</td><td>§25.17.13</td></tr>\n<tr><td>SA-FND-14</td><td>추정예산</td><td>2차</td><td>경비 / 매출 / 고정자산 / 물품코드예산</td><td>§25.17.14</td></tr>\n<tr><td>SA-DEP-01</td><td>예적금현황</td><td>2차</td><td>잔액 / 원장</td><td>§25.18.1</td></tr>\n<tr><td>SA-DEP-02</td><td>차입금스케줄관리</td><td>2차</td><td>차입금현황 / 상환스케줄 / 상환계획입력</td><td>§25.18.2</td></tr>\n<tr><td>SA-DEP-03</td><td>차입금현황</td><td>2차</td><td>잔액 / 원장</td><td>§25.18.3</td></tr>\n<tr><td>SA-BIL-01</td><td>받을어음현황</td><td>2차</td><td>만기일(월)별 / 거래처별 / 어음조회 / 부분할인·분할배서 / 전자어음 상세조회</td><td>§25.19.1</td></tr>\n<tr><td>SA-BIL-02</td><td>지급어음현황</td><td>2차</td><td>만기월별 / 지급은행별 / 거래처별</td><td>§25.19.2</td></tr>\n<tr><td>SA-BIL-03</td><td>어음집계표</td><td>2차</td><td>지급어음 수불관리 / 어음수지</td><td>§25.19.3</td></tr>\n<tr><td>SA-BIL-04</td><td>당좌수표현황</td><td>2차</td><td>수불장 / 수표집계</td><td>§25.19.4</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">3. 업무 흐름</h3>\n<pre class=\"doc-code\"><code>[P03 전표: 일반/매입매출]                            [P01 기초정보]\n  라인 자금 관리항목 입력                              거래처등록 금융탭(계좌·정기예적금)\n  ├ WJV-04 받을어음(어음번호·만기·지급은행)            계정과목 관리항목(차입금·당좌)\n  ├ WJV-05 지급어음(어음집계표 채번번호 선택)          차원 마스터(부서·사원·프로젝트)\n  └ WJV-06 차입금(차입금번호·상환구분·이자율)                 │\n        │                                                    │\n        ▼                                                    ▼\n  ┌─ 자금 보조부(AUX) ──────────────────────────────────────────────┐\n  │ SA-BIL-03 어음집계표(어음책 채번·수불) ─선행─▶ SA-BIL-02 지급어음현황 │\n  │ SA-BIL-01 받을어음현황(보관·할인·배서·만기·부도)  SA-BIL-04 당좌수표현황 │\n  │ SA-DEP-02 차입금스케줄(상환표 자동생성) ──▶ SA-DEP-03 차입금현황     │\n  │ SA-DEP-01 예적금현황(잔액·원장)                                     │\n  └──────────────┬──────────────────────────────────────────────────┘\n                 ▼\n  SA-FND-02 자금계획입력(전표 수금예정일·차입금 상환계획·정기예적금 연동)\n                 │\n                 ▼\n  SA-FND-01 일일자금명세/경리일보 · SA-FND-03 일일자금현황(대시보드)\n  SA-FND-04 자금일월보(계획 vs 실적) · SA-FND-05 입출금내역 · SA-FND-06 자금계획서(달력)\n                 │\n                 ▼ (서비스 특화, §11.11)\n  은행 잔액 자동 대사 → 마감 체크리스트(11.9) · 주간 자금마감(WeeklyCashReport)\n  어음 만기 D-7/D-3/당일 알림(18장) · aging 스냅샷(월말)\n\n[예산 축] SA-FND-07 예산입력(당기·전기분, 4탭 × 부서/사원/프로젝트 차원)\n  ├▶ SA-FND-08/09 당기 BvA(월별·분기/반기, 실적=POSTED 전표 집계)\n  ├  SA-FND-10 전기실행액입력 ─▶ SA-FND-11/12 전기 BvA(월별·분기/반기)\n  └  SA-FND-13 차기예산입력(당기실행액×비율) ─▶ SA-FND-14 추정예산(전기-당기-차기 추세·구성비)</code></pre>\n<ul class=\"doc-list\">\n<li>흐름 근거: §25.17.2(자금계획→FND-03/04/06 자동반영), §25.19.2(어음등록 선행 후 지급어음 반영), §25.18.2(상환스케줄→자금계획 '104'/'108'), §25.17.7~14(예산 연계망), §11.11(은행 대사·주간 자금마감·만기 알림·aging).</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">4. 화면별 상세설계</h3>\n<h4 class=\"doc-h doc-h4\">4.1 SA-FND-01 일일자금명세/경리일보 (§25.17.1)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 자금항목으로 설정된 계정과목의 전일잔액·당일증감·잔액 조회. BK 자금 보조부(AUX) 일일 자금증감 화면.</li>\n<li><strong>진입경로</strong>: TN-11 자금관리 › 일일자금명세/경리일보 (§26.1).</li>\n<li><strong>조회조건·입력 필드</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>필드</th><th>내용·검증</th><th>근거</th></tr></thead><tbody><tr><td>①</td><td>일자</td><td>조회일자 이동(전일/익일 내비게이션)</td><td>§25.17.1</td></tr>\n<tr><td>②</td><td>자금항목</td><td>0.전체/1.당좌예금/2.보통예금/3.받을어음/4.지급어음/5.단기차입금/6.장기차입금/7.정기예적금</td><td>§25.17.1</td></tr>\n<tr><td>③</td><td>일일거래구분</td><td>0.전체/1.요약(요약 시 계정·거래처 동일 거래 한 줄 요약)</td><td>§25.17.1</td></tr>\n<tr><td>④</td><td>대체거래</td><td>제외/포함 선택</td><td>§25.17.1</td></tr>\n<tr><td>⑤</td><td>경리일보 탭</td><td>일일거래 계정 발생금액·자금항목별 잔액 계정 발생금액 조회, 경리일보(전체용) 인쇄</td><td>§25.17.1</td></tr>\n<tr><td>BK</td><td>공통 조회조건</td><td>회계기간·사업장·자금항목 코드</td><td>§25.17.1</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능·동작</strong>: 더보기 ①자금항목계정설정(자금항목별 집계 계정과목코드 설정 — 과목만 선택 가능·세목 포함 금액 표시, 일일거래는 현금 일별 수입·지출로 코드설정 불가, 자금항목명 더블클릭 수정), ②코드보기(계정·거래처코드 표시여부). 지급어음·받을어음·차입금은 <strong>어음번호/차입금번호별 집계</strong>(자금관리 보조원장 키). 자금항목(예금·어음·차입금)을 BK 계정 그룹핑 규칙으로 매핑(§25.17.1 충돌 조정).</li>\n<li><strong>검증</strong>: 일일거래(현금) 항목 계정코드 설정 시도 차단(§25.17.1).</li>\n<li><strong>산출물</strong>: 경리일보(전체용) 출력물, 일일 자금명세.</li>\n<li><strong>연계</strong>: [일반전표]·[매입매출전표] 데이터 반영, SA-FND-03, SA-DEP-01/03, SA-BIL-01/02 (§25.17.1).</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.2 SA-FND-02 자금계획입력 (§25.17.2)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 월별/일자별 자금 지급·입금 계획 입력 → FND-03 '입출금예정액'·FND-04 '계획'·FND-06에 자동 반영. BK 자금계획(현금흐름 예측) 보조부.</li>\n<li><strong>입력 필드</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>필드</th><th>내용·검증</th><th>근거</th></tr></thead><tbody><tr><td>①</td><td>계획월/계획일자</td><td>월 또는 일자 단위 계획 구분</td><td>§25.17.2</td></tr>\n<tr><td>②</td><td>구분</td><td>0.지급/1.입금</td><td>§25.17.2</td></tr>\n<tr><td>③</td><td>자금항목</td><td>F2 코드도움. 전표 '미불계획관리·신용카드관리' 수금예정일 입력 시 계정설정 자금항목으로 자동 반영</td><td>§25.17.2</td></tr>\n<tr><td>④</td><td>일자·요일</td><td>자동 표시</td><td>§25.17.2</td></tr>\n<tr><td>⑤</td><td>거래처명</td><td>2자 이상 입력·F2 코드도움</td><td>§25.17.2</td></tr>\n<tr><td>⑥</td><td>적요</td><td>전표 수금예정일 자동반영 또는 직접입력</td><td>§25.17.2</td></tr>\n<tr><td>⑦</td><td>금액·입력방식</td><td>직접입력/일반전표/매입매출/정기자금/차입금/거래처등록</td><td>§25.17.2</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>연동 규칙</strong>:</li>\n<li>차입금: SA-DEP-02 '상환계획입력' 데이터 반영 — 원금=자금항목 '104 차입금상환', 이자='108 지급이자'(§25.17.2).</li>\n<li>거래처등록 '금융'탭: 일반(추가사항 일자·자금항목), 정기적금(만기수령일·만기수령액→'603 정기예.적금 만기', 월불입액·월불입일→'105 적금불입'), 정기예금(만기→'603', 월수입액·이자이체일→'704 월수입이자')(§25.17.2).</li>\n<li><strong>기능·동작(더보기)</strong>: ①계정설정(계정별 자금항목), ②자금항목코드도움, ③<strong>항목코드등록</strong> — 자금집계항목·자금항목·계정과목 등록. 집계코드 3자리: 지급 1-5/A-M·입금 6-9/N-Z, 자금항목 01~ZZ, 계정과목 세목 사용 시 5자리. ④정기자금([정기청구입력] 전송·직접입력), ⑤항목별 합계조회('0.계획월' 선택 시), ⑥휴일자료사용여부(주말·공휴일 계획을 다음날 반영, 직접입력 데이터 제외). 공휴일 보정은 BK <strong>영업일 캘린더 룰</strong>로 처리, 전표 수금예정일 기반 자동 자금계획 생성은 BF/JV 자금관리 항목 파이프라인으로 구현(§25.17.2).</li>\n<li><strong>검증</strong>: 데이터가 있는 자금항목 삭제 불가(§25.17.2 항목코드등록), 집계코드 체계(지급/입금 코드 대역) 위반 차단.</li>\n<li><strong>산출물</strong>: 자금계획 데이터(지급/입금 계획).</li>\n<li><strong>연계</strong>: SA-FND-03/04/06 자동반영, SA-DEP-02, [일반전표]·[매입매출전표]·[정기청구입력], 거래처등록 금융탭. BK 자금관리 마스터(예적금·차입금·어음 AUX)와 양방향 연계(§25.17.2).</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.3 SA-FND-03 일일자금현황 (§25.17.3)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 전표·자금계획 입력내용을 반영한 일일자금현황 조회 대시보드(자금 AUX). 4탭 구성.</li>\n<li><strong>탭별 조회조건·필드</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>탭</th><th>필드·내용</th><th>근거</th></tr></thead><tbody><tr><td>1) 일일거래증감현황</td><td>조회일자별 현금·당좌예금 등 계정별 전일잔액·당일증가(+)·당일감소(-)·당일잔액. 구분(0.과목/1.세목 — 환경설정 세목사용 5자리 시 노출), 항목별 계정등록(집계항목별 계정과목 등록, 본 탭에서만 설정·'입출금예정액'에도 반영)</td><td>§25.17.3</td></tr>\n<tr><td>2) 입출금예정액</td><td>일별 입출금 예정액 — SA-FND-02·전표 받을어음/지급어음/미불관리의 만기일·수금/지급예정일 반영, 차입금은 SA-DEP-02 상환계획입력 반영. 자금항목 편집은 자금계획입력 '항목코드등록'</td><td>§25.17.3</td></tr>\n<tr><td>3) 예금현황</td><td>은행코드별 전일잔액·당일증감·당일잔액. 구분(0.보통예금/1.당좌예금), 예금종류·계좌개설점([거래처등록] 반영), 한도잔액(당좌한도액 가감), 계정과목 추가(기본 103.보통예금·102.당좌예금)</td><td>§25.17.3</td></tr>\n<tr><td>4) 자금현황</td><td>받을(지급)어음·차입금·정기예적금 반영. 구분 0.어음현황(좌:지급어음/우:받을어음), 1.차입금 및 정기예적금(좌:차입금/우:정기예적금). 계정과목 추가</td><td>§25.17.3</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>BK 조회조건: 회계기간·사업장, 은행계좌·6차원 집계(§25.17.3).</li>\n<li><strong>기능·동작</strong>: 전표 차변/대변 입력 금액을 계정별 증감으로 자동 집계. <strong>당좌한도잔액 산출 로직</strong> 포함. 예금/어음/차입금/예적금 현황을 은행계좌 차원으로 집계(§25.17.3).</li>\n<li><strong>산출물</strong>: 일일자금현황 조회·출력(증감현황·입출금예정·예금·자금현황).</li>\n<li><strong>연계</strong>: SA-FND-02, SA-DEP-01/02, SA-BIL-01/02, [일반전표]·[매입매출전표](§25.17.3).</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.4 SA-FND-04 자금일월보 (§25.17.4)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 자금계획·실적을 일별/월별 조회, 계획 대비 실적 비율 분석. BK 자금 계획·실적 대비 리포트.</li>\n<li><strong>탭별 필드</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>탭</th><th>내용</th><th>근거</th></tr></thead><tbody><tr><td>① 계획</td><td>SA-FND-02·SA-DEP-02 상환계획 반영, 전일(월)·당일(월) 현금자금·입출금 계획</td><td>§25.17.4</td></tr>\n<tr><td>② 실적</td><td>[일반전표]·[매입매출전표] '자금'란 입력 집계. [현금출납장] 잔액과 전일(월)현금자금에서 자금입출금실적 가감 차액 대사</td><td>§25.17.4</td></tr>\n<tr><td>③ 계획·실적대비</td><td>기간·일·월별 계획·실적 차이 분석</td><td>§25.17.4</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>BK 조회조건: 회계기간·사업장·기간(일/월).</li>\n<li><strong>기능·동작(더보기)</strong>: ①현금자금계정설정(현금자금항목 계정과목 설정 후 재조회 반영), ②공휴일자료변경(납부·결제일 공휴일 시 다음날 반영, 직접입력 데이터 제외). 실적=전표 자금관리 항목, 계획=자금계획 보조부에서 집계하여 차이분석(§25.17.4).</li>\n<li><strong>산출물</strong>: 자금일월보 출력물(계획·실적·대비), 차기 자금계획 기초자료.</li>\n<li><strong>연계</strong>: SA-FND-02, SA-DEP-02, [일반전표]·[매입매출전표]·[현금출납장](§25.17.4).</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.5 SA-FND-05 자금입출금내역 (§25.17.5)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 현금·당좌예금·보통예금·정기예적금·받을어음·지급어음·차입금 입출금내역 조회. 입금내역/지출내역 탭.</li>\n<li><strong>조회조건·입력 필드</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>필드</th><th>내용</th><th>근거</th></tr></thead><tbody><tr><td>①</td><td>일자</td><td>조회 일자</td><td>§25.17.5</td></tr>\n<tr><td>②</td><td>적요</td><td>[일반전표]·[매입매출전표] 적요 반영</td><td>§25.17.5</td></tr>\n<tr><td>③</td><td>Code·거래처명</td><td>전표 거래처코드 반영, 미입력 시 공란</td><td>§25.17.5</td></tr>\n<tr><td>④</td><td>자금항목 계정설정</td><td>자금항목 계정코드·사용여부. 과목만 선택(세목 포함 집계). <strong>최대 3개 추가 등록</strong></td><td>§25.17.5</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능·동작</strong>: 전표 차변(대변) 입력 현금·당좌·보통예금 증가(감소)금액을 입금·지출내역으로 반영. 계정별 입력내역·금액 자동 집계. 자금항목별 계정 매핑 설정을 테넌트별 구성값으로 관리(§25.17.5).</li>\n<li><strong>산출물</strong>: 자금 입출금내역 출력물(입금/지출). <strong>연계</strong>: [일반전표]·[매입매출전표], SA-FND-01.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.6 SA-FND-06 자금계획서 (§25.17.6)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 자금계획을 월별 달력 형태로 조회하는 캘린더 뷰. SA-FND-02·[거래처등록] 금융탭(추가사항·정기적금·정기예금) 내용 조회.</li>\n<li><strong>조회조건·옵션</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>필드</th><th>내용</th><th>근거</th></tr></thead><tbody><tr><td>①</td><td>계획월</td><td>조회 대상 월</td><td>§25.17.6</td></tr>\n<tr><td>②</td><td>입금·지급계획</td><td>지급=빨간색, 입금=파란색 표시. 특정일자 더블클릭 시 SA-FND-02 이동·수정</td><td>§25.17.6</td></tr>\n<tr><td>옵션①</td><td>공휴일반영</td><td>'여' 시 공휴일·토·일 계획 다음날 자동반영(직접입력 제외)</td><td>§25.17.6</td></tr>\n<tr><td>옵션②</td><td>현금자금반영설정</td><td>현금자금항목 계정과목 설정</td><td>§25.17.6</td></tr>\n<tr><td>옵션③</td><td>인쇄옵션</td><td>전월 잔액 기준: '전월 전표 입력상 잔액' / '전월 자금계획서상 잔액' 선택</td><td>§25.17.6</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능·동작</strong>: 공휴일 보정(영업일 캘린더)·현금자금 잔액 연속성 처리. 입금·지급계획을 자금 AUX에서 집계하여 시각화(§25.17.6).</li>\n<li><strong>산출물</strong>: 월별 자금계획 달력 출력물. <strong>연계</strong>: SA-FND-02·[거래처등록] 금융탭.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.7 SA-FND-07 예산입력 (§25.17.7)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 부서별·사원별·프로젝트별 예산과목 예산계획 입력. BK 다차원 예산관리 마스터. 4탭 × 당기분·전기분.</li>\n<li><strong>탭별 계정 코드 범위</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>탭</th><th>계정 범위</th><th>근거</th></tr></thead><tbody><tr><td>경비예산</td><td>매출원가(451~470)·제조원가(501~600)·도급원가(601~700)·분양원가(701~800)·판매관리비(801~900)·영업외비용(931~960)·998법인세등·999소득세등(세목 시 45100~99999)</td><td>§25.17.7</td></tr>\n<tr><td>매출예산</td><td>매출(401~420)·영업외수익(901~930)(세목 40100~93099)</td><td>§25.17.7</td></tr>\n<tr><td>고정자산예산</td><td>유형자산(201~230)·무형자산(231~250)(세목 20100~25099)</td><td>§25.17.7</td></tr>\n<tr><td>물품코드예산</td><td>물품(상품/원재료/부재료/제품/반제품/부산품/저장품)별 예산. 물품구분 선택(0.전체 시 모든 구분 입력)·구분 직접선택·월별입력</td><td>§25.17.7</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>공통 입력 필드</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>필드</th><th>내용·검증</th><th>근거</th></tr></thead><tbody><tr><td>①</td><td>입력기수</td><td>0.당기분/1.전기분</td><td>§25.17.7</td></tr>\n<tr><td>②</td><td>관리부서/사원/프로젝트</td><td>0.전체/1.부서별/2.사원별/3.프로젝트별</td><td>§25.17.7</td></tr>\n<tr><td>③</td><td>관리코드</td><td>상세코드(차원 값)</td><td>§25.17.7</td></tr>\n<tr><td>④</td><td>Code·계정과목</td><td>2자 이상 입력·F2 코드도움, 탭별 코드 범위 검증</td><td>§25.17.7</td></tr>\n<tr><td>⑤</td><td>월별입력</td><td>월별 예산금액(12개월)</td><td>§25.17.7</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>BK 조회조건: 회계기수(당기/전기 차원)·사업장·6차원(부서=DEPARTMENT/사원=EMPLOYEE/프로젝트=PROJECT, 코스트센터 별도)(§25.17.7).</li>\n<li><strong>기능·동작</strong>: 계정과목 코드 범위 검증, 관리코드(차원)별 예산 분리 입력. 다차원 예산 마스터로 구현, 당기/전기분 기수 분리는 회계기수 차원으로 관리(§25.17.7). §11.19-(1) <code>Budget</code> 규격 적용: 회계연도 시작월 설정 가능·예산환율(<code>FxRate</code> §11.16 연계)·버전(최초/수정예산). 차원별 예산 사용은 <code>DimensionConfig.budgetEnabled</code>(§9.3).</li>\n<li><strong>산출물</strong>: 예산 마스터 데이터(경비/매출/고정자산/물품). <strong>연계</strong>: SA-FND-08/09/11/12/14(§25.17.7). 충돌 조정: 기존 통합 설계 9장 예산과 충돌 시 Smart A 4탭 다차원 예산을 BK 예산 마스터로 통일(§25.17.7).</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.8 SA-FND-08 당기예산 월별 실적현황 (§25.17.8)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: FND-07 당기 예산 vs 전표 실적의 월별 BvA 리포트. 부서/사원/프로젝트 구분, 4탭.</li>\n<li><strong>조회조건·표시 항목</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>필드</th><th>내용·산식</th><th>근거</th></tr></thead><tbody><tr><td>①</td><td>기간</td><td>조회 월 범위</td><td>§25.17.8</td></tr>\n<tr><td>②</td><td>구분</td><td>0.전체/1.부서별/2.사원별/3.프로젝트별(관리코드 선택)</td><td>§25.17.8</td></tr>\n<tr><td>③</td><td>계정과목</td><td>조회 대상 계정</td><td>§25.17.8</td></tr>\n<tr><td>④</td><td>조회내용</td><td>월별 예산액(=당기분)·실적액(=전표)·차액(=예산-실적, 실적만 있으면 음수)·실적비율(=실적/예산×100)·전체누계</td><td>§25.17.8</td></tr>\n<tr><td>⑤</td><td>집계옵션</td><td>대분류 녹색·중분류 노란색·계정과목 흰색</td><td>§25.17.8</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능·동작</strong>: 예산 없이 실적만 있으면 차액 마이너스·실적비율 미표시. 실적=전표 집계, 예산=예산 마스터 다차원 조인(§25.17.8). 실적 집계는 POSTED 전표 기준(§11.19-(2) BudgetVsActual: 예산 vs 실적(POSTED 집계) vs 차이, 월별·누적 YTD, 부서/계정 드릴다운).</li>\n<li><strong>산출물</strong>: 당기예산 월별 실적현황 출력물. <strong>연계</strong>: SA-FND-07, [일반전표]·[매입매출전표].</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.9 SA-FND-09 당기예산 분기/반기 실적현황 (§25.17.9)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 당기 예산 vs 전표 실적을 분기·반기 조회 + 원장 드릴다운·전표수정. BK BvA 분기·반기 리포트.</li>\n<li><strong>조회조건</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>필드</th><th>내용</th><th>근거</th></tr></thead><tbody><tr><td>①</td><td>조회</td><td>1.분기별(1~4분기)/2.반기별(상·하반기)</td><td>§25.17.9</td></tr>\n<tr><td>②</td><td>구분</td><td>0.전체/1.부서별/2.사원별/3.프로젝트별</td><td>§25.17.9</td></tr>\n<tr><td>③</td><td>계정과목</td><td>조회 대상 계정</td><td>§25.17.9</td></tr>\n<tr><td>④</td><td>조회내용</td><td>분기·반기별 예산액·실적액·차액·실적비율, 전체누계</td><td>§25.17.9</td></tr>\n<tr><td>2)</td><td>원장조회</td><td>선택 계정과목 원장 조회, '전표수정' 버튼으로 수정</td><td>§25.17.9</td></tr>\n<tr><td>3)</td><td>더보기</td><td>①집계옵션(대·중분류 색상), ②조회기간설정(분기·반기 기준. 종료월 기준은 회사기수 1기만)</td><td>§25.17.9</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능·동작</strong>: SA-FND-08과 동일 산식(차액=예산-실적, 실적비율=실적/예산×100). 원장 드릴다운은 JV 전표 수정과 연계(§25.17.9) — 전표수정 권한·마감기간 통제는 P03 전표 규칙 준용.</li>\n<li><strong>산출물</strong>: 분기/반기 실적현황 출력물, 원장 드릴다운. <strong>연계</strong>: SA-FND-07, [일반전표]·[매입매출전표] 원장·전표수정(JV).</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.10 SA-FND-10 전기실행액입력 (§25.17.10)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 전기의 경비/매출/고정자산/물품코드 실행액 수기 보정 입력(전기 데이터가 시스템에 없을 때). FND-07 전기분 예산액과 본 실행액을 FND-14에서 비교.</li>\n<li><strong>입력 필드</strong>: 4탭(계정 범위 SA-FND-07과 동일). ①관리코드(0.전체/1.부서별/2.사원별/3.프로젝트별), ②코드(상세코드), ③코드·계정과목(2자 이상·F2 코드도움), ④월별입력(월별 실행액). BK 조회조건: 회계기수(전기)·사업장·차원(§25.17.10).</li>\n<li><strong>기능·동작</strong>: 입력 사항은 SA-FND-11/12에 실적액으로 반영(§25.17.10).</li>\n<li><strong>산출물</strong>: 전기 실행액 데이터. <strong>연계</strong>: SA-FND-11/12/14, SA-FND-13 전기실행액(§25.17.10).</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.11 SA-FND-11 전기예산 월별 실적현황 (§25.17.11)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: FND-07 전기분 예산 vs FND-10 전기 실행액의 월별 비교 리포트. 경비/매출/고정자산예산 3탭.</li>\n<li><strong>조회조건</strong>: ①기간, ②구분(0.전체/1.부서별/2.사원별/3.프로젝트별), ③계정과목, ④조회내용(월별 예산액=전기분·실적액=전기실행액입력·차액·실행비율, 전체누계), ⑤집계옵션(대·중분류 색상). BK 조회조건: 회계기수(전기)·사업장·차원(§25.17.11).</li>\n<li><strong>기능·동작</strong>: 실행비율=실적/예산×100, 예산 없이 실적만 있으면 비율 미표시. 실행액=전기실행액 테이블, 예산=전기분 예산 마스터 조인(§25.17.11).</li>\n<li><strong>산출물</strong>: 전기예산 월별 실적현황 출력물. <strong>연계</strong>: SA-FND-07 전기분·SA-FND-10.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.12 SA-FND-12 전기예산 분기/반기 실적현황 (§25.17.12)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 전기분 예산 vs 전기 실행액의 분기·반기 비교 리포트. 4탭.</li>\n<li><strong>조회조건</strong>: ①조회(1.분기별/2.반기별), ②구분(0.전체/1.부서별/2.사원별/3.프로젝트별), ③계정과목, ④조회내용(분기·반기별 전기 예산액·실적액·차액·실행비율, 전체누계), ⑤집계옵션, ⑥조회기간설정(분기·반기 기준). BK 조회조건: 회계기수(전기)·사업장·차원·분기/반기(§25.17.12).</li>\n<li><strong>기능·동작</strong>: SA-FND-11과 동일 산식(실행비율=실적/예산×100)(§25.17.12).</li>\n<li><strong>산출물</strong>: 전기예산 분기/반기 실적현황 출력물. <strong>연계</strong>: SA-FND-07 전기분·SA-FND-10.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.13 SA-FND-13 차기예산입력 (§25.17.13)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 당기실행액 기준 차기예산비율·금액을 입력하여 차기예산 추정(예산 시뮬레이션·차기 예산편성). 입력 데이터는 FND-14에서 조회.</li>\n<li><strong>입력 필드</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>필드</th><th>내용·산식</th><th>근거</th></tr></thead><tbody><tr><td>①</td><td>기간(월)</td><td>조회·입력 기간</td><td>§25.17.13</td></tr>\n<tr><td>②</td><td>관리코드</td><td>0.전체/1.부서별/2.사원별/3.프로젝트별</td><td>§25.17.13</td></tr>\n<tr><td>③</td><td>Code·계정과목명</td><td>당기·전기 실행액 있는 계정 자동반영, 추가입력 가능</td><td>§25.17.13</td></tr>\n<tr><td>④</td><td>차기예산비율·금액</td><td>비율 입력 시 당기실행액×비율=차기예산금액 자동 산출, 직접입력 가능</td><td>§25.17.13</td></tr>\n<tr><td>⑤</td><td>당기실행액</td><td>전표 금액 불러오기</td><td>§25.17.13</td></tr>\n<tr><td>⑥</td><td>전기실행액</td><td>SA-FND-10 불러오기</td><td>§25.17.13</td></tr>\n<tr><td>⑦</td><td>차액</td><td>당기-전기 실행액</td><td>§25.17.13</td></tr>\n<tr><td>⑧</td><td>불러오기</td><td>당기·전기 실행액 재로드</td><td>§25.17.13</td></tr>\n<tr><td>⑨</td><td>재계산</td><td>차기예산 재계산</td><td>§25.17.13</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능·동작</strong>: 비율 기반 자동산정·재계산. 당기 실적 기반 증감률 적용 자동 산정 로직을 예산편성 엔진에 구현(§25.17.13). BK 조회조건: 회계기수·사업장·차원.</li>\n<li><strong>산출물</strong>: 차기예산 데이터. <strong>연계</strong>: SA-FND-14 차기예산액, SA-FND-10, 전표 당기실행액.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.14 SA-FND-14 추정예산 (§25.17.14)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 전기·당기 예산 실행액을 분석하여 차기예산계획을 수정하는 예산 트렌드 분석(전기-당기-차기 추세·구성비) 리포트. 4탭.</li>\n<li><strong>조회 항목·산식</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>항목</th><th>산식·소스</th><th>근거</th></tr></thead><tbody><tr><td>①</td><td>기간(월)</td><td>조회 기간</td><td>§25.17.14</td></tr>\n<tr><td>②</td><td>구분</td><td>0.전체/1.부서별/2.사원별/3.프로젝트별</td><td>§25.17.14</td></tr>\n<tr><td>③</td><td>전기예산</td><td>예산액=FND-07 전기분, 실행액=FND-10, 구성비=전기 해당실행액/전기 실행액합계×100, 비율=전기 실행액/전기 예산액×100</td><td>§25.17.14</td></tr>\n<tr><td>④</td><td>당기예산</td><td>예산액=FND-07 당기분, 실행액=전표, 구성비·비율 동일 산식</td><td>§25.17.14</td></tr>\n<tr><td>⑤</td><td>증감액</td><td>당기-전기 실행액</td><td>§25.17.14</td></tr>\n<tr><td>⑥</td><td>차기예산</td><td>예산액=FND-13, 구성비=차기 해당예산액/차기 예산액합계×100, 비율=차기 예산액/당기 실행액×100</td><td>§25.17.14</td></tr>\n<tr><td>⑦</td><td>계정과목 코드 보기</td><td>코드 표시 토글</td><td>§25.17.14</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능·동작</strong>: 예산액 없을 시 비율 미표시. 다년도 예산·실적 데이터를 회계기수 차원으로 결합하여 추세·구성비 산출(§25.17.14). BK 조회조건: 다년도 회계기수 차원 결합.</li>\n<li><strong>산출물</strong>: 추정예산 분석 출력물. <strong>연계</strong>: SA-FND-07/10/13 종합 연계.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.15 SA-DEP-01 예적금현황 (§25.18.1)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 금융 거래처 계좌별 예금·적금 잔액·원장 상세 조회·출력. BK 예적금 보조부(AUX-03 예금 보조원장 — §11.11: 계좌 단위 은행거래 대사·자금 일정 기준 보조부, 거래처원장과 역할 구분). RLS로 테넌트 계좌 격리.</li>\n<li><strong>탭별 필드</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>탭</th><th>#</th><th>필드</th><th>내용</th><th>근거</th></tr></thead><tbody><tr><td>잔액</td><td>①</td><td>일자</td><td>조회 기준일</td><td>§25.18.1</td></tr>\n<tr><td></td><td>②</td><td>잔액설정</td><td>0.포함/1.미포함</td><td>§25.18.1</td></tr>\n<tr><td></td><td>③</td><td>Code·계좌명·계좌번호</td><td>[거래처등록] 금융탭 반영</td><td>§25.18.1</td></tr>\n<tr><td></td><td>④</td><td>예금종류</td><td>적금종류명</td><td>§25.18.1</td></tr>\n<tr><td></td><td>⑤</td><td>잔액</td><td>조회일자 기준. [거래처별초기이월]·[일반전표]·[매입매출전표] 반영</td><td>§25.18.1</td></tr>\n<tr><td></td><td>⑥</td><td>계약기간</td><td>계좌 개설(해지)일</td><td>§25.18.1</td></tr>\n<tr><td></td><td>⑦</td><td>만기일</td><td>구분 1.정기적금/2.정기예금 시 만기수령일</td><td>§25.18.1</td></tr>\n<tr><td></td><td>⑧</td><td>수령액·한도액</td><td>만기수령액</td><td>§25.18.1</td></tr>\n<tr><td></td><td>⑨</td><td>Code·금융기관</td><td>계좌개설점. 추가는 더보기&gt;등록&gt;은행등록</td><td>§25.18.1</td></tr>\n<tr><td></td><td>⑩</td><td>이자율</td><td>계좌 이자율</td><td>§25.18.1</td></tr>\n<tr><td>원장</td><td>①</td><td>기간</td><td>조회 기간</td><td>§25.18.1</td></tr>\n<tr><td></td><td>②</td><td>금융거래처</td><td>F2 코드도움</td><td>§25.18.1</td></tr>\n<tr><td></td><td>③</td><td>현재금융거래처</td><td>전체 거래처 조회 시 \\</td><td>&lt;,&lt;,&gt;,&gt;\\</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능·동작</strong>: 잔액 없는 계좌 미조회, 잔액 행 더블클릭 시 원장 탭 이동. 계좌 기본정보=거래처등록 금융탭, 거래내역·잔액=전표·초기이월 반영. 금융 거래처 계좌 마스터(예금종류·만기·이자율)와 전표 거래내역을 결합한 계좌별 원장(§25.18.1). 서비스 특화: 8.4 스크래핑 수집 은행 거래내역과 <code>BankAccount</code> 잔액 자동 대사, 불일치 건 마감 체크리스트(11.9) 표시(§11.11).</li>\n<li><strong>산출물</strong>: 예적금 잔액·원장 출력물. <strong>연계</strong>: [거래처등록] 금융탭, [일반전표]·[매입매출전표]·[거래처별초기이월], SA-FND-02(정기예적금 만기·불입), SA-FND-03 자금현황(§25.18.1).</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.16 SA-DEP-02 차입금스케줄관리 (§25.18.2)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 전표 차입금 계정의 상환스케줄 조회·직접 입력. [계정과목 및 적요등록] 관리항목에 차입금이 있는 계정의 자금관리 입력 데이터(WJV-06) 반영. BK 차입금 보조부(AUX).</li>\n<li><strong>탭 1) 차입금현황 필드(17개 전수)</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>필드</th><th>내용</th><th>근거</th></tr></thead><tbody><tr><td>①</td><td>차입금번호</td><td>전표 자금관리 입력(WJV-06 차입금번호)</td><td>§25.18.2, 부록 6.4</td></tr>\n<tr><td>②</td><td>Code·차입처명</td><td>전표 자금관리 거래처</td><td>§25.18.2</td></tr>\n<tr><td>③</td><td>차입기간</td><td>시작일=최초차입일, 종료일=만기일</td><td>§25.18.2</td></tr>\n<tr><td>④</td><td>자금용도</td><td>1.운영/2.시설/3.기타</td><td>§25.18.2</td></tr>\n<tr><td>⑤</td><td>차입처구분</td><td>차입처 유형</td><td>§25.18.2</td></tr>\n<tr><td>⑥⑦</td><td>이체은행·이체계좌</td><td>상환 이체 정보</td><td>§25.18.2</td></tr>\n<tr><td>⑧</td><td>차입원금</td><td>원금</td><td>§25.18.2</td></tr>\n<tr><td>⑨</td><td>상환조건</td><td>일시/분할(원리금)/분할(원금)</td><td>§25.18.2</td></tr>\n<tr><td>⑩</td><td>원금상환주기</td><td>분할 선택 시 활성화</td><td>§25.18.2</td></tr>\n<tr><td>⑪~⑬</td><td>이자지급방식·이자계산·이자지급일</td><td>이자 산정 조건</td><td>§25.18.2</td></tr>\n<tr><td>⑭⑮</td><td>이자율·월이자</td><td>월이자는 상환계획입력 탭에서만 반영</td><td>§25.18.2</td></tr>\n<tr><td>⑯⑰</td><td>최초차입일·최초상환일</td><td>최초상환일로 거치기간 계산</td><td>§25.18.2</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>탭 2) 상환스케줄</strong>: 전표 차입금 상환조건 2.분할(원리금)·3.분할(원금) 선택 시 일자별 상환금액 반영. 자금관리 미입력 조건이 있으면 미조회(§25.18.2).</li>\n<li><strong>탭 3) 상환계획입력</strong>: 등록 조건의 스케줄을 사용하지 않고 상환계획 직접 입력(§25.18.2).</li>\n<li><strong>기능·동작</strong>: 상환조건·주기·이자방식에 따라 일자별 상환·이자 자동계산. 차입원금·이자율·상환조건 기반 <strong>상환표 자동생성</strong>을 자금관리 엔진에 구현, 자금계획·일일자금현황과 양방향 연계(§25.18.2). BK 조회조건: 회계기간·사업장·차입금번호(보조원장 키).</li>\n<li><strong>산출물</strong>: 차입금 상환스케줄·상환계획 데이터. <strong>연계</strong>: SA-FND-02(원금 '104'·이자 '108'), SA-FND-03 입출금예정액, SA-FND-04 계획, SA-DEP-03(§25.18.2).</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.17 SA-DEP-03 차입금현황 (§25.18.3)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 상환구분별 조회일자 기준 거래처별 내역·기본사항(잔액)과 차입금번호별 전표 차입금관리 내용(원장) 조회.</li>\n<li><strong>조회조건</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>탭/영역</th><th>#</th><th>필드</th><th>내용</th><th>근거</th></tr></thead><tbody><tr><td>잔액</td><td>①</td><td>상환구분</td><td>0.전체/1.일시/2.분할(원리금)/3.분할(원금)</td><td>§25.18.3</td></tr>\n<tr><td></td><td>②</td><td>조회일</td><td>차입일자</td><td>§25.18.3</td></tr>\n<tr><td>원장</td><td>①</td><td>차입금번호</td><td>F2 코드도움</td><td>§25.18.3</td></tr>\n<tr><td>더보기</td><td>①</td><td>잔액표시</td><td>0원 표시여부</td><td>§25.18.3</td></tr>\n<tr><td></td><td>②</td><td>조회옵션번호</td><td>조회일 기준/차입일 기준(잔액 탭 일자구분 변경)</td><td>§25.18.3</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능·동작</strong>: 상환구분·조회기준에 따른 잔액 집계. <strong>차입금번호를 자금관리 보조원장 키</strong>로 하여 상환구분별 잔액 집계(§25.18.3). WJV-06 후속관리(원금상환: 차)차입금/대)보통예금, 이자: 차)이자비용/대)보통예금)와 잔액 정합(부록 6.4).</li>\n<li><strong>산출물</strong>: 차입금 잔액·원장 출력물. <strong>연계</strong>: SA-DEP-02, [일반전표]·[매입매출전표] 자금관리.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.18 SA-BIL-01 받을어음현황 (§25.19.1)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 전표 받을어음 계정의 자금관리(WJV-04) 내역을 만기일(월)별·지급은행별·거래처별 조회. BK 받을어음 보조부(AUX-02). 어음번호별 상태·만기·할인·배서 이력을 어음 보조원장으로 관리 + <strong>추적 타임라인</strong>(원전표→증빙→상태변경 이력→부도/결제 후속전표, <code>note.audit_trail</code> 단일 추적 체인 — §11.11 AUX-02 S11).</li>\n<li><strong>탭별 조회조건</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>탭</th><th>필드·내용</th><th>근거</th></tr></thead><tbody><tr><td>1) 만기일(월)별</td><td>①구분(1.일별/2.월별), ②만기일, ③거래처(F2), ④원금(발행금액), ⑤보유금액(분할배서후 금액 — 1.보관 또는 6.부분할인 후 남은 금액), ⑥미보유금액(분할배서금액 — 2.할인/3.배서/4.만기/5.부도/6.부분할인/9.반환)</td><td>§25.19.1</td></tr>\n<tr><td>2) 거래처별</td><td>①구분(1.잔액/2.내용), ②기간(회계기간 기본), ③거래처</td><td>§25.19.1</td></tr>\n<tr><td>3) 어음조회</td><td>①구분(0.전체/1.보관/2.할인/3.배서양도/4.만기/5.부도/6.부분할인/9.반환/10.분할배서), ②조회구분(1.거래일/2.만기일/3.수취일), ③기간, ④거래처(Enter 전체), ⑤조건검색(어음종류·수취구분·어음번호·금융기관코드·만기일)</td><td>§25.19.1</td></tr>\n<tr><td>4) 부분할인/분할배서</td><td>만기일 전 부분할인·부분배서 어음 조회(①거래처, ②처리기간)</td><td>§25.19.1</td></tr>\n<tr><td>5) 전자어음 상세조회</td><td>전자어음 내역 조회(①거래처, ②처리기간)</td><td>§25.19.1</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능·동작</strong>: 어음 상태(보관·할인·배서·만기·부도·부분할인·반환·분할배서)별 보유/미보유 금액 자동 구분(§25.19.1). <strong>어음 할인 시 어음번호별 할인율·할인료(매출채권처분손실)·실수령액 산출, 자동분개(차변 보통예금+매출채권처분손실 / 대변 받을어음)를 BF/JV 파이프라인으로 반영. 어음 계정과목을 거래성격(할인·배서·만기회수·부도)에 따라 자동 매칭, 할인 후 부도 시 후속 환매 전표까지 추적 체인 연결</strong>(§11.11 AUX-02 M5). 후속관리 분개 규칙: 보관/할인/배서/만기결제/부도 — 부록 6.2(WJV-04 후속관리 표).</li>\n<li><strong>검증·알림</strong>: 받을어음 만기 도래 D-7/D-3/당일 알림(18장 채널 자동 통지 — §11.11).</li>\n<li><strong>산출물</strong>: 받을어음 현황·전자어음 상세 출력물. <strong>연계</strong>: 전표 자금관리(받을어음), SA-BIL-03, SA-FND-03 자금현황, 할인료·매출채권처분손실 자동분개(BF/JV)(§25.19.1). BK 조회조건: 회계기간·사업장·만기일·거래처·은행 차원.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.19 SA-BIL-02 지급어음현황 (§25.19.2)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 전표 지급어음 계정의 자금관리(WJV-05) 입력내용을 만기일(월)별·지급은행별·거래처별 조회. <strong>전표 지급어음 입력은 SA-BIL-03 어음등록(어음책 채번)이 선행되어야 반영</strong>(§25.19.2).</li>\n<li><strong>탭별 조회조건</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>탭</th><th>필드·내용</th><th>근거</th></tr></thead><tbody><tr><td>1) 만기월별</td><td>①조회구분(1.일별/2.월별), ②만기일, ③어음구분(1.전체/2.발행/3.결제), ④거래처</td><td>§25.19.2</td></tr>\n<tr><td>2) 지급은행별</td><td>①금융거래처, ②어음구분(1.전체/2.발행/3.결제), ③만기일</td><td>§25.19.2</td></tr>\n<tr><td>3) 거래처별</td><td>①조회구분(1.잔액/2.내용), ②거래처, ③만기일</td><td>§25.19.2</td></tr>\n<tr><td>4) 데이터 정렬</td><td>1.어음번호순 / 2.발행일→만기일→거래처코드→어음번호순 / 3.거래처코드→만기일→어음번호순 / 4.거래처명→만기일→어음번호순 / 5.발행일→어음번호순 / 6.만기일→거래처코드→발행일→어음번호순</td><td>§25.19.2</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능·동작</strong>: 어음등록(어음책 채번) 선행 필수 통제, 발행/결제 구분별 집계. <strong>어음번호 풀과 전표 분개를 연결하는 어음발행 통제 로직</strong> 구현, 다차원 조회·정렬 옵션 제공(§25.19.2). 만기결제 분개(차)지급어음/대)보통예금) 시 어음집계표·지급어음현황 상태 갱신(부록 6.3).</li>\n<li><strong>산출물</strong>: 지급어음 현황 출력물. <strong>연계</strong>: SA-BIL-03 어음등록, 전표 자금관리(지급어음), SA-FND-03 자금현황. BK 조회조건: 회계기간·사업장·만기·은행·거래처.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.20 SA-BIL-03 어음집계표 (§25.19.3)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 보유 지급어음 상태·거래처별 수량 관리. BK 어음 보조부(AUX-02)의 <strong>어음책 채번·수불·담보/폐기 관리</strong> 화면. 지급어음 전표입력 시 어음등록 필수.</li>\n<li><strong>탭·기능별 필드</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>영역</th><th>필드·내용</th><th>근거</th></tr></thead><tbody><tr><td>1) 지급어음 수불관리</td><td>구분(1.수불장/2.전체집계/3.어음조회). ①수불장(어음번호별 금액·현재상태·수령일·발행일·만기일·거래일·어음종류, 금융거래처·어음책수령일), ②전체집계(수령일·지급은행 기준 시작~종료 어음번호·수량 집계), ③어음조회(조회구분 0.발행일/1.만기일/2.거래일/3.수령일)</td><td>§25.19.3</td></tr>\n<tr><td>2) 어음수지</td><td>조회구분(1.만기일기준/2.수금(발행일자)기준)·조회년월. 일자별 받을어음·지급어음 건수·금액, 일일 수지차·누계 수지차</td><td>§25.19.3</td></tr>\n<tr><td>더보기① 어음등록</td><td>어음책등록: 지급어음·당좌수표·가계수표·전자어음. 수령일·어음종류(1.어음/2.당좌/3.가계/4.전자)·구분(수령 고정)·어음으로 대체(당좌·가계→어음, 1.여/2.부)·금융기관·시작어음번호·매수·등록. 어음종류 1.어음·4.전자는 수불관리 탭에서 확인. 어음편집·삭제. 전자어음일괄등록(3/8/9자리)</td><td>§25.19.3, 부록 6.3(어음등록 항목: 시작번호+매수 연속 일괄 채번, 예: 가12345678+10매→10장 자동 생성)</td></tr>\n<tr><td>더보기② 담보·폐기등록</td><td>담보등록(0.담보/1.회수), 폐기등록(0.폐기). 처리일·어음종류·어음번호·거래처명·금액·의뢰부서·회수예정일</td><td>§25.19.3</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능·동작</strong>: '어음으로 대체' 자동처리. <strong>회수 구분 시 금액·의뢰부서·회수예정일 입력 제한, 담보 구분만 회수예정일 입력</strong>. 어음번호 풀(매수·연속번호) 관리, <strong>어음 상태전이(수령→발행→결제/담보/폐기) 통제</strong>, 받을·지급 어음 수지 집계(§25.19.3). 용지 상태: 미발행/발행/결제/폐기(부록 6.3). 등록된 용지 범위 안에서만 지급어음 발행 허용(부록 6.3).</li>\n<li><strong>산출물</strong>: 어음집계표(수불장·전체집계·어음수지) 출력물. <strong>연계</strong>: SA-BIL-02·SA-BIL-04, SA-BIL-01(수지), [일반전표]·[매입매출전표]. BK 조회조건: 회계기간·사업장·금융거래처·수령일·어음번호.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.21 SA-BIL-04 당좌수표현황 (§25.19.4)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 보유 중·정리된 당좌수표를 상태별 상세 관리. BK 당좌·수표 보조부(AUX-02 어음·당좌). 당좌수표등록은 더보기&gt;어음등록의 어음종류 2.당좌.</li>\n<li><strong>탭별 조회조건</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>영역</th><th>필드·내용</th><th>근거</th></tr></thead><tbody><tr><td>1) 수불장</td><td>당좌·가계수표 처리상태별 조회(①금융거래처, ②수령일). 하단 총수령·결제·발행·폐기·잔여매수 수불건수 표시</td><td>§25.19.4</td></tr>\n<tr><td>2) 수표집계</td><td>수표 처리상태를 수령일에 따라 금융기관별 조회(①금융거래처, ②수령일)</td><td>§25.19.4</td></tr>\n<tr><td>더보기① 어음등록</td><td>어음종류 2.당좌·3.가계 등록 시 수불장 확인. 수령일·어음종류·구분(수령)·어음으로 대체·금융기관·시작어음번호·매수·등록. 편집·삭제·전자어음일괄등록</td><td>§25.19.4</td></tr>\n<tr><td>더보기② 담보·폐기등록</td><td>담보등록(0.담보/1.회수), 폐기등록(0.폐기). 처리일·수표종류·수표번호·거래처명·금액·의뢰부서·회수예정일</td><td>§25.19.4</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능·동작 — 전표 수표번호 반영 절차(3단계)</strong>: ⑴ 더보기 어음등록으로 수표번호 등록 → ⑵ [계정과목적요등록] 관리항목 당좌 &quot;O&quot; 설정 → ⑶ [일반전표]·[매입매출전표] 가이드영역 당좌예금란에서 F2 코드도움으로 등록 수표번호 선택 반영(§25.19.4). 수표책 채번·수불·담보/폐기를 어음과 동일 보조원장 체계로 관리.</li>\n<li><strong>산출물</strong>: 당좌수표 수불장·집계 출력물. <strong>연계</strong>: SA-BIL-03 어음등록, [일반전표]·[매입매출전표] 당좌예금 분개·수표번호 연결. BK 조회조건: 회계기간·사업장·금융거래처·수령일.</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">5. 데이터 모델</h3>\n<p>공통: 전 테이블 <code>tenant_id NOT NULL</code>+RLS, 감사 필드, 회계 데이터 물리 삭제 금지(00_개요 3절). 엔티티 근거: §11.11 엔티티 목록, §11.19-(5), §9.6, §12(도메인 모델 자금/채권채무 그룹).</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>엔티티</th><th>핵심 필드</th><th>키·제약</th><th>근거</th></tr></thead><tbody><tr><td><code>CashItem</code>(자금항목 코드)</td><td>집계코드(3자리: 지급 1-5/A-M·입금 6-9/N-Z)·자금항목코드(01~ZZ)·계정과목 매핑(과목/세목 5자리)·사용여부</td><td>(tenant_id, 집계코드, 항목코드) unique. 데이터 존재 항목 삭제 불가</td><td>§25.17.2 항목코드등록, §25.17.1/5 계정설정</td></tr>\n<tr><td><code>CashPlan</code>(자금계획)</td><td>계획월/일자, 구분(지급/입금), 자금항목, 거래처, 적요, 금액, 입력방식(직접/일반전표/매입매출/정기자금/차입금/거래처등록), 휴일보정 여부</td><td>(tenant_id, 일자, seq). 직접입력분은 공휴일 보정 제외 플래그</td><td>§25.17.2</td></tr>\n<tr><td><code>CashPlanReport</code>(자금일보/예측)</td><td>기간, 입출금 실적+어음 만기+정기 지급 예측</td><td>비동기 리포트 잡 산출물</td><td>§11.11 자금일보/주간 자금계획</td></tr>\n<tr><td><code>Note</code>(어음 보조원장)</td><td>어음번호, 종류(어음/당좌/가계/전자), 수취/발행 구분, 발행인/수취인 거래처, 발행일·만기일·수취일·거래일, 지급은행/지점, 원금·보유금액·미보유금액, 상태(보관/할인/배서/만기/부도/부분할인/반환/분할배서 — 받을), (미발행/발행/결제/담보/폐기 — 지급 용지), 할인율·할인료·실수령액, <code>audit_trail</code>(추적 체인)</td><td>(tenant_id, 어음번호) 보조원장 키. 상태전이 통제</td><td>§25.19.1~3, §11.11 AUX-02(S11·M5), 부록 6.2/6.3</td></tr>\n<tr><td><code>NotePool</code>(어음책/수표책)</td><td>수령일, 어음종류, 금융기관, 시작어음번호, 매수, 어음으로 대체 여부, 용지별 상태</td><td>연속번호 일괄 채번. 등록 범위 내 발행만 허용</td><td>§25.19.3 어음등록, 부록 6.3</td></tr>\n<tr><td><code>NoteCollateral</code>(담보·폐기)</td><td>구분(담보/회수/폐기), 처리일, 어음(수표)번호, 거래처, 금액, 의뢰부서, 회수예정일</td><td>담보 구분만 회수예정일 입력</td><td>§25.19.3/4 담보·폐기등록</td></tr>\n<tr><td><code>BankAccount</code>(예적금 계좌)</td><td>계좌명·계좌번호·예금종류·계약기간(개설/해지일)·만기일·만기수령액·한도액(당좌한도)·금융기관(개설점)·이자율</td><td>거래처등록 금융탭이 마스터</td><td>§25.18.1, §11.11</td></tr>\n<tr><td><code>BankTransaction</code></td><td>date, amount, direction, category(입출금/이체/송금/공과금/수수료), counterparty, evidenceStatus, journalRef</td><td>미매칭·미증빙 건 미결항목(18.3) 승격</td><td>§11.11 은행거래 분류·증빙매칭</td></tr>\n<tr><td><code>BankReconciliation</code></td><td>대사 결과·불일치 내역</td><td>불일치 → 마감 체크리스트(11.9)</td><td>§11.11</td></tr>\n<tr><td><code>WeeklyCashReport</code></td><td>weekOf, account, deposits, withdrawals, ending, unidentified[]</td><td>주간 단위 산출</td><td>§11.11</td></tr>\n<tr><td><code>Loan</code>(차입금 보조원장)</td><td>차입금번호, 차입처, 차입기간(최초차입일~만기일), 자금용도(운영/시설/기타), 차입처구분, 이체은행·계좌, 차입원금, 상환조건(일시/분할원리금/분할원금), 원금상환주기, 이자지급방식·이자계산·이자지급일, 이자율, 최초상환일(거치기간), 담보보증</td><td>(tenant_id, 차입금번호) 보조원장 키</td><td>§25.18.2, 부록 6.4(WJV-06)</td></tr>\n<tr><td><code>LoanSchedule</code>(상환스케줄/계획)</td><td>회차, 상환일, 원금상환액, 이자액, 구분(자동생성/직접입력)</td><td>상환표 자동생성(조건 기반) + 상환계획 직접입력 병행</td><td>§25.18.2</td></tr>\n<tr><td><code>Budget</code>(예산 마스터)</td><td>fiscalYear(회계연도 시작월 설정 가능), 기수구분(당기/전기), 예산유형(경비/매출/고정자산/물품), dimension(부서/사원/프로젝트), accountCode(탭별 코드범위)/물품구분, monthlyAmounts[12], version(최초/수정), fxRate</td><td>(tenant_id, 기수, 유형, 차원, 계정) unique</td><td>§25.17.7, §11.19-(1)</td></tr>\n<tr><td><code>PriorActual</code>(전기실행액)</td><td>예산유형(4탭), 관리코드(차원), 계정과목/물품, 월별 실행액[12]</td><td>전기 데이터 결여 시 수기 보정 채널</td><td>§25.17.10</td></tr>\n<tr><td><code>NextBudget</code>(차기예산)</td><td>계정, 관리코드, 차기예산비율, 차기예산금액, 당기실행액, 전기실행액, 차액</td><td>비율 입력 시 금액 자동 산출</td><td>§25.17.13</td></tr>\n<tr><td><code>BudgetVsActualLine</code></td><td>period, dimension, account, budget, actual(POSTED 집계), diff, comment</td><td>리포트 집계 산출물</td><td>§11.19-(2)(5)</td></tr>\n<tr><td><code>AgingSnapshot</code></td><td>월말 기준 채권/채무 연령분석</td><td>월말 배치 자동 생성·보존</td><td>§11.11</td></tr>\n<tr><td><code>CreditLimit</code></td><td>거래처 여신한도</td><td>초과 시 경고+알림(차단은 회사 정책)</td><td>§11.11, §15</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>상태값: 어음(받을) 보관→할인/배서/만기/부도/부분할인/반환/분할배서(§25.19.1), 어음 용지 미발행→발행→결제/담보/폐기(§25.19.3, 부록 6.3). 자금 관리항목 등록 전표는 물리 삭제 대신 취소·역분개·재등록 이력으로 처리하여 상태머신 정합 유지(부록 6.5 BK 반영).</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">6. API 설계</h3>\n<p>§13.3 API 표준(오류코드·멱등성·scope) 준용. 설계서 명시 엔드포인트 + 화면 소요 기준 보완(패턴은 §13 테넌트 API 규격).</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>메서드</th><th>엔드포인트</th><th>내용</th><th>근거</th></tr></thead><tbody><tr><td><code>GET</code></td><td><code>/api/tenant/treasury/aging</code></td><td>채권/채무 연령분석 조회(AgingSnapshot)</td><td>§13(1966행 API 표), §11.11</td></tr>\n<tr><td><code>GET</code></td><td><code>/api/tenant/treasury/notes</code></td><td>어음 보조원장 조회(상태·만기·거래처·은행 필터 — BIL-01/02)</td><td>§13, §25.19.1/2</td></tr>\n<tr><td><code>GET</code></td><td><code>/api/tenant/treasury/cash-plan</code></td><td>자금계획 조회(FND-02/03/04/06 소스)</td><td>§13, §25.17.2</td></tr>\n<tr><td><code>POST</code></td><td><code>/api/tenant/bank-reconciliations/{accountId}/run</code></td><td>은행 잔액 자동 대사 실행(멱등)</td><td>§13, §11.11</td></tr>\n<tr><td><code>POST·PUT·DELETE</code></td><td><code>/api/tenant/treasury/cash-plans</code></td><td>자금계획 CRUD(입력방식·휴일보정 파라미터, Idempotency-Key)</td><td>§25.17.2 화면 소요, §13.3 규격</td></tr>\n<tr><td><code>GET·POST</code></td><td><code>/api/tenant/treasury/cash-items</code></td><td>자금항목·집계코드 등록/조회(코드 대역 검증)</td><td>§25.17.2 항목코드등록</td></tr>\n<tr><td><code>GET</code></td><td><code>/api/tenant/treasury/daily-status</code></td><td>일일자금현황 4탭 집계(FND-03)·경리일보(FND-01)</td><td>§25.17.1/3</td></tr>\n<tr><td><code>GET</code></td><td><code>/api/tenant/treasury/plan-vs-actual</code></td><td>자금일월보 계획/실적/대비(FND-04)</td><td>§25.17.4</td></tr>\n<tr><td><code>GET·POST</code></td><td><code>/api/tenant/treasury/note-pools</code></td><td>어음책/수표책 채번 등록·수불 조회(BIL-03/04, 연속번호 일괄 생성)</td><td>§25.19.3/4</td></tr>\n<tr><td><code>POST</code></td><td><code>/api/tenant/treasury/notes/{noteNo}/discount</code></td><td>받을어음 할인 처리 — 할인율·할인료·실수령액 산출 + 자동분개 생성(BF/JV)</td><td>§11.11 M5, §25.19.1</td></tr>\n<tr><td><code>POST</code></td><td><code>/api/tenant/treasury/notes/{noteNo}/status</code></td><td>어음 상태전이(배서/만기/부도/반환/담보/폐기 — 상태머신 검증)</td><td>§25.19.1/3</td></tr>\n<tr><td><code>GET·POST</code></td><td><code>/api/tenant/treasury/loans</code> · <code>/loans/{loanNo}/schedules</code></td><td>차입금 보조원장·상환표 자동생성/상환계획 직접입력(DEP-02/03)</td><td>§25.18.2/3</td></tr>\n<tr><td><code>GET·POST·PUT</code></td><td><code>/api/tenant/budgets</code></td><td>예산 마스터 CRUD(기수·유형·차원·버전, FND-07)</td><td>§25.17.7, §11.19-(1)</td></tr>\n<tr><td><code>GET</code></td><td><code>/api/tenant/budgets/vs-actual</code></td><td>BvA 집계(월/분기/반기·당기/전기, FND-08/09/11/12)</td><td>§25.17.8~12, §11.19-(2)</td></tr>\n<tr><td><code>GET·POST</code></td><td><code>/api/tenant/budgets/prior-actuals</code> · <code>/next-budgets</code></td><td>전기실행액·차기예산 입력/재계산(FND-10/13)</td><td>§25.17.10/13</td></tr>\n<tr><td><code>GET</code></td><td><code>/api/tenant/budgets/estimation</code></td><td>추정예산(전기-당기-차기 추세·구성비, FND-14)</td><td>§25.17.14</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>오류코드: <code>VALIDATION_FAILED</code>(코드 대역·상태전이 위반), <code>POSTED_IMMUTABLE</code>(마감기간 원장 드릴다운 전표수정), <code>IDEMPOTENCY_CONFLICT</code>(§15 멱등키 충돌 409) 등 §13.3 표준 준용.</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">7. 배치 / 스케줄</h3>\n<p>§14 회사 배치·보고 산출 배치 목록 중 본 페이즈 해당분. 공통: 멱등·재처리·실패 알림(§14).</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>배치</th><th>주기</th><th>처리</th><th>실패 처리</th><th>근거</th></tr></thead><tbody><tr><td>aging 스냅샷 잡</td><td>월말</td><td>채권/채무 연령분석 스냅샷(<code>AgingSnapshot</code>) 자동 생성 — 대손충당금 설정·여신 관리 근거, 계정별 명세서(11.14)·보고패키지(11.13) 구성요소</td><td>재처리·운영자 알림</td><td>§14, §11.11</td></tr>\n<tr><td>은행 자동 대사 잡</td><td>일 배치(+수동 트리거)</td><td>8.4 수집 은행 거래내역 ↔ <code>BankAccount</code> 잔액 대사, 불일치 → 마감 체크리스트(11.9)</td><td>불일치 리포트, 재실행 멱등</td><td>§14, §11.11</td></tr>\n<tr><td>주간 자금마감 잡</td><td>주간</td><td><code>WeeklyCashReport</code> 산출(계좌별 입출금·잔액+미식별거래), 자금일보·월 마감 정합</td><td>재처리</td><td>§14 보고·결산 산출 배치, §11.11</td></tr>\n<tr><td>기한 알림(D-N) 발송 잡</td><td>일</td><td>받을/지급어음 만기 D-7/D-3/당일, 여신한도 초과 → 18장 알림 채널(<code>NotificationSchedule</code>)</td><td>DLQ 적재+운영 콘솔 표시, 멱등 재처리</td><td>§14, §11.11, §18(기한 알림 스케줄), §15</td></tr>\n<tr><td>예실 대비 집계 잡</td><td>월(마감 후)</td><td>BvA 집계(월별·YTD·분기/반기), 비동기 리포트 잡(2.3)</td><td>재처리</td><td>§14, §11.19</td></tr>\n<tr><td>자금일보/주간 자금계획 리포트 잡</td><td>일/주</td><td>입출금 실적+어음 만기+정기 지급(급여·세금 납부 일정) 기반 자금 예측 리포트</td><td>재처리</td><td>§11.11</td></tr>\n<tr><td>자동 자금계획 생성 파이프라인</td><td>이벤트(전표 저장)</td><td>전표 수금예정일·미불계획·신용카드관리 → 자금계획 자동 반영, 정기청구 전송분 반영</td><td>원천 문서키 멱등(중복 생성 금지)</td><td>§25.17.2, §13.3</td></tr>\n<tr><td>영업일 캘린더 보정</td><td>조회/생성 시 룰</td><td>주말·공휴일 계획을 다음 영업일 반영(직접입력 데이터 제외)</td><td>—</td><td>§25.17.2/4/6</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">8. 검증 · 오류 처리</h3>\n<p>§15 공통 검증 + 본 페이즈 특화. 차단(B)/경고(W) 구분.</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>검증 항목</th><th>수준</th><th>처리</th><th>근거</th></tr></thead><tbody><tr><td>1</td><td>어음책 미등록 지급어음 발행</td><td>B</td><td>등록된 용지 범위 안에서만 지급어음 발행 허용, 어음등록 선행 필수(현황 미반영)</td><td>§25.19.2/3, 부록 6.3</td></tr>\n<tr><td>2</td><td>어음 상태전이 위반</td><td>B</td><td>수령→발행→결제/담보/폐기, 받을어음 보관→할인/배서/만기/부도 외 전이 차단</td><td>§25.19.1/3</td></tr>\n<tr><td>3</td><td>담보·폐기등록 입력 제한</td><td>B</td><td>회수 구분 시 금액·의뢰부서·회수예정일 입력 제한, 담보 구분만 회수예정일 입력</td><td>§25.19.3</td></tr>\n<tr><td>4</td><td>자금항목 집계코드 대역 위반</td><td>B</td><td>지급 1-5/A-M, 입금 6-9/N-Z, 자금항목 01~ZZ 외 차단</td><td>§25.17.2</td></tr>\n<tr><td>5</td><td>데이터 존재 자금항목 삭제</td><td>B</td><td>삭제 불가</td><td>§25.17.2</td></tr>\n<tr><td>6</td><td>일일거래(현금) 항목 계정코드 설정</td><td>B</td><td>코드설정 불가(현금 일별 수입·지출 고정)</td><td>§25.17.1</td></tr>\n<tr><td>7</td><td>예산 계정 코드 범위 위반</td><td>B</td><td>탭별 허용 범위(경비 451~999, 매출 401~930, 고정자산 201~250, 세목 5자리) 외 차단</td><td>§25.17.7</td></tr>\n<tr><td>8</td><td>예산 없이 실적만 존재</td><td>W</td><td>차액 마이너스 표시·실적(실행)비율 미표시</td><td>§25.17.8/11/14</td></tr>\n<tr><td>9</td><td>차입금 자금관리 필수조건 미입력</td><td>W</td><td>상환스케줄 미조회(상환조건 분할 선택 건)</td><td>§25.18.2</td></tr>\n<tr><td>10</td><td>여신한도 초과 거래처</td><td>W</td><td>경고+알림 발송(차단 여부는 회사 정책)</td><td>§15, §11.11</td></tr>\n<tr><td>11</td><td>은행 잔액 대사 불일치</td><td>W</td><td>불일치 내역 리포트+마감 체크리스트 경고(차단 여부 회사 정책, 11.9·11.11)</td><td>§15</td></tr>\n<tr><td>12</td><td>미매칭·미증빙 은행거래</td><td>B(마감 게이트)</td><td>미결항목(18.3) 승격 → 마감 게이트</td><td>§11.11</td></tr>\n<tr><td>13</td><td>자금 관리항목 등록 전표 삭제</td><td>B</td><td>후속 거래(할인·배서·만기결제·상환) 연결 확인 → 후속 전표부터 정리 → 보조부 상태 되돌린 뒤 처리. 물리 삭제 금지, 취소·역분개·재등록 이력</td><td>부록 6.5</td></tr>\n<tr><td>14</td><td>마감·승인 전표의 자금항목 정리</td><td>B</td><td>마감해제·권한·사유 기록 필요</td><td>부록 6.5</td></tr>\n<tr><td>15</td><td>휴일 자금계획</td><td>W(자동보정)</td><td>주말·공휴일 → 다음 영업일 반영(직접입력 제외)</td><td>§25.17.2/4/6</td></tr>\n<tr><td>16</td><td>마감기간 원장 드릴다운 전표수정</td><td>B</td><td>P03 전표 규칙 준용(<code>POSTED_IMMUTABLE</code>·마감기간 차단)</td><td>§25.17.9, §13.3</td></tr>\n<tr><td>17</td><td>당좌 수표번호 미등록 전표 반영</td><td>B</td><td>어음등록(2.당좌)→관리항목 당좌 &quot;O&quot;→F2 선택의 3단계 절차 외 반영 불가</td><td>§25.19.4</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">9. 권한 · SOD · 감사</h3>\n<ul class=\"doc-list\">\n<li><strong>메뉴 권한</strong>: <code>RoleMenuPermission</code>+<code>MenuActionGrant</code> 미노출 원칙(00_개요 3절, §4.3). TN-11(자금·어음·예적금/차입금)·TN-12(예산) 메뉴 단위 조회/입력/출력 행위 분리(§26.1).</li>\n<li><strong>화면×행위 특이 통제</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>화면</th><th>통제</th><th>근거</th></tr></thead><tbody><tr><td>SA-FND-02/07/10/13 (계획·예산 입력)</td><td>입력·수정은 DataChangeLog(전후값·IP·행위자) 기록. 예산 버전(최초/수정) 관리로 임의 덮어쓰기 방지</td><td>§17, §11.19-(1)</td></tr>\n<tr><td>SA-FND-09 원장조회 전표수정</td><td>P03 전표 수정 권한·SOD(작성≠승인)·마감 통제 승계</td><td>§25.17.9, 00_개요 3절</td></tr>\n<tr><td>SA-BIL-03/04 어음등록·담보/폐기</td><td>어음책 채번·폐기는 상태전이 이력 보존(append-only), 삭제는 편집 이력으로 기록</td><td>§25.19.3, §17</td></tr>\n<tr><td>SA-DEP-01 계좌 조회</td><td>계좌번호 등 민감정보 마스킹+Step-up 평문 조회(UI 공통)</td><td>00_개요 3절, §17</td></tr>\n<tr><td>기장 모드</td><td><code>OPERATOR_LED</code> 이용회사 입력 제한(<code>tenantInputPolicy</code>), HYBRID 분담 규칙 위반 입력 차단 — 자금계획·예산 입력 화면에 동일 적용</td><td>§21, §15</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>감사</strong>: 어음 추적 타임라인(<code>note.audit_trail</code>) — 원전표→증빙→상태변경 이력→부도/결제 후속전표 단일 추적 체인(§11.11 S11). 자금항목·계정 매핑 변경, 예산 수정, 담보/폐기 처리 모두 <code>DataChangeLog</code> 대상(§17).</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">10. 연계</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>방향</th><th>대상</th><th>내용</th><th>근거</th></tr></thead><tbody><tr><td>선행</td><td>P03 전표(WJV-04~06)</td><td>받을/지급어음·차입금 자금 관리항목 라인 데이터가 전 보조부의 원천. 계정-보조부 매핑(110/252/260·293)</td><td>부록 6.1~6.4, 00_개요 2절</td></tr>\n<tr><td>선행</td><td>P01 SA-BAS-06 거래처등록</td><td>금융탭(계좌·정기예적금)이 DEP-01 마스터·FND-02 연동 소스</td><td>§25.18.1, §25.17.2</td></tr>\n<tr><td>선행</td><td>P01 SA-BAS-07 계정과목</td><td>관리항목(차입금·당좌) 설정 계정만 자금관리 반영</td><td>§25.18.2, §25.19.4</td></tr>\n<tr><td>선행</td><td>P02 SA-OPN 거래처별초기이월</td><td>예적금 잔액·어음 보조부 초기 데이터</td><td>§25.18.1, §25.3</td></tr>\n<tr><td>선행</td><td>P03 SA-ATX 정기청구입력</td><td>정기자금 전송 → 자금계획</td><td>§25.17.2</td></tr>\n<tr><td>선행</td><td>P04 AUX-07 현금출납장</td><td>자금일월보 실적 대사</td><td>§25.17.4</td></tr>\n<tr><td>후행</td><td>P05 결산(11.9 마감 체크리스트)</td><td>은행 대사 불일치·미결항목이 마감 게이트</td><td>§11.11, §15</td></tr>\n<tr><td>후행</td><td>P05 보고패키지(11.13)·명세서(11.14)</td><td>aging 명세가 패키지 구성요소</td><td>§11.11</td></tr>\n<tr><td>외부</td><td>8.4 스크래핑 파이프라인</td><td>은행 거래내역 수집 → 자동 대사·거래 분류·증빙매칭</td><td>§11.11</td></tr>\n<tr><td>외부</td><td>18장 알림</td><td>어음 만기 D-7/D-3/당일·여신한도 초과 자동 통지, 기한 알림 D-N 스케줄</td><td>§11.11, §18</td></tr>\n<tr><td>참조</td><td>11.20 그룹보고</td><td>그룹 12개월 유동성 템플릿과 자금일보 연계</td><td>§11.11, §11.20-(3)</td></tr>\n<tr><td>참조</td><td>11.19-(3) 비용 배부(N12)</td><td>예산·관리회계 축의 원가배부(결산 vs 별도 모듈은 §23-56) — 본 페이즈 범위 외, BvA와 데이터 공유</td><td>§11.19-(3)</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">11. 완료 기준(DoD) · 테스트 관점</h3>\n<ul class=\"doc-list\">\n<li><strong>DoD</strong></li>\n</ul>\n<p>  1. 21개 화면 전부 §25.17~25.19 명세의 탭·조회조건·더보기 기능 구현, 출력물(경리일보·자금일월보·현황·수불장 등) 산출 가능.</p>\n<p>  2. 전표 자금 관리항목(WJV-04~06) 입력 → 보조부(어음/차입금/예적금) 자동 집계 → 자금계획/일일현황 반영의 E2E 정합(어음번호·차입금번호 보조원장 키 기준).</p>\n<p>  3. 어음 상태머신(보관~부도, 용지 미발행~폐기)·어음책 채번 통제·할인 자동분개(M5)가 추적 체인(S11)과 함께 동작.</p>\n<p>  4. 예산 4탭×당기/전기×3차원 입력과 BvA(월/분기/반기)·추정예산 산식(§25.17.8~14 명시 산식) 검증 통과.</p>\n<p>  5. §8 검증 표 17건 차단/경고 동작, 은행 대사·미결항목 마감 게이트 연동(11.9).</p>\n<p>  6. 배치 7종(§7) 멱등·재처리·실패 알림 확인.</p>\n<ul class=\"doc-list\">\n<li><strong>테스트 관점</strong></li>\n<li>산식 단위: 차액=예산-실적, 실적비율=실적/예산×100, 구성비/비율(FND-14 ③④⑥), 당좌한도잔액, 상환표(일시/원리금/원금 분할·거치기간), 할인료·실수령액.</li>\n<li>경계: 예산 없이 실적만(비율 미표시), 잔액 0 계좌 미조회, 부분할인 후 보유/미보유 분리, 휴일 보정 시 직접입력 제외, 회사기수 1기의 종료월 기준 분기 설정.</li>\n<li>정합: 자금일월보 실적 ↔ 현금출납장 잔액 대사, 미반제·어음 잔액 ↔ 원장(AUX) 대사, 전기실행액 ↔ 추정예산 비교치.</li>\n<li>통제: 어음책 범위 외 발행 차단, 관리항목 등록 전표 삭제 시나리오(후속 전표 존재/부재), 마감기간 전표수정 차단, RLS 테넌트 격리(SHARED 티어).</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">12. 잔여 확인사항 (§23 연계)</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>§23 항목</th><th>내용</th><th>본 페이즈 영향</th><th>근거</th></tr></thead><tbody><tr><td>23-6</td><td>차원 조합규칙·<strong>예산 사용 기본값</strong>, 마감기간 차원 소급 변경 허용 권한</td><td><code>DimensionConfig.budgetEnabled</code> 기본값·FND-07 차원 범위 확정 필요</td><td>§23-6, §9.3</td></tr>\n<tr><td>23-19</td><td>마감 정책: <strong>은행 대사 미완료 시 차단/경고 선택</strong></td><td>은행 자동 대사 잡 결과의 마감 게이트 수준 확정</td><td>§23-19, §11.11</td></tr>\n<tr><td>23-38</td><td>예산/관리회계: <strong>회계연도 시작월 회사 설정 허용 범위, 예산 버전 관리 정책, Capex/헤드카운트 포함 여부</strong></td><td><code>Budget</code> 스키마(version·fiscalYear)·FND-07 입력 범위 확정</td><td>§23-38, §11.19</td></tr>\n<tr><td>23-40</td><td>미결항목: 마감 차단 대상 OpenItem 유형(증빙불비 강제 차단 여부)·기한·에스컬레이션</td><td>미매칭 은행거래 승격 건의 차단 수준</td><td>§23-40, §11.11</td></tr>\n<tr><td>23-56</td><td>비용 배부(N12) 모듈 위치(결산 포함 vs 별도 관리회계 모듈)·배부율 기준·확정 권한</td><td>BvA 리포트와의 데이터 연계 시점 결정(본 페이즈는 조회만)</td><td>§23-56, §11.19-(3)</td></tr>\n<tr><td>23-57</td><td>AR/AP Invoice 매칭·Clearing 방식(자동 매칭 임계·부분/초과 입금·외화 반제 환율)</td><td>입금-인보이스 자동 매칭 후보가 은행거래 분류와 연계 — 자금 화면의 매칭 UI 범위</td><td>§23-57, §11.11 N4</td></tr>\n<tr><td>15장 정책</td><td>여신한도 초과 <strong>차단 여부(회사 정책)</strong></td><td><code>CreditLimit</code> 초과 시 경고/차단 옵션 기본값</td><td>§15, §11.11</td></tr>\n<tr><td>22.2</td><td>2차 착수 일정(1차 안정화 이후, 계약·일정 확정 시 갱신)·1차 축적 자금 관리항목 데이터의 소급 집계 범위</td><td>페이즈 전체 착수 시점</td><td>§22.2, 00_개요 1절</td></tr></tbody></table></div>"},"hasJournalImpl":false,"journalImplRel":"../화면설계/구현_화면_전표_v1.1.html"};
function el(tag, cls, text){ const n=document.createElement(tag); if(cls)n.className=cls; if(text!==undefined)n.textContent=text; return n; }
function setHtml(node, html){ node.innerHTML = html || ''; return node; }
function phaseBadge(phase){ return phase==='1차'?'badge b-new':phase==='2차'?'badge b-gray':phase==='3차'?'badge b-warn':'badge b-ref'; }
function kindClass(kind){ return kind==='error'?'errormsg':kind==='warn'?'warnmsg':'okmsg'; }
function money(i){ return (i*1375000 + 12000000).toLocaleString('ko-KR'); }
function stripHtml(html){ const d=document.createElement('div'); d.innerHTML=html||''; return d.textContent.replace(/\s+/g,' ').trim(); }
function makeTable(cols, rows){
  const table=el('table','grid'); const head=document.createElement('tr'); cols.forEach(c=>head.appendChild(el('th','',c))); table.appendChild(head);
  rows.forEach((row,i)=>{ const tr=document.createElement('tr'); if(i===0)tr.className='sel'; row.forEach((cell,idx)=>{ const td=el('td','',cell); if(idx>1 && /[0-9,]/.test(String(cell)))td.className='num'; if(/차단|경고|불일치|오류|불가|미통과/.test(String(cell)))td.className=(td.className+' red').trim(); if(/정상|완료|확정|일치/.test(String(cell)))td.className=(td.className+' ok').trim(); tr.appendChild(td); }); table.appendChild(tr); });
  return table;
}
function tabsFor(screen){
  const raw = (screen.tabs || '').replace(/<br>/g,'/').split(/[\/·,]/).map(s=>s.trim()).filter(Boolean);
  if(raw.length >= 2) return raw.slice(0,5);
  const g=screen.group, t=screen.title, id=screen.id;
  if(/전표 입력/.test(g) && /매입매출|WPV/.test(t+id)) return ['세무헤더','분개라인','부가세 자동라인','전자발행','검증'];
  if(/전표 입력/.test(g)) return ['전표목록','분개입력','관리항목','승인/검증'];
  if(/자동전표/.test(g)) return ['수집자료','추천분개','오류검증','전표전송'];
  if(/장부|원장/.test(g)) return ['원장조회','월계/누계','전표드릴다운','출력'];
  if(/보조부/.test(g)) return ['명세','반제/상태','전표연계','집계'];
  if(/결산/.test(g) || /재무제표/.test(g)) return ['자료입력','조정/집계','검증','출력'];
  if(/부가세/.test(g)) return ['신고서','매입/매출','불러오기','전자신고'];
  if(/고정자산/.test(g)) return ['자산등록','상각','처분/양도','명세'];
  if(/자금|예산/.test(g)) return ['계획','실적','예산','현황'];
  if(/예적금/.test(g)) return ['계좌현황','스케줄','이자/상환','전표연계'];
  if(/어음/.test(g)) return ['수불관리','집계','조회','담보/폐기'];
  if(/데이터관리/.test(g)) return ['대상선택','검증','실행','이력'];
  return ['목록','상세입력','검증','출력'];
}
function controlType(name, desc){
  const txt=(name+' '+(desc||''));
  if(/탭|구분|유형|상태|옵션|선택|여부/.test(txt)) return 'select';
  if(/일자|기간|월|기수|회계기간|만기/.test(txt)) return 'date';
  if(/금액|세액|잔액|합계|공급가액|차변|대변|수량|단가|율/.test(txt)) return 'number';
  if(/코드|거래처|계정|사업자|은행|부서|프로젝트|사원/.test(txt)) return 'code';
  if(/파일|첨부|전송|업로드|백업|복구/.test(txt)) return 'action';
  return 'text';
}
function sampleValue(field, screen, i){
  const name=field.name||field;
  const desc=field.desc||'';
  const txt=name+' '+desc;
  if(/회계기간|기수/.test(txt)) return '2026 / 제7기';
  if(/사업장/.test(txt)) return '0.전체';
  if(/일자|기간|월/.test(txt)) return i%2?'2026-06-30':'2026-06';
  if(/거래처/.test(txt)) return '000123 ㈜대한상사';
  if(/계정|과목/.test(txt)) return '401 매출 / 101 현금';
  if(/사업자/.test(txt)) return '123-45-67890';
  if(/금액|세액|잔액|합계|공급가액|차변|대변/.test(txt)) return money(i+1);
  if(/상태/.test(txt)) return screen.statusKind==='warn'?'검토필요':'정상';
  if(/구분|유형|탭|옵션/.test(txt)) return (desc.match(/[0-9]\.[^/·,\s)]+/)||['전체'])[0];
  if(/파일|업로드|백업|복구/.test(txt)) return '대상 선택';
  if(/수량/.test(txt)) return String((i+1)*2);
  if(/율|비율/.test(txt)) return '10.00%';
  return desc ? desc.slice(0,38) : screen.title;
}
function recordRows(screen){
  const seed=screen.fields.length?screen.fields:([{name:screen.title,desc:screen.purpose}]);
  return seed.slice(0,8).map((f,i)=>({title:f.name, sub:(f.desc||screen.group||screen.title).slice(0,46), amount:money(i+2), status:i%3===0?'검토':(i%2?'정상':'완료')}));
}
function domainColumns(screen){
  const text=screen.group+' '+screen.title+' '+screen.id;
  if(/전표|JNL|WPV/.test(text)) return ['일자','전표번호','구분','계정과목','거래처','차변','대변','적요','상태'];
  if(/자동전표|ATX/.test(text)) return ['수집일자','증빙유형','거래처','공급가액','부가세','추천계정','전표상태','검증'];
  if(/장부|원장|LED|AUX/.test(text)) return ['일자','전표번호','계정/보조부','거래처','차변','대변','잔액','드릴다운'];
  if(/결산|재무|CLS|FIN/.test(text)) return ['계정코드','계정과목','전기잔액','당기증감','조정분개','기말잔액','검증'];
  if(/부가세|VAT/.test(text)) return ['구분','거래처/서식','공급가액','세액','공제/불공제','신고서 반영','검증'];

  if(/예적금|차입|DEP/.test(text)) return ['계좌/차입번호','금융기관','개시일','만기일','원금','이자율','잔액'];
  if(/어음|수표|BIL/.test(text)) return ['어음번호','거래처','발행일','만기일','금액','상태','전표'];
  if(/데이터|DAT/.test(text)) return ['작업','대상기간','데이터범위','검증결과','진행상태','작업자','이력'];

function domainRows(screen){
  const cols=domainColumns(screen);
  const fields=screen.fields.length?screen.fields:[{name:screen.title,desc:screen.purpose}];
  return fields.slice(0,10).map((f,i)=>cols.map((c,ci)=>{
    const txt=c+' '+f.name+' '+(f.desc||'');
    if(/No/.test(c)) return String(i+1).padStart(2,'0');
    if(/일자|발행일|만기|대상기간/.test(txt)) return i%2?'2026-06-30':'2026-06-18';
    if(/전표번호/.test(txt)) return '2026-06-18-'+String(i+1).padStart(3,'0');
    if(/계정|과목|보조부/.test(txt)) return f.name.includes('계정')?f.name:'401 매출';
    if(/거래처|금융기관/.test(txt)) return i%2?'국민은행':'㈜대한상사';
    if(/금액|차변|대변|세액|잔액|원금|실적|계획|차이|가액/.test(txt)) return money(i+ci+1);
    if(/상태|검증|결과|진행/.test(txt)) return i%4===0?'경고':'정상';
    if(/구분|유형|증빙|서식/.test(txt)) return f.name;
    if(/작업|항목|데이터범위/.test(txt)) return f.name;
    if(/근거|드릴다운|전표/.test(txt)) return screen.basis||screen.impl||screen.id;
    return sampleValue(f,screen,i+ci);
  }));
}
