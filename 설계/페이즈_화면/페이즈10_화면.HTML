ss=\"doc-table-block\"><h4>상세 표 9 · 11.2 테스트 관점</h4><div class=\"doc-caption\">11.2 테스트 관점</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>시나리오</th><th>기대 결과</th><th>근거</th></tr></thead><tbody><tr><td>1</td><td>전표 삭제 후 DAT-01 복구</td><td>원 번호 결번 보존, 새 번호 재채번, &quot;복구전표&quot; 표기, 원장 재반영</td><td>§25.20.1, §11.1</td></tr>\n<tr><td>2</td><td>자동연동/복수거래/자금관리 전표 복구 시도</td><td>조회 목록에 미노출</td><td>§25.20.1</td></tr>\n<tr><td>3</td><td>사업자번호 불일치 .wdb/.sdb 업로드</td><td>복구/재구성 차단</td><td>§25.20.2·5</td></tr>\n<tr><td>4</td><td>현재회사 복구 → 기초코드 머지(판단기준 체크/미체크)</td><td>미체크: 사업자번호·계좌·가맹점·카드번호 동일판단 / 체크: 거래처명 포함 비교·코드 신규생성</td><td>§25.20.2·6</td></tr>\n<tr><td>5</td><td>.whg/.whgdata 생성 → 레거시 Smart A 복구/올리기</td><td>왕복 호환(기수·사업자번호 일치 시), 기간 단위 삭제·덮어쓰기</td><td>§25.20.3~4</td></tr>\n<tr><td>6</td><td>메뉴권한 미보유자 내보내기 시도</td><td>차단(<code>FORBIDDEN_SCOPE</code>) + 메뉴 미노출</td><td>§25.20.4, §4.3</td></tr>\n<tr><td>7</td><td>부서/사원 통합 미진행 상태 올리기</td><td>차단</td><td>§25.20.6</td></tr>\n<tr><td>8</td><td>2개 기수 메뉴 실행 이력 회사의 기수변경</td><td>차단 + 수동 검토 접수</td><td>§25.20.7</td></tr>\n<tr><td>9</td><td>기수변경 성공 후</td><td><code>FiscalYear</code> 메타데이터 일괄 변경, 이력 그리드에 변경전/후·작업자·시간 표시</td><td>§25.20.7</td></tr>\n<tr><td>10</td><td>테넌트 단위 시점 복구(PITR) 훈련</td><td>특정 회사만 시점 복구, 무결성·잔액 검증 통과, <code>DrDrillLog</code> 기록</td><td>§2.4, §19.3</td></tr>\n<tr><td>11</td><td>콜드 이관 중 checksum 불일치 주입</td><td>이관 중단·운영 파티션 유지·재처리</td><td>§15</td></tr>\n<tr><td>12</td><td>동시 재구성(이중 실행)·동일 멱등키 재요청</td><td>분산 락 예외 / 동일 응답(중복 반영 없음)</td><td>§2.1, §13.3</td></tr>\n<tr><td>13</td><td>테넌트 격리</td><td>타 테넌트 삭제전표·백업파일 접근 불가(RLS+ORM 이중 강제)</td><td>§16.1</td></tr></tbody></table></div></section>\n<section class=\"doc-table-block\"><h4>상세 표 10 · 12. 잔여 확인사항 (§23 연계)</h4><div class=\"doc-caption\">12. 잔여 확인사항 (§23 연계)</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>확인사항</th><th>§23 항목</th></tr></thead><tbody><tr><td>1</td><td>구독 상태별 유예기간 일수, 항목별 보존연한, 파기 주기 확정</td><td>§23-3</td></tr>\n<tr><td>2</td><td>격리 티어 전환 기준과 전용(DEDICATED) 티어 백업 SLA</td><td>§23-5</td></tr>\n<tr><td>3</td><td>회계장부 보존기간과 개인정보 파기/분리보관 정책의 우선순위·충돌 처리 기준</td><td>§23-14</td></tr>\n<tr><td>4</td><td>SLO/DR 수치 확정(가용성 목표, 티어별 RTO/RPO, 성수기 배포 동결) — DoD 11.1-2의 예시 수치 확정</td><td>§23-21</td></tr>\n<tr><td>5</td><td>1차(2606~2611) 스프린트 배분과 페이즈 03(전표) 선행 조건 — 횡단 페이즈의 착수 시점 세분화</td><td>§23-49</td></tr>\n<tr><td>6</td><td>(본 페이즈 도출) 2개 이상 기수 회사의 기수변경 수동 검토 워크플로의 접수 채널·SLA — 설계서는 &quot;추후/수동 검토&quot;로만 정의(§25.20.7)</td><td>신규(§25.20.7)</td></tr>\n<tr><td>7</td><td>(본 페이즈 도출) 레거시 이관 상한(Smart A 2018년~, 회계기간 2023년 제한)의 BK 운영 시점 기준 갱신</td><td>신규(§25.20.5)</td></tr>\n<tr><td>8</td><td>(본 페이즈 도출) 백업 모듈 확장(급여·법인/개인 — 현재 회계관리만) 시점</td><td>신규(§25.20.2)</td></tr></tbody></table></div></section>","validationHtml":"<p><strong>기능·검증</strong> (§25.20.7)</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>2</th><th>단일 기수 제약</th><th>1개 기수 외 다른 기수에서 메뉴 실행 시 &quot;2개 이상 기수 데이터 존재&quot;로 간주 → <strong>기수변경 차단</strong></th></tr></thead><tbody><tr><td>3</td><td>다기수 처리</td><td>차단 시 [온라인 문의하기] 접수 — BK에서는 <strong>수동 검토 워크플로</strong>로 분리</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>산출물</strong>: 변경된 기수(회계기간) 데이터, 기수변경 이력(감사로그). <strong>연계</strong>: BK 회계기수→회계기간 모델(§11.9 <code>FiscalYear</code>/<code>FiscalPeriod</code>), 테넌트 메타데이터, 다기수 수동 검토 워크플로. <strong>권한</strong>: 회사 관리자 수준(테넌트 메타데이터 변경).</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th><code>TenantSnapshot</code></th><th>tenantId, snapshotType(마감전/결산/수동/PRE_TIER_CHANGE), createdAt, storageRef, checksum</th><th>티어 전환 전 스냅샷 생성 필수</th><th>§2.5</th></tr></thead><tbody></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">6. API 설계</h3>\n<p>공통 계약은 §13.3(인증/scope·멱등키·오류코드·페이징·rate limit)을 따른다. 아래는 화면 기능(§25.20)을 §13.3 계약으로 표준화한 대표 엔드포인트다. 대량 익스포트/임포트는 비동기 잡(202 Accepted + 잡 조회) 패턴을 적용한다(§2.3 <code>AsyncReportJob</code>·§8.4 비동기 원칙 준용).</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>화면</th><th>엔드포인트(대표)</th><th>파라미터·비고</th><th>오류코드(§13.3)</th></tr></thead><tbody><tr><td>SA-DAT-02</td><td><code>POST /api/data-mgmt/restores</code> — 기수 복구 잡 생성</td><td>.wdb 참조·비밀번호·반영방법(신규/현재)·코드 구성기준·동의, <code>Idempotency-Key</code></td><td><code>VALIDATION_FAILED</code>(기수·사업자번호 불일치/비밀번호 오류), <code>LOCK_NOT_ACQUIRED</code></td></tr>\n<tr><td>SA-DAT-04</td><td><code>POST /api/data-mgmt/exports/legacy-period</code> — 월·분기 익스포트(.whgdata)</td><td>회사·월별/분기별·기수·데이터 구분(기초/전표/부가세 서식)·회사코드</td><td><code>FORBIDDEN_SCOPE</code>(메뉴권한 미보유), <code>VALIDATION_FAILED</code>(분기 중복선택)</td></tr>\n<tr><td>SA-DAT-07</td><td><code>POST /api/data-mgmt/fiscal-year-change</code> — 기수변경</td><td>변경 후 기수, 단일 기수 검증, <code>Idempotency-Key</code></td><td><code>VALIDATION_FAILED</code>(다기수 존재), <code>CLOSING_LOCKED</code></td></tr>\n<tr><td>플랫폼</td><td><code>POST /api/op/tenants/{id}/snapshots</code> — 테넌트 스냅샷(운영 콘솔 OP-03)</td><td>snapshotType, 운영자 접근모드 검증</td><td>§26.4 <code>ACCESS_SESSION_REQUIRED</code>, <code>STEP_UP_REQUIRED</code></td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>감사로그: 백업·복구·익스포트·임포트·기수변경·복구 API는 모두 <code>DataChangeLog</code>(+ 운영자 실행 시 <code>AdminAccessLog</code>) 기록 대상(§13.3 감사로그 행).</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>2</th><th>이벤트 스냅샷</th><th>마감/결산/신고 전 자동</th><th><code>TenantSnapshot</code> 생성, 복구 시 무결성·잔액 검증</th><th>§2.4, §11.9</th></tr></thead><tbody><tr><td>3</td><td>보존기간 파기 점검 잡</td><td>정기</td><td><code>RetentionPolicy</code> 기반 파기 대상 점검 → 승인 워크플로 → 증명서 발급</td><td>§14, §7.3</td></tr>\n<tr><td>4</td><td>콜드 이관 배치</td><td>5년 초과 데이터 발생 시(연 단위)</td><td>§7.5 5단계(생성→검증→등록→read-only→제외). <strong>검증 실패 시 이관 중단·운영 파티션 유지·오류 리포트·재처리</strong>(§15)</td><td>§7.5, §15</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">8. 검증·오류 처리</h3>\n<p>차단(B)/경고(W) 구분. 공통 검증(§15 표)은 반복하지 않고 본 페이즈 특화 항목만 기재한다.</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>검증 항목</th><th>구분</th><th>처리</th><th>근거</th></tr></thead><tbody><tr><td>1</td><td>복구 대상 거래처가 [거래처등록]에 없음</td><td>B</td><td>SA-DAT-01 복구 차단</td><td>§25.20.1</td></tr>\n<tr><td>2</td><td>자동연동(전표전송)·복수거래·자금관리 전표 복구 시도</td><td>B</td><td>조회 제외(복구 미지원) — 무결성 보호</td><td>§25.20.1</td></tr>\n<tr><td>4</td><td>백업/복구 기수·사업자번호 불일치</td><td>B</td><td>복구(업로드) 불가 — 무결성 키 검증</td><td>§25.20.2~5</td></tr>\n<tr><td>5</td><td>백업파일 비밀번호 오류</td><td>W→B</td><td>경고, 복구 진행 차단</td><td>§25.20.2</td></tr>\n<tr><td>6</td><td>암호 형식 위반(백업 4~8자리, 익스포트 1~8자리)</td><td>B</td><td>진행 차단</td><td>§25.20.2~3</td></tr>\n<tr><td>8</td><td>내보내기 권한 미보유</td><td>B</td><td>회사관리자/메뉴권한 보유자 외 실행 차단(<code>FORBIDDEN_SCOPE</code>)</td><td>§25.20.4, §13.3</td></tr>\n<tr><td>9</td><td>.sdb 아닌 파일(.whg)·일부 모듈만 백업된 파일 업로드</td><td>B</td><td>전체기수 올리기 오류 처리</td><td>§25.20.5</td></tr>\n<tr><td>11</td><td>부서/사원 통합 미진행 상태 올리기</td><td>B</td><td>올리기 차단</td><td>§25.20.6</td></tr>\n<tr><td>12</td><td>2개 이상 기수 데이터 존재(메뉴 실행 기준) 기수변경</td><td>B</td><td>변경 차단 → 수동 검토 워크플로 접수</td><td>§25.20.7</td></tr>\n<tr><td>13</td><td>아카이브 검증 실패(checksum/레코드수/잔액합계)</td><td>B</td><td>콜드 이관 중단, 운영 파티션 유지, 오류 리포트·재처리</td><td>§15, §7.5</td></tr>\n<tr><td>16</td><td>만료된 fencing token 쓰기</td><td>B</td><td>DB 업데이트 차단, 작업 실패/재시도</td><td>§15</td></tr>\n<tr><td>17</td><td>복구·재구성 완료 후 무결성</td><td>W</td><td>무결성·잔액 검증 수행, 기초코드 머지 결과·물류 전표는 사후 확인 안내</td><td>§2.4, §25.20.2·6</td></tr>\n<tr><td>18</td><td>보존 중 원천 데이터 수정·삭제</td><td>B</td><td>read-only 아카이브 — 수정·삭제 금지, 열람·다운로드 권한만 제한</td><td>§7.3</td></tr>\n<tr><td>19</td><td>대량 다운로드/행위 임계 초과</td><td>B</td><td>Step-up 재인증(+운영자는 사유·2인 승인 <code>BulkActionControl</code>)</td><td>§3.2, §26.2</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">9. 권한·SOD·감사</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>화면</th><th>실행 주체·권한</th><th>통제</th><th>근거</th></tr></thead><tbody><tr><td>SA-DAT-01</td><td>전표 쓰기 권한자(<code>tenant:journal:write</code>)</td><td>복구 제외 규칙(자동연동·복수거래·자금관리)으로 원천 무결성 보호, 마감 잠금 인터셉터, <code>DataChangeLog</code></td><td>§25.20.1, §16.1</td></tr>\n<tr><td>SA-DAT-03/04</td><td><strong>회사관리자 또는 메뉴권한 'SmartA10 백업 데이터 내리기(월별/분기별/기수별)' 보유자</strong> — <code>RoleMenuPermission</code>+<code>MenuActionGrant</code>(미노출 원칙)</td><td>회사별 암호, 1회 1개 회사, 다운로드 Step-up</td><td>§25.20.3~4, §4.3</td></tr>\n<tr><td>SA-DAT-05</td><td><strong>회사 관리자·서비스 관리자</strong></td><td>사업자번호 일치 게이트, 유의사항(면책) 동의, 전면 교체 경고</td><td>§25.20.5</td></tr>\n<tr><td>운영 콘솔(스냅샷·배치·파기)</td><td>운영자 — 접근모드 4종(VIEW/SUPPORT/BOOKKEEPING/BREAK_GLASS) 접근 세션 필수, 행위는 <code>OperatorActivityLog</code>·<code>AuditLogChain</code> append-only</td><td>파기는 승인 워크플로 + 증명서, OP-10 컴플라이언스 점검(보존/파기 검증)</td><td>§26.1~26.2, §7.3</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>특이 통제: 파기는 &quot;파기 사실 자체를 <code>DataDestructionLog</code>로 보존&quot;(§7.3). 아카이브에는 생성 당시 <code>DataChangeLog</code> 해시체인 루트를 저장하여 변조를 방지(§7.5). 콜드 조회도 <code>tenant_id</code> 격리 필터+권한 검증 필수(§7.5).</li>\n</ul>","fields":[{"name":"복구 대상 거래처가 [거래처등록]에 없음","desc":"복구 대상 거래처가 [거래처등록]에 없음"},{"name":"자동연동(전표전송)·복수거래·자금관리 전표 복구 시도","desc":"자동연동(전표전송)·복수거래·자금관리 전표 복구 시도"},{"name":"일괄삭제(Shift+F6) 전표 복구 시도","desc":"일괄삭제(Shift+F6) 전표 복구 시도"},{"name":"백업/복구 기수·사업자번호 불일치","desc":"백업/복구 기수·사업자번호 불일치"},{"name":"백업파일 비밀번호 오류","desc":"백업파일 비밀번호 오류"},{"name":"암호 형식 위반(백업 4~8자리, 익스포트 1~8자리)","desc":"암호 형식 위반(백업 4~8자리, 익스포트 1~8자리)"},{"name":"익스포트 분기 중복선택","desc":"익스포트 분기 중복선택"},{"name":"내보내기 권한 미보유","desc":"내보내기 권한 미보유"},{"name":".sdb 아닌 파일(.whg)·일부 모듈만 백업된 파일 업로드","desc":".sdb 아닌 파일(.whg)·일부 모듈만 백업된 파일 업로드"},{"name":"2023년 초과 회계기간·인사년도 구성","desc":"2023년 초과 회계기간·인사년도 구성"},{"name":"부서/사원 통합 미진행 상태 올리기","desc":"부서/사원 통합 미진행 상태 올리기"},{"name":"2개 이상 기수 데이터 존재(메뉴 실행 기준) 기수변경","desc":"2개 이상 기수 데이터 존재(메뉴 실행 기준) 기수변경"},{"name":"아카이브 검증 실패(checksum/레코드수/잔액합계)","desc":"아카이브 검증 실패(checksum/레코드수/잔액합계)"},{"name":"분산 락 미획득(동시 이관/재구성)","desc":"분산 락 미획득(동시 이관/재구성)"},{"name":"멱등키 충돌(동일 키+다른 요청해시)","desc":"멱등키 충돌(동일 키+다른 요청해시)"},{"name":"만료된 fencing token 쓰기","desc":"만료된 fencing token 쓰기"},{"name":"복구·재구성 완료 후 무결성","desc":"복구·재구성 완료 후 무결성"},{"name":"보존 중 원천 데이터 수정·삭제","desc":"보존 중 원천 데이터 수정·삭제"},{"name":"대량 다운로드/행위 임계 초과","desc":"대량 다운로드/행위 임계 초과"},{"name":"회사정보","desc":"회사명·구분·개업년월일·사업자번호·대표자·회계기간 확인"},{"name":"변경기수 — 변경 전","desc":"현재 기수 자동 표기"},{"name":"변경기수 — 변경 후","desc":"새 기수 입력"},{"name":"데이터 확인","desc":"데이터 존재 기수 정보 표시"},{"name":"기수변경이력","desc":"회계기간·변경전·변경후·작업시간·작업자(사용자ID)"}],"tableCount":10,"statusKind":"warn","statusMsg":"검증·차단 조건을 확인해야 하는 화면입니다."}],"docs":{"overview":"<h3 class=\"doc-h doc-h3\">1. 페이즈 개요</h3>\n<h4 class=\"doc-h doc-h4\">1.1 목표</h4>\n<p>Smart A Ch.20 데이터관리 7개 메뉴(SA-DAT-01~07)를 BK 멀티테넌시(SHARED+RLS)·회계기간 모델의 <strong>운영 도구</strong>로 재구성하고(§25.20, §25.0.2-C1), 그 하부 기반으로 플랫폼 백업·복구(PITR·테넌트 단위 복구·스냅샷, §2.4), 데이터 내보내기·보존·파기(§7.3), 데이터 티어링·콜드 스토리지 아카이빙(§7.5)을 함께 구축한다.</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>축</th><th>내용</th><th>근거</th></tr></thead><tbody><tr><td>화면(메뉴) 축</td><td>삭제전표복구, 기수별 백업/복구, SmartA 내보내기(기수/월·분기), SmartA 올리기(전체기수/월·분기), 기수변경 — TN-15 데이터관리·이관 메뉴에 배치</td><td>§25.20, §26.1-(2) TN-15</td></tr>\n<tr><td>플랫폼 축</td><td>일 풀백업+WAL 기반 PITR, 테넌트 단위 논리 백업/복구, 마감·결산·신고 전 자동 스냅샷(<code>TenantSnapshot</code>), Hot/Warm/Cold 티어링, 보존연한·파기 워크플로</td><td>§2.4, §7.3, §7.5, §14</td></tr>\n<tr><td>무결성 축</td><td>회계 데이터 물리 삭제 금지 — 삭제전표복구는 <code>CANCELLED</code> 상태 전표의 복원 관점으로 설계(소프트삭제·결번 보존)</td><td>§16.1, §11.1(결번 관리), §12(전표 상태)</td></tr></tbody></table></div>\n<h4 class=\"doc-h doc-h4\">1.2 범위 요약</h4>\n<ul class=\"doc-list\">\n<li>1차: SA-DAT-01~07 <strong>7개 메뉴 전부</strong> + 백업/스냅샷/보존·파기/티어링 플랫폼 기반. 2차·3차 이월 항목 없음(§22.2).</li>\n<li>이 페이즈는 타 페이즈 데이터(전표·기초코드·부가세 신고서식·조직)를 대상으로 동작하므로, 각 대상 페이즈의 데이터 모델 확정 시점에 맞춰 이관·복구 규칙을 점증 구현한다(횡단 병행의 사유).</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">1.3 MVP 연관</h4>\n<p>MVP 최우선은 페이즈 03 일반전표입력 + 페이즈 01 계정과목 관리이며(00_개요 §1), 페이즈 10은 <strong>페이즈 01과 함께 다른 페이즈의 공통 기반으로 조기·횡단 착수</strong> 대상이다(00_개요 §1 주석). 특히 SA-DAT-01(삭제전표복구)은 전표 입력(P03)의 소프트삭제 모델과 동시 설계가 필요하다(§25.20.1).</p>\n<p>---</p>","flow":"<h3 class=\"doc-h doc-h3\">3. 업무 흐름</h3>\n<h4 class=\"doc-h doc-h4\">3.1 전표 삭제 → 복구 (SA-DAT-01)</h4>\n<pre class=\"doc-code\"><code>[일반/매입매출전표입력(P03)]에서 전표 삭제\n  → 물리 삭제 금지: status=CANCELLED 전이 + JournalHistory 보존 + 전표번호 결번 보존 (§16.1, §11.1)\n  → [삭제전표복구 SA-DAT-01] 기간 조회(테넌트 RLS 범위) → 복구 대상 체크 → '전표복구' → 검토 → 확인\n  → 새 전표번호 재채번(복합키 (tenant_id, 전표일자, 전표번호)) → 해당 입력 메뉴 재반영(&quot;복구전표&quot; 표기) (§25.20.1)\n  ※ 자동연동·복수거래·자금관리 전표는 복구 제외(조회 불가) (§25.20.1)</code></pre>\n<h4 class=\"doc-h doc-h4\">3.2 기수별 백업 → 복구 (SA-DAT-02)</h4>\n<pre class=\"doc-code\"><code>회사 선택 → 모듈(회계) 선택 → 파일명 확인 → 암호 설정 → .wdb 암호화 백업 생성(다운로드)\n복구: .wdb 선택 → 비밀번호 → 기수·사업자번호 무결성 키 검증 → 반영방법 선택\n  ├ 신규 회사 생성 복구(신규 테넌트, &quot;_복구회사&quot; 명명)\n  └ 현재 회사 복구(기존 테넌트 덮어쓰기: 해당 기수 기존 데이터 삭제 후 반영 + 기초코드 머지) (§25.20.2)</code></pre>\n<h4 class=\"doc-h doc-h4\">3.3 레거시 이관 (SA-DAT-03/04 내보내기 ↔ SA-DAT-05/06 올리기)</h4>\n<pre class=\"doc-code\"><code>내보내기: BK → .whg(기수 단위, DAT-03) / .whgdata(월·분기+부가세 서식, DAT-04) → 레거시 Smart A [백업데이터복구]/[받은데이터올리기]\n올리기: 레거시 Smart A [데이터백업 .sdb]/[보낼데이터만들기 .spwdata] → BK\n  ├ DAT-05 전체기수: 기존 테넌트 데이터 전면 삭제·재구성 → 기수/인사년도 구성 → 부서/사원 자동 연결·수동 병합\n  └ DAT-06 월·분기: 첨부 데이터 확인 → 기간/서식 단위 기존 데이터 삭제 후 적재 → 기초코드 머지 → 작업 이력(감사로그) (§25.20.5~6)\n  ※ 공통 게이트: 사업자번호(·기수) 일치 검증, 암호 검증, 부서/사원 통합 미완료 시 진행 불가</code></pre>\n<h4 class=\"doc-h doc-h4\">3.4 기수변경 (SA-DAT-07)</h4>\n<pre class=\"doc-code\"><code>회사정보 확인 → 데이터 존재 기수 확인(메뉴 실행 여부 기준) → 단일 기수 검증\n  ├ 1개 기수: 변경 후 기수 입력 → 테넌트 기수 메타데이터(FiscalYear) 일괄 변경 → 기수변경이력(감사로그) 기록\n  └ 2개 이상 기수: 변경 불가 → 수동 검토 워크플로(온라인 문의)로 분리 접수 (§25.20.7)</code></pre>\n<h4 class=\"doc-h doc-h4\">3.5 티어링·보존·파기 수명주기 (플랫폼)</h4>\n<pre class=\"doc-code\"><code>[RDBMS Hot](최근 2개년) ─당해 마감─▶ [RDBMS Warm](3~5년 Read-Only) ─5년 초과 배치 이관─▶ [S3 Cold](Parquet+WORM)\n콜드 이관 5단계: ①아카이브 파일 생성 → ②checksum/레코드수/잔액합계 검증 → ③ArchiveDataset 등록 → ④운영 파티션 read-only/분리 → ⑤조회 대상 제외 (§7.5)\n파기: 보존연한 경과 → RetentionPolicy·개인정보 보유기간 확인 → 파기 승인 워크플로 → DataDestructionCertificate 발급 + DataDestructionLog 보존 (§7.3, §7.5)</code></pre>\n<p>---</p>","dataModel":"<h3 class=\"doc-h doc-h3\">5. 데이터 모델</h3>\n<p>핵심 필드는 설계서 정의를 따르며, PK에는 공통 표준(00_개요 §3)의 <code>tenant_id NOT NULL</code>+RLS가 전제된다.</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>엔티티</th><th>핵심 필드</th><th>키/제약</th><th>근거</th></tr></thead><tbody><tr><td><code>TenantSnapshot</code></td><td>tenantId, snapshotType(마감전/결산/수동/PRE_TIER_CHANGE), createdAt, storageRef, checksum</td><td>티어 전환 전 스냅샷 생성 필수</td><td>§2.5</td></tr>\n<tr><td><code>TenantInfra</code></td><td>tenantId, tier(SHARED/SCHEMA/DEDICATED), dbRef, schemaName, encryptionKeyId, quotaProfile</td><td>테넌트 격리 티어</td><td>§2.5</td></tr>\n<tr><td><code>DataExportJob</code></td><td>(구독/요금 영역 — 해지/유예 시 전체 export 잡)</td><td>—</td><td>§7.4</td></tr>\n<tr><td><code>RetentionPolicy</code></td><td>데이터 유형별 보존연한·파기 조건</td><td>—</td><td>§7.3~7.4</td></tr>\n<tr><td><code>DataDestructionCertificate</code> / <code>DataDestructionLog</code></td><td>파기 대상·파일해시·수행자·시각 / 파기 사실 보존</td><td>append-only</td><td>§7.3, §7.5</td></tr>\n<tr><td><code>DataTierPolicy</code></td><td>티어별 보존연한</td><td>—</td><td>§7.5</td></tr>\n<tr><td><code>ArchiveDataset</code></td><td>Parquet 파일 ref, tenant, period, checksum, recordCount, hashRoot, objectLockUntil</td><td>아카이브 무결성(차대변 합계·DataChangeLog 해시체인 루트 포함)</td><td>§7.5</td></tr>\n<tr><td><code>ArchiveRestoreJob</code></td><td>복원 요청·완료·만료</td><td>—</td><td>§7.5</td></tr>\n<tr><td><code>FiscalYear</code> / <code>FiscalPeriod</code></td><td>tenantId, 기수, 시작/종료일, 상태 / 월별 상태</td><td>기수변경(SA-DAT-07)의 변경 대상 메타데이터</td><td>§11.9</td></tr>\n<tr><td>전표(<code>JournalHeader</code>/<code>JournalLine</code>/<code>JournalHistory</code>)</td><td>상태 <code>DRAFT~POSTED~REVERSED~CANCELLED</code>, 결번 보존</td><td>복합키 (tenant_id, 전표일자, 전표번호) — SA-DAT-01 재채번 기준</td><td>§12, §11.1, §25.20.1</td></tr>\n<tr><td><code>DataChangeLog</code></td><td>전후값·행위자·IP·사유·트랜잭션ID</td><td>append-only + 해시체인</td><td>§17</td></tr>\n<tr><td>백업/이관 잡(신규 구현 대상)</td><td>백업파일 메타(파일명 규격·모듈·기수·사업자번호·암호 해시·경로), 이관 작업 이력(파일명·작업시간·작업자)</td><td>기수·사업자번호 = 무결성 키</td><td>§25.20.2~6</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>백업 파일명 규격: 기수 백업 <code>9999_#_회사명_#_회계_#_기수_인사년도!.wdb</code>, 기수 익스포트 <code>.whg</code>, 월·분기 익스포트 <code>.whgdata</code>, 레거시 전체 백업 <code>.sdb</code>, 레거시 부분 파일 <code>.spwdata</code>(§25.20.2~6).</li>\n</ul>","api":"<h3 class=\"doc-h doc-h3\">6. API 설계</h3>\n<p>공통 계약은 §13.3(인증/scope·멱등키·오류코드·페이징·rate limit)을 따른다. 아래는 화면 기능(§25.20)을 §13.3 계약으로 표준화한 대표 엔드포인트다. 대량 익스포트/임포트는 비동기 잡(202 Accepted + 잡 조회) 패턴을 적용한다(§2.3 <code>AsyncReportJob</code>·§8.4 비동기 원칙 준용).</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>화면</th><th>엔드포인트(대표)</th><th>파라미터·비고</th><th>오류코드(§13.3)</th></tr></thead><tbody><tr><td>SA-DAT-01</td><td><code>GET /api/journals/deleted</code> — 삭제(CANCELLED) 전표 조회</td><td>탭(유형)·회계기간·사업장·기간, cursor 페이징</td><td><code>TENANT_ACCESS_DENIED</code></td></tr>\n<tr><td>SA-DAT-01</td><td><code>POST /api/journals/restore</code> — 선택 전표 복구</td><td>전표 ID 목록, <code>Idempotency-Key</code> 필수, 재채번 수행</td><td><code>NUMBERING_CONFLICT</code>, <code>CLOSING_LOCKED</code>, <code>VALIDATION_FAILED</code>(거래처 미존재), <code>IDEMPOTENCY_CONFLICT</code></td></tr>\n<tr><td>SA-DAT-02</td><td><code>POST /api/data-mgmt/backups</code> — 기수 백업 잡 생성</td><td>회사·모듈·기수·암호(4~8자), 비동기, 완료 시 .wdb 다운로드</td><td><code>VALIDATION_FAILED</code>, <code>RATE_LIMITED</code></td></tr>\n<tr><td>SA-DAT-02</td><td><code>POST /api/data-mgmt/restores</code> — 기수 복구 잡 생성</td><td>.wdb 참조·비밀번호·반영방법(신규/현재)·코드 구성기준·동의, <code>Idempotency-Key</code></td><td><code>VALIDATION_FAILED</code>(기수·사업자번호 불일치/비밀번호 오류), <code>LOCK_NOT_ACQUIRED</code></td></tr>\n<tr><td>SA-DAT-03</td><td><code>POST /api/data-mgmt/exports/legacy-fiscal</code> — 기수 익스포트(.whg)</td><td>회사·모듈(복수)·회사코드(0101~9999)·암호(1~8자)·자동전표 포함옵션</td><td><code>FORBIDDEN_SCOPE</code>, <code>VALIDATION_FAILED</code></td></tr>\n<tr><td>SA-DAT-04</td><td><code>POST /api/data-mgmt/exports/legacy-period</code> — 월·분기 익스포트(.whgdata)</td><td>회사·월별/분기별·기수·데이터 구분(기초/전표/부가세 서식)·회사코드</td><td><code>FORBIDDEN_SCOPE</code>(메뉴권한 미보유), <code>VALIDATION_FAILED</code>(분기 중복선택)</td></tr>\n<tr><td>SA-DAT-05</td><td><code>POST /api/data-mgmt/imports/legacy-full</code> — 전체기수 재구성</td><td>.sdb 참조·비밀번호·동의·구성 기수/인사년도, <code>Idempotency-Key</code>, 분산 락</td><td><code>VALIDATION_FAILED</code>(.sdb 아님/사업자번호 불일치/일부 모듈), <code>LOCK_NOT_ACQUIRED</code></td></tr>\n<tr><td>SA-DAT-05/06</td><td><code>POST /api/data-mgmt/imports/{id}/org-merge</code> — 부서/사원 자동연결·수동병합</td><td>자동 연결 결과 + 미연결분 수동 매핑</td><td><code>VALIDATION_FAILED</code></td></tr>\n<tr><td>SA-DAT-06</td><td><code>POST /api/data-mgmt/imports/legacy-period</code> — 월·분기 올리기</td><td>.spwdata 참조·코드 구성기준·동의, 부서/사원 통합 완료 게이트</td><td><code>VALIDATION_FAILED</code>(통합 미진행)</td></tr>\n<tr><td>SA-DAT-06</td><td><code>GET /api/data-mgmt/imports/history</code> — 최종 작업 정보</td><td>작업자명/ID 검색</td><td>—</td></tr>\n<tr><td>SA-DAT-07</td><td><code>POST /api/data-mgmt/fiscal-year-change</code> — 기수변경</td><td>변경 후 기수, 단일 기수 검증, <code>Idempotency-Key</code></td><td><code>VALIDATION_FAILED</code>(다기수 존재), <code>CLOSING_LOCKED</code></td></tr>\n<tr><td>플랫폼</td><td><code>POST /api/op/tenants/{id}/snapshots</code> — 테넌트 스냅샷(운영 콘솔 OP-03)</td><td>snapshotType, 운영자 접근모드 검증</td><td>§26.4 <code>ACCESS_SESSION_REQUIRED</code>, <code>STEP_UP_REQUIRED</code></td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>감사로그: 백업·복구·익스포트·임포트·기수변경·복구 API는 모두 <code>DataChangeLog</code>(+ 운영자 실행 시 <code>AdminAccessLog</code>) 기록 대상(§13.3 감사로그 행).</li>\n<li>다운로드류는 대량 다운로드 Step-up 재인증 대상(§3.2), 별도 쿼터·큐 기반 처리(§13.3 Rate limit 행).</li>\n</ul>","validation":"<h3 class=\"doc-h doc-h3\">8. 검증·오류 처리</h3>\n<p>차단(B)/경고(W) 구분. 공통 검증(§15 표)은 반복하지 않고 본 페이즈 특화 항목만 기재한다.</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>검증 항목</th><th>구분</th><th>처리</th><th>근거</th></tr></thead><tbody><tr><td>1</td><td>복구 대상 거래처가 [거래처등록]에 없음</td><td>B</td><td>SA-DAT-01 복구 차단</td><td>§25.20.1</td></tr>\n<tr><td>2</td><td>자동연동(전표전송)·복수거래·자금관리 전표 복구 시도</td><td>B</td><td>조회 제외(복구 미지원) — 무결성 보호</td><td>§25.20.1</td></tr>\n<tr><td>3</td><td>일괄삭제(Shift+F6) 전표 복구 시도</td><td>B</td><td>복구 불가</td><td>§25.9(SA-CLS-10)</td></tr>\n<tr><td>4</td><td>백업/복구 기수·사업자번호 불일치</td><td>B</td><td>복구(업로드) 불가 — 무결성 키 검증</td><td>§25.20.2~5</td></tr>\n<tr><td>5</td><td>백업파일 비밀번호 오류</td><td>W→B</td><td>경고, 복구 진행 차단</td><td>§25.20.2</td></tr>\n<tr><td>6</td><td>암호 형식 위반(백업 4~8자리, 익스포트 1~8자리)</td><td>B</td><td>진행 차단</td><td>§25.20.2~3</td></tr>\n<tr><td>7</td><td>익스포트 분기 중복선택</td><td>B</td><td>전표입력 구분에서 중복선택 불가</td><td>§25.20.4</td></tr>\n<tr><td>8</td><td>내보내기 권한 미보유</td><td>B</td><td>회사관리자/메뉴권한 보유자 외 실행 차단(<code>FORBIDDEN_SCOPE</code>)</td><td>§25.20.4, §13.3</td></tr>\n<tr><td>9</td><td>.sdb 아닌 파일(.whg)·일부 모듈만 백업된 파일 업로드</td><td>B</td><td>전체기수 올리기 오류 처리</td><td>§25.20.5</td></tr>\n<tr><td>10</td><td>2023년 초과 회계기간·인사년도 구성</td><td>B</td><td>구성 제한</td><td>§25.20.5</td></tr>\n<tr><td>11</td><td>부서/사원 통합 미진행 상태 올리기</td><td>B</td><td>올리기 차단</td><td>§25.20.6</td></tr>\n<tr><td>12</td><td>2개 이상 기수 데이터 존재(메뉴 실행 기준) 기수변경</td><td>B</td><td>변경 차단 → 수동 검토 워크플로 접수</td><td>§25.20.7</td></tr>\n<tr><td>13</td><td>아카이브 검증 실패(checksum/레코드수/잔액합계)</td><td>B</td><td>콜드 이관 중단, 운영 파티션 유지, 오류 리포트·재처리</td><td>§15, §7.5</td></tr>\n<tr><td>14</td><td>분산 락 미획득(동시 이관/재구성)</td><td>B</td><td>&quot;다른 사용자 진행 중&quot; 비즈니스 예외</td><td>§15, §2.1</td></tr>\n<tr><td>15</td><td>멱등키 충돌(동일 키+다른 요청해시)</td><td>B</td><td><code>409 IDEMPOTENCY_CONFLICT</code></td><td>§13.3, §15</td></tr>\n<tr><td>16</td><td>만료된 fencing token 쓰기</td><td>B</td><td>DB 업데이트 차단, 작업 실패/재시도</td><td>§15</td></tr>\n<tr><td>17</td><td>복구·재구성 완료 후 무결성</td><td>W</td><td>무결성·잔액 검증 수행, 기초코드 머지 결과·물류 전표는 사후 확인 안내</td><td>§2.4, §25.20.2·6</td></tr>\n<tr><td>18</td><td>보존 중 원천 데이터 수정·삭제</td><td>B</td><td>read-only 아카이브 — 수정·삭제 금지, 열람·다운로드 권한만 제한</td><td>§7.3</td></tr>\n<tr><td>19</td><td>대량 다운로드/행위 임계 초과</td><td>B</td><td>Step-up 재인증(+운영자는 사유·2인 승인 <code>BulkActionControl</code>)</td><td>§3.2, §26.2</td></tr></tbody></table></div>","done":"<h3 class=\"doc-h doc-h3\">11. 완료 기준(DoD) · 테스트 관점</h3>\n<h4 class=\"doc-h doc-h4\">11.1 완료 기준</h4>\n<p>1. SA-DAT-01~07 7개 화면이 §25.20의 입력 필드·기능·검증 전 항목을 충족하고 TN-15 메뉴로 노출된다(권한 미보유 시 미노출, §4.3).</p>\n<p>2. 백업/PITR/스냅샷: SHARED 일 풀백업+PITR, 테넌트 단위 논리 백업, 마감/결산/신고 전 자동 스냅샷 동작(§2.4). SHARED RPO≤5분/RTO≤4시간 목표(§19.3 — 수치는 §23-21 확정 전 예시값).</p>\n<p>3. 티어링: Hot/Warm/Cold 이관 5단계와 아카이브 검증 실패 시 중단·재처리 동작(§7.5, §15).</p>\n<p>4. 보존·파기: read-only 보존, 파기 승인 워크플로·증명서·파기 로그(§7.3).</p>\n<p>5. 모든 백업·복구·이관·기수변경 행위가 <code>DataChangeLog</code>(운영자는 <code>OperatorActivityLog</code>) append-only로 남는다(§17, §26.2).</p>\n<h4 class=\"doc-h doc-h4\">11.2 테스트 관점</h4>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>시나리오</th><th>기대 결과</th><th>근거</th></tr></thead><tbody><tr><td>1</td><td>전표 삭제 후 DAT-01 복구</td><td>원 번호 결번 보존, 새 번호 재채번, &quot;복구전표&quot; 표기, 원장 재반영</td><td>§25.20.1, §11.1</td></tr>\n<tr><td>2</td><td>자동연동/복수거래/자금관리 전표 복구 시도</td><td>조회 목록에 미노출</td><td>§25.20.1</td></tr>\n<tr><td>3</td><td>사업자번호 불일치 .wdb/.sdb 업로드</td><td>복구/재구성 차단</td><td>§25.20.2·5</td></tr>\n<tr><td>4</td><td>현재회사 복구 → 기초코드 머지(판단기준 체크/미체크)</td><td>미체크: 사업자번호·계좌·가맹점·카드번호 동일판단 / 체크: 거래처명 포함 비교·코드 신규생성</td><td>§25.20.2·6</td></tr>\n<tr><td>5</td><td>.whg/.whgdata 생성 → 레거시 Smart A 복구/올리기</td><td>왕복 호환(기수·사업자번호 일치 시), 기간 단위 삭제·덮어쓰기</td><td>§25.20.3~4</td></tr>\n<tr><td>6</td><td>메뉴권한 미보유자 내보내기 시도</td><td>차단(<code>FORBIDDEN_SCOPE</code>) + 메뉴 미노출</td><td>§25.20.4, §4.3</td></tr>\n<tr><td>7</td><td>부서/사원 통합 미진행 상태 올리기</td><td>차단</td><td>§25.20.6</td></tr>\n<tr><td>8</td><td>2개 기수 메뉴 실행 이력 회사의 기수변경</td><td>차단 + 수동 검토 접수</td><td>§25.20.7</td></tr>\n<tr><td>9</td><td>기수변경 성공 후</td><td><code>FiscalYear</code> 메타데이터 일괄 변경, 이력 그리드에 변경전/후·작업자·시간 표시</td><td>§25.20.7</td></tr>\n<tr><td>10</td><td>테넌트 단위 시점 복구(PITR) 훈련</td><td>특정 회사만 시점 복구, 무결성·잔액 검증 통과, <code>DrDrillLog</code> 기록</td><td>§2.4, §19.3</td></tr>\n<tr><td>11</td><td>콜드 이관 중 checksum 불일치 주입</td><td>이관 중단·운영 파티션 유지·재처리</td><td>§15</td></tr>\n<tr><td>12</td><td>동시 재구성(이중 실행)·동일 멱등키 재요청</td><td>분산 락 예외 / 동일 응답(중복 반영 없음)</td><td>§2.1, §13.3</td></tr>\n<tr><td>13</td><td>테넌트 격리</td><td>타 테넌트 삭제전표·백업파일 접근 불가(RLS+ORM 이중 강제)</td><td>§16.1</td></tr></tbody></table></div>","full":"<h2 class=\"doc-h doc-h2\">BK 개발 상세설계서 — 페이즈 10. 데이터관리·운영 (SA-DAT)</h2>\n<ul class=\"doc-list\">\n<li>기준 문서: <code>bk_설계서_v1.1.md</code> (§25.20 데이터관리, §2.4 백업·복구, §7.3/7.5 보존·파기·티어링, §14 배치, §15 검증, §16.1 무결성, §22.2 개발 차수)</li>\n<li>작성일: 2026-07-03</li>\n<li>개발 차수: <strong>1차 (2606~2611) — SA-DAT-01~07 전부 1차</strong> (§22.2 페이즈 10 &quot;전부 1차&quot;)</li>\n<li>페이즈 성격: <strong>횡단 페이즈</strong> — 특정 구간이 아니라 <strong>1차 전 기간(2606~2611)에 걸쳐 타 페이즈와 병행</strong> 개발한다. 백업·스냅샷·보존·이관은 전 페이즈의 공통 기반이므로 조기·횡단 착수한다(00_개요 §1 페이즈표, 설계서 §22.2).</li>\n<li>선행 페이즈: P01 기초정보(테넌트·회사·권한·거래처 — SA-DAT-01 거래처 검증, SA-DAT-02/05/06 기초코드 머지의 전제), P03 전표(SA-DAT-01 복구 대상 전표 모델). 단, 플랫폼 백업/PITR/스냅샷 기반(§2.4)은 1단계부터 공통 기반으로 선행 구축(§22 &quot;공통: 백업/PITR — 1단계부터 기반&quot;).</li>\n<li>공통 표준: <code>00_개요_페이즈일정.md</code> §3(멀티테넌시 RLS·감사 필드·DataChangeLog·오류코드·권한·기장 모드·멱등성·UI 공통·기술 스택)을 그대로 적용하며 본 문서에서 반복하지 않는다.</li>\n</ul>\n<p>---</p>\n<h3 class=\"doc-h doc-h3\">1. 페이즈 개요</h3>\n<h4 class=\"doc-h doc-h4\">1.1 목표</h4>\n<p>Smart A Ch.20 데이터관리 7개 메뉴(SA-DAT-01~07)를 BK 멀티테넌시(SHARED+RLS)·회계기간 모델의 <strong>운영 도구</strong>로 재구성하고(§25.20, §25.0.2-C1), 그 하부 기반으로 플랫폼 백업·복구(PITR·테넌트 단위 복구·스냅샷, §2.4), 데이터 내보내기·보존·파기(§7.3), 데이터 티어링·콜드 스토리지 아카이빙(§7.5)을 함께 구축한다.</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>축</th><th>내용</th><th>근거</th></tr></thead><tbody><tr><td>화면(메뉴) 축</td><td>삭제전표복구, 기수별 백업/복구, SmartA 내보내기(기수/월·분기), SmartA 올리기(전체기수/월·분기), 기수변경 — TN-15 데이터관리·이관 메뉴에 배치</td><td>§25.20, §26.1-(2) TN-15</td></tr>\n<tr><td>플랫폼 축</td><td>일 풀백업+WAL 기반 PITR, 테넌트 단위 논리 백업/복구, 마감·결산·신고 전 자동 스냅샷(<code>TenantSnapshot</code>), Hot/Warm/Cold 티어링, 보존연한·파기 워크플로</td><td>§2.4, §7.3, §7.5, §14</td></tr>\n<tr><td>무결성 축</td><td>회계 데이터 물리 삭제 금지 — 삭제전표복구는 <code>CANCELLED</code> 상태 전표의 복원 관점으로 설계(소프트삭제·결번 보존)</td><td>§16.1, §11.1(결번 관리), §12(전표 상태)</td></tr></tbody></table></div>\n<h4 class=\"doc-h doc-h4\">1.2 범위 요약</h4>\n<ul class=\"doc-list\">\n<li>1차: SA-DAT-01~07 <strong>7개 메뉴 전부</strong> + 백업/스냅샷/보존·파기/티어링 플랫폼 기반. 2차·3차 이월 항목 없음(§22.2).</li>\n<li>이 페이즈는 타 페이즈 데이터(전표·기초코드·부가세 신고서식·조직)를 대상으로 동작하므로, 각 대상 페이즈의 데이터 모델 확정 시점에 맞춰 이관·복구 규칙을 점증 구현한다(횡단 병행의 사유).</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">1.3 MVP 연관</h4>\n<p>MVP 최우선은 페이즈 03 일반전표입력 + 페이즈 01 계정과목 관리이며(00_개요 §1), 페이즈 10은 <strong>페이즈 01과 함께 다른 페이즈의 공통 기반으로 조기·횡단 착수</strong> 대상이다(00_개요 §1 주석). 특히 SA-DAT-01(삭제전표복구)은 전표 입력(P03)의 소프트삭제 모델과 동시 설계가 필요하다(§25.20.1).</p>\n<p>---</p>\n<h3 class=\"doc-h doc-h3\">2. 개발 범위</h3>\n<h4 class=\"doc-h doc-h4\">2.1 차수별 메뉴/화면 목록</h4>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>화면 ID</th><th>명칭</th><th>차수</th><th>메뉴 배치</th><th>설계서 근거</th></tr></thead><tbody><tr><td>SA-DAT-01</td><td>삭제전표복구</td><td>1차</td><td>TN-15</td><td>§25.20.1, §16.1, §11.1(결번)</td></tr>\n<tr><td>SA-DAT-02</td><td>데이터백업 / 데이터복구(기수별)</td><td>1차</td><td>TN-15</td><td>§25.20.2, §2.4</td></tr>\n<tr><td>SA-DAT-03</td><td>SmartA로 보낼 데이터 만들기(기수별)</td><td>1차</td><td>TN-15</td><td>§25.20.3, §7.3</td></tr>\n<tr><td>SA-DAT-04</td><td>SmartA로 보낼 데이터 만들기(월별/분기별)</td><td>1차</td><td>TN-15</td><td>§25.20.4, §7.3</td></tr>\n<tr><td>SA-DAT-05</td><td>SmartA 데이터올리기(전체기수)</td><td>1차</td><td>TN-15</td><td>§25.20.5, §22(마이그레이션)</td></tr>\n<tr><td>SA-DAT-06</td><td>SmartA 데이터올리기(월별/분기별)</td><td>1차</td><td>TN-15</td><td>§25.20.6</td></tr>\n<tr><td>SA-DAT-07</td><td>기수변경</td><td>1차</td><td>TN-15</td><td>§25.20.7, §25.0.2-C1</td></tr></tbody></table></div>\n<h4 class=\"doc-h doc-h4\">2.2 화면 없는 플랫폼 기반(본 페이즈 동반 구축)</h4>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>기반 항목</th><th>내용</th><th>설계서 근거</th></tr></thead><tbody><tr><td>백업·PITR</td><td>SHARED: 일 풀백업 + WAL 기반 PITR + 테넌트 단위 논리 백업 잡. SCHEMA/DEDICATED: 스키마/인스턴스 단위 백업·복구·PITR</td><td>§2.4</td></tr>\n<tr><td>자동 스냅샷</td><td>마감/결산/신고 전 <code>TenantSnapshot</code> 자동 생성, 복구 시 무결성·잔액 검증</td><td>§2.4, §11.9(본마감 시 스냅샷)</td></tr>\n<tr><td>보존·파기</td><td>법정 보존연한 read-only 아카이브, 스케줄 파기 + 승인 워크플로 + 파기 증명서</td><td>§7.3</td></tr>\n<tr><td>티어링</td><td>Hot(당기+전기)/Warm(3~5년 RDBMS Read-Only)/Cold(5년 초과 Parquet+WORM) 물리 이원화</td><td>§7.5</td></tr>\n<tr><td>운영 콘솔 연계</td><td>테넌트 운영 작업(스냅샷, OP-03), 배치·DLQ 모니터링(OP-09), 보존/파기 검증(OP-10)</td><td>§26.1-(1)</td></tr></tbody></table></div>\n<p>---</p>\n<h3 class=\"doc-h doc-h3\">3. 업무 흐름</h3>\n<h4 class=\"doc-h doc-h4\">3.1 전표 삭제 → 복구 (SA-DAT-01)</h4>\n<pre class=\"doc-code\"><code>[일반/매입매출전표입력(P03)]에서 전표 삭제\n  → 물리 삭제 금지: status=CANCELLED 전이 + JournalHistory 보존 + 전표번호 결번 보존 (§16.1, §11.1)\n  → [삭제전표복구 SA-DAT-01] 기간 조회(테넌트 RLS 범위) → 복구 대상 체크 → '전표복구' → 검토 → 확인\n  → 새 전표번호 재채번(복합키 (tenant_id, 전표일자, 전표번호)) → 해당 입력 메뉴 재반영(&quot;복구전표&quot; 표기) (§25.20.1)\n  ※ 자동연동·복수거래·자금관리 전표는 복구 제외(조회 불가) (§25.20.1)</code></pre>\n<h4 class=\"doc-h doc-h4\">3.2 기수별 백업 → 복구 (SA-DAT-02)</h4>\n<pre class=\"doc-code\"><code>회사 선택 → 모듈(회계) 선택 → 파일명 확인 → 암호 설정 → .wdb 암호화 백업 생성(다운로드)\n복구: .wdb 선택 → 비밀번호 → 기수·사업자번호 무결성 키 검증 → 반영방법 선택\n  ├ 신규 회사 생성 복구(신규 테넌트, &quot;_복구회사&quot; 명명)\n  └ 현재 회사 복구(기존 테넌트 덮어쓰기: 해당 기수 기존 데이터 삭제 후 반영 + 기초코드 머지) (§25.20.2)</code></pre>\n<h4 class=\"doc-h doc-h4\">3.3 레거시 이관 (SA-DAT-03/04 내보내기 ↔ SA-DAT-05/06 올리기)</h4>\n<pre class=\"doc-code\"><code>내보내기: BK → .whg(기수 단위, DAT-03) / .whgdata(월·분기+부가세 서식, DAT-04) → 레거시 Smart A [백업데이터복구]/[받은데이터올리기]\n올리기: 레거시 Smart A [데이터백업 .sdb]/[보낼데이터만들기 .spwdata] → BK\n  ├ DAT-05 전체기수: 기존 테넌트 데이터 전면 삭제·재구성 → 기수/인사년도 구성 → 부서/사원 자동 연결·수동 병합\n  └ DAT-06 월·분기: 첨부 데이터 확인 → 기간/서식 단위 기존 데이터 삭제 후 적재 → 기초코드 머지 → 작업 이력(감사로그) (§25.20.5~6)\n  ※ 공통 게이트: 사업자번호(·기수) 일치 검증, 암호 검증, 부서/사원 통합 미완료 시 진행 불가</code></pre>\n<h4 class=\"doc-h doc-h4\">3.4 기수변경 (SA-DAT-07)</h4>\n<pre class=\"doc-code\"><code>회사정보 확인 → 데이터 존재 기수 확인(메뉴 실행 여부 기준) → 단일 기수 검증\n  ├ 1개 기수: 변경 후 기수 입력 → 테넌트 기수 메타데이터(FiscalYear) 일괄 변경 → 기수변경이력(감사로그) 기록\n  └ 2개 이상 기수: 변경 불가 → 수동 검토 워크플로(온라인 문의)로 분리 접수 (§25.20.7)</code></pre>\n<h4 class=\"doc-h doc-h4\">3.5 티어링·보존·파기 수명주기 (플랫폼)</h4>\n<pre class=\"doc-code\"><code>[RDBMS Hot](최근 2개년) ─당해 마감─▶ [RDBMS Warm](3~5년 Read-Only) ─5년 초과 배치 이관─▶ [S3 Cold](Parquet+WORM)\n콜드 이관 5단계: ①아카이브 파일 생성 → ②checksum/레코드수/잔액합계 검증 → ③ArchiveDataset 등록 → ④운영 파티션 read-only/분리 → ⑤조회 대상 제외 (§7.5)\n파기: 보존연한 경과 → RetentionPolicy·개인정보 보유기간 확인 → 파기 승인 워크플로 → DataDestructionCertificate 발급 + DataDestructionLog 보존 (§7.3, §7.5)</code></pre>\n<p>---</p>\n<h3 class=\"doc-h doc-h3\">4. 화면별 상세설계</h3>\n<h4 class=\"doc-h doc-h4\">4.1 삭제전표복구 (SA-DAT-01) — §25.20.1</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: [매입매출전표입력]·[일반전표입력]에서 삭제한 전표를 복구하여 해당 입력 메뉴로 재반영하는 전표 소프트삭제·휴지통 복구 도구. RLS 테넌트 범위 내 삭제 전표 보관(§25.20.1). BK에서 &quot;삭제&quot;는 물리 삭제가 아닌 <code>CANCELLED</code> 상태 보존이므로(§16.1, §12 전표 상태), 본 화면은 <strong>CANCELLED 전표의 복원(재기표)</strong> 화면이다.</li>\n<li><strong>진입경로</strong>: TN-15 데이터관리·이관 &gt; 삭제전표복구(§26.1-(2)).</li>\n</ul>\n<p><strong>조회조건·입력 필드</strong> (§25.20.1)</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>필드/조건</th><th>유형</th><th>필수</th><th>설명</th></tr></thead><tbody><tr><td>1</td><td>전표 유형 탭</td><td>탭(매입매출/일반전표)</td><td>필수</td><td>복구 대상 전표 종류 선택</td></tr>\n<tr><td>2</td><td>회계기간(기수)</td><td>선택</td><td>필수</td><td>BK 조회조건 — 회계기간 단위 조회</td></tr>\n<tr><td>3</td><td>사업장</td><td>선택</td><td>선택</td><td>BK 조회조건</td></tr>\n<tr><td>4</td><td>기간</td><td>일자 범위</td><td>필수</td><td>복구 대상 기간 조회</td></tr>\n<tr><td>5</td><td>복구 대상 선택</td><td>행 체크박스</td><td>필수</td><td>복수 선택 가능</td></tr>\n<tr><td>6</td><td>전표복구 버튼</td><td>실행</td><td>—</td><td>체크 후 '전표복구' → 검토 → '확인' 2단 확정</td></tr></tbody></table></div>\n<p><strong>기능·동작</strong> (§25.20.1)</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>기능</th><th>동작</th></tr></thead><tbody><tr><td>1</td><td>삭제 전표 조회</td><td>테넌트 RLS 범위 내 <code>CANCELLED</code> 전표를 유형·기간별 그리드 조회(가상 스크롤 — 공통 표준 UI)</td></tr>\n<tr><td>2</td><td>복구 실행</td><td>선택 전표를 원 입력 메뉴(일반/매입매출)로 재반영. 복구 시 <strong>새 전표번호 재채번</strong> — 복합키 <code>(tenant_id, 전표일자, 전표번호)</code> (원 번호는 결번 보존·재사용 금지, §11.1)</td></tr>\n<tr><td>3</td><td>복구 표기</td><td>복구된 전표는 입력 화면 가이드라인 영역에 &quot;복구전표&quot; 표기</td></tr>\n<tr><td>4</td><td>복구 제외 필터</td><td>타 메뉴 전표전송분(신용카드·현금영수증·통장·회계전표처리·현금예금잔액검토·결산자료입력·정기청구입력 등), 매입매출 복수거래 설정 전표, 자금관리 설정 전표는 <strong>조회 자체에서 제외</strong>(복구 미지원)</td></tr>\n<tr><td>5</td><td>일괄삭제분 제외</td><td>[현금및예금잔액검토(SA-CLS-10)] '전표추가'분의 Shift+F6 일괄삭제 전표는 복구 불가(§25.9 SA-CLS-10 처리규칙)</td></tr></tbody></table></div>\n<p><strong>검증</strong> (§25.20.1, §15, §16.1)</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>검증</th><th>처리</th></tr></thead><tbody><tr><td>1</td><td>거래처코드가 [거래처등록]에 없는 전표</td><td>복구 차단(거래처 검증 선행)</td></tr>\n<tr><td>2</td><td>자동연동·자금관리 전표</td><td>무결성 보호를 위해 복구 제외 규칙 적용(조회 불가)</td></tr>\n<tr><td>3</td><td>복구 대상 일자 마감 여부</td><td>마감 잠금 인터셉터 — 마감 기간이면 403/비즈니스 예외(§16.1)</td></tr>\n<tr><td>4</td><td>전표번호 채번 충돌</td><td><code>NUMBERING_CONFLICT</code>(§13.3)</td></tr>\n<tr><td>5</td><td>복구 실행 멱등성</td><td><code>Idempotency-Key</code> — 동일 키 재요청 시 동일 응답(§13.3)</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>산출물</strong>: 복구된 전표(일반/매입매출). <strong>연계</strong>: [일반전표]·[매입매출전표](P03) 재반영, [거래처등록](P01) 검증. <strong>권한</strong>: <code>tenant:journal:write</code> scope + 메뉴 권한(공통 표준 §4.3). 복구 행위는 <code>DataChangeLog</code> 기록(공통 표준).</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.2 데이터백업 / 데이터복구(기수별) (SA-DAT-02) — §25.20.2</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 기수(회계기간) 단위 회계관리 데이터의 테넌트별 백업·복구 도구. <strong>기수·사업자번호를 백업 무결성 키</strong>로 사용. 기수별데이터백업·기수별데이터복구 2탭 구성(§25.20.2). 플랫폼 관점에서는 §2.4 &quot;테넌트 단위 복구(논리 백업 export/snapshot)&quot;의 화면 구현.</li>\n<li><strong>진입경로</strong>: TN-15 &gt; 데이터백업/복구(기수별).</li>\n</ul>\n<p><strong>입력 필드 — [탭1] 기수별데이터백업</strong> (§25.20.2)</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>필드</th><th>유형</th><th>필수</th><th>설명</th></tr></thead><tbody><tr><td>1</td><td>회사 검색·선택</td><td>리스트+검색(회사명/사업자번호)</td><td>필수</td><td>백업 대상 회사(테넌트) 선택</td></tr>\n<tr><td>2</td><td>선택한 회사 정보</td><td>표시</td><td>—</td><td>선택 회사 확인 영역</td></tr>\n<tr><td>3</td><td>모듈 구분</td><td>선택</td><td>필수</td><td>현재 <strong>회계관리 모듈만</strong>(급여·법인/개인 추후)</td></tr>\n<tr><td>4</td><td>파일정보(파일명)</td><td>표시</td><td>—</td><td><code>9999_#_회사명_#_회계_#_기수_인사년도!.wdb</code> 규격 자동 표기</td></tr>\n<tr><td>5</td><td>암호 설정</td><td>입력</td><td>필수</td><td>숫자·문자·특수문자 <strong>4~8자리</strong></td></tr>\n<tr><td>6</td><td>데이터백업 버튼</td><td>실행</td><td>—</td><td>진행률 표시 → 완료 시 다운로드 경로 자동저장(.wdb)</td></tr></tbody></table></div>\n<p><strong>입력 필드 — [탭2] 기수별데이터복구</strong> (§25.20.2)</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>필드</th><th>유형</th><th>필수</th><th>설명</th></tr></thead><tbody><tr><td>1</td><td>파일정보 &gt; 내PC</td><td>파일 선택</td><td>필수</td><td>.wdb 백업파일 업로드</td></tr>\n<tr><td>2</td><td>백업모듈 확인</td><td>표시</td><td>—</td><td>파일 내 모듈 정보 확인</td></tr>\n<tr><td>3</td><td>비밀번호</td><td>입력</td><td>필수</td><td>오류 시 경고, 검증 통과 시 [기수데이터 복구하기] 활성화</td></tr>\n<tr><td>4</td><td>복구 데이터 반영방법</td><td>라디오</td><td>필수</td><td>&quot;신규 회사를 생성하여 데이터 복구&quot; / &quot;현재 회사로 데이터 복구&quot;</td></tr>\n<tr><td>5</td><td>(신규회사) 회사명</td><td>입력</td><td>필수</td><td>기본값 <code>원회사명_복구회사</code>(수정 가능) → 신규 테넌트 생성</td></tr>\n<tr><td>6</td><td>(현재회사) 코드 구성기준</td><td>선택</td><td>필수</td><td>거래처/관리항목 코드 구성기준(동일 데이터 판단기준) 선택</td></tr>\n<tr><td>7</td><td>(현재회사) 동의 체크</td><td>체크</td><td>필수</td><td>기존 데이터 삭제 후 반영 동의</td></tr>\n<tr><td>8</td><td>데이터 복구 버튼</td><td>실행</td><td>—</td><td>[데이터 복구 진행현황] 표시 → 완료 시 생성 회사목록 확인</td></tr></tbody></table></div>\n<p><strong>기능·동작</strong> (§25.20.2)</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>기능</th><th>동작</th></tr></thead><tbody><tr><td>1</td><td>암호화 백업</td><td>.wdb 암호화 파일 생성 + 면책 고지 포함</td></tr>\n<tr><td>2</td><td>신규 테넌트 복구</td><td>신규 회사(테넌트) 생성 후 백업 데이터 적재, 완료 시 회사목록 반영</td></tr>\n<tr><td>3</td><td>기존 테넌트 덮어쓰기 복구</td><td>업로드 모듈 기수에 해당하는 기존 데이터 삭제 후 반영</td></tr>\n<tr><td>4</td><td>기초코드 머지</td><td>거래처·부서·사원·현장·프로젝트·계정과목및적요는 선택 옵션에 따라 <strong>데이터 머지 엔진</strong>으로 중복 통합(복구 후 확인 필요)</td></tr>\n<tr><td>5</td><td>동일 데이터 판단기준</td><td>추가 판단기준 미체크: 사업자번호(주민번호)·계좌번호·가맹점번호·카드번호로 동일 판단 / 체크: 거래처명 포함 비교(거래처코드 신규생성)</td></tr>\n<tr><td>6</td><td>물류 전표 안내</td><td>물류 전송 전표 존재 시 복구 후 확인 안내</td></tr></tbody></table></div>\n<p><strong>검증</strong> (§25.20.2)</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>검증</th><th>처리</th></tr></thead><tbody><tr><td>1</td><td>복구 데이터 ↔ 현재 회사 기수·사업자번호 불일치</td><td><strong>복구 불가(차단)</strong> — 백업 무결성 키 검증</td></tr>\n<tr><td>2</td><td>비밀번호 오류</td><td>경고, 복구 버튼 비활성</td></tr>\n<tr><td>3</td><td>암호 형식(4~8자리) 미준수</td><td>백업 진행 차단</td></tr>\n<tr><td>4</td><td>덮어쓰기 동의 미체크</td><td>복구 실행 차단</td></tr>\n<tr><td>5</td><td>복구 완료 후</td><td>무결성·잔액 검증(§2.4 &quot;복구 시 무결성·잔액 검증&quot; 준용)</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>산출물</strong>: .wdb 암호화 백업파일, 복구된 회사·데이터(신규 테넌트 또는 기존 테넌트 덮어쓰기). <strong>연계</strong>: BK 멀티테넌시 테넌트 관리(§2), SA-DAT-03 이관 메뉴군. <strong>권한</strong>: 회사 관리자 수준 + Step-up(대량 다운로드 재인증, §3.2), 백업/복구 행위 <code>DataChangeLog</code> 기록.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.3 SmartA로 보낼 데이터 만들기(기수별) (SA-DAT-03) — §25.20.3</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: BK 테넌트 데이터를 구버전 Smart A에서 복구 가능한 파일로 내보내는 레거시 익스포트. <strong>선택 회사의 현재 기수·인사년도 데이터만</strong> 파일화(전체년도 변환 미지원)(§25.20.3).</li>\n<li><strong>진입경로</strong>: TN-15 &gt; SmartA로 보낼 데이터 만들기(기수별).</li>\n</ul>\n<p><strong>입력 필드</strong> (§25.20.3)</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>필드</th><th>유형</th><th>필수</th><th>설명</th></tr></thead><tbody><tr><td>1</td><td>회사 선택</td><td>리스트+검색</td><td>필수</td><td>세무대리 태그정보 보기 지원</td></tr>\n<tr><td>2</td><td>모듈 구분</td><td>복수 선택</td><td>필수</td><td>회계관리/급여관리/법인개인 복수 선택</td></tr>\n<tr><td>3</td><td>파일정보(파일명)</td><td>표시</td><td>—</td><td><code>9999_#_회사명_#_모듈_#기수_인사년도!.whg</code> 규격 확인</td></tr>\n<tr><td>4</td><td>회사코드</td><td>입력</td><td>필수</td><td>기본 9999, 허용 범위 0101~9999(레거시 회사코드 리매핑)</td></tr>\n<tr><td>5</td><td>암호 설정</td><td>입력</td><td>필수</td><td>1~8자리. <strong>분실 시 복구 불가</strong></td></tr>\n<tr><td>6</td><td>자동전표 설정</td><td>체크</td><td>선택</td><td>전자세금계산서·신용카드 등 자동전표처리 데이터 포함 여부</td></tr>\n<tr><td>7</td><td>내리기 버튼</td><td>실행</td><td>—</td><td>변환 → 완료 시 다운로드 경로 자동저장(.whg)</td></tr></tbody></table></div>\n<p><strong>기능·검증</strong> (§25.20.3)</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>항목</th><th>처리</th></tr></thead><tbody><tr><td>1</td><td>다중변환 미지원</td><td>보안상 회사마다 암호 설정, <strong>1회 1개 회사</strong>만 변환</td></tr>\n<tr><td>2</td><td>메뉴 종료</td><td>데이터내리기 시 모든 메뉴 종료</td></tr>\n<tr><td>3</td><td>익스포트 파라미터</td><td>기수·인사년도 단위 익스포트 + 회사코드 리매핑·암호화·자동전표 포함옵션을 export 파라미터로 구현</td></tr>\n<tr><td>4</td><td>레거시 측 복구</td><td>Smart A [기초데이터]&gt;보조데이터관리&gt;[백업데이터복구]에서 업로드, 암호 입력 후 새 회사코드/선택 회사코드 복구 선택. 작업결과 성공/실패, 실패 시 더블클릭 원인 확인</td></tr>\n<tr><td>5</td><td>기수·사업자번호 검증</td><td>복구 데이터와 현재 회사 기수·사업자번호 불일치 시 복구 불가</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>산출물</strong>: .whg 익스포트 파일(레거시 Smart A 임포트 호환). <strong>연계</strong>: 레거시 Smart A [백업데이터복구], BK SA-DAT-02. <strong>권한</strong>: SA-DAT-04와 동일한 내보내기 메뉴 권한 체계(§25.20.4) + Step-up(대량 다운로드, §3.2).</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.4 SmartA로 보낼 데이터 만들기(월별/분기별) (SA-DAT-04) — §25.20.4</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: BK의 월별/분기별 데이터를 Smart A 복구 가능 파일로 내보내는 부분(기간/분기) 익스포트. 회계모듈 선택 데이터만 변환, 전표항목은 <strong>월별 1개월·분기별 1분기 단위</strong>(§25.20.4).</li>\n<li><strong>진입경로</strong>: TN-15 &gt; SmartA로 보낼 데이터 만들기(월별/분기별).</li>\n</ul>\n<p><strong>입력 필드</strong> (§25.20.4)</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>필드</th><th>유형</th><th>필수</th><th>설명</th></tr></thead><tbody><tr><td>1</td><td>회사명</td><td>F2 코드도움</td><td>필수</td><td>회사 선택</td></tr>\n<tr><td>2</td><td>월별/분기별</td><td>라디오</td><td>필수</td><td>선택 후 회계기수 선택</td></tr>\n<tr><td>3</td><td>보낼데이터 구분 — 기초</td><td>체크</td><td>선택</td><td>일반전표·매입매출전표 내리기 시 기초코드 포함 권장</td></tr>\n<tr><td>4</td><td>보낼데이터 구분 — 전표입력</td><td>체크+분기 선택</td><td>선택</td><td>일반전표·매입매출전표 체크 후 분기 선택(<strong>중복선택 불가</strong>)</td></tr>\n<tr><td>5</td><td>보낼데이터 구분 — 부가가치세 신고서·첨부서류</td><td>작성조회 선택</td><td>선택</td><td>작성조회 → 신고서 더블클릭 선택</td></tr>\n<tr><td>6</td><td>파일명</td><td>표시</td><td>—</td><td>파일명 확인</td></tr>\n<tr><td>7</td><td>회사코드</td><td>입력</td><td>필수</td><td>기본 9999, 0101~9999</td></tr>\n<tr><td>8</td><td>만들기 버튼</td><td>실행</td><td>—</td><td>변환 → 다운로드 경로 저장(.whgdata)</td></tr></tbody></table></div>\n<p><strong>기능·검증</strong> (§25.20.4)</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>항목</th><th>처리</th></tr></thead><tbody><tr><td>1</td><td>실행 권한</td><td><strong>회사관리자 또는 메뉴권한 'SmartA10 백업 데이터 내리기(월별/분기별/기수별)' 보유자만 실행</strong> — <code>RoleMenuPermission</code>+<code>MenuActionGrant</code>(공통 표준 §4.3)로 구현</td></tr>\n<tr><td>2</td><td>월별 다건</td><td>월별 다건은 월별 반복 작업(1회 1개월)</td></tr>\n<tr><td>3</td><td>지원 범위</td><td>회계 데이터만 지원. 데이터 만들기 시 모든 메뉴 종료</td></tr>\n<tr><td>4</td><td>레거시 측 업로드</td><td>Smart A [받은데이터올리기]에서 [찾기]로 파일 업로드. <strong>로그인 회사와 업로드 회사정보(사업자번호·기수) 불일치 시 업로드 불가</strong>. [데이터 선택] 메뉴 자동체크(제외 가능)·[실행하기]. 선택 메뉴의 기입력 데이터는 삭제·덮어쓰기</td></tr>\n<tr><td>5</td><td>무결성 규칙</td><td>기초코드·전표·부가세 신고서식 단위 선택 익스포트 + 임포트 시 <strong>기간 단위 삭제·덮어쓰기</strong> 무결성 규칙 적용</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>산출물</strong>: .whgdata 부분 익스포트 파일(부가가치세 신고서·첨부서식 포함). <strong>연계</strong>: 레거시 Smart A [받은데이터올리기], 부가가치세 신고 파이프라인·신고서식(P06~08). <strong>권한</strong>: 위 기능 #1 + Step-up(대량 다운로드, §3.2).</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.5 SmartA 데이터올리기(전체기수) (SA-DAT-05) — §25.20.5</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 레거시 Smart A의 전체기수·전체모듈 백업(.sdb)을 BK에 이미 생성된 회사(테넌트)에 업로드하는 <strong>전체 마이그레이션(legacy → tenant full reconstruct)</strong>. 현재 로그인 회사 데이터는 모두 삭제·재구성(§25.20.5).</li>\n<li><strong>진입경로</strong>: TN-15 &gt; SmartA 데이터올리기(전체기수).</li>\n</ul>\n<p><strong>입력 필드·진행 단계</strong> (§25.20.5)</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>단계/필드</th><th>유형</th><th>필수</th><th>설명</th></tr></thead><tbody><tr><td>1</td><td>대상 회사 확인</td><td>표시</td><td>—</td><td>로그인 회사의 회사명·사업자번호·대표자명 확인</td></tr>\n<tr><td>2</td><td>파일정보 &gt; 내PC</td><td>파일 선택</td><td>필수</td><td>Smart A [데이터백업] '선택된 모듈의 전체데이터를 백업' 체크로 만든 <strong>전체모듈·전체기수·전체년도 .sdb</strong> 파일</td></tr>\n<tr><td>3</td><td>백업파일 비밀번호</td><td>입력</td><td>필수</td><td>1~8자리</td></tr>\n<tr><td>4</td><td>유의사항 동의</td><td>체크</td><td>필수</td><td>데이터 손상·유실 면책 고지 포함</td></tr>\n<tr><td>5</td><td>데이터 재구성하기</td><td>실행</td><td>—</td><td>진행상태 확인</td></tr>\n<tr><td>6</td><td>구성 기수·인사년도 선택</td><td>선택</td><td>필수</td><td>WEHAGO(BK) 구성 대상 기수·인사년도 선택 → [데이터 구성 시작하기] → 진행현황</td></tr>\n<tr><td>7</td><td>부서/사원 병합</td><td>실행</td><td>필수</td><td>[동일 부서/사원 자동 연결] → 미연결분 수동연결·신규등록</td></tr></tbody></table></div>\n<p><strong>기능·검증</strong> (§25.20.5)</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>항목</th><th>처리</th></tr></thead><tbody><tr><td>1</td><td>실행 권한</td><td><strong>회사 관리자·서비스 관리자 권한 보유 시 실행</strong></td></tr>\n<tr><td>2</td><td>전면 재구성</td><td>재구성 시 기존 테넌트 데이터 전부 삭제·백업파일 기준 재구성. 회사명·대표자명은 불변</td></tr>\n<tr><td>3</td><td>파일 형식 검증</td><td>.whg 불가 — <strong>.sdb(전체기수·전체연도) 필수</strong>, 일부 모듈만 백업된 파일은 오류</td></tr>\n<tr><td>4</td><td>사업자번호 일치</td><td>SmartA 백업파일과 BK(WEHAGO) 회사 <strong>사업자번호 동일해야 진행</strong>(차단 게이트)</td></tr>\n<tr><td>5</td><td>회계기간 상한</td><td>2023년 초과 회계기간·인사년도 구성 제한(Smart A 기준 2018년도부터 지원)</td></tr>\n<tr><td>6</td><td>재전송 필요 항목</td><td>경비청구/전자세금계산서 전송 전표는 재전송 필요, 매입매출 전자세금계산서 발행분 자동전표 수집 후 재전송, 직원 권한 재확인</td></tr>\n<tr><td>7</td><td>모듈 조합</td><td>원천 모듈 사용 시 회계모듈 포함 파일 사용</td></tr>\n<tr><td>8</td><td>조직 병합</td><td>부서/사원 코드 병합·자동연결([사원연동설정] 연계), 미연결분 수동 처리</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>산출물</strong>: 재구성된 BK 회사(테넌트) 데이터, 부서/사원 자동연동. <strong>연계</strong>: BK 테넌트 관리(§2), 조직 코드 병합, 전자세금계산서 자동전표·신고 파이프라인 재전송(P03/P06). <strong>권한</strong>: 관리자 권한 통제 + 면책 고지 동의, 전 과정 <code>DataChangeLog</code> 감사.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.6 SmartA 데이터올리기(월별/분기별) (SA-DAT-06) — §25.20.6</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 레거시 Smart A [보낼데이터만들기]의 월별/분기별 파일(.spwdata)만 업로드하는 부분(기간) 임포트. 현재 로그인 회사 데이터는 기간/서식 단위로 삭제·재구성(§25.20.6).</li>\n<li><strong>진입경로</strong>: TN-15 &gt; SmartA 데이터올리기(월별/분기별).</li>\n</ul>\n<p><strong>입력 필드·진행 단계</strong> (§25.20.6)</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>단계/필드</th><th>유형</th><th>필수</th><th>설명</th></tr></thead><tbody><tr><td>1</td><td>회사정보 확인</td><td>표시</td><td>—</td><td>회사명·구분·대표자·사업자번호·기수·회계기간 확인</td></tr>\n<tr><td>2</td><td>파일정보 &gt; 내PC</td><td>파일 선택</td><td>필수</td><td>.spwdata 선택 → 압축해제</td></tr>\n<tr><td>3</td><td>첨부 데이터 확인</td><td>표시</td><td>—</td><td>상세내역 확인(기입력 건수 ↔ 업로드 건수 비교)</td></tr>\n<tr><td>4</td><td>코드 구성기준</td><td>선택</td><td>필수</td><td>거래처/관리항목 코드 구성기준(동일 데이터 판단기준) 선택</td></tr>\n<tr><td>5</td><td>유의사항 동의</td><td>체크</td><td>필수</td><td>데이터 올리기 동의</td></tr>\n<tr><td>6</td><td>부서/사원 통합</td><td>실행</td><td>필수</td><td>[시작하기] → [동일 부서/사원 자동 연결] → 미연결분 수동연결·신규등록. <strong>통합 미진행 시 올리기 불가</strong></td></tr>\n<tr><td>7</td><td>데이터 올리기</td><td>실행</td><td>—</td><td>진행 → 완료</td></tr>\n<tr><td>8</td><td>최종 작업 정보 탭</td><td>조회</td><td>—</td><td>파일명·작업시간·작업자 이력 조회(작업자명/WEHAGO ID 검색)</td></tr></tbody></table></div>\n<p><strong>기능·검증</strong> (§25.20.6)</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>항목</th><th>처리</th></tr></thead><tbody><tr><td>1</td><td>기간/서식 단위 덮어쓰기</td><td>전표·부가세 신고서·첨부서식은 '첨부 데이터 확인'의 기간·서식에 따라 <strong>기존 데이터 삭제 후 올리기</strong>(전표=첨부 기간, 부가세=서식 해당 기간)</td></tr>\n<tr><td>2</td><td>기초코드 머지</td><td>기초자료는 기초코드 설정 기준 통합. 동일 판단: 미체크 시 사업자번호·계좌번호·가맹점번호·카드번호 / 체크 시 거래처명 포함 비교(거래처코드 신규생성)</td></tr>\n<tr><td>3</td><td>사후 확인</td><td>올리기 후 기초데이터(거래처·부서·사원·현장·프로젝트·업무용승용차등록) 확인 필요</td></tr>\n<tr><td>4</td><td>부서/사원 통합 게이트</td><td>통합 미진행 시 올리기 차단</td></tr>\n<tr><td>5</td><td>작업 이력 감사</td><td>최종 작업 정보(파일명·작업시간·작업자)를 <strong>감사로그로 관리</strong></td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>산출물</strong>: 업로드 데이터, 최종 작업 정보 이력(감사로그). <strong>연계</strong>: 레거시 Smart A [보낼데이터만들기](.spwdata), 부가가치세 신고서·첨부서식(P06~08), 조직 코드 통합(P01). <strong>권한</strong>: SA-DAT-05 준용(관리자 통제) + <code>DataChangeLog</code>.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.7 기수변경 (SA-DAT-07) — §25.20.7</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 회계기수를 잘못 선택하여 데이터입력 작업을 한 경우 해당 기수로 바로잡는 회계기수(회계기간) 정정 기능. <strong>한 개 기수만 있는 회사에만 지원</strong>(2개 이상 기수 보유 회사는 추후/수동 검토). 변경 완료 후 데이터 확인 필요(§25.20.7). BK 모델에서는 Smart A &quot;기수&quot; 개념을 회계기간 표시·운영 속성으로 치환하되 <strong>개업연도=1기 누적 기수 카운트·기수변경 운영 기능을 보존</strong>한다(§25.0.2-C1).</li>\n<li><strong>진입경로</strong>: TN-15 &gt; 기수변경.</li>\n</ul>\n<p><strong>입력 필드·화면 구성</strong> (§25.20.7)</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>영역/필드</th><th>유형</th><th>필수</th><th>설명</th></tr></thead><tbody><tr><td>1</td><td>회사정보</td><td>표시</td><td>—</td><td>회사명·구분·개업년월일·사업자번호·대표자·회계기간 확인</td></tr>\n<tr><td>2</td><td>변경기수 — 변경 전</td><td>표시(수정불가)</td><td>—</td><td>현재 기수 자동 표기</td></tr>\n<tr><td>3</td><td>변경기수 — 변경 후</td><td>입력</td><td>필수</td><td>새 기수 입력</td></tr>\n<tr><td>4</td><td>데이터 확인</td><td>표시</td><td>—</td><td>데이터 존재 기수 정보 표시</td></tr>\n<tr><td>5</td><td>기수변경이력</td><td>그리드</td><td>—</td><td>회계기간·변경전·변경후·작업시간·작업자(사용자ID)</td></tr></tbody></table></div>\n<p><strong>기능·검증</strong> (§25.20.7)</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>항목</th><th>처리</th></tr></thead><tbody><tr><td>1</td><td>데이터 존재 판단</td><td>전표 입력 유무가 아니라 <strong>해당 기수에서 메뉴 실행 여부</strong> 기준</td></tr>\n<tr><td>2</td><td>단일 기수 제약</td><td>1개 기수 외 다른 기수에서 메뉴 실행 시 &quot;2개 이상 기수 데이터 존재&quot;로 간주 → <strong>기수변경 차단</strong></td></tr>\n<tr><td>3</td><td>다기수 처리</td><td>차단 시 [온라인 문의하기] 접수 — BK에서는 <strong>수동 검토 워크플로</strong>로 분리</td></tr>\n<tr><td>4</td><td>일괄 변경</td><td>테넌트 단위로 기수 메타데이터(<code>FiscalYear</code>: tenantId·기수·시작/종료일·상태, §11.9) 일괄 변경</td></tr>\n<tr><td>5</td><td>변경 이력</td><td>변경전/후·작업시간·작업자를 감사로그로 관리(<code>DataChangeLog</code> append-only)</td></tr>\n<tr><td>6</td><td>사후 확인</td><td>변경 완료 후 데이터 확인 필요(화면 안내)</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>산출물</strong>: 변경된 기수(회계기간) 데이터, 기수변경 이력(감사로그). <strong>연계</strong>: BK 회계기수→회계기간 모델(§11.9 <code>FiscalYear</code>/<code>FiscalPeriod</code>), 테넌트 메타데이터, 다기수 수동 검토 워크플로. <strong>권한</strong>: 회사 관리자 수준(테넌트 메타데이터 변경).</li>\n</ul>\n<p>---</p>\n<h3 class=\"doc-h doc-h3\">5. 데이터 모델</h3>\n<p>핵심 필드는 설계서 정의를 따르며, PK에는 공통 표준(00_개요 §3)의 <code>tenant_id NOT NULL</code>+RLS가 전제된다.</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>엔티티</th><th>핵심 필드</th><th>키/제약</th><th>근거</th></tr></thead><tbody><tr><td><code>TenantSnapshot</code></td><td>tenantId, snapshotType(마감전/결산/수동/PRE_TIER_CHANGE), createdAt, storageRef, checksum</td><td>티어 전환 전 스냅샷 생성 필수</td><td>§2.5</td></tr>\n<tr><td><code>TenantInfra</code></td><td>tenantId, tier(SHARED/SCHEMA/DEDICATED), dbRef, schemaName, encryptionKeyId, quotaProfile</td><td>테넌트 격리 티어</td><td>§2.5</td></tr>\n<tr><td><code>DataExportJob</code></td><td>(구독/요금 영역 — 해지/유예 시 전체 export 잡)</td><td>—</td><td>§7.4</td></tr>\n<tr><td><code>RetentionPolicy</code></td><td>데이터 유형별 보존연한·파기 조건</td><td>—</td><td>§7.3~7.4</td></tr>\n<tr><td><code>DataDestructionCertificate</code> / <code>DataDestructionLog</code></td><td>파기 대상·파일해시·수행자·시각 / 파기 사실 보존</td><td>append-only</td><td>§7.3, §7.5</td></tr>\n<tr><td><code>DataTierPolicy</code></td><td>티어별 보존연한</td><td>—</td><td>§7.5</td></tr>\n<tr><td><code>ArchiveDataset</code></td><td>Parquet 파일 ref, tenant, period, checksum, recordCount, hashRoot, objectLockUntil</td><td>아카이브 무결성(차대변 합계·DataChangeLog 해시체인 루트 포함)</td><td>§7.5</td></tr>\n<tr><td><code>ArchiveRestoreJob</code></td><td>복원 요청·완료·만료</td><td>—</td><td>§7.5</td></tr>\n<tr><td><code>FiscalYear</code> / <code>FiscalPeriod</code></td><td>tenantId, 기수, 시작/종료일, 상태 / 월별 상태</td><td>기수변경(SA-DAT-07)의 변경 대상 메타데이터</td><td>§11.9</td></tr>\n<tr><td>전표(<code>JournalHeader</code>/<code>JournalLine</code>/<code>JournalHistory</code>)</td><td>상태 <code>DRAFT~POSTED~REVERSED~CANCELLED</code>, 결번 보존</td><td>복합키 (tenant_id, 전표일자, 전표번호) — SA-DAT-01 재채번 기준</td><td>§12, §11.1, §25.20.1</td></tr>\n<tr><td><code>DataChangeLog</code></td><td>전후값·행위자·IP·사유·트랜잭션ID</td><td>append-only + 해시체인</td><td>§17</td></tr>\n<tr><td>백업/이관 잡(신규 구현 대상)</td><td>백업파일 메타(파일명 규격·모듈·기수·사업자번호·암호 해시·경로), 이관 작업 이력(파일명·작업시간·작업자)</td><td>기수·사업자번호 = 무결성 키</td><td>§25.20.2~6</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>백업 파일명 규격: 기수 백업 <code>9999_#_회사명_#_회계_#_기수_인사년도!.wdb</code>, 기수 익스포트 <code>.whg</code>, 월·분기 익스포트 <code>.whgdata</code>, 레거시 전체 백업 <code>.sdb</code>, 레거시 부분 파일 <code>.spwdata</code>(§25.20.2~6).</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">6. API 설계</h3>\n<p>공통 계약은 §13.3(인증/scope·멱등키·오류코드·페이징·rate limit)을 따른다. 아래는 화면 기능(§25.20)을 §13.3 계약으로 표준화한 대표 엔드포인트다. 대량 익스포트/임포트는 비동기 잡(202 Accepted + 잡 조회) 패턴을 적용한다(§2.3 <code>AsyncReportJob</code>·§8.4 비동기 원칙 준용).</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>화면</th><th>엔드포인트(대표)</th><th>파라미터·비고</th><th>오류코드(§13.3)</th></tr></thead><tbody><tr><td>SA-DAT-01</td><td><code>GET /api/journals/deleted</code> — 삭제(CANCELLED) 전표 조회</td><td>탭(유형)·회계기간·사업장·기간, cursor 페이징</td><td><code>TENANT_ACCESS_DENIED</code></td></tr>\n<tr><td>SA-DAT-01</td><td><code>POST /api/journals/restore</code> — 선택 전표 복구</td><td>전표 ID 목록, <code>Idempotency-Key</code> 필수, 재채번 수행</td><td><code>NUMBERING_CONFLICT</code>, <code>CLOSING_LOCKED</code>, <code>VALIDATION_FAILED</code>(거래처 미존재), <code>IDEMPOTENCY_CONFLICT</code></td></tr>\n<tr><td>SA-DAT-02</td><td><code>POST /api/data-mgmt/backups</code> — 기수 백업 잡 생성</td><td>회사·모듈·기수·암호(4~8자), 비동기, 완료 시 .wdb 다운로드</td><td><code>VALIDATION_FAILED</code>, <code>RATE_LIMITED</code></td></tr>\n<tr><td>SA-DAT-02</td><td><code>POST /api/data-mgmt/restores</code> — 기수 복구 잡 생성</td><td>.wdb 참조·비밀번호·반영방법(신규/현재)·코드 구성기준·동의, <code>Idempotency-Key</code></td><td><code>VALIDATION_FAILED</code>(기수·사업자번호 불일치/비밀번호 오류), <code>LOCK_NOT_ACQUIRED</code></td></tr>\n<tr><td>SA-DAT-03</td><td><code>POST /api/data-mgmt/exports/legacy-fiscal</code> — 기수 익스포트(.whg)</td><td>회사·모듈(복수)·회사코드(0101~9999)·암호(1~8자)·자동전표 포함옵션</td><td><code>FORBIDDEN_SCOPE</code>, <code>VALIDATION_FAILED</code></td></tr>\n<tr><td>SA-DAT-04</td><td><code>POST /api/data-mgmt/exports/legacy-period</code> — 월·분기 익스포트(.whgdata)</td><td>회사·월별/분기별·기수·데이터 구분(기초/전표/부가세 서식)·회사코드</td><td><code>FORBIDDEN_SCOPE</code>(메뉴권한 미보유), <code>VALIDATION_FAILED</code>(분기 중복선택)</td></tr>\n<tr><td>SA-DAT-05</td><td><code>POST /api/data-mgmt/imports/legacy-full</code> — 전체기수 재구성</td><td>.sdb 참조·비밀번호·동의·구성 기수/인사년도, <code>Idempotency-Key</code>, 분산 락</td><td><code>VALIDATION_FAILED</code>(.sdb 아님/사업자번호 불일치/일부 모듈), <code>LOCK_NOT_ACQUIRED</code></td></tr>\n<tr><td>SA-DAT-05/06</td><td><code>POST /api/data-mgmt/imports/{id}/org-merge</code> — 부서/사원 자동연결·수동병합</td><td>자동 연결 결과 + 미연결분 수동 매핑</td><td><code>VALIDATION_FAILED</code></td></tr>\n<tr><td>SA-DAT-06</td><td><code>POST /api/data-mgmt/imports/legacy-period</code> — 월·분기 올리기</td><td>.spwdata 참조·코드 구성기준·동의, 부서/사원 통합 완료 게이트</td><td><code>VALIDATION_FAILED</code>(통합 미진행)</td></tr>\n<tr><td>SA-DAT-06</td><td><code>GET /api/data-mgmt/imports/history</code> — 최종 작업 정보</td><td>작업자명/ID 검색</td><td>—</td></tr>\n<tr><td>SA-DAT-07</td><td><code>POST /api/data-mgmt/fiscal-year-change</code> — 기수변경</td><td>변경 후 기수, 단일 기수 검증, <code>Idempotency-Key</code></td><td><code>VALIDATION_FAILED</code>(다기수 존재), <code>CLOSING_LOCKED</code></td></tr>\n<tr><td>플랫폼</td><td><code>POST /api/op/tenants/{id}/snapshots</code> — 테넌트 스냅샷(운영 콘솔 OP-03)</td><td>snapshotType, 운영자 접근모드 검증</td><td>§26.4 <code>ACCESS_SESSION_REQUIRED</code>, <code>STEP_UP_REQUIRED</code></td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>감사로그: 백업·복구·익스포트·임포트·기수변경·복구 API는 모두 <code>DataChangeLog</code>(+ 운영자 실행 시 <code>AdminAccessLog</code>) 기록 대상(§13.3 감사로그 행).</li>\n<li>다운로드류는 대량 다운로드 Step-up 재인증 대상(§3.2), 별도 쿼터·큐 기반 처리(§13.3 Rate limit 행).</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">7. 배치 / 스케줄</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>배치</th><th>주기/트리거</th><th>내용·실패 처리</th><th>근거</th></tr></thead><tbody><tr><td>1</td><td>테넌트 백업/스냅샷 잡</td><td>일 단위(풀백업) + WAL 상시(PITR) + 테넌트 논리 백업</td><td>SHARED 일 풀백업+PITR, SCHEMA/DEDICATED 스키마/인스턴스 단위. 멱등·재처리·실패 알림</td><td>§2.4, §14(운영 배치)</td></tr>\n<tr><td>2</td><td>이벤트 스냅샷</td><td>마감/결산/신고 전 자동</td><td><code>TenantSnapshot</code> 생성, 복구 시 무결성·잔액 검증</td><td>§2.4, §11.9</td></tr>\n<tr><td>3</td><td>보존기간 파기 점검 잡</td><td>정기</td><td><code>RetentionPolicy</code> 기반 파기 대상 점검 → 승인 워크플로 → 증명서 발급</td><td>§14, §7.3</td></tr>\n<tr><td>4</td><td>콜드 이관 배치</td><td>5년 초과 데이터 발생 시(연 단위)</td><td>§7.5 5단계(생성→검증→등록→read-only→제외). <strong>검증 실패 시 이관 중단·운영 파티션 유지·오류 리포트·재처리</strong>(§15)</td><td>§7.5, §15</td></tr>\n<tr><td>5</td><td>DR 복구 훈련 잡</td><td>연 2회 이상</td><td>백업 복구 정기 훈련(테넌트 단위 복구 포함), <code>DrDrillLog</code> 기록. 신고 기한 임박 테넌트 우선 복구 정책</td><td>§19.3~19.4, §14</td></tr>\n<tr><td>6</td><td>익스포트/임포트 비동기 잡</td><td>사용자 요청(이벤트)</td><td>SA-DAT-02~06 변환·적재 워커. 멱등키 기준 재반영 방지, 락 TTL 만료 시 보상 잡으로 RUNNING 재개/실패 처리</td><td>§2.1(분산 락·복구 처리), §25.20.2~6</td></tr>\n<tr><td>7</td><td>아카이브 복원 잡</td><td>복원 요청 시</td><td><code>ArchiveRestoreJob</code> 요청·완료·만료 관리(복원 필요 스토리지 클래스)</td><td>§7.5</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">8. 검증·오류 처리</h3>\n<p>차단(B)/경고(W) 구분. 공통 검증(§15 표)은 반복하지 않고 본 페이즈 특화 항목만 기재한다.</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>검증 항목</th><th>구분</th><th>처리</th><th>근거</th></tr></thead><tbody><tr><td>1</td><td>복구 대상 거래처가 [거래처등록]에 없음</td><td>B</td><td>SA-DAT-01 복구 차단</td><td>§25.20.1</td></tr>\n<tr><td>2</td><td>자동연동(전표전송)·복수거래·자금관리 전표 복구 시도</td><td>B</td><td>조회 제외(복구 미지원) — 무결성 보호</td><td>§25.20.1</td></tr>\n<tr><td>3</td><td>일괄삭제(Shift+F6) 전표 복구 시도</td><td>B</td><td>복구 불가</td><td>§25.9(SA-CLS-10)</td></tr>\n<tr><td>4</td><td>백업/복구 기수·사업자번호 불일치</td><td>B</td><td>복구(업로드) 불가 — 무결성 키 검증</td><td>§25.20.2~5</td></tr>\n<tr><td>5</td><td>백업파일 비밀번호 오류</td><td>W→B</td><td>경고, 복구 진행 차단</td><td>§25.20.2</td></tr>\n<tr><td>6</td><td>암호 형식 위반(백업 4~8자리, 익스포트 1~8자리)</td><td>B</td><td>진행 차단</td><td>§25.20.2~3</td></tr>\n<tr><td>7</td><td>익스포트 분기 중복선택</td><td>B</td><td>전표입력 구분에서 중복선택 불가</td><td>§25.20.4</td></tr>\n<tr><td>8</td><td>내보내기 권한 미보유</td><td>B</td><td>회사관리자/메뉴권한 보유자 외 실행 차단(<code>FORBIDDEN_SCOPE</code>)</td><td>§25.20.4, §13.3</td></tr>\n<tr><td>9</td><td>.sdb 아닌 파일(.whg)·일부 모듈만 백업된 파일 업로드</td><td>B</td><td>전체기수 올리기 오류 처리</td><td>§25.20.5</td></tr>\n<tr><td>10</td><td>2023년 초과 회계기간·인사년도 구성</td><td>B</td><td>구성 제한</td><td>§25.20.5</td></tr>\n<tr><td>11</td><td>부서/사원 통합 미진행 상태 올리기</td><td>B</td><td>올리기 차단</td><td>§25.20.6</td></tr>\n<tr><td>12</td><td>2개 이상 기수 데이터 존재(메뉴 실행 기준) 기수변경</td><td>B</td><td>변경 차단 → 수동 검토 워크플로 접수</td><td>§25.20.7</td></tr>\n<tr><td>13</td><td>아카이브 검증 실패(checksum/레코드수/잔액합계)</td><td>B</td><td>콜드 이관 중단, 운영 파티션 유지, 오류 리포트·재처리</td><td>§15, §7.5</td></tr>\n<tr><td>14</td><td>분산 락 미획득(동시 이관/재구성)</td><td>B</td><td>&quot;다른 사용자 진행 중&quot; 비즈니스 예외</td><td>§15, §2.1</td></tr>\n<tr><td>15</td><td>멱등키 충돌(동일 키+다른 요청해시)</td><td>B</td><td><code>409 IDEMPOTENCY_CONFLICT</code></td><td>§13.3, §15</td></tr>\n<tr><td>16</td><td>만료된 fencing token 쓰기</td><td>B</td><td>DB 업데이트 차단, 작업 실패/재시도</td><td>§15</td></tr>\n<tr><td>17</td><td>복구·재구성 완료 후 무결성</td><td>W</td><td>무결성·잔액 검증 수행, 기초코드 머지 결과·물류 전표는 사후 확인 안내</td><td>§2.4, §25.20.2·6</td></tr>\n<tr><td>18</td><td>보존 중 원천 데이터 수정·삭제</td><td>B</td><td>read-only 아카이브 — 수정·삭제 금지, 열람·다운로드 권한만 제한</td><td>§7.3</td></tr>\n<tr><td>19</td><td>대량 다운로드/행위 임계 초과</td><td>B</td><td>Step-up 재인증(+운영자는 사유·2인 승인 <code>BulkActionControl</code>)</td><td>§3.2, §26.2</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">9. 권한·SOD·감사</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>화면</th><th>실행 주체·권한</th><th>통제</th><th>근거</th></tr></thead><tbody><tr><td>SA-DAT-01</td><td>전표 쓰기 권한자(<code>tenant:journal:write</code>)</td><td>복구 제외 규칙(자동연동·복수거래·자금관리)으로 원천 무결성 보호, 마감 잠금 인터셉터, <code>DataChangeLog</code></td><td>§25.20.1, §16.1</td></tr>\n<tr><td>SA-DAT-02</td><td>회사 관리자 수준</td><td>암호화 백업·면책 고지, 덮어쓰기 동의 체크, 다운로드 Step-up</td><td>§25.20.2, §3.2</td></tr>\n<tr><td>SA-DAT-03/04</td><td><strong>회사관리자 또는 메뉴권한 'SmartA10 백업 데이터 내리기(월별/분기별/기수별)' 보유자</strong> — <code>RoleMenuPermission</code>+<code>MenuActionGrant</code>(미노출 원칙)</td><td>회사별 암호, 1회 1개 회사, 다운로드 Step-up</td><td>§25.20.3~4, §4.3</td></tr>\n<tr><td>SA-DAT-05</td><td><strong>회사 관리자·서비스 관리자</strong></td><td>사업자번호 일치 게이트, 유의사항(면책) 동의, 전면 교체 경고</td><td>§25.20.5</td></tr>\n<tr><td>SA-DAT-06</td><td>관리자 수준(DAT-05 준용)</td><td>최종 작업 정보(파일명·작업시간·작업자) 감사로그 관리</td><td>§25.20.6</td></tr>\n<tr><td>SA-DAT-07</td><td>회사 관리자 수준</td><td>기수변경이력(변경전/후·작업시간·작업자 ID) 감사로그</td><td>§25.20.7</td></tr>\n<tr><td>운영 콘솔(스냅샷·배치·파기)</td><td>운영자 — 접근모드 4종(VIEW/SUPPORT/BOOKKEEPING/BREAK_GLASS) 접근 세션 필수, 행위는 <code>OperatorActivityLog</code>·<code>AuditLogChain</code> append-only</td><td>파기는 승인 워크플로 + 증명서, OP-10 컴플라이언스 점검(보존/파기 검증)</td><td>§26.1~26.2, §7.3</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>특이 통제: 파기는 &quot;파기 사실 자체를 <code>DataDestructionLog</code>로 보존&quot;(§7.3). 아카이브에는 생성 당시 <code>DataChangeLog</code> 해시체인 루트를 저장하여 변조를 방지(§7.5). 콜드 조회도 <code>tenant_id</code> 격리 필터+권한 검증 필수(§7.5).</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">10. 연계</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>방향</th><th>대상</th><th>내용</th><th>근거</th></tr></thead><tbody><tr><td>선행</td><td>P01 기초정보</td><td>거래처등록(DAT-01 검증), 부서/사원(DAT-05/06 병합), 회사등록·기수(DAT-07, C1)</td><td>§25.20.1·5~7</td></tr>\n<tr><td>선행</td><td>P03 전표</td><td>소프트삭제(<code>CANCELLED</code>)·결번 모델, 전표 복합키 채번 — DAT-01의 전제</td><td>§25.20.1, §11.1</td></tr>\n<tr><td>후행</td><td>P06~08 부가세</td><td>DAT-04/06의 부가세 신고서·첨부서식 단위 익스포트/임포트, DAT-05 후 전자세금계산서 재전송</td><td>§25.20.4~6</td></tr>\n<tr><td>횡단</td><td>P05 결산·마감</td><td>마감/결산/신고 전 자동 스냅샷, 본마감 시 <code>TenantSnapshot</code> 생성</td><td>§2.4, §11.9</td></tr>\n<tr><td>외부</td><td>레거시 Smart A</td><td>[백업데이터복구](.whg), [받은데이터올리기](.whgdata), [데이터백업](.sdb), [보낼데이터만들기](.spwdata)</td><td>§25.20.3~6</td></tr>\n<tr><td>플랫폼</td><td>운영 콘솔 OP-03/09/10</td><td>테넌트 스냅샷·상태/티어 전환, 배치·DLQ 모니터링, 보존/파기 컴플라이언스 점검</td><td>§26.1</td></tr>\n<tr><td>플랫폼</td><td>콜드 조회</td><td>서버리스 쿼리 엔진(Athena 계열)으로 Parquet 조회, 복원 필요 클래스는 <code>ArchiveRestoreJob</code></td><td>§7.5</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">11. 완료 기준(DoD) · 테스트 관점</h3>\n<h4 class=\"doc-h doc-h4\">11.1 완료 기준</h4>\n<p>1. SA-DAT-01~07 7개 화면이 §25.20의 입력 필드·기능·검증 전 항목을 충족하고 TN-15 메뉴로 노출된다(권한 미보유 시 미노출, §4.3).</p>\n<p>2. 백업/PITR/스냅샷: SHARED 일 풀백업+PITR, 테넌트 단위 논리 백업, 마감/결산/신고 전 자동 스냅샷 동작(§2.4). SHARED RPO≤5분/RTO≤4시간 목표(§19.3 — 수치는 §23-21 확정 전 예시값).</p>\n<p>3. 티어링: Hot/Warm/Cold 이관 5단계와 아카이브 검증 실패 시 중단·재처리 동작(§7.5, §15).</p>\n<p>4. 보존·파기: read-only 보존, 파기 승인 워크플로·증명서·파기 로그(§7.3).</p>\n<p>5. 모든 백업·복구·이관·기수변경 행위가 <code>DataChangeLog</code>(운영자는 <code>OperatorActivityLog</code>) append-only로 남는다(§17, §26.2).</p>\n<h4 class=\"doc-h doc-h4\">11.2 테스트 관점</h4>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>시나리오</th><th>기대 결과</th><th>근거</th></tr></thead><tbody><tr><td>1</td><td>전표 삭제 후 DAT-01 복구</td><td>원 번호 결번 보존, 새 번호 재채번, &quot;복구전표&quot; 표기, 원장 재반영</td><td>§25.20.1, §11.1</td></tr>\n<tr><td>2</td><td>자동연동/복수거래/자금관리 전표 복구 시도</td><td>조회 목록에 미노출</td><td>§25.20.1</td></tr>\n<tr><td>3</td><td>사업자번호 불일치 .wdb/.sdb 업로드</td><td>복구/재구성 차단</td><td>§25.20.2·5</td></tr>\n<tr><td>4</td><td>현재회사 복구 → 기초코드 머지(판단기준 체크/미체크)</td><td>미체크: 사업자번호·계좌·가맹점·카드번호 동일판단 / 체크: 거래처명 포함 비교·코드 신규생성</td><td>§25.20.2·6</td></tr>\n<tr><td>5</td><td>.whg/.whgdata 생성 → 레거시 Smart A 복구/올리기</td><td>왕복 호환(기수·사업자번호 일치 시), 기간 단위 삭제·덮어쓰기</td><td>§25.20.3~4</td></tr>\n<tr><td>6</td><td>메뉴권한 미보유자 내보내기 시도</td><td>차단(<code>FORBIDDEN_SCOPE</code>) + 메뉴 미노출</td><td>§25.20.4, §4.3</td></tr>\n<tr><td>7</td><td>부서/사원 통합 미진행 상태 올리기</td><td>차단</td><td>§25.20.6</td></tr>\n<tr><td>8</td><td>2개 기수 메뉴 실행 이력 회사의 기수변경</td><td>차단 + 수동 검토 접수</td><td>§25.20.7</td></tr>\n<tr><td>9</td><td>기수변경 성공 후</td><td><code>FiscalYear</code> 메타데이터 일괄 변경, 이력 그리드에 변경전/후·작업자·시간 표시</td><td>§25.20.7</td></tr>\n<tr><td>10</td><td>테넌트 단위 시점 복구(PITR) 훈련</td><td>특정 회사만 시점 복구, 무결성·잔액 검증 통과, <code>DrDrillLog</code> 기록</td><td>§2.4, §19.3</td></tr>\n<tr><td>11</td><td>콜드 이관 중 checksum 불일치 주입</td><td>이관 중단·운영 파티션 유지·재처리</td><td>§15</td></tr>\n<tr><td>12</td><td>동시 재구성(이중 실행)·동일 멱등키 재요청</td><td>분산 락 예외 / 동일 응답(중복 반영 없음)</td><td>§2.1, §13.3</td></tr>\n<tr><td>13</td><td>테넌트 격리</td><td>타 테넌트 삭제전표·백업파일 접근 불가(RLS+ORM 이중 강제)</td><td>§16.1</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">12. 잔여 확인사항 (§23 연계)</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>확인사항</th><th>§23 항목</th></tr></thead><tbody><tr><td>1</td><td>구독 상태별 유예기간 일수, 항목별 보존연한, 파기 주기 확정</td><td>§23-3</td></tr>\n<tr><td>2</td><td>격리 티어 전환 기준과 전용(DEDICATED) 티어 백업 SLA</td><td>§23-5</td></tr>\n<tr><td>3</td><td>회계장부 보존기간과 개인정보 파기/분리보관 정책의 우선순위·충돌 처리 기준</td><td>§23-14</td></tr>\n<tr><td>4</td><td>SLO/DR 수치 확정(가용성 목표, 티어별 RTO/RPO, 성수기 배포 동결) — DoD 11.1-2의 예시 수치 확정</td><td>§23-21</td></tr>\n<tr><td>5</td><td>1차(2606~2611) 스프린트 배분과 페이즈 03(전표) 선행 조건 — 횡단 페이즈의 착수 시점 세분화</td><td>§23-49</td></tr>\n<tr><td>6</td><td>(본 페이즈 도출) 2개 이상 기수 회사의 기수변경 수동 검토 워크플로의 접수 채널·SLA — 설계서는 &quot;추후/수동 검토&quot;로만 정의(§25.20.7)</td><td>신규(§25.20.7)</td></tr>\n<tr><td>7</td><td>(본 페이즈 도출) 레거시 이관 상한(Smart A 2018년~, 회계기간 2023년 제한)의 BK 운영 시점 기준 갱신</td><td>신규(§25.20.5)</td></tr>\n<tr><td>8</td><td>(본 페이즈 도출) 백업 모듈 확장(급여·법인/개인 — 현재 회계관리만) 시점</td><td>신규(§25.20.2)</td></tr></tbody></table></div>"},"hasJournalImpl":false,"journalImplRel":"../화면설계/구현_화면_전표_v1.1.html"};
function el(tag, cls, text){ const n=document.createElement(tag); if(cls)n.className=cls; if(text!==undefined)n.textContent=text; return n; }
function setHtml(node, html){ node.innerHTML = html || ''; return node; }
function phaseBadge(phase){ return phase==='1차'?'badge b-new':phase==='2차'?'badge b-gray':phase==='3차'?'badge b-warn':'badge b-ref'; }
function kindClass(kind){ return kind==='error'?'errormsg':kind==='warn'?'warnmsg':'okmsg'; }
function money(i){ return (i*1375000 + 12000000).toLocaleString('ko-KR'); }
function stripHtml(html){ const d=document.createElement('div'); d.innerHTML=html||''; return d.textContent.replace(/\s+/g,' ').trim(); }
function makeTable(cols, rows){
  const table=el('table','grid'); const head=document.createElement('tr'); cols.forEach(c=>head.appendChild(el('th','',c))); table.appendChild(head);
  rows.forEach((row,i)=>{ const tr=document.createElement('tr'); if(i===0)tr.className='sel'; row.forEach((cell,idx)=>{ const td=el('td','',cell); if(idx>1 && /[0-9,]/.test(String(cell)))td.className='num'; if(/차단|경고|불일치|오류|불가|미통과/.test(String(cell)))td.className=(td.className+' red').trim(); if(/정상|완료|확정|일치/.test(String(cell)))td.className=(td.className+' ok').trim(); tr.appendChild(td); }); table.appendChild(tr); });
  return table;
}
function tabsFor(screen){
  const raw = (screen.tabs || '').replace(/<br>/g,'/').split(/[\/·,]/).map(s=>s.trim()).filter(Boolean);
  if(raw.length >= 2) return raw.slice(0,5);
  const g=screen.group, t=screen.title, id=screen.id;
  if(/전표 입력/.test(g) && /매입매출|WPV/.test(t+id)) return ['세무헤더','분개라인','부가세 자동라인','전자발행','검증'];
  if(/전표 입력/.test(g)) return ['전표목록','분개입력','관리항목','승인/검증'];
  if(/자동전표/.test(g)) return ['수집자료','추천분개','오류검증','전표전송'];
  if(/장부|원장/.test(g)) return ['원장조회','월계/누계','전표드릴다운','출력'];
  if(/보조부/.test(g)) return ['명세','반제/상태','전표연계','집계'];
  if(/결산/.test(g) || /재무제표/.test(g)) return ['자료입력','조정/집계','검증','출력'];
  if(/부가세/.test(g)) return ['신고서','매입/매출','불러오기','전자신고'];
  if(/고정자산/.test(g)) return ['자산등록','상각','처분/양도','명세'];
  if(/자금|예산/.test(g)) return ['계획','실적','예산','현황'];
  if(/예적금/.test(g)) return ['계좌현황','스케줄','이자/상환','전표연계'];
  if(/어음/.test(g)) return ['수불관리','집계','조회','담보/폐기'];
  if(/데이터관리/.test(g)) return ['대상선택','검증','실행','이력'];
  return ['목록','상세입력','검증','출력'];
}
function controlType(name, desc){
  const txt=(name+' '+(desc||''));
  if(/탭|구분|유형|상태|옵션|선택|여부/.test(txt)) return 'select';
  if(/일자|기간|월|기수|회계기간|만기/.test(txt)) return 'date';
  if(/금액|세액|잔액|합계|공급가액|차변|대변|수량|단가|율/.test(txt)) return 'number';
  if(/코드|거래처|계정|사업자|은행|부서|프로젝트|사원/.test(txt)) return 'code';
  if(/파일|첨부|전송|업로드|백업|복구/.test(txt)) return 'action';
  return 'text';
}
function sampleValue(field, screen, i){
  const name=field.name||field;
  const desc=field.desc||'';
  const txt=name+' '+desc;
  if(/회계기간|기수/.test(txt)) return '2026 / 제7기';
  if(/사업장/.test(txt)) return '0.전체';
  if(/일자|기간|월/.test(txt)) return i%2?'2026-06-30':'2026-06';
  if(/거래처/.test(txt)) return '000123 ㈜대한상사';
  if(/계정|과목/.test(txt)) return '401 매출 / 101 현금';
  if(/사업자/.test(txt)) return '123-45-67890';
  if(/금액|세액|잔액|합계|공급가액|차변|대변/.test(txt)) return money(i+1);
  if(/상태/.test(txt)) return screen.statusKind==='warn'?'검토필요':'정상';
  if(/구분|유형|탭|옵션/.test(txt)) return (desc.match(/[0-9]\.[^/·,\s)]+/)||['전체'])[0];
  if(/파일|업로드|백업|복구/.test(txt)) return '대상 선택';
  if(/수량/.test(txt)) return String((i+1)*2);
  if(/율|비율/.test(txt)) return '10.00%';
  return desc ? desc.slice(0,38) : screen.title;
}
function recordRows(screen){
  const seed=screen.fields.length?screen.fields:([{name:screen.title,desc:screen.purpose}]);
  return seed.slice(0,8).map((f,i)=>({title:f.name, sub:(f.desc||screen.group||screen.title).slice(0,46), amount:money(i+2), status:i%3===0?'검토':(i%2?'정상':'완료')}));
}
function domainColumns(screen){
  const text=screen.group+' '+screen.title+' '+screen.id;
  if(/전표|JNL|WPV/.test(text)) return ['일자','전표번호','구분','계정과목','거래처','차변','대변','적요','상태'];
  if(/자동전표|ATX/.test(text)) return ['수집일자','증빙유형','거래처','공급가액','부가세','추천계정','전표상태','검증'];
  if(/장부|원장|LED|AUX/.test(text)) return ['일자','전표번호','계정/보조부','거래처','차변','대변','잔액','드릴다운'];
  if(/결산|재무|CLS|FIN/.test(text)) return ['계정코드','계정과목','전기잔액','당기증감','조정분개','기말잔액','검증'];
  if(/부가세|VAT/.test(text)) return ['구분','거래처/서식','공급가액','세액','공제/불공제','신고서 반영','검증'];
  if(/고정자산|FA/.test(text)) return ['자산코드','자산명','취득일','취득가액','상각누계','장부가액','상태'];
  if(/자금|예산|FND/.test(text)) return ['일자','자금항목','거래처','입금계획','지급계획','실적','차이'];
  if(/예적금|차입|DEP/.test(text)) return ['계좌/차입번호','금융기관','개시일','만기일','원금','이자율','잔액'];
  if(/어음|수표|BIL/.test(text)) return ['어음번호','거래처','발행일','만기일','금액','상태','전표'];
  if(/데이터|DAT/.test(text)) return ['작업','대상기간','데이터범위','검증결과','진행상태','작업자','이력'];
  return ['No','항목','유형','입력값','상태','근거'];
}
function domainRows(screen){
  const cols=domainColumns(screen);
  const fields=screen.fields.length?screen.fields:[{name:screen.title,desc:screen.purpose}];
  return fields.slice(0,10).map((f,i)=>cols.map((c,ci)=>{
    const txt=c+' '+f.name+' '+(f.desc||'');
    if(/No/.test(c)) return String(i+1).padStart(2,'0');
    if(/일자|발행일|만기|대상기간/.test(txt)) return i%2?'2026-06-30':'2026-06-18';
    if(/전표번호/.test(txt)) return '2026-06-18-'+String(i+1).padStart(3,'0');
    if(/계정|과목|보조부/.test(txt)) return f.name.includes('계정')?f.name:'401 매출';
    if(/거래처|금융기관/.test(txt)) return i%2?'국민은행':'㈜대한상사';
    if(/금액|차변|대변|세액|잔액|원금|실적|계획|차이|가액/.test(txt)) return money(i+ci+1);
    if(/상태|검증|결과|진행/.test(txt)) return i%4===0?'경고':'정상';
    if(/구분|유형|증빙|서식/.test(txt)) return f.name;
    if(/작업|항목|데이터범위/.test(txt)) return f.name;
    if(/근거|드릴다운|전표/.test(txt)) return screen.basis||screen.impl||screen.id;
    return sampleValue(f,screen,i+ci);
  }));
}

  return (parts.length?parts:[screen.statusMsg, screen.purpose]).slice(0,8);
}
