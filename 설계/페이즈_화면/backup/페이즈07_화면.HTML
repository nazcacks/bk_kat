":"<h3 class=\"doc-h doc-h3\">1. 페이즈 개요</h3>\n<ul class=\"doc-list\">\n<li><strong>목표</strong>: P06 부가가치세신고서(SA-VAT-01)의 첨부·부속서류 중 ① 매입세액 통제 서식(불공제 명세·안분/정산/재계산, 감가상각자산 취득, 대손세액), ② 멀티사업장 신고 서식(총괄납부 사업장별 명세, 사업자단위과세 명세), ③ 사후 신고 서식(과표수정·추가납부계산서, 경정청구서), ④ 영세율·환급 부속 2종(관세환급금, 외국인관광객 면세판매·환급)과 ⑤ 업종별 2차 서식 7종(면세유류~미용성형 의료용역)을 구현한다(§25.13, §25.12.8~13, §25.14.5~7).</li>\n<li><strong>범위 요약</strong>: 1차 9메뉴 + 2차 7메뉴, 총 16메뉴. 메뉴 채널은 TN-09 부가세·신고서류(§26.1-(4): SA-VAT 50화면 배치 중 본 페이즈 16화면).</li>\n<li><strong>선행조건</strong>:</li>\n<li>P03 매입매출전표(SA-JNL-02): 54.불공 + 불공제사유 코드(51→54 변경 시 불공제사유 팝업, 54→전송 시 본 명세서 자동반영 — §25.4.2.2), 고정자산 계정 분개 분기(51/52/54/55/57 + 고정자산 계정), 적요 06/07 트리거(§11.6.2-(2) 부가세 통제 메타).</li>\n<li>P06 SA-VAT-01 신고서 마감 상태머신·수정신고 차수(정기신고 마감 선행), 추가 차가감납부세액 ≥0/&lt;0 분기(§25.11.1) — SA-VAT-27/28의 판정 원천.</li>\n<li>P06 SA-VAT-07 전자신고 파이프라인(제작→검증→제출) — 본 페이즈 서식은 첨부서식으로 전산매체에 수록(§25.11.7 &quot;모든 첨부서식 SA-VAT-03~50&quot; 연계).</li>\n<li>P01 회사등록 본지점설정(본점·총괄납부/사업자단위과세, §25.1.1)·국세환급금계좌·세무대리인 정보, 거래처등록 카드탭 가맹점번호(§25.12.11).</li>\n<li><strong>MVP 연관</strong>: MVP 최우선(P03 전표·P01 계정과목, §22 N13)의 후속 소비처. 카드 VAT 공제 자동 분석(N11, §11.1.1-(16))은 기능 범위 확장을 통제하며 단계적으로 반영하는 항목으로, 본 페이즈 SA-VAT-22 불공제 판정과 연계된다(§22.2 N13).</li>\n</ul>","flow":"<h3 class=\"doc-h doc-h3\">3. 업무 흐름 (End-to-End)</h3>\n<pre class=\"doc-code\"><code>[P03] 매입매출전표 — 54.불공+불공제사유 / 고정자산 계정 분개 / 12·16 영세 / 21.전자 / 13·18·23 면세\n   │  과세유형·계정·적요 기반 서식 라우팅(§25.4.2.2)\n   ▼\n① 매입세액 통제 서식 작성 (SA-VAT-22/23/24)\n   │  불공제 명세(안분→정산→재계산 3단계 룰엔진) · 고정자산 취득명세(미작성 시 마감 유의사항) · 대손발생/변제\n   ▼\n② [P06] SA-VAT-01 신고서 자동집계 — 50.불공 / 11.고정자산·42.신용카드고정 / 8.대손세액가감·47.변제대손세액 란 연동\n   │  멀티사업장: 본·지점 신고서 → SA-VAT-25(총괄납부) / SA-VAT-26(사업자단위과세) 합산(§11.4)\n   ▼\n③ [P06] 신고서 마감 → MRI(SA-VAT-02) 검사(공통매입세액 안분·대손세액공제·월별판매액 가산세 검토 포함) → 전자신고(SA-VAT-07) 전산매체 수록 → 납부서(SA-VAT-08, 총괄납부 금액 우선 반영)\n   ▼\n④ 사후 신고 분기 (§25.11.1 → §25.13.6~7)\n   │  수정신고서 저장 후 추가 차가감납부세액 ≥0 → SA-VAT-27 과표수정·추가납부계산서\n   │                     추가 차가감납부세액 &lt;0 → SA-VAT-28 과표·세액 경정청구서(국세환급금계좌)\n   ▼\n⑤ (2차) 업종별·환급 부속 서식 (SA-VAT-16~21·33~35) — 계정/거래처/가맹점 설정 → 불러오기 → 보정 → 마감·전산매체</code></pre>\n<ul class=\"doc-list\">\n<li>사업장 차원과 연계한 <strong>사업장별 부가세 신고/사업자단위과세 합산</strong>, 전 신고유형(예정/확정/수정/기한후) + 가산세를 지원한다(§11.4).</li>\n<li>신고서 생성·전자신고 전송은 주기장 측 수행이며, 주기장=OPERATOR는 세무대리 수임 검증 + 이용회사 전송 승인(<code>filingApprovalRequired</code>, 기본 Y — Step-up) 후 전송한다(§11.4, §21.4).</li>\n<li>매입 측 이중공제 방지 규칙: 세금계산서 교부 후 카드로 결제한 건은 세금계산서 기준으로 한 번만 매입세액 공제하고 카드결제는 결제수단으로만 처리한다(§11.1.1-(16) ④) — SA-VAT-22 불공제 판정과 카드 VAT 자동 추천(N11)의 전제.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">3.1 본 페이즈 서식 → SA-VAT-01 신고서 란 매핑 (공통 참조)</h4>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>서식</th><th>원천 전표·데이터</th><th>신고서 반영 란</th><th>근거</th></tr></thead><tbody><tr><td>SA-VAT-22 불공제 명세</td><td>54.불공 + 불공제사유</td><td>16.공제받지못할매입세액 &gt; 50.공제받지못할 매입세액(안분·정산·재계산 포함)</td><td>§25.13.1</td></tr>\n<tr><td>SA-VAT-23 감가상각자산 취득</td><td>51/52/54/55/57 + 고정자산 계정</td><td>고정자산매입(11.고정자산)·42.신용매출전표수취/고정</td><td>§25.13.2</td></tr>\n<tr><td>SA-VAT-24 대손발생</td><td>확정신고 직접입력(공급자)</td><td>8.대손세액가감 — 양수→(-)/음수→(+)</td><td>§25.13.3</td></tr>\n<tr><td>SA-VAT-24 대손변제</td><td>확정신고 직접입력(공급받는자)</td><td>14.그밖의경감·공제 &gt; 47.변제대손세액 — 양수→(+)/음수→(-)</td><td>§25.13.3</td></tr>\n<tr><td>SA-VAT-25 사업장별 명세</td><td>본·지점 신고서 &quot;부가가치세 불러오기&quot;</td><td>총괄납부사업자 납부할세액(환급)란 + SA-VAT-08 총괄납부 금액</td><td>§25.13.4, §25.11.8</td></tr>\n<tr><td>SA-VAT-26 단위과세 명세</td><td>종사업장 신고서 불러오기</td><td>신고서 통합(주된 사업자번호)</td><td>§25.13.5</td></tr>\n<tr><td>SA-VAT-27/28 수정·경정</td><td>수정신고서 저장 데이터</td><td>수정차수 연동(≥0/&lt;0 분기)</td><td>§25.13.6~7, §25.11.1</td></tr>\n<tr><td>SA-VAT-33 관세환급금</td><td>12.영세/16.수출</td><td>영세율 과표(영세율매출명세서 SA-VAT-43[P08] 집계 대상)</td><td>§25.14.5</td></tr>\n<tr><td>SA-VAT-34/35 외국인관광객</td><td>계정과목/거래처 불러오기</td><td>48.외국인관광객환급</td><td>§25.14.6~7</td></tr>\n<tr><td>SA-VAT-16 면세유류</td><td>13.면세/18.카면/23.현면</td><td>면세 부속(신고서 첨부)</td><td>§25.12.8</td></tr>\n<tr><td>SA-VAT-17 월별판매액</td><td>12.영세/16.수출/19.카영/24.현영</td><td>영세율 부속 — 미첨부 시 영세율과세표준불성실 가산세 0.5%</td><td>§25.12.9</td></tr>\n<tr><td>SA-VAT-18 농어업기자재</td><td>51.과세 + 계정 146~175/201~230/801~900</td><td>환급신청(신고서 외 별도 환급 모듈)</td><td>§25.12.10</td></tr>\n<tr><td>SA-VAT-19 전자화폐</td><td>21.전자</td><td>신고서 첨부(전자 결제명세)</td><td>§25.12.11</td></tr>\n<tr><td>SA-VAT-20 전자신고세액공제</td><td>직전과세기간 마감 수임업체</td><td>54.전자신고세액공제(세무대리인)</td><td>§25.12.12</td></tr>\n<tr><td>SA-VAT-21 보세판매장</td><td>12.영세/19.카영/24.현영</td><td>영세율 부속</td><td>§25.12.13</td></tr></tbody></table></div>","dataModel":"<h3 class=\"doc-h doc-h3\">5. 데이터 모델</h3>\n<blockquote>엔티티 명칭 중 § 근거 표기가 있는 필드·상태는 설계서 명시값이며, 부속서류 헤더 등 구조 명칭은 §25.12~25.14의 화면 기능(작성조회·마감·불러오기)을 본 페이즈에서 구체화한 것이다. <code>VatReturn</code>·<code>VatAttachmentForm</code>·<code>ElectronicFilingJob</code> 등 공통 헤더는 P06 §5를 공유한다.</blockquote>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>엔티티</th><th>핵심 필드</th><th>PK/유니크·상태</th><th>근거</th></tr></thead><tbody><tr><td><code>NonDeductibleEntry</code>(불공제 명세)</td><td>attachmentId, reasonCode(사유 1/2/3/9/4/0/6/A/B), vendorRef, supplyAmount, vatAmount, sourceType(전표자동/직접입력/안분연동 — 세액÷10% 공급가액 자동)</td><td>예정누락은 명세 탭만</td><td>§25.13.1</td></tr>\n<tr><td><code>CommonInputTaxCalc</code>(공통매입 안분/정산/재계산)</td><td>calcType(안분/정산/재계산), formulaType(1.공급가액/2.매입가액/3.예정공급가액/4.예정사용면적/5.도축두수), totalSupply, exemptSupply, exemptRatio, commonInputTax, nonDeductibleTax, priorNonDeductible(직접), adjustTax(가산/공제), assetClass(건축구축물/기타), decliningRate(5%/25%), elapsedPeriods, reductionRate, exemptRatioChange(≥5%)</td><td>면세공급가액=0 &amp; 총공급가액≠0 마감 오류</td><td>§25.13.1</td></tr>\n<tr><td><code>FixedAssetAcqEntry</code>(감가상각자산 취득)</td><td>취득일자, 상호, 사업자번호, assetClass(1~4), supplyAmount, vatAmount, count, docType(1.세금계산서/2.신용카드)</td><td>신고서 고정자산란 대사</td><td>§25.13.2</td></tr>\n<tr><td><code>BadDebtEntry</code>(대손세액)</td><td>tabType(발생/변제), 당초공급일(2022-1기~ 필수), 대손사유/변제사유, 대손기준일, 대손확정일(부도+6개월 자동), 금액(부호 규칙), 세액(×10/110 자동), vendorId</td><td>공급일+10년 내 과세기간 검증</td><td>§25.13.3</td></tr>\n<tr><td><code>BranchVatStatement</code>(사업장별/단위과세 명세)</td><td>stmtType(총괄납부/사업자단위과세), businessPlaceId, 사업자등록번호/적용번호(종사업장 자동·0000), 총괄납부번호, 매출·매입 과표/세율/세액(불러오기), 가산세·공제세액(직접), 대손·미환급·고지(직접 조정)</td><td>사업장 불러오기 시 기존 삭제. 사업장 차원 RLS</td><td>§25.13.4~5</td></tr>\n<tr><td><code>AmendedFilingForm</code>(수정·경정 서식)</td><td>returnId, amendmentSeq, formType(추가납부계산서/경정청구서), 신고인정보(자동·수정불가), 수정사유, 법정/최초신고일(자동, 휴일 시 익일), 경정청구이유1/2(중복 금지), 국세환급금계좌, 위임장정보</td><td>≥0 수정신고 / &lt;0 경정청구 판정</td><td>§25.13.6~7</td></tr>\n<tr><td><code>CustomsRefundEntry</code>(관세환급금)</td><td>공급일자, 환급금액, 공급받는자(상호·사업자번호), 내국신용장번호(전자신고 필수)</td><td>12/16 거래처 설정 불러오기</td><td>§25.14.5</td></tr>\n<tr><td><code>TouristRefundEntry</code>(외국인관광객 면세판매/의료용역)</td><td>entryType(면세판매/미용성형), 종사업장번호, 면세판매장지정번호/환급창구운영사업자, 구매일련번호/의료용역일련번호(20자리·순차), 판매/공급일자, 반출일자·반출승인번호, 환급(송금)일자·환급액, 세목별 금액(부가세·개소세·교육세·농특세), 유치기관등록번호, 환자 인적사항</td><td>일련번호 순차 부여</td><td>§25.14.6~7</td></tr>\n<tr><td><code>DutyFreeOilEntry</code>(면세유류)</td><td>유종(휘발유/경유/등유/중유/LPG), 업종구분(농업/임업), 계정매핑, 집계금액</td><td>13/18/23 집계</td><td>§25.12.8</td></tr>\n<tr><td><code>MonthlySalesEntry</code>(월별판매액)</td><td>tabType(장애인보장구/농축임업용), 계정코드, 월별 판매액</td><td>미첨부 가산세 0.5% MRI 룰</td><td>§25.12.9</td></tr>\n<tr><td><code>AgriRefundClaim</code>(농어업기자재 환급)</td><td>탭(환급신청내용/매입세금계산서), 환급계좌, 직접대행구분(0/1), 수량(마감 필수), 사업자/주민번호(마감 필수)</td><td>마감 후 수정불가</td><td>§25.12.10</td></tr>\n<tr><td><code>EMoneyEntry</code>(전자화폐)</td><td>가맹점번호(거래처 카드탭), 발행회사, 구매자, 결제일자, 결제금액(공급대가), 결제처리번호(전자신고 필수)</td><td>21.전자 집계</td><td>§25.12.11</td></tr>\n<tr><td><code>EFilingCreditClaim</code>(전자신고세액공제)</td><td>수임업체 건수, 공제세액(건수×1만원), 한도(개인 300만/법인 750만), 세무대리인정보</td><td>직전과세기간 마감분 집계(멀티테넌트 관계)</td><td>§25.12.12</td></tr>\n<tr><td><code>BondedShopSupplyEntry</code>(보세판매장)</td><td>공급처(보세판매장), 계정매핑, 집계금액</td><td>12/19/24 집계, 조건별 삭제</td><td>§25.12.13</td></tr>\n<tr><td><code>CardVatRule</code>(카드 VAT 공제 룰, N11)</td><td>tenantId, 판정 신호(사업 관련성·적격 증빙·법정 불공제·접대비/식대·차량·면세·개인성 지출), 분류(공제/불공제/검토필요), 고객사별 Rule·반복 거래 보정</td><td>검토 필요 건 검토 큐, 증빙 보완 요청 워크플로우(18.3)</td><td>§11.1.1-(16)</td></tr>\n<tr><td><code>PurchaseLedgerLine</code>(매입원장 — P06 공유)</td><td>taxCategory, reasonCode(사유구분), deductibleType, ntsStatus, evidenceStatus</td><td>불공제/면세/영세율 <strong>사유 필수</strong> 검증</td><td>§11.4-(1)</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>매입 세무구분·사유구분·전송상태·증빙상태 코드는 공통 표준 <code>STD_PURCHASE_TAX_STATUS</code> 카탈로그 버전으로 배포(§6 표 — 11.4 연계).</li>\n<li>테이블 공통 제약(tenant_id NOT NULL+RLS, 감사 필드, 물리 삭제 금지)은 00_개요 §3.</li>\n</ul>","api":"<h3 class=\"doc-h doc-h3\">6. API 설계</h3>\n<blockquote>P06 §6의 부속서류 공통 API(<code>/attachments/{formType}/load</code>·<code>/close</code>)를 재사용하고, 본 페이즈 특화 리소스만 추가한다. 엔드포인트는 §25.13~25.14의 화면 기능(불러오기·마감·수정차수·정산 계산)을 REST로 구체화한 대표 설계다(§13.1 공통 인터셉터 준용).</blockquote>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>메서드</th><th>엔드포인트</th><th>설명</th><th>멱등성·오류</th></tr></thead><tbody><tr><td>POST</td><td><code>/api/tenant/vat/attachments/{formType}/load</code></td><td>부속서류 불러오기(계정/거래처/가맹점 설정 기반, 기존 삭제 후 재집계 또는 조건별 삭제 — SA-VAT-21)</td><td>Idempotency-Key</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/attachments/{formType}/close</code></td><td>부속서류 마감(SA-VAT-18: 수량·사업자/주민번호 필수, 마감 후 수정불가)</td><td><code>VALIDATION_FAILED</code></td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/non-deductible/{id}/apportion</code></td><td>공통매입세액 안분 계산(계산식 1~5, 예정)</td><td>자동계산 결과 반환</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/non-deductible/{id}/settle</code></td><td>공통매입세액 정산(확정 — 면세확정비율·기 불공제 차감)</td><td>〃</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/non-deductible/{id}/recalculate</code></td><td>납부/환급세액 재계산(체감률 5%/25%·경과 과세기간·면세비율 증감 ≥5%)</td><td>〃</td></tr>\n<tr><td>GET</td><td><code>/api/tenant/vat/bad-debts?period&amp;tabType</code></td><td>대손발생/변제 명세 조회</td><td>—</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/bad-debts</code></td><td>대손 건 등록(10/110 자동, 10년 기간·부호 규칙 검증)</td><td><code>VALIDATION_FAILED</code></td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/branch-statements/{type}/load</code></td><td>사업장별/단위과세 &quot;부가가치세 불러오기&quot;(본·지점 신고서 반영, 기존 삭제)</td><td>Idempotency-Key, 지점 권한 <code>FORBIDDEN_SCOPE</code></td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/returns/{id}/amend-forms</code></td><td>수정차수 연동 서식 생성(≥0 → 추가납부계산서 / &lt;0 → 경정청구서 자동 분기)</td><td>수정신고서 저장 선행 검증</td></tr>\n<tr><td>PUT</td><td><code>/api/tenant/vat/amend-forms/{id}</code></td><td>수정사유·경정청구이유·환급계좌 보정(이유 1/2 중복 차단)</td><td>version 낙관적 락</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/card-rules/evaluate</code></td><td>카드 VAT 공제/불공제/검토필요 자동 판정(N11)</td><td>검토 큐 라우팅, reason code 필수</td></tr>\n<tr><td>PUT</td><td><code>/api/tenant/vat/card-rules</code></td><td>고객사별 Rule 설정·반복 거래 보정</td><td><code>VALIDATION_FAILED</code></td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/efiling-credit/load</code></td><td>수임업체 건수 집계(직전과세기간 마감분 × 1만원, 한도 검증)</td><td>한도 초과 시 경고</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/attachments/{formType}/excel-import</code></td><td>엑셀 업로드(SA-VAT-33/34/35/20 등)</td><td>오류행 리포트</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>오류코드</strong>(§13.3): <code>VALIDATION_FAILED</code>, <code>CLOSING_LOCKED</code>(마감 후 수정), <code>PERIOD_LOCKED</code>, <code>NOT_PRIMARY_BOOKKEEPER</code>, <code>FORBIDDEN_SCOPE</code>(지점 권한 없음), <code>IDEMPOTENCY_CONFLICT</code>(409), <code>EXTERNAL_INTEGRATION_FAILED</code>.</li>\n<li><strong>Scope</strong>(§13.3): 전자신고 수록·마감은 위험 scope로 Step-up, 지점 데이터는 사업장 차원 RLS로 접근 제어(§25.13.4).</li>\n</ul>","validation":"<h3 class=\"doc-h doc-h3\">8. 검증·오류 처리</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>검증 항목</th><th>차단/경고</th><th>근거</th></tr></thead><tbody><tr><td>1</td><td>SA-VAT-22 마감 시 면세공급가액=0 &amp; 총공급가액≠0</td><td>차단(마감 오류)</td><td>§25.13.1</td></tr>\n<tr><td>2</td><td>안분 제외 요건(면세비율 5% 미만 등)</td><td>안분 대상 제외 처리</td><td>§25.13.1</td></tr>\n<tr><td>3</td><td>예정누락 입력 — 공제받지못할매입세액 탭 외</td><td>차단(명세 탭만 허용)</td><td>§25.13.1</td></tr>\n<tr><td>4</td><td>재계산 대상 판정 — 면세비율 증감 5% 미만</td><td>재계산 제외</td><td>§25.13.1</td></tr>\n<tr><td>5</td><td>고정자산매입분 존재 + SA-VAT-23 미작성</td><td>경고(신고서 마감 유의사항)</td><td>§25.13.2</td></tr>\n<tr><td>6</td><td>SA-VAT-23 ↔ 신고서 고정자산란 불일치</td><td>경고(정합성 검증)</td><td>§25.13.2</td></tr>\n<tr><td>7</td><td>대손 공제기간(공급일로부터 10년 내 과세기간) 초과</td><td>차단</td><td>§25.13.3</td></tr>\n<tr><td>8</td><td>대손확정일 과세기간 외 입력</td><td>차단(과세기간 내 입력)</td><td>§25.13.3</td></tr>\n<tr><td>9</td><td>대손/변제 부호 규칙 위반(발생 양수/회수 음수 등)</td><td>차단</td><td>§25.13.3</td></tr>\n<tr><td>10</td><td>당초공급일 누락(2022년 1기 확정 이후)</td><td>차단(필수)</td><td>§25.13.3</td></tr>\n<tr><td>11</td><td>본지점설정·지점회사 권한 없는 사업장별 명세 작성</td><td>차단(<code>FORBIDDEN_SCOPE</code>)</td><td>§25.13.4~5</td></tr>\n<tr><td>12</td><td>대손·예정미환급·예정고지 불러오기 시도</td><td>차단(직접 조정만 허용)</td><td>§25.13.4~5</td></tr>\n<tr><td>13</td><td>수정신고서 미저장 상태 SA-VAT-27/28 작성</td><td>차단(수정신고서 저장 필요)</td><td>§25.13.6~7</td></tr>\n<tr><td>14</td><td>신고인정보 수정 시도</td><td>차단(회사등록 자동·수정불가)</td><td>§25.13.6~7</td></tr>\n<tr><td>15</td><td>경정청구이유 1/2 중복 선택</td><td>차단(전자신고 오류)</td><td>§25.13.7</td></tr>\n<tr><td>16</td><td>≥0/&lt;0 서식 오분기(추가납부↔경정청구)</td><td>차단(자동 판정)</td><td>§25.13.6~7, §25.11.1</td></tr>\n<tr><td>17</td><td>내국신용장번호(SA-VAT-33)·결제처리번호(SA-VAT-19) 미입력</td><td>전자신고 필수 — 제작 오류</td><td>§25.14.5, §25.12.11</td></tr>\n<tr><td>18</td><td>SA-VAT-18 마감 시 수량·사업자/주민번호 미입력</td><td>차단(마감 불가)</td><td>§25.12.10</td></tr>\n<tr><td>19</td><td>SA-VAT-18 마감 후 수정</td><td>차단(마감 후 수정불가)</td><td>§25.12.10</td></tr>\n<tr><td>20</td><td>전자신고세액공제 한도 초과(개인 300만/법인 750만)</td><td>차단/한도 절사</td><td>§25.12.12</td></tr>\n<tr><td>21</td><td>월별판매액합계표 미첨부</td><td>MRI 경고(영세율과세표준불성실 가산세 0.5%)</td><td>§25.12.9</td></tr>\n<tr><td>22</td><td>세금계산서 수취 건 카드 공제(이중공제)</td><td>차단(세금계산서 기준 1회 공제, 카드=결제수단)</td><td>§11.1.1-(16) ④, §15 R16</td></tr>\n<tr><td>23</td><td>동일 카드승인건 다중 전표 연결</td><td>차단(증빙 중복 사용 방지)</td><td>§15 R16</td></tr>\n<tr><td>24</td><td>카드 VAT 판정 reason code 누락</td><td>알림 생성 차단(설명가능성 강제)</td><td>§15(이상탐지 사유), §11.1.1-(16)</td></tr>\n<tr><td>25</td><td>매입원장 불공제/면세/영세율 사유 미입력</td><td>차단(사유 필수)</td><td>§11.4-(1) 검증</td></tr>\n<tr><td>26</td><td>매입원장 세무구분·증빙유형 불일치</td><td><code>REVIEW_REQUIRED</code> + 신고 집계 경고/차단(회사 정책)</td><td>§15, §11.4</td></tr>\n<tr><td>27</td><td>비주기장 측 서식 작성·마감 시도</td><td>차단 <code>NOT_PRIMARY_BOOKKEEPER</code></td><td>§15, §21.1</td></tr>\n<tr><td>28</td><td>Ack 미완료/이의 미해소 상태 수정신고 생성</td><td><code>ackPolicy=REQUIRED</code> 시 차단</td><td>§15, §21.4</td></tr>\n<tr><td>29</td><td><code>LOCKED</code> 기간 마감해제 시도(경정 대상 기간)</td><td>차단(수정신고 절차 안내), 시도 감사로그</td><td>§15, §11.9</td></tr>\n<tr><td>30</td><td>멱등키 충돌(불러오기·수록 재호출)</td><td>409 <code>IDEMPOTENCY_CONFLICT</code></td><td>§15, §13.3</td></tr></tbody></table></div>","done":"<h3 class=\"doc-h doc-h3\">11. 완료 기준(DoD)·테스트 관점</h3>\n<p><strong>DoD</strong></p>\n<p>1. 1차 9메뉴(SA-VAT-22~28·33·34)가 P03 전표(불공제사유·고정자산 계정·영세 계열)에서 자동 집계 → 보정 → 마감 → SA-VAT-01 란 연동 → SA-VAT-07 전산매체 수록까지 E2E 동작(§25.13, §25.11.7).</p>\n<p>2. 공통매입세액 안분(계산식 5종)·정산·재계산(체감률 5%/25%) 3단계 룰엔진이 자동 계산되고 마감 검증(면세공급가액=0 오류)이 동작(§25.13.1).</p>\n<p>3. 대손 부호 규칙·10년 공제기간·10/110 자동계산과 신고서 8란/47란 부호 반영이 정확(§25.13.3).</p>\n<p>4. 총괄납부·사업자단위과세 본·지점 불러오기 합산과 지점 권한(RLS) 격리, 직접 조정 항목(대손·미환급·고지) 통제가 동작(§25.13.4~5, §11.4).</p>\n<p>5. 수정신고 ≥0/&lt;0 자동 분기로 SA-VAT-27/28이 생성되고, 경정청구이유 중복 금지·신고인정보 수정불가·승인 게이트(<code>filingApprovalRequired</code>)가 동작(§25.13.6~7, §21.4).</p>\n<p>6. 검증 표(8절) 30항목이 서버/클라 이중 검증으로 구현(00_개요 §3 UI 공통).</p>\n<p><strong>테스트 관점</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>구분</th><th>시나리오</th></tr></thead><tbody><tr><td>불공제 집계</td><td>불공제사유 코드 9종별 전표 → 명세 자동반영, 51↔54 변경 시 사유 팝업·재집계(§25.4.2.2)</td></tr>\n<tr><td>안분·정산·재계산</td><td>계산식 1~5 각각, 예정 안분→확정 정산 기 불공제 차감, 면세비율 증감 5% 경계, 안분 제외(5% 미만)</td></tr>\n<tr><td>감가상각자산</td><td>취득 유형(세금계산서/신용카드)×자산구분 4종 집계, 미작성 시 마감 유의사항, 신고서란 대사</td></tr>\n<tr><td>대손세액</td><td>부도+6개월 자동 확정일, 10년 경계, 발생/회수·변제 부호 4조합의 신고서 반영 방향</td></tr>\n<tr><td>멀티사업장</td><td>본·지점 신고서 합산=총괄 납부세액, 지점 권한 없는 접근 차단, 사업장 불러오기 재실행 멱등</td></tr>\n<tr><td>수정·경정</td><td>수정신고서 저장 전 작성 차단, ≥0/&lt;0 분기, 청구이유 중복 차단, 휴일 법정신고일 익일 처리</td></tr>\n<tr><td>전자신고 필수값</td><td>내국신용장번호·결제처리번호·물품명 등 누락 시 제작 오류(SA-VAT-07 검증 단계)</td></tr>\n<tr><td>카드 VAT(N11)</td><td>공제/불공제/검토필요 3분류, 주말·고액·반복 결제 신호, 고객사별 Rule 보정, 이중공제 차단</td></tr>\n<tr><td>2차 서식</td><td>계정/가맹점/공급처 설정 → 불러오기 → 조건별 삭제, SA-VAT-18 마감 필수값·마감 후 수정불가, 공제한도(300만/750만)</td></tr>\n<tr><td>통제</td><td>비주기장 시도, Ack 미완료, Step-up 미수행, <code>LOCKED</code> 기간, RLS 교차 테넌트·교차 사업장</td></tr>\n<tr><td>성능</td><td>신고 성수기(1월·부가세 신고월) 부속서류 대량 집계 — 무중단·자동 스케일(§15 하단)</td></tr></tbody></table></div>","full":"<h2 class=\"doc-h doc-h2\">BK 개발 상세설계서 — 페이즈 07. 부가세 첨부·업종별 서류 (SA-VAT-16~28, 33~35)</h2>\n<ul class=\"doc-list\">\n<li>기준 문서: <code>bk_설계서_v1.1.md</code> (§25.13 부가가치세 첨부서류, §25.12 업종별 첨부서류, §25.14.5~7 관세환급금·외국인관광객, §11.4 매입매출/부가세, §11.1.1-(16) 카드 VAT 자동 분석, §22.2 개발 차수 계획)</li>\n<li>작성일: 2026-07-03</li>\n<li>개발 차수: <strong>1차(2610~2611) = SA-VAT-22~28·33·34 (9메뉴)</strong> / <strong>2차 = SA-VAT-16~21·35 (7메뉴)</strong> (§22.2 페이즈 07 행, 00_개요 §1·§5)</li>\n<li>선행 페이즈: <strong>P03 전표·자동전표(매입매출전표 SA-JNL-02 과세유형·불공제사유·적요, 증빙)</strong>, <strong>P06 부가세 주요신고(SA-VAT-01 신고서·수정차수, SA-VAT-02 MRI, SA-VAT-07 전자신고, SA-VAT-08 납부서)</strong> — 본 페이즈 서식은 전부 SA-VAT-01 신고서 란(50.불공/고정자산/8.대손세액가감/총괄납부/수정차수 등)과 연동된다(00_개요 §2, P06 §10). P01 회사등록(본지점설정·국세환급금계좌·세무대리인 정보)·거래처등록(카드탭 가맹점번호 등) 선행.</li>\n<li>공통 설계 표준(멀티테넌시·감사필드·오류코드·권한·멱등성·UI·기술스택)은 <code>00_개요_페이즈일정.md</code> §3을 따르며 본 문서에서 반복하지 않는다.</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">1. 페이즈 개요</h3>\n<ul class=\"doc-list\">\n<li><strong>목표</strong>: P06 부가가치세신고서(SA-VAT-01)의 첨부·부속서류 중 ① 매입세액 통제 서식(불공제 명세·안분/정산/재계산, 감가상각자산 취득, 대손세액), ② 멀티사업장 신고 서식(총괄납부 사업장별 명세, 사업자단위과세 명세), ③ 사후 신고 서식(과표수정·추가납부계산서, 경정청구서), ④ 영세율·환급 부속 2종(관세환급금, 외국인관광객 면세판매·환급)과 ⑤ 업종별 2차 서식 7종(면세유류~미용성형 의료용역)을 구현한다(§25.13, §25.12.8~13, §25.14.5~7).</li>\n<li><strong>범위 요약</strong>: 1차 9메뉴 + 2차 7메뉴, 총 16메뉴. 메뉴 채널은 TN-09 부가세·신고서류(§26.1-(4): SA-VAT 50화면 배치 중 본 페이즈 16화면).</li>\n<li><strong>선행조건</strong>:</li>\n<li>P03 매입매출전표(SA-JNL-02): 54.불공 + 불공제사유 코드(51→54 변경 시 불공제사유 팝업, 54→전송 시 본 명세서 자동반영 — §25.4.2.2), 고정자산 계정 분개 분기(51/52/54/55/57 + 고정자산 계정), 적요 06/07 트리거(§11.6.2-(2) 부가세 통제 메타).</li>\n<li>P06 SA-VAT-01 신고서 마감 상태머신·수정신고 차수(정기신고 마감 선행), 추가 차가감납부세액 ≥0/&lt;0 분기(§25.11.1) — SA-VAT-27/28의 판정 원천.</li>\n<li>P06 SA-VAT-07 전자신고 파이프라인(제작→검증→제출) — 본 페이즈 서식은 첨부서식으로 전산매체에 수록(§25.11.7 &quot;모든 첨부서식 SA-VAT-03~50&quot; 연계).</li>\n<li>P01 회사등록 본지점설정(본점·총괄납부/사업자단위과세, §25.1.1)·국세환급금계좌·세무대리인 정보, 거래처등록 카드탭 가맹점번호(§25.12.11).</li>\n<li><strong>MVP 연관</strong>: MVP 최우선(P03 전표·P01 계정과목, §22 N13)의 후속 소비처. 카드 VAT 공제 자동 분석(N11, §11.1.1-(16))은 기능 범위 확장을 통제하며 단계적으로 반영하는 항목으로, 본 페이즈 SA-VAT-22 불공제 판정과 연계된다(§22.2 N13).</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">2. 개발 범위</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>화면 ID</th><th>명칭</th><th>차수</th><th>설계서 근거</th></tr></thead><tbody><tr><td>SA-VAT-22</td><td>공제받지못할매입세액명세서</td><td>1차</td><td>§25.13.1</td></tr>\n<tr><td>SA-VAT-23</td><td>건물등감가상각자산취득명세서</td><td>1차</td><td>§25.13.2</td></tr>\n<tr><td>SA-VAT-24</td><td>대손세액공제신고서</td><td>1차</td><td>§25.13.3</td></tr>\n<tr><td>SA-VAT-25</td><td>사업장별 부가세 납부/환급 신고명세</td><td>1차</td><td>§25.13.4</td></tr>\n<tr><td>SA-VAT-26</td><td>사업자단위과세 사업장별 부가세</td><td>1차</td><td>§25.13.5</td></tr>\n<tr><td>SA-VAT-27</td><td>과표수정 및 추가납부계산서(부가세)</td><td>1차</td><td>§25.13.6</td></tr>\n<tr><td>SA-VAT-28</td><td>과표 및 세액 경정청구서(부가세)</td><td>1차</td><td>§25.13.7</td></tr>\n<tr><td>SA-VAT-33</td><td>관세환급금등명세서</td><td>1차</td><td>§25.14.5</td></tr>\n<tr><td>SA-VAT-34</td><td>외국인관광객 면세판매 및 환급명세서</td><td>1차</td><td>§25.14.6</td></tr>\n<tr><td>SA-VAT-16</td><td>면세유류공급명세서(갑)</td><td>2차</td><td>§25.12.8</td></tr>\n<tr><td>SA-VAT-17</td><td>월별판매액합계표</td><td>2차</td><td>§25.12.9</td></tr>\n<tr><td>SA-VAT-18</td><td>농어업기자재 부가세환급신청</td><td>2차</td><td>§25.12.10</td></tr>\n<tr><td>SA-VAT-19</td><td>전자화폐결제명세서</td><td>2차</td><td>§25.12.11</td></tr>\n<tr><td>SA-VAT-20</td><td>전자신고세액공제신청서</td><td>2차</td><td>§25.12.12</td></tr>\n<tr><td>SA-VAT-21</td><td>입국경로 설치된 보세판매장 공급실적명세서</td><td>2차</td><td>§25.12.13</td></tr>\n<tr><td>SA-VAT-35</td><td>외국인관광객 미용성형 의료용역 환급실적명세서</td><td>2차</td><td>§25.14.7</td></tr></tbody></table></div>\n<blockquote>페이즈 경계(00_개요 §1·§5, P06 §2): <strong>SA-VAT-01~15</strong>(주요신고·업종별 1차·동물진료)는 페이즈 06, <strong>SA-VAT-29~32</strong>(수출실적·영세율첨부서류·내국신용장·외화획득)·<strong>36~50</strong>(숙박용역 환급·외교관면세·과세전환·매입자발행·영세율 공급기록표·영세율매출명세서·사업용계좌·간이 납부서 등)은 페이즈 08 담당이므로 본 문서에서 제외한다. SA-VAT-33·34·35는 §25.14(영세율·수출관련서류) 소속이나 개발 차수 배정상 본 페이즈에 포함(00_개요 §5).</blockquote>\n<h3 class=\"doc-h doc-h3\">3. 업무 흐름 (End-to-End)</h3>\n<pre class=\"doc-code\"><code>[P03] 매입매출전표 — 54.불공+불공제사유 / 고정자산 계정 분개 / 12·16 영세 / 21.전자 / 13·18·23 면세\n   │  과세유형·계정·적요 기반 서식 라우팅(§25.4.2.2)\n   ▼\n① 매입세액 통제 서식 작성 (SA-VAT-22/23/24)\n   │  불공제 명세(안분→정산→재계산 3단계 룰엔진) · 고정자산 취득명세(미작성 시 마감 유의사항) · 대손발생/변제\n   ▼\n② [P06] SA-VAT-01 신고서 자동집계 — 50.불공 / 11.고정자산·42.신용카드고정 / 8.대손세액가감·47.변제대손세액 란 연동\n   │  멀티사업장: 본·지점 신고서 → SA-VAT-25(총괄납부) / SA-VAT-26(사업자단위과세) 합산(§11.4)\n   ▼\n③ [P06] 신고서 마감 → MRI(SA-VAT-02) 검사(공통매입세액 안분·대손세액공제·월별판매액 가산세 검토 포함) → 전자신고(SA-VAT-07) 전산매체 수록 → 납부서(SA-VAT-08, 총괄납부 금액 우선 반영)\n   ▼\n④ 사후 신고 분기 (§25.11.1 → §25.13.6~7)\n   │  수정신고서 저장 후 추가 차가감납부세액 ≥0 → SA-VAT-27 과표수정·추가납부계산서\n   │                     추가 차가감납부세액 &lt;0 → SA-VAT-28 과표·세액 경정청구서(국세환급금계좌)\n   ▼\n⑤ (2차) 업종별·환급 부속 서식 (SA-VAT-16~21·33~35) — 계정/거래처/가맹점 설정 → 불러오기 → 보정 → 마감·전산매체</code></pre>\n<ul class=\"doc-list\">\n<li>사업장 차원과 연계한 <strong>사업장별 부가세 신고/사업자단위과세 합산</strong>, 전 신고유형(예정/확정/수정/기한후) + 가산세를 지원한다(§11.4).</li>\n<li>신고서 생성·전자신고 전송은 주기장 측 수행이며, 주기장=OPERATOR는 세무대리 수임 검증 + 이용회사 전송 승인(<code>filingApprovalRequired</code>, 기본 Y — Step-up) 후 전송한다(§11.4, §21.4).</li>\n<li>매입 측 이중공제 방지 규칙: 세금계산서 교부 후 카드로 결제한 건은 세금계산서 기준으로 한 번만 매입세액 공제하고 카드결제는 결제수단으로만 처리한다(§11.1.1-(16) ④) — SA-VAT-22 불공제 판정과 카드 VAT 자동 추천(N11)의 전제.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">3.1 본 페이즈 서식 → SA-VAT-01 신고서 란 매핑 (공통 참조)</h4>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>서식</th><th>원천 전표·데이터</th><th>신고서 반영 란</th><th>근거</th></tr></thead><tbody><tr><td>SA-VAT-22 불공제 명세</td><td>54.불공 + 불공제사유</td><td>16.공제받지못할매입세액 &gt; 50.공제받지못할 매입세액(안분·정산·재계산 포함)</td><td>§25.13.1</td></tr>\n<tr><td>SA-VAT-23 감가상각자산 취득</td><td>51/52/54/55/57 + 고정자산 계정</td><td>고정자산매입(11.고정자산)·42.신용매출전표수취/고정</td><td>§25.13.2</td></tr>\n<tr><td>SA-VAT-24 대손발생</td><td>확정신고 직접입력(공급자)</td><td>8.대손세액가감 — 양수→(-)/음수→(+)</td><td>§25.13.3</td></tr>\n<tr><td>SA-VAT-24 대손변제</td><td>확정신고 직접입력(공급받는자)</td><td>14.그밖의경감·공제 &gt; 47.변제대손세액 — 양수→(+)/음수→(-)</td><td>§25.13.3</td></tr>\n<tr><td>SA-VAT-25 사업장별 명세</td><td>본·지점 신고서 &quot;부가가치세 불러오기&quot;</td><td>총괄납부사업자 납부할세액(환급)란 + SA-VAT-08 총괄납부 금액</td><td>§25.13.4, §25.11.8</td></tr>\n<tr><td>SA-VAT-26 단위과세 명세</td><td>종사업장 신고서 불러오기</td><td>신고서 통합(주된 사업자번호)</td><td>§25.13.5</td></tr>\n<tr><td>SA-VAT-27/28 수정·경정</td><td>수정신고서 저장 데이터</td><td>수정차수 연동(≥0/&lt;0 분기)</td><td>§25.13.6~7, §25.11.1</td></tr>\n<tr><td>SA-VAT-33 관세환급금</td><td>12.영세/16.수출</td><td>영세율 과표(영세율매출명세서 SA-VAT-43[P08] 집계 대상)</td><td>§25.14.5</td></tr>\n<tr><td>SA-VAT-34/35 외국인관광객</td><td>계정과목/거래처 불러오기</td><td>48.외국인관광객환급</td><td>§25.14.6~7</td></tr>\n<tr><td>SA-VAT-16 면세유류</td><td>13.면세/18.카면/23.현면</td><td>면세 부속(신고서 첨부)</td><td>§25.12.8</td></tr>\n<tr><td>SA-VAT-17 월별판매액</td><td>12.영세/16.수출/19.카영/24.현영</td><td>영세율 부속 — 미첨부 시 영세율과세표준불성실 가산세 0.5%</td><td>§25.12.9</td></tr>\n<tr><td>SA-VAT-18 농어업기자재</td><td>51.과세 + 계정 146~175/201~230/801~900</td><td>환급신청(신고서 외 별도 환급 모듈)</td><td>§25.12.10</td></tr>\n<tr><td>SA-VAT-19 전자화폐</td><td>21.전자</td><td>신고서 첨부(전자 결제명세)</td><td>§25.12.11</td></tr>\n<tr><td>SA-VAT-20 전자신고세액공제</td><td>직전과세기간 마감 수임업체</td><td>54.전자신고세액공제(세무대리인)</td><td>§25.12.12</td></tr>\n<tr><td>SA-VAT-21 보세판매장</td><td>12.영세/19.카영/24.현영</td><td>영세율 부속</td><td>§25.12.13</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">4. 화면별 상세설계</h3>\n<h4 class=\"doc-h doc-h4\">4.1 공제받지못할매입세액명세서 <code>SA-VAT-22</code> (1차, §25.13.1)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 매입세액 불공제 대상 내역을 작성하는 부속서류(54.불공 + 불공제사유 자동반영, 직접입력 가능) — BK <strong>공통매입세액 안분·정산·재계산 엔진</strong>으로 생성. 겸영(과세/면세) 공급가액 비율·감가상각자산 체감률 룰엔진, 불공제 사유 코드 카탈로그를 전표 증빙과 연동하고 사업장 차원으로 분기한다.</li>\n<li><strong>진입경로</strong>: TN-09 부가세·신고서류 &gt; 부가가치세 첨부서류(§26.1).</li>\n</ul>\n<p><strong>입력 필드 — ① 공제받지못할매입세액 탭</strong> (§25.13.1)</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>불공제사유 코드</th><th>항목</th><th>원천/입력 방식</th></tr></thead><tbody><tr><td>사유 1</td><td>필요적기재사항 누락</td><td>54.불공 자동집계(사유별)</td></tr>\n<tr><td>사유 2</td><td>사업과 직접관련없는 지출</td><td>〃</td></tr>\n<tr><td>사유 3</td><td>비영업용소형승용차 구입·유지</td><td>〃 (자동분개 시 차량유지비 '여' 설정 → 54.불공[비영업소형승용차] — §25.4.2.2 SA-ATX 전표전송설정)</td></tr>\n<tr><td>사유 9</td><td>접대비 관련 매입세액</td><td>〃 (접대비는 설정 무관 불공 — §25.4.2.2)</td></tr>\n<tr><td>사유 4</td><td>면세사업 관련</td><td>〃</td></tr>\n<tr><td>사유 0</td><td>토지의 자본적지출 관련</td><td>〃</td></tr>\n<tr><td>사유 6</td><td>사업자등록 전 매입세액</td><td>〃</td></tr>\n<tr><td>사유 A/B</td><td>금·구리스크랩 거래계좌 미사용 관련</td><td>〃</td></tr>\n<tr><td>연동분</td><td>공통매입세액 안분/정산/재계산 연동분</td><td>②~④탭 결과 연동 — 세액에 ÷10% 공급가액 자동 산출</td></tr></tbody></table></div>\n<p><strong>입력 필드 — ② 공제매입세액 안분계산 탭(예정신고)</strong> (§25.13.1)</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>입력 방식</th><th>설명·검증</th></tr></thead><tbody><tr><td>계산식</td><td>선택(1~5)</td><td>필수</td><td>1.공급가액 / 2.매입가액 / 3.예정공급가액 / 4.예정사용면적 / 5.도축두수</td></tr>\n<tr><td>과세·면세 공통매입</td><td>금액</td><td>자동</td><td>54.불공 사유5(공통매입) 전표 집계</td></tr>\n<tr><td>총공급가액</td><td>금액</td><td>자동</td><td>계산식 4·5는 직접입력</td></tr>\n<tr><td>면세공급가액</td><td>금액</td><td>자동</td><td>계산식 4·5는 직접입력</td></tr>\n<tr><td>불공제매입세액</td><td>금액</td><td>자동계산</td><td>공통매입세액 × 면세비율</td></tr></tbody></table></div>\n<p><strong>입력 필드 — ③ 공제매입세액 정산 탭(확정신고)</strong> (§25.13.1)</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>입력 방식</th><th>설명</th></tr></thead><tbody><tr><td>정산 기준</td><td>선택</td><td>면세공급가액 / 면세사용면적 기준</td></tr>\n<tr><td>총공통매입세액</td><td>자동</td><td>과세기간 전체 공통매입세액</td></tr>\n<tr><td>면세 확정비율</td><td>자동</td><td>확정 면세공급가액(면적) ÷ 총공급가액(면적)</td></tr>\n<tr><td>불공제매입세액총액</td><td>자동</td><td>총공통매입세액 × 면세확정비율</td></tr>\n<tr><td>기 불공제 매입세액</td><td>직접입력</td><td>예정신고 시 안분 불공제분</td></tr>\n<tr><td>가산 또는 공제되는 매입세액</td><td>자동</td><td>총액 − 기 불공제분</td></tr></tbody></table></div>\n<p><strong>입력 필드 — ④ 납부/환급세액 재계산 탭</strong> (§25.13.1)</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>입력 방식</th><th>설명·검증</th></tr></thead><tbody><tr><td>감가상각자산 구분</td><td>선택</td><td>건물·구축물 / 기타 감가상각자산</td></tr>\n<tr><td>해당재화 매입세액</td><td>자동</td><td>54.불공 사유8 + 계정 20200~25099 설정분</td></tr>\n<tr><td>체감률</td><td>자동</td><td>건축·구축물 5% / 기타 25%</td></tr>\n<tr><td>경과 과세기간수</td><td>자동</td><td>취득 이후 경과 과세기간</td></tr>\n<tr><td>경감률</td><td>자동</td><td>1 − 체감률 × 경과 과세기간수</td></tr>\n<tr><td>면세비율 증감</td><td>자동</td><td>증감 5% 이상인 경우에만 재계산 대상</td></tr>\n<tr><td>가산 또는 공제되는 매입세액</td><td>자동</td><td>매입세액 × 경감률 × 면세비율 증감분</td></tr></tbody></table></div>\n<p><strong>기능·동작</strong> (§25.13.1)</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>기능</th><th>동작</th></tr></thead><tbody><tr><td>3단계 룰엔진</td><td>공통매입세액 안분(예정)·정산(확정)·재계산을 룰엔진으로 자동 계산</td></tr>\n<tr><td>불러오기</td><td>탭별 데이터 유무·계산식 설정에 따라 집계. 예정누락은 공제받지못할매입세액 탭만 허용</td></tr>\n<tr><td>안분 제외</td><td>면세비율 5% 미만 등 안분 제외 요건 처리</td></tr>\n<tr><td>마감 검증</td><td>면세공급가액=0인데 총공급가액≠0이면 오류</td></tr>\n<tr><td>신고일자</td><td>과세기간 종료월 다음달 25일 자동</td></tr>\n<tr><td>카드 불공제 연계</td><td>카드 VAT 공제 자동 추천(N11, §11.1.1-(16)·§23-55): 사업 관련성·적격 증빙·법정 불공제·접대비/식대·차량·면세·개인성 지출(주말·고액·동일 장소/시간 반복) 신호 결합 → 「공제/불공제/검토 필요」 3분류, 검토 필요 건 검토 큐 라우팅. 고객사별 Rule 설정·반복 거래 Rule 보정·증빙 보완 요청 워크플로우(미결항목 18.3)</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>산출물</strong>: 공제받지못할매입세액명세서, 안분·정산·재계산 명세(§25.13.1).</li>\n<li><strong>연계</strong>: 매입매출전표(54.불공+불공제사유, 불공제사유변경 일괄기능 — §25.4.2.2), SA-VAT-01 16.공제받지못할매입세액&gt;50란, MRI(SA-VAT-02) 공통매입세액 안분 검토(§25.11.2).</li>\n<li><strong>권한</strong>: 주기장 측 작성·마감(§11.4). 불공제사유 변경 시 사유(<code>reasonCode</code>)·감사로그(§11.4-(1) 세무구분 변경 규칙 준용).</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.2 건물등감가상각자산취득명세서 <code>SA-VAT-23</code> (1차, §25.13.2)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 사업설비 신설·취득·확장·증축 시 취득내용 부속서류(51.과세/52.영세/54.불공/55.수입/57.카과 + 고정자산 계정 분개분) — 부가세·고정자산 모듈 연계로 생성.</li>\n</ul>\n<p><strong>입력 필드</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>필수</th><th>설명·검증</th></tr></thead><tbody><tr><td>취득일자</td><td>일자</td><td>필수</td><td>전표일자 반영</td></tr>\n<tr><td>상호·사업자등록번호</td><td>텍스트/번호</td><td>필수</td><td>거래처 반영</td></tr>\n<tr><td>자산구분</td><td>선택(1~4)</td><td>필수</td><td>1.건물·구축물 / 2.기계장치 / 3.차량운반구 / 4.기타</td></tr>\n<tr><td>공급가액·세액·건수</td><td>금액/숫자</td><td>자동</td><td>고정자산 계정 분개 전표 집계</td></tr>\n<tr><td>유형</td><td>선택(1~2)</td><td>필수</td><td>1.세금계산서 / 2.신용카드</td></tr></tbody></table></div>\n<p><strong>기능·동작</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>기능</th><th>동작</th></tr></thead><tbody><tr><td>불러오기</td><td>고정자산 구분별 계정 설정 후 전표 집계(51/52/54/55/57 + 고정자산 계정 — 계정 기반 분기 §25.4.2.2)</td></tr>\n<tr><td>구분별보기·편집</td><td>자산구분(건물/기계/차량/기타)별 집계 조회·건별 편집</td></tr>\n<tr><td>미작성 통제</td><td>고정자산매입분 있으면 작성 필요 — 미작성 시 신고서 마감 유의사항 표시</td></tr>\n<tr><td>정합성 검증</td><td>신고서 고정자산란(11.고정자산·42.신용매출전표수취/고정)과 대사</td></tr>\n<tr><td>신고일자</td><td>다음달 25일 자동</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>산출물</strong>: 건물등감가상각자산취득명세서(§25.13.2).</li>\n<li><strong>연계</strong>: 매입매출전표(51/52/54/55/57+고정자산계정), 고정자산 모듈(P08 SA-FA), SA-VAT-01 고정자산매입·42란(§25.13.2).</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.3 대손세액공제신고서 <code>SA-VAT-24</code> (1차, §25.13.3)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 대손·대손변제 발생 시 부속서류(대손발생 탭=공급자, 대손변제 탭=공급받는자, <strong>확정신고 시 직접입력</strong>) — BK 대손세액공제 처리. 대손/변제 부호 규칙·공제 가능기간(10년) 검증, 거래처(채권) 차원 연계.</li>\n</ul>\n<p><strong>입력 필드 — 대손발생 탭(공급자)</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>필수</th><th>설명·검증</th></tr></thead><tbody><tr><td>당초공급일</td><td>일자</td><td>필수</td><td>2022년 1기 확정부터 필수</td></tr>\n<tr><td>대손사유</td><td>선택</td><td>필수</td><td>파산·부도 등</td></tr>\n<tr><td>대손기준일</td><td>일자</td><td>필수</td><td></td></tr>\n<tr><td>대손확정일</td><td>일자</td><td>필수</td><td>부도는 부도발생일부터 6개월 되는 날 자동 산정. 확정일자는 과세기간 내 입력</td></tr>\n<tr><td>대손금액</td><td>금액</td><td>필수</td><td>부호 규칙: 대손발생 양수 / 대손금 회수 음수</td></tr>\n<tr><td>대손세액</td><td>금액</td><td>자동</td><td>대손금액 × 10/110</td></tr>\n<tr><td>거래처</td><td>코드도움</td><td>필수</td><td>거래처(채권) 차원 연계</td></tr></tbody></table></div>\n<p><strong>입력 필드 — 대손변제 탭(공급받는자)</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>필수</th><th>설명·검증</th></tr></thead><tbody><tr><td>당초 대손확정일</td><td>일자</td><td>필수</td><td></td></tr>\n<tr><td>대손변제일</td><td>일자</td><td>필수</td><td></td></tr>\n<tr><td>변제금액</td><td>금액</td><td>필수</td><td>양수/음수 부호 규칙</td></tr>\n<tr><td>변제세액</td><td>금액</td><td>자동</td><td>변제금액 × 10/110</td></tr>\n<tr><td>변제사유</td><td>선택</td><td>필수</td><td></td></tr></tbody></table></div>\n<p><strong>기능·동작</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>기능</th><th>동작</th></tr></thead><tbody><tr><td>공제기간 검증</td><td>공급일로부터 10년 내 과세기간 룰 검증</td></tr>\n<tr><td>세액 자동계산</td><td>10/110 자동계산</td></tr>\n<tr><td>신고서 반영</td><td>대손발생 → 8.대손세액가감(양수→(-)/음수→(+)), 대손변제 → 14.그밖의경감·공제&gt;47.변제대손세액(양수→(+)/음수→(-))</td></tr>\n<tr><td>신고일자</td><td>다음달 25일 자동</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>산출물</strong>: 대손세액공제신고서(대손발생·대손변제)(§25.13.3).</li>\n<li><strong>연계</strong>: 거래처(채권) 차원, SA-VAT-01(확정신고 대손발생분 음수 자동 반영·회수분 양수 직접입력 — §25.11.1), MRI 대손세액공제 검토(§25.11.2), 신고서 52.대손처분받은세액(P06 §4.1).</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.4 사업장별 부가세 납부/환급 신고명세 <code>SA-VAT-25</code> (1차, §25.13.4)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: <strong>총괄납부 승인 사업자</strong>가 주된·종된 사업장 신고내역을 통합 작성하는 부속서류(사업장별부가가치세과세표준및납부(세액)신고서) — BK 멀티사업장(총괄납부) 집계 모듈. 6차원 중 사업장 차원으로 본·지점 격리·합산, 권한(RLS)으로 지점 데이터 접근 제어.</li>\n</ul>\n<p><strong>입력 필드</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>필수</th><th>설명·검증</th></tr></thead><tbody><tr><td>사업장명·주소·사업자등록번호</td><td>코드도움</td><td>필수</td><td>회사등록 본지점설정 코드도움(P01, §25.1.1)</td></tr>\n<tr><td>총괄납부번호</td><td>번호</td><td>필수</td><td>총괄납부 승인번호</td></tr>\n<tr><td>매출세액(과표·세율·세액)</td><td>금액</td><td>자동</td><td>&quot;부가가치세 불러오기&quot;로 본·지점 신고서(SA-VAT-01) 반영</td></tr>\n<tr><td>매입세액(과표·세율·세액)</td><td>금액</td><td>자동</td><td>〃</td></tr>\n<tr><td>가산세</td><td>금액</td><td>직접입력</td><td></td></tr>\n<tr><td>공제세액</td><td>금액</td><td>직접입력</td><td></td></tr>\n<tr><td>대손세액공제·예정신고미환급·예정고지세액</td><td>금액</td><td>직접 조정</td><td><strong>불러오기 불가</strong> → 직접 조정</td></tr></tbody></table></div>\n<p><strong>기능·동작</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>기능</th><th>동작</th></tr></thead><tbody><tr><td>본·지점 합산</td><td>본·지점 신고서를 사업장 차원으로 격리·합산(§11.4 사업장별 신고/합산)</td></tr>\n<tr><td>권한</td><td>본지점설정(본점·총괄납부) 및 지점회사 권한 필요 — 사업장 차원 RLS</td></tr>\n<tr><td>사업장 불러오기</td><td>기존 데이터 삭제 후 재반영</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>산출물</strong>: 사업장별 부가세 납부/환급 신고명세(§25.13.4).</li>\n<li><strong>연계</strong>: SA-VAT-01 총괄납부사업자 납부할세액(환급)란, SA-VAT-08 납부서(총괄납부 금액 있으면 우선 반영 — §25.11.8), 회사등록 본지점설정. SA-VAT-07 총괄납부 본·지점 제작 권한(§25.11.7).</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.5 사업자단위과세 사업장별 부가세 <code>SA-VAT-26</code> (1차, §25.13.5)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: <strong>사업자단위과세 승인 사업자</strong>(주된 사업장 외 사업자번호 말소, 주된 번호로 발급·수취) 부속서류 — BK 멀티사업장(사업자단위과세) 집계 모듈. 단일 사업자번호 하의 종사업장 일련번호를 사업장 차원으로 관리.</li>\n</ul>\n<p><strong>입력 필드</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>필수</th><th>설명·검증</th></tr></thead><tbody><tr><td>사업장명·주소</td><td>코드도움</td><td>필수</td><td>본지점설정 코드도움</td></tr>\n<tr><td>적용번호</td><td>번호</td><td>자동</td><td>종사업장번호 자동, 없으면 <strong>0000</strong></td></tr>\n<tr><td>매출·매입세액(과표·세액)</td><td>금액</td><td>자동</td><td>&quot;부가가치세 불러오기&quot;</td></tr>\n<tr><td>가산세·공제세액</td><td>금액</td><td>직접입력</td><td></td></tr>\n<tr><td>대손·예정미환급·예정고지</td><td>금액</td><td>직접 조정</td><td>불러오기 불가</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: 종사업장 일련번호 사업장 차원 관리·합산, 본지점설정(본점·사업자단위과세) 및 지점 권한 필요, 사업장 불러오기·부가세신고서 불러오기(§25.13.5).</li>\n<li><strong>산출물</strong>: 사업자단위과세 사업장별 부가세 명세.</li>\n<li><strong>연계</strong>: SA-VAT-01 통합(주된 사업자번호 단위 신고 — §11.4 사업자단위과세 합산), 회사등록 본지점설정.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.6 과표수정 및 추가납부계산서(부가세) <code>SA-VAT-27</code> (1차, §25.13.6)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 부가세 <strong>수정신고 시 추가납부가 있는 경우</strong> 첨부 서식(수정신고서 저장 필요) — BK 전자신고 파이프라인의 수정신고 부속서식. 차수 관리·당초/수정 데이터 비교를 신고 이력 모델로 구현.</li>\n</ul>\n<p><strong>입력 필드</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>필수</th><th>설명·검증</th></tr></thead><tbody><tr><td>기간·수정차수</td><td>F2 코드도움</td><td>필수</td><td>SA-VAT-01 수정신고 차수 연동(정기신고 마감 선행 — §25.11.1)</td></tr>\n<tr><td>신고인정보</td><td>자동</td><td>—</td><td>회사등록 자동 반영·<strong>수정불가</strong></td></tr>\n<tr><td>신고내용</td><td>자동+직접</td><td>필수</td><td>수정신고서 데이터 자동, 수정사유 직접입력</td></tr>\n<tr><td>법정신고일·최초신고일</td><td>일자</td><td>자동</td><td>신고마감일이 휴일이면 법정신고일 다음날 입력</td></tr>\n<tr><td>위임장정보</td><td>자동</td><td>조건부</td><td>세무대리인 설정 시</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: 추가 차가감납부세액 <strong>≥0 수정신고 판정</strong>, 수정차수 관리·당초/수정 데이터 비교(§25.13.6).</li>\n<li><strong>산출물</strong>: 과표수정 및 추가납부계산서.</li>\n<li><strong>연계</strong>: SA-VAT-01 수정차수, SA-VAT-07 전자신고, 회사등록 신고인정보. 가산세는 신고서 가산세액계 직접입력(§25.11.1)과 정합.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.7 과표 및 세액 경정청구서(부가세) <code>SA-VAT-28</code> (1차, §25.13.7)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 부가세 수정신고 시 <strong>환급세액이 발생한 경우</strong> 작성하는 부속서류(수정신고서 저장 필요) — BK 전자신고 파이프라인의 경정청구 부속서식. 환급세액 발생 판정·청구이유 코드 검증을 신고 이력 모델로 구현.</li>\n</ul>\n<p><strong>입력 필드</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>필수</th><th>설명·검증</th></tr></thead><tbody><tr><td>기간·수정차수</td><td>F2 코드도움</td><td>필수</td><td></td></tr>\n<tr><td>신고인정보</td><td>자동</td><td>—</td><td>자동 반영·수정불가</td></tr>\n<tr><td>경정청구이유 1/2</td><td>선택</td><td>필수</td><td><strong>중복 선택 금지(전자신고 오류)</strong></td></tr>\n<tr><td>국세환급금계좌신고</td><td>계좌</td><td>필수</td><td>계좌 변경은 회사등록 수정 후 불러오기</td></tr>\n<tr><td>위임장정보</td><td>자동</td><td>조건부</td><td>세무대리인 설정 시</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: 추가 차가감납부세액 <strong>&lt;0 경정청구 판정</strong>, 경정청구이유 1/2 중복 선택 금지 검증(§25.13.7).</li>\n<li><strong>산출물</strong>: 과표 및 세액 경정청구서.</li>\n<li><strong>연계</strong>: SA-VAT-01 수정차수, SA-VAT-07 전자신고, 회사등록 국세환급금계좌(P01 §25.1.1).</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.8 관세환급금등명세서 <code>SA-VAT-33</code> (1차, §25.14.5)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 수출재화 공급사업자가 내국신용장 미포함 관세환급금을 <strong>영세율 매출로 신고</strong>할 때 제출하는 서류 — BK 영세율 부속서식. 관세환급금·내국신용장번호 메타·영세 전표 집계.</li>\n</ul>\n<p><strong>입력 필드</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>필수</th><th>설명·검증</th></tr></thead><tbody><tr><td>공급일자</td><td>일자</td><td>필수</td><td></td></tr>\n<tr><td>환급금액</td><td>금액</td><td>필수</td><td></td></tr>\n<tr><td>공급받는자(상호·사업자등록번호)</td><td>텍스트/번호</td><td>필수</td><td></td></tr>\n<tr><td>내국신용장번호</td><td>번호</td><td>필수</td><td><strong>전자신고 필수 항목</strong></td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: 불러오기(과세유형 12.영세/16.수출·거래처 설정), 엑셀 업로드, 관세환급금·내국신용장번호 메타 관리(§25.14.5).</li>\n<li><strong>산출물</strong>: 관세환급금등명세서.</li>\n<li><strong>연계</strong>: 매입매출전표(12/16 영세계열), SA-VAT-01, 영세율매출명세서 SA-VAT-43(P08 — 관세환급금 집계 대상, §25.14 영세율매출명세서 연계).</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.9 외국인관광객 면세판매 및 환급명세서 <code>SA-VAT-34</code> (1차, §25.14.6)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 외국인관광객 물품판매 영세율 면세사업자 부속서류 — BK 영세율·환급 부속서식. 면세판매장·구매일련번호·세관 반출 메타를 증빙으로 관리.</li>\n</ul>\n<p><strong>입력 필드</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>필수</th><th>설명·검증</th></tr></thead><tbody><tr><td>종사업장번호 / 면세판매장지정번호</td><td>번호</td><td>필수</td><td></td></tr>\n<tr><td>구매일련번호</td><td>번호(20자리)</td><td>필수</td><td></td></tr>\n<tr><td>판매일자</td><td>일자</td><td>필수</td><td></td></tr>\n<tr><td>반출일자·반출승인번호</td><td>일자/번호</td><td>필수</td><td>세관장 승인</td></tr>\n<tr><td>환급(송금)일자·환급액</td><td>일자/금액</td><td>필수</td><td>환급창구운영사업자</td></tr>\n<tr><td>판매금액 / 부가가치세 / 개별소비세 / 교육세 / 농어촌특별세</td><td>금액</td><td>필수</td><td>세목별 집계</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: 불러오기(계정과목 설정), 엑셀, 세목별(부가세·개소세·교육세·농특세) 집계(§25.14.6).</li>\n<li><strong>산출물</strong>: 외국인관광객 면세판매 및 환급명세서.</li>\n<li><strong>연계</strong>: SA-VAT-01 48.외국인관광객환급(그밖의공제세액 — P06 §4.1), 매입매출전표.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.10 면세유류공급명세서(갑) <code>SA-VAT-16</code> (2차, §25.12.8)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 농업·임업에 공급한 면세유가 있는 경우 작성하는 부속서류(관리용·신고용). 유종별 계정 매핑과 농·임업 업종구분을 차원·증빙으로 관리.</li>\n</ul>\n<p><strong>입력 필드·조회조건</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>설명</th></tr></thead><tbody><tr><td>유종 구분</td><td>선택(5구분)</td><td>휘발유 / 경유 / 등유 / 중유 / LPG — 유종별 계정과목 설정 후 불러오기</td></tr>\n<tr><td>불러오기 대상</td><td>자동</td><td>매출유형 13.면세 / 18.카면 / 23.현면</td></tr>\n<tr><td>업종구분</td><td>선택</td><td>농업용 / 임업용</td></tr>\n<tr><td>데이터정렬·원장조회·주민번호 별표</td><td>기능</td><td>주민번호 마스킹(00_개요 §3)</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: 면세 전표 집계, 원장조회 연계(§25.12.8).</li>\n<li><strong>산출물</strong>: 면세유류공급명세서(갑). <strong>연계</strong>: 매입매출전표(13/18/23 면세계열), SA-VAT-01.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.11 월별판매액합계표 <code>SA-VAT-17</code> (2차, §25.12.9)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 영세율 적용 농·축·임·어업용 기자재 및 장애인 보장구 매출 부속서류 — <strong>미첨부 시 영세율과세표준불성실 가산세 0.5%</strong>. BK 영세율 부속서식.</li>\n</ul>\n<p><strong>입력 필드·조회조건</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>설명</th></tr></thead><tbody><tr><td>탭</td><td>2종</td><td>장애인보장구 / 농축임업용 — 탭별 자동 분류</td></tr>\n<tr><td>계정코드 설정</td><td>코드도움</td><td>설정 후 불러오기</td></tr>\n<tr><td>불러오기 대상</td><td>자동</td><td>매출유형 12.영세 / 16.수출 / 19.카영 / 24.현영</td></tr>\n<tr><td>데이터정렬·주민번호 별표</td><td>기능</td><td></td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: 영세 매출 계정 집계, <strong>미제출 가산세(0.5%) 룰을 MRI 검증 항목으로 연계</strong>(§25.12.9).</li>\n<li><strong>산출물</strong>: 월별판매액합계표. <strong>연계</strong>: 매입매출전표(12/16/19/24 영세계열), SA-VAT-01, MRI(SA-VAT-02) 가산세 검증.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.12 농어업기자재 부가세환급신청 <code>SA-VAT-18</code> (2차, §25.12.10)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 농어민기자재 관련 농·수협·엽연초생산협동조합 및 직접 환급신청 사업자 부속서류(개인은 조합 대행) — BK 부가세 환급 모듈.</li>\n</ul>\n<p><strong>입력 필드·조회조건</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>필수</th><th>설명·검증</th></tr></thead><tbody><tr><td>탭</td><td>2종</td><td>—</td><td>환급신청내용 / 매입세금계산서</td></tr>\n<tr><td>환급금 계좌정보</td><td>계좌</td><td>필수</td><td>회사등록 국세환급금계좌(P01)</td></tr>\n<tr><td>불러오기 계정</td><td>코드도움</td><td>필수</td><td>계정 146~175 / 201~230 / 801~900, 유형 51.과세</td></tr>\n<tr><td>직접대행구분코드</td><td>선택</td><td>필수</td><td>0.직접신청 / 1.환급대행</td></tr>\n<tr><td>수량</td><td>숫자</td><td>필수</td><td><strong>마감 시 수량 필수</strong></td></tr>\n<tr><td>사업자/주민번호</td><td>번호</td><td>필수</td><td>미입력 시 마감 불가</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: 환급계좌·기자재 매입 집계와 직접/대행 구분, 전산매체 제작. 마감 후 <strong>수정불가</strong>, 작성조회(§25.12.10).</li>\n<li><strong>산출물</strong>: 농·임·어업용기자재 부가가치세환급신청서/환급대행신청서, 전산매체(매입세금계산서 수록).</li>\n<li><strong>연계</strong>: 매입매출전표(51.과세), SA-VAT-01, 회사등록 국세환급금계좌.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.13 전자화폐결제명세서 <code>SA-VAT-19</code> (2차, §25.12.11)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 전자화폐 결제명세 부속서류(21.전자 전표, <strong>거래처등록 카드탭 가맹점번호 필수</strong>) — 전자결제 가맹점·결제처리번호 메타를 카드·결제 연계 테이블로 관리.</li>\n</ul>\n<p><strong>입력 필드</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>필수</th><th>설명·검증</th></tr></thead><tbody><tr><td>가맹점번호</td><td>번호</td><td>필수</td><td>거래처등록 카드탭(P01)</td></tr>\n<tr><td>발행회사</td><td>코드도움</td><td>필수</td><td>신용카드사</td></tr>\n<tr><td>구매자</td><td>코드도움</td><td>필수</td><td>거래처</td></tr>\n<tr><td>결제일자</td><td>일자</td><td>필수</td><td>작성일자</td></tr>\n<tr><td>전자결제금액</td><td>금액</td><td>필수</td><td>공급대가</td></tr>\n<tr><td>결제처리번호</td><td>번호</td><td>필수</td><td><strong>전자신고 필수 항목</strong></td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: 21.전자 전표 집계, 불러오기(전체 또는 선택 가맹점)(§25.12.11).</li>\n<li><strong>산출물</strong>: 전자화폐결제명세서. <strong>연계</strong>: 매입매출전표(21.전자), 거래처등록 카드탭, SA-VAT-01.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.14 전자신고세액공제신청서 <code>SA-VAT-20</code> (2차, §25.12.12)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 세무대리인이 수임업체 대리신고 시 전자신고 세액공제를 받기 위한 부속서류(세무대리인업종 신고 시 첨부) — BK 전자신고 파이프라인의 세무대리인 공제 산정. <strong>수임업체 집계·한도 검증을 멀티테넌트(세무대리인↔수임 사업자) 관계로 구현</strong>.</li>\n</ul>\n<p><strong>입력 필드</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>입력 방식</th><th>설명·검증</th></tr></thead><tbody><tr><td>공제세액</td><td>금액</td><td>자동</td><td>직전과세기간 마감 수임업체 건수 × 1만원</td></tr>\n<tr><td>세무대리인정보</td><td>자동</td><td>—</td><td>회사등록 반영</td></tr>\n<tr><td>불러오기</td><td>기능</td><td>—</td><td>직전과세기간 마감 확정신고서 중 세무대리인 정보 입력분</td></tr>\n<tr><td>공제한도</td><td>금액</td><td>자동 검증</td><td>개인 300만원 / 세무회계법인 750만원</td></tr>\n<tr><td>엑셀</td><td>기능</td><td>—</td><td></td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: 수임업체 건수 집계(×1만원)·한도 검증, 직전과세기간 마감분 불러오기(§25.12.12).</li>\n<li><strong>산출물</strong>: 전자신고세액공제신청서.</li>\n<li><strong>연계</strong>: SA-VAT-07 전자신고(P06 — 제출자등록 세무대리인 구분), SA-VAT-01 54.전자신고세액공제(일반업체 확정·직접신고 1만원과 구분 — §25.11.1·7), 회사등록 세무대리인 정보.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.15 입국경로 설치된 보세판매장 공급실적명세서 <code>SA-VAT-21</code> (2차, §25.12.13)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 입국장면세점에 물품을 공급하는 사업자가 보세판매장 운영자 확인을 받아 제출하는 서식 — BK 영세율 부속서식. 공급처(보세판매장)·계정 매핑·영세 전표 집계.</li>\n</ul>\n<p><strong>입력 필드·조회조건</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>설명</th></tr></thead><tbody><tr><td>계정과목·공급처 설정</td><td>코드도움</td><td>설정 후 불러오기</td></tr>\n<tr><td>불러오기 대상</td><td>자동</td><td>유형 12.영세 / 19.카영 / 24.현영</td></tr>\n<tr><td>전표 불러오기 조건</td><td>선택</td><td>전체 삭제 / 불러온 데이터만 삭제</td></tr>\n<tr><td>작성조회·일괄삭제</td><td>기능</td><td></td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: 불러오기 조건별 삭제 처리, 영세 전표 집계(§25.12.13).</li>\n<li><strong>산출물</strong>: 입국장 보세판매장 공급실적명세서. <strong>연계</strong>: 매입매출전표(12/19/24 영세계열), SA-VAT-01.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.16 외국인관광객 미용성형 의료용역 환급실적명세서 <code>SA-VAT-35</code> (2차, §25.14.7)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 외국인관광객 미용성형 의료용역 공급 의료기관이 부가세액 공제를 위해 작성하는 부속서류 — BK 부가세 환급 부속서식. 환급창구운영사업자·의료용역 일련번호·환자 메타를 증빙으로 관리.</li>\n</ul>\n<p><strong>입력 필드</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>필수</th><th>설명·검증</th></tr></thead><tbody><tr><td>종사업장번호 / 환급창구운영사업자</td><td>번호/코드도움</td><td>필수</td><td>거래처등록 반영</td></tr>\n<tr><td>유치기관등록번호</td><td>번호</td><td>필수</td><td></td></tr>\n<tr><td>의료용역일련번호</td><td>번호(20자리)</td><td>자동</td><td>불러오기 시 1부터 순차 부여</td></tr>\n<tr><td>공급일자</td><td>일자</td><td>필수</td><td>의료용역공급확인서 기준</td></tr>\n<tr><td>환급/송금일자·증명서 송부일자</td><td>일자</td><td>필수</td><td></td></tr>\n<tr><td>공급금액(세금포함)·부가가치세·환급액</td><td>금액</td><td>필수</td><td></td></tr>\n<tr><td>외국인환자 인적사항</td><td>텍스트</td><td>필수</td><td>개인정보 마스킹 대상(00_개요 §3)</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: 거래처별 환급창구사업자 불러오기, 엑셀(§25.14.7).</li>\n<li><strong>산출물</strong>: 외국인관광객 미용성형 의료용역 환급실적명세서.</li>\n<li><strong>연계</strong>: 거래처등록(환급창구운영사업자), SA-VAT-01 48.외국인관광객환급.</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">5. 데이터 모델</h3>\n<blockquote>엔티티 명칭 중 § 근거 표기가 있는 필드·상태는 설계서 명시값이며, 부속서류 헤더 등 구조 명칭은 §25.12~25.14의 화면 기능(작성조회·마감·불러오기)을 본 페이즈에서 구체화한 것이다. <code>VatReturn</code>·<code>VatAttachmentForm</code>·<code>ElectronicFilingJob</code> 등 공통 헤더는 P06 §5를 공유한다.</blockquote>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>엔티티</th><th>핵심 필드</th><th>PK/유니크·상태</th><th>근거</th></tr></thead><tbody><tr><td><code>NonDeductibleEntry</code>(불공제 명세)</td><td>attachmentId, reasonCode(사유 1/2/3/9/4/0/6/A/B), vendorRef, supplyAmount, vatAmount, sourceType(전표자동/직접입력/안분연동 — 세액÷10% 공급가액 자동)</td><td>예정누락은 명세 탭만</td><td>§25.13.1</td></tr>\n<tr><td><code>CommonInputTaxCalc</code>(공통매입 안분/정산/재계산)</td><td>calcType(안분/정산/재계산), formulaType(1.공급가액/2.매입가액/3.예정공급가액/4.예정사용면적/5.도축두수), totalSupply, exemptSupply, exemptRatio, commonInputTax, nonDeductibleTax, priorNonDeductible(직접), adjustTax(가산/공제), assetClass(건축구축물/기타), decliningRate(5%/25%), elapsedPeriods, reductionRate, exemptRatioChange(≥5%)</td><td>면세공급가액=0 &amp; 총공급가액≠0 마감 오류</td><td>§25.13.1</td></tr>\n<tr><td><code>FixedAssetAcqEntry</code>(감가상각자산 취득)</td><td>취득일자, 상호, 사업자번호, assetClass(1~4), supplyAmount, vatAmount, count, docType(1.세금계산서/2.신용카드)</td><td>신고서 고정자산란 대사</td><td>§25.13.2</td></tr>\n<tr><td><code>BadDebtEntry</code>(대손세액)</td><td>tabType(발생/변제), 당초공급일(2022-1기~ 필수), 대손사유/변제사유, 대손기준일, 대손확정일(부도+6개월 자동), 금액(부호 규칙), 세액(×10/110 자동), vendorId</td><td>공급일+10년 내 과세기간 검증</td><td>§25.13.3</td></tr>\n<tr><td><code>BranchVatStatement</code>(사업장별/단위과세 명세)</td><td>stmtType(총괄납부/사업자단위과세), businessPlaceId, 사업자등록번호/적용번호(종사업장 자동·0000), 총괄납부번호, 매출·매입 과표/세율/세액(불러오기), 가산세·공제세액(직접), 대손·미환급·고지(직접 조정)</td><td>사업장 불러오기 시 기존 삭제. 사업장 차원 RLS</td><td>§25.13.4~5</td></tr>\n<tr><td><code>AmendedFilingForm</code>(수정·경정 서식)</td><td>returnId, amendmentSeq, formType(추가납부계산서/경정청구서), 신고인정보(자동·수정불가), 수정사유, 법정/최초신고일(자동, 휴일 시 익일), 경정청구이유1/2(중복 금지), 국세환급금계좌, 위임장정보</td><td>≥0 수정신고 / &lt;0 경정청구 판정</td><td>§25.13.6~7</td></tr>\n<tr><td><code>CustomsRefundEntry</code>(관세환급금)</td><td>공급일자, 환급금액, 공급받는자(상호·사업자번호), 내국신용장번호(전자신고 필수)</td><td>12/16 거래처 설정 불러오기</td><td>§25.14.5</td></tr>\n<tr><td><code>TouristRefundEntry</code>(외국인관광객 면세판매/의료용역)</td><td>entryType(면세판매/미용성형), 종사업장번호, 면세판매장지정번호/환급창구운영사업자, 구매일련번호/의료용역일련번호(20자리·순차), 판매/공급일자, 반출일자·반출승인번호, 환급(송금)일자·환급액, 세목별 금액(부가세·개소세·교육세·농특세), 유치기관등록번호, 환자 인적사항</td><td>일련번호 순차 부여</td><td>§25.14.6~7</td></tr>\n<tr><td><code>DutyFreeOilEntry</code>(면세유류)</td><td>유종(휘발유/경유/등유/중유/LPG), 업종구분(농업/임업), 계정매핑, 집계금액</td><td>13/18/23 집계</td><td>§25.12.8</td></tr>\n<tr><td><code>MonthlySalesEntry</code>(월별판매액)</td><td>tabType(장애인보장구/농축임업용), 계정코드, 월별 판매액</td><td>미첨부 가산세 0.5% MRI 룰</td><td>§25.12.9</td></tr>\n<tr><td><code>AgriRefundClaim</code>(농어업기자재 환급)</td><td>탭(환급신청내용/매입세금계산서), 환급계좌, 직접대행구분(0/1), 수량(마감 필수), 사업자/주민번호(마감 필수)</td><td>마감 후 수정불가</td><td>§25.12.10</td></tr>\n<tr><td><code>EMoneyEntry</code>(전자화폐)</td><td>가맹점번호(거래처 카드탭), 발행회사, 구매자, 결제일자, 결제금액(공급대가), 결제처리번호(전자신고 필수)</td><td>21.전자 집계</td><td>§25.12.11</td></tr>\n<tr><td><code>EFilingCreditClaim</code>(전자신고세액공제)</td><td>수임업체 건수, 공제세액(건수×1만원), 한도(개인 300만/법인 750만), 세무대리인정보</td><td>직전과세기간 마감분 집계(멀티테넌트 관계)</td><td>§25.12.12</td></tr>\n<tr><td><code>BondedShopSupplyEntry</code>(보세판매장)</td><td>공급처(보세판매장), 계정매핑, 집계금액</td><td>12/19/24 집계, 조건별 삭제</td><td>§25.12.13</td></tr>\n<tr><td><code>CardVatRule</code>(카드 VAT 공제 룰, N11)</td><td>tenantId, 판정 신호(사업 관련성·적격 증빙·법정 불공제·접대비/식대·차량·면세·개인성 지출), 분류(공제/불공제/검토필요), 고객사별 Rule·반복 거래 보정</td><td>검토 필요 건 검토 큐, 증빙 보완 요청 워크플로우(18.3)</td><td>§11.1.1-(16)</td></tr>\n<tr><td><code>PurchaseLedgerLine</code>(매입원장 — P06 공유)</td><td>taxCategory, reasonCode(사유구분), deductibleType, ntsStatus, evidenceStatus</td><td>불공제/면세/영세율 <strong>사유 필수</strong> 검증</td><td>§11.4-(1)</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>매입 세무구분·사유구분·전송상태·증빙상태 코드는 공통 표준 <code>STD_PURCHASE_TAX_STATUS</code> 카탈로그 버전으로 배포(§6 표 — 11.4 연계).</li>\n<li>테이블 공통 제약(tenant_id NOT NULL+RLS, 감사 필드, 물리 삭제 금지)은 00_개요 §3.</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">6. API 설계</h3>\n<blockquote>P06 §6의 부속서류 공통 API(<code>/attachments/{formType}/load</code>·<code>/close</code>)를 재사용하고, 본 페이즈 특화 리소스만 추가한다. 엔드포인트는 §25.13~25.14의 화면 기능(불러오기·마감·수정차수·정산 계산)을 REST로 구체화한 대표 설계다(§13.1 공통 인터셉터 준용).</blockquote>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>메서드</th><th>엔드포인트</th><th>설명</th><th>멱등성·오류</th></tr></thead><tbody><tr><td>POST</td><td><code>/api/tenant/vat/attachments/{formType}/load</code></td><td>부속서류 불러오기(계정/거래처/가맹점 설정 기반, 기존 삭제 후 재집계 또는 조건별 삭제 — SA-VAT-21)</td><td>Idempotency-Key</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/attachments/{formType}/close</code></td><td>부속서류 마감(SA-VAT-18: 수량·사업자/주민번호 필수, 마감 후 수정불가)</td><td><code>VALIDATION_FAILED</code></td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/non-deductible/{id}/apportion</code></td><td>공통매입세액 안분 계산(계산식 1~5, 예정)</td><td>자동계산 결과 반환</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/non-deductible/{id}/settle</code></td><td>공통매입세액 정산(확정 — 면세확정비율·기 불공제 차감)</td><td>〃</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/non-deductible/{id}/recalculate</code></td><td>납부/환급세액 재계산(체감률 5%/25%·경과 과세기간·면세비율 증감 ≥5%)</td><td>〃</td></tr>\n<tr><td>GET</td><td><code>/api/tenant/vat/bad-debts?period&amp;tabType</code></td><td>대손발생/변제 명세 조회</td><td>—</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/bad-debts</code></td><td>대손 건 등록(10/110 자동, 10년 기간·부호 규칙 검증)</td><td><code>VALIDATION_FAILED</code></td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/branch-statements/{type}/load</code></td><td>사업장별/단위과세 &quot;부가가치세 불러오기&quot;(본·지점 신고서 반영, 기존 삭제)</td><td>Idempotency-Key, 지점 권한 <code>FORBIDDEN_SCOPE</code></td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/returns/{id}/amend-forms</code></td><td>수정차수 연동 서식 생성(≥0 → 추가납부계산서 / &lt;0 → 경정청구서 자동 분기)</td><td>수정신고서 저장 선행 검증</td></tr>\n<tr><td>PUT</td><td><code>/api/tenant/vat/amend-forms/{id}</code></td><td>수정사유·경정청구이유·환급계좌 보정(이유 1/2 중복 차단)</td><td>version 낙관적 락</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/card-rules/evaluate</code></td><td>카드 VAT 공제/불공제/검토필요 자동 판정(N11)</td><td>검토 큐 라우팅, reason code 필수</td></tr>\n<tr><td>PUT</td><td><code>/api/tenant/vat/card-rules</code></td><td>고객사별 Rule 설정·반복 거래 보정</td><td><code>VALIDATION_FAILED</code></td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/efiling-credit/load</code></td><td>수임업체 건수 집계(직전과세기간 마감분 × 1만원, 한도 검증)</td><td>한도 초과 시 경고</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/attachments/{formType}/excel-import</code></td><td>엑셀 업로드(SA-VAT-33/34/35/20 등)</td><td>오류행 리포트</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>오류코드</strong>(§13.3): <code>VALIDATION_FAILED</code>, <code>CLOSING_LOCKED</code>(마감 후 수정), <code>PERIOD_LOCKED</code>, <code>NOT_PRIMARY_BOOKKEEPER</code>, <code>FORBIDDEN_SCOPE</code>(지점 권한 없음), <code>IDEMPOTENCY_CONFLICT</code>(409), <code>EXTERNAL_INTEGRATION_FAILED</code>.</li>\n<li><strong>Scope</strong>(§13.3): 전자신고 수록·마감은 위험 scope로 Step-up, 지점 데이터는 사업장 차원 RLS로 접근 제어(§25.13.4).</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">7. 배치 / 스케줄</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>배치</th><th>주기·트리거</th><th>내용</th><th>실패 처리</th><th>근거</th></tr></thead><tbody><tr><td>신고 집계 잡</td><td>신고기 월 정기/수동</td><td>불공제·고정자산·영세/면세 계열 부속서류 집계 뷰 갱신(P06 공유)</td><td>멱등·재처리·실패 알림</td><td>§14 회사 배치</td></tr>\n<tr><td>매입원장 세무상태/NTS 대사 잡</td><td>주기적</td><td><code>taxCategory</code>·<code>reasonCode</code>(불공제 사유) ↔ 홈택스 수신 결과 대사</td><td><code>REVIEW_REQUIRED</code> 승격</td><td>§14, §11.4-(1)</td></tr>\n<tr><td>카드 VAT 야간 스코어링</td><td>야간 전수</td><td>카드 건 공제/불공제/검토필요 재평가(이상거래 야간 전수 스코어링 잡과 동일 계열) — 검토 큐 알림 생성</td><td>멱등·알림</td><td>§14, §11.1.1-(16)</td></tr>\n<tr><td>신고기한 알림(D-N) 잡</td><td>D-N 규칙</td><td>확정신고 부속서류(대손·정산·경정청구 기한 등) 기한 알림 — 기한 알림(D-N) 발송 잡 공용</td><td>DLQ+운영 콘솔</td><td>§14, §18</td></tr>\n<tr><td>확인(Ack) 리마인드 잡</td><td>D+3/D+7</td><td>수정신고·경정청구 승인 <code>PENDING</code> 리마인드·장기 미확인 에스컬레이션</td><td>에스컬레이션</td><td>§14 기장 운영 배치</td></tr>\n<tr><td>휴폐업 상태 갱신</td><td>매주 월요일</td><td>거래처 휴폐업조회 갱신(P06 공유 — 대손 거래처·공급받는자 검증 지원)</td><td>재시도</td><td>§25.11.3, §11.4</td></tr>\n<tr><td>전산매체 수록 작업큐</td><td>이벤트</td><td>마감된 본 페이즈 서식을 SA-VAT-07 전산매체 제작에 수록(첨부서식 SA-VAT-03~50)</td><td>제작오류 상태·재처리</td><td>§25.11.7, §14</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">8. 검증·오류 처리</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>검증 항목</th><th>차단/경고</th><th>근거</th></tr></thead><tbody><tr><td>1</td><td>SA-VAT-22 마감 시 면세공급가액=0 &amp; 총공급가액≠0</td><td>차단(마감 오류)</td><td>§25.13.1</td></tr>\n<tr><td>2</td><td>안분 제외 요건(면세비율 5% 미만 등)</td><td>안분 대상 제외 처리</td><td>§25.13.1</td></tr>\n<tr><td>3</td><td>예정누락 입력 — 공제받지못할매입세액 탭 외</td><td>차단(명세 탭만 허용)</td><td>§25.13.1</td></tr>\n<tr><td>4</td><td>재계산 대상 판정 — 면세비율 증감 5% 미만</td><td>재계산 제외</td><td>§25.13.1</td></tr>\n<tr><td>5</td><td>고정자산매입분 존재 + SA-VAT-23 미작성</td><td>경고(신고서 마감 유의사항)</td><td>§25.13.2</td></tr>\n<tr><td>6</td><td>SA-VAT-23 ↔ 신고서 고정자산란 불일치</td><td>경고(정합성 검증)</td><td>§25.13.2</td></tr>\n<tr><td>7</td><td>대손 공제기간(공급일로부터 10년 내 과세기간) 초과</td><td>차단</td><td>§25.13.3</td></tr>\n<tr><td>8</td><td>대손확정일 과세기간 외 입력</td><td>차단(과세기간 내 입력)</td><td>§25.13.3</td></tr>\n<tr><td>9</td><td>대손/변제 부호 규칙 위반(발생 양수/회수 음수 등)</td><td>차단</td><td>§25.13.3</td></tr>\n<tr><td>10</td><td>당초공급일 누락(2022년 1기 확정 이후)</td><td>차단(필수)</td><td>§25.13.3</td></tr>\n<tr><td>11</td><td>본지점설정·지점회사 권한 없는 사업장별 명세 작성</td><td>차단(<code>FORBIDDEN_SCOPE</code>)</td><td>§25.13.4~5</td></tr>\n<tr><td>12</td><td>대손·예정미환급·예정고지 불러오기 시도</td><td>차단(직접 조정만 허용)</td><td>§25.13.4~5</td></tr>\n<tr><td>13</td><td>수정신고서 미저장 상태 SA-VAT-27/28 작성</td><td>차단(수정신고서 저장 필요)</td><td>§25.13.6~7</td></tr>\n<tr><td>14</td><td>신고인정보 수정 시도</td><td>차단(회사등록 자동·수정불가)</td><td>§25.13.6~7</td></tr>\n<tr><td>15</td><td>경정청구이유 1/2 중복 선택</td><td>차단(전자신고 오류)</td><td>§25.13.7</td></tr>\n<tr><td>16</td><td>≥0/&lt;0 서식 오분기(추가납부↔경정청구)</td><td>차단(자동 판정)</td><td>§25.13.6~7, §25.11.1</td></tr>\n<tr><td>17</td><td>내국신용장번호(SA-VAT-33)·결제처리번호(SA-VAT-19) 미입력</td><td>전자신고 필수 — 제작 오류</td><td>§25.14.5, §25.12.11</td></tr>\n<tr><td>18</td><td>SA-VAT-18 마감 시 수량·사업자/주민번호 미입력</td><td>차단(마감 불가)</td><td>§25.12.10</td></tr>\n<tr><td>19</td><td>SA-VAT-18 마감 후 수정</td><td>차단(마감 후 수정불가)</td><td>§25.12.10</td></tr>\n<tr><td>20</td><td>전자신고세액공제 한도 초과(개인 300만/법인 750만)</td><td>차단/한도 절사</td><td>§25.12.12</td></tr>\n<tr><td>21</td><td>월별판매액합계표 미첨부</td><td>MRI 경고(영세율과세표준불성실 가산세 0.5%)</td><td>§25.12.9</td></tr>\n<tr><td>22</td><td>세금계산서 수취 건 카드 공제(이중공제)</td><td>차단(세금계산서 기준 1회 공제, 카드=결제수단)</td><td>§11.1.1-(16) ④, §15 R16</td></tr>\n<tr><td>23</td><td>동일 카드승인건 다중 전표 연결</td><td>차단(증빙 중복 사용 방지)</td><td>§15 R16</td></tr>\n<tr><td>24</td><td>카드 VAT 판정 reason code 누락</td><td>알림 생성 차단(설명가능성 강제)</td><td>§15(이상탐지 사유), §11.1.1-(16)</td></tr>\n<tr><td>25</td><td>매입원장 불공제/면세/영세율 사유 미입력</td><td>차단(사유 필수)</td><td>§11.4-(1) 검증</td></tr>\n<tr><td>26</td><td>매입원장 세무구분·증빙유형 불일치</td><td><code>REVIEW_REQUIRED</code> + 신고 집계 경고/차단(회사 정책)</td><td>§15, §11.4</td></tr>\n<tr><td>27</td><td>비주기장 측 서식 작성·마감 시도</td><td>차단 <code>NOT_PRIMARY_BOOKKEEPER</code></td><td>§15, §21.1</td></tr>\n<tr><td>28</td><td>Ack 미완료/이의 미해소 상태 수정신고 생성</td><td><code>ackPolicy=REQUIRED</code> 시 차단</td><td>§15, §21.4</td></tr>\n<tr><td>29</td><td><code>LOCKED</code> 기간 마감해제 시도(경정 대상 기간)</td><td>차단(수정신고 절차 안내), 시도 감사로그</td><td>§15, §11.9</td></tr>\n<tr><td>30</td><td>멱등키 충돌(불러오기·수록 재호출)</td><td>409 <code>IDEMPOTENCY_CONFLICT</code></td><td>§15, §13.3</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">9. 권한·SOD·감사</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>화면/행위</th><th>역할·scope</th><th>통제</th><th>근거</th></tr></thead><tbody><tr><td>부속서류 작성·마감(전체)</td><td>주기장 측 담당</td><td>마감·결산·신고 서비스에 주기장 권한 검증 공통 인터셉터</td><td>§11.4, §13.1</td></tr>\n<tr><td>사업장별/단위과세 명세(SA-VAT-25/26)</td><td>본점 + 지점회사 권한</td><td>사업장 차원 RLS로 본·지점 격리, 지점 데이터 접근 제어</td><td>§25.13.4~5</td></tr>\n<tr><td>수정신고·경정청구(SA-VAT-27/28)</td><td>주기장 작성 + 이용회사 승인 <code>tenant:filing:approve</code></td><td><code>filingApprovalRequired=Y</code>: 승인(Step-up) 후 SA-VAT-07 전송. 주기장=OPERATOR는 세무대리 수임(<code>contractRef</code>) 검증</td><td>§21.4-(5), §13.3</td></tr>\n<tr><td>카드 VAT Rule 설정</td><td>고객사별 Rule — 회사 설정 권한</td><td>판정은 자동 추천·검토 분류까지, 확정은 사람 검토(검토 큐)</td><td>§11.1.1-(16), §11.7 휴먼인더루프 원칙</td></tr>\n<tr><td>불공제사유·세무구분 변경</td><td>담당자</td><td>변경 시 사유(<code>reasonCode</code>)+감사로그 필수</td><td>§11.4-(1)</td></tr>\n<tr><td>SOD</td><td>작성≠승인(수정신고 작성자와 승인자 분리)</td><td>기장 Role-거버넌스 승인자 겸직 차단</td><td>00_개요 §3, §4.5</td></tr>\n<tr><td>감사</td><td>서식 CUD·마감·수정차수 생성·승인 <code>DataChangeLog</code> append-only(전후값·IP·행위자)</td><td>마감 후 수정불가 서식(SA-VAT-18)은 물리 삭제 금지</td><td>§17, §25.12.10</td></tr>\n<tr><td>마스킹</td><td>주민번호 별표(SA-VAT-16/17/19), 외국인환자 인적사항(SA-VAT-35), 평문 조회 Step-up</td><td><code>PersonalDataAccessLog</code></td><td>§17, §25.12.8~9, §25.14.7</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">10. 연계</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>방향</th><th>대상</th><th>내용</th><th>근거</th></tr></thead><tbody><tr><td>선행(P01)</td><td>회사등록·거래처등록</td><td>본지점설정(총괄납부/사업자단위과세), 국세환급금계좌(SA-VAT-18/28), 세무대리인 정보(SA-VAT-20/27/28 위임장), 거래처 카드탭 가맹점번호(SA-VAT-19)</td><td>§25.1.1, §25.12.10~12, §25.13.6~7</td></tr>\n<tr><td>선행(P03)</td><td>매입매출전표(SA-JNL-02)·SA-ATX</td><td>54.불공+불공제사유(51↔54 변경 규칙·불공제사유 팝업·일괄변경), 고정자산 계정 분기, 적요 06/07, 12/16/19/21/24 영세·전자 계열, 13/18/23 면세 계열</td><td>§25.4.2.2</td></tr>\n<tr><td>선행(P06)</td><td>SA-VAT-01/02/07/08</td><td>신고서 란 연동(3.1절 매핑), MRI 검토(안분·대손·월별판매액 가산세·재활용 한도), 전산매체 수록, 납부서 총괄납부 금액</td><td>§25.11.1~2·7~8, §25.13</td></tr>\n<tr><td>선행(P05)</td><td>마감 워크플로우</td><td>신고 완료 기간 <code>LOCKED</code> — 경정 대상 기간은 수정신고 절차로만 대응</td><td>§11.9-(1)(3)</td></tr>\n<tr><td>후행(P08)</td><td>SA-VAT-29~32·43(영세율)·SA-FA(고정자산)</td><td>SA-VAT-33 관세환급금 → 영세율매출명세서(SA-VAT-43) 집계, SA-VAT-23 ↔ 고정자산 모듈(취득 전표 연결)</td><td>§25.14.5, §25.13.2, §11.5-(2)</td></tr>\n<tr><td>내부</td><td>AUX-06 부가세 보조원장(P04)</td><td>세무구분·사유구분·<code>ntsStatus</code> 집계, 프로젝트·부서·사업장 차원 분류, 과세유형별(과세/영세율/면세/불공제) 매출 구분 집계</td><td>§11.4-(4)</td></tr>\n<tr><td>내부</td><td>미결항목(18.3)·검토 큐</td><td>카드 VAT 검토 필요 건, 증빙 보완 요청 워크플로우</td><td>§11.1.1-(16), §18.3</td></tr>\n<tr><td>내부</td><td>알림 엔진</td><td>신고 기한 D-N·승인 요청·Ack 리마인드(P06 공유 단일 엔진)</td><td>§18, §14</td></tr>\n<tr><td>외부</td><td>국세청 홈택스 API</td><td>전산매체 제출(첨부서식 수록), 사업자상태(휴폐업 — 대손 거래처 검증 지원)</td><td>§25.11.7, §8.4, §11.4</td></tr>\n<tr><td>표준</td><td><code>STD_PURCHASE_TAX_STATUS</code> 카탈로그</td><td>세무구분·사유구분·전송상태·증빙상태 코드 버전 배포</td><td>§6</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">11. 완료 기준(DoD)·테스트 관점</h3>\n<p><strong>DoD</strong></p>\n<p>1. 1차 9메뉴(SA-VAT-22~28·33·34)가 P03 전표(불공제사유·고정자산 계정·영세 계열)에서 자동 집계 → 보정 → 마감 → SA-VAT-01 란 연동 → SA-VAT-07 전산매체 수록까지 E2E 동작(§25.13, §25.11.7).</p>\n<p>2. 공통매입세액 안분(계산식 5종)·정산·재계산(체감률 5%/25%) 3단계 룰엔진이 자동 계산되고 마감 검증(면세공급가액=0 오류)이 동작(§25.13.1).</p>\n<p>3. 대손 부호 규칙·10년 공제기간·10/110 자동계산과 신고서 8란/47란 부호 반영이 정확(§25.13.3).</p>\n<p>4. 총괄납부·사업자단위과세 본·지점 불러오기 합산과 지점 권한(RLS) 격리, 직접 조정 항목(대손·미환급·고지) 통제가 동작(§25.13.4~5, §11.4).</p>\n<p>5. 수정신고 ≥0/&lt;0 자동 분기로 SA-VAT-27/28이 생성되고, 경정청구이유 중복 금지·신고인정보 수정불가·승인 게이트(<code>filingApprovalRequired</code>)가 동작(§25.13.6~7, §21.4).</p>\n<p>6. 검증 표(8절) 30항목이 서버/클라 이중 검증으로 구현(00_개요 §3 UI 공통).</p>\n<p><strong>테스트 관점</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>구분</th><th>시나리오</th></tr></thead><tbody><tr><td>불공제 집계</td><td>불공제사유 코드 9종별 전표 → 명세 자동반영, 51↔54 변경 시 사유 팝업·재집계(§25.4.2.2)</td></tr>\n<tr><td>안분·정산·재계산</td><td>계산식 1~5 각각, 예정 안분→확정 정산 기 불공제 차감, 면세비율 증감 5% 경계, 안분 제외(5% 미만)</td></tr>\n<tr><td>감가상각자산</td><td>취득 유형(세금계산서/신용카드)×자산구분 4종 집계, 미작성 시 마감 유의사항, 신고서란 대사</td></tr>\n<tr><td>대손세액</td><td>부도+6개월 자동 확정일, 10년 경계, 발생/회수·변제 부호 4조합의 신고서 반영 방향</td></tr>\n<tr><td>멀티사업장</td><td>본·지점 신고서 합산=총괄 납부세액, 지점 권한 없는 접근 차단, 사업장 불러오기 재실행 멱등</td></tr>\n<tr><td>수정·경정</td><td>수정신고서 저장 전 작성 차단, ≥0/&lt;0 분기, 청구이유 중복 차단, 휴일 법정신고일 익일 처리</td></tr>\n<tr><td>전자신고 필수값</td><td>내국신용장번호·결제처리번호·물품명 등 누락 시 제작 오류(SA-VAT-07 검증 단계)</td></tr>\n<tr><td>카드 VAT(N11)</td><td>공제/불공제/검토필요 3분류, 주말·고액·반복 결제 신호, 고객사별 Rule 보정, 이중공제 차단</td></tr>\n<tr><td>2차 서식</td><td>계정/가맹점/공급처 설정 → 불러오기 → 조건별 삭제, SA-VAT-18 마감 필수값·마감 후 수정불가, 공제한도(300만/750만)</td></tr>\n<tr><td>통제</td><td>비주기장 시도, Ack 미완료, Step-up 미수행, <code>LOCKED</code> 기간, RLS 교차 테넌트·교차 사업장</td></tr>\n<tr><td>성능</td><td>신고 성수기(1월·부가세 신고월) 부속서류 대량 집계 — 무중단·자동 스케일(§15 하단)</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">12. 잔여 확인사항 (§23 연계)</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>§23 번호</th><th>항목</th><th>본 페이즈 영향</th></tr></thead><tbody><tr><td>19</td><td>마감 정책: <code>LOCKED</code> 전환 조건(신고 완료 기준)</td><td>경정청구 대상 기간의 원장 접근·조정 절차 정의</td></tr>\n<tr><td>24</td><td>기장 수임 법적 검토: 세무대리인 자격·수임 범위</td><td>SA-VAT-20 수임업체 집계 범위·SA-VAT-27/28 위임장 요건</td></tr>\n<tr><td>25</td><td>신고 승인 정책: <code>filingApprovalRequired</code> 무응답 처리</td><td>수정신고·경정청구 전송 보류/에스컬레이션</td></tr>\n<tr><td>43</td><td>매입원장 세무상태: NTS 코드↔홈택스 응답코드 매핑</td><td>불공제·대손 건 전송상태 대사, 마감 차단 여부</td></tr>\n<tr><td>52</td><td>일자 데이터 모델: VAT 신고 기준일 적용 규칙(증빙일자 vs 세무귀속일)</td><td>대손확정일·취득일자·공급일자의 귀속 과세기간 판정</td></tr>\n<tr><td>55</td><td>카드 VAT 공제 Rule 설계(N11): 판단 신호 가중치·검토 필요 분류 임계, 고객사별 커스터마이징 범위, 증빙 보완 SLA</td><td>SA-VAT-22 불공제 자동 추천·검토 큐 파라미터</td></tr></tbody></table></div>"},"hasJournalImpl":false,"journalImplRel":"../화면설계/구현_화면_전표_v1.1.html","bkSource":"설계/화면설계/bk_화면설계서_v1.0.html"};
function el(tag, cls, text){ const n=document.createElement(tag); if(cls)n.className=cls; if(text!==undefined)n.textContent=text; return n; }
function setHtml(node, html){ node.innerHTML = html || ''; return node; }
function phaseBadge(phase){ return phase==='1차'?'badge b-new':phase==='2차'?'badge b-gray':phase==='3차'?'badge b-warn':'badge b-ref'; }
function kindClass(kind){ return kind==='error'?'errormsg':kind==='warn'?'warnmsg':'okmsg'; }
function money(i){ return (i*1375000 + 12000000).toLocaleString('ko-KR'); }
function stripHtml(html){ const d=document.createElement('div'); d.innerHTML=html||''; return d.textContent.replace(/\s+/g,' ').trim(); }
function input(type,value,cls){ const n=document.createElement('input'); n.type=type; n.value=value||''; if(cls)n.className=cls; return n; }
function select(options,value,cls){ const s=document.createElement('select'); if(cls)s.className=cls; options.forEach(o=>{ const opt=document.createElement('option'); opt.value=o; opt.textContent=o; if(o===value)opt.selected=true; s.appendChild(opt); }); return s; }
function textarea(value,cls){ const t=document.createElement('textarea'); t.value=value||''; if(cls)t.className=cls; return t; }
function makeStaticTable(cols, rows){
  const table=el('table','input-grid'); const head=document.createElement('tr'); cols.forEach(c=>head.appendChild(el('th','',c))); table.appendChild(head);
  rows.forEach(r=>{ const tr=document.createElement('tr'); r.forEach(c=>tr.appendChild(el('td','',c))); table.appendChild(tr); }); return table;
}
function bk(screen){ return screen.bk || {}; }
function bkText(screen,key,fallback){ return (bk(screen)[key] || fallback || '').trim(); }
function domain(screen){
  const id=screen.id||'', g=screen.group||'', t=screen.title||'';
  if(/WJV|SA-JNL-01/.test(id)) return 'wjv';
  if(/WPV|SA-JNL-02/.test(id)) return 'wpv';
  if(/SA-JNL/.test(id)) return 'jnl';
  if(/SA-ATX/.test(id)) return 'atx';
  if(/^AUX|SA-LDG/.test(id)) return 'ldg';
  if(/SA-CLS/.test(id)) return 'cls';
  if(/SA-VAT/.test(id)) return 'vat';
  if(/SA-FA/.test(id)) return 'fa';
  if(/SA-FND/.test(id)) return 'fnd';
  if(/SA-DEP/.test(id)) return 'dep';
  if(/SA-BIL/.test(id)) return 'bil';
  if(/SA-DAT/.test(id)) return 'dat';
  if(/전표/.test(g+t)) return 'jnl';
  if(/부가세/.test(g+t)) return 'vat';
  return 'general';
}
function controlType(name, desc){
  const text=(name+' '+(desc||''));
  if(/일자|일$|월|기간|만기|발행일|취득일|개시일|종료|작성일/.test(text)) return 'date';
  if(/금액|세액|가액|잔액|합계|수량|단가|원금|이자|율|차이|예산|실적|공급/.test(text)) return 'number';
  if(/구분|유형|상태|여부|사업장|부서|프로젝트|계정|거래처|전자|분개|공제|채널|작업/.test(text)) return 'select';
  if(/메모|비고|사유|내용|설명|오류|로그/.test(text)) return 'textarea';
  return 'text';
}
function sampleValue(field, screen, i){
  const n=typeof field==='string'?field:field.name;
  if(/월/.test(n)) return '2026-06';
  if(/일자|일$|기간|만기|발행일|취득일|개시일/.test(n)) return '2026-06-18';
  if(/사업자/.test(n)) return '210-81-00000';
  if(/거래처/.test(n)) return i%2?'대한물산':'㈜가나상사';
  if(/계정/.test(n)) return i%2?'401 제품매출':'101 현금';
  if(/사업장/.test(n)) return '본점';
  if(/부서/.test(n)) return '경영지원팀';
  if(/프로젝트/.test(n)) return 'PRJ-2607';
  if(/금액|세액|가액|잔액|합계|예산|실적|원금/.test(n)) return money(i+1);
  if(/수량/.test(n)) return '10';
  if(/단가/.test(n)) return '300,000';
  if(/유형/.test(n)) return /VAT|부가|매입매출/.test(screen.id+screen.title)?'11.과세':'전체';
  if(/상태/.test(n)) return '작성중';
  if(/전자/.test(n)) return '1.전자입력';
  if(/분개/.test(n)) return '3.혼합';
  if(/품명/.test(n)) return '제품A';
  if(/메모|비고|사유/.test(n)) return screen.title+' 검토 메모';
  return screen.title || screen.id;
}
function formFields(screen){

function sampleColumnValue(col, screen, i){

  if(/전표번호/.test(col)) return d==='wpv'?'2026-06-18-50012':'2026-06-18-'+String(i+1).padStart(3,'0');
  if(/작업ID/.test(col)) return 'JOB-'+String(260700+i);
  if(/번호|코드/.test(col)) return (screen.id||'BK').replace(/[^A-Z0-9]/g,'')+'-'+String(i+1).padStart(3,'0');
  if(/사업자/.test(col)) return '210-81-00000';
  if(/계정/.test(col)) return i%2?'401 제품매출':'101 현금';

  if(/품목|품명/.test(col)) return i%2?'원재료':'제품A';
  if(/은행|금융기관/.test(col)) return i%2?'신한은행':'국민은행';
  if(/부서/.test(col)) return '경영지원팀';
  if(/프로젝트/.test(col)) return 'PRJ-2607';
  if(/현장/.test(col)) return 'SITE-01';
  if(/자금항목/.test(col)) return '보통예금';
  if(/서식|항목/.test(col)) return screen.title;
  if(/드릴다운|조치|로그|관리|이력/.test(col)) return '보기';
  if(/진행률/.test(col)) return '80%';
  if(/범위|기간/.test(col)) return '2026-01~2026-06';

function cellControl(col, screen, rowIndex){
  if(/선택/.test(col)){ const w=el('span','cell-check'); const c=input('checkbox','',''); w.appendChild(c); return w; }

  if(/구분|유형|상태|검증|전송|선택|공제|판정|채널|상각방법|상환방식|작업구분|전자|분개|결과/.test(col)) return select(selectOptions(col,screen), selectOptions(col,screen)[rowIndex%Math.min(3,selectOptions(col,screen).length)], 'cell-select');
  if(/일$|일자|작성|승인|발행|만기|취득|개시|시작|종료/.test(col)) return input('date', rowIndex%2?'2026-06-30':'2026-06-18','cell-input day');
  if(/금액|세액|잔액|차변|대변|원금|실적|계획|차이|가액|증감|기말|전기|합계|예산|단가|수량|이자/.test(col)) return input('text', /수량/.test(col)?'10':money(rowIndex+2),'cell-input num amount');
  if(/번호|코드|계정|거래처|금융기관|은행|부서|프로젝트|자금항목|서식|품명|품목|범위|대상/.test(col)) return input('text', sampleColumnValue(col,screen,rowIndex),'cell-input wide-cell');

}
function renderGridWithCols(screen, cols, title, hint, rows){
