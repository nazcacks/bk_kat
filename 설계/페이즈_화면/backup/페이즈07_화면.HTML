금액</td><td>자동</td><td>계산식 4·5는 직접입력</td></tr>\n<tr><td>면세공급가액</td><td>금액</td><td>자동</td><td>계산식 4·5는 직접입력</td></tr>\n<tr><td>불공제매입세액</td><td>금액</td><td>자동계산</td><td>공통매입세액 × 면세비율</td></tr></tbody></table></div>\n<p><strong>입력 필드 — ③ 공제매입세액 정산 탭(확정신고)</strong> (§25.13.1)</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>입력 방식</th><th>설명</th></tr></thead><tbody><tr><td>정산 기준</td><td>선택</td><td>면세공급가액 / 면세사용면적 기준</td></tr>\n<tr><td>총공통매입세액</td><td>자동</td><td>과세기간 전체 공통매입세액</td></tr>\n<tr><td>면세 확정비율</td><td>자동</td><td>확정 면세공급가액(면적) ÷ 총공급가액(면적)</td></tr>\n<tr><td>불공제매입세액총액</td><td>자동</td><td>총공통매입세액 × 면세확정비율</td></tr>\n<tr><td>기 불공제 매입세액</td><td>직접입력</td><td>예정신고 시 안분 불공제분</td></tr>\n<tr><td>가산 또는 공제되는 매입세액</td><td>자동</td><td>총액 − 기 불공제분</td></tr></tbody></table></div>\n<p><strong>입력 필드 — ④ 납부/환급세액 재계산 탭</strong> (§25.13.1)</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>입력 방식</th><th>설명·검증</th></tr></thead><tbody><tr><td>감가상각자산 구분</td><td>선택</td><td>건물·구축물 / 기타 감가상각자산</td></tr>\n<tr><td>해당재화 매입세액</td><td>자동</td><td>54.불공 사유8 + 계정 20200~25099 설정분</td></tr>\n<tr><td>체감률</td><td>자동</td><td>건축·구축물 5% / 기타 25%</td></tr>\n<tr><td>경과 과세기간수</td><td>자동</td><td>취득 이후 경과 과세기간</td></tr>\n<tr><td>경감률</td><td>자동</td><td>1 − 체감률 × 경과 과세기간수</td></tr>\n<tr><td>면세비율 증감</td><td>자동</td><td>증감 5% 이상인 경우에만 재계산 대상</td></tr>\n<tr><td>가산 또는 공제되는 매입세액</td><td>자동</td><td>매입세액 × 경감률 × 면세비율 증감분</td></tr></tbody></table></div>\n<p><strong>기능·동작</strong> (§25.13.1)</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>기능</th><th>동작</th></tr></thead><tbody><tr><td>3단계 룰엔진</td><td>공통매입세액 안분(예정)·정산(확정)·재계산을 룰엔진으로 자동 계산</td></tr>\n<tr><td>불러오기</td><td>탭별 데이터 유무·계산식 설정에 따라 집계. 예정누락은 공제받지못할매입세액 탭만 허용</td></tr>\n<tr><td>안분 제외</td><td>면세비율 5% 미만 등 안분 제외 요건 처리</td></tr>\n<tr><td>마감 검증</td><td>면세공급가액=0인데 총공급가액≠0이면 오류</td></tr>\n<tr><td>신고일자</td><td>과세기간 종료월 다음달 25일 자동</td></tr>\n<tr><td>카드 불공제 연계</td><td>카드 d></tr></tbody></table></div></section>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>산출물</strong>: 입국장 보세판매장 공급실적명세서. <strong>연계</strong>: 매입매출전표(12/19/24 영세계열), SA-VAT-01.</li>\n</ul>","fields":[{"name":"계정과목·공급처 설정","desc":"코드도움"},{"name":"불러오기 대상","desc":"자동"},{"name":"전표 불러오기 조건","desc":"선택"},{"name":"작성조회·일괄삭제","desc":"기능"}],"tableCount":1,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-VAT-21","title":"보세판매장공급실적명세서","purpose":"보세판매장 공급 실적","linkage":"SA-VAT-29 수출","note":"면세점","source":"bk_화면설계서_v1.0.html"},"legacyTitle":"입국경로 설치된 보세판매장 공급실적명세서"},{"id":"SA-VAT-35","title":"미용성형 의료용역 환급실적명세서","phase":"2차","basis":"§25.14.7","impl":"","tabs":"","sid":"sa_vat_35","prefix":"SA-VAT","group":"부가세·신고","purpose":"미용성형 환급실적","detailHtml":"<h4 class=\"doc-h doc-h4\">4.16 외국인관광객 미용성형 의료용역 환급실적명세서 <code>SA-VAT-35</code> (2차, §25.14.7)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 외국인관광객 미용성형 의료용역 공급 의료기관이 부가세액 공제를 위해 작성하는 부속서류 — BK 부가세 환급 부속서식. 환급창구운영사업자·의료용역 일련번호·환자 메타를 증빙으로 관리.</li>\n</ul>\n<p><strong>입력 필드</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>필수</th><th>설명·검증</th></tr></thead><tbody><tr><td>종사업장번호 / 환급창구운영사업자</td><td>번호/코드도움</td><td>필수</td><td>거래처등록 반영</td></tr>\n<tr><td>유치기관등록번호</td><td>번호</td><td>필수</td><td></td></tr>\n<tr><td>의료용역일련번호</td><td>번호(20자리)</td><td>자동</td><td>불러오기 시 1부터 순차 부여</td></tr>\n<tr><td>공급일자</td><td>일자</td><td>필수</td><td>의료용역공급확인서 기준</td></tr>\n<tr><td>환급/송금일자·증명서 송부일자</td><td>일자</td><td>필수</td><td></td></tr>\n<tr><td>공급금액(세금포함)·부가가치세·환급액</td><td>금액</td><td>필수</td><td></td></tr>\n<tr><td>외국인환자 인적사항</td><td>텍스트</td><td>필수</td><td>개인정보 마스킹 대상(00_개요 §3)</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: 거래처별 환급창구사업자 불러오기, 엑셀(§25.14.7).</li>\n<li><strong>산출물</strong>: 외국인관광객 미용성형 의료용역 환급실적명세서.</li>\n<li><strong>연계</strong>: 거래처등록(환급창구운영사업자), SA-VAT-01 48.외국인관광객환급.</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">5. 데이터 모델</h3>\n<blockquote>엔티티 명칭 중 § 근거 표기가 있는 필드·상태는 설계서 명시값이며, 부속서류 헤더 등 구조 명칭은 §25.12~25.14의 화면 기능(작성조회·마감·불러오기)을 본 페이즈에서 구체화한 것이다. <code>VatReturn</code>·<code>VatAttachmentForm</code>·<code>ElectronicFilingJob</code> 등 공통 헤더는 P06 §5를 공유한다.</blockquote>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>엔티티</th><th>핵심 필드</th><th>PK/유니크·상태</th><th>근거</th></tr></thead><tbody><tr><td><code>NonDeductibleEntry</code>(불공제 명세)</td><td>attachmentId, reasonCode(사유 1/2/3/9/4/0/6/A/B), vendorRef, supplyAmount, vatAmount, sourceType(전표자동/직접입력/안분연동 — 세액÷10% 공급가액 자동)</td><td>예정누락은 명세 탭만</td><td>§25.13.1</td></tr>\n<tr><td><code>CommonInputTaxCalc</code>(공통매입 안분/정산/재계산)</td><td>calcType(안분/정산/재계산), formulaType(1.공급가액/2.매입가액/3.예정공급가액/4.예정사용면적/5.도축두수), totalSupply, exemptSupply, exemptRatio, commonInputTax, nonDeductibleTax, priorNonDeductible(직접), adjustTax(가산/공제), assetClass(건축구축물/기타), decliningRate(5%/25%), elapsedPeriods, reductionRate, exemptRatioChange(≥5%)</td><td>면세공급가액=0 &amp; 총공급가액≠0 마감 오류</td><td>§25.13.1</td></tr>\n<tr><td><code>FixedAssetAcqEntry</code>(감가상각자산 취득)</td><td>취득일자, 상호, 사업자번호, assetClass(1~4), supplyAmount, vatAmount, count, docType(1.세금계산서/2.신용카드)</td><td>신고서 고정자산란 대사</td><td>§25.13.2</td></tr>\n<tr><td><code>BadDebtEntry</code>(대손세액)</td><td>tabType(발생/변제), 당초공급일(2022-1기~ 필수), 대손사유/변제사유, 대손기준일, 대손확정일(부도+6개월 자동), 금액(부호 규칙), 세액(×10/110 자동), vendorId</td><td>공급일+10년 내 과세기간 검증</td><td>§25.13.3</td></tr>\n<tr><td><code>BranchVatStatement</code>(사업장별/단위과세 명세)</td><td>stmtType(총괄납부/사업자단위과세), businessPlaceId, 사업자등록번호/적용번호(종사업장 자동·0000), 총괄납부번호, 매출·매입 과표/세율/세액(불러오기), 가산세·공제세액(직접), 대손·미환급·고지(직접 조정)</td><td>사업장 불러오기 시 기존 삭제. 사업장 차원 RLS</td><td>§25.13.4~5</td></tr>\n<tr><td><code>AmendedFilingForm</code>(수정·경정 서식)</td><td>returnId, amendmentSeq, formType(추가납부계산서/경정청구서), 신고인정보(자동·수정불가), 수정사유, 법정/최초신고일(자동, 휴일 시 익일), 경정청구이유1/2(중복 금지), 국세환급금계좌, 위임장정보</td><td>≥0 수정신고 / &lt;0 경정청구 판정</td><td>§25.13.6~7</td></tr>\n<tr><td><code>CustomsRefundEntry</code>(관세환급금)</td><td>공급일자, 환급금액, 공급받는자(상호·사업자번호), 내국신용장번호(전자신고 필수)</td><td>12/16 거래처 설정 불러오기</td><td>§25.14.5</td></tr>\n<tr><td><code>TouristRefundEntry</code>(외국인관광객 면세판매/의료용역)</td><td>entryType(면세판매/미용성형), 종사업장번호, 면세판매장지정번호/환급창구운영사업자, 구매일련번호/의료용역일련번호(20자리·순차), 판매/공급일자, 반출일자·반출승인번호, 환급(송금)일자·환급액, 세목별 금액(부가세·개소세·교육세·농특세), 유치기관등록번호, 환자 인적사항</td><td>일련번호 순차 부여</td><td>§25.14.6~7</td></tr>\n<tr><td><code>DutyFreeOilEntry</code>(면세유류)</td><td>유종(휘발유/경유/등유/중유/LPG), 업종구분(농업/임업), 계정매핑, 집계금액</td><td>13/18/23 집계</td><td>§25.12.8</td></tr>\n<tr><td><code>MonthlySalesEntry</code>(월별판매액)</td><td>tabType(장애인보장구/농축임업용), 계정코드, 월별 판매액</td><td>미첨부 가산세 0.5% MRI 룰</td><td>§25.12.9</td></tr>\n<tr><td><code>AgriRefundClaim</code>(농어업기자재 환급)</td><td>탭(환급신청내용/매입세금계산서), 환급계좌, 직접대행구분(0/1), 수량(마감 필수), 사업자/주민번호(마감 필수)</td><td>마감 후 수정불가</td><td>§25.12.10</td></tr>\n<tr><td><code>EMoneyEntry</code>(전자화폐)</td><td>가맹점번호(거래처 카드탭), 발행회사, 구매자, 결제일자, 결제금액(공급대가), 결제처리번호(전자신고 필수)</td><td>21.전자 집계</td><td>§25.12.11</td></tr>\n<tr><td><code>EFilingCreditClaim</code>(전자신고세액공제)</td><td>수임업체 건수, 공제세액(건수×1만원), 한도(개인 300만/법인 750만), 세무대리인정보</td><td>직전과세기간 마감분 집계(멀티테넌트 관계)</td><td>§25.12.12</td></tr>\n<tr><td><code>BondedShopSupplyEntry</code>(보세판매장)</td><td>공급처(보세판매장), 계정매핑, 집계금액</td><td>12/19/24 집계, 조건별 삭제</td><td>§25.12.13</td></tr>\n<tr><td><code>CardVatRule</code>(카드 VAT 공제 룰, N11)</td><td>tenantId, 판정 신호(사업 관련성·적격 증빙·법정 불공제·접대비/식대·차량·면세·개인성 지출), 분류(공제/불공제/검토필요), 고객사별 Rule·반복 거래 보정</td><td>검토 필요 건 검토 큐, 증빙 보완 요청 워크플로우(18.3)</td><td>§11.1.1-(16)</td></tr>\n<tr><td><code>PurchaseLedgerLine</code>(매입원장 — P06 공유)</td><td>taxCategory, reasonCode(사유구분), deductibleType, ntsStatus, evidenceStatus</td><td>불공제/면세/영세율 <strong>사유 필수</strong> 검증</td><td>§11.4-(1)</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>매입 세무구분·사유구분·전송상태·증빙상태 코드는 공통 표준 <code>STD_PURCHASE_TAX_STATUS</code> 카탈로그 버전으로 배포(§6 표 — 11.4 연계).</li>\n<li>테이블 공통 제약(tenant_id NOT NULL+RLS, 감사 필드, 물리 삭제 금지)은 00_개요 §3.</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">6. API 설계</h3>\n<blockquote>P06 §6의 부속서류 공통 API(<code>/attachments/{formType}/load</code>·<code>/close</code>)를 재사용하고, 본 페이즈 특화 리소스만 추가한다. 엔드포인트는 §25.13~25.14의 화면 기능(불러오기·마감·수정차수·정산 계산)을 REST로 구체화한 대표 설계다(§13.1 공통 인터셉터 준용).</blockquote>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>메서드</th><th>엔드포인트</th><th>설명</th><th>멱등성·오류</th></tr></thead><tbody><tr><td>POST</td><td><code>/api/tenant/vat/attachments/{formType}/load</code></td><td>부속서류 불러오기(계정/거래처/가맹점 설정 기반, 기존 삭제 후 재집계 또는 조건별 삭제 — SA-VAT-21)</td><td>Idempotency-Key</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/attachments/{formType}/close</code></td><td>부속서류 마감(SA-VAT-18: 수량·사업자/주민번호 필수, 마감 후 수정불가)</td><td><code>VALIDATION_FAILED</code></td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/non-deductible/{id}/apportion</code></td><td>공통매입세액 안분 계산(계산식 1~5, 예정)</td><td>자동계산 결과 반환</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/non-deductible/{id}/settle</code></td><td>공통매입세액 정산(확정 — 면세확정비율·기 불공제 차감)</td><td>〃</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/non-deductible/{id}/recalculate</code></td><td>납부/환급세액 재계산(체감률 5%/25%·경과 과세기간·면세비율 증감 ≥5%)</td><td>〃</td></tr>\n<tr><td>GET</td><td><code>/api/tenant/vat/bad-debts?period&amp;tabType</code></td><td>대손발생/변제 명세 조회</td><td>—</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/bad-debts</code></td><td>대손 건 등록(10/110 자동, 10년 기간·부호 규칙 검증)</td><td><code>VALIDATION_FAILED</code></td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/branch-statements/{type}/load</code></td><td>사업장별/단위과세 &quot;부가가치세 불러오기&quot;(본·지점 신고서 반영, 기존 삭제)</td><td>Idempotency-Key, 지점 권한 <code>FORBIDDEN_SCOPE</code></td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/returns/{id}/amend-forms</code></td><td>수정차수 연동 서식 생성(≥0 → 추가납부계산서 / &lt;0 → 경정청구서 자동 분기)</td><td>수정신고서 저장 선행 검증</td></tr>\n<tr><td>PUT</td><td><code>/api/tenant/vat/amend-forms/{id}</code></td><td>수정사유·경정청구이유·환급계좌 보정(이유 1/2 중복 차단)</td><td>version 낙관적 락</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/card-rules/evaluate</code></td><td>카드 VAT 공제/불공제/검토필요 자동 판정(N11)</td><td>검토 큐 라우팅, reason code 필수</td></tr>\n<tr><td>PUT</td><td><code>/api/tenant/vat/card-rules</code></td><td>고객사별 Rule 설정·반복 거래 보정</td><td><code>VALIDATION_FAILED</code></td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/efiling-credit/load</code></td><td>수임업체 건수 집계(직전과세기간 마감분 × 1만원, 한도 검증)</td><td>한도 초과 시 경고</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/attachments/{formType}/excel-import</code></td><td>엑셀 업로드(SA-VAT-33/34/35/20 등)</td><td>오류행 리포트</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>오류코드</strong>(§13.3): <code>VALIDATION_FAILED</code>, <code>CLOSING_LOCKED</code>(마감 후 수정), <code>PERIOD_LOCKED</code>, <code>NOT_PRIMARY_BOOKKEEPER</code>, <code>FORBIDDEN_SCOPE</code>(지점 권한 없음), <code>IDEMPOTENCY_CONFLICT</code>(409), <code>EXTERNAL_INTEGRATION_FAILED</code>.</li>\n<li><strong>Scope</strong>(§13.3): 전자신고 수록·마감은 위험 scope로 Step-up, 지점 데이터는 사업장 차원 RLS로 접근 제어(§25.13.4).</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">7. 배치 / 스케줄</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>배치</th><th>주기·트리거</th><th>내용</th><th>실패 처리</th><th>근거</th></tr></thead><tbody><tr><td>신고 집계 잡</td><td>신고기 월 정기/수동</td><td>불공제·고정자산·영세/면세 계열 부속서류 집계 뷰 갱신(P06 공유)</td><td>멱등·재처리·실패 알림</td><td>§14 회사 배치</td></tr>\n<tr><td>매입원장 세무상태/NTS 대사 잡</td><td>주기적</td><td><code>taxCategory</code>·<code>reasonCode</code>(불공제 사유) ↔ 홈택스 수신 결과 대사</td><td><code>REVIEW_REQUIRED</code> 승격</td><td>§14, §11.4-(1)</td></tr>\n<tr><td>카드 VAT 야간 스코어링</td><td>야간 전수</td><td>카드 건 공제/불공제/검토필요 재평가(이상거래 야간 전수 스코어링 잡과 동일 계열) — 검토 큐 알림 생성</td><td>멱등·알림</td><td>§14, §11.1.1-(16)</td></tr>\n<tr><td>신고기한 알림(D-N) 잡</td><td>D-N 규칙</td><td>확정신고 부속서류(대손·정산·경정청구 기한 등) 기한 알림 — 기한 알림(D-N) 발송 잡 공용</td><td>DLQ+운영 콘솔</td><td>§14, §18</td></tr>\n<tr><td>확인(Ack) 리마인드 잡</td><td>D+3/D+7</td><td>수정신고·경정청구 승인 <code>PENDING</code> 리마인드·장기 미확인 에스컬레이션</td><td>에스컬레이션</td><td>§14 기장 운영 배치</td></tr>\n<tr><td>휴폐업 상태 갱신</td><td>매주 월요일</td><td>거래처 휴폐업조회 갱신(P06 공유 — 대손 거래처·공급받는자 검증 지원)</td><td>재시도</td><td>§25.11.3, §11.4</td></tr>\n<tr><td>전산매체 수록 작업큐</td><td>이벤트</td><td>마감된 본 페이즈 서식을 SA-VAT-07 전산매체 제작에 수록(첨부서식 SA-VAT-03~50)</td><td>제작오류 상태·재처리</td><td>§25.11.7, §14</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">8. 검증·오류 처리</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>검증 항목</th><th>차단/경고</th><th>근거</th></tr></thead><tbody><tr><td>1</td><td>SA-VAT-22 마감 시 면세공급가액=0 &amp; 총공급가액≠0</td><td>차단(마감 오류)</td><td>§25.13.1</td></tr>\n<tr><td>2</td><td>안분 제외 요건(면세비율 5% 미만 등)</td><td>안분 대상 제외 처리</td><td>§25.13.1</td></tr>\n<tr><td>3</td><td>예정누락 입력 — 공제받지못할매입세액 탭 외</td><td>차단(명세 탭만 허용)</td><td>§25.13.1</td></tr>\n<tr><td>4</td><td>재계산 대상 판정 — 면세비율 증감 5% 미만</td><td>재계산 제외</td><td>§25.13.1</td></tr>\n<tr><td>5</td><td>고정자산매입분 존재 + SA-VAT-23 미작성</td><td>경고(신고서 마감 유의사항)</td><td>§25.13.2</td></tr>\n<tr><td>6</td><td>SA-VAT-23 ↔ 신고서 고정자산란 불일치</td><td>경고(정합성 검증)</td><td>§25.13.2</td></tr>\n<tr><td>7</td><td>대손 공제기간(공급일로부터 10년 내 과세기간) 초과</td><td>차단</td><td>§25.13.3</td></tr>\n<tr><td>8</td><td>대손확정일 과세기간 외 입력</td><td>차단(과세기간 내 입력)</td><td>§25.13.3</td></tr>\n<tr><td>9</td><td>대손/변제 부호 규칙 위반(발생 양수/회수 음수 등)</td><td>차단</td><td>§25.13.3</td></tr>\n<tr><td>10</td><td>당초공급일 누락(2022년 1기 확정 이후)</td><td>차단(필수)</td><td>§25.13.3</td></tr>\n<tr><td>11</td><td>본지점설정·지점회사 권한 없는 사업장별 명세 작성</td><td>차단(<code>FORBIDDEN_SCOPE</code>)</td><td>§25.13.4~5</td></tr>\n<tr><td>12</td><td>대손·예정미환급·예정고지 불러오기 시도</td><td>차단(직접 조정만 허용)</td><td>§25.13.4~5</td></tr>\n<tr><td>13</td><td>수정신고서 미저장 상태 SA-VAT-27/28 작성</td><td>차단(수정신고서 저장 필요)</td><td>§25.13.6~7</td></tr>\n<tr><td>14</td><td>신고인정보 수정 시도</td><td>차단(회사등록 자동·수정불가)</td><td>§25.13.6~7</td></tr>\n<tr><td>15</td><td>경정청구이유 1/2 중복 선택</td><td>차단(전자신고 오류)</td><td>§25.13.7</td></tr>\n<tr><td>16</td><td>≥0/&lt;0 서식 오분기(추가납부↔경정청구)</td><td>차단(자동 판정)</td><td>§25.13.6~7, §25.11.1</td></tr>\n<tr><td>17</td><td>내국신용장번호(SA-VAT-33)·결제처리번호(SA-VAT-19) 미입력</td><td>전자신고 필수 — 제작 오류</td><td>§25.14.5, §25.12.11</td></tr>\n<tr><td>18</td><td>SA-VAT-18 마감 시 수량·사업자/주민번호 미입력</td><td>차단(마감 불가)</td><td>§25.12.10</td></tr>\n<tr><td>19</td><td>SA-VAT-18 마감 후 수정</td><td>차단(마감 후 수정불가)</td><td>§25.12.10</td></tr>\n<tr><td>20</td><td>전자신고세액공제 한도 초과(개인 300만/법인 750만)</td><td>차단/한도 절사</td><td>§25.12.12</td></tr>\n<tr><td>21</td><td>월별판매액합계표 미첨부</td><td>MRI 경고(영세율과세표준불성실 가산세 0.5%)</td><td>§25.12.9</td></tr>\n<tr><td>22</td><td>세금계산서 수취 건 카드 공제(이중공제)</td><td>차단(세금계산서 기준 1회 공제, 카드=결제수단)</td><td>§11.1.1-(16) ④, §15 R16</td></tr>\n<tr><td>23</td><td>동일 카드승인건 다중 전표 연결</td><td>차단(증빙 중복 사용 방지)</td><td>§15 R16</td></tr>\n<tr><td>24</td><td>카드 VAT 판정 reason code 누락</td><td>알림 생성 차단(설명가능성 강제)</td><td>§15(이상탐지 사유), §11.1.1-(16)</td></tr>\n<tr><td>25</td><td>매입원장 불공제/면세/영세율 사유 미입력</td><td>차단(사유 필수)</td><td>§11.4-(1) 검증</td></tr>\n<tr><td>26</td><td>매입원장 세무구분·증빙유형 불일치</td><td><code>REVIEW_REQUIRED</code> + 신고 집계 경고/차단(회사 정책)</td><td>§15, §11.4</td></tr>\n<tr><td>27</td><td>비주기장 측 서식 작성·마감 시도</td><td>차단 <code>NOT_PRIMARY_BOOKKEEPER</code></td><td>§15, §21.1</td></tr>\n<tr><td>28</td><td>Ack 미완료/이의 미해소 상태 수정신고 생성</td><td><code>ackPolicy=REQUIRED</code> 시 차단</td><td>§15, §21.4</td></tr>\n<tr><td>29</td><td><code>LOCKED</code> 기간 마감해제 시도(경정 대상 기간)</td><td>차단(수정신고 절차 안내), 시도 감사로그</td><td>§15, §11.9</td></tr>\n<tr><td>30</td><td>멱등키 충돌(불러오기·수록 재호출)</td><td>409 <code>IDEMPOTENCY_CONFLICT</code></td><td>§15, §13.3</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">9. 권한·SOD·감사</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>화면/행위</th><th>역할·scope</th><th>통제</th><th>근거</th></tr></thead><tbody><tr><td>부속서류 작성·마감(전체)</td><td>주기장 측 담당</td><td>마감·결산·신고 서비스에 주기장 권한 검증 공통 인터셉터</td><td>§11.4, §13.1</td></tr>\n<tr><td>사업장별/단위과세 명세(SA-VAT-25/26)</td><td>본점 + 지점회사 권한</td><td>사업장 차원 RLS로 본·지점 격리, 지점 데이터 접근 제어</td><td>§25.13.4~5</td></tr>\n<tr><td>수정신고·경정청구(SA-VAT-27/28)</td><td>주기장 작성 + 이용회사 승인 <code>tenant:filing:approve</code></td><td><code>filingApprovalRequired=Y</code>: 승인(Step-up) 후 SA-VAT-07 전송. 주기장=OPERATOR는 세무대리 수임(<code>contractRef</code>) 검증</td><td>§21.4-(5), §13.3</td></tr>\n<tr><td>카드 VAT Rule 설정</td><td>고객사별 Rule — 회사 설정 권한</td><td>판정은 자동 추천·검토 분류까지, 확정은 사람 검토(검토 큐)</td><td>§11.1.1-(16), §11.7 휴먼인더루프 원칙</td></tr>\n<tr><td>불공제사유·세무구분 변경</td><td>담당자</td><td>변경 시 사유(<code>reasonCode</code>)+감사로그 필수</td><td>§11.4-(1)</td></tr>\n<tr><td>SOD</td><td>작성≠승인(수정신고 작성자와 승인자 분리)</td><td>기장 Role-거버넌스 승인자 겸직 차단</td><td>00_개요 §3, §4.5</td></tr>\n<tr><td>감사</td><td>서식 CUD·마감·수정차수 생성·승인 <code>DataChangeLog</code> append-only(전후값·IP·행위자)</td><td>마감 후 수정불가 서식(SA-VAT-18)은 물리 삭제 금지</td><td>§17, §25.12.10</td></tr>\n<tr><td>마스킹</td><td>주민번호 별표(SA-VAT-16/17/19), 외국인환자 인적사항(SA-VAT-35), 평문 조회 Step-up</td><td><code>PersonalDataAccessLog</code></td><td>§17, §25.12.8~9, §25.14.7</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">10. 연계</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>방향</th><th>대상</th><th>내용</th><th>근거</th></tr></thead><tbody><tr><td>선행(P01)</td><td>회사등록·거래처등록</td><td>본지점설정(총괄납부/사업자단위과세), 국세환급금계좌(SA-VAT-18/28), 세무대리인 정보(SA-VAT-20/27/28 위임장), 거래처 카드탭 가맹점번호(SA-VAT-19)</td><td>§25.1.1, §25.12.10~12, §25.13.6~7</td></tr>\n<tr><td>선행(P03)</td><td>매입매출전표(SA-JNL-02)·SA-ATX</td><td>54.불공+불공제사유(51↔54 변경 규칙·불공제사유 팝업·일괄변경), 고정자산 계정 분기, 적요 06/07, 12/16/19/21/24 영세·전자 계열, 13/18/23 면세 계열</td><td>§25.4.2.2</td></tr>\n<tr><td>선행(P06)</td><td>SA-VAT-01/02/07/08</td><td>신고서 란 연동(3.1절 매핑), MRI 검토(안분·대손·월별판매액 가산세·재활용 한도), 전산매체 수록, 납부서 총괄납부 금액</td><td>§25.11.1~2·7~8, §25.13</td></tr>\n<tr><td>선행(P05)</td><td>마감 워크플로우</td><td>신고 완료 기간 <code>LOCKED</code> — 경정 대상 기간은 수정신고 절차로만 대응</td><td>§11.9-(1)(3)</td></tr>\n<tr><td>후행(P08)</td><td>SA-VAT-29~32·43(영세율)·SA-FA(고정자산)</td><td>SA-VAT-33 관세환급금 → 영세율매출명세서(SA-VAT-43) 집계, SA-VAT-23 ↔ 고정자산 모듈(취득 전표 연결)</td><td>§25.14.5, §25.13.2, §11.5-(2)</td></tr>\n<tr><td>내부</td><td>AUX-06 부가세 보조원장(P04)</td><td>세무구분·사유구분·<code>ntsStatus</code> 집계, 프로젝트·부서·사업장 차원 분류, 과세유형별(과세/영세율/면세/불공제) 매출 구분 집계</td><td>§11.4-(4)</td></tr>\n<tr><td>내부</td><td>미결항목(18.3)·검토 큐</td><td>카드 VAT 검토 필요 건, 증빙 보완 요청 워크플로우</td><td>§11.1.1-(16), §18.3</td></tr>\n<tr><td>내부</td><td>알림 엔진</td><td>신고 기한 D-N·승인 요청·Ack 리마인드(P06 공유 단일 엔진)</td><td>§18, §14</td></tr>\n<tr><td>외부</td><td>국세청 홈택스 API</td><td>전산매체 제출(첨부서식 수록), 사업자상태(휴폐업 — 대손 거래처 검증 지원)</td><td>§25.11.7, §8.4, §11.4</td></tr>\n<tr><td>표준</td><td><code>STD_PURCHASE_TAX_STATUS</code> 카탈로그</td><td>세무구분·사유구분·전송상태·증빙상태 코드 버전 배포</td><td>§6</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">11. 완료 기준(DoD)·테스트 관점</h3>\n<p><strong>DoD</strong></p>\n<p>1. 1차 9메뉴(SA-VAT-22~28·33·34)가 P03 전표(불공제사유·고정자산 계정·영세 계열)에서 자동 집계 → 보정 → 마감 → SA-VAT-01 란 연동 → SA-VAT-07 전산매체 수록까지 E2E 동작(§25.13, §25.11.7).</p>\n<p>2. 공통매입세액 안분(계산식 5종)·정산·재계산(체감률 5%/25%) 3단계 룰엔진이 자동 계산되고 마감 검증(면세공급가액=0 오류)이 동작(§25.13.1).</p>\n<p>3. 대손 부호 규칙·10년 공제기간·10/110 자동계산과 신고서 8란/47란 부호 반영이 정확(§25.13.3).</p>\n<p>4. 총괄납부·사업자단위과세 본·지점 불러오기 합산과 지점 권한(RLS) 격리, 직접 조정 항목(대손·미환급·고지) 통제가 동작(§25.13.4~5, §11.4).</p>\n<p>5. 수정신고 ≥0/&lt;0 자동 분기로 SA-VAT-27/28이 생성되고, 경정청구이유 중복 금지·신고인정보 수정불가·승인 게이트(<code>filingApprovalRequired</code>)가 동작(§25.13.6~7, §21.4).</p>\n<p>6. 검증 표(8절) 30항목이 서버/클라 이중 검증으로 구현(00_개요 §3 UI 공통).</p>\n<p><strong>테스트 관점</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>구분</th><th>시나리오</th></tr></thead><tbody><tr><td>불공제 집계</td><td>불공제사유 코드 9종별 전표 → 명세 자동반영, 51↔54 변경 시 사유 팝업·재집계(§25.4.2.2)</td></tr>\n<tr><td>안분·정산·재계산</td><td>계산식 1~5 각각, 예정 안분→확정 정산 기 불공제 차감, 면세비율 증감 5% 경계, 안분 제외(5% 미만)</td></tr>\n<tr><td>감가상각자산</td><td>취득 유형(세금계산서/신용카드)×자산구분 4종 집계, 미작성 시 마감 유의사항, 신고서란 대사</td></tr>\n<tr><td>대손세액</td><td>부도+6개월 자동 확정일, 10년 경계, 발생/회수·변제 부호 4조합의 신고서 반영 방향</td></tr>\n<tr><td>멀티사업장</td><td>본·지점 신고서 합산=총괄 납부세액, 지점 권한 없는 접근 차단, 사업장 불러오기 재실행 멱등</td></tr>\n<tr><td>수정·경정</td><td>수정신고서 저장 전 작성 차단, ≥0/&lt;0 분기, 청구이유 중복 차단, 휴일 법정신고일 익일 처리</td></tr>\n<tr><td>전자신고 필수값</td><td>내국신용장번호·결제처리번호·물품명 등 누락 시 제작 오류(SA-VAT-07 검증 단계)</td></tr>\n<tr><td>카드 VAT(N11)</td><td>공제/불공제/검토필요 3분류, 주말·고액·반복 결제 신호, 고객사별 Rule 보정, 이중공제 차단</td></tr>\n<tr><td>2차 서식</td><td>계정/가맹점/공급처 설정 → 불러오기 → 조건별 삭제, SA-VAT-18 마감 필수값·마감 후 수정불가, 공제한도(300만/750만)</td></tr>\n<tr><td>통제</td><td>비주기장 시도, Ack 미완료, Step-up 미수행, <code>LOCKED</code> 기간, RLS 교차 테넌트·교차 사업장</td></tr>\n<tr><td>성능</td><td>신고 성수기(1월·부가세 신고월) 부속서류 대량 집계 — 무중단·자동 스케일(§15 하단)</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">12. 잔여 확인사항 (§23 연계)</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>§23 번호</th><th>항목</th><th>본 페이즈 영향</th></tr></thead><tbody><tr><td>19</td><td>마감 정책: <code>LOCKED</code> 전환 조건(신고 완료 기준)</td><td>경정청구 대상 기간의 원장 접근·조정 절차 정의</td></tr>\n<tr><td>24</td><td>기장 수임 법적 검토: 세무대리인 자격·수임 범위</td><td>SA-VAT-20 수임업체 집계 범위·SA-VAT-27/28 위임장 요건</td></tr>\n<tr><td>25</td><td>신고 승인 정책: <code>filingApprovalRequired</code> 무응답 처리</td><td>수정신고·경정청구 전송 보류/에스컬레이션</td></tr>\n<tr><td>43</td><td>매입원장 세무상태: NTS 코드↔홈택스 응답코드 매핑</td><td>불공제·대손 건 전송상태 대사, 마감 차단 여부</td></tr>\n<tr><td>52</td><td>일자 데이터 모델: VAT 신고 기준일 적용 규칙(증빙일자 vs 세무귀속일)</td><td>대손확정일·취득일자·공급일자의 귀속 과세기간 판정</td></tr>\n<tr><td>55</td><td>카드 VAT 공제 Rule 설계(N11): 판단 신호 가중치·검토 필요 분류 임계, 고객사별 커스터마이징 범위, 증빙 보완 SLA</td><td>SA-VAT-22 불공제 자동 추천·검토 큐 파라미터</td></tr></tbody></table></div>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1</h4><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>필수</th><th>설명·검증</th></tr></thead><tbody><tr><td>종사업장번호 / 환급창구운영사업자</td><td>번호/코드도움</td><td>필수</td><td>거래처등록 반영</td></tr>\n<tr><td>유치기관등록번호</td><td>번호</td><td>필수</td><td></td></tr>\n<tr><td>의료용역일련번호</td><td>번호(20자리)</td><td>자동</td><td>불러오기 시 1부터 순차 부여</td></tr>\n<tr><td>공급일자</td><td>일자</td><td>필수</td><td>의료용역공급확인서 기준</td></tr>\n<tr><td>환급/송금일자·증명서 송부일자</td><td>일자</td><td>필수</td><td></td></tr>\n<tr><td>공급금액(세금포함)·부가가치세·환급액</td><td>금액</td><td>필수</td><td></td></tr>\n<tr><td>외국인환자 인적사항</td><td>텍스트</td><td>필수</td><td>개인정보 마스킹 대상(00_개요 §3)</td></tr></tbody></table></div></section>\n<section class=\"doc-table-block\"><h4>상세 표 2</h4><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>엔티티</th><th>핵심 필드</th><th>PK/유니크·상태</th><th>근거</th></tr></thead><tbody><tr><td><code>NonDeductibleEntry</code>(불공제 명세)</td><td>attachmentId, reasonCode(사유 1/2/3/9/4/0/6/A/B), vendorRef, supplyAmount, vatAmount, sourceType(전표자동/직접입력/안분연동 — 세액÷10% 공급가액 자동)</td><td>예정누락은 명세 탭만</td><td>§25.13.1</td></tr>\n<tr><td><code>CommonInputTaxCalc</code>(공통매입 안분/정산/재계산)</td><td>calcType(안분/정산/재계산), formulaType(1.공급가액/2.매입가액/3.예정공급가액/4.예정사용면적/5.도축두수), totalSupply, exemptSupply, exemptRatio, commonInputTax, nonDeductibleTax, priorNonDeductible(직접), adjustTax(가산/공제), assetClass(건축구축물/기타), decliningRate(5%/25%), elapsedPeriods, reductionRate, exemptRatioChange(≥5%)</td><td>면세공급가액=0 &amp; 총공급가액≠0 마감 오류</td><td>§25.13.1</td></tr>\n<tr><td><code>FixedAssetAcqEntry</code>(감가상각자산 취득)</td><td>취득일자, 상호, 사업자번호, assetClass(1~4), supplyAmount, vatAmount, count, docType(1.세금계산서/2.신용카드)</td><td>신고서 고정자산란 대사</td><td>§25.13.2</td></tr>\n<tr><td><code>BadDebtEntry</code>(대손세액)</td><td>tabType(발생/변제), 당초공급일(2022-1기~ 필수), 대손사유/변제사유, 대손기준일, 대손확정일(부도+6개월 자동), 금액(부호 규칙), 세액(×10/110 자동), vendorId</td><td>공급일+10년 내 과세기간 검증</td><td>§25.13.3</td></tr>\n<tr><td><code>BranchVatStatement</code>(사업장별/단위과세 명세)</td><td>stmtType(총괄납부/사업자단위과세), businessPlaceId, 사업자등록번호/적용번호(종사업장 자동·0000), 총괄납부번호, 매출·매입 과표/세율/세액(불러오기), 가산세·공제세액(직접), 대손·미환급·고지(직접 조정)</td><td>사업장 불러오기 시 기존 삭제. 사업장 차원 RLS</td><td>§25.13.4~5</td></tr>\n<tr><td><code>AmendedFilingForm</code>(수정·경정 서식)</td><td>returnId, amendmentSeq, formType(추가납부계산서/경정청구서), 신고인정보(자동·수정불가), 수정사유, 법정/최초신고일(자동, 휴일 시 익일), 경정청구이유1/2(중복 금지), 국세환급금계좌, 위임장정보</td><td>≥0 수정신고 / &lt;0 경정청구 판정</td><td>§25.13.6~7</td></tr>\n<tr><td><code>CustomsRefundEntry</code>(관세환급금)</td><td>공급일자, 환급금액, 공급받는자(상호·사업자번호), 내국신용장번호(전자신고 필수)</td><td>12/16 거래처 설 0</td></tr>\n<tr><td>마스킹</td><td>주민번호 별표(SA-VAT-16/17/19), 외국인환자 인적사항(SA-VAT-35), 평문 조회 Step-up</td><td><code>PersonalDataAccessLog</code></td><td>§17, §25.12.8~9, §25.14.7</td></tr></tbody></table></div></section>\n<section class=\"doc-table-block\"><h4>상세 표 7 · 10. 연계</h4><div class=\"doc-caption\">10. 연계</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>방향</th><th>대상</th><th>내용</th><th>근거</th></tr></thead><tbody><tr><td>선행(P01)</td><td>회사등록·거래처등록</td><td>본지점설정(총괄납부/사업자단위과세), 국세환급금계좌(SA-VAT-18/28), 세무대리인 정보(SA-VAT-20/27/28 위임장), 거래처 카드탭 가맹점번호(SA-VAT-19)</td><td>§25.1.1, §25.12.10~12, §25.13.6~7</td></tr>\n<tr><td>선행(P03)</td><td>매입매출전표(SA-JNL-02)·SA-ATX</td><td>54.불공+불공제사유(51↔54 변경 규칙·불공제사유 팝업·일괄변경), 고정자산 계정 분기, 적요 06/07, 12/16/19/21/24 영세·전자 계열, 13/18/23 면세 계열</td><td>§25.4.2.2</td></tr>\n<tr><td>선행(P06)</td><td>SA-VAT-01/02/07/08</td><td>신고서 란 연동(3.1절 매핑), MRI 검토(안분·대손·월별판매액 가산세·재활용 한도), 전산매체 수록, 납부서 총괄납부 금액</td><td>§25.11.1~2·7~8, §25.13</td></tr>\n<tr><td>선행(P05)</td><td>마감 워크플로우</td><td>신고 완료 기간 <code>LOCKED</code> — 경정 대상 기간은 수정신고 절차로만 대응</td><td>§11.9-(1)(3)</td></tr>\n<tr><td>후행(P08)</td><td>SA-VAT-29~32·43(영세율)·SA-FA(고정자산)</td><td>SA-VAT-33 관세환급금 → 영세율매출명세서(SA-VAT-43) 집계, SA-VAT-23 ↔ 고정자산 모듈(취득 전표 연결)</td><td>§25.14.5, §25.13.2, §11.5-(2)</td></tr>\n<tr><td>내부</td><td>AUX-06 부가세 보조원장(P04)</td><td>세무구분·사유구분·<code>ntsStatus</code> 집계, 프로젝트·부서·사업장 차원 분류, 과세유형별(과세/영세율/면세/불공제) 매출 구분 집계</td><td>§11.4-(4)</td></tr>\n<tr><td>내부</td><td>미결항목(18.3)·검토 큐</td><td>카드 VAT 검토 필요 건, 증빙 보완 요청 워크플로우</td><td>§11.1.1-(16), §18.3</td></tr>\n<tr><td>내부</td><td>알림 엔진</td><td>신고 기한 D-N·승인 요청·Ack 리마인드(P06 공유 단일 엔진)</td><td>§18, §14</td></tr>\n<tr><td>외부</td><td>국세청 홈택스 API</td><td>전산매체 제출(첨부서식 수록), 사업자상태(휴폐업 — 대손 거래처 검증 지원)</td><td>§25.11.7, §8.4, §11.4</td></tr>\n<tr><td>표준</td><td><code>STD_PURCHASE_TAX_STATUS</code> 카탈로그</td><td>세무구분·사유구분·전송상태·증빙상태 코드 버전 배포</td><td>§6</td></tr></tbody></table></div></section>\n<section class=\"doc-table-block\"><h4>상세 표 8</h4><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>구분</th><th>시나리오</th></tr></thead><tbody><tr><td>불공제 집계</td><td>불공제사유 코드 9종별 전표 → 명세 자동반영, 51↔54 변경 시 사유 팝업·재집계(§25.4.2.2)</td></tr>\n<tr><td>안분·정산·재계산</td><td>계산식 1~5 각각, 예정 안분→확정 정산 기 불공제 차감, 면세비율 증감 5% 경계, 안분 제외(5% 미만)</td></tr>\n<tr><td>감가상각자산</td><td>취득 유형(세금계산서/신용카드)×자산구분 4종 집계, 미작성 시 마감 유의사항, 신고서란 대사</td></tr>\n<tr><td>대손세액</td><td>부도+6개월 자동 확정일, 10년 경계, 발생/회수·변제 부호 4조합의 신고서 반영 방향</td></tr>\n<tr><td>멀티사업장</td><td>본·지점 신고서 합산=총괄 납부세액, 지점 권한 없는 접근 차단, 사업장 불러오기 재실행 멱등</td></tr>\n<tr><td>수정·경정</td><td>수정신고서 저장 전 작성 차단, ≥0/&lt;0 분기, 청구이유 중복 차단, 휴일 법정신고일 익일 처리</td></tr>\n<tr><td>전자신고 필수값</td><td>내국신용장번호·결제처리번호·물품명 등 누락 시 제작 오류(SA-VAT-07 검증 단계)</td></tr>\n<tr><td>카드 VAT(N11)</td><td>공제/불공제/검토필요 3분류, 주말·고액·반복 결제 신호, 고객사별 Rule 보정, 이중공제 차단</td></tr>\n<tr><td>2차 서식</td><td>계정/가맹점/공급처 설정 → 불러오기 → 조건별 삭제, SA-VAT-18 마감 필수값·마감 후 수정불가, 공제한도(300만/750만)</td></tr>\n<tr><td>통제</td><td>비주기장 시도, Ack 미완료, Step-up 미수행, <code>LOCKED</code> 기간, RLS 교차 테넌트·교차 사업장</td></tr>\n<tr><td>성능</td><td>신고 성수기(1월·부가세 신고월) 부속서류 대량 집계 — 무중단·자동 스케일(§15 하단)</td></tr></tbody></table></div></section>\n<section class=\"doc-table-block\"><h4>상세 표 9 · 12. 잔여 확인사항 (§23 연계)</h4><div class=\"doc-caption\">12. 잔여 확인사항 (§23 연계)</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>§23 번호</th><th>항목</th><th>본 페이즈 영향</th></tr></thead><tbody><tr><td>19</td><td>마감 정책: <code>LOCKED</code> 전환 조건(신고 완료 기준)</td><td>경정청구 대상 기간의 원장 접근·조정 절차 정의</td></tr>\n<tr><td>24</td><td>기장 수임 법적 검토: 세무대리인 자격·수임 범위</td><td>SA-VAT-20 수임업체 집계 범위·SA-VAT-27/28 위임장 요건</td></tr>\n<tr><td>25</td><td>신고 승인 정책: <code>filingApprovalRequired</code> 무응답 처리</td><td>수정신고·경정청구 전송 보류/에스컬레이션</td></tr>\n<tr><td>43</td><td>매입원장 세무상태: NTS 코드↔홈택스 응답코드 매핑</td><td>불공제·대손 건 전송상태 대사, 마감 차단 여부</td></tr>\n<tr><td>52</td><td>일자 데이터 모델: VAT 신고 기준일 적용 규칙(증빙일자 vs 세무귀속일)</td><td>대손확정일·취득일자·공급일자의 귀속 과세기간 판정</td></tr>\n<tr><td>55</td><td>카드 VAT 공제 Rule 설계(N11): 판단 신호 가중치·검토 필요 분류 임계, 고객사별 커스터마이징 범위, 증빙 보완 SLA</td><td>SA-VAT-22 불공제 자동 추천·검토 큐 파라미터</td></tr></tbody></table></div></section>","validationHtml":"<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>필수</th><th>설명·검증</th></tr></thead><tbody></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>연계</strong>: 거래처등록(환급창구운영사업자), SA-VAT-01 48.외국인관광객환급.</li>\n</ul>\n<blockquote>엔티티 명칭 중 § 근거 표기가 있는 필드·상태는 설계서 명시값이며, 부속서류 헤더 등 구조 명칭은 §25.12~25.14의 화면 기능(작성조회·마감·불러오기)을 본 페이즈에서 구체화한 것이다. <code>VatReturn</code>·<code>VatAttachmentForm</code>·<code>ElectronicFilingJob</code> 등 공통 헤더는 P06 §5를 공유한다.</blockquote>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th><code>CommonInputTaxCalc</code>(공통매입 안분/정산/재계산)</th><th>calcType(안분/정산/재계산), formulaType(1.공급가액/2.매입가액/3.예정공급가액/4.예정사용면적/5.도축두수), totalSupply, exemptSupply, exemptRatio, commonInputTax, nonDeductibleTax, priorNonDeductible(직접), adjustTax(가산/공제), assetClass(건축구축물/기타), decliningRate(5%/25%), elapsedPeriods, reductionRate, exemptRatioChange(≥5%)</th><th>면세공급가액=0 &amp; 총공급가액≠0 마감 오류</th><th>§25.13.1</th></tr></thead><tbody><tr><td><code>BadDebtEntry</code>(대손세액)</td><td>tabType(발생/변제), 당초공급일(2022-1기~ 필수), 대손사유/변제사유, 대손기준일, 대손확정일(부도+6개월 자동), 금액(부호 규칙), 세액(×10/110 자동), vendorId</td><td>공급일+10년 내 과세기간 검증</td><td>§25.13.3</td></tr>\n<tr><td><code>TouristRefundEntry</code>(외국인관광객 면세판매/의료용역)</td><td>entryType(면세판매/미용성형), 종사업장번호, 면세판매장지정번호/환급창구운영사업자, 구매일련번호/의료용역일련번호(20자리·순차), 판매/공급일자, 반출일자·반출승인번호, 환급(송금)일자·환급액, 세목별 금액(부가세·개소세·교육세·농특세), 유치기관등록번호, 환자 인적사항</td><td>일련번호 순차 부여</td><td>§25.14.6~7</td></tr>\n<tr><td><code>AgriRefundClaim</code>(농어업기자재 환급)</td><td>탭(환급신청내용/매입세금계산서), 환급계좌, 직접대행구분(0/1), 수량(마감 필수), 사업자/주민번호(마감 필수)</td><td>마감 후 수정불가</td><td>§25.12.10</td></tr>\n<tr><td><code>EFilingCreditClaim</code>(전자신고세액공제)</td><td>수임업체 건수, 공제세액(건수×1만원), 한도(개인 300만/법인 750만), 세무대리인정보</td><td>직전과세기간 마감분 집계(멀티테넌트 관계)</td><td>§25.12.12</td></tr>\n<tr><td><code>PurchaseLedgerLine</code>(매입원장 — P06 공유)</td><td>taxCategory, reasonCode(사유구분), deductibleType, ntsStatus, evidenceStatus</td><td>불공제/면세/영세율 <strong>사유 필수</strong> 검증</td><td>§11.4-(1)</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>매입 세무구분·사유구분·전송상태·증빙상태 코드는 공통 표준 <code>STD_PURCHASE_TAX_STATUS</code> 카탈로그 버전으로 배포(§6 표 — 11.4 연계).</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">6. API 설계</h3>\n<blockquote>P06 §6의 부속서류 공통 API(<code>/attachments/{formType}/load</code>·<code>/close</code>)를 재사용하고, 본 페이즈 특화 리소스만 추가한다. 엔드포인트는 §25.13~25.14의 화면 기능(불러오기·마감·수정차수·정산 계산)을 REST로 구체화한 대표 설계다(§13.1 공통 인터셉터 준용).</blockquote>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>메서드</th><th>엔드포인트</th><th>설명</th><th>멱등성·오류</th></tr></thead><tbody><tr><td>POST</td><td><code>/api/tenant/vat/attachments/{formType}/close</code></td><td>부속서류 마감(SA-VAT-18: 수량·사업자/주민번호 필수, 마감 후 수정불가)</td><td><code>VALIDATION_FAILED</code></td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/bad-debts</code></td><td>대손 건 등록(10/110 자동, 10년 기간·부호 규칙 검증)</td><td><code>VALIDATION_FAILED</code></td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/branch-statements/{type}/load</code></td><td>사업장별/단위과세 &quot;부가가치세 불러오기&quot;(본·지점 신고서 반영, 기존 삭제)</td><td>Idempotency-Key, 지점 권한 <code>FORBIDDEN_SCOPE</code></td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/returns/{id}/amend-forms</code></td><td>수정차수 연동 서식 생성(≥0 → 추가납부계산서 / &lt;0 → 경정청구서 자동 분기)</td><td>수정신고서 저장 선행 검증</td></tr>\n<tr><td>PUT</td><td><code>/api/tenant/vat/amend-forms/{id}</code></td><td>수정사유·경정청구이유·환급계좌 보정(이유 1/2 중복 차단)</td><td>version 낙관적 락</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/efiling-credit/load</code></td><td>수임업체 건수 집계(직전과세기간 마감분 × 1만원, 한도 검증)</td><td>한도 초과 시 경고</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/attachments/{formType}/excel-import</code></td><td>엑셀 업로드(SA-VAT-33/34/35/20 등)</td><td>오류행 리포트</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>오류코드</strong>(§13.3): <code>VALIDATION
