</td><td>64.복지, 57.카과+복지카드 계정 차량유지비 매핑</td><td>복지카드 계정과목 설정 기능</td></tr>\n<tr><td>사업용신용카드</td><td>57.카과/58.카영/59.카면</td><td>법인/개인·매입카드 구분</td></tr>\n<tr><td>기타신용카드</td><td>가맹점·회원인적사항 필수</td><td>제로페이는 카드번호=주민등록번호</td></tr>\n<tr><td>합계</td><td>4개 유형 집계</td><td></td></tr></tbody></table></div>\n<p><strong>기능·동작</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>기능</th><th>동작</th></tr></thead><tbody><tr><td>증빙 유형 분류</td><td>카드 증빙(현금영수증·복지·사업용·기타) 유형 분류·의제매입 적요 연동을 증빙 메타데이터로 관리</td></tr>\n<tr><td>공제대상 룰</td><td>매입세액 공제대상 룰 테넌트별 적용(카드 VAT 공제 자동 추천 N11, §11.1.1-(16) 연계)</td></tr>\n<tr><td>불러오기</td><td>기존 삭제 후 재집계</td></tr>\n<tr><td>마감</td><td>매출·매입 동시 마감</td></tr>\n<tr><td>기타</td><td>휴폐업조회, 예정누락, 데이터 정렬</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>산출물</strong>: 신용카드수령명세서(갑)·관리용 인쇄. 카드 마스터(법인/개인·사업용 구분)·증빙 메타·기수 기간 관리.</li>\n<li><strong>연계</strong>: SA-VAT-01 41/42.신용매출전표수취(일반/고정)란, 매입매출전표(57/58/59/61/62/63/64), 휴폐업 외부 API.</li>\n<li><strong>검증</strong>: 세금계산서 수취 건 카드 공제=이중공제 차단(§15 R16, §11.1.1-(16) ④).</li>\n</ul>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1</h4><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>탭</th><th>대상 유형·조건</th><th>비고</th></tr></thead><tbody><tr><td>현금영수증</td><td>61.현과, 62.현면 중 의제매입 재고자산코드 14600~17599·적요06</td><td></td></tr>\n<tr><td>화물운전자 복지카드</td><td>64.복지, 57.카과+복지카드 계정 차량유지비 매핑</td><td>복지카드 계정과목 설정 기능</td></tr>\n<tr><td>사업용신용카드</td><td>57.카과/58.카영/59.카면</td><td>법인/개인·매입카드 구분</td></tr>\n<tr><td>기타신용카드</td><td>가맹점·회원인적사항 필수</td><td>제로페이는 카드번호=주민등록번호</td></tr>\n<tr><td>합계</td><td>4개 유형 집계</td><td></td></tr></tbody></table></div></section>\n<section class=\"doc-table-block\"><h4>상세 표 2</h4><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>기능</th><th>동작</th></tr></thead><tbody><tr><td>증빙 유형 분류</td><td>카드 증빙(현금영수증·복지·사업용·기타) 유형 분류·의제매입 적요 연동을 증빙 메타데이터로 관리</td></tr>\n<tr><td>공제대상 룰</td><td>매입세액 공제대상 룰 테넌트별 적용(카드 VAT 공제 자동 추천  정합성 검증을 SA-VAT-03과 공통 파이프라인으로 재사용. 휴폐업조회, 불러오기, 마감(매출·매입 동시, 사업자번호 불일치 시 실패), 합산, 제출용자료조회.</li>\n<li><strong>산출물</strong>: 전자신고·전산매체 제출 파일, 엑셀변환. 신고일자=종료월 다음달 25일.</li>\n<li><strong>연계</strong>: 매입매출전표(13/53), SA-VAT-01 면세 명세, SA-VAT-03 공통 전송상태 판정.</li>\n</ul>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1</h4><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>필수</th><th>설명</th></tr></thead><tbody><tr><td>유형</td><td>전자/전자외</td><td>필수</td><td>종료일 다음달 11일 기준, 국세청신고여부 1.부</td></tr>\n<tr><td>구분</td><td>사업자/주민번호</td><td>필수</td><td></td></tr>\n<tr><td>매출·매입처별 매수·공급가액·부가세</td><td>그리드</td><td>자동</td><td></td></tr>\n<tr><td>전표추가</td><td>직접입력·엑셀업로드</td><td>—</td><td>전자외 집계</td></tr></tbody></table></div></section>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>기능</strong>: 전자계산서 전송상태 판정·거래처 정합성 검증을 SA-VAT-03과 공통 파이프라인으로 재사용. 휴폐업조회, 불러오기, 마감(매출·매입 동시, 사업자번호 불일치 시 실패), 합산, 제출용자료조회.</li>\n<li><strong>연계</strong>: 매입매출전표(13/53), SA-VAT-01 면세 명세, SA-VAT-03 공통 전송상태 판정.</li>\n</ul>","fields":[{"name":"유형","desc":"전자/전자외"},{"name":"구분","desc":"사업자/주민번호"},{"name":"매출·매입처별 매수·공급가액·부가세","desc":"그리드"},{"name":"전표추가","desc":"직접입력·엑셀업로드"}],"tableCount":1,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-VAT-06","title":"계산서합계표","purpose":"면세 계산서 합계표","linkage":"SA-ATX-03","note":"","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-VAT-07","title":"부가가치세 전자신고","phase":"1차","basis":"§25.11.7","impl":"","tabs":"","sid":"sa_vat_07","prefix":"SA-VAT","group":"부가세·신고","purpose":"신고서·부속서류 전자신고 변환·제출","detailHtml":"<h4 class=\"doc-h doc-h4\">4.7 부가가치세 전자신고 <code>SA-VAT-07</code> (1차, §25.11.7)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 부가세신고서 마감 후 홈택스 신고 전 전자파일 제작 — BK 전자신고 파이프라인의 핵심.</li>\n</ul>\n<p><strong>입력 필드</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>영역</th><th>항목</th><th>설명·검증</th></tr></thead><tbody><tr><td>제출자등록</td><td>신고구분(1.세무대리인/2.일반업체)</td><t ss=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>설명</th></tr></thead><tbody><tr><td>구분</td><td>선택</td><td>계산서(53.면세)/영수증(58.카면·60.면건·62.현면·일반전표)</td></tr>\n<tr><td>전표 출처</td><td>선택</td><td>매입/일반/입력</td></tr>\n<tr><td>불러오기 기준</td><td>설정</td><td>계정과목 / 적요 비고(성격) '5.구리스크랩(부가)' 재고자산 146~175</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: 적요 성격(5.구리스크랩) 기반 집계, 매입자 납부특례를 증빙 메타로 관리. 예정누락, 공제율 일괄변경, 주민번호 별표.</li>\n<li><strong>산출물</strong>: 구리스크랩등 매입세액공제신고서, 매입처명세(합산용).</li>\n<li><strong>연계</strong>: SA-VAT-12 '구리스크랩 불러오기'로 합산 → SA-VAT-01 44.재활용폐자원등매입세액.</li>\n</ul>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1</h4><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>설명</th></tr></thead><tbody><tr><td>구분</td><td>선택</td><td>계산서(53.면세)/영수증(58.카면·60.면건·62.현면·일반전표)</td></tr>\n<tr><td>전표 출처</td><td>선택</td><td>매입/일반/입력</td></tr>\n<tr><td>불러오기 기준</td><td>설정</td><td>계정과목 / 적요 비고(성격) '5.구리스크랩(부가)' 재고자산 146~175</td></tr></tbody></table></div></section>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>연계</strong>: SA-VAT-12 '구리스크랩 불러오기'로 합산 → SA-VAT-01 44.재활용폐자원등매입세액.</li>\n</ul>","fields":[{"name":"구분","desc":"선택"},{"name":"전표 출처","desc":"선택"},{"name":"불러오기 기준","desc":"설정"}],"tableCount":1,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-VAT-13","title":"구리스크랩등 매입세액공제신고서","purpose":"구리스크랩 매입 공제","linkage":"11.4","note":"","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-VAT-14","title":"현금매출명세서","phase":"1차","basis":"§25.12.6","impl":"","tabs":"","sid":"sa_vat_14","prefix":"SA-VAT","group":"부가세·신고","purpose":"현금매출 업종 명세","detailHtml":"<h4 class=\"doc-h doc-h4\">4.14 현금매출명세서 <code>SA-VAT-14</code> (1차, §25.12.6)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 예식장·부동산중개·보건(병·의원)·변호사·세무사·회계사 등 전문서비스업의 현금매출 부속서류.</li>\n</ul>\n<p><strong>입력 필드</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>필수</th><th>설명</th></tr></thead><tbody><tr><td>구분</td><td>선택</td><td>필수</td><td>현금매출사업자</td></tr>\n<tr><td>주민/사업자등록번호</td><td>번호</td><td>필수</td><td></td></tr>\n<tr><td>성명(상호)</td><td>텍스트</td><td>필수</td><td></td></tr>\n<tr><td>거래일자</td><td>일자</td><td>필수</td><td></td></tr>\n<tr><td>거래금액</td><td>금액</td><td>필수</td><td>공급가액 입력 시 부가세·공급대가 자동</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>주민번호 기재 세금계산서 발급분(부가세법 32조1항2호)은 현금매출란에 포함.</li>\n<li><strong>기능</strong>: 제출대상 업종코드 마스터와 현금매출 계정 매핑을 테넌트별 관리. 편집(건수·합계), 일괄삭제, 불러오기(계정 202~230/401~420/901~930 또는 과세유형별), 예정누락, 제출업종안내, 엑셀.</li>\n<li><strong>산출물</strong>: 현금매출명세서. <strong>연계</strong>: SA-VAT-01 첨부, SA-VAT-02 현금매출명세서 제출누락 검토.</li>\n</ul>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1</h4><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>필수</th><th>설명</th></tr></thead><tbody><tr><td>구분</td><td>선택</td><td>필수</td><td>현금매출사업자</td></tr>\n<tr><td>주민/사업자등록번호</td><td>번호</td><td>필수</td><td></td></tr>\n<tr><td>성명(상호)</td><td>텍스트</td><td>필수</td><td></td></tr>\n<tr><td>거래일자</td><td>일자</td><td>필수</td><td></td></tr>\n<tr><td>거래금액</td><td>금액</td><td>필수</td><td>공급가액 입력 시 부가세·공급대가 자동</td></tr></tbody></table></div></section>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>산출물</strong>: 현금매출명세서. <strong>연계</strong>: SA-VAT-01 첨부, SA-VAT-02 현금매출명세서 제출누락 검토.</li>\n</ul>","fields":[{"name":"구분","desc":"선택"},{"name":"주민/사업자등록번호","desc":"번호"},{"name":"성명(상호)","desc":"텍스트"},{"name":"거래일자","desc":"일자"},{"name":"거래금액","desc":"금액"}],"tableCount":1,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-VAT-14","title":"현금매출명세서","purpose":"현금매출 업종 명세","linkage":"SA-LDG-09","note":"전문직 등","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-VAT-15","title":"동물진료용역매출명세서","phase":"2차","basis":"§25.12.7, §22.2","impl":"","tabs":"","sid":"sa_vat_15","prefix":"SA-VAT","group":"부가세·신고","purpose":"수의 진료 면세/과세 매출","detailHtml":"<h4 class=\"doc-h doc-h4\">4.15 동물진료용역매출명세서 <code>SA-VAT-15</code> (2차, §25.12.7)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 동물진료용역 제공 사업자 부속서류. 가축·수산동물·장애인보조견·기초수급자 동물진료·질병예방목적 진료는 부가세 적용배제 대상.</li>\n</ul>\n<p><strong>입력 필드</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>설명</th></tr></thead><tbody><tr><td>구분</td><td>선택(5구분)</td><td>가축/수산동물/장애인보조견/기초수급자/질병예방</td></tr>\n<tr><td>계정과목 설정</td><td>코드도움</td><td>구분별 계정과목 설정 후 불러오기</td></tr>\n<tr><td>불러오기 대상</td><td>자동</td><td>매출유형 13.면세/18.카면/20.면건/23.현면</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: 진료유형별 계정 매핑과 면세 전표 집계를 테넌트별 구현, 구분별 자동 분류.</li>\n<li><strong>산출물</strong>: 동물진료용역매출명세서. <strong>연계</strong>: 매입매출전표(13/18/20/23), SA-VAT-01.</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">5. 데이터 모델</h3>\n<blockquote>엔티티 명칭 중 § 근거 표기가 있는 필드·상태는 설계서 명시값이며, 신고서 헤더 등 구조 명칭은 §25.11의 화면 기능(작성조회·차수·마감)을 본 페이즈에서 구체화한 것이다.</blockquote>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>엔티티</th><th>핵심 필드</th><th>PK/유니크·상태</th><th>근거</th></tr></thead><tbody><tr><td><code>VatReturn</code>(부가세신고서)</td><td>tenantId, fiscalYear, taxPeriodFrom/To, filingType(1.예정/2.확정/3.영세율조기환급/4.기한후), taxUnit(사업장별/총괄/사업자단위), businessPlaceId, amendmentSeq(수정차수), status(작성중→마감), eFilingFlag(전자신고여부 0/x), forcedCloseFlag(&lt;유의사항&gt; 강제마감), refundAccountRef</td><td>UQ(tenantId, 과세기간, filingType, taxUnit, amendmentSeq). 정기신고 마감 선행 후 수정신고</td><td>§25.11.1</td></tr>\n<tr><td><code>VatReturnLine</code></td><td>returnId, lineCode(신고서식 란번호 11~48·50~58 등), taxBase(과표), taxAmount(세액), sourceType(자동집계/직접입력), 수정전/수정후 구분</td><td>수정전=정기신고분 자동·수정불가</td><td>§25.11.1</td></tr>\n<tr><td><code>VatAttachmentForm</code>(부속서류 공통 헤더)</td><td>tenantId, returnId, formType(SA-VAT-03~15…), status(작성/마감), closedAt, 매출·매입 동시 마감 플래그</td><td>마감 시 거래처 사업자번호 정합 검증</td><td>§25.11.3, §25.11.6</td></tr>\n<tr><td><code>ElectronicFilingJob</code>(전자신고)</td><td>returnId, jobType(정기/기한후/수정), fileFormat(.101/.102), fileName(제작일), filePassword(8~15자리), status(제작오류/제작완료/검증오류/검증완료/제출오류/제출확인), excludeFlag(제작제외 — 마감해지 후 유지), hometaxAutoFlag</td><td>재마감 시 상태 공란화. 멱등 작업큐</td><td>§25.11.7</td></tr>\n<tr><td><code>FilingSubmitterProfile</code>(제출자등록)</td><td>tenantId, submitterType(1.세무대리인/2.일반업체), hometaxUserId(공통/개별), 제출자구분·관리번호·조정반번호</td><td>일반업체=회사등록 불러오기</td><td>§25.11.7</td></tr>\n<tr><td><code>tax_type_master</code></td><td>과세유형 코드(매출 11~25/매입 51~64), 세율, 부가세계정, 신고서식 매핑, 전자발행 가능, 증빙요건</td><td>단일 진실원</td><td>§0.4 P2, §25.4.2.2</td></tr>\n<tr><td><code>PurchaseLedgerLine</code>(매입원장)</td><td>postingDate, journalEntryId/LineId, vendorId, businessRegistrationNo, taxCategory(세무구분), reasonCode, supplyAmount, vatAmount, grossAmount, deductibleType, businessPlaceId, evidenceId, taxInvoiceId, ntsStatus, evidenceStatus, sourceSystem</td><td>ntsStatus 8종: NOT_TARGET/PENDING/ISSUED/SENT/ACCEPTED/REJECTED/CANCELLED/MANUAL_EVIDENCE</td><td>§11.4-(1)(2)</td></tr>\n<tr><td><code>TaxInvoiceTransmission</code></td><td>taxInvoiceId, ntsStatus, sentAt, acceptedAt, rejectedReason, sourceRef</td><td>전자/전자외 판정 원천</td><td>§11.4-(2)</td></tr>\n<tr><td><code>PurchaseTaxStatusHistory</code></td><td>lineId, beforeStatus, afterStatus, changedBy, reason</td><td>append-only</td><td>§11.4-(2)</td></tr>\n<tr><td><code>DeemedInputEntry</code>(의제매입 명세)</td><td>공급자, 사업자/주민번호, 취득일자, 구분(계산서/신용카드등/농어민), 물품명, 수량, 매입가액, 공제율, 의제매입세액</td><td>정산: 한도율·당기매입액·기공제세액</td><td>§25.12.3</td></tr>\n<tr><td><code>RecycledWasteEntry</code>(재활용/구리스크랩)</td><td>구분(계산서/영수증), 종류(중고차/기타), 공제율(3/103·10/110·직접), 차량·차대번호, 매입자납부특례 표시</td><td>구리스크랩 합산 플래그</td><td>§25.12.4~5</td></tr>\n<tr><td><code>RealEstateRentalUnit</code>(임대물건)</td><td>상호, 층·호수·동, 사업자/주민번호, 임대면적, 용도, 임대기간, 보증금·월세·관리비, 적용이자율, 보증금이자(자동), 갱신일·퇴거일</td><td>현장/프로젝트 차원 연계</td><td>§25.12.1</td></tr>\n<tr><td><code>TenantAcknowledgement</code>(신고 승인/확인)</td><td>대상(마감/신고), status(PENDING→CONFIRMED/OBJECTED), 사유</td><td>ackPolicy=REQUIRED 시 후속 차단</td><td>§21.4-(4), §12.2</td></tr>\n<tr><td><code>FiscalPeriod</code>(기간 상태)</td><td>상태: FUTURE→OPEN→TEMP_CLOSED→CLOSED→<strong>LOCKED(신고 완료·아카이브, 마감해제 불가)</strong></td><td>수정신고 절차로만 대응</td><td>§11.9-(1)(3)</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>신고파일 상태 5종 등 기타 상태값은 부록 B 13.4·부록 C 14.5 준용(§12.2).</li>\n<li>테이블 공통 제약(tenant_id NOT NULL+RLS, 감사 필드, 물리 삭제 금지)은 00_개요 §3.</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">6. API 설계</h3>\n<blockquote><code>POST /api/tenant/filings/{id}/approve</code>는 §13.2 명시 엔드포인트, 나머지는 §25.11의 기능(부가세 집계 API·마감·제작·검증·제출)을 REST로 구체화한 대표 설계다. <code>VatService</code>·<code>TaxInvoiceService</code>는 §13.1(부록 B 14.1·부록 C 15장 준용 + 주기장 권한 검증 공통 인터셉터).</blockquote>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>메서드</th><th>엔드포인트</th><th>설명</th><th>멱등성·오류</th></tr></thead><tbody><tr><td>GET</td><td><code>/api/tenant/vat/returns?fiscalYear&amp;period&amp;filingType&amp;taxUnit&amp;amendmentSeq</code></td><td>신고서 조회(작성조회: 마감여부·과세구분)</td><td>—</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/returns</code></td><td>신고서 생성(과세유형 11~64 자동집계 — 부가세 집계 API, §25.11.1)</td><td>Idempotency-Key</td></tr>\n<tr><td>PUT</td><td><code>/api/tenant/vat/returns/{id}</code></td><td>직접입력 항목 보정(가산세·예정고지 등)</td><td>version 낙관적 락</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/returns/{id}/close</code></td><td>마감(32.합계 일치·환급계좌 검증 → 첨부서식·전자신고여부 지정)</td><td><code>VALIDATION_FAILED</code>, 강제마감 파라미터(&lt;유의사항&gt;만)</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/returns/{id}/mri-check</code></td><td>MRI 60여 항목 검사 실행(SA-VAT-02)</td><td>결과 리포트·리스크 스코어</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/returns/{id}/amend</code></td><td>수정신고 차수 생성(첨부서식 마감해제 선행, ≥0/&lt;0 분기)</td><td>정기신고 마감 선행 검증</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/attachments/{formType}/load</code></td><td>부속서류 불러오기(기존 삭제 후 재집계 — SA-VAT-04/05 등)</td><td>Idempotency-Key</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/attachments/{formType}/close</code></td><td>부속서류 마감(매출·매입 동시)</td><td>사업자번호 누락 시 실패</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/filings/{id}/approve</code></td><td><strong>신고 전송 전 이용회사 승인(Step-up)</strong></td><td>§13.2 명시. <code>FORBIDDEN_SCOPE</code></td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/filings/{id}/build</code></td><td>전산매체 제작(.101/.102, 비밀번호)</td><td>신고상태 갱신, 멱등 재처리</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/filings/{id}/validate</code></td><td>파일 검증</td><td>검증오류/검증완료</td></tr>\n<tr><td>POST</td><td><code>/api/tenant/vat/filings/{id}/submit</code></td><td>홈택스 제출(자동 전자신고)</td><td>Idempotency-Key, <code>EXTERNAL_INTEGRATION_FAILED</code></td></tr>\n<tr><td>GET</td><td><code>/api/tenant/vat/payment-slip/{returnId}</code></td><td>납부서 생성(2D 바코드)</td><td>바코드 필수항목 검증</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>오류코드</strong>(§13.3): <code>VALIDATION_FAILED</code>, <code>CLOSING_LOCKED</code>, <code>PERIOD_LOCKED</code>(신고 완료 기간 마감해제 불가), <code>NOT_PRIMARY_BOOKKEEPER</code>(비주기장 신고 시도), <code>BOOKKEEPING_NOT_CONTRACTED</code>, <code>IDEMPOTENCY_CONFLICT</code>(409), <code>EXTERNAL_INTEGRATION_FAILED</code>, <code>RATE_LIMITED</code>.</li>\n<li><strong>Scope</strong>(§13.3): <code>tenant:filing:approve</code>(이용회사 승인), 신고 전송·마감해제·평문 조회 등 위험 scope는 Step-up 인증 필수.</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">7. 배치 / 스케줄</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>배치</th><th>주기·트리거</th><th>내용</th><th>실패 처리</th><th>근거</th></tr></thead><tbody><tr><td>신고 집계 잡</td><td>신고기 월 정기/수동</td><td>과세유형별 부가세 집계 뷰 갱신</td><td>멱등·재처리·실패 알림</td><td>§14 회사 배치</td></tr>\n<tr><td>매입원장 세무상태/NTS 대사 잡</td><td>주기적</td><td><code>ntsStatus</code> ↔ 홈택스/국세청 수신 결과 대사(8.4)</td><td>REJECTED/PENDING 마감 체크리스트 표시</td><td>§14, §11.4-(1)</td></tr>\n<tr><td>전자세금계산서 수신 잡</td><td>정기</td><td>국세청 수신분 반영 → 전자/전자외 판정 원천</td><td>멱등</td><td>§14</td></tr>\n<tr><td>신고기한 알림(D-N) 잡</td><td>D-N 규칙</td><td>부가세 신고 기한 D-N 자동 발송(<code>NotificationSchedule</code>), 세무 일정은 세법 룰 마스터(6장) 버전 연동. SMS/알림톡=신고 D-day 긴급 채널</td><td>DLQ+운영 콘솔</td><td>§14, §18.1</td></tr>\n<tr><td>휴폐업 상태 갱신</td><td>매주 월요일</td><td>거래처 휴폐업조회 갱신(SA-VAT-03/04/06)</td><td>재시도</td><td>§25.11.3</td></tr>\n<tr><td>확인(Ack) 리마인드 잡</td><td>D+3/D+7</td><td><code>PENDING</code> 신고 승인·확인 리마인드, 장기 미확인 에스컬레이션</td><td>에스컬레이션</td><td>§14 기장 운영 배치</td></tr>\n<tr><td>환율(매매기준율) 동기화</td><td>일별(20시 이후)</td><td>서울외국환중개 기준, 토·일·공휴일 제외 — MRI 부속 조회 원천</td><td>재시도</td><td>§25.11.2, §14</td></tr>\n<tr><td>홈택스 자동제출 작업큐</td><td>이벤트</td><td>테넌트별 작업큐로 제출(약 15단계 자동화)</td><td>제출오류 상태·재처리</td><td>§25.11.7</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">8. 검증·오류 처리</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>검증 항목</th><th>차단/경고</th><th>근거</th></tr></thead><tbody><tr><td>1</td><td>매출 합계 ↔ 과세표준명세 32.합계 불일치</td><td>차단(마감·전자신고 오류)</td><td>§25.11.1</td></tr>\n<tr><td>2</td><td>환급액 5천만원 초과 시 환급계좌 입력</td><td>차단(입력 시 오류)</td><td>§25.11.1</td></tr>\n<tr><td>3</td><td>MRI 오류리스트 &lt;유의사항&gt;</td><td>경고(강제마감 가능), 그 외 오류는 차단</td><td>§25.11.1</td></tr>\n<tr><td>4</td><td>수정신고 작성 시 정기신고 미마감</td><td>차단(정기신고 저장·마감 선행)</td><td>§25.11.1</td></tr>\n<tr><td>5</td><td>합계표 마감 시 거래처 사업자등록번호 누락·전표 불일치</td><td>차단(마감화일 작성 실패)</td><td>§25.11.3, §25.11.6</td></tr>\n<tr><td>6</td><td>세금계산서 수취 건의 카드 매입세액 공제(이중공제)</td><td>차단</td><td>§15 R16, §11.1.1-(16)</td></tr>\n<tr><td>7</td><td>동일 카드승인건 다중 전표 연결</td><td>차단(증빙 중복 사용 방지)</td><td>§15 R16</td></tr>\n<tr><td>8</td><td>매출 세금계산서(11) 발급 후 카드매출(17) 추가 입력</td><td>차단(중복 신고 방지 — 결제수단만 분개)</td><td>§25.4.2.2</td></tr>\n<tr><td>9</td><td>매입원장 세무구분·증빙유형 불일치</td><td><code>REVIEW_REQUIRED</code> + 신고 집계 경고/차단(회사 정책), 미결항목 생성 가능</td><td>§15, §11.4</td></tr>\n<tr><td>10</td><td>국세청 전송상태 <code>REJECTED</code>/미수신</td><td>마감 체크리스트 표시, 전자세금계산서 필수 거래는 마감 차단 가능</td><td>§15, §11.4</td></tr>\n<tr><td>11</td><td>부가세 계정-부가세코드 불일치</td><td>경고(세무헤더 대조)</td><td>§15</td></tr>\n<tr><td>12</td><td>2D 바코드 필수항목(세무서코드·납부기한·사업장등록번호/주민번호) 미입력</td><td>바코드 미반영</td><td>§25.11.8</td></tr>\n<tr><td>13</td><td>임대기간 누락 자료 불러오기</td><td>차단(불러오기 불가)</td><td>§25.12.1</td></tr>\n<tr><td>14</td><td>의제매입 물품명 미입력</td><td>전자신고 필수 — 제작 오류</td><td>§25.12.3</td></tr>\n<tr><td>15</td><td>예정누락 입력월 오류(확정기간 외 월)</td><td>차단(1~3·7~9월만 허용)</td><td>§25.4.2.2</td></tr>\n<tr><td>16</td><td>비주기장 측 신고 시도</td><td>차단 <code>NOT_PRIMARY_BOOKKEEPER</code></td><td>§15, §21.1</td></tr>\n<tr><td>17</td><td>Ack 미완료/이의 미해소 상태 신고 생성</td><td><code>ackPolicy=REQUIRED</code> 시 차단</td><td>§15, §21.4</td></tr>\n<tr><td>18</td><td>신고 승인 누락·미수임 전송</td><td><code>filingApprovalRequired=Y</code> 시 승인 전 전송 차단, 주기장=OPERATOR 미수임 시 전송 차단</td><td>§15, §21.4-(5)</td></tr>\n<tr><td>19</td><td><code>LOCKED</code> 기간 마감해제 시도</td><td>차단(수정신고 절차 안내), 시도 감사로그</td><td>§15, §11.9</td></tr>\n<tr><td>20</td><td>멱등키 충돌(제작·제출 재호출)</td><td>409 <code>IDEMPOTENCY_CONFLICT</code></td><td>§15, §13.3</td></tr>\n<tr><td>21</td><td>적격증빙 미충족 거래</td><td>가산세 대상 플래그, 세무조정 검토 목록</td><td>§15</td></tr>\n<tr><td>22</td><td>농어업기자재 등 마감 후 수정</td><td>마감 후 수정불가 패턴(부속서류 공통)</td><td>§25.12.10</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">9. 권한·SOD·감사</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>화면/행위</th><th>역할·scope</th><th>통제</th><th>근거</th></tr></thead><tbody><tr><td>신고서 생성·마감(SA-VAT-01)</td><td>주기장 측 담당(BK_PREPARER/이용회사 세무담당)</td><td>마감·결산·신고 서비스에 주기장 권한 검증 공통 인터셉터</td><td>§11.4, §13.1</td></tr>\n<tr><td>신고 승인</td><td>이용회사 승인자 <code>tenant:filing:approve</code></td><td><code>filingApprovalRequired=Y</code>(기본): 요약(과세표준·세액) 송부 → <strong>Step-up 승인</strong> → 전송. 승인 이력은 신고 감사로그+<code>bookkeepingMode</code> 표식</td><td>§21.4-(5), §13.3</td></tr>\n<tr><td>전자신고 전송(SA-VAT-07)</td><td>주기장 측. 주기장=OPERATOR는 세무대리 수임(<code>contractRef</code>) 검증</td><td>위험 scope Step-up, 미수임 전송 차단</td><td>§21.4-(5), §13.3</td></tr>\n<tr><td>총괄납부 본·지점 제작</td><td>지점회사 권한 필요</td><td>사업장 차원 RLS로 지점 데이터 접근 제어</td><td>§25.11.7, §25.13.4</td></tr>\n<tr><td>SOD</td><td>작성≠승인(신고서 작성자와 승인자 분리)</td><td>기장 Role-거버넌스 승인자 겸직 차단</td><td>00_개요 §3, §4.5</td></tr>\n<tr><td>감사</td><td>신고서 CUD·마감·강제마감·전송·승인 <code>DataChangeLog</code> append-only, 전후값·IP·행위자</td><td>신고 전송 화면은 주기장=OPERATOR면 요약+전송 승인 버튼 중심 재구성</td><td>§17, §21.8</td></tr>\n<tr><td>마스킹</td><td>주민번호 별표(SA-VAT-10/13 등), 평문 조회는 Step-up</td><td></td><td>§17, §25.12.2</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">10. 연계</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>방향</th><th>대상</th><th>내용</th><th>근거</th></tr></thead><tbody><tr><td>선행(P01)</td><td>회사등록·환경설정·거래처등록</td><td>법인/개인·과세유형·업태/종목/업종코드·본지점설정·국세환급금계좌, 과세유형 추가(25/63)·봉사료·소수점 끝수·중고차량 설정, 사업자번호·단위신고거래처</td><td>§25.1.1, §25.1.3, §25.1.6</td></tr>\n<tr><td>선행(P03)</td><td>매입매출전표(SA-JNL-02)·SA-ATX-02~05</td><td>과세유형 11~64 세무헤더, 전자발행·수집자료, 예정누락 대상월</td><td>§25.4.2, §25.5</td></tr>\n<tr><td>선행(P05)</td><td>마감 워크플로우</td><td>신고 완료 기간 <code>LOCKED</code>, <code>ackPolicy</code> 게이트</td><td>§11.9</td></tr>\n<tr><td>후행(P07)</td><td>SA-VAT-22(불공제)·23(감가상각자산취득)·24(대손)·25/26(사업장별·단위과세)·27/28(수정·경정)</td><td>신고서 50.불공/고정자산란/8.대손세액가감/총괄납부란/수정차수 연동</td><td>§25.13</td></tr>\n<tr><td>후행(P08)</td><td>SA-VAT-29~32(수출실적 등)·48·49</td><td>영세율 첨부, MRI 원화환가 검토</td><td>§25.14</td></tr>\n<tr><td>외부</td><td>국세청 홈택스 API</td><td>전자신고 자동제출, 전자(세금)계산서 전송상태, 사업자상태(휴폐업)·진위확인, 테넌트 인증정보 볼트(8장)</td><td>§25.11.7, §11.4, §8.4</td></tr>\n<tr><td>외부</td><td>서울외국환중개</td><td>매매기준율(MRI 부속)</td><td>§25.11.2</td></tr>\n<tr><td>내부</td><td>알림 엔진</td><td>신고 기한 D-N·신고 승인 요청·Ack 요청 단일 알림 엔진</td><td>§18, §18.1</td></tr>\n<tr><td>내부</td><td>AUX-06 부가세 보조원장(P04)</td><td>세무구분별 집계·<code>ntsStatus</code> 대사, 프로젝트·부서·사업장 차원 분류</td><td>§11.4-(4)</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">11. 완료 기준(DoD)·테스트 관점</h3>\n<p><strong>DoD</strong></p>\n<p>1. 1차 14메뉴(SA-VAT-01~14)가 과세유형 11~64 전표에서 자동 집계·마감·전자신고 파일(.101/.102) 제작·홈택스 제출까지 E2E 동작(§25.11.1·7).</p>\n<p>2. 신고유형 4종(예정/확정/영세율조기환급/기한후)+수정신고 차수·경정 분기(≥0/&lt;0)와 사업장별/총괄/사업자단위 과세단위가 동작(§11.4, §25.11.1).</p>\n<p>3. MRI 60여 항목 검사·&lt;유의사항&gt; 강제마감·역추적 대사가 동작(§25.11.1~2).</p>\n<p>4. <code>filingApprovalRequired</code>·Ack·주기장 인터셉터·<code>LOCKED</code> 전환의 통제 시나리오 통과(§21.4, §11.9).</p>\n<p>5. 검증 표(8절) 22항목이 서버/클라 이중 검증으로 구현(00_개요 §3 UI 공통).</p>\n<p><strong>테스트 관점</strong></p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>구분</th><th>시나리오</th></tr></thead><tbody><tr><td>집계 정확성</td><td>과세유형별 전표 → 신고서 란 매핑 전수(11~25/51~64), 고정자산·의제(적요06)·재활용(적요07) 분기 3종(§0.4 P2~P4)</td></tr>\n<tr><td>마감 상태머신</td><td>마감→첨부서식→MRI→강제마감→재마감 시 전자신고 상태 공란화(§25.11.7)</td></tr>\n<tr><td>수정신고</td><td>정기 마감 후 차수 생성, 수정전 자동·수정불가, ≥0/&lt;0 분기</td></tr>\n<tr><td>합계표 정합</td><td>전자/전자외 판정(다음달 11일 기준), 사업자번호 누락 마감 실패, 매출·매입 동시 마감</td></tr>\n<tr><td>발행공제</td><td>개인 13/1000·법인 제외, 세금계산서 발급+카드결제 중복 차감(SA-VAT-05)</td></tr>\n<tr><td>간주임대료</td><td>보증금×이자율×임대일수÷365(윤년 366), 임대기간 경계일</td></tr>\n<tr><td>의제매입 한도</td><td>공제율 차등(2/102·6/106·4/104)·한도 정산·예정누락</td></tr>\n<tr><td>통제</td><td>비주기장 시도, 미수임 전송, Ack 미완료, Step-up 미수행, RLS 교차 테넌트</td></tr>\n<tr><td>외부연계</td><td>홈택스 제출 실패 재처리(멱등), 휴폐업 API 장애 시 우회</td></tr>\n<tr><td>성능</td><td>신고 성수기(1월·부가세 신고월) 대량 집계 — 무중단·자동 스케일(§15 하단)</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">12. 잔여 확인사항 (§23 연계)</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>§23 번호</th><th>항목</th><th>본 페이즈 영향</th></tr></thead><tbody><tr><td>19</td><td>마감 정책: <code>LOCKED</code> 전환 조건(신고 완료 기준)</td><td>신고 완료 시점(제출확인 vs 승인) 정의 필요</td></tr>\n<tr><td>24</td><td>기장 수임 법적 검토: 세무대리인 자격·수임 범위(기장 대리 vs 신고 대리)</td><td>SA-VAT-07 전송 허용 조건</td></tr>\n<tr><td>25</td><td>신고 승인 정책: <code>filingApprovalRequired</code> 기본값(Y) 유지, 이용회사 무응답 시 처리(기한 임박 에스컬레이션 vs 전송 보류)</td><td>승인 게이트 UX·배치</td></tr>\n<tr><td>28</td><td>성수기(1월·부가세 신고월) 담당자 배정 가중치</td><td>워크벤치·처리량 계획</td></tr>\n<tr><td>43</td><td>매입원장 세무상태: NTS 코드↔홈택스 응답코드 매핑, REJECTED/미수신 마감 차단 여부</td><td>SA-VAT-03/06 전송상태 판정·마감 정책</td></tr>\n<tr><td>52</td><td>일자 데이터 모델: VAT 신고 기준일 적용 규칙(증빙일자 vs 세무귀속일)</td><td>집계 귀속 판정</td></tr>\n<tr><td>55</td><td>카드 VAT 공제 Rule 설계(N11)</td><td>SA-VAT-04 공제대상 룰 파라미터</td></tr></tbody></table></div>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1</h4><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>형식</th><th>설명</th></tr></thead><tbody><tr><td>구분</td><td>선택(5구분)</td><td>가축/수산동물/장애인보조견/기초수급자/질병예방</td></tr>\n<tr><td>계정과목 설정</td><td>코드도움</td><td>구분별 계정과목 설정 후 불러오기</td></tr>\n<tr><td>불러오기 대상</td><td>자동</td><td>매출유형 13.면세/18.카면/20.면건/23.현면</td></tr></tbody></table></div></section>\n<section class=\"doc-table-block\"><h4>상세 표 2</h4><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>엔티티</th><th>핵심 필드</th><th>PK/유니크·상태</th><th>근거</th></tr></thead><tbody><tr><td><code>VatReturn</code>(부가세신고서)</td><td>tenantId, fiscalYear, taxPeriodFrom/To, filingType(1.예정/2.확정/3.영세율조기환급/4.기한후), taxUnit(사업장별/총괄/사업자단위), businessPlaceId, amendmentSeq(수정차수), status(작성중→마감), eFilingFlag(전자신고여부 0/x), forcedCloseFlag(&lt;유의사항&gt; 강제마감), refundAccountRef</td><td>UQ(tenantId, 과세기간, filingType, taxUnit, amendmentSeq). 정기신고 마감 선행 후 수정신고</td><td>§25.11.1</td></tr>\n<tr><td><code>VatReturnLine</code></td><td>returnId, lineCode(신고서식 란번호 11~48·50~58 등), taxBase(과표), taxAmount(세액), sourceType(자동집계/직접입력), 수정전/수정후 구분</td><td>수정전=정기신고분 자동·수정불가</td><td>§25.11.1</td></tr>\n<tr><td><code>VatAttachmentForm</code>(부속서류 공통 헤더)</td><td>tenantId, returnId, formType(SA-VAT-03~15…), status(작성/마감), closedAt, 매출·매입 동시 마감 플래그</td><td>마감 시 거래처 사업자번호 정합 검증</td><td>§25.11.3, §25.11.6</td></tr>\n<tr><td><code>ElectronicFilingJob</code>(전자신고)</td><td>returnId, jobType(정기/기한후/수정), fileFormat(.101/.102), fileName(제작일), filePassword(8~15자리), status(제작오류/제작완료/검증오류/검증완료/제출오류/제출확인), excludeFlag(제작제외 — 마감해지 후 유지), hometaxAutoFlag</td><td>재마감 시 상태 공란화. 멱등 작업큐</td><td>§25.11.7</td></tr>\n<tr><td><code>FilingSubmitterProfile</code>(제출자등록)</td><td>tenantId, submitterType(1.세무대리인/2.일반업체), hometaxUserId(공통/개별), 제출자구분·관리번호·조정반번호</td><td>일반업체=회사등록 불러오기</td><td>§25.11.7</td></tr>\n<tr><td><code>tax_type_master</code></td><td>과세유형 코드(매출 11~25/매입 51~64), 세율, 부가세계정, 신고서식 매핑, 전자발행 가능, 증빙요건</td><td>단일 진실원</td><td>§0.4 P2, §25.4.2.2</td></tr>\n<tr><td><code>PurchaseLedgerLine</code>(매입원장)</td><td>postingDate, journalEntryId/LineId, vendorId, businessRegistrationNo, taxCategory(세무구분), reasonCode, supplyAmount, vatAmount, grossAmount, deductibleType, businessPlaceId, evidenceId, taxInvoiceId, ntsStatus, evidenceStatus, sourceSystem</td><td>ntsStatus 8종: NOT_TARGET/PENDING/ISSUED/SENT/ACCEPTED/REJECTED/CANCELLED/MANUAL_EVIDENCE</td><td>§11.4-(1)(2)</td></tr>\n<tr><td><code>TaxInvoiceTransmission</code></td><td>taxInvoiceId, ntsStatus, sentAt, acceptedAt, rejectedReason, sourceRef</td><td>전자/전자외 판정 원천</td><td>§11.4-(2)</td></tr>\n<tr><td><code>PurchaseTaxStatusHistory</code></td><td>lineId, beforeStatus, afterStatus, changedBy, reason</td><td>append-only</td><td>§11.4-(2)</td></tr>\n<tr><td><code>DeemedInputEntry</code>(의제매입 명세)</td><td>공급자, 사업자/주민번호, 취득일자, 구분(계산서/신용카드등/농어민), 물품명, 수량, 매입가액, 공제율, 의제매입세액</td><td>정산: 한도율·당기매입액·기공제세액</td><td>§25.12.3</td></tr>\n<tr><td><code>RecycledWasteEntry</code>(재활용/구리스크랩)</td><td>구분(계산서/영수증), 종류(중고차/기타), 공제율(3/103·10/110·직접), 차량·차대번호, 매입자납부특례 표시</td><td>구리스크랩 합산 플래그</td><td>§25.12.4~5</td></tr>\n<tr><td><code>RealEstateRentalUnit</code>(임대물건)</td><td>상호, 층·호수·동, 사업자/주민번호, 임대면적, 용도, 임대기간, 보증금·월세·관리비, 적용이자율, 보증금이자(자동), 갱신일·퇴거일</td><td>현장/프로젝트 차원 연계</td><td>§25.12.1</td></tr>\n<tr><td><code>TenantAcknowledgement</code>(신고 승인/확인)</td><td>대상(마감/신고), status(PENDING→CONFIRMED/OBJECTED), 사유</td><td>ackPolicy=REQUIRED 시 후속 차단</td><td>§21.4-(4), §12.2</td></tr>\n<tr><td><code>FiscalPeriod</code>(기간 상태)</td><td>상태: FUTURE→OPEN→TEMP_CLOSED→CLOSED→<strong>LOCKED(신고 완료·아카이브, 마감해제 불가)</strong></td><td>수정신고 절차로만 대응</td><td>§11.9-(1)(3)</td></tr></tbody></table></div></section>\n<section class=\"doc-table-block\"><h4>상세 표 3</h4><div class=\"doc-table-wrap\"><table class=\"doc-table \"><t
