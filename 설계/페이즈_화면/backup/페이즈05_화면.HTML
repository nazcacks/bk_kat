lass=\"doc-table \"><thead><tr><th>기능</th><th>동작</th><th>근거</th></tr></thead><tbody><tr><td>전표추가</td><td>입력 후 [전표추가] → &quot;결산분개를 추가하시겠습니까?&quot; 확인 → 일반전표에 결산분개 추가·'결산분개'란 집계. <code>CLOSING_DR</code>/<code>CLOSING_CR</code> 라인 생성, 회사구분 분기(법인=잉여금 대체/개인=자본금 대체)</td><td>§25.9.1</td></tr>\n<tr><td>익월 차감분개</td><td>월(중간)결산 시 &quot;익월 차감분개 포함추가&quot; 선택 → 익월 1일자 결산차감분개 자동 추가</td><td>§25.9.1</td></tr>\n<tr><td>결산분개 삭제</td><td>[일반전표입력] Shift+F6 [자동분개일괄검색 및 삭제] '결산분개' 체크 삭제(복구 불가). 일괄삭제 플래그 = entry 메타데이터</td><td>§25.9.1</td></tr>\n<tr><td>재결산</td><td>동일 결산월 재선택 시 이전 입력 데이터 불러오기 여부 메시지(전표 수정분 있으면 '취소' 필수). BK는 '결산 미리보기·조정 전후 비교'(4.2 M7)로 제공</td><td>§25.9.1, §11.3</td></tr>\n<tr><td>수동결산항목 가이드</td><td>본 화면 작업 불가 항목(손익 발생/이연, 소모품 정리, 단기매매증권 평가, 현금시재 검토·가계정 정리, 부가세예수금/대급금 정리)은 결산월 [일반전표입력] 직접 입력 안내</td><td>§25.9.1</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>검증</strong>: 자동결산항목별 결차/결대 라인 대차일치, 기납입 법인세 공제검증, 감가상각 명세 연동 반영, 익월 차감분개 자동 생성(§25.9.1).</li>\n<li><strong>산출물</strong>: 결산분개(결차/결대) 전표, 결산 입력 내역, 자동결산분개 미리보기. 반영 후 시산표·재무상태표·손익·제조원가가 결산 완료 상태로 확정(§25.9.1).</li>\n<li><strong>연계</strong>: 후행 SA-CLS-02~05. 감가상각=[월별감가상각비계상](P08), 법인세 계상분=세무신고(법인세) 파이프라인, 원가경비코드=코스트센터/현장 차원 매핑(§25.9.1).</li>\n</ul>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1 · <strong>조회조건·입력 필드</strong>:</h4><div class=\"doc-caption\"><strong>조회조건·입력 필드</strong>:</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>유형/값</th><th>필수</th><th>비고(근거)</th></tr></thead><tbody><tr><td>기간 그레인</td><td>월별/분기별/반기별(1~1월, 1~3월, 4~6월 등), 기간 누적 결산(연초부터 누적), 기말 결산(회계기간 전체 선택 시 기말결산 인식)</td><td>Y</td><td>선택 기간 기말재고가 익기 기초재고로 이월. <code>fiscal_period</code>+기간 범위 파라미터(§25.9.1)</td></tr>\n<tr><td>① 재고자산 기말재고액</td><td>기말 상품/원재료/부재료/재공품/제품 재고액 각 란</td><td>N</td><td>§25.9.1</td></tr>\n<tr><td>② 유무형자산 감가상각비</td><td>판관비·제조경비·도급경비·분양경비별 직접입력 또는 [월별감가상각비계상] 자동반영</td><td>N</td><td>§25.9.1</td></tr>\n<tr><td>③ 퇴직급여</td><td>귀속(판관비/제조/도급/분양경비)별 입력</td><td>N</ 간 그레인","desc":"월별/분기별/반기별(1~1월, 1~3월, 4~6월 등), 기간 누적 결산(연초부터 누적), 기말 결산(회계기간 전체 선택 시 기말결산 인식)"},{"name":"① 재고자산 기말재고액","desc":"기말 상품/원재료/부재료/재공품/제품 재고액 각 란"},{"name":"② 유무형자산 감가상각비","desc":"판관비·제조경비·도급경비·분양경비별 직접입력 또는 [월별감가상각비계상] 자동반영"},{"name":"③ 퇴직급여","desc":"귀속(판관비/제조/도급/분양경비)별 입력"},{"name":"④ 대손상각","desc":"판관비 대손상각란에 채권별 대손충당금 설정액"},{"name":"⑤ 무형고정자산상각액","desc":"계정과목별 당기상각액"},{"name":"⑥ 준비금 환입액/전입액","desc":"영업외수익·비용"},{"name":"⑦ 법인세 등","desc":"'2)법인세 계상'란: 기납입 법인세(이자소득세·중간예납액 등) 공제 후 추가 계산할 법인세액"},{"name":"더보기","desc":"원가설정(매출원가코드·원가경비·표준원가 — [계정과목 및 적요등록] 자동 조회/직접 편집), 감가상각비 반영([결산 반영] 버튼), 계정과목 코드보기"},{"name":"BK 추가","desc":"차원(사업장 필수, 코스트센터/현장으로 경비귀속 매핑), 회계기간, 자동결산항목별 결차/결대 계정 매핑"},{"name":"전표추가","desc":"입력 후 [전표추가] → \"결산분개를 추가하시겠습니까?\" 확인 → 일반전표에 결산분개 추가·'결산분개'란 집계. `CLOSING_DR`/`CLOSING_CR` 라인 생성, 회사구분 분기(법인=잉여금 대체/개인=자본금 대체)"},{"name":"익월 차감분개","desc":"월(중간)결산 시 \"익월 차감분개 포함추가\" 선택 → 익월 1일자 결산차감분개 자동 추가"},{"name":"결산분개 삭제","desc":"[일반전표입력] Shift+F6 [자동분개일괄검색 및 삭제] '결산분개' 체크 삭제(복구 불가). 일괄삭제 플래그 = entry 메타데이터"},{"name":"재결산","desc":"동일 결산월 재선택 시 이전 입력 데이터 불러오기 여부 메시지(전표 수정분 있으면 '취소' 필수). BK는 '결산 미리보기·조정 전후 비교'(4.2 M7)로 제공"},{"name":"수동결산항목 가이드","desc":"본 화면 작업 불가 항목(손익 발생/이연, 소모품 정리, 단기매매증권 평가, 현금시재 검토·가계정 정리, 부가세예수금/대급금 정리)은 결산월 [일반전표입력] 직접 입력 안내"}],"tableCount":2,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-CLS-01","title":"결산자료입력","purpose":"감가상각·퇴직급여·재고·대손 등 결산정리 자동/수동 분개(결차/결대). ▼ 와이어프레임 SA-CLS-02","linkage":"SA-JNL-01(CLOSING_DR/CR), SA-FA","note":"C5","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-CLS-02","title":"합계잔액시산표","phase":"1차","basis":"§25.9.2","impl":"","tabs":"","sid":"sa_cls_02","prefix":"SA-CLS","group":"결산","purpose":"계정별 차변/대변 합계·잔액 검증(차대 평형). 마감 전 핵심 검증. ▼ 와이어프레임","detailHtml":"<h4 class=\"doc-h doc-h4\">4.4 SA-CLS-02 합계잔액시산표 (1차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 월별 합계잔액시산표 조회/출력. 대차차액 발생 시 팝업으로 차액 전표를 조회/수정하는 <strong>결산 검증의 1차 화면</strong>(§25.9.2).</li>\n<li><strong>조회조건</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>유형/값</th><th>근거</th></tr></thead><tbody><tr><td>탭</td><td>과목별(과목코드별, 회사관리용) / 세목별(세목사용 5자리 시) / 제출용(기업회계기준 통합계정 — 현금및현금등가물·매출채권·매입채무 등 기본, 추가/삭제/수정 가능)</td><td>§25.9.2</td></tr>\n<tr><td>기간</td><td>조회 월·일</td><td>§25.9.2</td></tr>\n<tr><td>더보기</td><td>퇴직연금설정(확정급여형 병행 시 초과자산 상계, 퇴직금운용자산·퇴직급여충당부채 상계여부), 영문설정, 출력명칭설정, 원가손익차감계정 표시방법(500~800번대 차감계정 합계/순액), 매출액(원가)순액표시(매출환입및에누리·매출할인·관세환급금 순액/구분), 임대주택자산 등록, 통합계정등록(통합과목명·구분: 당좌자산/투자자산/무형자산/유동부채/비유동부채/판관비/유형자산/매출/기타비유동자산·사용여부·하위 Code), 대분류명 편집, 원장조회, 계정과목코드보기</td><td>§25.9.2</td></tr>\n<tr><td>BK 추가</td><td>차원(사업장 등 선택 필터), 회계기간, 통합계정 매핑</td><td>§25.9.2</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능·검증</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>기능</th><th>동작</th><th>근거</th></tr></thead><tbody><tr><td>대차차액 알림</td><td>메뉴 오픈 시 &quot;차변과 대변의 합계액에 차이가 있는 전표가 존재합니다&quot; → 차액 전표 확인/수정</td><td>§25.9.2</td></tr>\n<tr><td>원가경비번호 검증</td><td>사용 원가경비번호 외 경비 입력분(500번대 사용인데 600/700번대 입력) → 원가대체 미수행 차액 검출</td><td>§25.9.2</td></tr>\n<tr><td>타계정대체 적요 검증</td><td>원재료→원재료비 입력, 제품/재공품/미완성공사/미완성건물 직접 입력 시 적요 '08.타계정으로 대체액'/'09.타계정에서 대체액' 필수</td><td>§25.9.2</td></tr>\n<tr><td>BK 검증 엔진</td><td>대차차액·원가경비번호 불일치·타계정대체 적요 누락을 결산 검증 룰로 구현, 계산시트(§11.14) 검증 단계 연동</td><td>§25.9.2</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>산출물</strong>: 과목별/세목별/제출용 시산표. 재무상태표 차액오류 진단의 1차 검증 산출(§25.9.2).</li>\n<li><strong>연계</strong>: 선행 SA-CLS-01 결산분개 반영, 후행 SA-CLS-03·04. 제출용 통합계정 매핑 = 보고패키지 표준 계정매핑 테이블(§25.9.2, §11.13).</li>\n</ul>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1 · <strong>조회조건</strong>:</h4><div class=\"doc-caption\"><strong>조회조건</strong>:</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>유형/값</th><th>근거</th></tr></thead><tbody><tr><td>탭</td><td>과목별(과목코드별, 회사관리용) / 세목별(세목사용 5자리 시) / 제출용(기업회계기준 통합계정 — 현금및현금등 td></tr>\n<tr><td>더보기</td><td>퇴직연금설정(퇴직연금운용자산&gt;충당부채 상계여부, 초과분만 투자자산 집계), 영문설정, 법인유형설정('일반법인용'/'금융업·보험업·증권업'), 출력명칭설정, 임대주택자산등록, 통합계정등록(SA-CLS-02와 동일 구분체계), 재무비율 보기(자산 대비 비율, 소수점 둘째자리), 원장조회(전표수정), 계정과목코드보기</td><td>§25.9.3</td></tr>\n<tr><td>BK 추가</td><td>차원(사업장 필터), 회계기간, 통합/표준 매핑, 잉여금 일치·자본금 검증</td><td>§25.9.3</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능·동작</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>기능</th><th>동작</th><th>근거</th></tr></thead><tbody><tr><td>차액 알림창(3단)</td><td>① B/S 처분(처리)전 잉여금 = 부채총계+미처분이익잉여금 제외 자본합계−자산총계 ② 이익잉여금처분계산서 처분전 잉여금 = [전기분이익잉여금처분계산서]+확정 손익계산서 당기순손익 반영 미처분이익잉여금 ③ 차액 = ①−②</td><td>§25.9.3</td></tr>\n<tr><td>차액 해결 가이드</td><td>시산표 대차차액/원가경비번호/타계정대체 적요 확인. 전기분B/S는 375.이월이익잉여금/376.이월결손금 입력(377/378 미사용), [전기분이익잉여금처분계산서] I.미처분이익잉여금 일치 확인</td><td>§25.9.3</td></tr>\n<tr><td>잉여금 처분 분개</td><td>III.이익잉여금처분액/II.결손금처리액은 자동분개 안 됨 → 주총 확정일 [일반전표입력] 직접 입력. 372.중간배당금 사용 시 자동반영/처분분개 자동추가, 375 사용 시 중간배당금란 선입력 후 계정코드 삭제 후 전표추가(중복 방지)</td><td>§25.9.3</td></tr>\n<tr><td>조정 전후 비교</td><td>미결산/결산 완료 상태 비교를 M7 '조정 전후 비교' 뷰로 제공, 차액 알림 룰 = 결산 검증 엔진</td><td>§25.9.3, §11.3</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>검증</strong>: [재무상태표] 이월이익잉여금(이월결손금) = [이익잉여금처분계산서] 미처분이익잉여금(미처리결손금) 일치 필수(§25.9.3).</li>\n<li><strong>산출물</strong>: 과목용/세목용/제출용/표준용 재무상태표, 재무비율 표. 자본변동표·현금흐름표·경영정보의 선행 데이터(§25.9.3).</li>\n<li><strong>연계</strong>: 선행 SA-CLS-01·02, 후행 SA-CLS-07·08·14, 잉여금 검증 SA-CLS-06. 결산대체 워크플로우·세무신고 연계(§25.9.3).</li>\n</ul>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1 · <strong>조회조건</strong>:</h4><div class=\"doc-caption\"><strong>조회조건</strong>:</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>유형/값</th><th>근거</th></tr></thead><tbody><tr><td>탭</td><td>과목별/세목별/(세목)관리용/제출용(통합계정)/표준용(개인·법인 표준양식 — 법인유형설정에 따름)</td><td>§25.9.3</td></tr>\n<tr><td>기간</td><td>조회 월. 경영정보(당기/전기/전전기 비교) 연계 조회</td><td>§25.9.3</td></tr>\n<t "SA-CLS","group":"결산","purpose":"제조/도급/분양 원가(결차/결대 반영)","detailHtml":"<h4 class=\"doc-h doc-h4\">4.7 SA-CLS-05 제조원가명세서 (1차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 제조·공사현장 등의 원가명세서 조회/출력. 조회 월 입력 후 '매출원가코드 및 계정과목선택'에서 원가·관련 경비·표준원가명세서 선택(§25.9.5).</li>\n<li><strong>조회조건</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>유형/값</th><th>근거</th></tr></thead><tbody><tr><td>탭</td><td>과목별(전표 입력액+초기이월액+재고액 집계)/세목별·세목(관리용)(하위세목 합산)/제출용(신고기준)/표준용(개인·법인)</td><td>§25.9.5</td></tr>\n<tr><td>기간·구분</td><td>조회 월, 원가경비 선택</td><td>§25.9.5</td></tr>\n<tr><td>더보기</td><td>원가설정(매출원가코드·원가경비·표준원가선택), 영문설정, 출력명칭설정, 기초수정(기초재고액 편집), 제목편집(대분류), 과목편집(소분류), 과목초기화(기본값 복원), 원장조회(전표수정), 계정과목코드보기, 비율(항목별, 소수점 둘째자리)</td><td>§25.9.5</td></tr>\n<tr><td>BK 추가</td><td>차원(코스트센터/현장 원가 롤업), 회계기간, 매출원가코드·원가경비코드 매핑</td><td>§25.9.5</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능·검증</strong>: 결차/결대 라인만 제조원가 반영(entryCode 규칙) + 원가경비코드(코스트센터/현장 차원) 매핑, 매출원가코드별 표준원가 집계를 차원 기반 원가 롤업으로 구현. '당기제품제조원가' = [손익계산서] 당기제품제조원가 일치 검증(§25.9.5).</li>\n<li><strong>산출물</strong>: 과목용/세목용/제출용/표준용 제조원가명세서, 항목별 비율 표. 보고패키지의 업종별 컴포넌트(CM)(§25.9.5, §11.21-(4)).</li>\n<li><strong>연계</strong>: 선행 SA-CLS-01(원가설정/재고 결산), 후행 SA-CLS-04. 기간 비교 SA-CLS-19, 중단사업 SA-CLS-21. <strong>재고 수불 연동 원가계산(<code>ManufacturingCostRun</code> OPEN→CALCULATING→CALCULATED→TIED_OUT→APPROVED)은 Phase 2</strong>(<code>manufacturingCostEnabled</code>, §11.21-(1)(3)).</li>\n</ul>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1 · <strong>조회조건</strong>:</h4><div class=\"doc-caption\"><strong>조회조건</strong>:</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>유형/값</th><th>근거</th></tr></thead><tbody><tr><td>탭</td><td>과목별(전표 입력액+초기이월액+재고액 집계)/세목별·세목(관리용)(하위세목 합산)/제출용(신고기준)/표준용(개인·법인)</td><td>§25.9.5</td></tr>\n<tr><td>기간·구분</td><td>조회 월, 원가경비 선택</td><td>§25.9.5</td></tr>\n<tr><td>더보기</td><td>원가설정(매출원가코드·원가경비·표준원가선택), 영문설정, 출력명칭설정, 기초수정(기초재고액 편집), 제목편집(대분류), 과목편집(소분류), 과목초기화(기본값 복원), 원장조회(전표수정), 계정과목코드보기, 비율(항목별, 소수점 둘째자리)</td><td>§25.9.5</td></tr>\n<tr><td>BK 추가</td><td>차원(코스트센터/현장 원가 롤업), 회계기간, 매출원가코드·원가경비코드 매핑</td><td>§25.9.5</td></tr></tbody></table></div></section>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>기능·검증</strong>: 결차/결대 라인만 제조원가 반영(entryCode 규칙) + 원가경비코드(코스트센터/현장 차원) 매핑, 매출원가코드별 표준원가 집계를 차원 기반 원가 롤업으로 구현. '당기제품제조원가' = [손익계산서] 당기제품제조원가 일치 검증(§25.9.5).</li>\n<li><strong>연계</strong>: 선행 SA-CLS-01(원가설정/재고 결산), 후행 SA-CLS-04. 기간 비교 SA-CLS-19, 중단사업 SA-CLS-21. <strong>재고 수불 연동 원가계산(<code>ManufacturingCostRun</code> OPEN→CALCULATING→CALCULATED→TIED_OUT→APPROVED)은 Phase 2</strong>(<code>manufacturingCostEnabled</code>, §11.21-(1)(3)).</li>\n</ul>","fields":[{"name":"탭","desc":"과목별(전표 입력액+초기이월액+재고액 집계)/세목별·세목(관리용)(하위세목 합산)/제출용(신고기준)/표준용(개인·법인)"},{"name":"기간·구분","desc":"조회 월, 원가경비 선택"},{"name":"더보기","desc":"원가설정(매출원가코드·원가경비·표준원가선택), 영문설정, 출력명칭설정, 기초수정(기초재고액 편집), 제목편집(대분류), 과목편집(소분류), 과목초기화(기본값 복원), 원장조회(전표수정), 계정과목코드보기, 비율(항목별, 소수점 둘째자리)"},{"name":"BK 추가","desc":"차원(코스트센터/현장 원가 롤업), 회계기간, 매출원가코드·원가경비코드 매핑"}],"tableCount":1,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-CLS-05","title":"제조원가명세서","purpose":"제조/도급/분양 원가(결차/결대 반영)","linkage":"SA-LDG-19, SA-OPN-03","note":"C5","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-CLS-06","title":"이익잉여금처분계산서","phase":"1차","basis":"§25.9.6","impl":"","tabs":"","sid":"sa_cls_06","prefix":"SA-CLS","group":"결산","purpose":"이익잉여금 처분 명세","detailHtml":"<h4 class=\"doc-h doc-h4\">4.8 SA-CLS-06 이익잉여금처분계산서 (1차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 당기 이익잉여금처분(결손금처리) 내역 반영 + [전표추가]로 회계기간 마지막 월 손익대체분개 자동 반영. BK 결산대체 워크플로우의 법인 케이스(잉여금 대체)(§25.9.6).</li>\n<li><strong>입력 필드</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>유형/값</th><th>근거</th></tr></thead><tbody><tr><td>처분일</td><td>당기 처분예정일·전기 처분확정일(당기 처분예정일 → 법인조정모듈 [이익잉여금처분계산서] '처분확정일' 반영)</td><td>§25.9.6</td></tr>\n<tr><td>조회</td><td>저장 데이터 불러오기 여부 메시지('확인'=기존 반영/'취소'=새로불러오기)</td><td>§25.9.6</td></tr>\n<tr><td>전표추가</td><td>[일반전표입력] 회계기간종료일로 처분내역·손익대체분개 추가</td><td>§25.9.6</td></tr>\n<tr><td>더보기</td><td>라인추가(집계항목 하위 활성, F5 삭제), 항목추가 옵션(임의적립금 이입액·결손금 처리·이익잉여금 처분항목 추가/삭제 체크)</td><td>§25.9.6</td></tr>\n<tr><td>BK 추가</td><td>차원(사업장), 회계기간(종료일 = 손익대체 기준일), 잉여금 대체 계정, 미처분이익잉여금 일치 검증</td><td>§25.9.6</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능·검증</strong>: [재무상태표] 미처분이익잉여금(미처리결손금) 일치, '당기순손익' = [손익계산서] 반영·일치. 임의적립금이입액·이익잉여금처분액은 처분 확정일 결의 사항 → 확정일 [일반전표입력] 분개 필요. 처분내역 수정 시 처분분개 일괄삭제 후 재[전표추가]. BK는 손익대체분개를 <code>CLOSING_DR</code>/<code>CLOSING_CR</code> 라인으로 회계기간 종료일에 자동 생성(§25.9.6).</li>\n<li><strong>산출물</strong>: 이익잉여금처분(결손금처리)계산서, 손익대체분개 전표. <strong>연계</strong>: 선행 SA-CLS-03·04, 처분확정일=법인조정모듈(세무신고), 후행 SA-CLS-07(§25.9.6).</li>\n</ul>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1 · <strong>입력 필드</strong>:</h4><div class=\"doc-caption\"><strong>입력 필드</strong>:</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>유형/값</th><th>근거</th></tr></thead><tbody><tr><td>처분일</td><td>당기 처분예정일·전기 처분확정일(당기 처분예정일 → 법인조정모듈 [이익잉여금처분계산서] '처분확정일' 반영)</td><td>§25.9.6</td></tr>\n<tr><td>조회</td><td>저장 데이터 불러오기 여부 메시지('확인'=기존 반영/'취소'=새로불러오기)</td><td>§25.9.6</td></tr>\n<tr><td>전표추가</td><td>[일반전표입력] 회계기간종료일로 처분내역·손익대체분개 추가</td><td>§25.9.6</td></tr>\n<tr><td>더보기</td><td>라인추가(집계항목 하위 활성, F5 삭제), 항목추가 옵션(임의적립금 이입액·결손금 처리·이익잉여금 처분항목 추가/삭제 체크)</td><td>§25.9.6</td></tr>\n<tr><td>BK 추가</td><td>차원(사업장), 회계기간(종료일 = 손익대체 기준일), 잉여금 대체 계정, 미처분이익잉여금 일치 검증</td><td>§25.9.6</td></tr></tbody></table></div></section>","validationHtml":"<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>조회</th><th>저장 데이터 불러오기 여부 메시지('확인'=기존 반영/'취소'=새로불러오기)</th><th>§25.9.6</th></tr></thead><tbody><tr><td>BK 추가</td><td>차원(사업장), 회계기간(종료일 = 손익대체 기준일), 잉여금 대체 계정, 미처분이익잉여금 일치 검증</td><td>§25.9.6</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능·검증</strong>: [재무상태표] 미처분이익잉여금(미처리결손금) 일치, '당기순손익' = [손익계산서] 반영·일치. 임의적립금이입액·이익잉여금처분액은 처분 확정일 결의 사항 → 확정일 [일반전표입력] 분개 필요. 처분내역 수정 시 처분분개 일괄삭제 후 재[전표추가]. BK는 손익대체분개를 <code>CLOSING_DR</code>/<code>CLOSING_CR</code> 라인으로 회계기간 종료일에 자동 생성(§25.9.6).</li>\n<li><strong>산출물</strong>: 이익잉여금처분(결손금처리)계산서, 손익대체분개 전표. <strong>연계</strong>: 선행 SA-CLS-03·04, 처분확정일=법인조정모듈(세무신고), 후행 SA-CLS-07(§25.9.6).</li>\n</ul>","fields":[{"name":"처분일","desc":"당기 처분예정일·전기 처분확정일(당기 처분예정일 → 법인조정모듈 [이익잉여금처분계산서] '처분확정일' 반영)"},{"name":"조회","desc":"저장 데이터 불러오기 여부 메시지('확인'=기존 반영/'취소'=새로불러오기)"},{"name":"전표추가","desc":"[일반전표입력] 회계기간종료일로 처분내역·손익대체분개 추가"},{"name":"더보기","desc":"라인추가(집계항목 하위 활성, F5 삭제), 항목추가 옵션(임의적립금 이입액·결손금 처리·이익잉여금 처분항목 추가/삭제 체크)"},{"name":"BK 추가","desc":"차원(사업장), 회계기간(종료일 = 손익대체 기준일), 잉여금 대체 계정, 미처분이익잉여금 일치 검증"}],"tableCount":1,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-CLS-06","title":"이익잉여금처분계산서","purpose":"이익잉여금 처분 명세","linkage":"SA-OPN-04","note":"","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-CLS-07","title":"자본변동표","phase":"1차","basis":"§25.9.7, §11.3(M — CapitalTransaction)","impl":"","tabs":"","sid":"sa_cls_07","prefix":"SA-CLS","group":"결산","purpose":"자본 항목 변동","detailHtml":"<h4 class=\"doc-h doc-h4\">4.9 SA-CLS-07 자본변동표 (1차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 회계기간 내 자본변동 내역을 유형별로 정리. <strong>재무상태표 조회 선행 필수</strong>, 변경 시 새로 불러오기 반영. [환경설정] 중소기업회계기준 1.사용함+재무제표작성선택 0.자본변동표 또는 2.사용안함일 때 조회 가능(§25.9.7).</li>\n<li><strong>조회조건</strong>: 탭(과목별=집계항목 속 계정과목별 자본변동 / 제출용=[전기분자본변동표] 비교식 / 자본금내역=기초/증가/감소/기말), 기간/년도(전년·전전년 선택 시 [전기분 자본변동표] 반영), 더보기(현재라인/전체라인 새로 불러오기, 항목추가 — 선택 라인 윗줄, 계정 F2 코드도움, 집계 항목 표시 설정)(§25.9.7).</li>\n<li><strong>기능</strong>: 재무상태표 선행 → 자본변동 롤포워드 산출 의존관계를 보고패키지 산출 순서(시산표→재무상태표→자본변동표)로 모델링, 새로 불러오기 = 명시적 재집계 액션(자동 동기화 아님), 수기 항목추가(§25.9.7).</li>\n<li><strong>자본거래 연계(보강 M)</strong>: 자본거래 이력 <code>CapitalTransaction</code>(증자/감자/주식이전/분할/조직변경: 주주·주식수·액면가·발행가·주식발행초과금·등기일)과 주주명부 <code>Shareholder</code>(지분율·취득일)를 보존하여 자본변동표·자본금 명세(§11.14)를 자동 생성. 자본금 잔액은 계정별 명세서로 tie-out, 주주는 특수관계자(§11.17)·주석 연계(§11.3).</li>\n<li><strong>검증</strong>: 재무상태표 자본 일치(§25.9.7). <strong>산출물</strong>: 자본변동표(전기분 비교식), 자본금내역. <strong>연계</strong>: 선행 SA-CLS-03·06, 전기분자본변동표(P02)(§25.9.7).</li>\n</ul>","detailTablesHtml":"<p class=\"empty-note\">이 화면의 상세 표는 설계서 원문 설명으로 제공됩니다.</p>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>자본거래 연계(보강 M)</strong>: 자본거래 이력 <code>CapitalTransaction</code>(증자/감자/주식이전/분할/조직변경: 주주·주식수·액면가·발행가·주식발행초과금·등기일)과 주주명부 <code>Shareholder</code>(지분율·취득일)를 보존하여 자본변동표·자본금 명세(§11.14)를 자동 생성. 자본금 잔액은 계정별 명세서로 tie-out, 주주는 특수관계자(§11.17)·주석 연계(§11.3).</li>\n<li><strong>검증</strong>: 재무상태표 자본 일치(§25.9.7). <strong>산출물</strong>: 자본변동표(전기분 비교식), 자본금내역. <strong>연계</strong>: 선행 SA-CLS-03·06, 전기분자본변동표(P02)(§25.9.7).</li>\n</ul>","fields":[{"name":"회계기간","desc":"조회 및 입력 기준 기간"},{"name":"사업장","desc":"전체 또는 개별 사업장 선택"},{"name":"자본변동표","desc":"화면별 상세설계 원문 기준 업무 필드"}],"tableCount":0,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-CLS-07","title":"자본변동표","purpose":"자본 항목 변동","linkage":"SA-OPN-05","note":"","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-CLS-08","title":"현금흐름표","phase":"1차","basis":"§25.9.8, §11.3.1","impl":"","tabs":"","sid":"sa_cls_08","prefix":"SA-CLS","group":"결산","purpose":"영업/투자/재무 현금흐름(간접법)","detailHtml":"<h4 class=\"doc-h doc-h4\">4.10 SA-CLS-08 현금흐름표 (1차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 일정기간 현금흐름 조회/출력. 간접법 계산을 결산 산출 룰로 구현하고, BK는 직접법/간접법 선택(<code>cashFlowMethod</code>, 기본 간접법)·회계기준별 양식·병행원장 기준별 각각 생성으로 확장(§25.9.8, §11.3.1-(1)).</li>\n<li><strong>조회조건·입력 필드</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>유형/값</th><th>근거</th></tr></thead><tbody><tr><td>기간</td><td>조회 월</td><td>§25.9.8</td></tr>\n<tr><td>현금흐름 분류</td><td>0.전체/1.영업/2.투자/3.재무(<code>OPERATING</code>/<code>INVESTING</code>/<code>FINANCING</code>)</td><td>§25.9.8, §11.3.1-(1)</td></tr>\n<tr><td>수정금액</td><td>B/S 금액이 적정 현금흐름 미반영 시 최종 유출입액 수정(예: 장부가 100만원 건물 150만원 처분 → 50만원 가산)</td><td>§25.9.8</td></tr>\n<tr><td>기타현금유출이없는비용(수익)</td><td>항목 제외 계산 ④현금증감과 ⑦(⑥기말−⑤기초) 차액 반영(④&gt;⑦→기타현금유입이없는수익, ④&lt;⑦→기타현금유출이없는비용)</td><td>§25.9.8</td></tr>\n<tr><td>툴바·더보기</td><td>간략보기(금액 있는 항목만)/전체보기, 저장, 과목편집(영업/투자/재무별 소분류·계정과목코드, 추가/삭제/초기화), 영문설정</td><td>§25.9.8</td></tr>\n<tr><td>BK 추가</td><td>차원(사업장), 회계기간, 영업/투자/재무 분류 매핑(<code>CashFlowMapping</code>), 정합성 검증</td><td>§25.9.8, §11.3.1-(3)</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>산출 로직</strong>(§11.3.1-(2)):</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>방식</th><th>처리</th></tr></thead><tbody><tr><td>간접법</td><td>당기순이익 → 비현금 항목 가감(감가상각비·대손상각·충당금전입·외화환산손익·유형자산처분손익 등) → 운전자본 증감(매출채권·재고자산·매입채무·선급/선수 기초·기말 비교) → 영업활동 CF. 투자/재무는 관련 계정 증감·거래 분류. Smart A 계산식: I.영업=당기순이익+현금유출없는비용−현금유입없는수익+자산·부채변동, II.투자=유입−유출, III.재무=유입−유출, IV=I+II+III, IV+V.기초현금 = VI.기말현금(§25.9.8)</td></tr>\n<tr><td>직접법</td><td>현금및현금성자산 계정(<code>CashEquivalentAccount</code> 정의)의 상대계정·거래유형 분석으로 유입(매출·이자수취)·유출(매입·인건비·이자지급) 항목별 직접 집계</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>매핑·분석 원칙</strong>: <code>CashFlowMapping</code>(계정/거래유형→활동·세부항목, 표준은 공통 표준 6장 배포+회사 확장). <strong>미매핑 계정·현금 거래는 자동 추정 금지 → 검토대상 표시</strong>. 매출채권은 충당금 차감 순액 분석, 투자·재무 동일 계정 중복 시 실제 발생 쪽만, 기초·기말현금 = 제출용 재무상태표 현금및현금등가물, 단기차입금 총액 기재 원칙(빈번 시 순증감), 비현금 거래(현물출자·전환)는 제외·주석 표시(§11.3.1-(2)(3), §25.9.8).</li>\n<li><strong>정합성 검증·조정 워크플로우</strong>(§11.3.1-(4)(5)):</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>단계</th><th>동작</th></tr></thead><tbody><tr><td>현금 정합성 검증</td><td>기초현금+영업·투자·재무 순현금흐름+환율변동효과 = 기말현금, 기말현금 = 재무상태표 현금및현금성자산 잔액 일치</td></tr>\n<tr><td>① 검증 경고 발령</td><td>오차 발생 시 결산 화면에 붉은색 경고 + 불일치 금액(<code>diffAmount</code>) 출력(교착 방지 보완 프로세스)</td></tr>\n<tr><td>② 수기 매핑 조정 툴</td><td>활동 분류 누락 전표(차·대 모두 대체계정 등)를 찾아 수동으로 현금흐름 차원을 매핑하는 원클릭 그리드 팝업</td></tr>\n<tr><td>③ 조정 데이터 발행</td><td>추적 불가 소액 오차는 <strong>승인 사유 입력 후</strong> 특정 활동(영업활동기타 등) 귀속. <strong>G/L 미변경 — 출력용 차원 테이블(<code>CashFlowAdjustment</code>/<code>CashFlowMapping</code>)에만 기록</strong> + <code>DataChangeLog</code> 감사</td></tr>\n<tr><td>재검증·명시</td><td>조정 후 정합성 재수행, 조정 내역은 결산 산출물에 명시. 회계 장부 자동수정 금지</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>산출물</strong>: 영업/투자/재무활동 현금흐름표(비교식 초기이월 입력 가능). 마감/확정 시 스냅샷 보관(<code>TenantSnapshot</code>), 생성 이력·매핑버전 감사(§11.3.1-(4)).</li>\n<li><strong>연계</strong>: 제출용 재무상태표(SA-CLS-03) 데이터 기반, 선행 SA-CLS-03·04(§25.9.8).</li>\n</ul>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1 · <strong>조회조건·입력 필드</strong>:</h4><div class=\"doc-caption\"><strong>조회조건·입력 필드</strong>:</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>유형/값</th><th>근거</th></tr></thead><tbody><tr><td>기간</td><td>조회 월</td><td>§25.9.8</td></tr>\n<tr><td>현금흐름 분류</td><td>0.전체/1.영업/2.투자/3.재무(<code>OPERATING</code>/<code>INVESTING</code>/<code>FINANCING</code>)</td><td>§25.9.8, §11.3.1-(1)</td></tr>\n<tr><td>수정금액</td><td>B/S 금액이 적정 현금흐름 미반영 시 최종 유출입액 수정(예: 장부가 100만원 건물 150만원 처분 → 50만원 가산)</td><td>§25.9.8</td></tr>\n<tr><td>기타현금유출이없는비용(수익)</td><td>항목 제외 계산 ④현금증감과 ⑦(⑥기말−⑤기초) 차액 반영(④&gt;⑦→기타현금유입이없는수익, ④&lt;⑦→기타현금유출이없는비용)</td><td>§25.9.8</td></tr>\n<tr><td>툴바·더보기</td><td>간략보기(금액 있는 항목만)/전체보기, 저장, 과목편집(영업/투자/재무별 소분류·계정과목코드, 추가/삭제/초기화), 영문설정</td><td>§25.9.8</td></tr>\n<tr><td>BK 추가</td><td>차원(사업장), 회계기간, 영업/투자/재무 분류 매핑(<code>CashFlowMapping</code>), 정합성 검증</td><td>§25.9.8, §11.3.1-(3)</td></tr></tbody></table></div></section>\n<section class=\"doc-table-block\"><h4>상세 표 2 · <strong>산출 로직</strong>(§11.3.1-(2)):</h4><div class=\"doc-caption\"><strong>산출 로직</strong>(§11.3.1-(2)):</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>방식</th><th>처리</th></tr></thead><tbody><tr><td>간접법</td><td>당기순이익 → 비현금 항목 가감(감가상각비·대손상각·충당금전입·외화환산손익·유형자산처분손익 등) → 운전자본 증감(매출채권·재고자산·매입채무·선급/선수 기초·기말 비교) → 영업활동 CF. 투자/재무는 관련 계정 증감·거래 분류. Smart A 계산식: I.영업=당기순이익+현금유출없는비용−현금유입없는수익+자산·부채변동, II.투자=유입−유출, III.재무=유입−유출, IV=I+II+III, IV+V.기초현금 = VI.기말현금(§25.9.8)</td></tr>\n<tr><td>직접법</td><td>현금및현금성자산 계정(<code>CashEquivalentAccount</code> 정의)의 상대계정·거래유형 분석으로 유입(매출·이자수취)·유출(매입·인건비·이자지급) 항목별 직접 집계</td></tr></tbody></table></div></section>\n<section class=\"doc-table-block\"><h4>상세 표 3 · <strong>정합성 검증·조정 워크플로우</strong>(§11.3.1-(4)(5)):</h4><div class=\"doc-caption\"><strong>정합성 검증·조정 워크플로우</strong>(§11.3.1-(4)(5)):</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>단계</th><th>동작</th></tr></thead><tbody><tr><td>현금 정합성 검증</td><td>기초현금+영업·투자·재무 순현금흐름+환율변동효과 = 기말현금, 기말현금 = 재무상태표 현금및현금성자산 잔액 일치</td></tr>\n<tr><td>① 검증 경고 발령</td><td>오차 발생 시 결산 화면에 붉은색 경고 + 불일치 금액(<code>diffAmount</code>) 출력(교착 방지 보완 프로세스)</td></tr>\n<tr><td>② 수기 매핑 조정 툴</td><td>활동 분류 누락 전표(차·대 모두 대체계정 등)를 찾아 수동으로 현금흐름 차원을 매핑하는 원클릭 그리드 팝업</td></tr>\n<tr><td>③ 조정 데이터 발행</td><td>추적 불가 소액 오차는 <strong>승인 사유 입력 후</strong> 특정 활동(영업활동기타 등) 귀속. <strong>G/L 미변경 — 출력용 차원 테이블(<code>CashFlowAdjustment</code>/<code>CashFlowMapping</code>)에만 기록</strong> + <code>DataChangeLog</code> 감사</td></tr>\n<tr><td>재검증·명시</td><td>조정 후 정합성 재수행, 조정 내역은 결산 산출물에 명시. 회계 장부 자동수정 금지</td></tr></tbody></table></div></section>","validationHtml":"<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>툴바·더보기</th><th>간략보기(금액 있는 항목만)/전체보기, 저장, 과목편집(영업/투자/재무별 소분류·계정과목코드, 추가/삭제/초기화), 영문설정</th><th>§25.9.8</th></tr></thead><tbody><tr><td>BK 추가</td><td>차원(사업장), 회계기간, 영업/투자/재무 분류 매핑(<code>CashFlowMapping</code>), 정합성 검증</td><td>§25.9.8, §11.3.1-(3)</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>정합성 검증·조정 워크플로우</strong>(§11.3.1-(4)(5)):</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>현금 정합성 검증</th><th>기초현금+영업·투자·재무 순현금흐름+환율변동효과 = 기말현금, 기말현금 = 재무상태표 현금및현금성자산 잔액 일치</th></tr></thead><tbody><tr><td>① 검증 경고 발령</td><td>오차 발생 시 결산 화면에 붉은색 경고 + 불일치 금액(<code>diffAmount</code>) 출력(교착 방지 보완 프로세스)</td></tr>\n<tr><td>③ 조정 데이터 발행</td><td>추적 불가 소액 오차는 <strong>승인 사유 입력 후</strong> 특정 활동(영업활동기타 등) 귀속. <strong>G/L 미변경 — 출력용 차원 테이블(<code>CashFlowAdjustment</code>/<code>CashFlowMapping</code>)에만 기록</strong> + <code>DataChangeLog</code> 감사</td></tr>\n<tr><td>재검증·명시</td><td>조정 후 정합성 재수행, 조정 내역은 결산 산출물에 명시. 회계 장부 자동수정 금지</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>산출물</strong>: 영업/투자/재무활동 현금흐름표(비교식 초기이월 입력 가능). 마감/확정 시 스냅샷 보관(<code>TenantSnapshot</code>), 생성 이력·매핑버전 감사(§11.3.1-(4)).</li>\n<li><strong>연계</strong>: 제출용 재무상태표(SA-CLS-03) 데이터 기반, 선행 SA-CLS-03·04(§25.9.8).</li>\n</ul>","fields":[{"name":"기간","desc":"조회 월"},{"name":"현금흐름 분류","desc":"0.전체/1.영업/2.투자/3.재무(`OPERATING`/`INVESTING`/`FINANCING`)"},{"name":"수정금액","desc":"B/S 금액이 적정 현금흐름 미반영 시 최종 유출입액 수정(예: 장부가 100만원 건물 150만원 처분 → 50만원 가산)"},{"name":"기타현금유출이없는비용(수익)","desc":"항목 제외 계산 ④현금증감과 ⑦(⑥기말−⑤기초) 차액 반영(④>⑦→기타현금유입이없는수익, ④<⑦→기타현금유출이없는비용)"},{"name":"툴바·더보기","desc":"간략보기(금액 있는 항목만)/전체보기, 저장, 과목편집(영업/투자/재무별 소분류·계정과목코드, 추가/삭제/초기화), 영문설정"},{"name":"BK 추가","desc":"차원(사업장), 회계기간, 영업/투자/재무 분류 매핑(`CashFlowMapping`), 정합성 검증"},{"name":"현금 정합성 검증","desc":"기초현금+영업·투자·재무 순현금흐름+환율변동효과 = 기말현금, 기말현금 = 재무상태표 현금및현금성자산 잔액 일치"},{"name":"① 검증 경고 발령","desc":"오차 발생 시 결산 화면에 붉은색 경고 + 불일치 금액(`diffAmount`) 출력(교착 방지 보완 프로세스)"},{"name":"② 수기 매핑 조정 툴","desc":"활동 분류 누락 전표(차·대 모두 대체계정 등)를 찾아 수동으로 현금흐름 차원을 매핑하는 원클릭 그리드 팝업"},{"name":"③ 조정 데이터 발행","desc":"추적 불가 소액 오차는 **승인 사유 입력 후** 특정 활동(영업활동기타 등) 귀속. **G/L 미변경 — 출력용 차원 테이블(`CashFlowAdjustment`/`CashFlowMapping`)에만 기록** + `DataChangeLog` 감사"},{"name":"재검증·명시","desc":"조정 후 정합성 재수행, 조정 내역은 결산 산출물에 명시. 회계 장부 자동수정 금지"},{"name":"간접법","desc":"당기순이익 → 비현금 항목 가감(감가상각비·대손상각·충당금전입·외화환산손익·유형자산처분손익 등) → 운전자본 증감(매출채권·재고자산·매입채무·선급/선수 기초·기말 비교) → 영업활동 CF. 투자/재무는 관련 계정 증감·거래 분류. Smart A 계산식: I.영업=당기순이익+현금유출없는비용−현금유입없는수익+자산·부채변동, II.투자=유입−유출, III.재무=유입−유출, IV=I+II+III, IV+V.기초현금 = VI.기말현금(§25.9.8)"},{"name":"직접법","desc":"현금및현금성자산 계정(`CashEquivalentAccount` 정의)의 상대계정·거래유형 분석으로 유입(매출·이자수취)·유출(매입·인건비·이자지급) 항목별 직접 집계"}],"tableCount":3,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-CLS-08","title":"현금흐름표","purpose":"영업/투자/재무 현금흐름(간접법)","linkage":"SA-OPN-06, TN-10","note":"","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-CLS-09","title":"결산부속명세서","phase":"1차","basis":"§25.9.9, §11.14","impl":"","tabs":"","sid":"sa_cls_09","prefix":"SA-CLS","group":"결산","purpose":"재무제표 주석·부속 명세","detailHtml":"<h4 class=\"doc-h doc-h4\">4.11 SA-CLS-09 결산부속명세서 (1차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 계정과목·명세서 항목을 설정하여 결산부속명세서 생성. 재무제표 일괄출력 내장(SA-CLS-13 = 동일 기능 호출). BK 보고패키지의 부속명세서 빌더 + 일괄 PDF 출력(§25.9.9).</li>\n<li><strong>조회조건·입력 필드</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>유형/값</th><th>근거</th></tr></thead><tbody><tr><td>조회월</td><td>최초 진입 시 '결산부속명세서 설정'에 따라 해당 시점 전표 입력 계정으로 자동 생성</td><td>§25.9.9</td></tr>\n<tr><td>명세서명·항목</td><td>F2/C 설정 명세서 선택, 명세서 추가 등록(하단부터·순서변경하기/순서저장하기), 계정과목(최초 자동설정·F2 추가, 중복불가), 용지방향(1.가로/2.세로)</td><td>§25.9.9</td></tr>\n<tr><td>명세서항목 유형</td><td>기본항목(전표 기준)/받을어음항목([받을어음현황])/지급어음항목([지급어음현황])/차입금항목([차입금현황])/고정자산항목([월별감가상각비계상] 기준). 항목명·사용여부 수정 가능</td><td>§25.9.9</td></tr>\n<tr><td>편의 기능</td><td>전기명세불러오기(새로불러오기 후 전체불러오기 필수), 참고사항, 계정과목 삭제(F5), 추가분반영(이후 추가 계정 자동 반영), 초기화, 소계/소계완료(연속 행 소계 — 불러오기·정렬 시 소계 삭제), 전체불러오기</td><td>§25.9.9</td></tr>\n<tr><td>더보기</td><td>불러오기설정(거래처원장 잔액기준/발생기준), 데이터정렬(명세서 유형 기준), 인쇄옵션(page 분리·회사표기·단위표기)</td><td>§25.9.9</td></tr>\n<tr><td>일괄출력(내장)</td><td>재무제표 구분(0.과목용/1.제출용/2.표준용/3.세목용), 출력유형(당기/비교식), 출력 재무제표 선택, PDF변환(폴더 선택), 인쇄(기본 프린터·미리보기 없음)</td><td>§25.9.9</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능·검증</strong>: 항목명·사용여부·순서 변경 시 반드시 불러오기 재실행, 정렬/소계 변경 시 소계 삭제. BK는 명세서 항목별 데이터 소스(어음/차입금/고정자산 현황)를 보조원장(AUX, P04) 차원과 연동, 일괄출력 = 보고패키지 일괄 PDF 생성 잡(§25.9.9).</li>\n<li><strong>산출물</strong>: 결산부속명세서, 재무제표 일괄출력 PDF/인쇄. <strong>연계</strong>: 받을어음/지급어음(AUX-02)·차입금 현황·[월별감가상각비계상](P08·AUX-09). 재무제표(SA-CLS-03~08) 산출 의존(§25.9.9).</li>\n</ul>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1 · <strong>조회조건·입력 필드</strong>:</h4><div class=\"doc-caption\"><strong>조회조건·입력 필드</strong>:</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>유형/값</th><th>근거</th></tr></thead><tbody><tr><td>조회월</td><td>최초 진입 시 '결산부속명세서 설정'에 따라 해당 시점 전표 입력 계정으로 자동 생성</td><td>§25.9.9</td></tr>\n<tr><td>명세서명·항목</td><td>F2/C 설정 명세서 선택, 명세서 추가 등록(하단부터·순서변경하기/순서저장하기), 계정과목(최초 자동설정·F2 추가, 중복불가), 용지방향(1.가로/2.세로)</td><td>§25.9.9</td></tr>\n<tr><td>명세서항목 유형</td><td>기본항목(전표 기준)/받을어음항목([받을어음현황])/지급어음항목([지급어음현황])/차입금항목([차입금현황])/고정자산항목([월별감가상각비계상] 기준). 항목명·사용여부 수정 가능</td><td>§25.9.9</td></tr>\n<tr><td>편의 기능</td><td>전기명세불러오기(새로불러오기 후 전체불러오기 필수), 참고사항, 계정과목 삭제(F5), 추가분반영(이후 추가 계정 자동 반영), 초기화, 소계/소계완료(연속 행 소계 — 불러오기·정렬 시 소계 삭제), 전체불러오기</td><td>§25.9.9</td></tr>\n<tr><td>더보기</td><td>불러오기설정(거래처원장 잔액기준/발생기준), 데이터정렬(명세서 유형 기준), 인쇄옵션(page 분리·회사표기·단위표기)</td><td>§25.9.9</td></tr>\n<tr><td>일괄출력(내장)</td><td>재무제표 구분(0.과목용/1.제출용/2.표준용/3.세목용), 출력유형(당기/비교식), 출력 재무제표 선택, PDF변환(폴더 선택), 인쇄(기본 프린터·미리보기 없음)</td><td>§25.9.9</td></tr></tbody></table></div></section>","validationHtml":"<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>명세서명·항목</th><th>F2/C 설정 명세서 선택, 명세서 추가 등록(하단부터·순서변경하기/순서저장하기), 계정과목(최초 자동설정·F2 추가, 중복불가), 용지방향(1.가로/2.세로)</th><th>§25.9.9</th></tr></thead><tbody></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능·검증</strong>: 항목명·사용여부·순서 변경 시 반드시 불러오기 재실행, 정렬/소계 변경 시 소계 삭제. BK는 명세서 항목별 데이터 소스(어음/차입금/고정자산 현황)를 보조원장(AUX, P04) 차원과 연동, 일괄출력 = 보고패키지 일괄 PDF 생성 잡(§25.9.9).</li>\n<li><strong>산출물</strong>: 결산부속명세서, 재무제표 일괄출력 PDF/인쇄. <strong>연계</strong>: 받을어음/지급어음(AUX-02)·차입금 현황·[월별감가상각비계상](P08·AUX-09). 재무제표(SA-CLS-03~08) 산출 의존(§25.9.9).</li>\n</ul>","fields":[{"name":"조회월","desc":"최초 진입 시 '결산부속명세서 설정'에 따라 해당 시점 전표 입력 계정으로 자동 생성"},{"name":"명세서명·항목","desc":"F2/C 설정 명세서 선택, 명세서 추가 등록(하단부터·순서변경하기/순서저장하기), 계정과목(최초 자동설정·F2 추가, 중복불가), 용지방향(1.가로/2.세로)"},{"name":"명세서항목 유형","desc":"기본항목(전표 기준)/받을어음항목([받을어음현황])/지급어음항목([지급어음현황])/차입금항목([차입금현황])/고정자산항목([월별감가상각비계상] 기준). 항목명·사용여부 수정 가능"},{"name":"편의 기능","desc":"전기명세불러오기(새로불러오기 후 전체불러오기 필수), 참고사항, 계정과목 삭제(F5), 추가분반영(이후 추가 계정 자동 반영), 초기화, 소계/소계완료(연속 행 소계 — 불러오기·정렬 시 소계 삭제), 전체불러오기"},{"name":"더보기","desc":"불러오기설정(거래처원장 잔액기준/발생기준), 데이터정렬(명세서 유형 기준), 인쇄옵션(page 분리·회사표기·단위표기)"},{"name":"일괄출력(내장)","desc":"재무제표 구분(0.과목용/1.제출용/2.표준용/3.세목용), 출력유형(당기/비교식), 출력 재무제표 선택, PDF변환(폴더 선택), 인쇄(기본 프린터·미리보기 없음)"}],"tableCount":1,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-CLS-09","title":"결산부속명세서","purpose":"재무제표 주석·부속 명세","linkage":"TN-23 명세서","note":"","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-CLS-12","title":"AI 합계잔액시산표","phase":"1차","basis":"§25.9.12","impl":"","tabs":"","sid":"sa_cls_12","prefix":"SA-CLS","group":"결산","purpose":"이상 계정·변동 AI 점검(이상탐지 훅)","detailHtml":"<h4 class=\"doc-h doc-h4\">4.12 SA-CLS-12 AI 합계잔액시산표 (1차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 수집 적격증빙(전자세금계산서·전자계산서·신용카드·현금영수증·통장)을 AI 자동분개한 <strong>가상(임의)전표가 반영된 시산표</strong>. BK 결산 미리보기/AI 자동분개의 &quot;증빙 기반 추정 시산표&quot;(§25.9.12).</li>\n<li><strong>조회조건</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>유형/값</th><th>근거</th></tr></thead><tbody><tr><td>조회기간</td><td>기간</td><td>§25.9.12</td></tr>\n<tr><td>자동전표처리 미전송 현황</td><td>전표확정 아닌 증빙의 미전송 건수·증빙별 집계, 클릭 시 원장조회로 상세 조회/수정/전표전송</td><td>§25.9.12</td></tr>\n<tr><td>원장조회</td><td>증빙별 자동전표처리 메뉴를 거치지 않고 계정별·전표유형별 즉시 수정·전표전송, 매입매출·일반전표 신규 입력</td><td>§25.9.12</td></tr>\n<tr><td>툴바</td><td>재무상태표→손익계산서/역순 정렬 옵션, 미추천 전표 보기(미추천 증빙 건수·금액 집계, 일괄 계정 반영·전표전송), 매입 신용카드 조회 설정(국세청(사업용)/카드사/국세청(화물복지)/엑셀(사용자서식)/국세청 엑셀 2종), 이용가이드</td><td>§25.9.12</td></tr>\n<tr><td>더보기</td><td>계정과목코드보기, 전표금액 조회 설정(미전송 전표 포함/미포함)</td><td>§25.9.12</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: 이상검증 — 자동분개 미추천·미전송 증빙을 시산표 금액과 함께 노출하여 누락/미반영 검증(미전송 건수 = 전송되어야 할 전표 건수 정합 점검). BK 파이프라인: 적격증빙 수집 → 추천 분개 → 미추천/미전송 이상검증 → 확정 전송. <strong>가상전표는 미확정 entry 상태로 관리, 전송 시 정식 전표(차원·entryCode 포함)로 승격</strong>(§25.9.12).</li>\n<li><strong>산출물</strong>: 가상전표 반영 시산표(조회), 증빙별 전표전송 결과. <strong>연계</strong>: P03 SA-ATX 자동전표처리(전자세금계산서/전자계산서/신용카드/현금영수증/통장), 후행 SA-CLS-02(정식 시산표)(§25.9.12).</li>\n</ul>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1 · <strong>조회조건</strong>:</h4><div class=\"doc-caption\"><strong>조회조건</strong>:</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>유형/값</th><th>근거</th></tr></thead><tbody><tr><td>조회기간</td><td>기간</td><td>§25.9.12</td></tr>\n<tr><td>자동전표처리 미전송 현황</td><td>전표확정 아닌 증빙의 미전송 건수·증빙별 집계, 클릭 시 원장조회로 상세 조회/수정/전표전송</td><td>§25.9.12</td></tr>\n<tr><td>원장조회</td><td>증빙별 자동전표처리 메뉴를 거치지 않고 계정별·전표유형별 즉시 수정·전표전송, 매입매출·일반전표 신규 입력</td><td>§25.9.12</td></tr>\n<tr><td>툴바</td><td>재무상태표→손익계산서/역순 정렬 옵션, 미추천 전표 보기(미추천 증빙 건수·금액 집계, 일괄 계정 반영·전표전송), 매입 신용카드 조회 설정(국세청(사업용)/카드사/국세청(화물복지)/엑셀(사용자서식)/국세청 엑셀 2종), 이용가이드</td><td>§25.9.12</td></tr>\n<tr><td>더보기</td><td>계정과목코드보기, 전표금액 조회 설정(미전송 전표 포함/미포함)</td><td>§25.9.12</td></tr></tbody></table></div></section>","validationHtml":"<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>자동전표처리 미전송 현황</th><th>전표확정 아닌 증빙의 미전송 건수·증빙별 집계, 클릭 시 원장조회로 상세 조회/수정/전표전송</th><th>§25.9.12</th></tr></thead><tbody><tr><td>원장조회</td><td>증빙별 자동전표처리 메뉴를 거치지 않고 계정별·전표유형별 즉시 수정·전표전송, 매입매출·일반전표 신규 입력</td><td>§25.9.12</td></tr>\n<tr><td>툴바</td><td>재무상태표→손익계산서/역순 정렬 옵션, 미추천 전표 보기(미추천 증빙 건수·금액 집계, 일괄 계정 반영·전표전송), 매입 신용카드 조회 설정(국세청(사업용)/카드사/국세청(화물복지)/엑셀(사용자서식)/국세청 엑셀 2종), 이용가이드</td><td>§25.9.12</td></tr>\n<tr><td>더보기</td><td>계정과목코드보기, 전표금액 조회 설정(미전송 전표 포함/미포함)</td><td>§25.9.12</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: 이상검증 — 자동분개 미추천·미전송 증빙을 시산표 금액과 함께 노출하여 누락/미반영 검증(미전송 건수 = 전송되어야 할 전표 건수 정합 점검). BK 파이프라인: 적격증빙 수집 → 추천 분개 → 미추천/미전송 이상검증 → 확정 전송. <strong>가상전표는 미확정 entry 상태로 관리, 전송 시 정식 전표(차원·entryCode 포함)로 승격</strong>(§25.9.12).</li>\n<li><strong>산출물</strong>: 가상전표 반영 시산표(조회), 증빙별 전표전송 결과. <strong>연계</strong>: P03 SA-ATX 자동전표처리(전자세금계산서/전자계산서/신용카드/현금영수증/통장), 후행 SA-CLS-02(정식 시산표)(§25.9.12).</li>\n</ul>","fields":[{"name":"조회기간","desc":"기간"},{"name":"자동전표처리 미전송 현황","desc":"전표확정 아닌 증빙의 미전송 건수·증빙별 집계, 클릭 시 원장조회로 상세 조회/수정/전표전송"},{"name":"원장조회","desc":"증빙별 자동전표처리 메뉴를 거치지 않고 계정별·전표유형별 즉시 수정·전표전송, 매입매출·일반전표 신규 입력"},{"name":"툴바","desc":"재무상태표→손익계산서/역순 정렬 옵션, 미추천 전표 보기(미추천 증빙 건수·금액 집계, 일괄 계정 반영·전표전송), 매입 신용카드 조회 설정(국세청(사업용)/카드사/국세청(화물복지)/엑셀(사용자서식)/국세청 엑셀 2종), 이용가이드"},{"name":"더보기","desc":"계정과목코드보기, 전표금액 조회 설정(미전송 전표 포함/미포함)"}],"tableCount":1,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-CLS-12","title":"AI 합계잔액시산표","purpose":"이상 계정·변동 AI 점검(이상탐지 훅)","linkage":"11.7, TN-17","note":"","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-CLS-13","title":"재무제표 일괄출력","phase":"1차","basis":"§25.9.13, §11.13","impl":"","tabs":"","sid":"sa_cls_13","prefix":"SA-CLS","group":"결산","purpose":"BS/PL/원가/주석 일괄 PDF","detailHtml":"<h4 class=\"doc-h doc-h4\">4.13 SA-CLS-13 재무제표 일괄출력 (1차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 재무제표 선택 → PDF 변환/인쇄. 실행 시 [결산부속명세서](SA-CLS-09) '재무제표 일괄출력' 실행(동일 기능). BK 보고패키지 일괄 PDF 출력 잡(§25.9.13).</li>\n<li><strong>조회조건</strong>: 재무제표 구분(0.과목용/1.제출용/2.표준용/3.세목용), 출력유형(당기/비교식 — 당기+전기 함께 표기), 출력 재무제표 선택, PDF변환(폴더 찾아보기→확인), 인쇄(기본 프린터·미리보기 미실행). BK 추가: 회계기간·차원(사업장) 필터(§25.9.13).</li>\n<li><strong>기능</strong>: 구분·출력유형을 출력 옵션 파라미터로 받아 보고패키지 문서 세트 일괄 생성(비동기 잡)(§25.9.13).</li>\n<li><strong>연계</strong>: SA-CLS-09 내장 기능 호출, SA-CLS-03·04·05 등 산출 결과 의존(§25.9.13).</li>\n</ul>","detailTablesHtml":"<p class=\"empty-note\">이 화면의 상세 표는 설계서 원문 설명으로 제공됩니다.</p>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>연계</strong>: SA-CLS-09 내장 기능 호출, SA-CLS-03·04·05 등 산출 결과 의존(§25.9.13).</li>\n</ul>","fields":[{"name":"회계기간","desc":"조회 및 입력 기준 기간"},{"name":"사업장","desc":"전체 또는 개별 사업장 선택"},{"name":"재무제표 일괄출력","desc":"화면별 상세설계 원문 기준 업무 필드"}],"tableCount":0,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 3만원 초과 적격증빙 미수취 명세(가산세)","detailHtml":"<h4 class=\"doc-h doc-h4\">4.15 SA-CLS-15 영수증수취명세서 (1차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 거래금액 3만원(접대비 3만원) 초과분에 대해 적격증빙(세금계산서·계산서·신용카드·현금영수증) 미수취 시 작성. BK 세무 명세서 빌더의 적격증빙 미수취 판정(§25.10.1).</li>\n<li><strong>조회조건·입력 필드</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>유형/값</th><th>근거</th></tr></thead><tbody><tr><td>명세서(2) 원천</td><td>[일반전표입력] 카드계좌 사용여부 &quot;부&quot;+&quot;2.명세서 제출대상&quot;/&quot;3.명세서 제출 제외&quot; 데이터가 미수취 집계</td><td>§25.10.1</td></tr>\n<tr><td>라인 필드</td><td>거래일자, 공급자 상호/성명/사업장주소/사업자등록번호(직접 또는 [거래처등록] F2/C 자동 — '명세서제출대상' 공란 거래는 사업자등록번호 필수), 거래금액(3만원 초과분), 구분(제출제외 사유 F2/C), 계정과목, 적요</td><td>§25.10.1</td></tr>\n<tr><td>구분코드(제출제외 사유 21종)</td><td>15.읍·면지역/16.금융·보험용역/17.비거주자/18.농어민/19.국가·지자체/20.비영리법인/21.원천징수대상사업소득/22.사업의 양도/23.전기통신·방송용역/24.국외 공급/25.공매·경매·수용/26.부동산구입/27.주택임대용역/28.택시운송/29.전산발매통합관리시스템/30.항공기항행용역/31.간주임대료/32.연체이자지급분/33.송금명세서제출분/34.접대비필요경비부인분(1만원/경조사비 20만원 초과, 21년 지출분부터 3만원 초과)/35.유료도로 통행료</td><td>§25.10.1</td></tr>\n<tr><td>명세서(1)</td><td>(2)탭 구분에 따라 집계: 구분코드 없음→(12)명세서제출대상, 구분코드 입력→코드별 집계 후 (11)제출 제외 대상 합산</td><td>§25.10.1</td></tr>\n<tr><td>해당사항없음(기타)</td><td>[일반전표입력] 카드계좌 &quot;0.부, 1.해당사항없음&quot; 데이터 불러오기</td><td>§25.10.1</td></tr>\n<tr><td>툴바·더보기</td><td>데이터정렬(거래일자/공급자상호/공급자명/구분코드/계정과목순), 불러오기(직접입력 제외 재반영/전체 삭제 후), 명세서(2)불러오기, 주민번호 별표, 세무대리인 등록([부가가치세 전자신고] '제출자등록' 자동 반영), 원장조회(전표수정), 계정과목코드 보이기/숨기기, 계산기, 엑셀변환</td><td>§25.10.1</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능·검증</strong>: 3만원 초과분만 입력, 전표 카드계좌구분 수정 시 (2)탭 재[불러오기]. 제출대상자 = 복식부기의무자·간편장부대상자(소규모·추계 제외), 제외대상자 = 법인(보관 의무만)·개인 추계신고자·간편장부 소규모사업자(신규/직전 수입 4,800만원 미만/연말정산 대상). 미제출 가산세 1%(복식부기의무자). BK는 카드계좌·명세서 구분·구분코드를 entry 속성으로 보유, 3만원 초과 룰+제외사유 코드로 자동 집계(§25.10.1).</li>\n<li><strong>산출물</strong>: 영수증수취명세서(1)/(2)(세무대리인 포함/제외 선택). <strong>연계</strong>: [일반전표입력](P03)·[거래처등록](P01)·[부가가치세 전자신고](P06). 구분코드 33 → SA-CLS-16 연동(§25.10.1).</li>\n</ul>", ></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능·검증</strong>: [거래처등록] 추가사항 탭 &quot;국세청은행/계좌번호&quot; 등록 시 불러오기 자동 반영. 전자신고 시 은행코드·은행명 필수값 검증. BK는 구분코드 33 전표를 거래처 은행/계좌 정보(AUX 차원 확장 필드)와 결합해 자동 집계(§25.10.2).</li>\n<li><strong>산출물</strong>: 경비등의송금명세서. <strong>연계</strong>: [일반전표입력]·[거래처등록]·법인세/종합소득세 전자신고, SA-CLS-15 구분코드 33 연동(§25.10.2).</li>\n</ul>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1 · <strong>입력 필드</strong>:</h4><div class=\"doc-caption\"><strong>입력 필드</strong>:</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>유형/값</th><th>근거</th></tr></thead><tbody><tr><td>원천</td><td>[일반전표입력] 카드계좌 &quot;부, 3.명세서제출제외&quot;+구분 &quot;33.송금명세서 제출분&quot; 자동 반영(직접 작성 가능)</td><td>§25.10.2</td></tr>\n<tr><td>라인</td><td>거래일자, 법인명(상호), 성명(대표자), 사업자(주민)등록번호, 거래내역/거래금액(<strong>3만원 이하 입력 불가</strong>), 송금일자, 은행명/계좌번호(F2/C 은행코드 — 전자신고 시 필수), 계정과목명(구분 33 선택 시 자동 반영·직접 입력 불가)</td><td>§25.10.2</td></tr>\n<tr><td>툴바·더보기</td><td>불러오기(직접입력 제외 재반영/전체 삭제 후), 작성요령, 주민번호 별표, 체크펜, 계산기</td><td>§25.10.2</td></tr></tbody></table></div></section>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>기능·검증</strong>: [거래처등록] 추가사항 탭 &quot;국세청은행/계좌번호&quot; 등록 시 불러오기 자동 반영. 전자신고 시 은행코드·은행명 필수값 검증. BK는 구분코드 33 전표를 거래처 은행/계좌 정보(AUX 차원 확장 필드)와 결합해 자동 집계(§25.10.2).</li>\n<li><strong>산출물</strong>: 경비등의송금명세서. <strong>연계</strong>: [일반전표입력]·[거래처등록]·법인세/종합소득세 전자신고, SA-CLS-15 구분코드 33 연동(§25.10.2).</li>\n</ul>","fields":[{"name":"원천","desc":"[일반전표입력] 카드계좌 \"부, 3.명세서제출제외\"+구분 \"33.송금명세서 제출분\" 자동 반영(직접 작성 가능)"},{"name":"라인","desc":"거래일자, 법인명(상호), 성명(대표자), 사업자(주민)등록번호, 거래내역/거래금액(**3만원 이하 입력 불가**), 송금일자, 은행명/계좌번호(F2/C 은행코드 — 전자신고 시 필수), 계정과목명(구분 33 선택 시 자동 반영·직접 입력 불가)"},{"name":"툴바·더보기","desc":"불러오기(직접입력 제외 재반영/전체 삭제 후), 작성요령, 주민번호 별표, 체크펜, 계산기"}],"tableCount":1,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-CLS-16","title":"경비등 송금명세서","purpose":"송금명세 작성(국세청 은행/계좌)","linkage":"SA-BAS-06","note":"","source":"bk_화면설계서_v1.0.html"},"legacyTitle":"경비등의송금명세서"},{"id":"SA-CLS-17","title":"지출증빙서류합계표","phase":"1차","basis":"§25.10.3","impl":"","tabs":"","sid":"sa_cls_17","prefix":"SA-CLS","group":"결산","purpose":"지출증빙 유형별 합계","detailHtml":"<h4 class=\"doc-h doc-h4\">4.17 SA-CLS-17 지출증명서류합계표 (1차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 법인세법 116조② 지출증명서류 수취 대상 거래(유형·무형·재고자산·비용)의 합계표. 신고용·관리용·현황 탭(§25.10.3).</li>\n<li><strong>조회조건·집계 규칙</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>규칙</th><th>근거</th></tr></thead><tbody><tr><td>신고용 탭</td><td>표준재무제표계정과목만 표시: 계정별 지출증빙서류수취금액(신용카드 법인/개인·현금영수증·세금계산서·계산서), 수취제외대상금액, 차이</td><td>§25.10.3</td></tr>\n<tr><td>1) 표준대차대조표</td><td>당해년도 취득 유·무형자산(토지/건물/차량운반구 등). 유가증권·대여금 제외. 표준용코드 미설정 시 공란</td><td>§25.10.3</td></tr>\n<tr><td>2) 표준손익계산서</td><td>당해 사업연도 비용. 급여·감가상각비·이자비용 제외</td><td>§25.10.3</td></tr>\n<tr><td>3) 표준손익계산서부속명세서</td><td>원가비용, 구분(제조=1/공사=2/임대=3/분양=4/운송=5/기타=6). 임금·감가상각 제외</td><td>§25.10.3</td></tr>\n<tr><td>수취금액 불러오기 기준</td><td>[매입매출전표] 57.카과·58.카면·59.카영(신용카드), 61.현과·62.현면(현금영수증), 51.과세·52.영세·54.불공(세금계산서), 53.면세(계산서). [일반전표] 카드계좌 &quot;여&quot;+1.카드(법인)/3.개인카드/2.현금영수증. 접대비 적요 01.거래처 접대비/신용카드(법인)→&quot;신용카드(법인)&quot;, 그 외 접대비·만원 미만→수취제외</td><td>§25.10.3</td></tr>\n<tr><td>수취제외대상금액</td><td>적격증빙 미증빙 자산 + 적격증빙이라도 3만원 미만. [매입매출전표] 합계 3만원 미만, [일반전표] 카드계좌&quot;부&quot;+제출제외·해당사항없음(관리용 구분 &quot;1.해당사항없음 수취제외 포함&quot;)</td><td>§25.10.3</td></tr>\n<tr><td>차이</td><td>표준재무제표계정 금액 − ('3.금액,4.계' − '10.수취제외대상금액'). [매입매출전표] 60.면건, [일반전표] 카드계좌&quot;부&quot;+제출대상·해당사항없음(수취제외 미포함)에서 불러옴</td><td>§25.10.3</td></tr>\n<tr><td>관리용 탭</td><td>전표입력 &quot;새로 불러오기&quot; 데이터 조회(수정·삭제 불가), 기간·구분(&quot;1.해당사항 없음 수취제외 포함&quot;)</td><td>§25.10.3</td></tr>\n<tr><td>현황 탭</td><td>표준대차/표준손익/표준부속명세서 선택 + 증명서류 구분별 상세조회</td><td>§25.10.3</td></tr>\n<tr><td>툴바</td><td>불러오기(계정↔표준코드 연결, 법인/금융·보험·증권업 유형별), 저장, 원장조회, 일괄삭제(신고용), 엑셀변환(탭별)</td><td>§25.10.3</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능·검증</strong>: 개인신용카드는 법인 업무용 인정분만. 표준용코드 미설정 시 공란 → [계정과목적요등록] 설정 후 재조회. 불러오기 시 [표준재무상태표] 법인유형 기준. BK는 전표유형코드·카드계좌 속성·금액 임계값(3만원/접대비 만원)을 적격증빙 판정 룰로, 표준재무제표 코드 매핑 테이블로 신고용 집계 생성(§25.10.3).</li>\n<li><strong>산출물</strong>: 지출증명서류합계표(신고용/관리용/현황). <strong>연계</strong>: [지출증명서류수취신고검토서(전자신고)] → 법인세 전자신고, [계정과목적요등록] 표준코드(P01)(§25.10.3).</li>\n</ul>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1 · <strong>조회조건·집계 규칙</strong>:</h4><div class=\"doc-caption\"><strong>조회조건·집계 규칙</strong>:</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>규칙</th><th>근거</th></tr></thead><tbody><tr><td>신고용 탭</td><td>표준재무제표계정과목만 표시: 계정별 지출증빙서류수취금액(신용카드 법인/개인·현금영수증·세금계산서·계산서), 수취제외대상금액, 차이</td><td>§25.10.3</td></tr>\n<tr><td>1) 표준대차대조표</td><td>당해년도 취득 유·무형자산(토지/건물/차량운반구 등). 유가증권·대여금 제외. 표준용코드 미설정 시 공란</td><td>§25.10.3</td></tr>\n<tr><td>2) 표준손익계산서</td><td>당해 사업연도 비용. 급여·감가상각비·이자비용 제외</td><td>§25.10.3</td></tr>\n<tr><td>3) 표준손익계산서부속명세서</td><td>원가비용, 구분(제조=1/공사=2/임대=3/분양=4/운송=5/기타=6). 임금·감가상각 제외</td><td>§25.10.3</td></tr>\n<tr><td>수취금액 불러오기 기준</td><td>[매입매출전표] 57.카과·58.카면·59.카영(신용카드), 61.현과·62.현면(현금영수증), 51.과세·52.영세·54.불공(세금계산서), 53.면세(계산서). [일반전표] 카드계좌 &quot;여&quot;+1.카드(법인)/3.개인카드/2.현금영수증. 접대비 적요 01.거래처 접대비/신용카드(법인)→&quot;신용카드(법인)&quot;, 그 외 접대비·만원 미만→수취제외</td><td>§25.10.3</td></tr>\n<tr><td>수취제외대상금액</td><td>적격증빙 미증빙 자산 + 적격증빙이라도 3만원 미만. [매입매출전표] 합계 3만원 미만, [일반전표] 카드계좌&quot;부&quot;+제출제외·해당사항없음(관리용 구분 &quot;1.해당사항없음 수취제외 포함&quot;)</td><td>§25.10.3</td></tr>\n<tr><td>차이</td><td>표준재무제표계정 금액 − ('3.금액,4.계' − '10.수취제외대상금액'). [매입매출전표] 60.면건, [일반전표] 카드계좌&quot;부&quot;+제출대상·해당사항없음(수취제외 미포함)에서 불러옴</td><td>§25.10.3</td></tr>\n<tr><td>관리용 탭</td><td>전표입력 &quot;새로 불러오기&quot; 데이터 조회(수정·삭제 불가), 기간·구분(&quot;1.해당사항 없음 수취제외 포함&quot;)</td><td>§25.10.3</td></tr>\n<tr><td>현황 탭</td><td>표준대차/표준손익/표준부속명세서 선택 + 증명서류 구분별 상세조회</td><td>§25.10.3</td></tr>\n<tr><td>툴바</td><td>불러오기(계정↔표준코드 연결, 법인/금융·보험·증권업 유형별), 저장, 원장조회, 일괄삭제(신고용), 엑셀변환(탭별)</td><td>§25.10.3</td></tr></tbody></table>< ":"§25.10.4","impl":"","tabs":"","sid":"sa_cls_18","prefix":"SA-CLS","group":"결산","purpose":"월별/기간별 손익 비교","detailHtml":"<h4 class=\"doc-h doc-h4\">4.18 SA-CLS-18 기간별손익계산서 (1차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 기간별 매출·매입·노무비·제조경비·판관비·영업외수익/비용 조회. 월별·분기별·반기별·각 전년대비 6탭. BK 기간 비교 손익 보고서(§25.10.4).</li>\n<li><strong>조회조건</strong>: 탭(월별 1~12월 비교식/분기별 1/4~4/4/반기별 상·하/월·분기·반기 전년대비 — 전기/당기 비교식), 일자(조회 월), 구분(손익계산서/포괄손익계산서 × &quot;1.과목&quot;/&quot;2.세목&quot; — 포괄손익은 중소기업회계기준 0.사용안함 시, 세목은 5자리 체계 시), 더보기(원장조회(전표수정), 계정과목코드보기, 유형설정(포괄 시 중단사업여부), 포괄손익설정(포함 계정 선택)), 엑셀변환(탭별)(§25.10.4).</li>\n<li><strong>기능·검증</strong>: 전기 데이터 미조회 시 — 전기 작업기수 변경 후 '월별' 탭 조회 → [마감후이월]에서 [전기 기간별 손익계산서] 마감 → 당기 재조회, 또는 [전기기간별손익계산서] 직접 입력([전기분손익계산서] 선행). BK는 기간 그레인(월/분기/반기)·전년대비를 조회 파라미터로 받아 전표 집계로 산출, 포괄손익·중단사업 옵션은 보고 분류 설정(§25.10.4).</li>\n<li><strong>연계</strong>: [전기분손익계산서](P02)·[마감후이월](P10), 중단사업 SA-CLS-20(§25.10.4).</li>\n</ul>","detailTablesHtml":"<p class=\"empty-note\">이 화면의 상세 표는 설계서 원문 설명으로 제공됩니다.</p>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>기능·검증</strong>: 전기 데이터 미조회 시 — 전기 작업기수 변경 후 '월별' 탭 조회 → [마감후이월]에서 [전기 기간별 손익계산서] 마감 → 당기 재조회, 또는 [전기기간별손익계산서] 직접 입력([전기분손익계산서] 선행). BK는 기간 그레인(월/분기/반기)·전년대비를 조회 파라미터로 받아 전표 집계로 산출, 포괄손익·중단사업 옵션은 보고 분류 설정(§25.10.4).</li>\n<li><strong>연계</strong>: [전기분손익계산서](P02)·[마감후이월](P10), 중단사업 SA-CLS-20(§25.10.4).</li>\n</ul>","fields":[{"name":"회계기간","desc":"조회 및 입력 기준 기간"},{"name":"사업장","desc":"전체 또는 개별 사업장 선택"},{"name":"기간별손익계산서","desc":"화면별 상세설계 원문 기준 업무 필드"}],"tableCount":0,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-CLS-18","title":"기간별 손익계산서","purpose":"월별/기간별 손익 비교","linkage":"SA-OPN-09","note":"","source":"bk_화면설계서_v1.0.html"},"legacyTitle":"기간별손익계산서"},{"id":"SA-CLS-19","title":"기간별 원가명세서","phase":"1차","basis":"§25.10.5","impl":"","tabs":"","sid":"sa_cls_19","prefix":"SA-CLS","group":"결산","purpose":"월별/기간별 원가 비교","detailHtml":"<h4 class=\"doc-h doc-h4\">4.19 SA-CLS-19 기간별원가명세서 (1차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 기간별 원가명세서 조회. 월별·분기별·반기별·각 전년대비 6탭, [원가명세서] 입력 계정과목에 준한 월별 조회. BK 기간 비교 원가 보고서(§25.10.5).</li>\n<li><strong>조회조건</strong>: 기간(조회 월), 구분(더보기 원가설정에 따른 원가설정 선택), 더보기 — <strong>원가설정</strong>(매출원가·원가경비코드 연결, [계정과목및적요등록] 자동조회·편집: 제조업 455.제품매출원가/재고자산 150·152·153·156·159/경비 501~600, 도급건설업 452.도급공사매출원가/162·165·169/601~700, 분양건설업 453.분양공사매출원가/170·171/701~800. 상품매출원가(구분 3.매입판매)는 원가설정 안 함), 제목편집, 원장조회(전표수정), 계정과목코드보기, 엑셀변환(탭별)(§25.10.5).</li>\n<li><strong>기능·검증</strong>: 전기 데이터 미조회 시 전기 기수 마감 절차(SA-CLS-18과 동일 패턴, [전기분원가명세서] 선행). BK는 원가코드·재고자산코드·원가경비코드(업종별)를 코스트센터/현장 차원과 연결, 기간 그레인·전년대비를 조회 파라미터로 산출(§25.10.5).</li>\n<li><strong>연계</strong>: [원가명세서](SA-CLS-05)·[전기분원가명세서](P02)·[마감후이월](P10)(§25.10.5).</li>\n</ul>","detailTablesHtml":"<p class=\"empty-note\">이 화면의 상세 표는 설계서 원문 설명으로 제공됩니다.</p>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>기능·검증</strong>: 전기 데이터 미조회 시 전기 기수 마감 절차(SA-CLS-18과 동일 패턴, [전기분원가명세서] 선행). BK는 원가코드·재고자산코드·원가경비코드(업종별)를 코스트센터/현장 차원과 연결, 기간 그레인·전년대비를 조회 파라미터로 산출(§25.10.5).</li>\n<li><strong>연계</strong>: [원가명세서](SA-CLS-05)·[전기분원가명세서](P02)·[마감후이월](P10)(§25.10.5).</li>\n</ul>","fields":[{"name":"회계기간","desc":"조회 및 입력 기준 기간"},{"name":"사업장","desc":"전체 또는 개별 사업장 선택"},{"name":"기간별원가명세서","desc":"화면별 상세설계 원문 기준 업무 필드"}],"tableCount":0,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-CLS-19","title":"기간별 원가명세서","purpose":"월별/기간별 원가 비교","linkage":"SA-OPN-10","note":"","source":"bk_화면설계서_v1.0.html"},"legacyTitle":"기간별원가명세서"},{"id":"SA-CLS-10","title":"현금·예금 잔액검토","phase":"2차","basis":"§25.9.10","impl":"","tabs":"","sid":"sa_cls_10","prefix":"SA-CLS","group":"결산","purpose":"현금/예금 계정 잔액 대사·검토(대표자 가지급금 전송)","detailHtml":"<h4 class=\"doc-h doc-h4\">4.20 SA-CLS-10 현금및예금잔액검토 (2차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 현금·예금 계정 잔액검토. 현금일괄잔액검토·현금잔액검토·당좌예금잔액검토·보통예금잔액검토·당좌예금잔액(세목)·보통예금잔액(세목) 6탭. BK 결산 전 잔액검토(현금·예금 조정) 워크플로우(§25.9.10).</li>\n<li><strong>입력 필드(탭별)</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>탭</th><th>필드</th><th>근거</th></tr></thead><tbody><tr><td>현금일괄잔액검토(자동 조정)</td><td>기간(최소 1개월, 1년치=1~12월), 계정과목(개인→1.인출금/법인→2.가지급금,가수금), 금액(최소·최대금액·수정단위), 전표추가([전표추가]/F7 → [일반전표입력])</td><td>§25.9.10</td></tr>\n<tr><td>현금잔액검토(수동 조정)</td><td>검토월, 구분(1.출금/2.입금), 계정과목(1.가지급금(법인 134)/2.가수금(257)/3.인출금(개인 338)), 수정금액, 전표추가</td><td>§25.9.10</td></tr>\n<tr><td>당좌예금잔액검토/(세목)</td><td>검토월, 계정과목(세목 탭만 F2/C), 금융거래처(금융기관코드), 일, 구분 및 계정과목(1.출금/2.입금→상대계정 101현금 자동, 3.차변(당좌예금 대변 시)/4.대변(당좌예금 차변 시) — 당좌예금 자동처리), 전표추가, 대표자 설정(가지급금·가수금)</td><td>§25.9.10</td></tr>\n<tr><td>보통예금잔액검토/(세목)</td><td>당좌예금과 동일 구조(101현금 상대계정 자동, 보통예금 자동처리), 전표추가, 대표자 설정</td><td>§25.9.10</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능·검증</strong>: 좌측 수정전금액/수정후금액 및 가지급금·가수금·인출금 잔액 참고 검토. '전표추가'분 일괄삭제 = [일반전표입력] Shift+F6 '현금검토'/'예금검토' 체크 삭제(복구 불가). BK는 조정분개 자동생성을 <strong>회사구분(법인/개인) 분기</strong>로 구현, 금융거래처=거래처(AUX) 차원, 일괄삭제 가능 플래그 = entry 메타데이터(§25.9.10).</li>\n<li><strong>산출물</strong>: 잔액검토 조정전표, 통장 대조용 일별현황. <strong>연계</strong>: 조정전표 → 일반전표 추가 → 후행 SA-CLS-02·03. P04 AUX-05(가지급금·가수금 보조원장) 반영·식별(§25.9.10).</li>\n</ul>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1 · <strong>입력 필드(탭별)</strong>:</h4><div class=\"doc-caption\"><strong>입력 필드(탭별)</strong>:</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>탭</th><th>필드</th><th>근거</th></tr></thead><tbody><tr><td>현금일괄잔액검토(자동 조정)</td><td>기간(최소 1개월, 1년치=1~12월), 계정과목(개인→1.인출금/법인→2.가지급금,가수금), 금액(최소·최대금액·수정단위), 전표추가([전표추가]/F7 → [일반전표입력])</td><td>§25.9.10</td></tr>\n<tr><td>현금잔액검토(수동 조정)</td><td>검토월, 구분(1.출금/2.입금), 계정과목(1.가지급금(법인 134)/2.가수금(257)/3.인출금(개인 338)), 수정금액, 전표추가</td><td>§25.9.10</td></tr>\n<tr><td>당좌예금잔액검토/(세목)</td><td>검토월, 계정과목(세목 탭만 F2/C), 금융거래처(금융기관코드), 일, 구분 및 계정과목(1.출금/2.입금→상대계정 101현금 자동, 3.차변(당좌예금 대변 시)/4.대변(당좌예금 차변 시) — 당좌예금 자동처리), 전표추가, 대표자 설정(가지급금·가수금)</td><td>§25.9.10</td></tr>\n<tr><td>보통예금잔액검토/(세목)</td><td>당좌예금과 동일 구조(101현금 상대계정 집), 사용구분(1.쇼핑몰 구입/2.신변잡화/3.가정용품/4.업무무관 경비지출/5.개인적 치료/6.공휴일 사용/7.기타사유/8.업무관련(정상)), 적정여부(8→'여', 그 외→'부'), 유형([일반전표]→'일반'/[매입매출전표]→'매입'), 금액설정(분개금액 기준), 공휴일 설정(회계기간 내 자동 반영, 추가정상근무→8/추가공휴일→6), 사적사용 대상등록(특정 사원 카드 '4.업무무관'·'부'), 사용구분 설정(적요명 반영), 불러오기, 크게</td><td>§25.9.11</td></tr>\n<tr><td>2) 상품권·기프트카드·선불카드 사용금액 적정여부 검토</td><td>사용일자·계정과목코드·사용내역_금액·수령자 소명가능(기본 1.가능), 구분/성명(거래처)/직책, 수령자 검토_금액, 적정여부(기본 1.여), 유형, 상품권 조회조건 등록(적요명/계정코드·적요코드 기준, 계정별 수령자), 불러오기, 크게</td><td>§25.9.11</td></tr>\n<tr><td>툴바</td><td>검토서식PDF변환, 데이터정렬, 원장조회(전표수정), 불러오기, 저장, 일괄변경(라인 선택 후)</td><td>§25.9.11</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능·검증</strong>: 사용구분 미설정 시 4.업무무관/6.공휴일/8.업무관련 자동 반영, 사적사용 대상 등록 사원 카드 = '4.업무무관'·'부' 자동, 적요명/적요코드 매칭 자동 판정. 귀속자=사원 차원/수령자=거래처(AUX). PDF 전자제출 = 보고패키지 출력 잡(§25.9.11).</li>\n<li><strong>연계</strong>: [일반전표]·[매입매출전표](P03), 법인세 신고 파이프라인(§25.9.11).</li>\n</ul>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1 · <strong>입력 필드</strong>:</h4><div class=\"doc-caption\"><strong>입력 필드</strong>:</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>구성</th><th>필드</th><th>근거</th></tr></thead><tbody><tr><td>1) 계정과목별 신용카드 사적사용 여부 검토</td><td>사용일자·계정과목코드·사용내역_금액·귀속자·사용내용·사적사용여부검토_금액(전표 분개 자동 반영·직접 편집), 사용구분(1.쇼핑몰 구입/2.신변잡화/3.가정용품/4.업무무관 경비지출/5.개인적 치료/6.공휴일 사용/7.기타사유/8.업무관련(정상)), 적정여부(8→'여', 그 외→'부'), 유형([일반전표]→'일반'/[매입매출전표]→'매입'), 금액설정(분개금액 기준), 공휴일 설정(회계기간 내 자동 반영, 추가정상근무→8/추가공휴일→6), 사적사용 대상등록(특정 사원 카드 '4.업무무관'·'부'), 사용구분 설정(적요명 반영), 불러오기, 크게</td><td>§25.9.11</td></tr>\n<tr><td>2) 상품권·기프트카드·선불카드 사용금액 적정여부 검토</td><td>사용일자·계정과목코드·사용내역_금액·수령자 소명가능(기본 1.가능), 구분/성명(거래처)/직책, 수령자 검토_금액, 적정여부(기본 1.여), 유형, 상품권 조회조건 등록(적요명/계정코드·적요코드 기준, 계정별 수령자), 불러오기, 크게</td><td>§25.9.11</td></tr>\n<tr><td>툴바</td><td>검토서식PDF변환, 데이터정렬, 원장조회(전표수정), 불러오기, 저장, 일괄변경(라인 선택 후)</td><td>§25.9.11</td></tr></tbody></table></div></section>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>목적</strong>: 국세청 법인세 신고 사후검증 항목 자기검증 검토서식. 신고기한 다음날부터 prefix":"SA-CLS","group":"결산","purpose":"중단사업(부서/PJT) 손익","detailHtml":"<h4 class=\"doc-h doc-h4\">4.22 SA-CLS-20 중단사업손익계산서 (2차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 중단사업 손익 항목 조회/출력 + 손익대체 워크플로우. [환경설정] 중소기업 회계기준 &quot;0.사용안함&quot; 시 사용 가능, &quot;중단사업코드설정&quot;(부서 또는 프로젝트 중 하나) 데이터만 반영(§25.10.6).</li>\n<li><strong>조회조건</strong>: 일자(조회 월), 구분(0.과목/1.세목), 내역(중단사업코드 설정 부서/프로젝트별 손익항목), 더보기(중단사업설정(부서/프로젝트), 법인세 효과(법인세율 입력 후 계산·수정 가능), 계정과목코드보기, 원장조회(전표수정))(§25.10.6).</li>\n<li><strong>기능</strong>: 전표추가 — 중단사업 손익대체분개를 [일반전표입력]에 전송. <strong>이전 분개 금액에서 현재 조회 금액을 차감한 차액만 추가(이중 반영 방지), 조회일 말일자 전송</strong>. BK는 중단사업 코드를 6차원 중 DEPARTMENT/PROJECT 차원으로 매핑해 필터 집계하고, 손익대체분개를 <code>CLOSING_DR</code>/<code>CLOSING_CR</code> 라인으로 차액 기반 생성. 법인세 효과 = 세율 파라미터(§25.10.6).</li>\n<li><strong>산출물</strong>: 중단사업 손익현황(법인세 효과 포함), 손익대체분개 전표. <strong>연계</strong>: [환경설정] 중단사업코드(P01), SA-CLS-04 중단사업 유형설정 연동(§25.10.6).</li>\n</ul>","detailTablesHtml":"<p class=\"empty-note\">이 화면의 상세 표는 설계서 원문 설명으로 제공됩니다.</p>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>기능</strong>: 전표추가 — 중단사업 손익대체분개를 [일반전표입력]에 전송. <strong>이전 분개 금액에서 현재 조회 금액을 차감한 차액만 추가(이중 반영 방지), 조회일 말일자 전송</strong>. BK는 중단사업 코드를 6차원 중 DEPARTMENT/PROJECT 차원으로 매핑해 필터 집계하고, 손익대체분개를 <code>CLOSING_DR</code>/<code>CLOSING_CR</code> 라인으로 차액 기반 생성. 법인세 효과 = 세율 파라미터(§25.10.6).</li>\n<li><strong>산출물</strong>: 중단사업 손익현황(법인세 효과 포함), 손익대체분개 전표. <strong>연계</strong>: [환경설정] 중단사업코드(P01), SA-CLS-04 중단사업 유형설정 연동(§25.10.6).</li>\n</ul>","fields":[{"name":"회계기간","desc":"조회 및 입력 기준 기간"},{"name":"사업장","desc":"전체 또는 개별 사업장 선택"},{"name":"중단사업손익계산서","desc":"화면별 상세설계 원문 기준 업무 필드"}],"tableCount":0,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-CLS-20","title":"중단사업 손익계산서","purpose":"중단사업(부서/PJT) 손익","linkage":"SA-OPN-14, SA-BAS-03","note":"","source":"bk_화면설계서_v1.0.html"},"legacyTitle":"중단사업손익계산서"},{"id":"SA-CLS-21","title":"중단사업 원가명세서","phase":"2차","basis":"§25.10.7","impl":"","tabs":"","sid":"sa_cls_21","prefix":"SA-CLS","group":"결산","purpose":"중단사업 원가","detailHtml":"<h4 class=\"doc-h doc-h4\">4.23 SA-CLS-21 중단사업원가명세서 (2차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 중단사업 원가명세서 작성(관리용) + 원가대체 워크플로우. 사용 조건은 SA-CLS-20과 동일(중소기업 회계기준 미적용+중단사업코드 설정)(§25.10.7).</li>\n<li><strong>조회조건</strong>: 일자(조회 월), 구분(원가설정 코드), 새로 불러오기(<strong>'확인' 시 중단사업제조원가 안분 분개도 삭제</strong>), 전표추가(원가대체분개 [일반전표입력] 전송 — 이전 전표추가분과의 차액만, 말일자), 더보기(원가설정(매출원가·원가경비코드), 중단사업설정, 원장조회, 계정과목코드보기)(§25.10.7).</li>\n<li><strong>기능</strong>: BK는 중단사업 코드(부서/프로젝트)를 코스트센터/프로젝트 차원으로 필터해 원가 안분하고, 원가대체분개를 <code>CLOSING_DR</code>/<code>CLOSING_CR</code> 라인으로 차액 기반 생성, 원가설정을 차원 기반 원가 매핑으로 구현(§25.10.7).</li>\n<li><strong>산출물</strong>: 중단사업 원가현황(관리용), 원가대체분개 전표. <strong>연계</strong>: SA-CLS-05·SA-CLS-20 연동, [환경설정] 원가설정(§25.10.7).</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.24 [BK 공통] 보고패키지 · 계정별 명세 tie-out · 계산시트 (1차)</h4>\n<ul class=\"doc-list\">\n<li><strong>보고패키지(<code>ReportPackage</code>)</strong>: 정해진 목차로 매월 조립·검증되어 이용회사에 전달되는 패키지. 템플릿(<code>ReportPackageTemplate</code>)은 관리회사가 공통 표준(<code>STD_REPORT_PACKAGE</code>)으로 배포 — 구성요소 목록·순서·필수여부·기장모드/요금제·출력 언어·산출 형식(xlsx/pdf)(§11.13-(1)).</li>\n<li><strong>구성요소 카탈로그(<code>ReportComponent</code>)</strong>: BS/IS(PL)/TB/현금흐름표/자본변동표/분개장(JE)/총계정원장(GL)/계정별 명세서/고정자산명세/채권·채무 aging/부가세 집계/매입원장 세무상태/원천세/관계사 잔액/제조원가명세서(CM). 결산 스냅샷·원장에서 자동 생성, 회계기준별·언어별 산출(§11.13-(2)).</li>\n<li><strong>상태머신·생성 흐름</strong>(§11.13-(3)):</li>\n</ul>\n<pre class=\"doc-code\"><code>PENDING → GENERATED → VALIDATED → REVIEWED → DELIVERED → ACKED\n정기 스케줄(월마감 후) → 컴포넌트 자동 생성 → 패키지 조립 → 정합성 검증(tie-out 전건 통과 +\n미결항목 0건) → 주기장 측 검토·결재 → 이용회사 전달(공유링크/이메일) → 이용회사 확인(Ack)</code></pre>\n<ul class=\"doc-list\">\n<li><strong>버전·재생성</strong>: 재무제표 변경 시 패키지 자동 무효화·재조립 안내, 전달본은 파일해시·표준/taxonomy 버전·생성자 기록(§11.13-(4)).</li>\n<li><strong>계정별 명세·tie-out</strong>(§11.14): <code>AccountSchedule</code> 명세 라인(거래처/항목·적요·금액·증빙참조·비고), 부채성·충당성 항목은 이월(Opening)/사용(Utilization)/설정(Accruals)/대체(Reclass)/기말(Closing) movement 컬럼. <code>ScheduleTieOut</code> — 명세 합계 = GL/TB 마감잔액 자동 대조 → <code>diff</code> 계산 → <code>verified(boolean)</code>. <strong>미tie-out 계정은 마감 체크리스트·보고패키지 검증 차단 항목</strong>. 명세 소스 = (a)보조원장/거래처원장 자동집계(P04) (b)스케줄형 항목(선급/충당/리스 §11.15) (c)수기 명세+증빙 연결. 전월 명세 carry-forward(movement만 갱신).</li>\n<li><strong>계산시트(M8)</strong>: 대손충당금·감가상각·충당금·외화평가 등 산출 근거를 셀 단위 계산식이 보존되는 <code>CalculationSheet</code>로 자동 생성, 명세·전표·원장과 양방향 drill-down. 근거자료 첨부(증빙 프레임워크 재사용). 계산시트 변경 → 연결 주석(<code>DisclosureNote</code>) 재생성 대상 표시 + 보고패키지 무효화·재검증(§11.14-(6)).</li>\n<li><strong>주석 자동화(N10)</strong>: 매출채권 및 기타채권(Invoice/aging)·대손충당금(설정·환입 Roll-forward)·Aging 분석(<code>AgingSnapshot</code>)·Roll-forward(기초→증감→기말: 유형·무형자산·충당부채·충당금)·금융상품·유형/무형자산·충당부채를 원장·보조부에서 자동 산출. 재무제표 수치 ↔ 주석 수치 자동 교차 검증(불일치 시 검토대상), 주석별 근거 파일·산출 로직 링크로 Audit Trail 확보. 자동화 MVP 범위는 §23-54 확정(§11.3.2-(4)).</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">5. 데이터 모델</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>엔티티</th><th>핵심 필드</th><th>키/제약</th><th>근거</th></tr></thead><tbody><tr><td><code>FiscalYear</code></td><td>tenantId, 기수, 시작/종료일, 상태 — 회사별 회계달력</td><td>(tenant_id, 기수)</td><td>§11.9-(1), §12.1</td></tr>\n<tr><td><code>FiscalPeriod</code></td><td>월별, 상태(<code>FUTURE</code>/<code>OPEN</code>/<code>TEMP_CLOSED</code>/<code>CLOSED</code>/<code>LOCKED</code>+<code>REOPEN_REQUESTED</code>/<code>REOPENED</code>)</td><td>상태머신 검증(§12.3)</td><td>§11.9, §12.2</td></tr>\n<tr><td><code>ClosingChecklist</code></td><td>항목·결과·수행자</td><td>—</td><td>§11.9-(4)</td></tr>\n<tr><td><code>ClosingJob</code></td><td>가마감/본마감/연마감, status</td><td>분산 락 연계</td><td>§11.9-(4)</td></tr>\n<tr><td><code>ClosingReopenLog</code></td><td>reason, approverId, reopenedAt, 통지 여부</td><td>append-only</td><td>§11.9-(4)</td></tr>\n<tr><td><code>ClosingAutoEntryRule</code></td><td>대상 8종(감가/대손/퇴직급여충당/경과/미수·선수/재고평가/외화/법인세·이연법인세), 계정·산식·대상 기간, 실행 이력</td><td>버전·이력 보존</td><td>§11.3, §12.1</td></tr>\n<tr><td><code>CashFlowStatement</code> / <code>CashFlowStatementLine</code></td><td>period, ledgerBookId, method(DIRECT/INDIRECT), status / activity, item, amount</td><td>—</td><td>§11.3.1-(6)</td></tr>\n<tr><td><code>CashFlowMapping</code> / <code>CashEquivalentAccount</code></td><td>계정·거래유형→활동·세부항목(표준 배포+회사 확장) / 현금성자산 계정 정의</td><td>—</td><td>§11.3.1-(6)</td></tr>\n<tr><td><code>CashFlowAdjustment</code></td><td>diffAmount, targetActivity, reason, approverId — <strong>G/L 미변경 출력용 조정</strong></td><td>감사로그 필수</td><td>§11.3.1-(5)(6)</td></tr>\n<tr><td><code>CapitalTransaction</code> / <code>Shareholder</code></td><td>증자/감자/주식이전/분할/조직변경: 주주·주식수·액면가·발행가·주식발행초과금·등기일 / 지분율·취득일</td><td>—</td><td>§11.3(M), §12.1</td></tr>\n<tr><td><code>ReportPackage</code></td><td>tenantId, period, templateId, status, deliveredAt, ackedAt</td><td>상태 6종(§12.2)</td><td>§11.13-(5)</td></tr>\n<tr><td><code>ReportPackageTemplate</code> / <code>ReportComponent</code> / <code>ReportPackageDelivery</code></td><td>components[], langs, mode, plan / type, generator, order, required, lang / channel, fileHash, recipient, sentAt</td><td>—</td><td>§11.13-(5)</td></tr>\n<tr><td><code>AccountSchedule</code> / <code>AccountScheduleLine</code></td><td>period, accountCode, scheduleType / partner, desc, opening, utilization, accruals, reclass, closing, evidenceRef, remark</td><td>—</td><td>§11.14-(5)</td></tr>\n<tr><td><code>ScheduleTieOut</code></td><td>glBalance, scheduleTotal, diff, verified</td><td><code>verified=false</code> 마감 차단</td><td>§11.14-(5), §12.2</td></tr>\n<tr><td><code>AccrualSchedule</code> / <code>AccrualScheduleEntry</code></td><td>type, start, end, totalAmount, method(정액/일할), counterAccount / period, amount, journalRef</td><td>—</td><td>§11.15-(4)</td></tr>\n<tr><td><code>LeaseContract</code> / <code>LeaseAmortizationLine</code></td><td>start, end, payment, discountRate, freeMonths / period, opening, payment, interest, closing, depreciation, nbv, stPortion, ltPortion</td><td>—</td><td>§11.15-(4)</td></tr>\n<tr><td><code>FxRate</code> / <code>FxRevaluation</code></td><td>currency, asOf, rate, rateType / period, accountCode, currency, fcBalance, rate, revaluedKrw, unrealizedGl, journalRef</td><td>—</td><td>§11.16-(4)</td></tr>\n<tr><td><code>CostAllocationRule</code></td><td>rateType FIXED/REVENUE_BASED, basis, version — 배부 전표 자동 생성</td><td>버전 관리</td><td>§11.19-(3)(5)</td></tr>\n<tr><td><code>DisclosureNote</code> / <code>DisclosureMapping</code></td><td>주석 템플릿·데이터 바인딩 / 계정→FS 라인·taxonomy 매핑</td><td>—</td><td>§11.3.2-(6)</td></tr>\n<tr><td><code>TenantAcknowledgement</code></td><td>targetType, actorId, ackAt — 마감·패키지 Ack</td><td><code>PENDING</code>/<code>CONFIRMED</code>/<code>OBJECTED</code></td><td>§11.9-(3), §12.1·12.2</td></tr>\n<tr><td><code>JournalLine.entryCode</code></td><td><code>CLOSING_DR</code>/<code>CLOSING_CR</code>(+DR/CR/RECEIPT/PAYMENT, 확장 ACCRUAL/ADJUSTMENT/RECLASS/TAX_ADJ/STAT_ADJ)</td><td>결차/결대만 원가 반영</td><td>§12.1, §12.2(M2·R13)</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>상태값: 회계기간 5종+재개 2종, 보고패키지 6종, tie-out verified, 공시자료 7종, 제조원가 계산 6종(P2), Ack 3종(§12.2). 전표 헤더 복합키 PK=(tenant_id, 전표일자, 전표번호) 등 공통 제약은 §12.3 준용.</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">6. API 설계</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>Method</th><th>URI</th><th>설명</th><th>근거</th></tr></thead><tbody><tr><td><code>POST</code></td><td><code>/api/tenant/closings/{yyyymm}/checklist/run</code></td><td>마감 전 검증 체크리스트 실행(멱등) — 미통과 시 <code>CHECKLIST_NOT_PASSED</code></td><td>§11.9-(2), §13.3, §14</td></tr>\n<tr><td><code>POST</code></td><td><code>/api/tenant/closings/{yyyymm}/temp-close</code> · <code>/close</code></td><td>가마감/본마감(분산 락 + <code>Idempotency-Key</code>, scope <code>tenant:closing:approve</code>) — 락 미획득 <code>LOCK_NOT_ACQUIRED</code></td><td>§11.9-(3), §13.3</td></tr>\n<tr><td><code>POST</code></td><td><code>/api/tenant/closings/{yyyymm}/reopen-request</code> · <code>/reopen-approve</code></td><td>마감해제 요청/승인(Step-up + 사유 필수, scope <code>tenant:closing:reopen</code>) — <code>LOCKED</code>는 <code>PERIOD_LOCKED</code></td><td>§11.9-(3)4, §13.3</td></tr>\n<tr><td><code>POST</code></td><td><code>/api/tenant/closing-auto-entries/{yyyymm}/preview</code> · <code>/confirm</code></td><td>자동분개 8종 미리보기(G/L 미변경)/확정 기표(멱등)</td><td>§11.3(M7), §13.3</td></tr>\n<tr><td><code>GET</code></td><td><code>/api/tenant/financial-statements/{type}</code></td><td>재무제표 조회(type=tb/bs/is/cm/rre/sce/cf, 탭·기간·차원·비교 파라미터, 대용량 비동기 리포트)</td><td>§25.9.2~8, §13.3</td></tr>\n<tr><td><code>GET·POST</code></td><td><code>/api/tenant/cash-flow/{periodId}</code> · <code>/adjustments</code></td><td>현금흐름표 산출·수기 매핑/조정 발행(승인 사유 필수, G/L 미변경)</td><td>§11.3.1-(5)</td></tr>\n<tr><td><code>GET·POST</code></td><td><code>/api/tenant/account-schedules/{periodId}</code> · <code>/tie-out/run</code></td><td>계정별 명세 조회·tie-out 검증 실행</td><td>§11.14</td></tr>\n<tr><td><code>POST</code></td><td><code>/api/tenant/report-packages/{periodId}/assemble</code> · <code>/deliver</code> · <code>/ack</code></td><td>패키지 조립/전달/확인 — <code>VALIDATED</code> 미달 전달 차단</td><td>§11.13-(3), §15</td></tr>\n<tr><td><code>POST</code></td><td><code>/api/tenant/cost-allocations/{yyyymm}/run</code></td><td>비용 배부 규칙 실행(미리보기 후 확정, 배부 전표 생성)</td><td>§11.19-(3)</td></tr>\n<tr><td><code>POST</code></td><td><code>/api/tenant/tax-statements/{type}/rebuild</code></td><td>세무 명세(영수증수취/송금/지출증명) 불러오기 재집계</td><td>§25.10.1~3</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>공통 계약: scope <code>tenant:closing:approve</code>/<code>tenant:closing:reopen</code>(위험 scope — Step-up), 오류코드 <code>CLOSING_LOCKED</code>/<code>PERIOD_LOCKED</code>/<code>CHECKLIST_NOT_PASSED</code>/<code>NOT_PRIMARY_BOOKKEEPER</code>/<code>IDEMPOTENCY_CONFLICT</code>/<code>SOD_VIOLATION</code> 등 §13.3 준용(공통 표준 참조).</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">7. 배치/스케줄</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>배치</th><th>주기</th><th>내용·실패 처리</th><th>근거</th></tr></thead><tbody><tr><td>마감 전 검증 체크리스트 잡</td><td>월마감 전</td><td><code>ClosingChecklist</code> 항목 자동 수행·미통과 목록 생성</td><td>§14, §11.9</td></tr>\n<tr><td>기간배분/리스 안분·상각 잡</td><td>월별</td><td><code>AccrualSchedule</code>·<code>LeaseContract</code> 월별 자동분개(결산분개 통합), 명세 자동 갱신</td><td>§14, §11.15</td></tr>\n<tr><td>월말 외화평가 잡</td><td>월말</td><td><code>FxRevaluation</code> 미실현 외환손익 분개 + 익월 환산제거(reversal). 환율 미등록 통화 차단·검토대상</td><td>§14, §11.16</td></tr>\n<tr><td>계정별 명세서 생성·tie-out 검증 잡</td><td>월별</td><td>명세 자동집계·carry-forward, 미tie-out 계정 마감 차단 플래그</td><td>§14, §11.14</td></tr>\n<tr><td>보고패키지 조립·검증·전달 잡</td><td>월마감 후</td><td>컴포넌트 생성→tie-out/미결항목 0건 확인→전달→Ack 요청</td><td>§14, §11.13</td></tr>\n<tr><td>법인세 추정·충당 잡</td><td>월별</td><td>월별 provision(§11.5 Tax Provision — 자동분개 ⑧ 소스)</td><td>§14</td></tr>\n<tr><td>월별 감가상각 잡</td><td>월별</td><td>[월별감가상각비계상] 명세 산출(자동분개 ① 소스, 엔진은 P08)</td><td>§14, §25.9.1</td></tr>\n<tr><td>결산검증 잡</td><td>결산 시</td><td>대차차액·원가경비번호·타계정대체 적요 검증 룰 실행</td><td>§14, §25.9.2</td></tr>\n<tr><td>aging 스냅샷 잡(P04 공유)</td><td>월말</td><td><code>AgingSnapshot</code> — 대손충당금 설정(자동분개 ②) 근거</td><td>§11.11, §14</td></tr>\n<tr><td>Ack 리마인드 잡</td><td>D+3/D+7</td><td>마감·패키지 <code>PENDING</code> Ack 리마인드·장기 미확인 에스컬레이션</td><td>§14</td></tr>\n<tr><td>제조원가 계산·CM tie-out 잡</td><td>월별(P2)</td><td><code>ManufacturingCostRun</code> — Phase 2</td><td>§14, §11.21</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>전 배치 멱등·재처리·실패 알림(§14). 결산·마감·신고 전 스냅샷 생성(§15 백업/복구).</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">8. 검증·오류 처리</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>검증 항목</th><th>처리</th><th>근거</th></tr></thead><tbody><tr><td>마감 체크리스트 미통과</td><td>가마감/본마감 차단, 미통과 항목 목록 제시</td><td>§15, §11.9</td></tr>\n<tr><td><code>LOCKED</code> 기간 마감해제 시도</td><td>차단(수정신고 절차 안내), 시도 자체 감사로그</td><td>§15</td></tr>\n<tr><td>마감해제 사유/승인 누락</td><td>처리 차단, Step-up 인증 필수</td><td>§15</td></tr>\n<tr><td>비주기장 측 마감/결산/신고 시도</td><td>차단 — <code>NOT_PRIMARY_BOOKKEEPER</code></td><td>§15, §21.1</td></tr>\n<tr><td>분산 락 미획득(동시 마감)</td><td>비즈니스 예외(&quot;다른 사용자 진행 중&quot;), 처리 차단</td><td>§15</td></tr>\n<tr><td>Ack 미완료/이의 미해소 상태 신고 생성</td><td><code>ackPolicy=REQUIRED</code> 시 차단</td><td>§15, §21.4</td></tr>\n<tr><td>시산표 대차차액</td><td>마감 차단 + 차액 전표 팝업 조회/수정</td><td>§11.9-(2), §25.9.2</td></tr>\n<tr><td>원가경비번호 불일치·타계정대체 적요 누락</td><td>결산 검증 룰 차액 검출·적요 필수 검증</td><td>§25.9.2</td></tr>\n<tr><td>잉여금 불일치</td><td>B/S 이월이익잉여금 ≠ 처분계산서 미처분이익잉여금 → 차액 알림창(3단 계산식)</td><td>§25.9.3</td></tr>\n<tr><td>당기제품제조원가·당기순손익 불일치</td><td>손익계산서↔제조원가명세서↔이익잉여금처분계산서 일치 검증(보고패키지 정합성 룰)</td><td>§25.9.4~6</td></tr>\n<tr><td>현금흐름표 기말현금 불일치</td><td>차이내역 표시 + 수기 매핑 조정/승인 워크플로우(G/L 자동수정 금지)</td><td>§15, §11.3.1-(5)</td></tr>\n<tr><td>현금흐름 미매핑 계정/거래</td><td>자동 추정 금지, 검토대상 표시</td><td>§15, §11.3.1-(3)</td></tr>\n<tr><td>현금흐름 조정(미세오차)</td><td>G/L 미변경, 차원 테이블만 반영 + 사유·감사로그</td><td>§15</td></tr>\n<tr><td>계정별 명세 미tie-out(diff≠0)</td><td>마감·보고패키지 생성 차단/경고(<code>verified=false</code>), 차이내역 표시</td><td>§15, §11.14</td></tr>\n<tr><td>미해결 미결항목(증빙불비 등)</td><td>마감 게이트 차단/경고, OpenItem 미해소 시 패키지 전달 보류</td><td>§15, §18.3</td></tr>\n<tr><td>보고패키지 검증 미통과 전달</td><td><code>VALIDATED</code> 미달 시 <code>DELIVERED</code> 차단</td><td>§15, §11.13</td></tr>\n<tr><td>재무제표 변경 후 패키지 미재생성</td><td>기존 패키지 무효화·재조립 안내</td><td>§15, §11.13</td></tr>\n<tr><td>환율 미등록 통화 월말평가</td><td>외화평가 배치 차단, 검토대상 분리</td><td>§15, §11.16</td></tr>\n<tr><td>리스 할인율/리스료 누락</td><td>NPV·상각표 생성 차단, 검토대상</td><td>§15, §11.15</td></tr>\n<tr><td>NTS 반려/미수신</td><td><code>REJECTED</code>/<code>PENDING</code> 마감 체크리스트 표시, 필수 거래 마감 차단 가능</td><td>§15, §11.4</td></tr>\n<tr><td>은행 잔액 대사 불일치</td><td>마감 체크리스트 경고(차단 여부 회사 정책)</td><td>§15, §11.9·11.11</td></tr>\n<tr><td>법인세표준계정 매핑 누락(W3)</td><td>결산·법인세 신고 집계 경고</td><td>§15, §11.6.2</td></tr>\n<tr><td>3만원 임계값 위반(송금명세서)</td><td>3만원 이하 입력 불가, 은행코드 미입력 전자신고 차단</td><td>§25.10.2</td></tr>\n<tr><td>중단사업 이중 반영</td><td>전표추가는 기 분개분과의 차액만(차액 기반), 새로 불러오기 시 안분 분개 삭제 확인</td><td>§25.10.6~7</td></tr>\n<tr><td>마감기간 전표 입력/수정</td><td>마감 잠금 인터셉터 차단(<code>CLOSING_LOCKED</code>)</td><td>§11.9, §13.3</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">9. 권한·SOD·감사</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>통제</th><th>근거</th></tr></thead><tbody><tr><td>마감·마감해제·결산 확정</td><td>주기장 측 권한(TENANT_LED=이용회사 마감 권한자 / OPERATOR_LED·HYBRID=<code>BK_MANAGER</code>). scope <code>tenant:closing:approve</code>/<code>reopen</code></td><td>§11.9-(3), §13.3</td></tr>\n<tr><td>SOD</td><td>본마감 결재자는 전표 작성자와 분리(<code>SOD_VIOLATION</code>). 마감해제는 별도 승인자</td><td>§11.9-(3)2, §13.3</td></tr>\n<tr><td>Step-up</td><td>마감해제·보고패키지 전달·검토서식 전자제출 등 위험 행위 Step-up 인증</td><td>§13.3(공통 표준 참조)</td></tr>\n<tr><td>이용회사 확인(Ack)</td><td>주기장=OPERATOR 본마감·패키지 전달 후 <code>TenantAcknowledgement</code>(CONFIRMED/OBJECTED), <code>ackPolicy=REQUIRED</code> 게이트</td><td>§11.9-(3)3, §21.4</td></tr>\n<tr><td>메뉴·버튼</td><td>TN-08 그룹(마감 관리·SA-CLS-01~21·보고패키지·명세/tie-out) [Step-up] 배치, <code>RoleMenuPermission</code>+<code>MenuActionGrant</code>(전표추가·PDF변환·전표수정 분리)</td><td>§4.3, TN-08(§25 배치)</td></tr>\n<tr><td>감사로그</td><td>마감/해제/자동분개 확정/조정 발행/패키지 전달은 <code>DataChangeLog</code>(전후값·행위자) 기록, <code>ClosingReopenLog</code>·<code>DisclosureSubmissionLog</code> append-only</td><td>§17, §11.9, §11.3.2-(5)</td></tr>\n<tr><td>민감정보</td><td>검토서식 귀속자(사원)·수령자(거래처), 주민번호 별표 + Step-up 평문 조회</td><td>§25.9.11, §17</td></tr>\n<tr><td>스냅샷</td><td>본마감 시 <code>TenantSnapshot</code> 자동 생성, 현금흐름표·재무제표 확정 산출물 스냅샷 보관</td><td>§11.9-(3)2, §11.3.1-(4)</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">10. 연계</h3>\n<ul class=\"doc-list\">\n<li><strong>선행</strong>: P03 전표(POSTED·entryCode·[일반전표입력] Shift+F6 자동분개 일괄삭제·SA-ATX 증빙 자동전표), P04 장부(원장 집계·AgingSnapshot→대손, 어음/차입금 현황→부속명세서, 은행 대사·AUX-06 ntsStatus→체크리스트, tie-out 명세 소스), P02 전기이월(전기분 재무상태표/손익/원가/잉여금처분/자본변동표·기간별 전기 데이터), P01 기초정보([계정과목및적요등록] 원가설정·표준용코드·[환경설정] 세목/중소기업회계기준/중단사업코드).</li>\n<li><strong>후행</strong>: P06~07 부가세 신고(마감 완료 → <code>LOCKED</code>, 세무대리인 제출자등록 연동), P08 고정자산([월별감가상각비계상] ↔ 자동분개 ①·부속명세서 고정자산항목, 법인세 신고 검토서식·지출증명 전자신고), P10 데이터관리([마감후이월] 기수 이월·백업 스냅샷).</li>\n<li><strong>외부</strong>: 공시 파이프라인(§11.3.2 — DRAFT→…→ACCEPTED, XBRL/DART는 후속 범위), 국세청 PDF 전자제출(SA-CLS-11), 홈택스 전자신고(명세서 15~17).</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">11. 완료 기준(DoD)·테스트 관점</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>완료 기준</th><th>검증 방법</th></tr></thead><tbody><tr><td>1</td><td>기간 상태머신(FUTURE→OPEN→TEMP_CLOSED→CLOSED→LOCKED, REOPEN 워크플로우) 전이·차단 정확</td><td>상태별 입력/마감/해제 시나리오, <code>PERIOD_LOCKED</code>·<code>CLOSING_LOCKED</code> 확인(§11.9, §13.3)</td></tr>\n<tr><td>2</td><td>마감 체크리스트 10개 항목 게이트 동작(차단/경고 구분, HYBRID 분담 포함)</td><td>항목별 위반 데이터 주입 후 가마감 시도(§11.9-(2))</td></tr>\n<tr><td>3</td><td>자동분개 8종 규칙 실행 → 결차/결대 전표 생성·실행 이력 보존, 미리보기 G/L 미변경 확인</td><td>유형별 산식 검증 + 미리보기 전후 G/L 대조(§11.3)</td></tr>\n<tr><td>4</td><td>결차/결대 라인만 매출원가·당기제품제조원가 반영(DR/CR 결산분개는 미반영)</td><td>entryCode 혼합 데이터 집계 대조(§12.2 M2, §25.9.4~5)</td></tr>\n<tr><td>5</td><td>조정 전후 비교(M7) 뷰에서 조정 항목별 증감·근거(조정분개·계산시트) 드릴다운</td><td>§11.3, §11.14-(6)</td></tr>\n<tr><td>6</td><td>시산표 대차차액·원가경비번호·타계정대체 적요 검증 알림 정확</td><td>오류 전표 시나리오(§25.9.2)</td></tr>\n<tr><td>7</td><td>재무상태표 차액 알림 3단 계산식·잉여금 일치, 손익↔제조원가↔잉여금처분 일치 검증 통과</td><td>결산 완료 데이터 세트 정합 대조(§25.9.3~6)</td></tr>\n<tr><td>8</td><td>현금흐름표 정합성(IV=I+II+III, IV+V=VI, 기말현금=B/S 현금) + 불일치 시 경고→수기 매핑→조정 발행(G/L 미변경) 워크플로우 완결</td><td>미매핑 전표·소액 오차 시나리오(§11.3.1-(4)(5))</td></tr>\n<tr><td>9</td><td>이익잉여금처분(법인 잉여금 대체)·회사구분 분기(개인 자본금 대체)·익월 차감분개 정확</td><td>법인/개인 테넌트 케이스(§25.9.1·6)</td></tr>\n<tr><td>10</td><td>부속명세서 항목 유형 5종 데이터 소스 연동·일괄출력 PDF(CLS-09=CLS-13 동일 기능)</td><td>§25.9.9·13</td></tr>\n<tr><td>11</td><td>tie-out <code>verified=false</code> 계정 존재 시 마감·패키지 생성 차단, 명세 carry-forward 동작</td><td>§11.14</td></tr>\n<tr><td>12</td><td>보고패키지 상태머신 전이·검증 게이트(tie-out 전건+미결항목 0건)·재무제표 변경 시 무효화</td><td>§11.13</td></tr>\n<tr><td>13</td><td>세무 명세 3종 판정 룰(3만원/접대비 임계·구분코드 21종·전표유형코드 매핑) 자동 집계 정확</td><td>임계값 경계 케이스(§25.10.1~3)</td></tr>\n<tr><td>14</td><td>기간별 손익/원가 6탭·전년대비(전기 마감 선행 절차 포함) 조회 정확</td><td>§25.10.4~5</td></tr>\n<tr><td>15</td><td>(2차) 잔액검토 조정분개 법인/개인 분기·일괄삭제 플래그, 중단사업 차액 기반 대체분개(이중 반영 방지)</td><td>§25.9.10, §25.10.6~7</td></tr>\n<tr><td>16</td><td>AI 시산표 가상전표 미확정 관리·전송 시 정식 전표 승격, 미추천/미전송 이상검증</td><td>§25.9.12</td></tr>\n<tr><td>17</td><td>결산 배치(기간배분·외화평가·tie-out·패키지 조립) 멱등·재처리·실패 알림</td><td>§14</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">12. 잔여 확인사항 (§23 연계)</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>항목</th><th>관련</th></tr></thead><tbody><tr><td>1</td><td>주석 자동화(N10) MVP 범위 확정(§23-54)</td><td>§11.3.2-(4)</td></tr>\n<tr><td>2</td><td>비용 배부(N12)의 결산 포함 vs 별도 모듈 분리(§23-56)</td><td>§11.19-(3)</td></tr>\n<tr><td>3</td><td>은행 대사 불일치·NTS 필수 거래의 마감 차단/경고 기본 정책값 확정</td><td>§15, §11.9·11.4</td></tr>\n<tr><td>4</td><td>제조원가 재고 수불 연동(<code>ManufacturingCostRun</code>)의 Phase 2 착수 시점·기능 플래그/요금제</td><td>§11.21-(1)</td></tr>\n<tr><td>5</td><td>STAT/TAX/IFRS 병행원장 분리 조회·Stat/Tax Conversion 자동화 범위(N9, §23-45·53)</td><td>§11.3, §11.6</td></tr>\n<tr><td>6</td><td>XBRL·DART 공시 파이프라인(§11.3.2) 구현 차수 확정(1차는 재무제표 산출·PDF까지)</td><td>§11.3.2</td></tr>\n<tr><td>7</td><td>확정 일정은 프로젝트 계획에서 관리(§23-49)</td><td>§22.2</td></tr></tbody></table></div>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1 · 5. 데이터 모델</h4><div class=\"doc-caption\">5. 데이터 모델</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>엔티티</th><th>핵심 필드</th><th>키/제약</th><th>근거</th></tr></thead><tbody><tr><td><code>FiscalYear</code></td><td>tenantId, 기수, 시작/종료일, 상태 — 회사별 회계달력</td><td>(tenant_id, 기수)</td><td>§11.9-(1), §12.1</td></tr>\n<tr><td><code>FiscalPeriod</code></td><td>월별, 상태(<code>FUTURE</code>/<code>OPEN</code>/<code>TEMP_CLOSED</code>/<code>CLOSED</code>/<code>LOCKED</code>+<code>REOPEN_REQUESTED</code>/<code>REOPENED</code>)</td><td>상태머신 검증(§12.3)</td><td>§11.9, §12.2</td></tr>\n<tr><td><code>ClosingChecklist</code></td><td>항목·결과·수행자</td><td>—</td><td>§11.9-(4)</td></tr>\n<tr><td><code>ClosingJob</code></td><td>가마감/본마감/연마감, status</td><td>분산 락 연계</td><td>§11.9-(4)</td></tr>\n<tr><td><code>ClosingReopenLog</code></td><td>reason, approverId, reopenedAt, 통지 여부</td><td>append-only</td><td>§11.9-(4)</td></tr>\n<tr><td><code>ClosingAutoEntryRule</code></td><td>대상 8종(감가/대손/퇴직급여충당/경과/미수·선수/재고평가/외화/법인세·이연법인세), 계정·산식·대상 기간, 실행 이력</td><td>버전·이력 보존</td><td>§11.3, §12.1</td></tr>\n<tr><td><code>CashFlowStatement</code> / <code>CashFlowStatementLine</code></td><td>period, ledgerBookId, method(DIRECT/INDIRECT), status / activity, item, amount</td><td>—</td><td>§11.3.1-(6)</td></tr>\n<tr><td><code>CashFlowMapping</code> / <code>CashEquivalentAccount</code></td><td>계정·거래유형→활동·세부항목(표준 배포+회사 확장) / 현금성자산 계정 정의</td><td>—</td><td>§11.3.1-(6)</td></tr>\n<tr><td><code>CashFlowAdjustment</code></td><td>diffAmount, targetActivity, reason, approverId — <strong>G/L 미변경 출력용 조정</strong></td><td>감사로그 필수</td><td>§11.3.1-(5)(6)</td></tr>\n<tr><td><code>CapitalTransaction</code> / <code>Shareholder</code></td><td>증자/감자/주식이전/분할/조직변경: 주주·주식수·액면가·발행가·주식발행초과금·등기일 / 지분율·취득일</td><td>—</td><td>§11.3(M), §12.1</td></tr>\n<tr><td><code>ReportPackage</code></td><td>tenantId, period, templateId, status, deliveredAt, ackedAt</td><td>상태 6종(§12.2)</td><td>§11.13-(5)</td></tr>\n<tr><td><code>ReportPackageTemplate</code> / <code>ReportComponent</code> / <code>ReportPackageDelivery</code></td><td>components[], langs, mode, plan / type, generator, order, required, lang / channel, fileHash, recipient, sentAt</td><td>—</td><td>§11.13-(5)</td></tr>\n<tr><td><code>AccountSchedule</code> / <code>AccountScheduleLine</code></td><td>period, accountCode, scheduleType / partner, desc, opening, utilization, accruals, reclass, closing, evidenceRef, remark</td><td>—</td><td>§11.14-(5)</td></tr>\n<tr><td><code>ScheduleTieOut</code></td><td>glBalance, scheduleTotal, diff, verified</td><td><code>verified=false</code> 마감 차단</td><td>§11.14-(5), §12.2</td></tr>\n<tr><td><code>AccrualSchedule</code> / <code>AccrualScheduleEntry</code></td><td>type, start, end, totalAmount, method(정액/일할), counterAccount / period, amount, journalRef</td><td>—</td><td>§11.15-(4)</td></tr>\n<tr><td><code>LeaseContract</code> / <code>LeaseAmortizationLine</code></td><td>start, end, payment, discountRate, freeMonths / period, opening, payment, interest, closing, depreciation, nbv, stPortion, ltPortion</td><td>—</td><td>§11.15-(4)</td></tr>\n<tr><td><code>FxRate</code> / <code>FxRevaluation</code></td><td>currency, asOf, rate, rateType / period, accountCode, currency, fcBalance, rate, revaluedKrw, unrealizedGl, journalRef</td><td>—</td><td>§11.16-(4)</td></tr>\n<tr><td><code>CostAllocationRule</code></td><td>rateType FIXED/REVENUE_BASED, basis, version — 배부 전표 자동 생성</td><td>버전 관리</td><td>§11.19-(3)(5)</td></tr>\n<tr><td><code>DisclosureNote</code> / <code>DisclosureMapping</code></td><td>주석 템플릿·데이터 바인딩 / 계정→FS 라인·taxonomy 매핑</td><td>—</td><td>§11.3.2-(6)</td></tr>\n<tr><td><code>TenantAcknowledgement</code></td><td>targetType, actorId, ackAt — 마감·패키지 Ack</td><td><code>PENDING</code>/<code>CONFIRMED</code>/<code>OBJECTED</code></td><td>§11.9-(3), §12.1·12.2</td></tr>\n<tr><td><code>JournalLine.entryCode</code></td><td><code>CLOSING_DR</code>/<code>CLOSING_CR</code>(+DR/CR/RECEIPT/PAYMENT, 확장 ACCRUAL/ADJUSTMENT/RECLASS/TAX_ADJ/STAT_ADJ)</td><td>결차/결대만 원가 반영</td><td>§12.1, §12.2(M2·R13)</td></tr></tbody></table></div></section>\n<section class=\"doc-table-block\"><h4>상세 표 2 · 6. API 설계</h4><div class=\"doc-caption\">6. API 설계</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>Method</th><th>URI</th><th>설명</th><th>근거</th></tr></thead><tbody><tr><td><code>POST</code></td><td><code>/api/tenant/closings/{yyyymm}/checklist/run</code></td><td>마감 전 검증 체크리스트 실행(멱등) — 미통과 시 <code>CHECKLIST_NOT_PASSED</code></td><td>§11.9-(2), §13.3, §14</td></tr>\n<tr><td><code>POST</code></td><td><code>/api/tenant/closings/{yyyymm}/temp-close</code> · <code>/close</code></td><td>가마감/본마감(분산 락 + <code>Idempotency-K )</td><td>§11.9, §13.3</td></tr></tbody></table></div></section>\n<section class=\"doc-table-block\"><h4>상세 표 5 · 9. 권한·SOD·감사</h4><div class=\"doc-caption\">9. 권한·SOD·감사</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>항목</th><th>통제</th><th>근거</th></tr></thead><tbody><tr><td>마감·마감해제·결산 확정</td><td>주기장 측 권한(TENANT_LED=이용회사 마감 권한자 / OPERATOR_LED·HYBRID=<code>BK_MANAGER</code>). scope <code>tenant:closing:approve</code>/<code>reopen</code></td><td>§11.9-(3), §13.3</td></tr>\n<tr><td>SOD</td><td>본마감 결재자는 전표 작성자와 분리(<code>SOD_VIOLATION</code>). 마감해제는 별도 승인자</td><td>§11.9-(3)2, §13.3</td></tr>\n<tr><td>Step-up</td><td>마감해제·보고패키지 전달·검토서식 전자제출 등 위험 행위 Step-up 인증</td><td>§13.3(공통 표준 참조)</td></tr>\n<tr><td>이용회사 확인(Ack)</td><td>주기장=OPERATOR 본마감·패키지 전달 후 <code>TenantAcknowledgement</code>(CONFIRMED/OBJECTED), <code>ackPolicy=REQUIRED</code> 게이트</td><td>§11.9-(3)3, §21.4</td></tr>\n<tr><td>메뉴·버튼</td><td>TN-08 그룹(마감 관리·SA-CLS-01~21·보고패키지·명세/tie-out) [Step-up] 배치, <code>RoleMenuPermission</code>+<code>MenuActionGrant</code>(전표추가·PDF변환·전표수정 분리)</td><td>§4.3, TN-08(§25 배치)</td></tr>\n<tr><td>감사로그</td><td>마감/해제/자동분개 확정/조정 발행/패키지 전달은 <code>DataChangeLog</code>(전후값·행위자) 기록, <code>ClosingReopenLog</code>·<code>DisclosureSubmissionLog</code> append-only</td><td>§17, §11.9, §11.3.2-(5)</td></tr>\n<tr><td>민감정보</td><td>검토서식 귀속자(사원)·수령자(거래처), 주민번호 별표 + Step-up 평문 조회</td><td>§25.9.11, §17</td></tr>\n<tr><td>스냅샷</td><td>본마감 시 <code>TenantSnapshot</code> 자동 생성, 현금흐름표·재무제표 확정 산출물 스냅샷 보관</td><td>§11.9-(3)2, §11.3.1-(4)</td></tr></tbody></table></div></section>\n<section class=\"doc-table-block\"><h4>상세 표 6 · 11. 완료 기준(DoD)·테스트 관점</h4><div class=\"doc-caption\">11. 완료 기준(DoD)·테스트 관점</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>완료 기준</th><th>검증 방법</th></tr></thead><tbody><tr><td>1</td><td>기간 상태머신(FUTURE→OPEN→TEMP_CLOSED→CLOSED→LOCKED, REOPEN 워크플로우) 전이·차단 정확</td><td>상태별 입력/마감/해제 시나리오, <code>PERIOD_LOCKED</code>·<code>CLOSING_LOC
