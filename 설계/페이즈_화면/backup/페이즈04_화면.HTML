, partner, currency, 외화/원화금액, 발생환율, dueDate, openAmount) 생성, 채권/채무 라인과 연결</td><td>§11.11 N4</td></tr>\n<tr><td>반제(Clearing)</td><td>입금/지급 전표 입력 시 미반제 Invoice 목록 팝업/패널 제시 → 자동 매칭 제안(금액·인보이스 번호·적요) → 사용자 확정</td><td>§11.11 N4</td></tr>\n<tr><td>부분 입금</td><td>Invoice <code>openAmount</code> 감액·잔액 추적. 초과 입금은 선수금 대체 제안(R5 선수금/선급금 자동 검토 연계)</td><td>§11.11 N4, §11.1.1-(5)</td></tr>\n<tr><td>외화 반제</td><td>반제 시점 환율 vs 발생환율 차이 → 환차손익 자동 계산, 은행(송금)수수료 별도 계정(지급수수료 등) 분리 분개. <code>ClearingEntry</code>(invoiceRef, journalRef, clearedAmount, fxGainLoss, fee) 보존</td><td>§11.11 N4·M9, §11.1.1-(3)</td></tr>\n<tr><td>잔액 정합 대사</td><td>미반제 Invoice 합계 = 거래처원장(AUX-01) 잔액 상시 대사, 불일치 시 검토대상</td><td>§11.11 N4</td></tr>\n<tr><td>Aging</td><td>Invoice <code>dueDate</code> 기준 연령분석(30/60/90/120일)·회전율·기간 비교</td><td>§11.11 N4, §11.2</td></tr>\n<tr><td>입금 자동매칭 후보</td><td>은행거래 분류(§11.11 K)와 연계하여 입금-인보이스 자동 매칭 후보 생성</td><td>§11.11 N4</td></tr>\n<tr><td>거래흐름 추적</td><td>발생→일부회수→반제 추적을 전표 외화 추적(R3)·보조부 표시(S10)와 연동</td><td>§11.1.1-(3), §0.2 S10</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>검증</strong>: 채권계정×공급업체/채무계정×고객 차단(R8, §15), 미반제 합계-원장 잔액 불일치 검토대상(§11.11), 환율 미적용 외화 라인 저장 차단(§15).</li>\n<li><strong>산출물</strong>: 거래처별 보조원장(엑셀/피벗), Aging 리포트, 미반제 Invoice 명세(계정별 명세서 §11.14 소스).</li>\n<li><strong>연계</strong>: 선행 P03 전표·P02 [거래처별초기이월]. 후행 P05 대손충당금 결산분개(AgingSnapshot)·주석 자동화(매출채권·Aging, §11.3.2 N10)·P09 여신관리(2차).</li>\n</ul>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1 · <strong>조회조건</strong>:</h4><div class=\"doc-caption\"><strong>조회조건</strong>:</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>유형/값</th><th>필수</th><th>비고(근거)</th></tr></thead><tbody><tr><td>기간</td><td>일자 범위(회계기간 내)</td><td>Y</td><td>§11.2</td></tr>\n<tr><td>거래처</td><td>F2/C 코드도움, 공란=전체</td><td>N</td><td>§25.6.7 패턴</td></tr>\n<tr><td>계정과목</td><td>채권/채무 계정(F2/C)</td><td>N</td><td>§11.11</td></tr>\n<tr><td>조회 세분화</td><td>잔액만 / 연체건만 / 미반제건만 / 선수·선급 대체건만(조합 가능)</td><td>N</td><td>§11.11 M10</td></tr>\n<tr><td>거래성격</td><td>신규채권 / 일부회수 / 청구반제 / 대손·조정 / 선수선급대체</td><td>N</td><td>§11.11 M9</td></tr>\n<tr><td>통화</td><td>전체/KRW/외화 통화별</td><td>N</td><td>§11.11 M9</td></tr>\n<tr><td>차원</td><td>사업장(필수)+코스트센터·부서·프로젝트·현장·사원</td><td>사업장 Y</td><td>§25.6 서두</td></tr></tbody></table></div></section>\n<section class=\"doc-table-block\"><h4>상세 표 2 · <strong>기능·동작</strong>:</h4><div class=\"doc-caption\"><strong>기능·동작</strong>:</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>기능</th><th>동작</th><th>근거</th></tr></thead><tbody><tr><td>Invoice 관리</td><td>매출/매입 전표(또는 세금계산서·외부 인보이스)에서 <code>ArApInvoice</code>(invoiceNo, partner, currency, 외화/원화금액, 발생환율, dueDate, openAmount) 생성, 채권/채무 라인과 연결</td><td>§11.11 N4</td></tr>\n<tr><td>반제(Clearing)</td><td>입금/지급 전표 입력 시 미반제 Invoice 목록 팝업/패널 제시 → 자동 매칭 제안(금액·인보이스 번호·적요) → 사용자 확정</td><td>§11.11 N4</td></tr>\n<tr><td>부분 입금</td><td>Invoice <code>openAmount</code> 감액·잔액 추적. 초과 입금은 선수금 대체 제안(R5 선수금/선급금 자동 검토 연계)</td><td>§11.11 N4, §11.1.1-(5)</td></tr>\n<tr><td>외화 반제</td><td>반제 시점 환율 vs 발생환율 차이 → 환차손익 자동 계산, 은행(송금)수수료 별도 계정(지급수수료 등) 분리 분개. <code>ClearingEntry</code>(invoiceRef, journalRef, clearedAmount, fxGainLoss, fee) 보존</td><td>§11.11 N4·M9, §11.1.1-(3)</td></tr>\n<tr><td>잔액 정합 대사</td><td>미반제 Invoice 합계 = 거래처원장(AUX-01) 잔액 상시 대사, 불일치 시 검토대상</td><td>§11.11 N4</td></tr>\n<tr><td>Aging</td><td>Invoice <code>dueDate</code> 기준 연령분석(30/60/90/120일)·회전율·기간 비교</td><td>§11.11 N4, §11.2</td></tr>\n<tr><td>입금 자동매칭 후보</td><td>은행거래 분류(§11.11 K)와 연계하여 입금-인보이스 자동 매칭 후보 생성</td><td>§11.11 N4</td></tr>\n<tr><td>거래흐름 추적</td><td>발생→일부회수→반제 추적을 전표 외화 추적(R3)·보조부 표시(S10)와 연동</td><td>§11.1.1-(3), §0.2 S10</td></tr></tbody></table></div></section>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>목적</strong>: 매출처/매입처 원장. 거래성격·외화 정보·전표 연계를 라인 단위로 표시하고, Invoice 단위 미결항목(Open Item)과 잔액 정합을 유지한다(§11.11 보조부 화면 정합, N4).</li>\n<li><strong>표시(라인) 필드</strong>: 전표 연계(<code>YYYY-MM-DD-NNN</code>)·일자·계정·적요·차/대 ],"tableCount":2,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"AUX-01","title":"거래처별 보조원장","purpose":"거래처별 채권·채무 증감과 잔액을 조회하고 외화·거래성격별 보조부를 관리한다.","linkage":"SA-LDG-07 / SA-OPN-07 / 거래처원장","note":"BK 보조부 구성 C8","source":"bk_화면설계서_v1.0.html"}},{"id":"AUX-02","title":"어음 보조원장","phase":"1차","basis":"§11.11(M5·S11)","impl":"AUX-02","tabs":"","sid":"aux_02","prefix":"AUX","group":"보조부","purpose":"받을어음·지급어음의 수취·발행·할인·배서·만기·부도 상태를 추적한다.","detailHtml":"<h4 class=\"doc-h doc-h4\">4.2 AUX-02 어음 보조원장 (1차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 받을/지급어음의 만기·상태 관리 + 원전표→증빙→상태변경 이력→부도/결제 후속전표의 <strong>단일 추적 체인(<code>note.audit_trail</code>) 타임라인</strong> 드릴다운(§11.11, §0.2 S11).</li>\n<li><strong>조회조건</strong>: 기간, 어음구분(받을/지급), 상태(보유/할인/배서/만기회수/부도/결제), 거래처, 만기일 범위, 어음번호, 금융기관.</li>\n<li><strong>표시 필드</strong>: 어음번호·수취/발행일·만기일·발행인/배서인·금액·상태·거래성격·연계 전표(<code>YYYY-MM-DD-NNN</code>)·할인 정보.</li>\n<li><strong>기능·동작</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>기능</th><th>동작</th><th>근거</th></tr></thead><tbody><tr><td>추적 타임라인</td><td>어음번호 단위로 원전표→증빙→상태변경 이력→부도/결제 후속전표를 시계열 체인으로 표시(S11)</td><td>§11.11</td></tr>\n<tr><td>어음 할인(M5)</td><td>받을어음 할인 시 어음번호별 <strong>할인율·할인료(매출채권처분손실)·실수령액</strong> 산출 → 자동 분개(차변 보통예금+매출채권처분손실 / 대변 받을어음)</td><td>§11.11 M5</td></tr>\n<tr><td>계정 자동 매칭</td><td>어음 계정과목을 거래성격(할인·배서·만기회수·부도)에 따라 자동 매칭</td><td>§11.11 M5</td></tr>\n<tr><td>할인 후 부도</td><td>후속 환매 전표까지 추적 체인에 연결</td><td>§11.11 M5</td></tr>\n<tr><td>만기 알림</td><td>받을/지급어음 만기 도래 D-7/D-3/당일 자동 통지(18장 채널)</td><td>§11.11</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>검증</strong>: 만기일 &lt; 발행일 차단, 상태 전이 상태머신 검증(§12.3), 부도 어음 재할인 차단.</li>\n<li><strong>산출물</strong>: 받을어음/지급어음 현황(P05 결산부속명세서 SA-CLS-09 '받을어음항목·지급어음항목' 데이터 소스 — §25.9.9), 만기 스케줄.</li>\n<li><strong>연계</strong>: P05 결산부속명세서·자금일보(§11.11), P09 어음관리(SA-BIL, 2차).</li>\n</ul>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1 · <strong>기능·동작</strong>:</h4><div class=\"doc-caption\"><strong>기능·동작</strong>:</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>기능</th><th>동작</th><th>근거</th></tr></thead><tbody><tr><td>추적 타임라인</td><td>어음번호 단위로 원전표→증빙→상태변경 이력→부도/결제 후속전표를 시계열 체인으로 표시(S11)</td><td>§11.11</td></tr>\n<tr><td>어음 할인(M5)</td><td>받을어음 할인 시 어음번호별 <strong>할인율·할인료(매출채권처분손실)·실수령액</strong> 산출 → 자동 분개(차변 보통예금+매출채권처분손실 / 대변 받을어음)</td><td>§11.11 M5</td></tr>\n<tr><td>계정 자동 매칭</td><td>어음 계정과목을 거래성격(할인·배서·만기회수·부도)에 따라 자동 매칭</td><td>§11.11 M5</td></tr>\n<tr><td>할인 후 부도</td><td>후속 환매 전표까지 추적 체인에 연결</td><td>§11.11 M5</td></tr>\n<tr><td>만기 알림</td><td>받을/지급어음 만기 도래 D-7/D-3/당일 자동 통지(18장 채널)</td><td>§11.11</td></tr></tbody></table></div></section>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>표시 필드</strong>: 어음번호·수취/발행일·만기일·발행인/배서인·금액·상태·거래성격·연계 전표(<code>YYYY-MM-DD-NNN</code>)·할인 정보.</li>\n<li><strong>검증</strong>: 만기일 &lt; 발행일 차단, 상태 전이 상태머신 검증(§12.3), 부도 어음 재할인 차단.</li>\n<li><strong>연계</strong>: P05 결산부속명세서·자금일보(§11.11), P09 어음관리(SA-BIL, 2차).</li>\n</ul>","fields":[{"name":"추적 타임라인","desc":"어음번호 단위로 원전표→증빙→상태변경 이력→부도/결제 후속전표를 시계열 체인으로 표시(S11)"},{"name":"어음 할인(M5)","desc":"받을어음 할인 시 어음번호별 **할인율·할인료(매출채권처분손실)·실수령액** 산출 → 자동 분개(차변 보통예금+매출채권처분손실 / 대변 받을어음)"},{"name":"계정 자동 매칭","desc":"어음 계정과목을 거래성격(할인·배서·만기회수·부도)에 따라 자동 매칭"},{"name":"할인 후 부도","desc":"후속 환매 전표까지 추적 체인에 연결"},{"name":"만기 알림","desc":"받을/지급어음 만기 도래 D-7/D-3/당일 자동 통지(18장 채널)"}],"tableCount":1,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"AUX-02","title":"어음 보조원장","purpose":"받을어음·지급어음의 수취·발행·할인·배서·만기·부도 상태를 추적한다.","linkage":"SA-BIL-01~03 / WJV-04~05","note":"어음 추적 타임라인","source":"bk_화면설계서_v1.0.html"}},{"id":"AUX-03","title":"예금 보조원장","phase":"1차","basis":"§11.11(은행 대사·`BankReconciliation`), §0.2 S12","impl":"AUX-03","tabs":"","sid":"aux_03","prefix":"AUX","group":"보조부","purpose":"계좌별 예금 입출금과 잔액, 통장 수집분 대사를 관리한다.","detailHtml":"<h4 class=\"doc-h doc-h4\">4.3 AUX-03 예금 보조원장 (1차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 단순 계정원장이 아니라 <strong>계좌 단위 은행거래 대사·자금 일정 기준 보조부</strong>(거래처원장과 역할 구분, §11.11·§0.2 S12).</li>\n<li><strong>조회조건</strong>: 기간, 계좌(<code>BankAccount</code>, F2/C), 금융기관, 거래구분(<code>category</code>), 대사상태(매칭/미매칭), 증빙상태(<code>evidenceStatus</code>).</li>\n<li><strong>표시 필드</strong>: <code>BankTransaction</code>(date, amount, direction, category, counterparty, evidenceStatus, journalRef) + 계좌 잔액 running balance(§11.11 엔티티).</li>\n<li><strong>기능·동작</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>기능</th><th>동작</th><th>근거</th></tr></thead><tbody><tr><td>은행 잔액 자동 대사</td><td>8.4 스크래핑 수집 은행 거래내역 ↔ 예금계좌 보조부(<code>BankAccount</code>) 잔액 자동 대사. 불일치 건은 마감 체크리스트(§11.9)에 표시</td><td>§11.11</td></tr>\n<tr><td>은행거래 분류</td><td>수집 거래에 거래구분(입출금/이체/송금/공과금/수수료 등)·상대처(의뢰인/수취인)·연결전표/인보이스·증빙상태 부여. 자동 분류 규칙 + 수기 매칭</td><td>§11.11(보강 K)</td></tr>\n<tr><td>미결항목 승격</td><td>미매칭·미증빙(&quot;no supporting documents&quot;) 거래는 미결항목(18.3)으로 승격 → 마감 게이트</td><td>§11.11</td></tr>\n<tr><td>주간 자금마감</td><td><code>WeeklyCashReport</code>(weekOf, account, deposits, withdrawals, ending, unidentified[]) 주간 산출 — 자금일보·월 마감 정합</td><td>§11.11</td></tr>\n<tr><td>대사 실행</td><td><code>POST /api/tenant/bank-reconciliations/{accountId}/run</code> (멱등)</td><td>§13.2</td></tr>\n<tr><td>입금-Invoice 매칭</td><td>입금 거래의 인보이스 자동 매칭 후보 생성(AUX-01 반제 연계)</td><td>§11.11 N4</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>검증</strong>: 은행 잔액 대사 불일치 = 불일치 리포트 + 마감 체크리스트 경고(차단 여부 회사 정책, §15), 카드출금은 보통예금 인출 → 대체전표 처리(§11.4-(3)).</li>\n<li><strong>연계</strong>: 선행 8.4 수집 파이프라인(P03 SA-ATX-06 통장). 후행 P05 마감 체크리스트·현금및예금잔액검토(SA-CLS-10)·자금일보(P09).</li>\n</ul>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1 · <strong>기능·동작</strong>:</h4><div class=\"doc-caption\"><strong>기능·동작</strong>:</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>기능</th><th>동작</th><th>근거</th></tr></thead><tbody><tr><td>은행 잔액 자동 대 supporting documents\") 거래는 미결항목(18.3)으로 승격 → 마감 게이트"},{"name":"주간 자금마감","desc":"`WeeklyCashReport`(weekOf, account, deposits, withdrawals, ending, unidentified[]) 주간 산출 — 자금일보·월 마감 정합"},{"name":"대사 실행","desc":"`POST /api/tenant/bank-reconciliations/{accountId}/run` (멱등)"},{"name":"입금-Invoice 매칭","desc":"입금 거래의 인보이스 자동 매칭 후보 생성(AUX-01 반제 연계)"}],"tableCount":1,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"AUX-03","title":"예금 보조원장","purpose":"계좌별 예금 입출금과 잔액, 통장 수집분 대사를 관리한다.","linkage":"SA-DEP-01 / SA-ATX-06 / SA-FND","note":"예금·자금 연계","source":"bk_화면설계서_v1.0.html"}},{"id":"AUX-05","title":"가지급금·가수금 보조원장","phase":"1차","basis":"§0.2 S12(인정이자 연동 특수 뷰), §11.5, §25.9.10 연계","impl":"AUX-05","tabs":"","sid":"aux_05","prefix":"AUX","group":"보조부","purpose":"임직원·부서별 가지급금, 가수금 발생과 정산 잔액을 관리한다.","detailHtml":"<h4 class=\"doc-h doc-h4\">4.5 AUX-05 가지급금·가수금 보조원장 (1차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 가지급금/가수금을 대표자·사원 귀속으로 관리하는 <strong>세무조정 인정이자 연동 특수 뷰</strong>(§0.2 S12). 사원(<code>EMPLOYEE</code>) 차원으로 인정이자·정산·복리후생을 추적한다(§9 M1, §11.5 연계).</li>\n<li><strong>조회조건</strong>: 기간, 계정(법인: 134 가지급금/257 가수금, 개인: 338 인출금 — 회사구분 분기, §25.9.10), 귀속자(대표자/사원, F2/C), 차원(사업장).</li>\n<li><strong>표시 필드</strong>: 일자·전표번호·적요·지급/회수·잔액(running balance)·귀속자(사원 차원)·대표자 여부.</li>\n<li><strong>기능·동작</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>기능</th><th>동작</th><th>근거</th></tr></thead><tbody><tr><td>대표자 설정 연동</td><td>[사원등록]의 가지급금 대표자 설정을 자동전표(현금예금 잔액검토→전표) 기본값 파라미터로 사용</td><td>§25.1.5</td></tr>\n<tr><td>인정이자 연동</td><td>가지급금 일별 잔액 적수를 세무조정 인정이자 계산(§11.5) 기초자료로 산출 — 세무조사 추적(사원 차원 M1)</td><td>§0.2 S12, §9 M1</td></tr>\n<tr><td>잔액검토 조정 연계</td><td>P05 현금및예금잔액검토(SA-CLS-10)의 조정분개(가지급금/가수금/인출금 자동생성, 법인/개인 분기)를 본 보조부에 반영·식별</td><td>§25.9.10</td></tr>\n<tr><td>자동분개 식별</td><td>'현금검토/예금검토' 자동분개 일괄삭제 가능 플래그를 entry 메타데이터로 식별 표시</td><td>§25.9.10</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>검증</strong>: 가지급금·가수금 대표/기타 분리(§25.2.1 전기분 검증 준용), 귀속자(사원) 미입력 경고.</li>\n<li><strong>연계</strong>: 후행 P05 SA-CLS-10, 법인세 세무조정(인정이자)·P08.</li>\n</ul>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1 · <strong>기능·동작</strong>:</h4><div class=\"doc-caption\"><strong>기능·동작</strong>:</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>기능</th><th>동작</th><th>근거</th></tr></thead><tbody><tr><td>대표자 설정 연동</td><td>[사원등록]의 가지급금 대표자 설정을 자동전표(현금예금 잔액검토→전표) 기본값 파라미터로 사용</td><td>§25.1.5</td></tr>\n<tr><td>인정이자 연동</td><td>가지급금 일별 잔액 적수를 세무조정 인정이자 계산(§11.5) 기초자료로 산출 — 세무조사 추적(사원 차원 M1)</td><td>§0.2 S12, §9 M1</td></tr>\n<tr><td>잔액검토 조정 연계</td><td>P05 현금및예금잔액검토(SA-CLS-10)의 조정분개(가지급금/가수금/인출금 자동생성, 법인/개인 분기)를 본 보조부에 반영·식별</td><td>§25.9.10</td></tr>\n<tr><td>자동분개 식별</td><td>'현금검토/예금검토' 자동분개 일괄삭제 가능 플래그를 entry 메타데이터로 식별 표시</td><td>§25.9.10</td></tr></tbody></table></div></section>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>목적</strong>: 가지급금/가수금을 대표자·사원 귀속으로 관리하는 <strong>세무조정 인정이자 연동 특수 뷰</strong>(§0.2 S12). 사원(<code>EMPLOYEE</code>) 차원으로 인정이자·정산·복리후생을 추적한다(§9 M1, §11.5 연계).</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>잔액검토 조정 연계</th><th>P05 현금및예금잔액검토(SA-CLS-10)의 조정분개(가지급금/가수금/인출금 자동생성, 법인/개인 분기)를 본 보조부에 반영·식별</th><th>§25.9.10</th></tr></thead><tbody></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>검증</strong>: 가지급금·가수금 대표/기타 분리(§25.2.1 전기분 검증 준용), 귀속자(사원) 미입력 경고.</li>\n<li><strong>연계</strong>: 후행 P05 SA-CLS-10, 법인세 세무조정(인정이자)·P08.</li>\n</ul>","fields":[{"name":"대표자 설정 연동","desc":"[사원등록]의 가지급금 대표자 설정을 자동전표(현금예금 잔액검토→전표) 기본값 파라미터로 사용"},{"name":"인정이자 연동","desc":"가지급금 일별 잔액 적수를 세무조정 인정이자 계산(§11.5) 기초자료로 산출 — 세무조사 추적(사원 차원 M1)"},{"name":"잔액검토 조정 연계","desc":"P05 현금및예금잔액검토(SA-CLS-10)의 조정분개(가지급금/가수금/인출금 자동생성, 법인/개인 분기)를 본 보조부에 반영·식별"},{"name":"자동분개 식별","desc":"'현금검토/예금검토' 자동분개 일괄삭제 가능 플래그를 entry 메타데이터로 식별 표시"}],"tableCount":1,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"AUX-05","title":"가지급금·가수금 보조원장","purpose":"임직원·부서별 가지급금, 가수금 발생과 정산 잔액을 관리한다.","linkage":"SA-LDG-14 / SA-BAS-05","note":"전도금·정산 원장","source":"bk_화면설계서_v1.0.html"}},{"id":"AUX-06","title":"부가세 보조원장","phase":"1차","basis":"§11.4-(1)(4)(M11·ntsStatus 대사)","impl":"AUX-06","tabs":"","sid":"aux_06","prefix":"AUX","group":"보조부","purpose":"부가세 관련 계정과 신고서식 반영 상태, 공제·불공제 내역을 관리한다.","detailHtml":"<h4 class=\"doc-h doc-h4\">4.6 AUX-06 부가세 보조원장 (1차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 매입/매출 세금계산서 합계·세무구분별 집계(위하고 스타일) + 국세청 전송상태(<code>ntsStatus</code>) 대사(§11.4, §11.4-(1)). 차원 분류·증빙 첨부로 전표·증빙·신고서를 단일 체인 추적(M11, §11.4-(4)).</li>\n<li><strong>조회조건</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>유형/값</th><th>근거</th></tr></thead><tbody><tr><td>기간·사업장</td><td>일자 범위, 사업장(사업장별 신고/사업자단위과세 합산)</td><td>§11.4</td></tr>\n<tr><td>세무구분(<code>taxCategory</code>)</td><td>전자세금계산서/계산서/신용카드/현금영수증/수입세금계산서/불공제/면세/영세율/기타증빙</td><td>§11.4-(1)</td></tr>\n<tr><td>국세청 전송상태(<code>ntsStatus</code>)</td><td>NOT_TARGET/PENDING/ISSUED/SENT/ACCEPTED/REJECTED/CANCELLED/MANUAL_EVIDENCE</td><td>§11.4-(1), §12.2</td></tr>\n<tr><td>증빙상태(<code>evidenceStatus</code>)</td><td>정상/UNMATCHED/REVIEW_REQUIRED</td><td>§11.4-(1)</td></tr>\n<tr><td>과세유형</td><td>과세/영세율/면세/불공제</td><td>§11.4-(4)</td></tr>\n<tr><td>차원</td><td>프로젝트·부서·사업장 분류 조회(M11)</td><td>§11.4-(4)</td></tr>\n<tr><td>거래처</td><td>F2/C</td><td>§11.4-(1)</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>표시(라인) 필드</strong>: <code>PurchaseLedgerLine</code> — postingDate, journalEntryId/LineId, vendorId/vendorName, businessRegistrationNo, description, taxCategory, reasonCode, supplyAmount, vatAmount, grossAmount, deductibleType, businessPlaceId, evidenceId, taxInvoiceId, ntsStatus, evidenceStatus, sourceSystem, remark(§11.4-(1)).</li>\n<li><strong>기능·동작</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>기능</th><th>동작</th><th>근거</th></tr></thead><tbody><tr><td>세무구분 기본값 제안</td><td>증빙 유형·거래처·계정·사업장 규칙으로 제안, 변경 시 사유(<code>reasonCode</code>)+감사로그(<code>PurchaseTaxStatusHistory</code>)</td><td>§11.4-(1)(2)</td></tr>\n<tr><td>NTS 대사</td><td>홈택스/국세청 수신 결과(8.4)와 주기적 대사. <code>POST /api/tenant/purchase-ledger/{periodId}/reconcile-nts</code></td><td>§11.4-(1), §13.2</td></tr>\n<tr><td>증빙 연계</td><td>각 라인에 인보이스·세금계산서 증빙 첨부(11.12) — 전표·증빙·신고서 단일 체인</td><td>§11.4-(4)</td></tr>\n<tr><td>월별 리포트</td><td>기간·사업장·거래처·세무구분·전송상태·증빙상태 필터, 공급가액/부가세 합계, 신고서 라인 연결, 전표/증빙 drill-down, xlsx/pdf export. 보고패키지(11.13) 컴포넌트</td><td>§11.4-(1)</td></tr>\n<tr><td>미결항목 승격</td><td>증빙 없음·세무구분-증빙유형 불일치 → <code>UNMATCHED</code>/<code>REVIEW_REQUIRED</code> → 미결항목(18.3) 승격 가능</td><td>§11.4-(1)</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>검증</strong>: 공급가액+부가세=합계, 전표 금액=매입원장 금액, 사업자등록번호 형식, 세무구분별 부가세율, 불공제/면세/영세율 사유 필수, <code>REJECTED</code>·미수신 전자세금계산서 마감 체크리스트 표시(§11.4-(1), §15).</li>\n<li><strong>연계</strong>: 선행 P03 매입매출전표·8.4 수집. 후행 P06 부가세 신고서·P05 마감 체크리스트·보고패키지.</li>\n</ul>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1 · <strong>조회조건</strong>:</h4><div class=\"doc-caption\"><strong>조회조건</strong>:</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>유형/값</th><th>근거</th></tr></thead><tbody><tr><td>기간·사업장</td><td>일자 범위, 사업장(사업장별 신고/사업자단위과세 합산)</td><td>§11.4</td></tr>\n<tr><td>세무구분(<code>taxCategory</code>)</td><td>전자세금계산서/계산서/신용카드/현금영수증/수입세금계산서/불공제/면세/영세율/기타증빙</td><td>§11.4-(1)</td></tr>\n<tr><td>국세청 전송상태(<code>ntsStatus</code>)</td><td>NOT_TARGET/PENDING/ISSUED/SENT/ACCEPTED/REJECTED/CANCELLED/MANUAL_EVIDENCE</td><td>§11.4-(1), §12.2</td></tr>\n<tr><td>증빙상태(<code>evidenceStatus</code>)</td><td>정상/UNMATCHED/REVIEW_REQUIRED</td><td>§11.4-(1)</td></tr>\n<tr><td>과세유형</td><td>과세/영세율/면세/불공제</td><td>§11.4-(4)</td></tr>\n<tr><td>차원</td><td>프로젝트·부서·사업장 분류 조회(M11)</td><td>§11.4-(4)</td></tr>\n<tr><td>거래처</td><td>F2/C</td><td>§11.4-(1)</td></tr></tbody></table></div></se 모드·멱등성·UI 공통·소수점 — 본 문서에서 반복하지 않음)</li>\n<li>기장 모드(<code>TENANT_LED</code>/<code>OPERATOR_LED</code>/<code>HYBRID</code>)에 따라 조회·입력 권한이 분기된다(§21, 공통 표준 참조).</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>AUX-05</th><th>가지급금·가수금 보조원장</th><th>1차</th><th>§0.2 S12(인정이자 연동 특수 뷰), §11.5, §25.9.10 연계</th></tr></thead><tbody></tbody></table></div>\n<p>            → 현황·공사원가·누적손익/원가(LDG-20·22~29) → [P05] 결산 연계</p>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 매출처/매입처 원장. 거래성격·외화 정보·전표 연계를 라인 단위로 표시하고, Invoice 단위 미결항목(Open Item)과 잔액 정합을 유지한다(§11.11 보조부 화면 정합, N4).</li>\n<li><strong>표시(라인) 필드</strong>: 전표 연계(<code>YYYY-MM-DD-NNN</code>)·일자·계정·적요·차/대변·잔액 + <strong>외화금액·발생 시 적용환율</strong>(라인 보존)·거래성격 플래그·Invoice 번호·<code>openAmount</code>·dueDate·증빙 링크(§11.11 M9·N4).</li>\n<li><strong>패널</strong>: 거래처 현재 잔액·최장 연체일·연계 전표 요약(§11.11).</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>부분 입금</th><th>Invoice <code>openAmount</code> 감액·잔액 추적. 초과 입금은 선수금 대체 제안(R5 선수금/선급금 자동 검토 연계)</th><th>§11.11 N4, §11.1.1-(5)</th></tr></thead><tbody><tr><td>입금 자동매칭 후보</td><td>은행거래 분류(§11.11 K)와 연계하여 입금-인보이스 자동 매칭 후보 생성</td><td>§11.11 N4</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>검증</strong>: 채권계정×공급업체/채무계정×고객 차단(R8, §15), 미반제 합계-원장 잔액 불일치 검토대상(§11.11), 환율 미적용 외화 라인 저장 차단(§15).</li>\n<li><strong>연계</strong>: 선행 P03 전표·P02 [거래처별초기이월]. 후행 P05 대손충당금 결산분개(AgingSnapshot)·주석 자동화(매출채권·Aging, §11.3.2 N10)·P09 여신관리(2차).</li>\n<li><strong>표시 필드</strong>: 어음번호·수취/발행일·만기일·발행인/배서인·금액·상태·거래성격·연계 전표(<code>YYYY-MM-DD-NNN</code>)·할인 정보.</li>\n<li><strong>검증</strong>: 만기일 &lt; 발행일 차단, 상태 전이 상태머신 검증(§12.3), 부도 어음 재할인 차단.</li>\n<li><strong>연계</strong>: P05 결산부속명세서·자금일보(§11.11), P09 어음관리(SA-BIL, 2차).</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>입금-Invoice 매칭</th><th>입금 거래의 인보이스 자동 매칭 후보 생성(AUX-01 반제 연계)</th><th>§11.11 N4</th></tr></thead><tbody></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>검증</strong>: 은행 잔액 대사 불일치 = 불일치 리포트 + 마감 체크리스트 경고(차단 여부 회사 정책, §15), 카드출금은 보통예금 인출 → 대체전표 처리(§11.4-(3)).</li>\n<li><strong>연계</strong>: 선행 8.4 수집 파이프라인(P03 SA-ATX-06 통장). 후행 P05 마감 체크리스트·현금및예금잔액검토(SA-CLS-10)·자금일보(P09).</li>\n<li><strong>목적</strong>: 카드사 수신내역(8.4)을 카드·일자·가맹점·업종(MCC)·공급가액·부가세·합계로 보존하고 전표 자동생성 후보로 연계(§11.4-(3) M6). *Phase 2 자동분개 범위 표기(§11.4-(3))*.</li>\n<li><strong>연계</strong>: P03 SA-ATX-04 신용카드 수집, P06 부가세 신고(수령명세서), 카드출금 대체전표(§11.4-(3)).</li>\n<li><strong>목적</strong>: 가지급금/가수금을 대표자·사원 귀속으로 관리하는 <strong>세무조정 인정이자 연동 특수 뷰</strong>(§0.2 S12). 사원(<code>EMPLOYEE</code>) 차원으로 인정이자·정산·복리후생을 추적한다(§9 M1, §11.5 연계).</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>잔액검토 조정 연계</th><th>P05 현금및예금잔액검토(SA-CLS-10)의 조정분개(가지급금/가수금/인출금 자동생성, 법인/개인 분기)를 본 보조부에 반영·식별</th><th>§25.9.10</th></tr></thead><tbody></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>검증</strong>: 가지급금·가수금 대표/기타 분리(§25.2.1 전기분 검증 준용), 귀속자(사원) 미입력 경고.</li>\n<li><strong>연계</strong>: 후행 P05 SA-CLS-10, 법인세 세무조정(인정이자)·P08.</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>증빙 연계</th><th>각 라인에 인보이스·세금계산서 증빙 첨부(11.12) — 전표·증빙·신고서 단일 체인</th><th>§11.4-(4)</th></tr></thead><tbody></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>검증</strong>: 공급가액+부가세=합계, 전표 금액=매입원장 금액, 사업자등록번호 형식, 세무구분별 부가세율, 불공제/면세/영세율 사유 필수, <code>REJECTED</code>·미수신 전자세금계산서 마감 체크리스트 표시(§11.4-(1), §15).</li>\n</ul>","fields":[{"name":"회계기간","desc":"조회 및 입력 기준 기간"},{"name":"사업장","desc":"전체 또는 개별 사업장 선택"},{"name":"현금출납장(보조부)","desc":"화면별 상세설계 원문 기준 업무 필드"}],"tableCount":0,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"AUX-07","title":"현금출납장(보조부)","purpose":"현금 계정 입출금 시계열과 현재 현금잔액을 조회한다.","linkage":"SA-LDG-05 / WJV-01 현금잔액 드릴다운","note":"현금 간편입력 연계","source":"bk_화면설계서_v1.0.html"}},{"id":"AUX-09","title":"고정자산대장(기초)","phase":"1차","basis":"§11.5-(2)(v1.1 병합 AUX-09 필드)","impl":"AUX-09","tabs":"","sid":"aux_09","prefix":"AUX","group":"보조부","purpose":"고정자산 취득·상각·처분 이력과 기초 장부가액을 관리한다.","detailHtml":"<h4 class=\"doc-h doc-h4\">4.9 AUX-09 고정자산대장 (기초) (1차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 고정자산 대장(자산분류·코드·취득일·취득원가·감가상각누계·상태)·감가상각 명세의 기초 관리. 계정별 명세서(11.14)·보고패키지(11.13) 구성요소로 산출(§11.5-(2)).</li>\n<li><strong>입력 필드</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>유형</th><th>필수</th><th>근거</th></tr></thead><tbody><tr><td>자산분류·자산코드·자산명</td><td>코드/텍스트</td><td>Y</td><td>§11.5-(2)</td></tr>\n<tr><td>취득일·취득원가</td><td>일자/금액</td><td>Y</td><td>§11.5-(2)</td></tr>\n<tr><td>감가상각누계액·상태</td><td>금액/코드</td><td>Y</td><td>§11.5-(2)</td></tr>\n<tr><td>취득 전표 연결</td><td>전표 FK(<code>YYYY-MM-DD-NNN</code>)</td><td>Y</td><td>§11.5-(2) v1.1 병합</td></tr>\n<tr><td>설치 사업장</td><td>차원 FK</td><td>Y</td><td>§11.5-(2)</td></tr>\n<tr><td>사용부서·설치 현장·사용 사원</td><td>차원 FK</td><td>N</td><td>§11.5-(2)</td></tr>\n<tr><td>상각비 배부 기준</td><td>배부 기준(차원 태깅)</td><td>N</td><td>§11.5-(2) — 감가상각비를 부서/현장/프로젝트 배부(§9, §11.21 연계)</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: 차원 태깅 기반 상각비 배부 산출, 고정자산명세 리포트(11.14 tie-out 소스), P05 결산부속명세서 '고정자산항목'([월별감가상각비계상] 기준, §25.9.9) 데이터 공급.</li>\n<li><strong>연계</strong>: 후행 P05 결산자료입력 감가상각 반영(SA-CLS-01)·P08 고정자산 상세(SA-FA-01~07, 감가상각 엔진은 P08 범위).</li>\n</ul>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1 · <strong>입력 필드</strong>:</h4><div class=\"doc-caption\"><strong>입력 필드</strong>:</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>유형</th><th>필수</th><th>근거</th></tr></thead><tbody><tr><td>자산분류·자산코드·자산명</td><td>코드/텍스트</td><td>Y</td><td>§11.5-(2)</td></tr>\n<tr><td>취득일·취득원가</td><td>일자/금액</td><td>Y</td><td>§11.5-(2)</td></tr>\n<tr><td>감가상각누계액·상태</td><td>금액/코드</td><td>Y</td><td>§11.5-(2)</td></tr>\n<tr><td>취득 전표 연결</td><td>전표 FK(<code>YYYY-MM-DD-NNN</code>)</td><td>Y</td><td>§11.5-(2) v1.1 병합</td></tr>\n<tr><td>설치 사업장</td><td>차원 FK</td><td>Y</td><td>§11.5-(2)</td></tr>\n<tr><td>사용부서·설치 현장·사용 사원</td><td>차원 FK</td><td>N</td><td>§11.5-(2)</td></tr>\n<tr><td>상각비 배부 기준</td><td>배부 기준(차원 태깅)</td><td>N</td><td>§11.5-(2) — 감가상각비를 부서/현장/프로젝트 배부(§9, §11.21 연계)</td></tr></tbody></table></div></section>","validationHtml":"<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>상각비 배부 기준</th><th>배부 기준(차원 태깅)</th><th>N</th><th>§11.5-(2) — 감가상각비를 부서/현장/프로젝트 배부(§9, §11.21 연계)</th></tr></thead><tbody></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>연계</strong>: 후행 P05 결산자료입력 감가상각 반영(SA-CLS-01)·P08 고정자산 상세(SA-FA-01~07, 감가상각 엔진은 P08 범위).</li>\n</ul>","fields":[{"name":"자산분류·자산코드·자산명","desc":"코드/텍스트"},{"name":"취득일·취득원가","desc":"일자/금액"},{"name":"감가상각누계액·상태","desc":"금액/코드"},{"name":"취득 전표 연결","desc":"전표 FK(`YYYY-MM-DD-NNN`)"},{"name":"설치 사업장","desc":"차원 FK"},{"name":"사용부서·설치 현장·사용 사원","desc":"차원 FK"},{"name":"상각비 배부 기준","desc":"배부 기준(차원 태깅)"}],"tableCount":1,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"AUX-09","title":"고정자산대장(기초)","purpose":"고정자산 취득·상각·처분 이력과 기초 장부가액을 관리한다.","linkage":"SA-FA-01~07 / SA-VAT-23·45","note":"고정자산 보조부","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-LDG-01","title":"전표출력","phase":"1차","basis":"§25.6.1","impl":"","tabs":"","sid":"sa_ldg_01","prefix":"SA-LDG","group":"SA-LDG","purpose":"전표 단위 인쇄(분개·증빙·결재 표시)","detailHtml":"<h4 class=\"doc-h doc-h4\">4.10 SA-LDG-01 전표출력 (1차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: [일반/매입매출전표입력] 전표 조회·인쇄. 채번 source 구분(일반 1~50000, 매입매출 50001~99999) 표시(§25.6.1).</li>\n<li><strong>조회조건</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>값</th><th>근거</th></tr></thead><tbody><tr><td>기간</td><td>회계기간 내 일자 범위</td><td>§25.6.1</td></tr>\n<tr><td>전표구분</td><td>0.전체/1.출금/2.입금/3.대체/4.현금</td><td>§25.6.1</td></tr>\n<tr><td>유형</td><td>전체/일반전표/매입매출/현금조정(현금예금잔액검토 추가분)/결산전표/잉여금관련/손익계산서/중도시산표분개/원가안분분개/손익안분분개/물류수지급분개/물류(매출·매입)/복사전표/매출전표/매입전표/자동·슈퍼북(통장)전표</td><td>§25.6.1</td></tr>\n<tr><td>상세조회</td><td>거래처·프로젝트·계정과목·전표번호·현장·부서·사원·금액, 상대분개표시 ON 시 상대계정 동반 조회</td><td>§25.6.1</td></tr>\n<tr><td>BK 추가</td><td>테넌트 스코프(RLS 자동)·회계기간 컨텍스트·6차원 필터(사업장 필수)·거래처 필터</td><td>§25.6.1</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: ① 데이터 정렬(입력순/차변-대변/차변-차변(VAT)-대변-대변(VAT)/일자순/계정과목순) ② 전표출력옵션(전표번호출력 여부, 입·출금 전표 번호별 분리출력, 전표 1장 출력 계정수 1~8, &quot;다음장으로 이어짐&quot; 표시, 출력용 계정명, 일반/매입매출 동일 인쇄설정, 적요란 부서/사원 반영) ③ 경비명칭변경(원가·경비명 편집 출력)(§25.6.1).</li>\n<li><strong>검증</strong>: 원가안분/손익안분분개는 <code>CostAllocationRule</code> 안분전표 source 태그로 식별. entryCode↔전표구분 매핑 검증(출금=PAYMENT, 입금=RECEIPT, 대체=DR·CR, 결산=CLOSING_DR·CLOSING_CR)(§25.6.1).</li>\n<li><strong>산출물</strong>: 전표 인쇄 양식(전표번호·계정·적요·차/대변·차원·거래처). <strong>연계</strong>: 후행 분개장(LDG-02), 안분전표 source는 LDG-19/21(§25.6.1).</li>\n</ul>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1 · <strong>조회조건</strong>:</h4><div class=\"doc-caption\"><strong>조회조건</strong>:</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>값</th><th>근거</th></tr></thead><tbody><tr><td>기간</td><td>회계기간 내 일자 범위</td><td>§25.6.1</td></tr>\n<tr><td>전표구분</td><td>0.전체/1.출금/2.입금/3.대체/4.현금</td><td>§25.6.1</td></tr>\n<tr><td>유형</td><td>전체/일반전표/매입매출/현금조정(현금예금잔액검토 추가분)/결산전표/잉여금관련/손익계산서/중도시산표분개/원가안분분개/손익안분분개/물류수지급분개/물류(매출·매입)/복사전표/매출전표/매입전표/자동·슈퍼북(통장)전표</td><td>§25.6.1</td></tr>\n<tr><td>상세조회</td><td>거래처·프로젝트·계정과목·전표번호·현장·부서·사원·금액, 상대분개표시 ON 시 상대계정 동반 조회</td><td>§25.6.1</td></tr>\n<tr><td>BK 추가</td><td>테넌트 스코프(RLS 자동)·회계기간 컨텍스트·6차원 필터(사업장 필수)·거래처 필터</td><td>§25.6.1</td></tr></tbody></table></div></section>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>검증</strong>: 원가안분/손익안분분개는 <code>CostAllocationRule</code> 안분전표 source 태그로 식별. entryCode↔전표구분 매핑 검증(출금=PAYMENT, 입금=RECEIPT, 대체=DR·CR, 결산=CLOSING_DR·CLOSING_CR)(§25.6.1).</li>\n<li><strong>산출물</strong>: 전표 인쇄 양식(전표번호·계정·적요·차/대변·차원·거래처). <strong>연계</strong>: 후행 분개장(LDG-02), 안분전표 source는 LDG-19/21(§25.6.1).</li>\ 서_v1.0.html"}},{"id":"SA-LDG-03","title":"일(월)계표","phase":"1차","basis":"§25.6.3","impl":"","tabs":"","sid":"sa_ldg_03","prefix":"SA-LDG","group":"SA-LDG","purpose":"일별·월별 계정 차대 집계표","detailHtml":"<h4 class=\"doc-h doc-h4\">4.12 SA-LDG-03 일/월계표 (1차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 계정과목별 차·대변 합계를 일(일계표)/월(월계표) 단위 집계·출력(§25.6.3).</li>\n<li><strong>조회조건</strong>: 기간(월·일) / 구분(세목사용 5자리 설정 시: 0.과목(세목 포함)/1.세목(세목 분개분만)) / 임대주택(임대주택 자산 별도 대분류 표기, 계정 F2/C 추가, 유동·비유동자산 사이 별도 항목) / 계정과목코드보기 / BK: 테넌트·회계기간·차원 필터(§25.6.3).</li>\n<li><strong>기능</strong>: 차변/대변 일·월 단위 집계, 원장조회(선택 데이터 원장 진입·전표수정 드릴다운), 세목(5자리)=계정코드 체계 세목 차원 매핑(§25.6.3, <code>accountCodeLength</code> N8 — §12.1).</li>\n<li><strong>산출물</strong>: 일계표/월계표(엑셀변환). <strong>연계</strong>: 드릴다운 = 계정별원장(LDG-06)(§25.6.3).</li>\n</ul>","detailTablesHtml":"<p class=\"empty-note\">이 화면의 상세 표는 설계서 원문 설명으로 제공됩니다.</p>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>산출물</strong>: 일계표/월계표(엑셀변환). <strong>연계</strong>: 드릴다운 = 계정별원장(LDG-06)(§25.6.3).</li>\n</ul>","fields":[{"name":"회계기간","desc":"조회 및 입력 기준 기간"},{"name":"사업장","desc":"전체 또는 개별 사업장 선택"},{"name":"일/월계표","desc":"화면별 상세설계 원문 기준 업무 필드"}],"tableCount":0,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-LDG-03","title":"일(월)계표","purpose":"일별·월별 계정 차대 집계표","linkage":"SA-CLS-02","note":"","source":"bk_화면설계서_v1.0.html"},"legacyTitle":"일/월계표"},{"id":"SA-LDG-04","title":"총계정원장","phase":"1차","basis":"§25.6.4","impl":"","tabs":"","sid":"sa_ldg_04","prefix":"SA-LDG","group":"SA-LDG","purpose":"계정별 월 차대·잔액 원장","detailHtml":"<h4 class=\"doc-h doc-h4\">4.13 SA-LDG-04 총계정원장 (1차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 회계기간 내 계정과목의 월 총계 금액(증감·잔액) 조회. 월별/일별 탭(§25.6.4).</li>\n<li><strong>조회조건</strong>: 기간(회계연도 자동 — tenant 회계연도 설정 도출) / 계정과목(3자리 또는 5자리, F2/C) / 구분(세목사용 시 0.과목/1.세목) / BK: 테넌트·회계기간·차원 필터(§25.6.4).</li>\n<li><strong>기능</strong>: 월별/일자별 계정 원장(증감·잔액) 집계, 원장조회 상세 진입·전표수정(§25.6.4).</li>\n<li><strong>산출물</strong>: 월별/일별 원장 출력. <strong>연계</strong>: 드릴다운 = 계정별원장(LDG-06)(§25.6.4).</li>\n</ul>","detailTablesHtml":"<p class=\"empty-note\">이 화면의 상세 표는 설계서 원문 설명으로 제공됩니다.</p>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>산출물</strong>: 월별/일별 원장 출력. <strong>연계</strong>: 드릴다운 = 계정별원장(LDG-06)(§25.6.4).</li>\n</ul>","fields":[{"name":"회계기간","desc":"조회 및 입력 기준 기간"},{"name":"사업장","desc":"전체 또는 개별 사업장 선택"},{"name":"총계정원장","desc":"화면별 상세설계 원문 기준 업무 필드"}],"tableCount":0,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-LDG-04","title":"총계정원장","purpose":"계정별 월 차대·잔액 원장","linkage":"SA-CLS","note":"","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-LDG-05","title":"현금출납장","phase":"1차","basis":"§25.6.5","impl":"","tabs":"","sid":"sa_ldg_05","prefix":"SA-LDG","group":"SA-LDG","purpose":"현금 계정 입출금 시계열(AUX-07)","detailHtml":"<h4 class=\"doc-h doc-h4\">4.14 SA-LDG-05 현금출납장 (1차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 현금 수입·지출 조회·출력. 전체/부서별/사원별/현장별 탭. 입금·차변 현금=입금 란, 출금·대변 현금=출금 란, 입금-출금 잔액 산정(§25.6.5).</li>\n<li><strong>조회조건</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>값</th><th>근거</th></tr></thead><tbody><tr><td>탭</td><td>전체/부서별/사원별/현장별</td><td>§25.6.5</td></tr>\n<tr><td>기간</td><td>일자 범위</td><td>§25.6.5</td></tr>\n<tr><td>전기이월 출처</td><td>전체=[전기분재무상태표] 현금 / 부서·사원=[부서사원별 초기이월] / 현장=[현장별·거래처별 초기이월]</td><td>§25.6.5</td></tr>\n<tr><td>집계옵션</td><td>일계/월계/누계</td><td>§25.6.5</td></tr>\n<tr><td>잔액표시방법</td><td>0.일자별 잔액(동일일자 마지막 행)/1.건별(전표별) 잔액</td><td>§25.6.5</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: 현금계정 전표만 추출·running balance, 차원 탭별 기초이월을 차원별 초기이월 테이블에서 로드, 전표수정 드릴다운(§25.6.5).</li>\n<li><strong>산출물</strong>: 현금출납장(탭별). <strong>연계</strong>: 차원 엔진(현장·코스트센터·사원) grouping, P02 초기이월(§25.6.5).</li>\n</ul>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1 · <strong>조회조건</strong>:</h4><div class=\"doc-caption\"><strong>조회조건</strong>:</div><div class=\"doc-table-wrap\ 입력(§25.6.6).</li>\n</ul>","detailTablesHtml":"<p class=\"empty-note\">이 화면의 상세 표는 설계서 원문 설명으로 제공됩니다.</p>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>산출물</strong>: 계정별원장(우클릭 체크펜 노랑/녹색/분홍, 계산기, 엑셀변환). <strong>연계</strong>: 선행 LDG-03/04 드릴다운, 후행 전표입력(§25.6.6).</li>\n</ul>","fields":[{"name":"회계기간","desc":"조회 및 입력 기준 기간"},{"name":"사업장","desc":"전체 또는 개별 사업장 선택"},{"name":"계정별원장","desc":"화면별 상세설계 원문 기준 업무 필드"}],"tableCount":0,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-LDG-06","title":"계정별원장","purpose":"특정 계정 거래 명세·잔액","linkage":"SA-JNL","note":"","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-LDG-07","title":"거래처원장","phase":"1차","basis":"§25.6.7","impl":"","tabs":"","sid":"sa_ldg_07","prefix":"SA-LDG","group":"SA-LDG","purpose":"거래처별 채권채무 증감·잔액(AUX-01·외화·거래성격)","detailHtml":"<h4 class=\"doc-h doc-h4\">4.16 SA-LDG-07 거래처원장 (1차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 계정과목별 거래처별 잔액·거래내용. 잔액/내용/총괄잔액/총괄내용 4탭. 전기이월=[거래처별 초기이월](§25.6.7).</li>\n<li><strong>조회조건</strong>: (잔액/내용) 기간·계정과목(F2/C)·거래처(F2/C, 공란=전체)·구분(0.과목/1.세목) / (총괄잔액/총괄내용) 계정과목명 두 글자 이상 또는 코드 직접입력·거래처·구분 / 더보기: 주민번호 별표, 집계옵션(월계/누계), 화면구성, 미등록거래처 사용여부, 잔액표시방법(잔액없는 거래처 표시·건별잔액·음수 빨간색)(§25.6.7).</li>\n<li><strong>기능</strong>: ① 거래처 잔액 = 전기이월 ± 차/대변 상계(running balance) ② 총괄 = 계정 범위 전체 집계 ③ 거래처 더블클릭 → 내용 탭 이동 ④ 잔액없는 거래처 표시함=0 표기/표시안함=공란·미인쇄, 행고정/해제 ⑤ 주민번호 마스킹 = 개인정보 표시정책(§25.6.7).</li>\n<li><strong>산출물</strong>: 거래처원장(체크펜·계산기·엑셀변환 — 내용탭 전체거래처 그룹별 시트 분할 인쇄)(§25.6.7).</li>\n<li><strong>연계·정합</strong>: AUX-01 보조원장과 동일 원천 — <strong>미반제 Invoice 합계 = 거래처원장 잔액 상시 대사</strong>(§11.11 N4). 기존 AUX 거래처원장 충돌 시 Smart A 4탭 구조 채택(§25.6.7 충돌 조정).</li>\n</ul>","detailTablesHtml":"<p class=\"empty-note\">이 화면의 상세 표는 설계서 원문 설명으로 제공됩니다.</p>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>연계·정합</strong>: AUX-01 보조원장과 동일 원천 — <strong>미반제 Invoice 합계 = 거래처원장 잔액 상시 대사</strong>(§11.11 N4). 기존 AUX 거래처원장 충돌 시 Smart A 4탭 구조 채택(§25.6.7 충돌 조정).</li>\n</ul>","fields":[{"name":"회계기간","desc":"조회 및 입력 기준 기간"},{"name":"사업장","desc":"전체 또는 개별 사업장 선택"},{"name":"거래처원장","desc":"화면별 상세설계 원문 기준 업무 필드"}],"tableCount":0,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-LDG-07","title":"거래처원장","purpose":"거래처별 채권채무 증감·잔액(AUX-01·외화·거래성격)","linkage":"AUX-01, SA-OPN-07","note":"C8","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-LDG-08","title":"총괄원장","phase":"1차","basis":"§25.6.8","impl":"","tabs":"","sid":"sa_ldg_08","prefix":"SA-LDG","group":"SA-LDG","purpose":"본지점·사업장 통합 원장","detailHtml":"<h4 class=\"doc-h doc-h4\">4.17 SA-LDG-08 총괄원장 (1차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 프로젝트/현장/거래처/부서·사원별 × 계정과목별 총괄잔액·총괄내용(cross-tab). PJT/현장/거래처/부서·사원 탭(각 잔액·내용)(§25.6.8).</li>\n<li><strong>조회조건</strong>: 일자(기간)·계정과목(두 글자 이상/F2/C/코드, 공란=전체)·구분(0.과목/1.세목)·탭별 키(프로젝트/현장/거래처/부서·사원). 부서·사원 탭: 구분1(과목·세목)+구분2(부서/사원 기준)+코드(§25.6.8).</li>\n<li><strong>기능</strong>: 전표 라인 차원 코드 유무 필터, 차원 단일 축 × 계정 cross-tab 집계 API(§25.6.8).</li>\n<li><strong>산출물</strong>: 화면 조회·출력(§25.6.8).</li>\n</ul>","detailTablesHtml":"<p class=\"empty-note\">이 화면의 상세 표는 설계서 원문 설명으로 제공됩니다.</p>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>기능</strong>: 전표 라인 차원 코드 유무 필터, 차원 단일 축 × 계정 cross-tab 집계 API(§25.6.8).</li>\n</ul>","fields":[{"name":"회계기간","desc":"조회 및 입력 기준 기간"},{"name":"사업장","desc":"전체 또는 개별 사업장 선택"},{"name":"총괄원장","desc":"화면별 상세설계 원문 기준 업무 필드"}],"tableCount":0,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-LDG-08","title":"총괄원장","purpose":"본지점·사업장 통합 원장","linkage":"SA-BAS-01","note":"","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-LDG-09","title":"매입매출장","phase":"1차","basis":"§25.6.9","impl":"","tabs":"","sid":"sa_ldg_09","prefix":"SA-LDG","group":"SA-LDG","purpose":"세무구분별 매입·매출 거래 장부","detailHtml":"<h4 class=\"doc-h doc-h4\">4.18 SA-LDG-09 매입매출장 (1차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 부가세 관련 거래(공급가액·부가세)를 [매입매출전표입력] 상단부 데이터로 조회. 전체/현장별/프로젝트별/부서별/사원별 탭(§25.6.9).</li>\n<li><strong>조회조건</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>값</th><th>근거</th></tr></thead><tbody><tr><td>기간·사업장명</td><td>본점 권한 설정 시 지점 조회(회사관리 권한/'지점데이터 조회가능 직원'/세무대리인 수임처 권한 배포)</td><td>§25.6.9</td></tr>\n<tr><td>조회구분</td><td>1.개별/2.통합</td><td>§25.6.9</td></tr>\n<tr><td>상세조회</td><td>구분(0.전체/1.매출/2.매입/3.신고서기준), 거래구분(1.단일거래[합산, 품명 ~외]/2.복수거래[품명별]), 과세유형, 불공사유(구분2.매입·유형54.불공), 거래처, 계정과목, 금액(공급가액·부가세·합계)</td><td>§25.6.9</td></tr>\n<tr><td>주류·신고월</td><td>주류코드 설정 거래처 시 &quot;여&quot;, 예정누락 신고대상월</td><td>§25.6.9</td></tr>\n<tr><td>차원 탭</td><td>현장/프로젝트/부서/사원별: 기간 + 해당 차원 코드(관리항목 입력분)</td><td>§25.6.9</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: ① 전자세금 조회옵션(전체/11일 이내/11일 이후), 종이발행(종이발행/종이발행+전자 11일 이후) ② 더보기: 화면구성, 집계옵션(합계/월계/분기누계/반기누계/누계), 주민번호 별표, 신고년월(예정신고 누락분·내국신용장 사후개설 — 전체탭), 예정누락, 사후개설, 전표수정, 유형별 전표 집계, 거래처별 집계(1.매출/2.매입), 행고정/해제 ③ 공급가액/부가세 헤더를 과세유형·신고기준 집계(§25.6.9).</li>\n<li><strong>산출물</strong>: 매입매출장(엑셀·계산기). 구분 3.신고서기준 = [부가가치세신고서] 반영 기준 조회(§25.6.9).</li>\n<li><strong>연계</strong>: 다중 사업장 RLS, 후행 P06 부가세신고 파이프라인(신고서기준 매핑)(§25.6.9).</li>\n</ul>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1 · <strong>조회조건</strong>:</h4><div class=\"doc-caption\"><strong>조회조건</strong>:</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>값</th><th>근거</th></tr></thead><tbody><tr><td>기간·사업장명</td><td>본점 권한 설정 시 지점 조회(회사관리 권한/'지점데이터 조회가능 직원'/세무대리인 수임처 권한 배포)</td><td>§25.6.9</td></tr>\n<tr><td>조회구분</td><td>1.개별/2.통합</td><td>§25.6.9</td></tr>\n<tr><td>상세조회</td><td>구분(0.전체/1.매출/2.매입/3.신고서기준), 거래구분(1.단일거래[합산, 품명 ~외]/2.복수거래[품명별]), 과세유형, 불공사유(구분2.매입·유형54.불공), 거래처, 계정과목, 금액(공급가액·부가세·합계)</td><td>§25.6.9</td></tr>\n<tr><td>주류·신고월</td><td>주류코드 설정 거래처 시 &quot;여&quot;, 예정누락 신고대상월</td><td>§25.6.9</td></tr>\n<tr><td>차원 탭</td><td>현장/프로젝트/부서/사원별: 기간 + 해당 차원 코드(관리항목 입력분)</td><td>§25.6.9</td></tr></tbody></table></div></section>","validationHtml":"<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>기간·사업장명</th><th>본점 권한 설정 시 지점 조회(회사관리 권한/'지점데이터 조회가능 직원'/세무대리인 수임처 권한 배포)</th><th>§25.6.9</th></tr></thead><tbody></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>연계</strong>: 다중 사업장 RLS, 후행 P06 부가세신고 파이프라인(신고서기준 매핑)(§25.6.9).</li>\n</ul>","fields":[{"name":"기간·사업장명","desc":"본점 권한 설정 시 지점 조회(회사관리 권한/'지점데이터 조회가능 직원'/세무대리인 수임처 권한 배포)"},{"name":"조회구분","desc":"1.개별/2.통합"},{"name":"상세조회","desc":"구분(0.전체/1.매출/2.매입/3.신고서기준), 거래구분(1.단일거래[합산, 품명 ~외]/2.복수거래[품명별]), 과세유형, 불공사유(구분2.매입·유형54.불공), 거래처, 계정과목, 금액(공급가액·부가세·합계)"},{"name":"주류·신고월","desc":"주류코드 설정 거래처 시 \"여\", 예정누락 신고대상월"},{"name":"차원 탭","desc":"현장/프로젝트/부서/사원별: 기간 + 해당 차원 코드(관리항목 입력분)"}],"tableCount":1,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-LDG-09","title":"매입매출장","purpose":"세무구분별 매입·매출 거래 장부","linkage":"SA-VAT-03·06","note":"","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-LDG-17","title":"운행기록부","phase":"1차","basis":"§25.7.8","impl":"","tabs":"","sid":"sa_ldg_17","prefix":"SA-LDG","group":"SA-LDG","purpose":"업무용승용차 운행기록(업무사용비율)","detailHtml":"<h4 class=\"doc-h doc-h4\">4.19 SA-LDG-17 운행기록부(업무용승용차) (1차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 차량별 운행일지 작성·운행내역·유류비 조회. 운행기록/누적거리확인/유류비확인 탭. 직접입력 또는 엑셀업로드(§25.7.8).</li>\n<li><strong>입력 필드(운행기록 탭)</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>유형/값</th><th>자동/수동</th><th>근거</th></tr></thead><tbody><tr><td>기간</td><td>입력월(선택 시 누적조회)</td><td>수동</td><td>§25.7.8</td></tr>\n<tr><td>유형</td><td>[업무용승용차등록] 임차구분 0.회사차/1.렌트/2.리스/3.직원명의차량/4.직원소유타인명의/5~7.비영업용/8.전체/9.업무용승용차(0~2)</td><td>선택</td><td>§25.7.8</td></tr>\n<tr><td>Code/차량번호</td><td>F2/C</td><td>선택</td><td>§25.7.8</td></tr>\n<tr><td>업무사용율</td><td>업무용 사용거리 합계 ÷ 총 주행거리 합계</td><td>자동</td><td>§25.7.8</td></tr>\n<tr><td>일자(요일)</td><td>일자 입력 시 요일 자동</td><td>자동</td><td>§25.7.8</td></tr>\n<tr><td>사원/부서</td><td>[업무용승용차등록] 운행자정보 자동, 사원 선택 시 부서 자동</td><td>자동</td><td>§25.7.8</td></tr>\n<tr><td>구분</td><td>1.출근/2.퇴근/3.업무/4.비업무/5.출퇴근/6.업무왕복/7.개인왕복 — 출퇴근 시 자택↔회사 주소 자동, 업무 시 직전 도착지=출발지</td><td>선택+자동</td><td>§25.7.8</td></tr>\n<tr><td>주행전km/주행km/주행후km</td><td>주행전 자동, 주행km 정수 입력, 주행후 누적 자동</td><td>혼합</td><td>§25.7.8</td></tr>\n<tr><td>출퇴근용·업무용 거리</td><td>구분별 자동 분배</td><td>자동</td><td>§25.7.8</td></tr>\n<tr><td>비고</td><td>0.직접입력/1.거래처방문/2.사업장방문/3.회의참석/4.판촉활동/5.교육 등</td><td>선택</td><td>§25.7.8</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: ① 사원일괄변경·비고일괄변경(체크 후 액션바), 복사(복사기간·0.주말/공휴일 제외·1.전체), 주소입력열기/닫기 ② 더보기: 입력자료유형 보기/숨기기(입력/엑셀), 엑셀서식 불러오기(지정양식: 일자·구분·주행Km 필수, 차량번호·차종·명의구분 일치 / 회사서식: 엑셀제목 매칭) ③ (누적거리확인) 운행기록 새로불러오기·운행기록반영·누적거리점검(누적거리·오차허용범위 기본 10 → 오차거리 안분, 점검후 주행km·증감km 반영) ④ (유류비확인) 유류비계정설정(차량유지비 외 추가), 전표불러오기(구분[업무용승용차관리 1.유류비]/적요명), 표준연비일괄적용(유류비 단가·표준연비 → 유류비 km)(§25.7.8).</li>\n<li><strong>산출물</strong>: 운행일지(체크펜·계산기). [업무용승용차관련비용명세서] (5)총주행거리·(6)업무용 사용거리 자동 반영(법령 50의2 ⑥)(§25.7.8).</li>\n<li><strong>연계</strong>: 원천 = 운행일지·유류비 보조 테이블 + 차량 마스터(SA-BAS-10). 후행 = P08 업무용승용차 명세서(자동 반영 파이프라인 별도 분리), 관련 = LDG-18(§25.7.8).</li>\n</ul>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1 · <strong>입력 필드(운행기록 탭)</strong>:</h4><div class=\"doc-caption\"><strong>입력 필드(운행기록 탭)</strong>:</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>유형/값</th><th>자동/수동</th><th>근거</th></tr></thead><tbody><tr><td>기간</td><td>입력월(선택 시 누적조회)</td><td>수동</td><td>§25.7.8</td></tr>\n<tr><td>유형</td><td>[업무용승용차등록] 임차구분 0.회사차/1.렌트/2.리스/3.직원명의차량/4.직원소유타인명의/5~7.비영업용/8.전체/9.업무용승용차(0~2)</td><td>선택</td><td>§25.7.8</td></tr>\n<tr><td>Code/차량번호</td><td>F2/C</td><td>선택</td><td>§25.7.8</td></tr>\n<tr><td>업무사용율</td><td>업무용 사용거리 합계 ÷ 총 주행거리 합계</td><td>자동</td><td>§25.7.8</td></tr>\n<tr><td>일자(요일)</td><td>일자 입력 시 요일 자동</td><td>자동</td><td>§25.7.8</td></tr>\n<tr><td>사원/부서</td><td>[업무용승용차등록] 운행자정보 자동, 사원 선택 시 부서 자동</td><td>자동</td><td>§25.7.8</td></tr>\n<tr><td>구분</td><td>1.출근/2.퇴근/3.업무/4.비업무/5.출퇴근/6.업무왕복/7.개인왕복 — 출퇴근 시 자택↔회사 주소 자동, 업무 시 직전 도착지=출발지</td><td>선택+자동</td><td>§25.7.8</td></tr>\n<tr><td>주행전km/주행km/주행후km</td><td>주행전 자동, 주행km 정수 입력, 주행후 누적 자동</td><td>혼합</td><td>§25.7.8</td></tr>\n<tr><td>출퇴근용·업무용 거리</td><td>구분별 자동 분배</td><td>자동</td><td>§25.7.8</td></tr>\n<tr><td>비고</td><td>0.직접입력/1.거래처방문/2.사업장방문/3.회의참석/4.판촉활동/5.교육 등</td><td>선택</td><td>§25.7.8</td></tr></tbody></table></div></section>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>연계</strong>: 원천 = 운행일지·유류비 보조 테이블 + 차량 마스터(SA-BAS-10). 후행 = P08 업무용승용차 명세서(자동 반영 파이프라인 별도 분리), 관련 = LDG-18(§25.7.8).</li>\n</ul>","fields":[{"name":"기간","desc":"입력월(선택 시 누적조회)"},{"name":"유형","desc":"[업무용승용차등록] 임차구분 0.회사차/1.렌트/2.리스/3.직원명의차량/4.직원소유타인명의/5~7.비영업용/8.전체/9.업무용승용차(0~2)"},{"name":"Code/차량번호","desc":"F2/C"},{"name":"업무사용율","desc":"업무용 사용거리 합계 ÷ 총 주행거리 합계"},{"name":"일자(요일)","desc":"일자 입력 시 요일 자동"},{"name":"사원/부서","desc":"[업무용승용차등록] 운행자정보 자동, 사원 선택 시 부서 자동"},{"name":"구분","desc":"1.출근/2.퇴근/3.업무/4.비업무/5.출퇴근/6.업무왕복/7.개인왕복 — 출퇴근 시 자택↔회사 주소 자동, 업무 시 직전 도착지=출발지"},{"name":"주행전km/주행km/주행후km","desc":"주행전 자동, 주행km 정수 입력, 주행후 누적 자동"},{"name":"출퇴근용·업무용 거리","desc":"구분별 자동 분배"},{"name":"비고","desc":"0.직접입력/1.거래처방문/2.사업장방문/3.회의참석/4.판촉활동/5.교육 등"}],"tableCount":1,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-LDG-17","title":"운행기록부","purpose":"업무용승용차 운행기록(업무사용비율)","linkage":"SA-BAS-10","note":"C8","source":"bk_화면설계서_v1.0.html"},"legacyTitle":"운행기록부(업무용승용차)"},{"id":"SA-LDG-18","title":"차량비용현황","phase":"1차","basis":"§25.7.9","impl":"","tabs":"","sid":"sa_ldg_18","prefix":"SA-LDG","group":"SA-LDG","purpose":"차량별 비용 집계(감가·유류·보험)","detailHtml":"<h4 class=\"doc-h doc-h4\">4.20 SA-LDG-18 차량비용현황(업무용승용차) (1차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 전표 입력된 업무용 승용차 관련 비용을 차량별·부서/사원별 조회. 차량별/부서·사원별 탭(§25.7.9).</li>\n<li><strong>조회조건</strong>: (차량별) 기간(누적조회)·업무용승용차(F2/C, 공란=전체)·유형(임차구분 0~9) / (부서·사원별) 기간·구분(0.부서별/1.사원별)·부서/사원(F2/C)·유형·조회구분(0.전표(경비기준)=비용계정 업무용승용차 관리항목 구분[유류비/보험료/수선비/자동차세/임차료/감가상각비/기타] 기준, 1.운행자(관리항목)=사원 기준)(§25.7.9).</li>\n<li><strong>기능</strong>: ① 관리항목 미설정 데이터 = &quot;미등록차량&quot;(차량 차원 NULL 그룹), &quot;차량관리 전표일괄변경&quot;으로 차량번호·구분 일괄반영 ② 불러오기(구분/적요명/설정 계정과목 전체조회 — 기본 계정: 세금과공과·감가상각비·지급임차료·수선비·보험료·차량유지비, 그 외 '계정과목 설정보기' 추가) ③ 데이터정렬(날짜/비용구분/계정과목/사원명/금액/적요/전표유형순) ④ 전표수정·원장조회(§25.7.9).</li>\n<li><strong>산출물</strong>: 차량별/사원별 비용 세부내역·합계. <strong>연계</strong>: 선행 LDG-17, 원천 JournalLine 비용계정+관리항목(차량·사원)(§25.7.9).</li>\n</ul>","detailTablesHtml":"<p class=\"empty-note\">이 화면의 상세 표는 설계서 원문 설명으로 제공됩니다.</p>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>산출물</strong>: 차량별/사원별 비용 세부내역·합계. <strong>연계</strong>: 선행 LDG-17, 원천 JournalLine 비용계정+관리항목(차량·사원)(§25.7.9).</li>\n</ul>","fields":[{"name":"회계기간","desc":"조회 및 입력 기준 기간"},{"name":"사업장","desc":"전체 또는 개별 사업장 선택"},{"name":"차량비용현황(업무용승용차)","desc":"화면별 상세설계 원문 기준 업무 필드"}],"tableCount":0,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-LDG-18","title":"차량비용현황","purpose":"차량별 비용 집계(감가·유류·보험)","linkage":"SA-BAS-10, SA-FA","note":"C8","source":"bk_화면설계서_v1.0.html"},"legacyTitle":"차량비용현황(업무용승용차)"},{"id":"AUX-04","title":"카드 보조원장","phase":"2차","basis":"§11.4-(3)(M6 — *Phase 2 자동분개 범위* 표기)","impl":"AUX-04","tabs":"","sid":"aux_04","prefix":"AUX","group":"보조부","purpose":"카드 승인·매입 내역과 공제판정, 카드채무·증빙 연결을 관리한다.","detailHtml":"<h4 class=\"doc-h doc-h4\">4.4 AUX-04 카드 보조원장 (2차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 카드사 수신내역(8.4)을 카드·일자·가맹점·업종(MCC)·공급가액·부가세·합계로 보존하고 전표 자동생성 후보로 연계(§11.4-(3) M6). *Phase 2 자동분개 범위 표기(§11.4-(3))*.</li>\n<li><strong>조회조건</strong>: 기간, 카드(법인/개인·카드번호), 가맹점, 업종(MCC), 공제구분(공제/불공제/검토 필요), 매칭상태.</li>\n<li><strong>기능·동작</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>기능</th><th>동작</th><th>근거</th></tr></thead><tbody><tr><td>공제 가능 여부 판정</td><td>가맹점 업종/거래 성격 기준 매입세액 공제/불공제 자동 분류(불공제: 접대성 경비·비영업용 승용차·면세 등)</td><td>§11.4-(3)</td></tr>\n<tr><td>환급액 산출</td><td>공제 가능 매입세액 합계 → 부가세 환급/납부 추정 반영. 업종 코드·공제 규칙은 공통 표준(6장) 버전 배포 + 회사별 예외</td><td>§11.4-(3)</td></tr>\n<tr><td>3분류·검토 큐</td><td>판정 결과 「공제/불공제/검토 필요」 3분류, 검토 필요 건 검토 큐 라우팅(N11)</td><td>§11.1.1-(16)</td></tr>\n<tr><td>승인내역 매칭</td><td>카드승인내역 ↔ 전표(일자·금액·가맹점·카드번호) 자동 매칭, 결제(대금 인출)까지 추적</td><td>§11.1.1-(16)</td></tr>\n<tr><td>증빙 중복 방지</td><td>동일 카드승인건의 다중 전표 연결 차단, 세금계산서+카드결제 이중공제 방지</td><td>§11.1.1-(16), §15</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>연계</strong>: P03 SA-ATX-04 신용카드 수집, P06 부가세 신고(수령명세서), 카드출금 대체전표(§11.4-(3)).</li>\n</ul>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1 · <strong>기능·동작</strong>:</h4><div class=\"doc-caption\"><strong>기능·동작</strong>:</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>기능</th><th>동작</th><th>근거</th></tr></thead><tbody><tr><td>공제 가능 여부 판정</td><td>가맹점 업종/거래 성격 기준 매입세액 공제/불공제 자동 분류(불공제: 접대성 경비·비영업용 승용차·면세 등)</td><td>§11.4-(3)</td></tr>\n<tr><td>환급액 산출</td><td>공제 가능 매입세액 합계 → 부가세 환급/납부 추정 반영. 업종 코드·공제 규칙은 공통 표준(6장) 버전 배포 + 회사별 예외</td><td>§11.4-(3)</td></tr>\n<tr><td>3분류·검토 큐</td><td>판정 결과 「공제/불공제/검토 필요」 3분류, 검토 필요 건 검토 큐 라우팅(N11)</td><td>§11.1.1-(16)</td></tr>\n<tr><td>승인내역 매칭</td><td>카드승인내역 ↔ 전표(일자·금액·가맹점·카드번호) 자동 매칭, 결제(대금 인출)까지 추적</td><td>§11.1.1-(16)</td></tr>\n<tr><td>증빙 중복 방지</td><td>동일 카드승인건의 다중 전표 연결 차단, 세금계산서+카드결제 이중공제 방지</td><td>§11.1.1-(16), §15</td></tr></tbody></table></div></section>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>목적</strong>: 카드사 수신내역(8.4)을 카드·일자·가맹점·업종(MCC)·공급가액·부가세·합계로 보존하고 전표 자동생성 후보로 연계(§11.4-(3) M6). *Phase 2 자동분개 범위 표기(§11.4-(3))*.</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>승인내역 매칭</th><th>카드승인내역 ↔ 전표(일자·금액·가맹점·카드번호) 자동 매칭, 결제(대금 인출)까지 추적</th><th>§11.1.1-(16)</th></tr></thead><tbody><tr><td>증빙 중복 방지</td><td>동일 카드승인건의 다중 전표 연결 차단, 세금계산서+카드결제 이중공제 방지</td><td>§11.1.1-(16), §15</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>연계</strong>: P03 SA-ATX-04 신용카드 수집, P06 부가세 신고(수령명세서), 카드출금 대체전표(§11.4-(3)).</li>\n</ul>","fields":[{"name":"공제 가능 여부 판정","desc":"가맹점 업종/거래 성격 기준 매입세액 공제/불공제 자동 분류(불공제: 접대성 경비·비영업용 승용차·면세 등)"},{"name":"환급액 산출","desc":"공제 가능 매입세액 합계 → 부가세 환급/납부 추정 반영. 업종 코드·공제 규칙은 공통 표준(6장) 버전 배포 + 회사별 예외"},{"name":"3분류·검토 큐","desc":"판정 결과 「공제/불공제/검토 필요」 3분류, 검토 필요 건 검토 큐 라우팅(N11)"},{"name":"승인내역 매칭","desc":"카드승인내역 ↔ 전표(일자·금액·가맹점·카드번호) 자동 매칭, 결제(대금 인출)까지 추적"},{"name":"증빙 중복 방지","desc":"동일 카드승인건의 다중 전표 연결 차단, 세금계산서+카드결제 이중공제 방지"}],"tableCount":1,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"AUX-04","title":"카드 보조원장","purpose":"카드 승인·매입 내역과 공제판정, 카드채무·증빙 연결을 관리한다.","linkage":"SA-ATX-04 / SA-VAT-04 / SA-CLS-11","note":"카드 VAT 공제 규칙","source":"bk_화면설계서_v1.0.html"}},{"id":"AUX-08","title":"재고 수불부","phase":"2차(P2 이관)","basis":"§0.2 S13, §11.21-(2)","impl":"AUX-08","tabs":"","sid":"aux_08","prefix":"AUX","group":"보조부","purpose":"재고 입출고 수불, 물류전표 전송과 원가 흐름을 관리한다.","detailHtml":"<h4 class=\"doc-h doc-h4\">4.8 AUX-08 재고 수불부 (2차 — P2 이관)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 재고품목(<code>InventoryItem</code>)·재고수불(<code>InventoryMovement</code>) 관리. <strong>Phase 2로 이관</strong>(§0.2 S13, §11.11 참고행, §11.21).</li>\n<li><strong>범위(설계 예약)</strong>: 수불 유형 = 매입입고/생산투입/생산입고/매출출고/반품/폐기/재고조정/기말실사조정. 라인 = 수량·단가·금액·원천 전표/증빙/매입원장 참조. 원가평가 = 이동평균 기본(총평균/선입선출/표준원가 선택, 변경은 회계연도 경계 또는 관리회사 승인)(§11.21-(2)).</li>\n<li><strong>적용 조건</strong>: <code>industryType=MANUFACTURING</code>/<code>DISTRIBUTION_WITH_INVENTORY</code> + <code>manufacturingCostEnabled</code> 플래그(§11.21-(1)).</li>\n</ul>","detailTablesHtml":"<p class=\"empty-note\">이 화면의 상세 표는 설계서 원문 설명으로 제공됩니다.</p>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>범위(설계 예약)</strong>: 수불 유형 = 매입입고/생산투입/생산입고/매출출고/반품/폐기/재고조정/기말실사조정. 라인 = 수량·단가·금액·원천 전표/증빙/매입원장 참조. 원가평가 = 이동평균 기본(총평균/선입선출/표준원가 선택, 변경은 회계연도 경계 또는 관리회사 승인)(§11.21-(2)).</li>\n</ul>","fields":[{"name":"회계기간","desc":"조회 및 입력 기준 기간"},{"name":"사업장","desc":"전체 또는 개별 사업장 선택"},{"name":"재고 수불부","desc":"화면별 상세설계 원문 기준 업무 필드"}],"tableCount":0,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"AUX-08","title":"재고 수불부","purpose":"재고 입출고 수불, 물류전표 전송과 원가 흐름을 관리한다.","linkage":"SA-JNL-04 / SA-LDG / SA-CLS-05","note":"물류전표 Phase 2","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-LDG-10","title":"총계정관리원장","phase":"2차","basis":"§25.7.1","impl":"","tabs":"","sid":"sa_ldg_10","prefix":"SA-LDG","group":"SA-LDG","purpose":"관리항목(거래처/어음/카드 등) 단위 총계정 원장","detailHtml":"<h4 class=\"doc-h doc-h4\">4.21 SA-LDG-10 총계정관리원장 (2차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 선택 계정과목의 거래처별/현장별/프로젝트별/부서·사원별 <strong>월별 증가·감소·잔액</strong> cross-tab(§25.7.1).</li>\n<li><strong>조회조건</strong>: 계정과목(F2/C, 공란=전체) / 구분(차원 선택: 거래처·현장·프로젝트·부서·사원 — 선택 시 우측 해당 코드 조건 추가) / 구분(0.과목/1.세목 — 세목은 환경설정 '1.세목사용(5자리)' 필요)(§25.7.1).</li>\n<li><strong>기능</strong>: 차원 × 월별 증감/잔액 cross-tab, 원장조회(월별/차변/대변/잔액 더블클릭) → 전표 더블클릭 시 전표입력 수정(§25.7.1).</li>\n</ul>","detailTablesHtml":"<p class=\"empty-note\">이 화면의 상세 표는 설계서 원문 설명으로 제공됩니다.</p>","validationHtml":"<ul class=\"doc-list\">\n<li>공통 설계 표준: <code>00_개요_페이즈일정.md</code> 3절 참조(멀티테넌시 RLS·감사 필드·오류코드·권한·기장 모드·멱등성·UI 공통·소수점 — 본 문서에서 반복하지 않음)</li>\n<li>기장 모드(<code>TENANT_LED</code>/<code>OPERATOR_LED</code>/<code>HYBRID</code>)에 따라 조회·입력 권한이 분기된다(§21, 공통 표준 참조).</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>AUX-05</th><th>가지급금·가수금 보조원장</th><th>1차</th><th>§0.2 S12(인정이자 연동 특수 뷰), §11.5, §25.9.10 연계</th></tr></thead><tbody></tbody></table></div>\n<p>            → 현황·공사원가·누적손익/원가(LDG-20·22~29) → [P05] 결산 연계</p>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 매출처/매입처 원장. 거래성격·외화 정보·전표 연계를 라인 단위로 표시하고, Invoice 단위 미결항목(Open Item)과 잔액 정합을 유지한다(§11.11 보조부 화면 정합, N4).</li>\n<li><strong>표시(라인) 필드</strong>: 전표 연계(<code>YYYY-MM-DD-NNN</code>)·일자·계정·적요·차/대변·잔액 + <strong>외화금액·발생 시 적용환율</strong>(라인 보존)·거래성격 플래그·Invoice 번호·<code>openAmount</code>·dueDate·증빙 링크(§11.11 M9·N4).</li>\n<li><strong>패널</strong>: 거래처 현재 잔액·최장 연체일·연계 전표 요약(§11.11).</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>부분 입금</th><th>Invoice <code>openAmount</code> 감액·잔액 추적. 초과 입금은 선수금 대체 제안(R5 선수금/선급금 자동 검토 연계)</th><th>§11.11 N4, §11.1.1-(5)</th></tr></thead><tbody><tr><td>입금 자동매칭 후보</td><td>은행거래 분류(§11.11 K)와 연계하여 입금-인보이스 자동 매칭 후보 생성</td><td>§11.11 N4</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>검증</strong>: 채권계정×공급업체/채무계정×고객 차단(R8, §15), 미반제 합계-원장 잔액 불일치 검토대상(§11.11), 환율 미적용 외화 라인 저장 차단(§15).</li>\n<li><strong>연계</strong>: 선행 P03 전표·P02 [거래처별초기이월]. 후행 P05 대손충당금 결산분개(AgingSnapshot)·주석 자동화(매출채권·Aging, §11.3.2 N10)·P09 여신관리(2차).</li>\n<li><strong>표시 필드</strong>: 어음번호·수취/발행일·만기일·발행인/배서인·금액·상태·거래성격·연계 전표(<code>YYYY-MM-DD-NNN</code>)·할인 정보.</li>\n<li><strong>검증</strong>: 만기일 &lt; 발행일 차단, 상태 전이 상태머신 검증(§12.3), 부도 어음 재할인 차단.</li>\n<li><strong>연계</strong>: P05 결산부속명세서·자금일보(§11.11), P09 어음관리(SA-BIL, 2차).</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>입금-Invoice 매칭</th><th>입금 거래의 인보이스 자동 매칭 후보 생성(AUX-01 반제 연계)</th><th>§11.11 N4</th></tr></thead><tbody></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>검증</strong>: 은행 잔액 대사 불일치 = 불일치 리포트 + 마감 체크리스트 경고(차단 여부 회사 정책, §15), 카드출금은 보통예금 인출 → 대체전표 처리(§11.4-(3)).</li>\n<li><strong>연계</strong>: 선행 8.4 수집 파이프라인(P03 SA-ATX-06 통장). 후행 P05 마감 체크리스트·현금및예금잔액검토(SA-CLS-10)·자금일보(P09).</li>\n<li><strong>목적</strong>: 카드사 수신내역(8.4)을 카드·일자·가맹점·업종(MCC)·공급가액·부가세·합계로 보존하고 전표 자동생성 후보로 연계(§11.4-(3) M6). *Phase 2 자동분개 범위 표기(§11.4-(3))*.</li>\n<li><strong>연계</strong>: P03 SA-ATX-04 신용카드 수집, P06 부가세 신고(수령명세서), 카드출금 대체전표(§11.4-(3)).</li>\n<li><strong>목적</strong>: 가지급금/가수금을 대표자·사원 귀속으로 관리하는 <strong>세무조정 인정이자 연동 특수 뷰</strong>(§0.2 S12). 사원(<code>EMPLOYEE</code>) 차원으로 인정이자·정산·복리후생을 추적한다(§9 M1, §11.5 연계).</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>잔액검토 조정 연계</th><th>P05 현금및예금잔액검토(SA-CLS-10)의 조정분개(가지급금/가수금/인출금 자동생성, 법인/개인 분기)를 본 보조부에 반영·식별</th><th>§25.9.10</th></tr></thead><tbody></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>검증</strong>: 가지급금·가수금 대표/기타 분리(§25.2.1 전기분 검증 준용), 귀속자(사원) 미입력 경고.</li>\n<li><strong>연계</strong>: 후행 P05 SA-CLS-10, 법인세 세무조정(인정이자)·P08.</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>증빙 연계</th><th>각 라인에 인보이스·세금계산서 증빙 첨부(11.12) — 전표·증빙·신고서 단일 체인</th><th>§11.4-(4)</th></tr></thead><tbody></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>검증</strong>: 공급가액+부가세=합계, 전표 금액=매입원장 금액, 사업자등록번호 형식, 세무구분별 부가세율, 불공제/면세/영세율 사유 필수, <code>REJECTED</code>·미수신 전자세금계산서 마감 체크리스트 표시(§11.4-(1), §15).</li>\n</ul>","fields":[{"name":"회계기간","desc":"조회 및 입력 기준 기간"},{"name":"사업장","desc":"전체 또는 개별 사업장 선택"},{"name":"총계정관리원장","desc":"화면별 상세설계 원문 기준 업무 필드"}],"tableCount":0,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-LDG-10","title":"총계정관리원장","purpose":"관리항목(거래처/어음/카드 등) 단위 총계정 원장","linkage":"SA-BAS-07","note":"C8","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-LDG-11","title":"세금/계산서 발급 및 수취현황","phase":"2차","basis":"§25.7.2","impl":"","tabs":"","sid":"sa_ldg_11","prefix":"SA-LDG","group":"SA-LDG","purpose":"(전자)세금계산서·계산서 발급/수취 집계","detailHtml":"<h4 class=\"doc-h doc-h4\">4.22 SA-LDG-11 세금/계산서 발급 및 수취현황 (2차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 매출·매입 거래의 세금계산서·계산서 발급/수취 내역. 본지점 설정 시 본점에서 지점 조회(§25.7.2).</li>\n<li><strong>조회조건</strong>: 기간(월) / 유형(세금계산서 매출·매입 / 계산서 매출·매입) / 사업장 / 조회구분(본점 1.개별/2.통합)(§25.7.2).</li>\n<li><strong>기능</strong>: 거래처별 집계, 일별현황(거래처 체크 → 일별 상세), 더보기(주민번호 별표, 데이터정렬: 거래처코드/거래처명/사업자번호순)(§25.7.2). <strong>연계</strong>: 후행 P06 계산서합계표.</li>\n</ul>","detailTablesHtml":"<p class=\"empty-note\">이 화면의 상세 표는 설계서 원문 설명으로 제공됩니다.</p>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>기능</strong>: 거래처별 집계, 일별현황(거래처 체크 → 일별 상세), 더보기(주민번호 별표, 데이터정렬: 거래처코드/거래처명/사업자번호순)(§25.7.2). <strong>연계</strong>: 후행 P06 계산서합계표.</li>\n</ul>","fields":[{"name":"회계기간","desc":"조회 및 입력 기준 기간"},{"name":"사업장","desc":"전체 또는 개별 사업장 선택"},{"name":"세금/계산서 발급 및 수취현황","desc":"화면별 상세설계 원문 기준 업무 필드"}],"tableCount":0,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-LDG-11","title":"세금/계산서 발급 및 수취현황","purpose":"(전자)세금계산서·계산서 발급/수취 집계","linkage":"SA-VAT-03·06, SA-ATX-02·03","note":"","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-LDG-12","title":"신용카드매출전표 발행현황","phase":"2차","basis":"§25.7.3","impl":"","tabs":"","sid":"sa_ldg_12","prefix":"SA-LDG","group":"SA-LDG","purpose":"매출 카드전표 발행 집계","detailHtml":"<h4 class=\"doc-h doc-h4\">4.23 SA-LDG-12 신용카드매출전표 발행현황 (2차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 카드회사별 신용카드매출전표 발행내용을 과세유형·세금계산서 발행 유무별 조회. 과세분/영세율분/면세분/총괄(월별)/총괄(분기별)/총괄(내용) 탭(§25.7.3).</li>\n<li><strong>조회조건</strong>: 구분(0.전체/1.세금계산서 발행/2.미발행) / 기간(월·분기) / 금융거래처(카드사 F2/C, 공란=전체) / 봉사료 보이기·감추기(§25.7.3).</li>\n<li><strong>기능</strong>: 과세유형·발행유무·카드사별 집계, 월별·분기별 총괄. <strong>연계</strong>: 후행 P06 신용카드매출전표 발행집계표·수령명세서(§25.7.3).</li>\n</ul>","detailTablesHtml":"<p class=\"empty-note\">이 화면의 상세 표는 설계서 원문 설명으로 제공됩니다.</p>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>기능</strong>: 과세유형·발행유무·카드사별 집계, 월별·분기별 총괄. <strong>연계</strong>: 후행 P06 신용카드매출전표 발행집계표·수령명세서(§25.7.3).</li>\n</ul>","fields":[{"name":"회계기간","desc":"조회 및 입력 기준 기간"},{"name":"사업장","desc":"전체 또는 개별 사업장 선택"},{"name":"신용카드매출전표 발행현황","desc":"화면별 상세설계 원문 기준 업무 필드"}],"tableCount":0,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-LDG-12","title":"신용카드매출전표 발행현황","purpose":"매출 카드전표 발행 집계","linkage":"SA-VAT-05","note":"","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-LDG-13","title":"적요별원장","phase":"2차","basis":"§25.7.4","impl":"","tabs":"","sid":"sa_ldg_13","prefix":"SA-LDG","group":"SA-LDG","purpose":"적요 코드 단위 거래 집계","detailHtml":"<h4 class=\"doc-h doc-h4\">4.24 SA-LDG-13 적요별원장 (2차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 계정과목별 거래내역을 분개현황·적요별 조회. 잔액/내용 탭. 전기이월=[전기분 재무상태표](§25.7.4).</li>\n<li><strong>조회조건</strong>: (잔액) 기간·분개유형(0.전체/1.현금/2.대체/3.결산)·계정과목(F2/C)·구분(0.과목/1.세목)·유형(출금/입금/차변/대변별 동일 적요 집계)·적요(코드 &quot;00&quot;=적요코드 미입력분 합산, &quot;00&quot;+'적요명 없음'=코드·명 모두 미입력 합산) / (내용) 기간·분개유형·계정과목·적요코드·구분(§25.7.4).</li>\n<li><strong>기능</strong>: 동일 적요 전표 잔액·내용 집계, 잔액탭 적요 더블클릭 상세, 전표수정. 분개유형=분개구분 매핑, 코드 미입력=적요코드 NULL 그룹(§25.7.4).</li>\n</ul>","detailTablesHtml":"<p class=\"empty-note\">이 화면의 상세 표는 설계서 원문 설명으로 제공됩니다.</p>","validationHtml":"<ul class=\"doc-list\">\n<li>공통 설계 표준: <code>00_개요_페이즈일정.md</code> 3절 참조(멀티테넌시 RLS·감사 필드·오류코드·권한·기장 모드·멱등성·UI 공통·소수점 — 본 문서에서 반복하지 않음)</li>\n<li>기장 모드(<code>TENANT_LED</code>/<code>OPERATOR_LED</code>/<code>HYBRID</code>)에 따라 조회·입력 권한이 분기된다(§21, 공통 표준 참조).</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>AUX-05</th><th>가지급금·가수금 보조원장</th><th>1차</th><th>§0.2 S12(인정이자 연동 특수 뷰), §11.5, §25.9.10 연계</th></tr></thead><tbody></tbody></table></div>\n<p>            → 현황·공사원가·누적손익/원가(LDG-20·22~29) → [P05] 결산 연계</p>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 매출처/매입처 원장. 거래성격·외화 정보·전표 연계를 라인 단위로 표시하고, Invoice 단위 미결항목(Open Item)과 잔액 정합을 유지한다(§11.11 보조부 화면 정합, N4).</li>\n<li><strong>표시(라인) 필드</strong>: 전표 연계(<code>YYYY-MM-DD-NNN</code>)·일자·계정·적요·차/대변·잔액 + <strong>외화금액·발생 시 적용환율</strong>(라인 보존)·거래성격 플래그·Invoice 번호·<code>openAmount</code>·dueDate·증빙 링크(§11.11 M9·N4).</li>\n<li><strong>패널</strong>: 거래처 현재 잔액·최장 연체일·연계 전표 요약(§11.11).</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>부분 입금</th><th>Invoice <code>openAmount</code> 감액·잔액 추적. 초과 입금은 선수금 대체 제안(R5 선수금/선급금 자동 검토 연계)</th><th>§11.11 N4, §11.1.1-(5)</th></tr></thead><tbody><tr><td>입금 자동매칭 후보</td><td>은행거래 분류(§11.11 K)와 연계하여 입금-인보이스 자동 매칭 후보 생성</td><td>§11.11 N4</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>검증</strong>: 채권계정×공급업체/채무계정×고객 차단(R8, §15), 미반제 합계-원장 잔액 불일치 검토대상(§11.11), 환율 미적용 외화 라인 저장 차단(§15).</li>\n<li><strong>연계</strong>: 선행 P03 전표·P02 [거래처별초기이월]. 후행 P05 대손충당금 결산분개(AgingSnapshot)·주석 자동화(매출채권·Aging, §11.3.2 N10)·P09 여신관리(2차).</li>\n<li><strong>표시 필드</strong>: 어음번호·수취/발행일·만기일·발행인/배서인·금액·상태·거래성격·연계 전표(<code>YYYY-MM-DD-NNN</code>)·할인 정보.</li>\n<li><strong>검증</strong>: 만기일 &lt; 발행일 차단, 상태 전이 상태머신 검증(§12.3), 부도 어음 재할인 차단.</li>\n<li><strong>연계</strong>: P05 결산부속명세서·자금일보(§11.11), P09 어음관리(SA-BIL, 2차).</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>입금-Invoice 매칭</th><th>입금 거래의 인보이스 자동 매칭 후보 생성(AUX-01 반제 연계)</th><th>§11.11 N4</th></tr></thead><tbody></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>검증</strong>: 은행 잔액 대사 불일치 = 불일치 리포트 + 마감 체크리스트 경고(차단 여부 회사 정책, §15), 카드출금은 보통예금 인출 → 대체전표 처리(§11.4-(3)).</li>\n<li><strong>연계</strong>: 선행 8.4 수집 파이프라인(P03 SA-ATX-06 통장). 후행 P05 마감 체크리스트·현금및예금잔액검토(SA-CLS-10)·자금일보(P09).</li>\n<li><strong>목적</strong>: 카드사 수신내역(8.4)을 카드·일자·가맹점·업종(MCC)·공급가액·부가세·합계로 보존하고 전표 자동생성 후보로 연계(§11.4-(3) M6). *Phase 2 자동분개 범위 표기(§11.4-(3))*.</li>\n<li><strong>연계</strong>: P03 SA-ATX-04 신용카드 수집, P06 부가세 신고(수령명세서), 카드출금 대체전표(§11.4-(3)).</li>\n<li><strong>목적</strong>: 가지급금/가수금을 대표자·사원 귀속으로 관리하는 <strong>세무조정 인정이자 연동 특수 뷰</strong>(§0.2 S12). 사원(<code>EMPLOYEE</code>) 차원으로 인정이자·정산·복리후생을 추적한다(§9 M1, §11.5 연계).</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>잔액검토 조정 연계</th><th>P05 현금및예금잔액검토(SA-CLS-10)의 조정분개(가지급금/가수금/인출금 자동생성, 법인/개인 분기)를 본 보조부에 반영·식별</th><th>§25.9.10</th></tr></thead><tbody></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>검증</strong>: 가지급금·가수금 대표/기타 분리(§25.2.1 전기분 검증 준용), 귀속자(사원) 미입력 경고.</li>\n<li><strong>연계</strong>: 후행 P05 SA-CLS-10, 법인세 세무조정(인정이자)·P08.</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>증빙 연계</th><th>각 라인에 인보이스·세금계산서 증빙 첨부(11.12) — 전표·증빙·신고서 단일 체인</th><th>§11.4-(4)</th></tr></thead><tbody></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>검증</strong>: 공급가액+부가세=합계, 전표 금액=매입원장 금액, 사업자등록번호 형식, 세무구분별 부가세율, 불공제/면세/영세율 사유 필수, <code>REJECTED</code>·미수신 전자세금계산서 마감 체크리스트 표시(§11.4-(1), §15).</li>\n</ul>","fields":[{"name":"회계기간","desc":"조회 및 입력 기준 기간"},{"name":"사업장","desc":"전체 또는 개별 사업장 선택"},{"name":"적요별원장","desc":"화면별 상세설계 원문 기준 업무 필드"}],"tableCount":0,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-LDG-13","title":"적요별원장","purpose":"적요 코드 단위 거래 집계","linkage":"SA-BAS-07","note":"C8","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-LDG-14","title":"전도금원장","phase":"2차","basis":"§25.7.5","impl":"","tabs":"","sid":"sa_ldg_14","prefix":"SA-LDG","group":"SA-LDG","purpose":"전도금(가지급) 부서/사원별 정산 원장","detailHtml":"<h4 class=\"doc-h doc-h4\">4.25 SA-LDG-14 전도금원장 (2차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: &quot;138.전도금&quot; 계정 전표의 현장코드 기준 현장·기간별 지급·정산·잔액. 전기이월=[현장별·거래처별초기이월](§25.7.5).</li>\n<li><strong>조회조건</strong>: 기간 / 현장(F2/C, 공란=전체) / 구분(0.과목/1.세목) / 집계옵션(월계/누계)(§25.7.5).</li>\n<li><strong>기능</strong>: 출금·차변 138=지급 란, 입금·대변=정산 란, 지급-정산 running balance(DR/CR 사상). 전표수정(§25.7.5).</li>\n</ul>","detailTablesHtml":"<p class=\"empty-note\">이 화면의 상세 표는 설계서 원문 설명으로 제공됩니다.</p>","validationHtml":"<ul class=\"doc-list\">\n<li>공통 설계 표준: <code>00_개요_페이즈일정.md</code> 3절 참조(멀티테넌시 RLS·감사 필드·오류코드·권한·기장 모드·멱등성·UI 공통·소수점 — 본 문서에서 반복하지 않음)</li>\n<li>기장 모드(<code>TENANT_LED</code>/<code>OPERATOR_LED</code>/<code>HYBRID</code>)에 따라 조회·입력 권한이 분기된다(§21, 공통 표준 참조).</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>AUX-05</th><th>가지급금·가수금 보조원장</th><th>1차</th><th>§0.2 S12(인정이자 연동 특수 뷰), §11.5, §25.9.10 연계</th></tr></thead><tbody></tbody></table></div>\n<p>            → 현황·공사원가·누적손익/원가(LDG-20·22~29) → [P05] 결산 연계</p>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 매출처/매입처 원장. 거래성격·외화 정보·전표 연계를 라인 단위로 표시하고, Invoice 단위 미결항목(Open Item)과 잔액 정합을 유지한다(§11.11 보조부 화면 정합, N4).</li>\n<li><strong>표시(라인) 필드</strong>: 전표 연계(<code>YYYY-MM-DD-NNN</code>)·일자·계정·적요·차/대변·잔액 + <strong>외화금액·발생 시 적용환율</strong>(라인 보존)·거래성격 플래그·Invoice 번호·<code>openAmount</code>·dueDate·증빙 링크(§11.11 M9·N4).</li>\n<li><strong>패널</strong>: 거래처 현재 잔액·최장 연체일·연계 전표 요약(§11.11).</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>부분 입금</th><th>Invoice <code>openAmount</code> 감액·잔액 추적. 초과 입금은 선수금 대체 제안(R5 선수금/선급금 자동 검토 연계)</th><th>§11.11 N4, §11.1.1-(5)</th></tr></thead><tbody><tr><td>입금 자동매칭 후보</td><td>은행거래 분류(§11.11 K)와 연계하여 입금-인보이스 자동 매칭 후보 생성</td><td>§11.11 N4</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>검증</strong>: 채권계정×공급업체/채무계정×고객 차단(R8, §15), 미반제 합계-원장 잔액 불일치 검토대상(§11.11), 환율 미적용 외화 라인 저장 차단(§15).</li>\n<li><strong>연계</strong>: 선행 P03 전표·P02 [거래처별초기이월]. 후행 P05 대손충당금 결산분개(AgingSnapshot)·주석 자동화(매출채권·Aging, §11.3.2 N10)·P09 여신관리(2차).</li>\n<li><strong>표시 필드</strong>: 어음번호·수취/발행일·만기일·발행인/배서인·금액·상태·거래성격·연계 전표(<code>YYYY-MM-DD-NNN</code>)·할인 정보.</li>\n<li><strong>검증</strong>: 만기일 &lt; 발행일 차단, 상태 전이 상태머신 검증(§12.3), 부도 어음 재할인 차단.</li>\n<li><strong>연계</strong>: P05 결산부속명세서·자금일보(§11.11), P09 어음관리(SA-BIL, 2차).</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>입금-Invoice 매칭</th><th>입금 거래의 인보이스 자동 매칭 후보 생성(AUX-01 반제 연계)</th><th>§11.11 N4</th></tr></thead><tbody></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>검증</strong>: 은행 잔액 대사 불일치 = 불일치 리포트 + 마감 체크리스트 경고(차단 여부 회사 정책, §15), 카드출금은 보통예금 인출 → 대체전표 처리(§11.4-(3)).</li>\n<li><strong>연계</strong>: 선행 8.4 수집 파이프라인(P03 SA-ATX-06 통장). 후행 P05 마감 체크리스트·현금및예금잔액검토(SA-CLS-10)·자금일보(P09).</li>\n<li><strong>목적</strong>: 카드사 수신내역(8.4)을 카드·일자·가맹점·업종(MCC)·공급가액·부가세·합계로 보존하고 전표 자동생성 후보로 연계(§11.4-(3) M6). *Phase 2 자동분개 범위 표기(§11.4-(3))*.</li>\n<li><strong>연계</strong>: P03 SA-ATX-04 신용카드 수집, P06 부가세 신고(수령명세서), 카드출금 대체전표(§11.4-(3)).</li>\n<li><strong>목적</strong>: 가지급금/가수금을 대표자·사원 귀속으로 관리하는 <strong>세무조정 인정이자 연동 특수 뷰</strong>(§0.2 S12). 사원(<code>EMPLOYEE</code>) 차원으로 인정이자·정산·복리후생을 추적한다(§9 M1, §11.5 연계).</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>잔액검토 조정 연계</th><th>P05 현금및예금잔액검토(SA-CLS-10)의 조정분개(가지급금/가수금/인출금 자동생성, 법인/개인 분기)를 본 보조부에 반영·식별</th><th>§25.9.10</th></tr></thead><tbody></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>검증</strong>: 가지급금·가수금 대표/기타 분리(§25.2.1 전기분 검증 준용), 귀속자(사원) 미입력 경고.</li>\n<li><strong>연계</strong>: 후행 P05 SA-CLS-10, 법인세 세무조정(인정이자)·P08.</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>증빙 연계</th><th>각 라인에 인보이스·세금계산서 증빙 첨부(11.12) — 전표·증빙·신고서 단일 체인</th><th>§11.4-(4)</th></tr></thead><tbody></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>검증</strong>: 공급가액+부가세=합계, 전표 금액=매입원장 금액, 사업자등록번호 형식, 세무구분별 부가세율, 불공제/면세/영세율 사유 필수, <code>REJECTED</code>·미수신 전자세금계산서 마감 체크리스트 표시(§11.4-(1), §15).</li>\n</ul>","fields":[{"name":"회계기간","desc":"조회 및 입력 기준 기간"},{"name":"사업장","desc":"전체 또는 개별 사업장 선택"},{"name":"전도금원장","desc":"화면별 상세설계 원문 기준 업무 필드"}],"tableCount":0,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-LDG-14","title":"전도금원장","purpose":"전도금(가지급) 부서/사원별 정산 원장","linkage":"AUX-05, SA-BAS-05","note":"C8","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-LDG-15","title":"공사대장","phase":"2차","basis":"§25.7.6","impl":"","tabs":"","sid":"sa_ldg_15","prefix":"SA-LDG","group":"SA-LDG","purpose":"현장별 공사 진행·기성·원가 대장","detailHtml":"<h4 class=\"doc-h doc-h4\">4.26 SA-LDG-15 공사대장 (2차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 도급/분양공사 현장별 계약금·기성공사금액·잔액(§25.7.6).</li>\n<li><strong>조회조건</strong>: 기간 / 현장(도급/분양현장 코드 F2/C, 공란=전체)(§25.7.6).</li>\n<li><strong>기능·산식</strong>: 계약금액=[현장등록] 자동 / 기성액=[현장등록] 선수금 + '계정과목 선택' 설정 계정의 전표 데이터 / 잔액=계약금액-기성액. 기성 반영 계정은 더보기 설정 파라미터. 전표수정(§25.7.6). <strong>연계</strong>: 공사원가집계표(LDG-24).</li>\n</ul>","detailTablesHtml":"<p class=\"empty-note\">이 화면의 상세 표는 설계서 원문 설명으로 제공됩니다.</p>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>기능·산식</strong>: 계약금액=[현장등록] 자동 / 기성액=[현장등록] 선수금 + '계정과목 선택' 설정 계정의 전표 데이터 / 잔액=계약금액-기성액. 기성 반영 계정은 더보기 설정 파라미터. 전표수정(§25.7.6). <strong>연계</strong>: 공사원가집계표(LDG-24).</li>\n</ul>","fields":[{"name":"회계기간","desc":"조회 및 입력 기준 기간"},{"name":"사업장","desc":"전체 또는 개별 사업장 선택"},{"name":"공사대장","desc":"화면별 상세설계 원문 기준 업무 필드"}],"tableCount":0,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-LDG-15","title":"공사대장","purpose":"현장별 공사 진행·기성·원가 대장","linkage":"SA-BAS-08, SA-LDG-24","note":"C8","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-LDG-16","title":"외주대장","phase":"2차","basis":"§25.7.7","impl":"","tabs":"","sid":"sa_ldg_16","prefix":"SA-LDG","group":"SA-LDG","purpose":"외주처별 외주비·기성 대장","detailHtml":"<h4 class=\"doc-h doc-h4\">4.27 SA-LDG-16 외주대장 (2차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 현장별·외주처별 총공사금액·기성공사금액·잔액. 전기이월=[외주처별 초기이월](§25.7.7).</li>\n<li><strong>조회조건</strong>: 기간 / 구분(1.현장별/2.외주처별 — 선택별 항목 생성) / 현장·외주처(F2/C) / 조회조건(0.전체(코드 없는 내역 포함)/1.등록현장/2.미등록현장)(§25.7.7).</li>\n<li><strong>기능·산식</strong>: 당기외주총액=[외주처등록] 계약금액 자동 / 선급금=&quot;선급금&quot; 계정+현장 관리항목 전표 / 외주비=&quot;외주비&quot;(외주계정 설정) 계정+현장 관리항목 전표 / 잔액=전기(월)이월+당기외주총액-선급금-외주비. 외주계정 설정 파라미터(§25.7.7).</li>\n</ul>","detailTablesHtml":"<p class=\"empty-note\">이 화면의 상세 표는 설계서 원문 설명으로 제공됩니다.</p>","validationHtml":"<ul class=\"doc-list\">\n<li>공통 설계 표준: <code>00_개요_페이즈일정.md</code> 3절 참조(멀티테넌시 RLS·감사 필드·오류코드·권한·기장 모드·멱등성·UI 공통·소수점 — 본 문서에서 반복하지 않음)</li>\n<li>기장 모드(<code>TENANT_LED</code>/<code>OPERATOR_LED</code>/<code>HYBRID</code>)에 따라 조회·입력 권한이 분기된다(§21, 공통 표준 참조).</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>AUX-05</th><th>가지급금·가수금 보조원장</th><th>1차</th><th>§0.2 S12(인정이자 연동 특수 뷰), §11.5, §25.9.10 연계</th></tr></thead><tbody></tbody></table></div>\n<p>            → 현황·공사원가·누적손익/원가(LDG-20·22~29) → [P05] 결산 연계</p>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 매출처/매입처 원장. 거래성격·외화 정보·전표 연계를 라인 단위로 표시하고, Invoice 단위 미결항목(Open Item)과 잔액 정합을 유지한다(§11.11 보조부 화면 정합, N4).</li>\n<li><strong>표시(라인) 필드</strong>: 전표 연계(<code>YYYY-MM-DD-NNN</code>)·일자·계정·적요·차/대변·잔액 + <strong>외화금액·발생 시 적용환율</strong>(라인 보존)·거래성격 플래그·Invoice 번호·<code>openAmount</code>·dueDate·증빙 링크(§11.11 M9·N4).</li>\n<li><strong>패널</strong>: 거래처 현재 잔액·최장 연체일·연계 전표 요약(§11.11).</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>부분 입금</th><th>Invoice <code>openAmount</code> 감액·잔액 추적. 초과 입금은 선수금 대체 제안(R5 선수금/선급금 자동 검토 연계)</th><th>§11.11 N4, §11.1.1-(5)</th></tr></thead><tbody><tr><td>입금 자동매칭 후보</td><td>은행거래 분류(§11.11 K)와 연계하여 입금-인보이스 자동 매칭 후보 생성</td><td>§11.11 N4</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>검증</strong>: 채권계정×공급업체/채무계정×고객 차단(R8, §15), 미반제 합계-원장 잔액 불일치 검토대상(§11.11), 환율 미적용 외화 라인 저장 차단(§15).</li>\n<li><strong>연계</strong>: 선행 P03 전표·P02 [거래처별초기이월]. 후행 P05 대손충당금 결산분개(AgingSnapshot)·주석 자동화(매출채권·Aging, §11.3.2 N10)·P09 여신관리(2차).</li>\n<li><strong>표시 필드</strong>: 어음번호·수취/발행일·만기일·발행인/배서인·금액·상태·거래성격·연계 전표(<code>YYYY-MM-DD-NNN</code>)·할인 정보.</li>\n<li><strong>검증</strong>: 만기일 &lt; 발행일 차단, 상태 전이 상태머신 검증(§12.3), 부도 어음 재할인 차단.</li>\n<li><strong>연계</strong>: P05 결산부속명세서·자금일보(§11.11), P09 어음관리(SA-BIL, 2차).</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>입금-Invoice 매칭</th><th>입금 거래의 인보이스 자동 매칭 후보 생성(AUX-01 반제 연계)</th><th>§11.11 N4</th></tr></thead><tbody></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>검증</strong>: 은행 잔액 대사 불일치 = 불일치 리포트 + 마감 체크리스트 경고(차단 여부 회사 정책, §15), 카드출금은 보통예금 인출 → 대체전표 처리(§11.4-(3)).</li>\n<li><strong>연계</strong>: 선행 8.4 수집 파이프라인(P03 SA-ATX-06 통장). 후행 P05 마감 체크리스트·현금및예금잔액검토(SA-CLS-10)·자금일보(P09).</li>\n<li><strong>목적</strong>: 카드사 수신내역(8.4)을 카드·일자·가맹점·업종(MCC)·공급가액·부가세·합계로 보존하고 전표 자동생성 후보로 연계(§11.4-(3) M6). *Phase 2 자동분개 범위 표기(§11.4-(3))*.</li>\n<li><strong>연계</strong>: P03 SA-ATX-04 신용카드 수집, P06 부가세 신고(수령명세서), 카드출금 대체전표(§11.4-(3)).</li>\n<li><strong>목적</strong>: 가지급금/가수금을 대표자·사원 귀속으로 관리하는 <strong>세무조정 인정이자 연동 특수 뷰</strong>(§0.2 S12). 사원(<code>EMPLOYEE</code>) 차원으로 인정이자·정산·복리후생을 추적한다(§9 M1, §11.5 연계).</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>잔액검토 조정 연계</th><th>P05 현금및예금잔액검토(SA-CLS-10)의 조정분개(가지급금/가수금/인출금 자동생성, 법인/개인 분기)를 본 보조부에 반영·식별</th><th>§25.9.10</th></tr></thead><tbody></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>검증</strong>: 가지급금·가수금 대표/기타 분리(§25.2.1 전기분 검증 준용), 귀속자(사원) 미입력 경고.</li>\n<li><strong>연계</strong>: 후행 P05 SA-CLS-10, 법인세 세무조정(인정이자)·P08.</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>증빙 연계</th><th>각 라인에 인보이스·세금계산서 증빙 첨부(11.12) — 전표·증빙·신고서 단일 체인</th><th>§11.4-(4)</th></tr></thead><tbody></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>검증</strong>: 공급가액+부가세=합계, 전표 금액=매입원장 금액, 사업자등록번호 형식, 세무구분별 부가세율, 불공제/면세/영세율 사유 필수, <code>REJECTED</code>·미수신 전자세금계산서 마감 체크리스트 표시(§11.4-(1), §15).</li>\n</ul>","fields":[{"name":"회계기간","desc":"조회 및 입력 기준 기간"},{"name":"사업장","desc":"전체 또는 개별 사업장 선택"},{"name":"외주대장","desc":"화면별 상세설계 원문 기준 업무 필드"}],"tableCount":0,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-LDG-16","title":"외주대장","purpose":"외주처별 외주비·기성 대장","linkage":"SA-BAS-11, SA-OPN-18","note":"C8","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-LDG-19","title":"현장/프로젝트/부서 원가안분","phase":"2차","basis":"§25.8.1","impl":"","tabs":"","sid":"sa_ldg_19","prefix":"SA-LDG","group":"SA-LDG","purpose":"공통원가를 차원별로 배부(안분 기준 설정)","detailHtml":"<h4 class=\"doc-h doc-h4\">4.28 SA-LDG-19 현장/프로젝트/부서 원가안분 (2차)</h4>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: [제조원가명세서] 합계를 반영하고 차원 코드 미입력 원가 경비(간접비)를 안분기준으로 각 코드별 안분. 도급현장/분양현장/프로젝트/부서 탭(§25.8.1).</li>\n<li><strong>조회조건·필드</strong>: 기간 / 구분(안분할 원가경비) / 계정과목([제조원가명세서] 계정) / 안분·분개 선택(안분대상선택 '1.여' 시 노출) / 합계([제조원가명세서] 금액) / 차액(합계-현장별 합계) / 기초재고액(현장=[현장별·거래처별초기이월], 부서=[부서사원별초기이월], 프로젝트=[프로젝트초기이월]) / 당기 매입액(차원 관리항목 설정 전표)(§25.8.1).</li>\n<li><strong>안분기준 4종·산식</strong>(<code>CostAllocationRule</code> 모델 수용, §25.8.1 충돌 조정):</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>기준</th><th>산식</th><th>근거</th></tr></thead><tbody><tr><td>① 비율기준(직접비 제외)</td><td>(차액 × 비율) + 직접비</td><td>§25.8.1</td></tr>\n<tr><td>① 비율기준(직접비 포함)</td><td>합계 × 비율</td><td>§25.8.1</td></tr>\n<tr><td>② 직접비(과목)기준(직접비 제외)</td><td>(안분기준계정 직접비 ÷ 안분기준계정 직접비 합계 × 안분대상계정 차액) + 안분대상계정 직접비</td><td>§25.8.1</td></tr>\n<tr><td>② 직접비(과목)기준(직접비 포함)</td><td>현장 안분기준계정 직접비 ÷ 안분기준계정 직접비 합계 × 안분대상계정 합계</td><td>§25.8.1</td></tr>\n<tr><td>③ 직접입력</td><td>현장별 금액 직접입력</td><td>§25.8.1</td></tr>\n<tr><td>공통</td><td>직접비=관리항목 코드 입력 직접 배부 비용, 간접비=미입력 공통비(차액 집계). 안분기준 계정 2개 이상 시 직접비 총합 기준. <strong>원단위 차액은 비율 최대 현장 자동배분</strong></td><td>§25.8.1</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: 전표추가 = 기존 결산분개 마이너스 역분개(<code>CLOSING_DR</code>/<code>CLOSING_CR</code>) 후 현장별 안분 관리항목 전표 추가·저장. 더보기: 불러오기·원가설정(매출원가-원가경비 연결)·완료처리(1.완성/2.미완성)·합계액보기·차액조정(최대 비율 기준 일괄, 동일비율 시 당기총제조비용 최대)·계정과목코드보기·원장조회(§25.8.1).</li>\n<li><strong>산출물</strong>: 안분전표([일반전표입력] 추가). 현장코드 누락 전표는 [원가현황] '0000 누락코드' 조회(§25.8.1). <strong>연계</strong>: 후행 LDG-20·23·24, N12 비용 배부(§11.19-(3))와 단일 엔진.</li>\n</ul>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1 · <strong>안분기준 4종·산식</strong>(<code>CostAllocationRule</code> 모델 수용, §25.8.1 충돌 조정):</h4><div class=\"doc-caption\"><strong>안분기준 4종·산식</strong>(<code>CostAllocationRule</code> 모델 수용, §25.8.1 충돌 조정):</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>기준</th><th>산식</th><th>근거</th></tr></thead><tbody><tr><td>① 비율기준(직접비 제외)</td><td>(차액 × 비율) + 직접비</td><td>§25.8.1</td></tr>\n<tr><td>① 비율기준(직접비 포함)</td><td>합계 × 비율</td><td>§25.8.1</td></tr>\n<tr><td>② 직접비(과목)기준(직접비 제외)</td><td>(안분기준계정 직접비 ÷ 안분기준계정 직접비 합계 × 안분대상계정 차액) + 안분대상계정 직접비</td><td>§25.8.1</td></tr>\n<tr><td>② 직접비(과목)기준(직접비 포함)</td><td>현장 안분기준계정 직접비 ÷ 안분기준계정 직접비 합계 × 안분대상계정 합계</td><td>§25.8.1</td></tr>\n<tr><td>③ 직접입력</td><td>현장별 금액 직접입력</td><td>§25.8.1</td></tr>\n<tr><td>공통</td><td>직접비=관리항목 코드 입력 직접 배부 비용, 간접비=미입력 공통비(차액 집계). 안분기준 계정 2개 이상 시 직접비 총합 기준. <strong>원단위 차액은 비율 최대 현장 자동배분</strong></td><td>§25.8.1</td></tr></tbody></table></div></section>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>기능</strong>: 전표추가 = 기존 결산분개 마이너스 역분개(<code>CLOSING_DR</code>/<code>CLOSING_CR</code>) 후 현장별 안분 관리항목 전표 추가·저장. 더보기: 불러오기·원가설정(매출원가-원가경비 연결)·완료처리(1.완성/2.미완성)·합계액보기·차액조정(최대 비율 기준 일괄, 동일비율 시 당기총제조비용 최대)·계정과목코드보기·원장조회(§25.8.1).</li>\n<li><strong>산출물</strong>: 안분전표([일반전표입력] 추가). 현장코드 누락 전표는 [원가현황] '0000 누락코드' 조회(§25.8.1). <strong>연계</strong>: 후행 LDG-20·23·24, N12 비용 배부(§11.19-(3))와 단일 엔진.</li>\n</ul>","fields":[{"name":"① 비율기준(직접비 제외)","desc":"(차액 × 비율) + 직접비"},{"name":"① 비율기준(직접비 포함)","desc":"합계 × 비율"},{"name":"② 직접비(과목)기준(직접비 제외)","desc":"(안분기준계정 직접비 ÷ 안분기준계정 직접비 합계 × 안분대상계정 차액) + 안분대상계정 직접비"},{"name":"② 직접비(과목)기준(직접비 포함)","desc":"현장 안분기준계정 직접비 ÷ 안분기준계정 직접비 합계 × 안분대상계정 합계"},{"name":"③ 직접입력","desc":"현장별 금액 직접입력"},{"name":"공통","desc":"직접비=관리항목 코드 입력 직접 배부 비용, 간접비=미입력 공통비(차액 집계). 안분기준 계정 2개 이상 시 직접비 총합 기준. **원단위 차액은 비율 최대 현장 자동배분**"}],"tableCount":1,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-LDG-19","title":"현장/프로젝트/부서 원가안분","purpose":"공통원가를 차원별로 배부(안분 기준 설정)","linkage":"9장 차원, SA-CLS-05","note":"C4·C8","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-LDG-20","title":"(차원별) 원가현황","phase":"2차","basis":"§25.8.2","impl":"","tabs":"","sid":"sa_ldg_20","prefix":"SA-LDG","group":"SA-LDG","purpose":"현장/프로젝트/부서별 원가 집계 현황","detailHtml":"<h4 class=\"doc-h doc-h4\">4.29 SA-LDG-20 원가현황 / 4.30 SA-LDG-21 손익안분 / 4.31 SA-LDG-22 손익현황 (2차)</h4>\n<ul class=\"doc-list\">\n<li><strong>LDG-20 원가현황</strong>: 원가안분·전표추가 후 차원별 원가 조회. 조회기간·차원(F2/C)·경비구분(1.50000번대 제조/2.60000번대 공사/3.70000번대 분양)·원가설정(매출원가코드·원가경비코드)·상세/일괄조회설정. 안분 산출 전표+직접 차원 전표를 경비구분별 집계, 원장조회·보고서(원가보고서 조회·인쇄)(§25.8.2).</li>\n<li><strong>LDG-21 손익안분</strong>: [손익계산서] 금액 합계 반영, 차원 미입력 판매비와 관리비(간접비) 안분. 조회조건 = 기간·차액·계정과목([손익계산서])·안분/분개·합계·기초 상품 재고액·당기 상품 매입액. <strong>안분기준·산식·원단위 잔차·역분개+안분전표 생성은 LDG-19와 동일 엔진</strong>(<code>CostAllocationRule</code> 손익 안분, 단일 엔진 공유). 산출: 안분전표, 누락 전표 '0000 누락코드'(§25.8.3).</li>\n<li><strong>LDG-22 손익현황</strong>: 손익안분 후 차원별 P&amp;L 집계. 조회기간·차원(F2/C)·계정과목코드보기. 손익안분 산출 전표+직접 차원 전표 집계, 원장조회(§25.8.4).</li>\n</ul>","detailTablesHtml":"<p class=\"empty-note\">이 화면의 상세 표는 설계서 원문 설명으로 제공됩니다.</p>","validationHtml":"<ul class=\"doc-list\">\n<li>공통 설계 표준: <code>00_개요_페이즈일정.md</code> 3절 참조(멀티테넌시 RLS·감사 필드·오류코드·권한·기장 모드·멱등성·UI 공통·소수점 — 본 문서에서 반복하지 않음)</li>\n<li>기장 모드(<code>TENANT_LED</code>/<code>OPERATOR_LED</code>/<code>HYBRID</code>)에 따라 조회·입력 권한이 분기된다(§21, 공통 표준 참조).</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>AUX-05</th><th>가지급금·가수금 보조원장</th><th>1차</th><th>§0.2 S12(인정이자 연동 특수 뷰), §11.5, §25.9.10 연계</th></tr></thead><tbody></tbody></table></div>\n<p>            → 현황·공사원가·누적손익/원가(LDG-20·22~29) → [P05] 결산 연계</p>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 매출처/매입처 원장. 거래성격·외화 정보·전표 연계를 라인 단위로 표시하고, Invoice 단위 미결항목(Open Item)과 잔액 정합을 유지한다(§11.11 보조부 화면 정합, N4).</li>\n<li><strong>표시(라인) 필드</strong>: 전표 연계(<code>YYYY-MM-DD-NNN</code>)·일자·계정·적요·차/대변·잔액 + <strong>외화금액·발생 시 적용환율</strong>(라인 보존)·거래성격 플래그·Invoice 번호·<code>openAmount</code>·dueDate·증빙 링크(§11.11 M9·N4).</li>\n<li><strong>패널</strong>: 거래처 현재 잔액·최장 연체일·연계 전표 요약(§11.11).</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>부분 입금</th><th>Invoice <code>openAmount</code> 감액·잔액 추적. 초과 입금은 선수금 대체 제안(R5 선수금/선급금 자동 검토 연계)</th><th>§11.11 N4, §11.1.1-(5)</th></tr></thead><tbody><tr><td>입금 자동매칭 후보</td><td>은행거래 분류(§11.11 K)와 연계하여 입금-인보이스 자동 매칭 후보 생성</td><td>§11.11 N4</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>검증</strong>: 채권계정×공급업체/채무계정×고객 차단(R8, §15), 미반제 합계-원장 잔액 불일치 검토대상(§11.11), 환율 미적용 외화 라인 저장 차단(§15).</li>\n<li><strong>연계</strong>: 선행 P03 전표·P02 [거래처별초기이월]. 후행 P05 대손충당금 결산분개(AgingSnapshot)·주석 자동화(매출채권·Aging, §11.3.2 N10)·P09 여신관리(2차).</li>\n<li><strong>표시 필드</strong>: 어음번호·수취/발행일·만기일·발행인/배서인·금액·상태·거래성격·연계 전표(<code>YYYY-MM-DD-NNN</code>)·할인 정보.</li>\n<li><strong>검증</strong>: 만기일 &lt; 발행일 차단, 상태 전이 상태머신 검증(§12.3), 부도 어음 재할인 차단.</li>\n<li><strong>연계</strong>: P05 결산부속명세서·자금일보(§11.11), P09 어음관리(SA-BIL, 2차).</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>입금-Invoice 매칭</th><th>입금 거래의 인보이스 자동 매칭 후보 생성(AUX-01 반제 연계)</th><th>§11.11 N4</th></tr></thead><tbody></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>검증</strong>: 은행 잔액 대사 불일치 = 불일치 리포트 +
