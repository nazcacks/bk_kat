세율매출명세서","purpose":"영세율 매출 명세","linkage":"SA-VAT-30","note":"","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-VAT-48","title":"사업용계좌 개설신고서","phase":"1차","basis":"§25.15.5","impl":"","tabs":"","sid":"sa_vat_48","prefix":"SA-VAT","group":"부가세·신고","purpose":"사업용계좌 개설신고(성실신고)","detailHtml":"<h5 class=\"doc-h doc-h5\">4.2.1 SA-VAT-48 사업용계좌 개설신고서 (§25.15.5)</h5>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 사업 관련 입출금 계좌 신고 서식(복식부기의무자 과세기간 개시일부터 6개월 이내 신고·통장사본 제출). 금융거래처 마스터·사업장 차원별 사업용계좌 등록·신고.</li>\n<li><strong>입력 필드</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>형식/규칙</th><th>필수</th><th>비고</th></tr></thead><tbody><tr><td>계좌상태구분</td><td>1.개설/2.추가/3.폐지/4.환급겸용계좌</td><td>Y</td><td></td></tr>\n<tr><td>개설은행명</td><td>거래처등록 금융거래처 F2</td><td>Y</td><td></td></tr>\n<tr><td>예금종류명·계좌번호</td><td>텍스트</td><td>Y</td><td></td></tr>\n<tr><td>계좌신고유형·개설(변경)신고 여부</td><td>코드</td><td>Y</td><td></td></tr>\n<tr><td>세무서</td><td>회사등록 추가사항 사업장세무서 자동</td><td>Y(자동)</td><td></td></tr>\n<tr><td>신고일자</td><td>일자</td><td>Y</td><td>변경·추가는 다음해 5/31(종소세 확정신고기한)까지</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: ① 계좌 불러오기(사업용계좌 &quot;여&quot; 금융거래처), ② 회사등록·신고대리인 불러오기, ③ 계좌 추가·변경 시 거래처등록 자동등록, ④ <strong>사업장별 각각 신고</strong>. <strong>연계</strong>: 거래처등록(금융거래처), 회사등록(사업장세무서), 사업장 차원 마스터(§9).</li>\n</ul>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1 · <strong>입력 필드</strong>:</h4><div class=\"doc-caption\"><strong>입력 필드</strong>:</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>필드</th><th>형식/규칙</th><th>필수</th><th>비고</th></tr></thead><tbody><tr><td>계좌상태구분</td><td>1.개설/2.추가/3.폐지/4.환급겸용계좌</td><td>Y</td><td></td></tr>\n<tr><td>개설은행명</td><td>거래처등록 금융거래처 F2</td><td>Y</td><td></td></tr>\n<tr><td>예금종류명·계좌번호</td><td>텍스트</td><td>Y</td><td></td></tr>\n<tr><td>계좌신고유형·개설(변경)신고 여부</td><td>코드</td><td>Y</td><td></td></tr>\n<tr><td>세무서</td><td>회사등록 추가사항 사업장세무서 자동</td><td>Y(자동)</td><td></td></tr>\n<tr><td>신고일자</td><td>일자</td><td>Y</td><td>변경·추가는 다음해 5/31(종소세 확정신고기한)까지</td></tr></tbody></table></div></section>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>기능</strong>: ① 계좌 불러오기(사업용계좌 &quot;여&quot; 금융거래처), ② 회사등록·신고대리인 불러오기, ③ 계좌 추가·변경 시 거래처등록 자동등록, ④ <strong>사업장별 각각 신고</strong>. <strong>연계</strong>: 거래처등록(금융거래처), 회사등록(사업장세무서), 사업장 차원 마스터(§9).</li>\n</ul>","fields":[{"name":"계좌상태구분","desc":"1.개설/2.추가/3.폐지/4.환급겸용계좌"},{"name":"개설은행명","desc":"거래처등록 금융거래처 F2"},{"name":"예금종류명·계좌번호","desc":"텍스트"},{"name":"계좌신고유형·개설(변경)신고 여부","desc":"코드"},{"name":"세무서","desc":"회사등록 추가사항 사업장세무서 자동"},{"name":"신고일자","desc":"일자"}],"tableCount":1,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-VAT-48","title":"사업용계좌 개설신고서","purpose":"사업용계좌 개설신고(성실신고)","linkage":"SA-BAS-06 금융","note":"","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-VAT-49","title":"납부서 작성(전 세목)","phase":"1차","basis":"§25.15.6","impl":"","tabs":"","sid":"sa_vat_49","prefix":"SA-VAT","group":"부가세·신고","purpose":"전 세목 납부서 작성","detailHtml":"<h5 class=\"doc-h doc-h5\">4.2.2 SA-VAT-49 납부서 작성(전세목) (§25.15.6)</h5>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 전세목 총괄 자진납부서·고지·체납분 작성·일괄 출력.</li>\n<li><strong>입력 필드</strong>: 지급년월, 회사명·구분(세목), 결정구분(1.확정/2.수시/3.예정/4.원천/5.확정고지/6.수시고지/7.예정고지(중간예납)/8.원천고지 — 8종), 수입징수관서·계좌번호(자동·수정 가능), 세목, 귀속연도·기분·월, 납부금액, 납부기한.</li>\n<li><strong>기능</strong>: ① 세목·결정구분(8종)별 납부서 생성, ② <strong>전월 귀속 데이터 롤포워드 불러오기</strong>, ③ 수입징수관서·계좌번호 자동, ④ 주민번호 별표. <strong>연계</strong>: SA-VAT-47 납부서(2차), SA-VAT-08 부가세 납부서(P06), 회사등록.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.3 고정자산 (1차, SA-FA)</h4>","detailTablesHtml":"<p class=\"empty-note\">이 화면의 상세 표는 설계서 원문 설명으로 제공됩니다.</p>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>기능</strong>: ① 세목·결정구분(8종)별 납부서 생성, ② <strong>전월 귀속 데이터 롤포워드 불러오기</strong>, ③ 수입징수관서·계좌번호 자동, ④ 주민번호 별표. <strong>연계</strong>: SA-VAT-47 납부서(2차), SA-VAT-08 부가세 납부서(P06), 회사등록.</li>\n</ul>","fields":[{"name":"회계기간","desc":"조회 및 입력 기준 기간"},{"name":"사업장","desc":"전체 또는 개별 사업장 선택"},{"name":"납부서 작성(전세목)","desc":"화면별 상세설계 원문 기준 업무 필드"}],"tableCount":0,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-VAT-49","title":"납부서 작성(전 세목)","purpose":"전 세목 납부서 작성","linkage":"SA-VAT-08","note":"","source":"bk_화면설계서_v1.0.html"},"legacyTitle":"납부서 작성(전세목)"},{"id":"SA-FA-01","title":"고정자산등록","phase":"1차","basis":"§25.16.1, §11.5-(2)","impl":"","tabs":"","sid":"sa_fa_01","prefix":"SA-FA","group":"고정자산","purpose":"자산 마스터(취득가·내용연수·상각방법·차원). 정액/정률·업무용승용차·즉시상각","detailHtml":"<h5 class=\"doc-h doc-h5\">4.3.1 SA-FA-01 고정자산등록 (§25.16.1, §11.5-(2))</h5>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 유·무형 고정자산 테넌트별 마스터 등록 → 감가상각비 자동 산출 → 기수 마감 후 차기 이월. 결산 시 관리대장 ↔ 총계정원장 금액 일치 검증·누락 추가입력. <code>tenant_id</code> 단위 격리(SHARED+RLS).</li>\n<li><strong>헤더(조회/식별) 필드</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>필드</th><th>형식/규칙</th><th>필수</th></tr></thead><tbody><tr><td>①</td><td>계정과목</td><td>F2 코드도움, 유·무형자산 20200~25099. <strong>토지 20100은 비상각자산 — 등록 차단</strong></td><td>Y</td></tr>\n<tr><td>②</td><td>자산구분</td><td>미상각분/양도자산/업무용승용차/폐기자산/양도및폐기자산</td><td>Y</td></tr>\n<tr><td>③</td><td>상각방법 구분</td><td>유형 정액·정률, 무형 정액 등 계정과목 범위별</td><td>Y</td></tr>\n<tr><td>④</td><td>Code·계정과목</td><td>3자리·5자리</td><td>Y</td></tr>\n<tr><td>⑤</td><td>자산코드</td><td>숫자 6자리, 계정과목별 순차 자동부여·직접수정 가능</td><td>Y</td></tr>\n<tr><td>⑥</td><td>자산명</td><td>한글·영문 40자</td><td>Y</td></tr>\n<tr><td>⑦</td><td>취득일</td><td>일자</td><td>Y</td></tr>\n<tr><td>⑧</td><td>방법</td><td>주요사항 ⑨상각방법 자동반영</td><td>Y(자동)</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>탭1) 주요등록사항</strong> (①~㉕ 전수 — §25.16.1):</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>필드</th><th>규칙</th></tr></thead><tbody><tr><td>①</td><td>기초가액</td><td>금액</td></tr>\n<tr><td>②</td><td>전기말상각누계액</td><td>금액</td></tr>\n<tr><td>③</td><td>전기말장부가액</td><td>자동(①-②)</td></tr>\n<tr><td>④</td><td>신규취득및증가</td><td>자본적 지출 포함</td></tr>\n<tr><td>⑤</td><td>부분매각및폐기</td><td>자산변동사항 탭 부분매각·부분폐기 자동반영</td></tr>\n<tr><td>⑥</td><td>상각기초가액</td><td>자동</td></tr>\n<tr><td>⑦</td><td>상각방법</td><td>0.정률법/1.정액법 — 건물·구축물·무형은 정액법만, 2016년 이후 취득 업무용승용차는 정액법</td></tr>\n<tr><td>⑧</td><td>내용연수(상각률)</td><td>세법 업종별 내용연수 F2, 업무용승용차 5년</td></tr>\n<tr><td>⑨</td><td>내용연수월수</td><td>당기말장부가액 1,000원 기준 미경과/경과, 취득·양도시점 월할 자동계산</td></tr>\n<tr><td>⑩</td><td>상각상태</td><td>진행/완료</td></tr>\n<tr><td>⑪</td><td>전기말부인누계·전기말자본지출계</td><td>[감가상각비조정명세서] '전기말부인액 불러오기' 연동</td></tr>\n<tr><td>⑫</td><td>자본지출 즉시상각</td><td>금액</td></tr>\n<tr><td>⑬</td><td>전기말 의제누계</td><td>금액</td></tr>\n<tr><td>⑭</td><td>당기상각범위액</td><td>상각대상금액×상각률(정률법=상각기초가액, 정액법=기초가액 기준) 자동</td></tr>\n<tr><td>⑮</td><td>회사계상상각비</td><td>당기상각범위액 반영, '사용자수정' 직접수정 시 차액 = 상각부인액 세무조정 대상</td></tr>\n<tr><td>⑯</td><td>특별상각률/특별상각비</td><td>율·금액</td></tr>\n<tr><td>⑰</td><td>당기말상각누계액·당기말장부가액</td><td>자동</td></tr>\n<tr><td>⑱</td><td>특례적용/특례년수</td><td>코드·년수</td></tr>\n<tr><td>⑲</td><td>업무용승용차여부</td><td>업무용승용차등록(SA-BAS-10) 명의 0.회사 + 차량운반구 코드 적용 시 &quot;여&quot;(차량운반구 계정 필수 선택)</td></tr>\n<tr><td>⑳</td><td>취득수량</td><td>수량</td></tr>\n<tr><td>㉑</td><td>경비구분</td><td>0.800번대/1.500번대/2.600번대/3.700번대 → [월별감가상각비계상]·[결산자료입력] 경비별 반영</td></tr>\n<tr><td>㉒</td><td>전체양도일자</td><td>양도월까지 월할</td></tr>\n<tr><td>㉓</td><td>최저한세 부인액</td><td>금액</td></tr>\n<tr><td>㉔</td><td>당기의제상각액</td><td>금액</td></tr>\n<tr><td>㉕</td><td>전체폐기일자</td><td>일자</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>탭3) 추가등록사항(차원·관리목적)</strong>: 프로젝트/현장코드, 업종, 사용사원·부서, 관리사원·부서, 관리번호·매입처·제작처명·규격·모델·비고. <strong>BK 6차원 매핑</strong>: 사업장(필수) + 사용/관리부서=DEPARTMENT, 비용귀속=COST_CENTER, 프로젝트=PROJECT, 현장=SITE, 사용/관리사원=EMPLOYEE — <code>DimensionConfig</code> 선택 차원 연결(§9, §11.5-(2) AUX-09: 취득 전표 연결 + 설치 사업장·사용부서·설치 현장·사용 사원·<strong>상각비 배부 기준</strong> 차원 태깅으로 상각비를 부서/현장/프로젝트에 배부).</li>\n<li><strong>탭4) 자산변동사항</strong>: 일자, 구분(1.부분매각및감소액/2.부분폐기/3.사용부서(사원)이동/4.프로젝트이동), 금액·변동수량(부분매각·폐기만), 전기말상각누계액(부분매각·폐기 시 (부분매각폐기금액/기초가액)×전기말상각누계액 자동), 감가상각비(부분매각감소액만 계산), 적요·부서·PJT코드(이동 구분 시 코드도움).</li>\n<li><strong>기능</strong>:</li>\n<li>감가상각 자동산출(정률/정액, 상각률·내용연수·월할). 법인 2016년 이후 취득 차량운반구가 업무용승용차 &quot;여&quot; + 정률법이면 <strong>붉은색 경고</strong>.</li>\n<li>비망가액 = min(최초취득가액 5%, 1,000원); 차기 이월 시 당기말장부가액이 기초가액 5% 미만이면 당기에 1,000원만 남기고 일괄상각(당기상각범위액이 계산식보다 커질 수 있음).</li>\n<li>더보기(기능모음): ① 전기이월 데이터 불러오기(전년도 덮어쓰기, 양도/폐기일자 입력 자산 제외), ② 전기말 부인액 불러오기, ③ 감가상각비재계산(연말/반기결산 기준, 사용자수정 포함 재계산·회사계상상각비 0 일괄재계산 옵션), ④ <strong>전표 데이터 불러오기</strong>(일반/매입매출전표 차변 유·무형자산코드 분개 조회 → 자산명·상각방법·내용연수·경비구분·업종 보완 후 '고정자산등록 반영', 등록/미등록 판별, 미등록만 등록·일괄등록).</li>\n<li>정렬(자산코드/자산명/취득일/입력순), 엑셀변환(Code·계정과목·자산코드·자산명·취득일·방법).</li>\n<li>BK 처리: 전표→고정자산 자동수집·감가상각 자동전표는 BF/JV 자동분개 파이프라인(결산 시 결차/결대)으로 생성, 부인누계·세무조정은 BK 세무 모듈 연계(§11.3 결산정리분개 자동화 대상 ① 감가상각비, <code>ClosingAutoEntryRule</code>·<code>CLOSING_DR</code>/<code>CLOSING_CR</code>).</li>\n<li><strong>산출물</strong>: 감가상각비 자동산출 결과·고정자산 마스터(SA-FA-02~07의 데이터 원천). <strong>연계</strong>: SA-FA-02~07, [결산자료입력]·세무 [감가상각비조정명세서], BF/JV 자동분개·BK 세무 모듈 API. 충돌 조정: §11.5 고정자산·AUX-09 보조부에 자산구분·취득가액·상각방법·내용연수·경비구분·부인누계 필드 흡수 + 6차원 확장(§25.16.1).</li>\n</ul>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1 · <strong>헤더(조회/식별) 필드</strong>:</h4><div class=\"doc-caption\"><strong>헤더(조회/식별) 필드</strong>:</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>필드</th><th>형식/규칙</th><th>필수</th></tr></thead><tbody><tr><td>①</td><td>계정과목</td><td>F2 코드도움, 유·무형자산 20200~25099. <strong>토지 20100은 비상각자산 — 등록 차단</strong></td><td>Y</td></tr>\n<tr><td>②</td><td>자산구분</td><td>미상각분/양도자산/업무용승용차/폐기자산/양도및폐기자산</td><td>Y</td></tr>\n<tr><td>③</td><td>상각방법 구분</td><td>유형 정액·정률, 무형 정액 등 계정과목 범위별</td><td>Y</td></tr>\n<tr><td>④</td><td>Code·계정과목</td><td>3자리·5자리</td><td>Y</td></tr>\n<tr><td>⑤</td><td>자산코드</td><td>숫자 6자리, 계정과목별 순차 자동부여·직접수정 가능</td><td>Y</td></tr>\n<tr><td>⑥</td><td>자산명</td><td>한글·영문 40자</td><td>Y</td></tr>\n<tr><td>⑦</td><td>취득일</td><td>일자</td><td>Y</td></tr>\n<tr><td>⑧</td><td>방법</td><td>주요사 :"금액"},{"name":"전기말 의제누계","desc":"금액"},{"name":"당기상각범위액","desc":"상각대상금액×상각률(정률법=상각기초가액, 정액법=기초가액 기준) 자동"},{"name":"회사계상상각비","desc":"당기상각범위액 반영, '사용자수정' 직접수정 시 차액 = 상각부인액 세무조정 대상"},{"name":"특별상각률/특별상각비","desc":"율·금액"}],"tableCount":2,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-FA-01","title":"고정자산등록","purpose":"자산 마스터(취득가·내용연수·상각방법·차원). 정액/정률·업무용승용차·즉시상각","linkage":"11.5, AUX-09, SA-VAT-23·45","note":"","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-FA-02","title":"미상각분 감가상각계산","phase":"1차","basis":"§25.16.2","impl":"","tabs":"","sid":"sa_fa_02","prefix":"SA-FA","group":"고정자산","purpose":"당기 미상각 자산 감가상각비 계산","detailHtml":"<h5 class=\"doc-h doc-h5\">4.3.2 SA-FA-02 미상각분 감가상각계산 (§25.16.2)</h5>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 미상각분(전체양도일자·폐기일자 미입력) 자산의 감가상각계산 명세 조회·출력. 유형자산/무형자산/총괄 탭.</li>\n<li><strong>조회조건</strong>: 유형 탭(유형 계정과목 직접입력·F2 → 자산명·취득일·업종명·기초가액 반영), 무형 탭(영업권·개발비 등), 총괄 탭(1.유형자산총괄/2.무형자산총괄 — 계정과목별 합계 자동반영). BK: 회계기간·사업장·차원 필터, 자산상태 플래그(양도일·폐기일 미입력)=미상각.</li>\n<li><strong>기능</strong>: ① 감가상각비수정(수정↔해제 토글, 당기상각비란 더블클릭 수정 — 유형/무형 탭에서만), ② 데이터 정렬(자산코드·자산명·취득일·입력순). 상각 시뮬레이션 엔진이 미상각 자산만 필터링.</li>\n<li><strong>산출물</strong>: 미상각분 감가상각계산 명세서(유형/무형/총괄). <strong>연계</strong>: SA-FA-01 기반, SA-FA-04·07과 동일 계산엔진 공유.</li>\n</ul>","detailTablesHtml":"<p class=\"empty-note\">이 화면의 상세 표는 설계서 원문 설명으로 제공됩니다.</p>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>산출물</strong>: 미상각분 감가상각계산 명세서(유형/무형/총괄). <strong>연계</strong>: SA-FA-01 기반, SA-FA-04·07과 동일 계산엔진 공유.</li>\n</ul>","fields":[{"name":"회계기간","desc":"조회 및 입력 기준 기간"},{"name":"사업장","desc":"전체 또는 개별 사업장 선택"},{"name":"미상각분 감가상각계산","desc":"화면별 상세설계 원문 기준 업무 필드"}],"tableCount":0,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-FA-02","title":"미상각분 감가상각계산","purpose":"당기 미상각 자산 감가상각비 계산","linkage":"SA-CLS-01, SA-FA-07","note":"","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-FA-03","title":"양도자산 감가상각계산","phase":"1차","basis":"§25.16.3","impl":"","tabs":"","sid":"sa_fa_03","prefix":"SA-FA","group":"고정자산","purpose":"당기 양도 자산 상각·처분손익 계산","detailHtml":"<h5 class=\"doc-h doc-h5\">4.3.3 SA-FA-03 양도자산 감가상각계산 (§25.16.3)</h5>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 전체양도일자 입력 양도자산 조회·출력(전체폐기일자 입력 자산 제외). 유형/무형/총괄 탭.</li>\n<li><strong>조회조건</strong>: 유형·무형 계정과목 선택(자산명·취득일·양도일·업종명·기초가액 반영), 총괄(1.유형/2.무형 총괄). BK: 회계기간·사업장·차원, 자산상태=전체양도(폐기 제외).</li>\n<li><strong>기능</strong>: 정렬. <strong>양도월까지 월할 상각</strong>(SA-FA-01 전체양도일자 기준). 결산 계산엔진에 처분일 기준 월할상각·처분손익 산출 로직 내장.</li>\n<li><strong>산출물</strong>: 양도자산 감가상각계산 명세서 + 처분손익 산출 리포트. <strong>연계</strong>: SA-FA-01·07, 처분손익 전표(BF/JV)·결산.</li>\n</ul>","detailTablesHtml":"<p class=\"empty-note\">이 화면의 상세 표는 설계서 원문 설명으로 제공됩니다.</p>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>산출물</strong>: 양도자산 감가상각계산 명세서 + 처분손익 산출 리포트. <strong>연계</strong>: SA-FA-01·07, 처분손익 전표(BF/JV)·결산.</li>\n</ul>","fields":[{"name":"회계기간","desc":"조회 및 입력 기준 기간"},{"name":"사업장","desc":"전체 또는 개별 사업장 선택"},{"name":"양도자산 감가상각계산","desc":"화면별 상세설계 원문 기준 업무 필드"}],"tableCount":0,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-FA-03","title":"양도자산 감가상각계산","purpose":"당기 양도 자산 상각·처분손익 계산","linkage":"SA-CLS-01","note":"","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-FA-04","title":"원가·경비별 감가상각명세서","phase":"1차","basis":"§25.16.4","impl":"","tabs":"","sid":"sa_fa_04","prefix":"SA-FA","group":"고정자산","purpose":"제조원가/판관비 구분 감가상각 명세","detailHtml":"<h5 class=\"doc-h doc-h5\">4.3.4 SA-FA-04 원가경비별 감가상각명세서 (§25.16.4)</h5>\n<ul class=\"doc-list\">\n<li><strong>조회조건</strong>: ① 계정과목(직접입력·F2), ② 경비구분(전체/500/600/700/800번대 — SA-FA-01 ㉑ 경비구분), ③ 자산구분(전체표시/양도자산표시/미상각분표시). 탭: 유형/무형/유형총괄/무형총괄. BK: 회계기간·사업장·<strong>코스트센터 차원 결합</strong>.</li>\n<li><strong>기능</strong>: 경비구분 필터링 + 양도/미상각 표시 필터링. 500~800번대(제조/도급/분양 원가, 판관비) 경비코드를 BK 계정·코스트센터 매핑 규칙으로 변환하여 원가경비별 상각 집계.</li>\n<li><strong>산출물</strong>: 원가경비별 감가상각명세서(원가·판관비 경비별 상각비). <strong>연계</strong>: SA-FA-01, [결산자료입력]·SA-FA-07 경비별 반영.</li>\n</ul>","detailTablesHtml":"<p class=\"empty-note\">이 화면의 상세 표는 설계서 원문 설명으로 제공됩니다.</p>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>산출물</strong>: 원가경비별 감가상각명세서(원가·판관비 경비별 상각비). <strong>연계</strong>: SA-FA-01, [결산자료입력]·SA-FA-07 경비별 반영.</li>\n</ul>","fields":[{"name":"회계기간","desc":"조회 및 입력 기준 기간"},{"name":"사업장","desc":"전체 또는 개별 사업장 선택"},{"name":"원가경비별 감가상각명세서","desc":"화면별 상세설계 원문 기준 업무 필드"}],"tableCount":0,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-FA-04","title":"원가·경비별 감가상각명세서","purpose":"제조원가/판관비 구분 감가상각 명세","linkage":"SA-CLS-05","note":"","source":"bk_화면설계서_v1.0.html"},"legacyTitle":"원가경비별 감가상각명세서"},{"id":"SA-FA-05","title":"고정자산관리대장","phase":"1차","basis":"§25.16.5","impl":"","tabs":"","sid":"sa_fa_05","prefix":"SA-FA","group":"고정자산","purpose":"자산 현황·이력 관리대장","detailHtml":"<h5 class=\"doc-h doc-h5\">4.3.5 SA-FA-05 고정자산관리대장 (§25.16.5)</h5>\n<ul class=\"doc-list\">\n<li><strong>조회조건</strong>:</li>\n<li>전체 탭: ① 항목(0.전체/1.유형/2.무형), ② 구분(전체고정자산/과목별고정자산 — 과목별 시 계정과목란 활성화), ③ 유형(0.전체/1.미상각/2.전체양도/3.전체폐기/4.신규취득/5.상각진행/6.상각완료). 자산변동사항 입력 자산은 변동란 ● 표시.</li>\n<li>부분양도(폐기) 탭: 변동 구분 1.부분매각및감소액·2.부분폐기 자산 검색 — ① 항목 ② 구분(전체/과목별) ③ 유형(0.전체/1.부분양도/2.부분폐기).</li>\n<li>라벨인쇄: 자산 체크 시 인쇄형태에서 라벨 인쇄(미체크 시 라벨 항목 미표시). BK: 회계기간·사업장·차원.</li>\n<li><strong>기능</strong>: 자산 상태(미상각/양도/폐기/신규/상각진행·완료) 필터링, 변동 구분을 <strong>자산 라이프사이클 이벤트 로그</strong>로 관리, 결산 시 회계장부(총계정원장) 금액 대조 검증.</li>\n<li><strong>산출물</strong>: 고정자산관리대장, 자산 라벨(바코드/라벨). <strong>연계</strong>: SA-FA-01, 결산(총계정원장 대사), 이벤트 로그.</li>\n</ul>","detailTablesHtml":"<p class=\"empty-note\">이 화면의 상세 표는 설계서 원문 설명으로 제공됩니다.</p>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>기능</strong>: 자산 상태(미상각/양도/폐기/신규/상각진행·완료) 필터링, 변동 구분을 <strong>자산 라이프사이클 이벤트 로그</strong>로 관리, 결산 시 회계장부(총계정원장) 금액 대조 검증.</li>\n<li><strong>산출물</strong>: 고정자산관리대장, 자산 라벨(바코드/라벨). <strong>연계</strong>: SA-FA-01, 결산(총계정원장 대사), 이벤트 로그.</li>\n</ul>","fields":[{"name":"회계기간","desc":"조회 및 입력 기준 기간"},{"name":"사업장","desc":"전체 또는 개별 사업장 선택"},{"name":"고정자산관리대장","desc":"화면별 상세설계 원문 기준 업무 필드"}],"tableCount":0,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-FA-05","title":"고정자산관리대장","purpose":"자산 현황·이력 관리대장","linkage":"AUX-09","note":"","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-FA-06","title":"현장/프로젝트/부서 자산명세서","phase":"1차","basis":"§25.16.6","impl":"","tabs":"","sid":"sa_fa_06","prefix":"SA-FA","group":"고정자산","purpose":"차원별 자산 명세","detailHtml":"<h5 class=\"doc-h doc-h5\">4.3.6 SA-FA-06 현장/프로젝트/부서 자산명세서 (§25.16.6)</h5>\n<ul class=\"doc-list\">\n<li><strong>조회조건</strong>: ① 유·무형자산 계정과목(직접입력·F2·<strong>Enter 시 전체 조회</strong>), ② 조회구분(1.전체/2.양도자산/3.미상각분/4.업무용승용차/5.폐기자산/6.양도및폐기자산), ③ 구분(1.사용부서/2.관리부서/3.프로젝트/4.현장/5.사용사원/6.관리사원 — 선택에 따라 조회옵션 연동). BK: 회계기간·사업장 + 6차원 슬라이싱.</li>\n<li><strong>기능</strong>: SA-FA-01 추가등록사항 차원 기준 자산 필터링·집계 — BK 6차원 중 프로젝트·현장·부서·사원 차원 다차원 자산명세 슬라이싱(<code>DimensionConfig</code>, §9).</li>\n<li><strong>산출물</strong>: 현장/프로젝트/부서/사원별 자산명세서.</li>\n</ul>","detailTablesHtml":"<p class=\"empty-note\">이 화면의 상세 표는 설계서 원문 설명으로 제공됩니다.</p>","validationHtml":"<ul class=\"doc-list\">\n<li>공통 설계 표준: <code>00_개요_페이즈일정.md</code> 3절 참조(멀티테넌시·감사필드·변경이력·오류코드·권한·기장모드·멱등성·UI·소수점·기술스택 — 본 문서에서 반복하지 않음)</li>\n</ul>\n<p>1. 페이즈 개요 / 2. 개발 범위 / 3. 업무 흐름 / 4. 화면별 상세설계 / 5. 데이터 모델 / 6. API 설계 / 7. 배치/스케줄 / 8. 검증·오류 처리 / 9. 권한·SOD·감사 / 10. 연계 / 11. 완료 기준(DoD)·테스트 관점 / 12. 잔여 확인사항</p>\n<ul class=\"doc-list\">\n<li><strong>목표</strong>: ① 부가세 영세율·수출 관련 부속서식(§25.14)과 기타 신고서류(§25.15)를 BK 부가세 모듈의 부속서식으로 생성하여 부가가치세신고서(SA-VAT-01)의 영세율 첨부·정합성 검증을 완성하고, ② 고정자산 마스터·감가상각 자동산출·결산 자동전표(§25.16, §11.5)를 구축하여 결산(P05)의 감가상각 반영과 세무(감가상각비조정명세서) 연계 기반을 확보한다.</li>\n<li><strong>선행조건</strong>: P03 매입매출전표의 과세유형(12.영세/16.수출/64.매세) 전표 데이터가 영세율 부속서식 &quot;불러오기&quot;의 원천이며(§25.14 각 절), P01 거래처등록(금융거래처·환급창구운영사업자)·회사등록(사업장세무서)·업무용승용차등록(SA-BAS-10)이 마스터 원천이다(§25.15.5, §25.1.10). 고정자산은 P02 전기이월(고정자산·업무용승용차 초기이월 — §25.2)과 P05 결산자료입력 '감가상각반영'을 전후 연계로 갖는다(§25.16.7).</li>\n</ul>\n<p>        │ (13)영세율 총합계 ↔ 부가세신고서 영세매출금액 일치 검증(불일치 시 마감오류)   §25.14.15</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>수출신고번호</th><th>14/15자리</th><th>Y</th><th>번호 체계 검증</th></tr></thead><tbody><tr><td>원화</td><td>외화×환율 또는 선적 전 환가금액</td><td>Y(자동)</td><td>불일치 시 마감오류</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>기능</strong>: ① 수출신고번호·통화·환율 환가 검증, ② 영세 전표(16.수출) 연동 불러오기, ③ 마감(전자신고 전제 — 원화금액=외화×환율 불일치 시 마감오류), ④ 엑셀 업로드.</li>\n<li><strong>검증</strong>: 수출신고번호 자릿수(14/15), 환가 불일치 마감오류, 기수 기간 내 선적일자.</li>\n<li><strong>산출물</strong>: 수출실적명세서. <strong>연계</strong>: 매입매출전표(16.수출), SA-VAT-01 영세율 조기환급·예정·확정 첨부, SA-VAT-02(MRI) 원화환가 적정성 검토. 외화 필드는 §11.16 환율 마스터(<code>FxRate</code>)·N5(통화·환율·외화금액·원화환산) 연계.</li>\n<li><strong>기능</strong>: 첨부서류 메타·제출사유 코드를 증빙으로 관리, 마감, 엑셀. <strong>연계</strong>: 거래처등록, SA-VAT-01, SA-VAT-07 전자신고.</li>\n<li><strong>검증</strong>: 마감 미완료 시 첨부 제출 불가. <strong>연계</strong>: 매입매출전표(12.영세), SA-VAT-01, SA-VAT-43.</li>\n<li><strong>기능</strong>: 영세율 근거·붙임서식 증빙 메타 관리, 영세 전표 연동 집계, 엑셀. <strong>연계</strong>: 매입매출전표(12/16 영세계열), SA-VAT-01, SA-VAT-43.</li>\n<li><strong>기능</strong>: 외교공관 공급기록 메타를 증빙으로 관리. <strong>연계</strong>: SA-VAT-01, 매입매출전표(영세계열).</li>\n<li><strong>기능</strong>: ① 노선·수입구분별 계정 매핑, ② 불러오기(12.영세/16.수출, 구분별 계정 401~420/901~930), ③ 영세 전표 집계. <strong>연계</strong>: 노선등록, 매입매출전표, SA-VAT-01, SA-VAT-43.</li>\n<li><strong>기능</strong>: 선박등록·수입(국내/해외) 구분별 집계, 영세 전표 불러오기(12.영세/16.수출, 설정 계정). <strong>연계</strong>: 선박등록, 매입매출전표, SA-VAT-01, SA-VAT-43.</li>\n<li><strong>기능</strong>: ① 재화/용역 구분 집계, ② 제출서류 메타 관리, ③ 작성조회(마감여부), ④ 불러오기(12.영세/16.수출), ⑤ 주민번호 별표 마스킹. <strong>연계</strong>: 매입매출전표, SA-VAT-01, SA-VAT-43.</li>\n<li><strong>기능</strong>: ① 근거 법률별 공급실적 집계, ② <strong>부가세신고서 영세매출금액 ↔ (13)영세율 적용 공급실적 총합계 일치 검증 — 불일치·미작성 시 마감오류</strong>.</li>\n<li><strong>연계</strong>: SA-VAT-29·31·32·33(P07)·40·41·42 집계 원천, SA-VAT-01 영세율 금액 정합.</li>\n<li><strong>기능</strong>: ① 계좌 불러오기(사업용계좌 &quot;여&quot; 금융거래처), ② 회사등록·신고대리인 불러오기, ③ 계좌 추가·변경 시 거래처등록 자동등록, ④ <strong>사업장별 각각 신고</strong>. <strong>연계</strong>: 거래처등록(금융거래처), 회사등록(사업장세무서), 사업장 차원 마스터(§9).</li>\n<li><strong>기능</strong>: ① 세목·결정구분(8종)별 납부서 생성, ② <strong>전월 귀속 데이터 롤포워드 불러오기</strong>, ③ 수입징수관서·계좌번호 자동, ④ 주민번호 별표. <strong>연계</strong>: SA-VAT-47 납부서(2차), SA-VAT-08 부가세 납부서(P06), 회사등록.</li>\n<li><strong>목적</strong>: 유·무형 고정자산 테넌트별 마스터 등록 → 감가상각비 자동 산출 → 기수 마감 후 차기 이월. 결산 시 관리대장 ↔ 총계정원장 금액 일치 검증·누락 추가입력. <code>tenant_id</code> 단위 격리(SHARED+RLS).</li>\n<li>BK 처리: 전표→고정자산 자동수집·감가상각 자동전표는 BF/JV 자동분개 파이프라인(결산 시 결차/결대)으로 생성, 부인누계·세무조정은 BK 세무 모듈 연계(§11.3 결산정리분개 자동화 대상 ① 감가상각비, <code>ClosingAutoEntryRule</code>·<code>CLOSING_DR</code>/<code>CLOSING_CR</code>).</li>\n<li><strong>산출물</strong>: 감가상각비 자동산출 결과·고정자산 마스터(SA-FA-02~07의 데이터 원천). <strong>연계</strong>: SA-FA-02~07, [결산자료입력]·세무 [감가상각비조정명세서], BF/JV 자동분개·BK 세무 모듈 API. 충돌 조정: §11.5 고정자산·AUX-09 보조부에 자산구분·취득가액·상각방법·내용연수·경비구분·부인누계 필드 흡수 + 6차원 확장(§25.16.1).</li>\n<li><strong>산출물</strong>: 미상각분 감가상각계산 명세서(유형/무형/총괄). <strong>연계</strong>: SA-FA-01 기반, SA-FA-04·07과 동일 계산엔진 공유.</li>\n</ul>","fields":[{"name":"회계기간","desc":"조회 및 입력 기준 기간"},{"name":"사업장","desc":"전체 또는 개별 사업장 선택"},{"name":"현장/프로젝트/부서 자산명세서","desc":"화면별 상세설계 원문 기준 업무 필드"}],"tableCount":0,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-FA-06","title":"현장/프로젝트/부서 자산명세서","purpose":"차원별 자산 명세","linkage":"9장 차원, SA-LDG-19","note":"","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-FA-07","title":"월별 감가상각비 계상","phase":"1차","basis":"§25.16.7","impl":"","tabs":"","sid":"sa_fa_07","prefix":"SA-FA","group":"고정자산","purpose":"월할 감가상각비 자동 계상 전표","detailHtml":"<h5 class=\"doc-h doc-h5\">4.3.7 SA-FA-07 월별 감가상각비 계상 (§25.16.7)</h5>\n<ul class=\"doc-list\">\n<li><strong>목적</strong>: 결산시점별 감가상각비 계상 + 자동전표(결차/결대) 생성. 탭: 결산기준 감가상각계상/월별감가상각비명세/자산별 총괄표.</li>\n<li><strong>조회조건·기능</strong>:</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>구분</th><th>내용</th></tr></thead><tbody><tr><td>1) 결산기준 감가상각 계상</td><td>① 결산월(월별·분기별 — 월별은 1월부터 순차 조회, [결산자료입력] 12월 결산 시 1~12월 합계 반영; 전체양도·폐기 자산은 양도·폐기월 이후 상각 미계산), ② 경비구분(500~800번대, 전체 시 경비구분별 합계)</td></tr>\n<tr><td>2) 조회월삭제</td><td>선택 월 내역 삭제(<strong>복구 불가</strong>) 후 재조회 시 고정자산등록에서 재산출</td></tr>\n<tr><td>3) 불러오기</td><td>고정자산등록 수정사항 반영(선택 결산월만)</td></tr>\n<tr><td>4) 월별감가상각비 명세</td><td>자산별 월별 상각비 현황</td></tr>\n<tr><td>5) 자산별 총괄표</td><td>경비별·계정과목별 월별 상각비·합계</td></tr>\n<tr><td>더보기</td><td>① 감가상각비 수정(누적상각비 수정, 수정 라인 파란색 — 불러오기 시 재계산 주의), ② 월할상각 설정(상각완료자산·폐기자산 월할상각 사용여부; 전체양도자산은 설정 무관 양도월까지 월할), ③ 음수상각비 찾기(월별 순차 미조회 시 음수 발생분 검색), 엑셀변환</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li><strong>BK 자동전표</strong>: 결산 모듈의 월별 감가상각 계상 배치가 경비구분별 상각비를 <strong>코스트센터 차원 자동분개(결차/결대)</strong> 로 생성, 월할상각·음수보정 로직을 결산 계산엔진에 내장(§14 회사 배치 '월별 감가상각', §11.3 ①).</li>\n<li><strong>산출물</strong>: 월별 상각비 명세·총괄표, 감가상각 자동전표(결산). <strong>연계</strong>: SA-FA-01, [결산자료입력] '감가상각반영', BF/JV 자동분개 파이프라인.</li>\n</ul>\n<h4 class=\"doc-h doc-h4\">4.4 2차 화면군 (환급·과세전환·기타)</h4>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1 · <strong>조회조건·기능</strong>:</h4><div class=\"doc-caption\"><strong>조회조건·기능</strong>:</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>구분</th><th>내용</th></tr></thead><tbody><tr><td>1) 결산기준 감가상각 계상</td><td>① 결산월(월별·분기별 — 월별은 1월부터 순차 조회, [결산자료입력] 12월 결산 시 1~12월 합계 반영; 전체양도·폐기 자산은 양도·폐기월 이후 상각 미계산), ② 경비구분(500~800번대, 전체 시 경비구분별 합계)</td></tr>\n<tr><td>2) 조회월삭제</td><td>선택 월 내역 삭제(<strong>복구 불가</strong>) 후 재조회 시 고정자산등록에서 재산출</td></tr>\n<tr><td>3) 불러오기</td><td>고정자산등록 수정사항 반영(선택 결산월만)</td></tr>\n<tr><td>4) 월별감가상각비 명세</td><td>자산별 월별 상각비 현황</td></tr>\n<tr><td>5) 자산별 총괄표</td><td>경비별·계정과목별 월별 상각비·합계</td></tr>\n<tr><td>더보기</td><td>① 감가상각비 수정(누적상각비 수정, 수정 라인 파란색 — 불러오기 시 재계산 주의), ② 월할상각 설정(상각완료자산·폐기자산 월할상각 사용여부; 전체양도자산은 설정 무관 양도월까지 월할), ③ 음수상각비 찾기(월별 순차 미조회 시 음수 발생분 검색), 엑셀변환</td></tr></tbody></table></div></section>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>산출물</strong>: 월별 상각비 명세·총괄표, 감가상각 자동전표(결산). <strong>연계</strong>: SA-FA-01, [결산자료입력] '감가상각반영', BF/JV 자동분개 파이프라인.</li>\n</ul>","fields":[{"name":"1) 결산기준 감가상각 계상","desc":"① 결산월(월별·분 세 전표 자동집계(불러오기 시 기존 삭제), ② 64.매세는 <strong>환경설정 과세유형추가설정에서 사용설정</strong>(P01 SA-BAS-03), ③ <strong>발행요건 검증</strong>: 건당 공급대가 10만~500만원, 월 2건 이하, 신청기간 내, 정상 사업자 거래. <strong>연계</strong>: 매입매출전표(64.매세), SA-VAT-01 25.매세·매입자발행, 환경설정.</li>\n</ul>","detailTablesHtml":"<p class=\"empty-note\">이 화면의 상세 표는 설계서 원문 설명으로 제공됩니다.</p>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>기능</strong>: ① 64.매세 전표 자동집계(불러오기 시 기존 삭제), ② 64.매세는 <strong>환경설정 과세유형추가설정에서 사용설정</strong>(P01 SA-BAS-03), ③ <strong>발행요건 검증</strong>: 건당 공급대가 10만~500만원, 월 2건 이하, 신청기간 내, 정상 사업자 거래. <strong>연계</strong>: 매입매출전표(64.매세), SA-VAT-01 25.매세·매입자발행, 환경설정.</li>\n</ul>","fields":[{"name":"회계기간","desc":"조회 및 입력 기준 기간"},{"name":"사업장","desc":"전체 또는 개별 사업장 선택"},{"name":"매입자발행세금계산서합계표","desc":"화면별 상세설계 원문 기준 업무 필드"}],"tableCount":0,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-VAT-46","title":"매입자발행세금계산서합계표","purpose":"매입자발행 세금계산서","linkage":"SA-BAS-03 매세","note":"","source":"bk_화면설계서_v1.0.html"}},{"id":"SA-VAT-47","title":"과세유흥장소 과표신고서","phase":"2차","basis":"§25.15.4","impl":"","tabs":"","sid":"sa_vat_47","prefix":"SA-VAT","group":"부가세·신고","purpose":"유흥장소 과세표준","detailHtml":"<h5 class=\"doc-h doc-h5\">4.4.7 SA-VAT-47 과세유흥장소 과표신고서(신) (§25.15.4)</h5>\n<ul class=\"doc-list\">\n<li><strong>입력 필드</strong>: 과세유흥(1.62010 유흥주점/2.62020 외국인전용유흥음식점/3.62030 유사장소), 과세면세구분, 유흥음식요금(개별소비세 과세표준), 세율(<strong>개소세 10%·교육세 30% 자동, 수정 가능</strong>), 산출세액(자동), 가산세액(가산세입력 탭 자동반영), 납부세액(산출+가산세), 조회용 불러오기(계정·유형·부가세/개소세 포함여부), 인쇄설정(1.기한전/2.기한후/3.수정신고), 폐업신고.</li>\n<li><strong>기능</strong>: 유흥장소 코드별 과표 집계, 산출세액 자동계산, 가산세 반영. <strong>전자신고 미지원 — 매월 신고서 입력·출력</strong>, 납부서는 SA-VAT-49. 폐업신고 처리. <strong>연계</strong>: SA-VAT-49, 매입매출전표.</li>\n</ul>","detailTablesHtml":"<p class=\"empty-note\">이 화면의 상세 표는 설계서 원문 설명으로 제공됩니다.</p>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>기능</strong>: 유흥장소 코드별 과표 집계, 산출세액 자동계산, 가산세 반영. <strong>전자신고 미지원 — 매월 신고서 입력·출력</strong>, 납부서는 SA-VAT-49. 폐업신고 처리. <strong>연계</strong>: SA-VAT-49, 매입매출전표.</li>\n</ul>","fields":[{"name":"회계기간","desc":"조회 및 입력 기준 기간"},{"name":"사업장","desc":"전체 또는 개별 사업장 선택"},{"name":"과세유흥장소 과표신고서(신)","desc":"화면별 상세설계 원문 기준 업무 필드"}],"tableCount":0,"statusKind":"ok","statusMsg":"BK 화면설계서 기준 입력 필드 우선 적용","bk":{"id":"SA-VAT-47","title":"과세유흥장소 과표신고서","purpose":"유흥장소 과세표준","linkage":"SA-VAT-01","note":"유흥","source":"bk_화면설계서_v1.0.html"},"legacyTitle":"과세유흥장소 과표신고서(신)"},{"id":"SA-VAT-50","title":"사업양도신고서","phase":"2차","basis":"§25.15.7","impl":"","tabs":"","sid":"sa_vat_50","prefix":"SA-VAT","group":"부가세·신고","purpose":"사업 포괄양도 신고","detailHtml":"<h5 class=\"doc-h doc-h5\">4.4.8 SA-VAT-50 사업양도신고서 (§25.15.7)</h5>\n<ul class=\"doc-list\">\n<li><strong>입력 필드</strong>: 양수자 인적사항(상호·사업자등록번호·대표자명·사업양도 연월일·업태·종목·소재지), 사업양도내용(구분 01.양도되는 권리/02.양도되는 의무/03.양도제외 권리/04.양도제외 의무, 명세·양도금액·양도제외금액), 일괄삭제, 신고일자(다음달 25일).</li>\n<li><strong>기능</strong>: 양수자·권리/의무(4구분) 명세 관리, 양도금액·양도제외금액 집계. <strong>연계</strong>: 거래처(양수자), SA-VAT-01, 회사등록.</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">5. 데이터 모델</h3>\n<p>엔티티명은 구현 명명안이며 필드 구성은 각 화면 절에서 추출(감사 필드·tenant_id는 공통 표준).</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>엔티티(안)</th><th>핵심 필드</th><th>키/제약</th><th>근거</th></tr></thead><tbody><tr><td><code>FixedAsset</code>(고정자산 마스터, AUX-09)</td><td>계정과목코드, 자산구분, 자산코드(6자리), 자산명(40자), 취득일, 상각방법(정률/정액), 내용연수·상각률, 기초가액·전기말상각누계·신규취득·부분매각폐기·상각기초가액, 회사계상상각비·사용자수정 플래그, 경비구분(500~800), 업무용승용차여부·차량ID, 전기말부인누계·자본지출계·의제누계·최저한세부인액·당기의제상각액, 특별상각률/비, 특례적용/년수, 전체양도일자·전체폐기일자, 취득수량, 취득전표 연결, 상각비 배부 기준</td><td>PK(tenant, 기수, 계정, 자산코드) UNIQUE; 토지(20100) 등록 차단; 상각상태(진행/완료)</td><td>§25.16.1, §11.5-(2)</td></tr>\n<tr><td><code>FixedAssetDimension</code>(추가등록사항)</td><td>사업장(필수)·사용/관리부서·코스트센터·프로젝트·현장·사용/관리사원, 관리번호·매입처·제작처·규격·모델·비고</td><td>FK→FixedAsset, <code>DimensionConfig</code> 연동</td><td>§25.16.1-3), §9</td></tr>\n<tr><td><code>AssetChangeEvent</code>(자산변동/라이프사이클)</td><td>일자, 구분(부분매각/부분폐기/부서·사원이동/프로젝트이동), 금액·변동수량, 안분 전기말상각누계(자동), 감가상각비, 적요·이동대상 코드</td><td>FK→FixedAsset, append 이벤트 로그</td><td>§25.16.1-4), §25.16.5</td></tr>\n<tr><td><code>MonthlyDepreciation</code>(월별 계상)</td><td>결산월, 자산ID, 경비구분, 월 상각비, 수정 플래그(파란색), 월할상각 설정, 자동전표 참조(결차/결대)</td><td>UNIQUE(tenant, 자산, 결산월); 조회월삭제=물리 삭제 후 재산출</td><td>§25.16.7</td></tr>\n<tr><td><code>ZeroRateAttachment</code>(영세율 부속서식 공통 헤더)</td><td>서식 종류(VAT-29~43), 신고기간(예정/확정), 마감상태, 작성일자</td><td>서식별 라인 테이블 분리</td><td>§25.14</td></tr>\n<tr><td>— VAT-29 라인</td><td>수출신고번호(14/15), 기타영세율건수, 선(기)적일자, 통화, 환율, 외화(소수 2), 원화</td><td>환가 일치 제약(마감 시)</td><td>§25.14.1</td></tr>\n<tr><td>— VAT-30 라인</td><td>구분(명세서/목록/전체), 서류명, 발급자(거래처FK), 발급·선적일자, 통화·환율, 제출금액, 제출사유</td><td>신고용 제출사유 필수</td><td>§25.14.2</td></tr>\n<tr><td>— VAT-31 라인</td><td>서류구분(내국신용장/구매확인서), 거래일자, 서류번호·발급일, 거래처·사업자번호, 금액</td><td>마감 필수</td><td>§25.14.3</td></tr>\n<tr><td>— VAT-40/41/42 라인</td><td>노선/선박/구분(재화·용역), 수입구분(여객/화물/수화물/우편물/기타 · 국내/해외), 금액(원화·외화), 제출서류</td><td>노선·통화 전자신고 필수</td><td>§25.14.12~14</td></tr>\n<tr><td>— VAT-43 집계</td><td>근거 법률(부가세법/조특법/기타), 공급실적 원화, (13)총합계</td><td>신고서 영세매출과 일치 제약</td><td>§25.14.15</td></tr>\n<tr><td><code>BizBankAccountFiling</code>(사업용계좌 신고)</td><td>계좌상태구분(4), 은행(금융거래처FK), 예금종류·계좌번호, 신고유형, 세무서(자동), 신고일자, 사업장</td><td>사업장별 신고</td><td>§25.15.5</td></tr>\n<tr><td><code>TaxPaymentSlip</code>(전세목 납부서)</td><td>지급년월, 세목, 결정구분(8), 수입징수관서·계좌, 귀속연도·기분·월, 납부금액·기한</td><td>전월 롤포워드</td><td>§25.15.6</td></tr>\n<tr><td><code>TaxProvision</code>/<code>PrepaidTax</code>(세무 연계)</td><td>period, pretaxProfit, adjustments[], estimatedTax, provisionEntryRef / date, source, incomeAmount, rate, corpTax, localTax</td><td>§11.5-(1) 정의 준용</td><td>§11.5</td></tr>\n<tr><td><code>FxRate</code>(환율 마스터 — 참조)</td><td>currency, asOf, rate, rateType</td><td>결산·평가·보고 동일 소스</td><td>§11.16-(1)</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>2차: 전환 재고품 명세(VAT-44), 전환 감가상각자산(VAT-45 — FixedAsset 연계), 매입자발행 집계(VAT-46 — 64.매세 전표 원천), 과세유흥 과표(VAT-47), 사업양도 명세(VAT-50) 라인 테이블을 동일 패턴으로 추가.</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">6. API 설계</h3>\n<p>공통: 오류코드·scope·<code>Idempotency-Key</code>는 00_개요 3절(§13.3) 표준. 대표 엔드포인트(안):</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>엔드포인트</th><th>메서드</th><th>파라미터</th><th>처리</th><th>근거</th></tr></thead><tbody><tr><td><code>/api/vat/zero-rate/{formType}</code></td><td>GET/POST/PUT</td><td>기수, 신고기간(예정/확정), formType=VAT29~43</td><td>부속서식 조회·작성</td><td>§25.14</td></tr>\n<tr><td><code>/api/vat/zero-rate/{formType}/import</code></td><td>POST</td><td>과세유형(12/16/64), 계정범위(401~420/901~930), 거래처 설정</td><td>전표 불러오기(기존 삭제 후 재적재 — VAT-46 규칙)</td><td>§25.14.3·4·12~14, §25.15.3</td></tr>\n<tr><td><code>/api/vat/zero-rate/{formType}/close</code></td><td>POST</td><td>신고기간</td><td>마감 — 환가 불일치(VAT-29)·총합계 불일치(VAT-43) 시 마감오류 반환</td><td>§25.14.1·15</td></tr>\n<tr><td><code>/api/vat/payment-slips</code></td><td>GET/POST</td><td>지급년월, 세목, 결정구분</td><td>전세목 납부서 생성, 전월 롤포워드</td><td>§25.15.6</td></tr>\n<tr><td><code>/api/fa/assets</code></td><td>GET/POST/PUT</td><td>기수, 계정, 자산구분, 상각상태, 차원 필터</td><td>고정자산 CRUD(삭제 대신 폐기/양도 이벤트)</td><td>§25.16.1</td></tr>\n<tr><td><code>/api/fa/assets/import-journal</code></td><td>POST</td><td>기간</td><td>전표(차변 유·무형자산) 수집 → 미등록 판별·일괄등록</td><td>§25.16.1 더보기④</td></tr>\n<tr><td><code>/api/fa/assets/carry-forward</code></td><td>POST</td><td>원천 기수</td><td>전기이월 데이터 불러오기(양도/폐기 자산 제외, 덮어쓰기)</td><td>§25.16.1 더보기①</td></tr>\n<tr><td><code>/api/fa/depreciation/recalc</code></td><td>POST</td><td>기준(연말/반기), 옵션(사용자수정 포함/회사계상 0 일괄)</td><td>감가상각비 재계산</td><td>§25.16.1 더보기③</td></tr>\n<tr><td><code>/api/fa/monthly-depreciation</code></td><td>GET/POST/DELETE</td><td>결산월, 경비구분</td><td>월별 계상 조회/불러오기/조회월삭제</td><td>§25.16.7</td></tr>\n<tr><td><code>/api/fa/monthly-depreciation/post</code></td><td>POST</td><td>결산월</td><td>결차/결대 자동전표 생성(멱등)</td><td>§25.16.7, §11.3</td></tr>\n<tr><td><code>/api/fa/reports/{type}</code></td><td>GET</td><td>type=미상각/양도/원가경비별/관리대장/차원명세, 필터</td><td>명세·대장 산출(비동기 리포트 옵션 — §15 성능)</td><td>§25.16.2~6</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>멱등성: 불러오기·마감·자동전표 생성은 <code>Idempotency-Key</code> 필수(동일 키+다른 요청해시 = <code>409 IDEMPOTENCY_CONFLICT</code> — §15).</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">7. 배치/스케줄</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>배치</th><th>주기/트리거</th><th>내용</th><th>실패 처리</th><th>근거</th></tr></thead><tbody><tr><td>월별 감가상각</td><td>월별(회사 배치)</td><td>경비구분별 상각비 산출 → 코스트센터 차원 결차/결대 자동분개</td><td>멱등·재처리·실패 알림(§14 공통)</td><td>§14, §25.16.7</td></tr>\n<tr><td>결산검증</td><td>결산 시</td><td>관리대장 ↔ 총계정원장 금액 대조(고정자산)</td><td>불일치 리포트</td><td>§25.16.1·5, §14</td></tr>\n<tr><td>신고 집계</td><td>신고기간</td><td>영세율 부속서식 집계·VAT-43 정합 검증</td><td>마감오류 목록</td><td>§14, §25.14.15</td></tr>\n<tr><td>법인세 추정·충당 잡</td><td>월별</td><td>Tax Provision(감가상각 부인액 등 세무조정 연계)</td><td>멱등·재처리</td><td>§14, §11.5-(1)</td></tr>\n<tr><td>월말 외화평가 잡</td><td>월말</td><td>미실현 외환손익 분개 + 익월 환산제거(영세율 외화 필드와 동일 <code>FxRate</code> 소스)</td><td>환율 미등록 통화 차단·검토대상 분리</td><td>§14, §11.16</td></tr>\n<tr><td>환율 동기화</td><td>일/월</td><td><code>FxRate</code> 외부 수신</td><td>실패 알림</td><td>§14, §11.16-(1)</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">8. 검증·오류 처리</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>검증 항목</th><th>수준</th><th>처리</th><th>근거</th></tr></thead><tbody><tr><td>1</td><td>VAT-29 원화금액 ≠ 외화×환율</td><td>차단(마감)</td><td>마감오류</td><td>§25.14.1</td></tr>\n<tr><td>2</td><td>VAT-29 수출신고번호 자릿수(14/15) 위반</td><td>차단</td><td>저장 오류</td><td>§25.14.1</td></tr>\n<tr><td>3</td><td>VAT-43 신고서 영세매출금액 ≠ (13)총합계 / 미작성</td><td>차단(마감)</td><td>마감오류</td><td>§25.14.15</td></tr>\n<tr><td>4</td><td>VAT-31 마감 미완료 상태 첨부 제출</td><td>차단</td><td>마감 필수 안내</td><td>§25.14.3</td></tr>\n<tr><td>5</td><td>VAT-40 노선·통화코드 / VAT-44 품명 / VAT-30 신고용 제출사유 누락</td><td>차단(전자신고)</td><td>전자신고 필수 항목 오류</td><td>§25.14.2·12, §25.15.1</td></tr>\n<tr><td>6</td><td>VAT-45 과세사업 사용·소비시기 미작성</td><td>차단</td><td>오류</td><td>§25.15.2</td></tr>\n<tr><td>7</td><td>VAT-46 발행요건(10만~500만원, 월 2건, 신청기간, 정상 사업자) 위반</td><td>차단/경고</td><td>발행요건 검증</td><td>§25.15.3</td></tr>\n<tr><td>8</td><td>FA-01 토지(20100) 자산 등록 시도</td><td>차단</td><td>비상각자산 등록 차단</td><td>§25.16.1</td></tr>\n<tr><td>9</td><td>FA-01 2016년 이후 취득 업무용승용차 + 정률법</td><td>경고</td><td>붉은색 경고(정액법 유도)</td><td>§25.16.1</td></tr>\n<tr><td>10</td><td>FA-01 건물·구축물·무형자산 + 정률법</td><td>차단</td><td>정액법만 허용</td><td>§25.16.1</td></tr>\n<tr><td>11</td><td>FA-01 업무용승용차여부 &quot;여&quot; + 차량운반구 외 계정</td><td>차단</td><td>차량운반구 계정 필수</td><td>§25.16.1</td></tr>\n<tr><td>12</td><td>FA-01 회사계상상각비 사용자수정 ≠ 상각범위액</td><td>표시</td><td>차액 = 상각부인액 세무조정 대상</td><td>§25.16.1</td></tr>\n<tr><td>13</td><td>FA-07 음수상각비 발생(월별 순차 미조회)</td><td>경고</td><td>음수상각비 찾기 제공</td><td>§25.16.7</td></tr>\n<tr><td>14</td><td>FA-07 조회월삭제</td><td>확인</td><td>복구 불가 경고 후 실행</td><td>§25.16.7</td></tr>\n<tr><td>15</td><td>환율 미적용 외화 입력</td><td>차단</td><td>입력 시점 저장 차단</td><td>§15</td></tr>\n<tr><td>16</td><td>전표일자·회계기간(OPEN 외) 불일치</td><td>차단</td><td>공통(§15)</td><td>§15</td></tr>\n<tr><td>17</td><td>마감기간 소급 변경(부속서식·상각)</td><td>차단</td><td>조정전표/별도권한(§15), <code>POSTED_IMMUTABLE</code></td><td>§15, §13.3</td></tr>\n<tr><td>18</td><td>법인세표준계정 매핑 누락 계정의 상각·세무 집계</td><td>경고</td><td>결산·신고 집계 경고(W3)</td><td>§15, §11.6.2</td></tr>\n<tr><td>19</td><td>분산 락 미획득(동시 마감)</td><td>차단</td><td>&quot;다른 사용자 진행 중&quot; 비즈니스 예외</td><td>§15</td></tr>\n<tr><td>20</td><td>멱등키 충돌(마감·자동전표)</td><td>차단</td><td><code>409 IDEMPOTENCY_CONFLICT</code></td><td>§15</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">9. 권한·SOD·감사</h3>\n<ul class=\"doc-list\">\n<li>공통: <code>RoleMenuPermission</code>+<code>MenuActionGrant</code> 미노출 원칙, SOD(작성≠승인), 기장 모드별 주기장 수행 원칙 — 00_개요 3절(§4.3·4.5·§21).</li>\n<li>화면×행위: 부속서식 작성/마감 분리(마감 = 신고 준비 행위), 전자신고 전송(SA-VAT-07, P06)은 <strong>Step-up 인증</strong> 대상, <code>filingApprovalRequired=Y</code> 시 승인 전 전송 차단·주기장=OPERATOR 미수임 시 전송 차단(§15, §21.4). 비주기장 측 신고 시도 = <code>NOT_PRIMARY_BOOKKEEPER</code> 차단(§15).</li>\n<li>고정자산: 마스터 CUD·감가상각비 수정·조회월삭제는 <code>DataChangeLog</code>(전후값·IP·행위자) 기록(§17, 00_개요 3절). 자산 삭제 대신 양도/폐기 이벤트(물리 삭제 금지 — §16.1 준용).</li>\n<li>주민번호 별표 마스킹(VAT-42·49) + 평문 조회는 Step-up(§17, 00_개요 3절).</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">10. 연계</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>방향</th><th>대상</th><th>내용</th><th>근거</th></tr></thead><tbody><tr><td>선행</td><td>P01 SA-BAS-03 환경설정</td><td>64.매세 과세유형추가설정(VAT-46), <code>TenantAccountingConfig</code> 소수점</td><td>§25.15.3, §11.1-(6)</td></tr>\n<tr><td>선행</td><td>P01 SA-BAS-06 거래처등록</td><td>발급자·금융거래처(사업용계좌 &quot;여&quot;)·환급창구운영사업자</td><td>§25.14.2, §25.15.5</td></tr>\n<tr><td>선행</td><td>P01 SA-BAS-10 업무용승용차등록</td><td>명의 0.회사 → FA-01 업무용승용차여부 &quot;여&quot;, 세무 비용한도(800만원·운행기록부 업무사용비율) 입력값</td><td>§25.1.10, §25.16.1</td></tr>\n<tr><td>선행</td><td>P02 전기이월</td><td>고정자산·업무용승용차 초기이월, FA-01 전기이월 불러오기</td><td>§25.2, §25.16.1</td></tr>\n<tr><td>선행</td><td>P03 매입매출전표</td><td>12.영세/16.수출/64.매세 전표 = 부속서식 불러오기 원천, 차변 유·무형자산 분개 = FA-01 전표 수집 원천</td><td>§25.14, §25.16.1</td></tr>\n<tr><td>후행</td><td>P05 결산자료입력</td><td>FA-07 감가상각반영(경비구분별), 결산정리분개 자동화 ① 감가상각비(<code>ClosingAutoEntryRule</code>, 결차/결대)</td><td>§25.16.7, §11.3</td></tr>\n<tr><td>후행</td><td>P06 SA-VAT-01/02/07/08</td><td>영세율 첨부·MRI 환가 검토·전자신고·납부서</td><td>§25.14 각 절</td></tr>\n<tr><td>병행</td><td>P07 SA-VAT-33·34·35</td><td>관세환급금·외국인관광객 명세(VAT-43 집계 원천 일부)</td><td>§25.14.5~7</td></tr>\n<tr><td>병행</td><td>P04 AUX-09/SA-LDG-17·18</td><td>고정자산대장(기초)·운행기록부·차량비용현황 — 상각비·차량 차원 데이터 공유</td><td>§11.5-(2), §25.7.8~9</td></tr>\n<tr><td>외부</td><td>세무 모듈</td><td>감가상각비조정명세서(전기말 부인액 불러오기), 업무용승용차관련비용명세서, 법인세 Tax Provision</td><td>§25.16.1, §11.5</td></tr>\n<tr><td>외부</td><td>환율</td><td><code>FxRate</code> 외부 수신(§8.4) — 영세율 외화·상각과 동일 소스</td><td>§11.16</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">11. 완료 기준(DoD)·테스트 관점</h3>\n<p>1. <strong>영세율 정합 게이트</strong>: 12.영세/16.수출 전표 → VAT-29·31·32·40~42 불러오기 → VAT-43 총합계가 SA-VAT-01 영세매출금액과 일치 → 마감 성공. 불일치 시나리오에서 마감오류 재현(§25.14.15).</p>\n<p>2. <strong>환가 검증</strong>: VAT-29에서 원화≠외화×환율 데이터 마감 차단, KRW(환율 1)·JPY(1JPY당) 특례 통과(§25.14.1).</p>\n<p>3. <strong>고정자산 상각 정확성</strong>: 정률/정액·월할(취득·양도월)·비망가액(5% vs 1,000원)·업무용승용차(정액 5년) 케이스별 당기상각범위액 검증(§25.16.1).</p>\n<p>4. <strong>자동전표 왕복</strong>: FA-07 월별 계상 → 결차/결대 자동전표 → 결산자료입력 '감가상각반영' 반영 확인, 조회월삭제 후 재산출 일관성(§25.16.7).</p>\n<p>5. <strong>대사</strong>: 결산 시 고정자산관리대장 ↔ 총계정원장 금액 일치, 자산변동(부분매각·폐기) 안분 상각누계 자동계산 검증(§25.16.1·5).</p>\n<p>6. <strong>전표 수집</strong>: 차변 유·무형자산 분개 → 등록/미등록 판별 → 일괄등록, 중복 반영 없음(멱등)(§25.16.1).</p>\n<p>7. <strong>검증표 전수</strong>: 8절 20개 항목 차단/경고 레벨 테스트, 전자신고 필수 필드 누락 케이스.</p>\n<p>8. <strong>권한·감사</strong>: SOD(작성≠마감 승인), 마스킹·Step-up, <code>DataChangeLog</code> 전후값 기록 확인.</p>\n<p>9. 2차 화면은 1차 공통 프레임(부속서식 헤더·불러오기·마감·엑셀) 재사용으로 회귀 없이 추가되는지 확인.</p>\n<h3 class=\"doc-h doc-h3\">12. 잔여 확인사항 (§23 연계)</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>항목</th><th>내용</th></tr></thead><tbody><tr><td>1</td><td>노선등록·선박등록 마스터</td><td>VAT-40·41의 노선/선박 마스터 화면의 소속 페이즈·메뉴 위치 미지정(§25.14.12·13) — P01 기초정보 확장 여부 확정 필요</td></tr>\n<tr><td>2</td><td>차수표 중복 표기</td><td>§22.2에서 VAT-29~32(수출실적~외화획득)가 페이즈07 1차 행에 표기 — 문서 경계는 00_개요 5절(페이즈08) 기준으로 확정, 개발 착수 시 팀 간 중복 방지 확인</td></tr>\n<tr><td>3</td><td>감가상각비조정명세서</td><td>FA-01 '전기말 부인액 불러오기'의 원천인 세무 서식(법인세 모듈)의 개발 차수 — §11.5 법인세 신고연계 범위 확정 필요</td></tr>\n<tr><td>4</td><td>업무용승용차 세무조정</td><td>비용한도(800만원)·운행기록부 업무사용비율 계산(BKCS-41, §25.1.10·§25.7.8)과 FA-01 상각비의 연계 산식 상세화</td></tr>\n<tr><td>5</td><td>영세율 첨부 외화 장기 연계</td><td>N5 장기 연계(영세율 첨부서류·외화평가·법인세 외화 서식·외화 Aging — §23/N5, §11.16) 적용 시점</td></tr>\n<tr><td>6</td><td>VAT-47 개소세 세율</td><td>개소세 10%·교육세 30%는 공통 표준 버전(6장) 배포값으로 관리 — 세율 변경 시 표준 자동적용 배치(§14) 대상 등록 확인</td></tr>\n<tr><td>7</td><td>라벨 인쇄(FA-05)</td><td>자산 라벨(바코드) 인쇄 형식·프린터 지원 범위 미상세(§25.16.5)</td></tr></tbody></table></div>","detailTablesHtml":"<section class=\"doc-table-block\"><h4>상세 표 1</h4><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>엔티티(안)</th><th>핵심 필드</th><th>키/제약</th><th>근거</th></tr></thead><tbody><tr><td><code>FixedAsset</code>(고정자산 마스터, AUX-09)</td><td>계정과목코드, 자산구분, 자산코드(6자리), 자산명(40자), 취득일, 상각방법(정률/정액), 내용연수·상각률, 기초가액·전기말상각누계·신규취득·부분매각폐기·상각기초가액, 회사계상상각비·사용자수정 플래그, 경비구분(500~800), 업무용승용차여부·차량ID, 전기말부인누계·자본지출계·의제누계·최저한세부인액·당기의제상각액, 특별상각률/비, 특례적용/년수, 전체양도일자·전체폐기일자, 취득수량, 취득전표 연결, 상각비 배부 기준</td><td>PK(tenant, 기수, 계정, 자산코드) UNIQUE; 토지(20100) 등록 차단; 상각상태(진행/완료)</td><td>§25.16.1, §11.5-(2)</td></tr>\n<tr><td><code>FixedAssetDimension</code>(추가등록사항)</td><td>사업장(필수)·사용/관리부서·코스트센터·프로젝트·현장·사용/관리사원, 관리번호·매입처·제작처·규격·모델·비고</td><td>FK→FixedAsset, <code>DimensionConfig</code> 연동</td><td>§25.16.1-3), §9</td></tr>\n<tr><td><code>AssetChangeEvent</code>(자산변동/라이프사이클)</td><td>일자, 구분(부분매각/부분폐기/부서·사원이동/프로젝트이동), 금액·변동수량, 안분 전기말상각누계(자동), 감가상각비, 적요·이동대상 코드</td><td>FK→FixedAsset, append 이벤트 로그</td><td>§25.16.1-4), §25.16.5</td></tr>\n<tr><td><code>MonthlyDepreciation</code>(월별 계상)</td><td>결산월, 자산ID, 경비구분, 월 상각비, 수정 플래그(파란색), 월할상각 설정, 자동전표 참조(결차/결대)</td><td>UNIQUE(tenant, 자산, 결산월); 조회월삭제=물리 삭제 후 재산출</td><td>§25.16.7</td></tr>\n<tr><td><code>ZeroRateAttachment</code>(영세율 부속서식 공통 헤더)</td><td>서식 종류(VAT-29~43), 신고기간(예정/확정), 마감상태, 작성일자</td><td>서식별 라인 테이블 분리</td><td>§25.14</td></tr>\n<tr><td>— VAT-29 라인</td><td>수출신고번호(14/15), 기타영세율건수, 선(기)적일자, 통화, 환율, 외화(소수 2), 원화</td><td>환가 일치 제약(마감 시)</td><td>§25.14.1</td></tr>\n<tr><td>— VAT-30 라인</td><td>구분(명세서/목록/전체), 서류명, 발급자(거래처FK), 발급·선적일자, 통화·환율, 제출금액, 제출사유</td><td>신고용 제출사유 필수</td><td>§25.14.2</td></tr>\n<tr><td>— VAT-31 라인</td><td>서류구분(내국신용장/구매확인서), 거래일자, 서류번호·발급일, 거래처·사업자번호, 금액</td><td>마감 필수</td><td>§25.14.3</td></tr>\n<tr><td>— VAT-40/41/42 라인</td><td>노선/선박/구분(재화·용역), 수입구분(여객/화물/수화물/우편물/기타 · 국내/해외), 금액(원화·외화), 제출서류</td><td>노선·통화 전자신고 필수</td><td>§25.14.12~14</td></tr>\n<tr><td>— VAT-43 집계</td><td>근거 법률(부가세법/조특법/기타), 공급실적 원화, (13)총합계</td><td>신고서 영세매출과 일치 제약</td><td>§25.14.15</td></tr>\n<tr><td><code>BizBankAccountFiling</code>(사업용계좌 신고)</td><td>계좌상태구분(4), 은행(금융거래처FK), 예금종류·계좌번호, 신고유형, 세무서(자동), 신고일자, 사업장</td><td>사업장별 신고</td><td>§25.15.5</td></tr>\n<tr><td><code>TaxPaymentSlip</code>(전세목 납부서)</td><td>지급년월, 세목, 결정구분(8), 수입징수관서·계좌, 귀속연도·기분·월, 납부금액·기한</td><td>전월 롤포워드</td><td>§25.15.6</td></tr>\n<tr><td><code>TaxProvision</code>/<code>PrepaidTax</code>(세무 연계)</td><td>period, pretaxProfit, adjustments[], estimatedTax, provisionEntryRef / date, source, incomeAmount, rate, corpTax, localTax</td><td>§11.5-(1) 정의 준용</td><td>§11.5</td></tr>\n<tr><td><code>FxRate</code>(환율 마스터 — 참조)</td><td>currency, asOf, rate, rateType</td><td>결산·평가·보고 동일 소스</td><td>§11.16-(1)</td></tr></tbody></table></div></section>\n<section class=\"doc-table-block\"><h4>상세 표 2</h4><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>엔드포인트</th><th>메서드</th><th>파라미터</th><th>처리</th><th>근거</th></tr></thead><tbody><tr><td><code>/api/vat/zero-rate/{formType}</code></td><td>GET/POST/PUT</td><td>기수, 신고기간(예정/확정), formType=VAT29~43</td><td>부속서식 조회·작성</td><td>§25.14</td></tr>\n<tr><td><code>/api/vat/zero-rate/{formType}/import</code></td><td>POST</td><td>과세유형(12/16/64), 계정범위(401~420/901~930), 거래처 설정</td><td>전표 불러오기(기존 삭제 후 재적재 — VAT-46 규칙)</td><td>§25.14.3·4·12~14, §25.15.3</td></tr>\n<tr><td><code>/api/vat/zero-rate/{formType}/close</code></td><td>POST</td><td>신고기간</td><td>마감 — 환가 불일치(VAT-29)·총합계 불일치(VAT-43) 시 마감오류 반환</td><td>§25.14.1·15</td></tr>\n<tr><td><code>/api/vat/payment-slips</code></td><td>GET/POST</td><td>지급년월, 세목, 결정구분</td><td>전세목 납부서 생성, 전월 롤포워드</td><td>§25.15.6</td></tr>\n<tr><td><code>/api/fa/assets</code></td><td>GET/POST/PUT</td><td>기수, 계정, 자산구분, 상각상태, 차원 필터</td><td>고정자산 CRUD(삭제 대신 폐기/양도 이벤트)</td><td>§25.16.1</td></tr>\n<tr><td><code>/api/fa/assets/import-journal</code></td><td>POST</td><td>기간</td><td>전표(차변 유·무형자산) 수집 → 미등록 판별·일괄등록</td><td>§25.16.1 더보기④</td></tr>\n<tr><td><code>/api/fa/assets/carry-forward</code></td><td>POST</td><td>원천 기수</td><td>전기이월 데이터 불러오기(양도/폐기 자산 제외, 덮어쓰기)</td><td>§25.16.1 더보기①</td></tr>\n<tr><td><code>/api/fa/depreciation/recalc</code></td><td>POST</td><td>기준(연말/반기), 옵션 /table></div></section>\n<section class=\"doc-table-block\"><h4>상세 표 5 · 10. 연계</h4><div class=\"doc-caption\">10. 연계</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>방향</th><th>대상</th><th>내용</th><th>근거</th></tr></thead><tbody><tr><td>선행</td><td>P01 SA-BAS-03 환경설정</td><td>64.매세 과세유형추가설정(VAT-46), <code>TenantAccountingConfig</code> 소수점</td><td>§25.15.3, §11.1-(6)</td></tr>\n<tr><td>선행</td><td>P01 SA-BAS-06 거래처등록</td><td>발급자·금융거래처(사업용계좌 &quot;여&quot;)·환급창구운영사업자</td><td>§25.14.2, §25.15.5</td></tr>\n<tr><td>선행</td><td>P01 SA-BAS-10 업무용승용차등록</td><td>명의 0.회사 → FA-01 업무용승용차여부 &quot;여&quot;, 세무 비용한도(800만원·운행기록부 업무사용비율) 입력값</td><td>§25.1.10, §25.16.1</td></tr>\n<tr><td>선행</td><td>P02 전기이월</td><td>고정자산·업무용승용차 초기이월, FA-01 전기이월 불러오기</td><td>§25.2, §25.16.1</td></tr>\n<tr><td>선행</td><td>P03 매입매출전표</td><td>12.영세/16.수출/64.매세 전표 = 부속서식 불러오기 원천, 차변 유·무형자산 분개 = FA-01 전표 수집 원천</td><td>§25.14, §25.16.1</td></tr>\n<tr><td>후행</td><td>P05 결산자료입력</td><td>FA-07 감가상각반영(경비구분별), 결산정리분개 자동화 ① 감가상각비(<code>ClosingAutoEntryRule</code>, 결차/결대)</td><td>§25.16.7, §11.3</td></tr>\n<tr><td>후행</td><td>P06 SA-VAT-01/02/07/08</td><td>영세율 첨부·MRI 환가 검토·전자신고·납부서</td><td>§25.14 각 절</td></tr>\n<tr><td>병행</td><td>P07 SA-VAT-33·34·35</td><td>관세환급금·외국인관광객 명세(VAT-43 집계 원천 일부)</td><td>§25.14.5~7</td></tr>\n<tr><td>병행</td><td>P04 AUX-09/SA-LDG-17·18</td><td>고정자산대장(기초)·운행기록부·차량비용현황 — 상각비·차량 차원 데이터 공유</td><td>§11.5-(2), §25.7.8~9</td></tr>\n<tr><td>외부</td><td>세무 모듈</td><td>감가상각비조정명세서(전기말 부인액 불러오기), 업무용승용차관련비용명세서, 법인세 Tax Provision</td><td>§25.16.1, §11.5</td></tr>\n<tr><td>외부</td><td>환율</td><td><code>FxRate</code> 외부 수신(§8.4) — 영세율 외화·상각과 동일 소스</td><td>§11.16</td></tr></tbody></table></div></section>\n<section class=\"doc-table-block\"><h4>상세 표 6 · 12. 잔여 확인사항 (§23 연계)</h4><div class=\"doc-caption\">12. 잔여 확인사항 (§23 연계)</div><div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>항목</th><th>내용</th></tr></thead><tbody><tr><td>1</td><td>노선등록·선박등록 마스터</td><td>VAT-40·41의 노선/선박 마스터 화면의 소속 페이즈·메뉴 위치 미지정(§25.14.12·13) — P01 기초정보 확장 여부 확정 필요</td></tr>\n<tr><td>2</td><td>차수표 중복 표기</td><td>§22.2에서 VAT-29~32(수출실적~외화획득)가 페이즈07 1차 행에 표기 — 문서 경계는 00_개요 5절(페이즈08) 기준으로 확정, 개발 착수 시 팀 간 중복 방지 확인</td></tr>\n<tr><td>3</td><td>감가상각비조정명세서</td><td>FA-01 '전기말 부인액 불러오기'의 원천인 세무 서식(법인세 모듈)의 개발 차수 — §11.5 법인세 신고연계 범위 확정 필요</td></tr>\n<tr><td>4</td><td>업무용승용차 세무조정</td><td>비용한도(800만원)·운행기록부 업무사용비율 계산(BKCS-41, §25.1.10·§25.7.8)과 FA-01 상각비의 연계 산식 상세화</td></tr>\n<tr><td>5</td><td>영세율 첨부 외화 장기 연계</td><td>N5 장기 연계(영세율 첨부서류·외화평가·법인세 외화 서식·외화 Aging — §23/N5, §11.16) 적용 시점</td></tr>\n<tr><td>6</td><td>VAT-47 개소세 세율</td><td>개소세 10%·교육세 30%는 공통 표준 버전(6장) 배포값으로 관리 — 세율 변경 시 표준 자동적용 배치(§14) 대상 등록 확인</td></tr>\n<tr><td>7</td><td>라벨 인쇄(FA-05)</td><td>자산 라벨(바코드) 인쇄 형식·프린터 지원 범위 미상세(§25.16.5)</td></tr></tbody></table></div></section>","validationHtml":"<ul class=\"doc-list\">\n<li><strong>기능</strong>: 양수자·권리/의무(4구분) 명세 관리, 양도금액·양도제외금액 집계. <strong>연계</strong>: 거래처(양수자), SA-VAT-01, 회사등록.</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th><code>FixedAsset</code>(고정자산 마스터, AUX-09)</th><th>계정과목코드, 자산구분, 자산코드(6자리), 자산명(40자), 취득일, 상각방법(정률/정액), 내용연수·상각률, 기초가액·전기말상각누계·신규취득·부분매각폐기·상각기초가액, 회사계상상각비·사용자수정 플래그, 경비구분(500~800), 업무용승용차여부·차량ID, 전기말부인누계·자본지출계·의제누계·최저한세부인액·당기의제상각액, 특별상각률/비, 특례적용/년수, 전체양도일자·전체폐기일자, 취득수량, 취득전표 연결, 상각비 배부 기준</th><th>PK(tenant, 기수, 계정, 자산코드) UNIQUE; 토지(20100) 등록 차단; 상각상태(진행/완료)</th><th>§25.16.1, §11.5-(2)</th></tr></thead><tbody><tr><td><code>ZeroRateAttachment</code>(영세율 부속서식 공통 헤더)</td><td>서식 종류(VAT-29~43), 신고기간(예정/확정), 마감상태, 작성일자</td><td>서식별 라인 테이블 분리</td><td>§25.14</td></tr>\n<tr><td>— VAT-29 라인</td><td>수출신고번호(14/15), 기타영세율건수, 선(기)적일자, 통화, 환율, 외화(소수 2), 원화</td><td>환가 일치 제약(마감 시)</td><td>§25.14.1</td></tr>\n<tr><td>— VAT-31 라인</td><td>서류구분(내국신용장/구매확인서), 거래일자, 서류번호·발급일, 거래처·사업자번호, 금액</td><td>마감 필수</td><td>§25.14.3</td></tr>\n<tr><td><code>TaxProvision</code>/<code>PrepaidTax</code>(세무 연계)</td><td>period, pretaxProfit, adjustments[], estimatedTax, provisionEntryRef / date, source, incomeAmount, rate, corpTax, localTax</td><td>§11.5-(1) 정의 준용</td><td>§11.5</td></tr></tbody></table></div>\n<ul class=\"doc-list\">\n<li>2차: 전환 재고품 명세(VAT-44), 전환 감가상각자산(VAT-45 — FixedAsset 연계), 매입자발행 집계(VAT-46 — 64.매세 전표 원천), 과세유흥 과표(VAT-47), 사업양도 명세(VAT-50) 라인 테이블을 동일 패턴으로 추가.</li>\n</ul>\n<h3 class=\"doc-h doc-h3\">6. API 설계</h3>\n<p>공통: 오류코드·scope·<code>Idempotency-Key</code>는 00_개요 3절(§13.3) 표준. 대표 엔드포인트(안):</p>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th><code>/api/vat/zero-rate/{formType}/close</code></th><th>POST</th><th>신고기간</th><th>마감 — 환가 불일치(VAT-29)·총합계 불일치(VAT-43) 시 마감오류 반환</th><th>§25.14.1·15</th></tr></thead><tbody></tbody></table></div>\n<ul class=\"doc-list\">\n<li>멱등성: 불러오기·마감·자동전표 생성은 <code>Idempotency-Key</code> 필수(동일 키+다른 요청해시 = <code>409 IDEMPOTENCY_CONFLICT</code> — §15).</li>\n</ul>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>결산검증</th><th>결산 시</th><th>관리대장 ↔ 총계정원장 금액 대조(고정자산)</th><th>불일치 리포트</th><th>§25.16.1·5, §14</th></tr></thead><tbody><tr><td>신고 집계</td><td>신고기간</td><td>영세율 부속서식 집계·VAT-43 정합 검증</td><td>마감오류 목록</td><td>§14, §25.14.15</td></tr>\n<tr><td>법인세 추정·충당 잡</td><td>월별</td><td>Tax Provision(감가상각 부인액 등 세무조정 연계)</td><td>멱등·재처리</td><td>§14, §11.5-(1)</td></tr>\n<tr><td>월말 외화평가 잡</td><td>월말</td><td>미실현 외환손익 분개 + 익월 환산제거(영세율 외화 필드와 동일 <code>FxRate</code> 소스)</td><td>환율 미등록 통화 차단·검토대상 분리</td><td>§14, §11.16</td></tr></tbody></table></div>\n<h3 class=\"doc-h doc-h3\">8. 검증·오류 처리</h3>\n<div class=\"doc-table-wrap\"><table class=\"doc-table \"><thead><tr><th>#</th><th>검증 항목</th><th>수준</th><th>처리</th><th>근거</th></tr></thead><tbody><tr><td>1</td><td>VAT-29 원화금액 ≠ 외화×환율</td><td>차단(마감)</td><td>마감오류</td><td>§25.14.1</td></tr>\n<tr><td>2</td><td>VAT-29 수출신고번호 자릿수(14/15) 위반</td><td>차단</td><td>저장 오류</td><td>§25.14.1</td></tr>\n<tr><td>3</td><td>VAT-43 신고서 영세매출금액 ≠ (13)총합계 / 미작성</td><td>차단(마감)</td><td>마감오류</td><td>§25.14.15</td></tr
