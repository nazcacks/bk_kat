<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{DOC_TITLE}}</title>
<style>
:root{
  --ey-yellow:#FFE600; --ey-dark:#2E2E38; --ey-darker:#1A1A24; --ey-gray:#747480;
  --ey-light:#F6F6FA; --ey-border:#E1E1E6; --ey-text:#2E2E38; --ey-red:#E0362C;
  --ey-green:#168736; --ey-blue:#188CE5; --ey-link:#155CB4;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','Malgun Gothic','Apple SD Gothic Neo',sans-serif;color:var(--ey-text);background:var(--ey-light);font-size:13.5px;line-height:1.55}
/* ===== 상단바 ===== */
.topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:14px;background:var(--ey-darker);color:#fff;height:54px;padding:0 16px;border-bottom:1px solid #000}
.ey-logo{display:flex;align-items:center;gap:10px;min-width:210px}
.ey-mark{position:relative;width:40px;height:40px;background:#000;display:flex;align-items:flex-end;justify-content:center;padding-bottom:2px}
.ey-mark .beam{position:absolute;top:4px;left:4px;width:0;height:0;border-left:32px solid transparent;border-bottom:9px solid var(--ey-yellow);transform:skewX(-18deg)}
.ey-mark .ey{font-weight:800;font-size:19px;color:#fff;line-height:1}
.ey-tag{font-size:10.5px;line-height:1.25;color:#d9d9e0;font-weight:600}
.company-select{display:flex;align-items:center;gap:8px;background:var(--ey-dark);border:1px solid #45454f;border-radius:4px;padding:6px 12px;font-size:12.5px;cursor:pointer;white-space:nowrap}
.company-select .code{color:#b9b9c2}
.global-search{flex:1;max-width:520px;display:flex;align-items:center;gap:8px;background:var(--ey-dark);border:1px solid #45454f;border-radius:4px;padding:6px 12px;color:#8a8a94;font-size:12.5px}
.top-utils{margin-left:auto;display:flex;align-items:center;gap:18px;font-size:12.5px;white-space:nowrap}
.top-utils .util{display:flex;align-items:center;gap:5px;cursor:pointer;color:#e8e8ee}
.top-utils .fav .ico{color:var(--ey-yellow)}
.top-utils .avatar{width:26px;height:26px;border-radius:50%;background:#fff;color:var(--ey-darker);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px}
/* ===== 레이아웃 ===== */
.layout{display:flex;min-height:calc(100vh - 54px)}
.sidebar{width:216px;background:var(--ey-dark);color:#d7d7de;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:54px;height:calc(100vh - 54px);overflow:auto}
.sidebar .menu-head{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid #3d3d47;color:#fff;font-weight:700;font-size:13px}
.sidebar nav{flex:1;overflow:auto;padding:4px 0 8px}
.mgroup{margin-top:5px}
.mgroup>.gtitle{display:flex;align-items:center;gap:8px;padding:5px 16px;font-weight:700;font-size:12.5px;color:var(--ey-yellow);cursor:pointer}
.mgroup>.gtitle .bar{width:3px;height:14px;background:var(--ey-yellow);border-radius:2px}
.mgroup.plain>.gtitle{color:#fff}
.mgroup.plain>.gtitle .bar{background:#6a6a75}
.mitem{display:block;padding:4px 16px 4px 34px;font-size:12.5px;color:#c9c9d2;cursor:pointer;border-left:3px solid transparent;text-decoration:none}
.mitem:hover{background:#3a3a45;color:#fff}
.mitem.active{background:var(--ey-yellow);color:#1a1a24;font-weight:700;border-left-color:#c9b400}
.mitem .mid{float:right;font-size:10px;color:#8a8a94;margin-top:2px}
.mitem.active .mid{color:#55550a}
.sidebar .foot{padding:8px 16px;border-top:1px solid #3d3d47;display:flex;align-items:center;gap:8px;flex-shrink:0}
.sidebar .foot .ey-mark{width:30px;height:30px}
.sidebar .foot .ey-mark .beam{border-left-width:24px;border-bottom-width:7px;top:3px;left:3px}
.sidebar .foot .ey-mark .ey{font-size:14px}
.sidebar .foot .txt{font-size:10px;color:#b9b9c2;line-height:1.3;font-weight:600}
/* ===== 콘텐츠 ===== */
.content{flex:1;padding:18px 22px 60px;max-width:calc(100% - 216px)}
.section{display:none}
.section.visible{display:block}
.page-title{display:flex;align-items:center;gap:10px;margin-bottom:4px;flex-wrap:wrap}
.page-title h1{font-size:20px;font-weight:800}
.page-title .star{color:var(--ey-yellow);font-size:16px}
.page-title .chip-id{background:var(--ey-dark);color:var(--ey-yellow);font-size:11px;padding:2px 8px;border-radius:3px;font-weight:700}
.crumb{font-size:11.5px;color:var(--ey-gray);margin-bottom:12px}
.src{font-size:11.5px;color:var(--ey-gray);background:#EFEFF4;border-left:3px solid var(--ey-yellow);padding:8px 12px;border-radius:0 4px 4px 0;margin:10px 0 16px}
.src b{color:var(--ey-text)}
h2.sec{font-size:15.5px;font-weight:800;margin:24px 0 10px;padding-bottom:6px;border-bottom:2px solid var(--ey-dark)}
h2.sec .no{color:#9a9aa4;font-weight:700;margin-right:6px}
h3.sub{font-size:13.5px;font-weight:700;margin:16px 0 8px;padding-left:8px;border-left:3px solid var(--ey-yellow)}
p.desc{margin:6px 0 10px;color:#44444e}
ul.plain{margin:6px 0 12px 18px}
ul.plain li{margin:3px 0}
table.spec{width:100%;border-collapse:collapse;margin:8px 0 16px;background:#fff;font-size:12.5px}
table.spec th{background:var(--ey-dark);color:#fff;padding:6px 10px;text-align:left;font-weight:600;border:1px solid #45454f;font-size:12px}
table.spec td{padding:5px 10px;border:1px solid var(--ey-border);vertical-align:top}
table.spec tr:nth-child(even) td{background:#FAFAFD}
table.spec td.c,table.spec th.c{text-align:center}
code{background:#EFEFF4;border:1px solid var(--ey-border);border-radius:3px;padding:0 4px;font-family:Consolas,monospace;font-size:12px;color:#7A2E8D}
.badge{display:inline-block;font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:9px;margin:0 2px;vertical-align:1px}
.b-block{background:#FBE9E7;color:var(--ey-red);border:1px solid #F5C6C0}
.b-warn{background:#FFF8DC;color:#8a6d00;border:1px solid #EFE0A0}
.b-ok{background:#E8F5E9;color:var(--ey-green);border:1px solid #BFE3C6}
.b-new{background:var(--ey-yellow);color:#1a1a24;border:1px solid #d9c400}
.b-ref{background:#EAF2FB;color:var(--ey-link);border:1px solid #C5DCF5}
.b-gray{background:#EFEFF4;color:#5a5a66;border:1px solid #d9d9e0}
/* ===== 목업 공통 ===== */
.mock{background:#fff;border:1px solid var(--ey-border);border-radius:6px;box-shadow:0 1px 4px rgba(30,30,40,.08);margin:12px 0 20px;overflow:hidden}
.mock .mock-cap{background:#EFEFF4;border-bottom:1px solid var(--ey-border);padding:5px 12px;font-size:11px;color:var(--ey-gray);font-weight:600}
.screen-details{margin:2px 0 30px}
.screen-details .sd-title{font-size:14px;font-weight:800;margin:8px 0 10px;padding-bottom:6px;border-bottom:2px solid var(--ey-dark)}
.screen-desc-list{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin:8px 0 14px}
.screen-desc-item{background:#fff;border:1px solid var(--ey-border);border-left:3px solid var(--ey-yellow);border-radius:0 5px 5px 0;padding:8px 10px;font-size:11.8px;min-height:62px}
.screen-desc-item .desc-label{display:block;font-weight:800;color:var(--ey-dark);margin-bottom:3px}
.screen-desc-item .desc-body{color:#4b4b55}
/* 타이틀바 (EY 다크) */
.titlebar{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--ey-darker);border-bottom:2px solid var(--ey-yellow);flex-wrap:wrap}
.titlebar .tb-crumb{font-size:12px;color:#b9b9c2;font-weight:600}
.titlebar .tb-sep{color:#6a6a75;font-weight:700}
.titlebar .tb-title{font-size:15px;font-weight:800;color:#fff}
.titlebar .tb-star{color:var(--ey-yellow);font-size:14px;cursor:pointer}
.titlebar .tb-id{background:var(--ey-yellow);color:#1a1a24;font-size:10.5px;padding:2px 8px;border-radius:3px;font-weight:700}
.titlebar .tb-right{margin-left:auto;font-size:11px;color:#c9c9d2}
/* 조회조건 바 */
.qbar{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--ey-border);background:#fff;flex-wrap:wrap;font-size:12px}
.qbar .qlabel{font-size:11px;color:var(--ey-gray);font-weight:700}
.qbar .seg{display:inline-flex;border:1px solid #c9c9d2;border-radius:4px;overflow:hidden}
.qbar .seg span{padding:3px 10px;font-size:11.5px;font-weight:700;cursor:pointer;background:#fff;color:#5a5a66}
.qbar .seg span.on{background:var(--ey-dark);color:var(--ey-yellow)}
.qbar .qv{display:inline-flex;align-items:center;gap:4px;border:1px solid #c9c9d2;border-radius:4px;padding:3px 8px;background:#fff;font-size:12px}
.qbar .qv.off{background:#F3F3F7;color:#9a9aa4}
.qbar .navbtn{border:1px solid #c9c9d2;background:#fff;border-radius:3px;padding:2px 7px;font-size:11px;cursor:pointer;font-weight:700}
.qbar .qright{margin-left:auto;display:inline-flex;gap:6px;align-items:center}
/* 액션바 (우측 정렬) */
.actionbar{display:flex;align-items:center;gap:6px;padding:8px 12px;border-bottom:1px solid var(--ey-border);background:#FCFCFE;flex-wrap:wrap}
.abtn{border:1px solid #c9c9d2;background:#fff;border-radius:4px;padding:4px 12px;font-size:12px;font-weight:600;cursor:pointer}
.abtn.dark{background:var(--ey-dark);color:#fff;border-color:var(--ey-dark)}
.abtn.red{background:var(--ey-red);color:#fff;border-color:var(--ey-red)}
.abtn.yellow{background:var(--ey-yellow);color:#1a1a24;border-color:#d9c400;font-weight:700}
.abtn.ghost{background:#fff}
.abtn.sm{padding:2px 7px;font-size:11px}
.ab-right{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
/* 탭 */
.tabbar{display:flex;gap:2px;padding:8px 12px 0;background:#FCFCFE;border-bottom:1px solid var(--ey-border);flex-wrap:wrap}
.tab{padding:6px 16px;border:1px solid var(--ey-border);border-bottom:none;border-radius:6px 6px 0 0;background:#EFEFF4;font-size:12px;font-weight:600;color:#5a5a66;cursor:pointer}
.tab.on{background:#fff;color:var(--ey-text);font-weight:700;border-color:#b9b9c2;border-bottom:2px solid #fff;margin-bottom:-1px}
.tab .tno{color:#9a9aa4;font-size:10.5px}
.tabpane{display:none}
.tabpane.on{display:block}
/* 폼 */
.formgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px 14px;padding:12px}
.formgrid.c3{grid-template-columns:repeat(3,1fr)}
.formgrid.c2{grid-template-columns:repeat(2,1fr)}
.ff{display:flex;flex-direction:column;gap:2px}
.ff label{font-size:11px;color:var(--ey-gray);font-weight:600}
.ff .fv{display:flex;align-items:center;gap:4px;border:1px solid #c9c9d2;border-radius:4px;padding:4px 8px;background:#fff;font-size:12.5px;min-height:28px}
.ff .fv.ro{background:#F3F3F7;color:#5a5a66}
.ff .fv .lens{margin-left:auto;color:#9a9aa4;font-size:11px;cursor:pointer}
.ff.wide{grid-column:span 2}
.ff.full{grid-column:span 4}
.formgrid.c3 .ff.full{grid-column:span 3}
.formgrid.c2 .ff.full{grid-column:span 2}
.mock input,.mock select,.mock textarea{border:1px solid #c9c9d2;border-radius:4px;background:#fff;padding:3px 6px;font:inherit;color:var(--ey-text)}
.mock input,.mock select{height:26px}
.mock textarea{width:100%;resize:vertical}
table.grid input,table.grid select{width:100%;min-width:0}
table.grid input.num{text-align:right;font-family:Consolas,monospace}
/* 기능바/토글 */
.fnbar{display:flex;align-items:center;gap:10px;padding:8px 12px;border-top:1px solid var(--ey-border);border-bottom:1px solid var(--ey-border);background:#FCFCFE;flex-wrap:wrap;font-size:12px}
.chip{border:1px solid #c9c9d2;background:#fff;border-radius:14px;padding:3px 12px;font-size:11.5px;font-weight:600;cursor:pointer}
.chip.on{background:var(--ey-dark);color:var(--ey-yellow);border-color:var(--ey-dark)}
.toggle{display:inline-flex;align-items:center;gap:6px;font-weight:600}
.toggle .sw{width:34px;height:18px;border-radius:9px;background:var(--ey-yellow);position:relative;display:inline-block}
.toggle .sw::after{content:'';position:absolute;right:2px;top:2px;width:14px;height:14px;border-radius:50%;background:#1a1a24}
.sumbox{margin-left:auto;display:flex;gap:14px;font-weight:700;font-size:12px}
.sumbox .ok{color:var(--ey-green)}
/* 그리드 */
table.grid{width:100%;border-collapse:collapse;font-size:12px;background:#fff}
table.grid th{background:#F3F3F7;border:1px solid var(--ey-border);padding:5px 6px;font-weight:700;color:#44444e;white-space:nowrap}
table.grid td{border:1px solid var(--ey-border);padding:4px 6px;white-space:nowrap}
table.grid td .lens{float:right;color:#9a9aa4;margin-left:8px;cursor:pointer}
table.grid td.num{text-align:right;font-family:Consolas,monospace}
table.grid td.c{text-align:center}
table.grid tr.sel td{background:#FFFBE0}
table.grid tr.empty td{color:#c9c9d2;height:26px}
table.grid tr.tot td{background:#F3F3F7;font-weight:700}
table.grid .red{color:var(--ey-red);font-weight:700}
table.grid .blue{color:var(--ey-blue)}
table.grid .dr{color:var(--ey-blue);font-weight:700}
table.grid .cr{color:var(--ey-red);font-weight:700}
table.grid .dim{color:#9a9aa4}
.statusbar{display:flex;align-items:center;gap:16px;background:var(--ey-darker);color:#e8e8ee;padding:7px 12px;font-size:11.5px;flex-wrap:wrap}
.statusbar .okmsg{color:#7ADB8F;font-weight:700}
.statusbar .warnmsg{color:#FFD666;font-weight:700}
.statusbar .opts{display:flex;gap:12px}
.statusbar .cnt{margin-left:auto;color:#b9b9c2}
/* 좌우 배치 + 패널 */
.mock-flex{display:flex;gap:0}
.mock-main{flex:1;min-width:0}
.lpane{width:280px;flex-shrink:0;border-right:1px solid var(--ey-border);background:#FCFCFE;display:flex;flex-direction:column}
.lpane .lp-t{background:#F3F3F7;padding:6px 10px;font-size:11.5px;font-weight:700;border-bottom:1px solid var(--ey-border)}
.rpanel{width:250px;flex-shrink:0;border-left:1px solid var(--ey-border);background:#FCFCFE;padding:10px;display:flex;flex-direction:column;gap:12px}
.rp-box{border:1px solid var(--ey-border);border-radius:5px;background:#fff}
.rp-box .rp-t{background:#F3F3F7;padding:5px 10px;font-size:11.5px;font-weight:700;border-bottom:1px solid var(--ey-border)}
.rp-box .rp-b{padding:8px 10px;font-size:11.5px}
.rp-box .kv{display:flex;justify-content:space-between;margin:3px 0;gap:8px}
.rp-box .kv .k{color:var(--ey-gray);white-space:nowrap}
.rp-box .kv .v{font-weight:600;text-align:right}
.dropzone{border:1.5px dashed #c9c9d2;border-radius:5px;padding:10px;text-align:center;color:#9a9aa4;font-size:11px;margin-bottom:6px}
.file{display:flex;align-items:center;gap:6px;font-size:11.5px;margin:3px 0;color:#44444e}
.twocol{display:grid;grid-template-columns:1fr 1fr;gap:0 26px}
.source-wjv .page-title{flex-wrap:nowrap}
.source-wjv .titlebar{flex-wrap:nowrap}
.source-wjv .ab-right{flex-wrap:nowrap}
.source-wjv .rpanel{width:230px}
.source-wjv .rp-box .kv{gap:0}
.source-wjv .statusbar{flex-wrap:nowrap}
.source-wjv table.grid td,.source-wjv table.grid th{white-space:nowrap}
/* 트리 */
.tree{padding:8px 6px;font-size:12px;overflow:auto;max-height:430px}
.tree .tnode{padding:2px 8px;cursor:pointer;border-radius:3px;white-space:nowrap}
.tree .tnode:hover{background:#EFEFF4}
.tree .tnode.on{background:var(--ey-yellow);font-weight:700}
.tree .lv1{font-weight:700}
.tree .lv2{padding-left:22px}
.tree .lv3{padding-left:40px;color:#44444e}
.tree .cnt{color:#9a9aa4;font-size:10.5px}
.tree .red{color:var(--ey-red)}
.note{font-size:11.5px;color:var(--ey-gray);margin:6px 0 14px;padding-left:2px}
.kbd{display:inline-block;border:1px solid #b9b9c2;border-bottom-width:2px;border-radius:3px;background:#fff;padding:0 5px;font-size:11px;font-family:Consolas,monospace;font-weight:700;color:#44444e}
.flow{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin:10px 0 16px}
.flow .st{background:#fff;border:1.5px solid var(--ey-dark);border-radius:4px;padding:4px 10px;font-size:11.5px;font-weight:700}
.flow .st.hl{background:var(--ey-yellow);border-color:#c9b400}
.flow .st.end{background:var(--ey-dark);color:#fff}
.flow .ar{color:#9a9aa4;font-weight:700}
/* 모달 목업 */
.modal{max-width:560px;margin:10px auto;border:2px solid var(--ey-dark);border-radius:6px;background:#fff;box-shadow:0 6px 24px rgba(0,0,0,.18)}
.modal .m-t{background:var(--ey-darker);color:#fff;padding:8px 12px;font-weight:700;font-size:12.5px;display:flex}
.modal .m-t .x{margin-left:auto;color:#c9c9d2;cursor:pointer}
.modal .m-b{padding:12px}
.modal .m-f{padding:8px 12px;border-top:1px solid var(--ey-border);display:flex;justify-content:flex-end;gap:6px}
.footer{background:var(--ey-darker);color:#b9b9c2;padding:14px 22px;font-size:11px;display:flex;align-items:center;gap:14px}
.footer .beamline{width:70px;height:8px;background:var(--ey-yellow);transform:skewX(-30deg)}
@media(max-width:1100px){.twocol{grid-template-columns:1fr}.formgrid{grid-template-columns:repeat(2,1fr)}.ff.full{grid-column:span 2}.screen-desc-list{grid-template-columns:1fr}.mock-flex{flex-direction:column}.lpane,.rpanel{width:auto;border:none;border-bottom:1px solid var(--ey-border)}}
</style>
</head>
<body>

<!-- ===================== 상단바 ===================== -->
<header class="topbar">
  <div class="ey-logo">
    <div class="ey-mark"><div class="beam"></div><div class="ey">EY</div></div>
    <div class="ey-tag">Shape the future<br>with confidence</div>
  </div>
  <div class="company-select"><span class="code">1000</span> <b>EY Korea Co., Ltd.</b> <span>▾</span></div>
  <div class="global-search">🔍 메뉴, 기능, 코드 검색 (Ctrl + K)</div>
  <div class="top-utils">
    <div class="util">🔔 공지사항</div>
    <div class="util fav"><span class="ico">★</span> 즐겨찾기</div>
    <div class="util">? 도움말</div>
    <div class="util"><span class="avatar">홍</span> 홍길동 대리 ▾</div>
    <div class="util">▦</div>
  </div>
</header>

<div class="layout">
<!-- ===================== 좌측 메뉴 ===================== -->
<aside class="sidebar">
  <div class="menu-head">☰ Menu — {{MENU_HEAD}}</div>
  <nav>
    <a class="mitem active" data-sec="home" style="padding-left:16px;font-weight:700">🏠 페이즈 개요</a>
    <!-- {{SIDEBAR_NAV}} : 여기에 .mgroup 블록들을 삽입. 각 화면당 <a class="mitem" data-sec="xxx">명칭 <span class="mid">ID</span></a> -->
  </nav>
  <div class="foot">
    <div class="ey-mark"><div class="beam"></div><div class="ey">EY</div></div>
    <div class="txt">Building a better<br>working world</div>
  </div>
</aside>

<!-- ===================== 콘텐츠 ===================== -->
<main class="content">

<!-- {{SECTIONS}} : #home (개요) 섹션 + 화면별 섹션 + 공통 섹션(gate/upload/model 등)을 여기에 삽입.
     첫 섹션(#home)만 class="section visible", 나머지는 class="section".
     여러 번의 편집으로 아래 앵커 앞에 이어붙인 뒤, 마지막 편집에서 앵커를 제거한다. -->
<!-- SECTIONS_ANCHOR -->

</main>
</div>

<footer class="footer">
  <div class="beamline"></div>
  <div>{{FOOTER_TEXT}}</div>
</footer>

<script>
document.querySelectorAll('.mitem').forEach(function(mi){
  mi.addEventListener('click',function(){
    document.querySelectorAll('.mitem').forEach(function(x){x.classList.remove('active')});
    mi.classList.add('active');
    var sec=mi.getAttribute('data-sec');
    document.querySelectorAll('.section').forEach(function(s){s.classList.remove('visible')});
    var el=document.getElementById(sec);
    if(el){el.classList.add('visible');window.scrollTo({top:0});}
  });
});
// 로컬 탭 전환 (mock 내부 .tabbar)
document.querySelectorAll('.mock .tabbar').forEach(function(bar){
  var mock=bar.closest('.mock');
  var tabs=Array.prototype.slice.call(bar.querySelectorAll('.tab'));
  var panes=Array.prototype.slice.call(mock.children).filter(function(c){return c.classList&&c.classList.contains('tabpane')});
  tabs.forEach(function(tab,i){
    tab.addEventListener('click',function(){
      tabs.forEach(function(t){t.classList.remove('on')});
      tab.classList.add('on');
      if(panes.length){ panes.forEach(function(p){p.classList.remove('on')}); if(panes[i]) panes[i].classList.add('on'); }
    });
  });
});
</script>
</body>
</html>
